version: '12.0'
basis: Приказ Минстроя 344/пр от 16.05.2023
base_trail:
  id_requirements:
    gro_act:
      name: Акт ГРО
      required: true
      quantity: 1
      form: 344/пр прил.1
      signers:
      - застройщик
      - ЛОС
      - проектировщик
    axis_layout:
      name: Разбивка осей
      required: true
      quantity: 1
      form: 344/пр прил.2
    executive_schemes:
      name: Исполнительные схемы
      required: true
      quantity: ≥1 по этапу
      form: ГОСТ Р 51872-2024
    test_reports:
      name: Протоколы испытаний
      required: true
      quantity: ≥1
      signers:
      - лаборатория
      - стройконтроль
    lab_conclusions:
      name: Заключения лаборатории
      required: true
      quantity: по числу партий
      signers:
      - лаборатория
    input_control:
      name: Входной контроль
      required: true
      quantity: по числу партий ТМЦ
      form: ЖВК + сертификаты + паспорта
    inspection_notes:
      name: Замечания стройконтроля
      required: false
