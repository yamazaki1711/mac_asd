    - отводы/переходы/тройники в изоляции (сертификат)
    - сильфонные компенсаторы (паспорт + сертификат, компенсирующая способность, осевой/угловой)
    - шаровые краны (паспорт, класс герметичности А по ГОСТ 9544, под приварку/фланцевые)
    - система ОДК (терминалы/детекторы — паспорт + сертификат)
    - неподвижные опоры (паспорт)
