version: '13.0'
basis: Приказ Минстроя 344/пр от 16.05.2023
base_trail:
  id_requirements:
    gro_act:
      name: Акт ГРО
      required: true
      quantity: 1
      form: 344/пр прил.1
      signers:
      - застройщик
      - ЛОС
      - проектировщик
    axis_layout:
      name: Разбивка осей
      required: true
      quantity: 1
      form: 344/пр прил.2
    executive_schemes:
      name: Исполнительные схемы
      required: true
      quantity: ≥1 по этапу
      form: ГОСТ Р 51872-2024
    test_reports:
      name: Протоколы испытаний
      required: true
      quantity: ≥1
      signers:
      - лаборатория
      - стройконтроль
    lab_conclusions:
      name: Заключения лаборатории
      required: true
      quantity: по числу партий
      signers:
      - лаборатория
    input_control:
      name: Входной контроль
      required: true
      quantity: по числу партий ТМЦ
      form: ЖВК + сертификаты + паспорта
    inspection_notes:
      name: Замечания стройконтроля
      required: false

work_types:
  # =================== ЗЕМЛЯНЫЕ РАБОТЫ ===================
  earthwork_excavation:
    display_name: Разработка котлована / земляные работы
    aosr_count: ≥1 на слой/захватку
    aook: false
    special_journals:
    - журнал земляных работ (СП 392.1325800.2018, форма 5.1)
    - ОЖР
    typical_tests:
    - протокол испытания грунтов основания (ГОСТ 30416)
    - протокол уплотнения грунта (ГОСТ 5180)
    input_control_materials:
    - геотекстиль
    - щебень
    - песок
    - грунт обратной засыпки (при привозном)
    normative_refs:
    - СП 45.13330.2017
    - ГОСТ 30416-2012
    - ГОСТ 5180-2015
    executive_schemes_detail: ИГС котлована

  earthwork_backfill:
    display_name: Обратная засыпка
    aosr_count: ≥1 на этап/слой
    aook: false
    special_journals:
    - журнал земляных работ (СП 392.1325800.2018, форма 5.1)
    - ОЖР
    typical_tests:
    - протокол уплотнения грунта (ГОСТ 5180)
    - протокол послойной плотности скелета грунта
    input_control_materials:
    - грунт обратной засыпки (паспорт карьера)
    - геотекстиль (при наличии)
    - дренажные маты (при наличии)
    normative_refs:
    - СП 45.13330.2017
    - ГОСТ 5180-2015
    executive_schemes_detail: ИС обратной засыпки с отметками

  # =================== ФУНДАМЕНТЫ ===================
  foundation_monolithic:
    display_name: Монолитный фундамент
    aosr_count: ≥1 на захватку
    aook: true
    special_journals:
    - журнал бетонных работ (СП 70.13330.2012, Приложение Ф)
    - журнал арматурных работ
    - журнал контроля температуры бетона (зимнее бетонирование)
    - ОЖР
    typical_tests:
    - протокол испытания бетона на прочность (промежуточный + 28 сут, ГОСТ 18105)
    - протокол контроля арматуры (сертификат)
    - протокол морозостойкости/водонепроницаемости
    - протокол испытания грунтов основания (ГОСТ 30416)
    input_control_materials:
    - арматура (сертификат + паспорт)
    - бетонная смесь (паспорт-сертификат завода)
    - гидроизоляция (сертификат)
    - закладные детали (сертификат)
    normative_refs:
    - СП 70.13330.2012
    - СП 435.1325800.2018
    - ГОСТ 18105-2018
    - ГОСТ 30416-2012
    executive_schemes_detail: ИС армирования + ИГС бетонирования (оси, отметки, привязка)

  foundation_precast:
    display_name: Сборный фундамент
    aosr_count: ≥1 на захватку/секцию
    aook: true
    special_journals:
    - журнал монтажа строительных конструкций (СП 70.13330.2012, Приложение А)
    - ОЖР
    typical_tests:
    - протокол испытания бетона (паспорт завода-изготовителя ЖБИ)
    - акт приёмки основания (с геологом)
    - протокол замоноличивания стыков
    input_control_materials:
    - ж/б плиты и блоки (паспорт + сертификат завода)
    - цементный раствор (паспорт)
    - анкерные болты (сертификат)
    - гидроизоляция (сертификат)
    normative_refs:
    - СП 70.13330.2012
    - СП 45.13330.2017
    executive_schemes_detail: ИС монтажа сборных элементов с отклонениями

  foundation_pile:
    display_name: Свайный фундамент
    aosr_count: ≥1 на сваю/группу
    aook: true
    special_journals:
    - журнал погружения (забивки) свай (СНиП III-9-74)
    - журнал буронабивных свай (СНиП III-9-74) — для БНС
    - журнал бетонных работ (СП 70, Прил. Ф) — для БНС
    - ОЖР
    typical_tests:
    - протокол испытания свай несущей способностью (ГОСТ 5686)
    - протокол сплошности ствола (УЗ-дефектоскопия)
    - протокол прочности бетона — для БНС (ГОСТ 18105)
    input_control_materials:
    - сваи/шпунт (сертификат + паспорт завода)
    - бетонная смесь (паспорт-сертификат) — для БНС
    - арматурные каркасы (сертификат) — для БНС
    normative_refs:
    - СП 45.13330.2017
    - СП 70.13330.2012
    - СНиП III-9-74
    - ГОСТ 5686-2020
    executive_schemes_detail: ИС свайного поля с отклонениями + план-схема, ИГС ростверка

  # =================== БЕТОННЫЕ РАБОТЫ ===================
  concrete:
    display_name: Бетонирование конструкций
    aosr_count: ≥1 на элемент/захватку
    aook: true
    special_journals:
    - журнал бетонных работ (СП 70.13330.2012, Приложение Ф)
    - журнал арматурных работ
    - журнал контроля температуры бетона (при зимнем бетонировании)
    - ОЖР
    typical_tests:
    - протокол прочности бетона (промежуточный + 28 сут, ГОСТ 18105)
    - протокол морозостойкости/водонепроницаемости
    - протокол контроля арматуры (сертификат завода)
    - протокол УЗК бетона (при необходимости)
    input_control_materials:
    - бетонная смесь (паспорт-сертификат завода, класс/марка)
    - арматура (сертификат + паспорт, класс А500С/А400)
    - закладные детали (сертификат)
    - опалубка (паспорт оборачиваемости)
    normative_refs:
    - СП 70.13330.2012
    - СП 435.1325800.2018
    - ГОСТ 18105-2018
    executive_schemes_detail: ИС армирования + ИГС бетонных конструкций (оси, отметки)

  # =================== МЕТАЛЛИЧЕСКИЕ КОНСТРУКЦИИ ===================
  metal_structures:
    display_name: Металлические конструкции
    aosr_count: ≥1 на монтажный узел/элемент
    aook: true
    special_journals:
    - журнал сварочных работ — МК (СП 70.13330.2012, Приложение Б)
    - журнал монтажа строительных конструкций (СП 70, Приложение А)
    - журнал монтажных соединений на болтах (СП 70, Приложение Д)
    - журнал контрольной тарировки динамометрических ключей (СП 70, Приложение Е)
    - журнал антикоррозионной защиты сварных соединений (СП 70, Приложение В)
    - ОЖР
    typical_tests:
    - протокол НК сварных швов — УЗК/радиография (СП 70, табл. 10.3)
    - акт ВИК сварных соединений
    - протокол натяжения высокопрочных болтов (ГОСТ Р 70132)
    - протокол толщины/адгезии антикоррозионного покрытия (ГОСТ 15140)
    input_control_materials:
    - металлопрокат (сертификат завода, марка стали по ГОСТ 27772)
    - электроды/сварочная проволока (сертификат + паспорт)
    - высокопрочные болты (паспорт + сертификат)
    - ЛКМ/грунтовка (сертификат + паспорт)
    normative_refs:
    - СП 70.13330.2012
    - ГОСТ 27772-2021
    - ГОСТ Р 70132-2022
    - ГОСТ 15140-78
    executive_schemes_detail: Схема сварных соединений + ИС монтажа МК (оси, отметки, отклонения)

  # =================== КАМЕННАЯ КЛАДКА ===================
  masonry:
    display_name: Каменная кладка
    aosr_count: ≥1 на этаж/захватку
    aook: false
    special_journals:
    - журнал контрольных испытаний прочности сцепления в кладке (ГОСТ 24992-2014, Приложение В)
    - ОЖР
    typical_tests:
    - протокол прочности сцепления раствора с кирпичом/блоком (ГОСТ 24992)
    - протокол прочности раствора на сжатие (ГОСТ 5802)
    input_control_materials:
    - кирпич/блоки (сертификат + паспорт производителя, марка по прочности и морозостойкости)
    - кладочный раствор (паспорт смеси или рецептура)
    - арматурные сетки (сертификат)
    - перемычки (паспорт)
    normative_refs:
    - СП 70.13330.2012
    - ГОСТ 24992-2014
    - ГОСТ 5802-86
    executive_schemes_detail: ИС рядов кладки (привязка к осям, отметки)

  # =================== ОТДЕЛОЧНЫЕ РАБОТЫ ===================
  finishing_floors:
    display_name: Устройство полов
    aosr_count: ≥1 на этаж/участок
    aook: false
    special_journals:
    - ОЖР
    typical_tests:
    - протокол прочности стяжки на сжатие (ГОСТ 18105)
    - протокол влажности основания (перед укладкой покрытия)
    - протокол ровности (2-метровая рейка, СП 29.13330)
    - протокол адгезии покрытия (ГОСТ 15140 — для наливных полов)
    input_control_materials:
    - цементно-песчаная смесь/наливной пол (паспорт-сертификат)
    - гидроизоляция/пароизоляция (сертификат)
    - напольное покрытие (плитка/линолеум/ламинат — сертификат)
    - клей/грунтовка (сертификат)
    - демпферная лента, шумопоглощающие маты
    normative_refs:
    - СП 29.13330.2011
    - СП 71.13330.2017
    - ГОСТ 18105-2018
    - ГОСТ 15140-78
    executive_schemes_detail: ИС конструкции пола (слои, отметки)

  finishing_walls_ceilings:
    display_name: Отделка стен и потолков
    aosr_count: ≥1 на этаж/помещение
    aook: false
    special_journals:
    - ОЖР
    typical_tests:
    - протокол прочности штукатурного слоя на отрыв
    - протокол прочности шпатлёвочного слоя
    - акт скрытых работ на устройство каркаса (для ГКЛ)
    input_control_materials:
    - штукатурная/шпатлёвочная смесь (сертификат)
    - ГКЛ/ГВЛ (сертификат производителя)
    - профили/крепеж (сертификат)
    - грунтовка (сертификат)
    - финишное покрытие (обои/краска/плитка — сертификат)
    normative_refs:
    - СП 71.13330.2017
    - СП 70.13330.2012 (Приложение В — гипсокартон)
    executive_schemes_detail: ИС каркаса (при ГКЛ) + ИС отделки (ведомость помещений)

  finishing_windows_doors:
    display_name: Монтаж окон и дверей
    aosr_count: ≥1 на этаж/секцию
    aook: false
    special_journals:
    - журнал монтажа окон и балконных дверей (ГОСТ 34378-2018, Приложение А)
    - журнал устройства монтажных швов (ГОСТ 34378-2018, Приложение Б)
    - ОЖР
    typical_tests:
    - протокол испытания монтажных швов на воздухопроницаемость (ГОСТ 34378)
    - протокол проверки теплозащитных свойств (тепловизор)
    - протокол проверки открывания/закрывания (5 циклов)
    input_control_materials:
    - оконные/дверные блоки (паспорт + сертификат соответствия, ГОСТ 23166)
    - стеклопакеты (паспорт, формула стеклопакета, маркировка)
    - монтажная пена (сертификат)
    - ПСУЛ/гидроизоляционные ленты (сертификат)
    - крепёжные элементы (сертификат)
    - подоконники/отливы
    normative_refs:
    - ГОСТ 34378-2018
    - ГОСТ 23166-2021
    - ГОСТ 30971-2012
    executive_schemes_detail: ИС установки оконных/дверных блоков (привязка к проёмам)

  # =================== ИНЖЕНЕРНЫЕ СИСТЕМЫ — ВиК ===================
  water_supply:
    display_name: Внутреннее водоснабжение
    aosr_count: ≥1 на систему/этаж
    aook: false
    special_journals:
    - ОЖР
    - журнал сварочных работ (при сварке полипропилена/стали)
    typical_tests:
    - протокол гидравлических испытаний (СНиП 3.05.01-85, пробное давление 1.5×Рраб, 10 мин)
    - протокол промывки системы
    - протокол дезинфекции (для хоз-питьевого водопровода, СанПиН)
    - протокол манометрических испытаний
    input_control_materials:
    - трубы (сертификат + паспорт, ГОСТ/ТУ)
    - фитинги (сертификат)
    - запорная арматура (паспорт + сертификат)
    - счётчики воды (паспорт + свидетельство о поверке)
    - насосы (паспорт + сертификат)
    - водонагреватели/бойлеры (паспорт)
    normative_refs:
    - СНиП 3.05.01-85
    - СП 30.13330.2020
    - СанПиН 2.1.4.3684-21
    executive_schemes_detail: ИС трасс с привязкой + аксонометрическая схема

  sewerage:
    display_name: Внутренняя канализация
    aosr_count: ≥1 на систему/стояк
    aook: false
    special_journals:
    - ОЖР
    typical_tests:
    - протокол испытаний на пролив (СНиП 3.05.01-85, 3 л/с на стояк)
    - протокол гидравлических испытаний (для напорных участков)
    - акт проверки уклонов трубопроводов
    input_control_materials:
    - трубы канализационные (сертификат)
    - фитинги (сертификат)
    - ревизии/прочистки (паспорт)
    - сифоны/трапы (паспорт)
    - обратные клапаны (паспорт)
    normative_refs:
    - СНиП 3.05.01-85
    - СП 30.13330.2020
    executive_schemes_detail: ИС трасс с уклонами + аксонометрическая схема

  external_networks_vk:
    display_name: Наружные сети водоснабжения и канализации
    aosr_count: ≥1 на участок между колодцами
    aook: false
    special_journals:
    - журнал земляных работ (СП 392.1325800.2018, форма 5.1)
    - ОЖР
    typical_tests:
    - протокол гидравлических испытаний трубопровода (СНиП 3.05.04-85*, пробное давление)
    - протокол испытания колодцев/камер на водонепроницаемость
    - акт приёмки траншеи и основания
    - протокол послойного уплотнения обратной засыпки
    - акт промывки и дезинфекции водопровода
    - протокол испытания на пролив (для самотечной канализации)
    input_control_materials:
    - трубы (сертификат + паспорт завода, ПНД/чугун/ж/б)
    - колодцы (паспорт, заводская маркировка)
    - люки чугунные/полимерные (сертификат)
    - запорная арматура (паспорт)
    - песок/щебень для основания (паспорт карьера)
    - уплотнительные кольца (сертификат)
    normative_refs:
    - СНиП 3.05.04-85*
    - СНиП 3.05.01-85
    - СП 129.13330.2019
    executive_schemes_detail: ИС сетей с колодцами + продольный профиль

  # =================== ИНЖЕНЕРНЫЕ СИСТЕМЫ — ОВиК ===================
  heating:
    display_name: Отопление
    aosr_count: ≥1 на систему/этаж
    aook: false
    special_journals:
    - журнал сварочных работ (ВСН 478-86 / ГОСТ 32569-2013 — для стальных труб)
    - ОЖР
    typical_tests:
    - протокол гидравлических испытаний (СНиП 3.05.01-85, пробное давление 1.5×Рраб, 10 мин)
    - протокол теплового испытания системы (равномерность прогрева приборов, 7°C перепад)
    - акт промывки системы
    - акт манометрических испытаний
    input_control_materials:
    - радиаторы/конвекторы (паспорт + сертификат, теплоотдача Q, Вт)
    - трубы стальные/полипропиленовые (сертификат + паспорт)
    - запорная и регулирующая арматура (паспорт)
    - балансировочные клапаны (паспорт)
    - теплоноситель (паспорт)
    - тепловая изоляция (сертификат)
    normative_refs:
    - СНиП 3.05.01-85
    - СП 60.13330.2020
    executive_schemes_detail: ИС трасс + аксонометрическая схема системы отопления

  ventilation:
    display_name: Вентиляция
    aosr_count: ≥1 на систему
    aook: false
    special_journals:
    - ОЖР
    typical_tests:
    - акт аэродинамических испытаний (ГОСТ 12.3.018-79, СП 60.13330 — расход воздуха по помещениям)
    - протокол шумовых замеров (СанПиН 2.2.4/2.1.8.562-96)
    - протокол проверки герметичности воздуховодов (класс В/А, СП 60)
    - акт комплексного опробования системы (72 часа)
    input_control_materials:
    - воздуховоды (сертификат, толщина металла/класс герметичности)
    - вентиляторы (паспорт + сертификат, характеристика Q/H, кВт)
    - фильтры (паспорт, класс очистки G4/F7/H13)
    - шумоглушители (паспорт)
    - клапаны (противопожарные/воздушные — сертификат + паспорт)
    - решётки/диффузоры (паспорт)
    normative_refs:
    - СП 60.13330.2020
    - ГОСТ 12.3.018-79
    - СанПиН 2.2.4/2.1.8.562-96
    executive_schemes_detail: ИС трасс воздуховодов + план систем (расходы по помещениям)

  air_conditioning:
    display_name: Кондиционирование
    aosr_count: ≥1 на систему/зону
    aook: false
    special_journals:
    - журнал сварочных работ (фреоновые магистрали — пайка твёрдым припоем)
    - ОЖР
    typical_tests:
    - акт опрессовки фреоновой трассы (азотом, 41 бар для R410A, 24 часа)
    - акт вакуумирования (< 500 микрон, выдержка 1 час)
    - "протокол пусконаладки (параметры хладонового контура: перегрев/переохлаждение, давления)"
    - протокол температурных замеров на входе/выходе внутренних блоков
    - акт проверки дренажной системы (пролив)
    input_control_materials:
    - наружные/внутренние блоки (паспорт + сертификат ТР ТС 010/020)
    - медные трубы (сертификат, класс ASTM B280, толщина стенки)
    - теплоизоляция K-Flex/Armacell (сертификат, толщина, коэф. паропроницаемости)
    - дренажные трубы (сертификат)
    - фреон (паспорт, марка R410A/R32)
    - кабель межблочный (сертификат)
    normative_refs:
