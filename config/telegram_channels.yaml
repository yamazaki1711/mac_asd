  legal_practice:
    description: "Каналы практикующих юристов — основной источник ловушек"
    default_weight: 1.0
    domain: legal
  legal_association:
    description: "Официальные объединения юристов"
    default_weight: 0.8
    domain: legal
  legal_education:
    description: "Образовательные и аналитические каналы"
    default_weight: 0.6
    domain: legal
  legal_news:
    description: "Новостные каналы с юридическим контентом"
    default_weight: 0.4
    domain: legal
  # PTO
  pto_practice:
    description: "Каналы ПТО-специалистов — основной источник для ПТО-ловушек"
    default_weight: 1.0
    domain: pto
  pto_news:
    description: "Новостные каналы ПТО"
    default_weight: 0.5
    domain: pto
  # Smeta
  smeta_practice:
    description: "Каналы сметчиков — основной источник для сметных ловушек"
    default_weight: 1.0
    domain: smeta
