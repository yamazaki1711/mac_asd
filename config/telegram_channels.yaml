# =============================================================================
# MAC_ASD v11.3 — Каталог Telegram-каналов для БЛС (База Ловушек Субподрядчика)
# =============================================================================
# Формат: каждый канал описан с метаданными для парсинга и приоритизации.
# Парсер (ingest_blc_telegram.py) читает этот файл для:
#   1. Валидации источника при импорте result.json
#   2. Присвоения category и weight найденным ловушкам
#   3. Фильтрации при RAG-поиске (например, только эксперты)
#
# Приоритеты:
#   critical — каналы с реальной судебной практикой, обязательны к парсингу
#   high     — экспертные каналы с глубоким разбором
#   medium   — новостные и общие, полезны для контекста
#   low      — общий охват, попадания редкие
# =============================================================================

