# =============================================================================
# Категории для классификации источников
# =============================================================================
categories:
  legal_practice:
    description: "Каналы практикующих юристов — основной источник ловушек"
    default_weight: 1.0
  legal_association:
    description: "Официальные объединения юристов"
    default_weight: 0.8
  legal_education:
    description: "Образовательные и аналитические каналы"
    default_weight: 0.6
  legal_news:
    description: "Новостные каналы с юридическим контентом"
    default_weight: 0.4


# =============================================================================
# Настройки парсинга
# =============================================================================
parsing:
  # Минимальная длина текста для анализа (символов)
  min_text_length: 50

  # Максимальная длина текста для одного LLM-запроса
  max_text_length: 8000

  # Задержка между запросами к LLM (секунды) — чтобы не перегружать MLX
  llm_throttle_seconds: 0.5

  # Порог confidence для сохранения ловушки
  confidence_threshold: 0.7

  # Категория по умолчанию для каналов не из каталога
  default_category: unknown

  # Папка с JSON-экспортами Telegram Desktop
  exports_dir: "data/telegram_exports"

  # Автоматическая категоризация при импорте
  auto_categorize: true

  # Порядок парсинга при batch-режиме: сначала critical, потом high, etc.
  priority_order:
    - critical
    - high
    - medium
    - low
