<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAC_ASD v13.0 — {% block title %}Антикризисное восстановление ИД{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h1>MAC_ASD <span class="version">v13.0</span></h1>
                <p class="subtitle">Антикризисное восстановление ИД</p>
            </div>
            <ul class="nav-menu">
                <li><a href="/dashboard" class="nav-item {% if active_page == 'dashboard' %}active{% endif %}">
                    <span class="nav-icon">📊</span> Дашборд
                </a></li>
                <li><a href="/projects" class="nav-item {% if active_page == 'projects' %}active{% endif %}">
                    <span class="nav-icon">📁</span> Проекты
                </a></li>
                <li><a href="/documents" class="nav-item {% if active_page == 'documents' %}active{% endif %}">
                    <span class="nav-icon">📄</span> Документы
                </a></li>
                <li><a href="/hitl" class="nav-item {% if active_page == 'hitl' %}active{% endif %}">
                    <span class="nav-icon">❓</span> HITL
                </a></li>
                <li><a href="/reports" class="nav-item {% if active_page == 'reports' %}active{% endif %}">
                    <span class="nav-icon">📋</span> Отчёты
                </a></li>
            </ul>
            <div class="sidebar-footer">
                <span class="status-dot online"></span>
                <span class="status-text" id="system-status">Загрузка...</span>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
