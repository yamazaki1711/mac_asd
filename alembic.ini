# =============================================================================
# MAC_ASD v12.0 — Alembic Configuration
# =============================================================================
# A generic, single database configuration.
# Database URL is read from env.py (uses src.config.settings).

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path prepend (so alembic can import src.*)
prepend_sys_path = .

# Timezone for datetime columns in migration
# timezone =

# Max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command
# revision_environment = false

# Set to 'true' to allow .hierarchical tracing in revision generation
# recursive_version_locations = false

# Default date format for new revision file names
# output_encoding = utf-8

# Database URL — overridden in env.py from src.config.settings
sqlalchemy.url = postgresql+psycopg2://oleg:asd_password@localhost:5433/asd_db

[post_write_hooks]
# Post-write hooks for formatting migration files
# hooks = black
# black_type = py36

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
