# =============================================================================
# ASD Manifest v10 — Главные связки проекта
# =============================================================================
# Этот файл определяет приоритетные движки для каждой модели и конфигурацию
# всего стека. Обновляется при смене моделей или инфраструктуры.
# =============================================================================

version: "1.0"
project: "mac_asd"

# ---------------------------------------------------------------------------
# 1. Модели — приоритет MLX для тяжёлых моделей, Ollama для вспомогательных
# ---------------------------------------------------------------------------
models:
  # Orchestrator — тяжёлая модель, MLX (Neural Engine M4)
  pm:
    engine: mlx
    model_id: mlx-community/Meta-Llama-3.3-70B-Instruct-4bit
    precision: 4bit
    max_memory_gb: 38
    context_tokens: 131072

  # ПТО — Vision + текст, MLX
  pto:
    engine: mlx
    model_id: mlx-community/gemma-4-31b-it-4bit
    precision: 4bit
    max_memory_gb: 18
    context_tokens: 32768
    vision: true

  # Сметчик — табличные данные, MLX (shared с Юристом и Закупщиком)
  smeta:
    engine: mlx
    model_id: mlx-community/Qwen3-32B-Instruct-4bit
    precision: 4bit
    max_memory_gb: 18
    context_tokens: 32768

  # Юрист — юридические тексты, MLX (shared модель Qwen 3.5)
  legal:
    engine: mlx
    model_id: mlx-community/Qwen3-32B-Instruct-4bit
    precision: 4bit
    max_memory_gb: 18
    context_tokens: 32768

  # Закупщик — тендеры, MLX (shared модель Qwen 3.5 — уже в памяти)
  procurement:
    engine: mlx
    model_id: mlx-community/Qwen3-32B-Instruct-4bit
    precision: 4bit
    max_memory_gb: 0
    context_tokens: 16384

  # Делопроизводитель — лёгкий агент, MLX
  archive:
    engine: mlx
    model_id: mlx-community/gemma-4-9b-it-4bit
    precision: 4bit
    max_memory_gb: 6
    context_tokens: 8192

# ---------------------------------------------------------------------------
# 2. Инфраструктура
# ---------------------------------------------------------------------------
infrastructure:
  mcp_server:
    name: asd_core
    transport: stdio
    host: localhost
    port: 8765

  neo4j:
    uri: bolt://localhost:7687
    user: neo4j
    password: asd_secret
    browser: http://localhost:7474

  redis:
    uri: redis://localhost:6379
    maxmemory: 2gb
    policy: allkeys-lru

  lightrag:
    vector_store: chroma
    legal_index: legal_rag
    rates_index: rates_rag
    embed_model: sentence-transformers/all-MiniLM-L6-v2

# ---------------------------------------------------------------------------
# 3. Память — оценка использования (Mac Studio M4 Max 128GB)
# ---------------------------------------------------------------------------
memory_budget:
  # Все 6 агентов — MLX, один движок, бесшовная работа
  #
  #   Llama 3.3 70B 4bit  ≈ 38 GB  (Hermes)
  #   Gemma 4 31B 4bit    ≈ 18 GB  (ПТО)
  #   Qwen 3.5 32B 4bit   ≈ 18 GB  (Сметчик — загружена одна копия)
  #   Qwen 3.5 32B 4bit   ≈  0 GB  (Юрист, shared)
  #   Qwen 3.5 32B 4bit   ≈  0 GB  (Закупщик, shared)
  #   Gemma 4 9B 4bit     ≈  6 GB  (Делопроизводитель)
  #   Neo4j               ≈  8 GB
  #   Redis               ≈  2 GB
  #   Система + OS        ≈  8 GB
  #   ──────────────────────────────────
  #   Итого ≈  98 GB / 128 GB  (запас ≈ 30 GB)
  #
  # 3 уникальные модели в памяти. Все агенты через MLX.
  total_model_gb: 80
  total_infra_gb: 10
  os_reserve_gb: 8
  available_gb: 128
  headroom_gb: 30  # 3 shared модели → экономия

# ---------------------------------------------------------------------------
# 4. Pipeline по умолчанию
# ---------------------------------------------------------------------------
default_pipeline:
  - step: 1
    agent: archive
    action: register_document
    input: incoming_file
    output: doc_id
  - step: 2
    agent: pto
    action: vision_cascade
    input: drawing_image
    output: vor_json
  - step: 3
    agent: archive
    action: register_artifact
    input: vor_json
    output: vor_registered
  - step: 4
    agent: smeta
    action: build_estimate
    input: vor_json
    output: estimate_json
  - step: 5
    agent: archive
    action: register_artifact
    input: estimate_json
    output: estimate_registered
  - step: 6
    agent: legal
    action: review_contract
    input: estimate_json
    output: legal_opinion
  - step: 7
    agent: archive
    action: register_artifact
    input: legal_opinion
    output: legal_registered
  - step: 8
    agent: procurement
    action: form_lots
    input: legal_opinion
    output: procurement_lots
  - step: 9
    agent: archive
    action: archive_package
    input: procurement_lots
    output: package_archived

# ---------------------------------------------------------------------------
# 5. Группы инструментов MCP (тегирование)
# ---------------------------------------------------------------------------
tool_groups:
  vision:
    description: "Анализ чертежей, Vision Cascade"
    tools: ["vision_analyze", "vision_tile"]
    agents: ["pto"]

  smeta:
    description: "Расценки, индексы, сметы"
    tools: ["smeta_query", "smeta_rate_lookup", "index_lookup"]
    agents: ["smeta", "procurement"]

  legal:
    description: "Поиск по ФЗ, юридическая база"
    tools: ["legal_search", "fz_lookup"]
    agents: ["legal"]

  rag:
    description: "Векторный поиск по базам знаний"
    tools: ["rag_query"]
    agents: ["legal"]

  graph:
    description: "Запись/чтение Neo4j"
    tools: ["graph_query", "graph_write"]
    agents: ["pm", "pto", "smeta", "legal", "procurement", "archive"]

  artifact:
    description: "Управление файлами и версиями"
    tools: ["artifact_list", "artifact_write", "artifact_version"]
    agents: ["pm", "archive"]

  task:
    description: "Диспетчеризация задач"
    tools: ["task_dispatch", "notify"]
    agents: ["pm"]
