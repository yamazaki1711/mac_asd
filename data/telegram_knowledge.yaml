  text: 'Интервью начальника ФАУ «Главгосэкспертизы России» Игоря Манылова унесло
    нас мыслями к таким давно позабытым лозунгам как борьба с излишествами в проектировании
    и строительстве, а также прочим запрещениям.


    Но мы тут задумались не только о роли заказчиков и проектировщиков… в общем, хотелось
    бы добавить, что наверное борьба за экономию должна начинаться с себя, иначе какая
    это экономия? Тем более столько цифры уже навнедряли.


    Посему предлагаем взглянуть на нормативы стоимости оплаты за экспертизу проектов
    и смет, утвержденные приказом Народного комиссариата Связи СССР от 03.10.1940
    №746.


    P.S: В общем, есть куда стремиться. И заметьте, это без тендерного снижения.'
