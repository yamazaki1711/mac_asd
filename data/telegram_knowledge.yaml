  text: "В одной из дружественных групп обсудили с коллегами: \nкак называется специалист,\
    \ разрабатывающий ПОС?\n\nНемного поиронизировали по этому поводу.\nКто-то говорит\
    \ «ПОСовик». Кто-то пошутил — «посовик-боровик».\nМне, честно сказать, ещё на\
    \ заре моей карьеры это название не понравилось: у меня ассоциация с «массовик-затейник»\
    \ = «посовик-затейник». Правда, порой так и есть \U0001F92B\nКоллега подтвердил,\
    \ что назвать специалиста «посовик» — это всё равно, что сказать на окулиста «глазник».\n\
    \n«ПОСовец» тоже говорят, но мне кажется неблагозвучным. Ещё пошутили — «посовчанин».\n\
    \nЧто-то из старой школы: инженер-строитель, специализация \"строительное производство\"\
    .\n\nЯ уже далеко не молодой специалист, но у меня в дипломе значилось: Инженер,\
    \ специальность ПГС (специалсит широкого профиля, без лишних уточнений)\n\nВ итоге\
    \ пришли к выводу, что, скорее всего, официально корректнее называть — инженер\
    \ ПОС.\n\nЯ себя идентифицирую как специалист по организации строительства, потому\
    \ что я не только про ПОС, а в целом про организацию строительства, а также эксперт,\
    \ автор и т.д. И, конечно же, предприниматель \U0001F92A\n\nХотя я получала в\
    \ свой адрес критику: раз я называю себя специалистом по организации строительства,\
    \ где же мой опыт работы «на линии». Здесь могу сказать, что не все отработавшие\
    \ «на линии» специалисты хороши в организации строительства так же, как не отработавшие\
    \ — плохи в организации строительства.\n\nНу и на этой то ли весёлой, то ли грустной\
    \ ноте приглашаю вас в свой канал Max.\nПротив ТГ я ничего не имею — буду продолжать\
    \ его вести, и он будет оставаться основной площадкой, но, чтобы не потеряться,\
    \ приглашаю и на мои альтернативные площадки\U0001F447\n\n➡️ПОС ППР Профи в Max\n\
    \n➡️ПОС ППР Профи в Дзен"
