  text: "Самозапрет на кредиты через Госуслуги: что в судебной практике\n\nПрошёл\
    \ год с момента, как заработал механизм самозапрета на получение кредитов через\
    \ Госуслуги. Тогда я писал о том, какие последствия наступают для банков, если\
    \ они выдают кредит при наличии такого запрета. Вот тут тот пост.\n\nСегодня посмотрел,\
    \ что происходит в судебной практике по спорам, в которых кредиты выдавались при\
    \ установленном самозапрете.\n\n\U0001F4C4Что нашёл\n\nПрактики пока немного,\
    \ но кое-что интересное уже есть.\n\n\U0001F4C2В одном из дел ситуация следующая:\n\
    Истец сослалась на то, что 12.08.2025 посредством сервиса \"Госуслуги\" был установлен\
    \ самозапрет на кредиты. Однако 13.08.2025 ей стало известно, что неизвестным\
    \ лицом от её имени был оформлен кредитный договор от 13.08.2025 на сумму 94 934\
    \ рубля. После чего она обратилась в правоохранительные органы с заявлением по\
    \ факту оформления кредита. Считает, что ввиду того, что данный кредит был оформлен\
    \ после того, как она установила самозапрет, кредитный договор является незаключённым\
    \ и не может нести правовых последствий для неё.\n\nИстец отказалась от иска,\
    \ поскольку банк в добровольном порядке аннулировал кредит.\n\n\U0001F517Источник:\
    \ Определение Белгородского районного суда Белгородской области от 09.02.2026\
    \ по делу № 2-168/2026\n\nАналогичная ситуация — в другом деле, где ответчиками\
    \ выступали два банка. Один кредит банк аннулировал добровольно, кредитный договор\
    \ со вторым банком суд признал недействительным ввиду ничтожности (Решение Шацкого\
    \ районного суда Рязанской области от 13.01.2026 по делу № 2-18/2026)\n\n\U0001F4AC\
    Комментарий\n\nОба дела закончились в пользу истцов, но по-разному — где-то банк\
    \ сам аннулировал кредит, не дожидаясь решения, где-то потребовалось признание\
    \ договора недействительным. \n\nПри этом суды в разных делах используют разные\
    \ конструкции: в одних случаях договор признаётся ничтожным, в других — незаключённым\
    \ (тут можно спорить: незаключённость и ничтожность — это разное или одинаковое,\
    \ но не будем).\n\nЕсть ещё несколько дел, в которых наличие самозапрета упоминается,\
    \ однако подробного анализа последствий там нет, суды лаконично констатируют ничтожность\
    \ или незаключённость договора.\n\n\U0001F4A1Отдельный сюжет\n\nЗначительно чаще\
    \ в практике встречается иная ситуация: мошенники убеждают жертву самостоятельно\
    \ снять самозапрет, после чего оформляют кредит уже «законным» способом. \n\n\
    В этих делах начинается отдельный спор с банками об оспаривании кредитного договора\
    \ — и там уже самозапрет роли не играет, поскольку на момент выдачи кредита его\
    \ не существовало.\n\n\U0001F4FDРанее по теме\n▫️Возврат кредитных средств при\
    \ нарушении условия о самозапрете\n\n\U0001F3F7Прочёл в законе"
