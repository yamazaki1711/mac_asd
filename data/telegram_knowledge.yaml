  text: "О чём был пост про Билайн\n\nВ комментариях к посту об уведомлении о повышении\
    \ тарифа справедливо написали, что подобный спор выиграть будет сложно. Моя идея\
    \ с заверениями была воспринята осторожно — хоть никто её радикально и не отмёл\
    \ как очевидно нежизнеспособную.\n\nСтоит объяснить, зачем я вообще написал такой\
    \ пост. Он не о способе надавить на оператора, хотя при желании можно воспользоваться.\
    \ Пост больше о том, как видеть юридические зацепки там, где они совершенно неочевидны.\n\
    \n\U0001F440Важный навык юриста — юридическое зрение\n\nЯ считаю, что одно из\
    \ главных качеств юриста — умение видеть правовую конструкцию в казалось бы обычных\
    \ вещах. Это как рентген, то есть кто-то смотрит на SMS от оператора и видит просто\
    \ уведомление, а юрист видит оферту, условия договора, заверения, сроки — целую\
    \ правовую схему.\n\nПраво нас окружает везде. Каждый день мы заключаем сделки,\
    \ даже не думая об этом: оплатили проезд в транспорте — договор перевозки, купили\
    \ кофе — договор розничной купли-продажи. \n\nВо всём есть юридическая составляющая.\
    \ Особенно в словах. \n\nСпособность увидеть, как фразу, действие или бездействие\
    \ можно разложить на правовые нормы — это то, что помогает выигрывать дела.\n\n\
    \U0001F4A1Как это работает\n\nУ меня это происходит как озарение. Вижу ситуацию,\
    \ и мозг начинает автоматически раскладывать её на правовые элементы. Вспоминаю\
    \ исследование, которое читал. Вспоминаю судебную практику. Постепенно всё собирается\
    \ в единую картину и становится понятно, как это обыграть юридически.\n\nТак регулярно.\
    \ Однажды посмотрел на судебное дело и увидел вывод активов. В другом случае увидел,\
    \ что инвестор — на самом деле контролирующее лицо, хоть никто об этом не подумал.\
    \ Эти озарения помогают защищать доверителей.\n\n\U0001F4CCЗачем тренироваться\
    \ на мелочах\n\nТакие истории как уведомление от Билайна помогают тренировать\
    \ юридическое мышление. Когда тренируешь способность видеть зацепки в обычных\
    \ ситуациях — прокачиваешь её для масштабных дел.\n\nА это залог побед\n\n\U0001F3F7\
    Прочёл в законе"
