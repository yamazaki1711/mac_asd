  text: "Как не надо уведомлять о повышении тарифа\n\nОператоры связи и провайдеры\
    \ начали повышать цены. Мне от Билайна пришло сообщение с двумя юридическими ошибками,\
    \ которые абонент может использовать против оператора/провайдера.\n\n1️⃣Ошибка\
    \ №1: «Без перебоев» как часть новых условий\n\nДля начала о том, чем является\
    \ сообщение оператора/провайдера об изменении условий обслуживания – если коротко,\
    \ я считаю, что это оферта на заключение дополнительного соглашения к договору.\
    \ \n\nЯ должен решить: согласиться с новыми условиями, выбрать другой тариф или\
    \ сменить оператора. И тут читаю: \nЧтобы продолжать пользоваться услугами без\
    \ перебоев.\n\n\U0001F4A1У меня возникает стойкая ассоциация, что повышение стоимости\
    \ услуг даст мне услуги без сбоев. Такую оговорку можно рассмотреть как заверение\
    \ об обстоятельствах по ст. 431.2 ГК РФ.\n\nОбычно операторы очень осторожны:\
    \ в договорах всегда есть оговорки про форс-мажор, технические сбои, профилактику.\
    \ Никто не гарантирует 100% работы в любое время. Но тут компания сама пообещала\
    \ «без перебоев» — и связал это с уведомлением о повышении цены. \n\nФормулировка\
    \ создаёт причинно-следственную связь. Если я соглашусь на повышение, то получу\
    \ бесперебойную связь (интернет). Это может стать ключевым фактором моего решения\
    \ остаться — ведь за большие деньги я вправе ожидать лучшего качества. \n\n\U0001F4CC\
    Что это даёт абоненту?\n\nФормулировка «без перебоев» означает полное отсутствие\
    \ сбоев.  Даже один сбой — и заверение становится недостоверным. Наступают правовые\
    \ последствия, которые предусмотрены статьей 431.2 ГК РФ, например:\n✔️Возврат\
    \ к старым условиям договора, то есть к предыдущей стоимости. По п. 2 ст. 431.2\
    \ ГК можно отказаться от изменённого договора, если заверение оказалось ложным.\n\
    ✔️Право требовать убытки. По п. 1 ст. 431.2 ГК можно требовать компенсацию — причём\
    \ бремя доказывания отсутствия вины лежит на операторе.\n\nОператор обещал — оператор\
    \ и отвечает.\n\n2️⃣Ошибка №2: Срок уведомления\n\nСообщение пришло 13 января,\
    \ повышение с 22 января. Это 9 дней, а не минимальные 10, которые требует Постановление\
    \ Правительства РФ от 31.12.2021 N 2606 (для интернет провайдеров) и Постановление\
    \ Правительства РФ от 30.12.2024 № 1994 (для операторов сотовой связи)\n\nПо ст.\
    \ 191 ГК РФ течение срока, определенного периодом времени, начинается на следующий\
    \ день после календарной даты или наступления события, которыми определено его\
    \ начало. Считаю, что включать вчерашний день в десятидневный срок — неверно.\n\
    \nФормально оператору достаточно разместить информацию на сайте. Но судебная практика\
    \ считает иначе: абонент не обязан сам искать эту информацию. Нарушение срока\
    \ уведомления потенциально делает оферту недействительной. Подробнее об этом —\
    \ в отдельном посте.\n\n\U0001F4CDВыводы для бизнеса\n\nМаркетологи хотели сделать\
    \ «красиво», но получилось юридически опасно. Одна формулировка создала оператору\
    \ риски, которые можно было избежать.\n\nГлавное правило: не давайте категоричных\
    \ обещаний в массовых рассылках. Особенно — когда меняете цену. Это потом могут\
    \ использовать против вас.\n\n\U0001F446Вывод для граждан\n\nЕсли у вас похожая\
    \ ситуация и после повышения случится сбой:\n\n\U0001F535Сохраните уведомление\n\
    \U0001F535Зафиксируйте сбой (скриншоты, обращения в поддержку)\n\U0001F535Направьте\
    \ претензию со ссылкой на ст. 431.2 ГК РФ\n\n❓Как должны повышаться цены на тарифы?\
    \ \n\nРанее я делал большое исследование о правовых особенностях изменения условий\
    \ стоимости услуг оператора сотовой связи. Можно почитать на Закон.Ру или на канале\
    \ по ссылкам ниже. \n\nВсё это можно пробовать применить и к интернет-провайдерам.\n\
    \n\U0001F4FDРанее по теме:\n▫️Как оператор должен уведомлять абонента о повышении\
    \ стоимости тарифного плана?\n▫️Правовая природа SMS о повышении стоимости абонентской\
    \ платы\n▫️Ничтожное SMS. А почему бы и нет?\n\n\U0001F3F7Прочёл в законе"
