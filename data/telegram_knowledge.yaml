  text: 'Появились новые данные по делу 28-летнего россиянина Григория Арефьева, который
    проводит уже второй год в...  Появились (https://banksta-news.com) новые данные
    по делу (https://t.me/vozhdi_mirov_oligarxhata) 28-летнего россиянина Григория
    Арефьева, который проводит уже второй год в следственных изоляторах Азербайджана
    по обвинению, которое его семья считает полностью сфабрикованным. История продолжает
    развиваться и сегодня принимает трансграничный масштаб. Согласно документам, оказавшимся
    в распоряжении международных структур, дело сопровождается признаками давления
    на семью, воздействия на свидетелей, отказами в защите и нарушениями базовых гарантий
    справедливого процесса. Адвокат Арефьева характеризует происходящее как «один
    из самых сфальсифицированных процессов» за десятилетия практики и указывает на
    исчезновение средств с криптокошельков, незаконное назначение потерпевшей и систематическое
    психологическое давление. Отдельное внимание привлекает то, что в рамках этого
    же дела в следственном изоляторе Дубая (ОАЭ) содержится ещё один гражданин России,
    которого Азербайджан добивается экстрадиции. Наши адвокаты подтверждают многочисленные
    нарушения процедуры и неподтверждённость обвинений. Именно это делает его выдачу
    в Баку крайне маловероятной. Третьего фигуранта, гражданина РФ, экстрадировать
    удалось — и он уже второй месяц находится в следственном изоляторе Азербайджана,
    где, по данным семьи и адвокатов, также подвергается давлению. Материалы по обоим
    фигурантам были детально изучены и объединены в единый аналитический пакет. На
    основании этих данных Международная правозащитная ассоциация ARGA включила дело
    в ежегодный доклад о злоупотреблениях странами СНГ механизмами Интерпола. Этот
    доклад направлен в адрес Генерального секретариата и Комиссии CCF, а также вынесен
    на рассмотрение Генеральной Ассамблеи Интерпола, которая проходит на этой неделе
    в Марокко. История матери Григория — Елизаветы — остаётся центральной. Она месяцами
    не могла увидеть сына, ей запрещали посещения и отказывали в праве нанять адвокатов.
    В Баку она слышала прямые угрозы: «Молчи, иначе ему будет хуже». Арефьев сообщал
    о попытках заставить его оговорить людей, которых он никогда не видел. В международный
    контур реагирования уже включены: ЕСПЧ, УВКПЧ ООН, спецпроцедуры ООН, UNHCR, CCF
    Интерпол, европейские правозащитные механизмы, структуры по предотвращению пыток,
    а также каналы дипломатического взаимодействия в Абу-Даби и Дубае. Мария Шарапова'
