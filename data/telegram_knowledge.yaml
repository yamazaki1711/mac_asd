  text: '📌 Как обосновать увеличение сроков строительства в ПОС


    В продолжение статьи Директивные сроки строительства: можно ли просто “задать”
    срок?🏗


    Хочу разобрать на примере, как в ПОС обосновать увеличение продолжительности строительства
    в соответствии с директивными сроками.


    Исходные данные:

    – по нормативам (СНиП) — 27 месяцев;

    – по договору (директивный график заказчика) — 38 месяцев;

    – присутствуют усложняющие факторы строительства.


    📍 Можно ли просто взять срок из договора?

    Короткий ответ — нет.

    Срок из договора сам по себе не является обоснованием для экспертизы.


    📌 Важно понимать:

    юридически значимым считается срок, обоснованный в ПОС, а не нормативный (СНиП)
    и не директивный (из договора).


    📍 Можно ли увеличить срок относительно СНиП?

    Да, можно.

    Но при условии:

    👉 увеличение срока подтверждено расчетами и организационно-технологическими решениями

    СНиП в данном случае — это ориентир, а не жесткое требование.


    📍 Почему нельзя писать “СНиП устарел”?

    Это частая логика, но она не работает в экспертизе.

    Формулировки вроде:

    “усложнились технологии”

    “современные объекты более насыщены инженерией”

    👉 не являются нормативным обоснованием

    Такие аргументы нужно переводить в конкретные факторы, влияющие на срок.


    📍 Как правильно обосновывать увеличение срока

    Основа — это календарный график и логика организации строительства.

    Срок 38 месяцев должен должен быть подтврежден:


    ✔️ 1. Организационно-технологических ограничений

    ограниченность фронта работ

    этапность строительства

    невозможность параллельного выполнения процессов


    ✔️ 2. Принятого ресурсного обеспечения

    • количество рабочих

    • состав техники

    • режим работы

    📌 Важно: ресурсы должны быть реалистичными, а не “максимально возможными”


    ✔️ 3. Технологической последовательности

    зависимость процессов друг от друга

    невозможность опережающих работ

    ограничения по совмещению


    ✔️ 4. Усложняющих факторов строительства

    Именно сюда вы аккуратно “упаковываете” реальную сложность объекта.

    Но не общими словами, а через влияние на график:

    • увеличение продолжительности отдельных процессов

    • разбиение работ на этапы

    • снижение темпов производства


    📍 Как правильно сформулировать в ПОС

    Пример корректной формулировки:

    Продолжительность строительства принята на основании календарного графика производства
    работ, разработанного с учетом организационно-технологической последовательности,
    принятого ресурсного обеспечения и усложняющих факторов строительства

    Расчетная продолжительность строительства составляет 38 месяцев и соответствует
    директивному сроку, установленному заказчиком.


    📍 Ключевой вывод

    👉 Увеличить срок можно

    👉 Но его нужно не заявить, а доказать


    И главный принцип:

    Директивный срок задается заказчиком,

    а ПОС — подтверждает его реализуемость


    Экспертиза принимает увеличенные сроки, когда видит логику, расчет и реалистичный
    подход.


    Если было полезно — поддержите реакцией 👍


    Если есть что дополнить — пишите в комментариях, обсудим 💬


    Напоминаю ➡️ПОС ППР Профи в Max (чтобы не потеряться).'
