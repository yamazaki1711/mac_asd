  text: "‼ \"Доход\" – самое скользкое понятие в договоре \U0001F447\n\n⚡Текст договора\
    \ давно уже не имеет решающего значения в судебной практике. Теперь более весомым,\
    \ чем непосредственный текст договорного условия, является обычай делового оборота,\
    \ сложившийся между сторонами.\n\n\U0001F4DC Согласно условиям агентского договора\
    \ на поиск покупателей, вознаграждение агенту составляет 40% от дохода. Принципал\
    \ агенту не заплатил, настаивая на расчете по принципу \"доходы минус расходы\"\
    . Агент обратился в суд.\n\n\U0001F4CC Формулировка иска\n\n✏ О взыскании долга\
    \ по выплате агентского вознаграждения \n\n\U0001F4CC Позиции судов\n\n⚖ Все три\
    \ инстанции, включая СКЭС ВС РФ, в иске отказали.\n\n\U0001F4B0 Между истцом и\
    \ ответчиком сложилась практика (обычай делового оборота) определения размера\
    \ выплат не от цены заключаемых договоров поставки, а от прибыли, полученной компанией.\n\
    \n✍ При толковании договора должна быть выяснена действительная общая воля сторон\
    \ с учетом цели договора. При этом принимаются во внимание все соответствующие\
    \ обстоятельства, включая предшествующие договору переговоры и переписку, практику,\
    \ установившуюся во взаимных отношениях сторон, обычаи, последующее поведение\
    \ сторон.\n\n\U0001F9EE В рамках предыдущих договоров с клиентами, привлеченными\
    \ истцом в рамках агентского договора на осуществление поиска покупателей на товары\
    \ принципала, агентское вознаграждение рассчитывалось истцом и выплачивалось ответчиком\
    \ в размере 40% от прибыли (доходы минус расходы).\n\n\U0001F4CA Поэтому между\
    \ истцом и ответчиком сложилась практика определения размера выплат не от общей\
    \ цены заключаемых договоров поставки, а от прибыли по сделкам с покупателями\
    \ товара. Прибыль определялась после подписания документов об исполнении договорных\
    \ обязательств, включая пуско-наладочные работы.\n\n\U0001F50D Определение ВС\
    \ РФ от 25.02.2026 г. по делу № А60-40023/2024\nhttps://m.kad.arbitr.ru/Card/cf17cf8d-1d21-4ac8-8403-a0a445aa1139\n\
    \n\U0001F4BC Комментарий юристов \"Реаналитики\": \n\n\U0001F9E9  Еще один пример\
    \ того, что договорные условия нужно определять как можно более детально и прозрачно,\
    \ чтобы хоть немного перестраховаться от появления аргумента о наличии обычая\
    \ делового оборота.\n\n⁉ Как Вы считаете, если договорное условие было более детальным,\
    \ сослались ли бы суды на обычай делового оборота?\n\n\U0001F44D – Да, сослались,\
    \ обычай важнее.\n\U0001F914 – Нет, точные формулировки – надежная защита.\n\n\
    PS: Выводы являются обобщёнными. Для конкретных рекомендаций и решений обратитесь\
    \ в “Реаналитику”\nreanalitika.ru.\n\n#арбитражныйпроцесс, #агентскийдоговор,\
    \ #агент\n@arbitrium_processus\nhttps://t.me/arbitrium_processus"
