  text: "⚖️ Взыскание неустойки с бюджетного учреждения: снизят ли размер по мотиву\
    \ защиты публичного интереса?\n\nРассматривая иск о взыскании с заказчика – муниципального\
    \ бюджетного учреждения основного долга и неустойки за просрочку оплаты по контракту,\
    \ суд посчитал, что применение ключевой ставки Банка России, актуальной на момент\
    \ вынесения решения (20 %), будет чрезмерным.\n\nВ этом случае размер штрафной\
    \ санкции составил бы 47,53 % от стоимости неоплаченных работ (основного долга).\
    \ Взыскание такой суммы, по мнению суда, приведёт к несправедливому обогащению\
    \ подрядчика за счёт учреждения.\n\nСуд, проанализировав практику Верховного Суда\
    \ РФ, пришёл к выводу: исходя из обычаев делового оборота оптимальный размер неустойки\
    \ составляет 20% от суммы основного долга.\n\nТакже он аргументировал снижение\
    \ размера взыскиваемой санкции правовым статусом заказчика. Муниципальное бюджетное\
    \ учреждение, выполняющее социально значимую функцию, в случае взыскания с него\
    \ неустойки в заявленном истцом размере вряд ли сможет полноценно решать уставные\
    \ задачи. Снижение суммы неустойки позволит соблюсти баланс между частными и публичными\
    \ интересами.\n\nВ итоге суд первой инстанции снизил размер неустойки до 20 %\
    \ от размера неоплаченной задолженности по контракту.\n\n\U0001F53BКассация с\
    \ такими выводами не согласилась и отметила: \n\n● правовой статус заказчика не\
    \ является экстраординарным случаем, дающим право снижать размер неустойки ниже\
    \ минимального предела (1/300 ключевой ставки ЦБ РФ).\n● Снизить взыскиваемую\
    \ санкцию по ст. 333 ГК РФ суд может в целях устранения явной её несоразмерности\
    \ последствиям нарушения.\n● Снижение неустойки ниже однократной ставки ЦБ РФ\
    \ допустимо в экстраординарных случаях, когда убытки кредитора компенсируются\
    \ за счёт того, что размер платы за пользование денежными средствами, предусмотренный\
    \ условиями обязательства (заём, кредит, коммерческий кредит), значительно превышает\
    \ обычно взимаемые в подобных обстоятельствах проценты.\n● Доказательствами обоснованности\
    \ размера неустойки могут служить, в частности, данные о среднем размере платы\
    \ по краткосрочным кредитам в месте нахождения кредитора в период нарушения обязательства,\
    \ а также сведения о показателях инфляции за соответствующий период. Произвольно\
    \ снижать неустойку суд не вправе.\n● В данном деле суд не обосновал такое снижение,\
    \ не установил, в чём состоит экстраординарность случая, при котором возможно\
    \ такое снижение.\n\nДело направлено на пересмотр. #неустойка #ключеваяставка\n\
    \nДокумент: Постановление АС Московского округа от 03.04.2026 по Делу № А41-94836/23\n\
    \nИсточник: ЭТП «Фабрикант»"
