  text: 'Казначейство напомнило о сроках принятия решений по остаткам целевых средств


    До 1 мая ГРБС федерального бюджета нужно решить, как поступить с остатками целевых
    средств, которые сложились на 1 января 2026 года. В частности, речь идет о субсидиях
    и грантах:


    ● федеральным бюджетным и автономным учреждениям (кроме субсидий на госзадание);

    ● иным юрлицам на капвложения, капремонт, гособоронзаказ, реализацию нацпроектов
    и т. д.


    Решение надо принять в пределах обязательств, принятых и не оплаченных до текущего
    года. Исключения – это случаи, когда контракты или договоры расторгли либо когда
    деньги перечислили получателю позднее чем за 45 рабочих дней до конца 2025 года.


    До 20 мая ГРБС должны утвердить сведения об операциях с целевыми средствами и
    довести их до учреждений и организаций.


    Документ: Информация Казначейства России от 17.04.2026


    © КонсультантПлюс'
