  text: 'В России не хватает трудовых ресурсов в сфере строительства.


    Об этом 8 апреля сообщил вице-премьер РФ Марат Хуснуллин на коллегии Минстроя
    и комиссии Госсовета по направлению «Инфраструктура для жизни».


    «У нас катастрофически не хватает трудовых ресурсов, поэтому мы должны подняться
    в производительности труда на 22%. Крайне непростая задача. Она за собой повлечет
    и цифровизацию отрасли, внедрение искусственного интеллекта, сокращение инвестиционно-строительного
    цикла, сокращение сроков строительства», — Марат Хуснуллин.'
