  text: '⚪️ Юристы строительной отрасли приняли участие в парусной регате предпринимателей


    13 июля в Москве состоялась парусная регата «В кругу своих», организованная при
    поддержке аппарата Уполномоченного по защите прав предпринимателей в городе Москве
    и ассоциации «Деловое собрание». В мероприятии приняли участие представители бизнес-сообщества,
    органов власти и профессиональных объединений.


    Союз юристов в сфере строительства и ЖКХ выступил в регате двумя командами. Участие
    в спортивном состязании приняли исполнительный директор Союза Константин Лушников
    и директор "Центра юридических бизнес-процессов и компетенций" Ольга Алпатова,
    возглавившие экипажи от профессионального сообщества.


    Мероприятие стало не только площадкой для неформального общения представителей
    отрасли, но и возможностью укрепить командное взаимодействие, отработать навыки
    стратегического мышления и оперативного принятия решений — как на воде, так и
    в профессиональной деятельности.


    Команды Союза показали уверенное выступление, заняв 10 и 11 места среди 25 участников.
    В планах на следующий год — участие в регате с расширенным составом и амбициозной
    задачей войти в число призёров.


    ⚪️ Союз юристов в сфере строительства и ЖКХ'
