  text: "Обязанность по пожарной безопасности для эксплуатирующей организации является\
    \ публичной и не отменяется договором\n\n➡️ Спор возник из-за неисполнения обязанностей\
    \ эксплуатирующей организацией нежилого здания. Истец является собственником помещений\
    \ в этом здании. Ответчик – компания, которая обслуживает здание по решению собственников.\
    \ Надзорный орган провел проверку и выявил нарушение. В вестибюле первого этажа\
    \ отсутствовала система вытяжной противодымной вентиляции. Ответчик не устранил\
    \ нарушение. Истец обратился в суд, чтобы обязать ответчика смонтировать систему.\
    \ Отсутствие вентиляции нарушает право истца на безопасное использование помещений\
    \ и создает угрозу жизни людей.\n\nПозиции сторон и решение суда смотрите в карточках\
    \ ⬆️\n\n⚖️ Кассация отметила:\n\nОбязанность по обеспечению пожарной безопасности\
    \ является публично-правовой и вытекает из императивных норм законодательства.\
    \ Такую обязанность не может отменить решение общего собрания собственников или\
    \ условия гражданско-правового договора. Подобное исключение противоречило бы\
    \ публичным интересам и создавало угрозу жизни и здоровью граждан. \n\nФакт нарушения\
    \ и обязанность ответчика по его устранению были ранее установлены предписанием\
    \ надзорного органа. Законность этого предписания подтвердил суд в другом деле\
    \ с участием тех же лиц. Система вытяжной вентиляции является элементом общего\
    \ имущества, за содержание которого отвечает эксплуатирующая организация.\n\n\
    Реквизиты: постановление Арбитражного суда Московского округа от 17.04.2026 №\
