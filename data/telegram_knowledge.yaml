  text: 'Закупки в сфере перевозок предлагают осуществлять по-новому


    Соответствующий законопроект внесён в Госдуму.


    Он предусматривает переход к единой модели организации регулярных перевозок, основанной
    на регулируемых тарифах и государственном (муниципальном) контракте.


    Проект направлен на отказ от нерегулируемых перевозок и переход к контрактной
    системе по регулируемым тарифам.


    🔹Вводится возможность заключения одного государственного (муниципального) контракта
    по двум и более маршрутам (включение нескольких маршрутов в один объект закупки).


    Для этого нужно будет обосновать цель объединения, транспортно-технологическую
    связанность маршрутов и отсутствие необоснованного ограничения конкуренции.


    🔹Закрепляются обязательные условия контракта: показатели качества и транспортной
    доступности, порядок контроля достижения показателей.


    🔹Вводится обязанность оснащения транспортных средств средствами объективного контроля
    и передачи данных заказчику. Заказчик должен будет размещать в сети Интернет обобщённые
    сведения о соблюдении расписания и выполнении рейсов. Это обеспечит прозрачность
    и доказуемость исполнения.


    🔹Предусматриваются и иные поправки.


    Проект направлен на рассмотрение в профильный комитет Госдумы. #планы


    Документ: Законопроект № 1207549-8


    Источник: ЭТП «Фабрикант»'
