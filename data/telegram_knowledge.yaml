  text: 'Участки в береговой полосе вернут в оборот


    Госдума приняла в третьем чтении закон Росреестра, который меняет порядок передачи
    федеральных земельных участков регионам и муниципалитетам. Параллельно документ
    открывает доступ к участкам в береговой полосе водных объектов.


    Что меняется:


    🔸 Закрытый перечень оснований для отказа в безвозмездной передаче земель регионам
    и муниципалитетам. Под запрет попадают участки в особых экономических зонах, лесные
    участки, особо охраняемые природные территории федерального значения и земли,
    которые по закону могут находиться только в федеральной собственности. Передать
    на иной уровень публичной власти не получится и участки, ранее предоставленные
    в пользование третьим лицам.


    🔸 Решение о передаче федеральных участков в отдельных случаях будет принимать
    правительственная комиссия по развитию жилищного строительства. Случаи и порядок
    определит правительство, а комиссия оценит эффективность использования земли и
    варианты ее вовлечения в оборот.


    🔸 Аукционы по аренде участков в береговой полосе водных объектов общего пользования
    снова возможны. Сейчас такие земли ограничены в обороте, что особенно бьет по
    сельхозмассивам с ручьями внутри. Арендатор обязан соблюдать режим охраны водного
    объекта и обеспечивать свободный доступ к берегу. Покупать такие участки по-прежнему
    будет нельзя.


    Подробнее в новости


    Законопроект № 1058240-8


