  text: "‼ Участие в легализации лишает права ссылки на эстоппель \U0001F447\n\n\U0001F4B8\
    \ Участие в серых схемах, направленных на обход контрагентами 115-ФЗ, может обернуться\
    \ лишением права использовать ссылку на принцип эстоппель.\n\n\U0001F3E0 С целью\
    \ вывода средств с заблокированных по 115-ФЗ счетов компания заключила с ИП несколько\
    \ притворных договоров купли-продажи недвижимости с условиями о внесении обеспечительных\
    \ платежей и одностороннем отказе от договоров. Обязательства исполнены не были,\
    \ а компания решила взыскать с ИП обеспечительный платеж, ИП же заявил о признании\
    \ сделок недействительными.\n\n\U0001F4CC Формулировка иска\n\n✏ О взыскании обеспечительного\
    \ платежа по предварительному \nдоговору купли-продажи недвижимости; о признании\
    \ сделок недействительными\n\n\U0001F4CC Позиции судов\n\n\U0001F535 Первая инстанция\
    \ встала на сторону истца.\n\U0001F534 Апелляция и кассация истцу отказали и признали\
    \ сделки ничтожными.\n⚖ СКЭС ВС РФ отправила дело на новое рассмотрение.\n\n❓\
    \ Что указывало на притворность сделок?\n\n✅ аудиозаписи и материалы уголовного\
    \ дела;\n✅ цель кредитного договора для финансирования по договору не состояла\
    \ в приобретении недвижимости, а заключалась в инвестировании;\n✅ более того,\
    \ свои кредитные обязательства истец не исполнял;\n✅ отсутствие доказательств\
    \ направления предложений по приобретению объектов.\n\n\U0001F4DA Требования истца\
    \ о взыскании обеспечительных платежей является злоупотреблением правом, т.к.\
    \ истец знал о том, что в действительности обязательства из договоров не существуют\
    \ и ответчик передал денежные средства конечному получателю денежных средств (п.\
    \ 1 ст. 10 ГК РФ).\n\n\U0001F4BC Комментарий юристов \"Реаналитики\": \n\n\U0001F9E9\
    \ Учитывая, что истец участвовал в заключении спорных ничтожных сделок, совершенных\
    \ с целью, заведомо направленной на незаконную легализацию денежных средств, он\
    \ не вправе ссылаться на принцип эстоппель.\n\n\U0001F50D Определение ВС РФ от\
    \ 16.10.2025 г. по делу № А40-221875/202\nhttps://m.kad.arbitr.ru/card/43ae72c8-2920-4728-bfb3-8fa79690ddee\n\
    \n⁉ Как Вы считаете, справедливо ли лишать права ссылаться на эстоппель в аналогичных\
    \ ситуациях?\n\n\U0001F44D – Конечно.\n\U0001F914 – Нет.\n\nPS: Выводы являются\
