  text: "В новую ЦИМ со старыми болячками\n\nСергей Драгомиров как всегда грамотно\
    \ разъяснил про юридические тонкости ЦИМ, проектирования, стройконтроля на их\
    \ основе, а также о грядущих спорах из-за существующих коллизий законодательства.\
    \ \n\nХотелось бы добавить, что причин существующих и назревающих проблем несколько.\n\
    \nВо-первых проблемы отчасти из-за термина и определения исполнительной документации,\
    \ под которую подпадает вообще все.\n\nКогда-то была попытка разделения исполнительной\
    \ документации на исполнительную и производственную в мертворожденном СНиП I-2\
    \ и дальше идея не пошла.\n\nПоэтому на каждом крупном объекте обязательно находился\
    \ подрядчик, убеждающий заказчика, что вот рабочка с надписями о соответствии\
    \ выполненных в натуре работ этим чертежам – и есть та самая исполнительная документация,\
    \ а все остальное – журналы, акты, паспорта и прочее – совершенно не нужная избыточная\
    \ макулатура.\n\nА разделить эти две сущности нужно не только для того, чтоб не\
    \ путались, но и потому, что готовится непризнанная производственная документация\
    \ в отличие от корректировки рабочей документации совершенно разными сторонами,\
    \ разными специалистами совершенно разных компетенций по разным процедурам и совершенно\
    \ из разных бюджетов.\n\nВо-вторых, если рассматривать исполнительную документацию\
    \ не как несколько видов, описанных в приказе 344/пр, а как сложную взаимосвязанную\
    \ систему, то придется докопаться до самого конца – до проектирования и ценообразования\
    \ и уже там упереться в отсутствие нормативов затрат на корректировки.\n\nКто\
    \ бы что не говорил, а корректировать все равно нужно, но некому, потому что не\
    \ за что.\n\nИ все метания в нашем законодательстве – про то, как бы не явно переложить\
    \ эту явно безвозмездную функцию на кого-то вполне конкретного.\n\nПерекладывать\
    \ в том числе через мутные термины и определения, где границы между производственной\
    \ документацией и исполнительными чертежами размыты, а значит «все сидит в накладных»,\
    \ которые, как известно – нерезиновые. Ну и заниматься этим будет конечно же тот\
    \ самый отдел с самым нерезиновым функционалом на стройке.\n\nПоэтому тут нет\
    \ разницы бумажное проектирование или ЦИМ. Все упирается в то, кто будет терпеть\
    \ расходы из-за изменений, будь они не ладны, преданы повышенным проверкам и вообще\
    \ анафеме.\n\nИ в-третьих, это хотелки, которые никуда не делись, а с ИМ и ЦИМ\
    \ расцветают с новой силой. \n\nНепонятно, как до этого обходились не писать на\
    \ рабочке даты производства работ, статусы, замечания стройконтроля заказчика\
    \ и другие очень нужные данные из \"производственной документации\", но с ЦИМ\
    \ почему-то или аппетиты постоянно растут, или оно как-то само так получается\
    \ из требований.\n\nПонятно, что мы движемся из документо-ориентированного прошлого\
    \ в светлое датоцентричное цифровое будущее и рано или поздно прямо в 3D будем\
    \ вносить и статусы, и все паспорта, и количество зубов рабочих, и так же подписывать\
    \ всеми ответственными лицами.\n\nНо если сейчас не разделить в законодательстве\
    \ понятие исполнительной документации на две разные сущности – рабочую документацию,\
    \ которая должна корректироваться (она же ЦИМ LOD 400 до LOD 500) и производственная\
    \ документация, часть из которой (исполнительные схемы) нужна только лишь для\
    \ корректировок рабочки, то мы все в очередной раз поимеем увеличение трудоемкости\
    \ ПТО из-за коллизий требований законодательства к ЦИМ, помноженных на финансовые\
    \ ограничения.\n\nА это – есть то самое негативное регулирующее воздействие, только\
    \ не отдельно взятого НПА или стандарта, а всей системы.\n\n#цифра #бюрократия\
    \ #ценообразование #проектирование"
