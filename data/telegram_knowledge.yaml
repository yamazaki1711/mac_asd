  text: "Получил зарплату — и сразу снял. Чем это заканчивается\n\nНа канале уже несколько\
    \ постов об оспаривании выплат работникам при банкротстве компании. Тема интересная,\
    \ поэтому сегодня о том: зачем управляющий вообще начинает оспаривать выплаты\
    \ работникам, что такое сговор и на кого ложится бремя доказывания.\n\n\U0001F4CC\
    Три причины, по которым управляющий оспаривает выплаты сотрудникам\n\nЧтобы понять\
    \ зачем всё это — надо понять логику управляющего. \n\n1️⃣Первая — классический\
    \ вывод активов и сговор с сотрудником. Перед банкротством компания начинает платить\
    \ «нужным» людям. Формально — за работу. Самая популярная схема: сотрудник получает\
    \ деньги на счёт, снимает их и передаёт руководству.\n\nМогу отметить, что лично\
    \ сталкивался с такими схемами, когда занимался оспариванием сделок рухнувших\
    \ банков.\n\n2️⃣Вторая — принцип «лучше работникам, чем кредиторам». Руководство\
    \ рассуждает примерно так: раздадим деньги своим через премии — пусть лучше они\
    \ получат, чем банки и контрагенты.\n\n3️⃣Третья — давление самих кредиторов.\
    \ Им нужны деньги. И управляющий начинает оспаривать всё подряд. \n\n\U0001F4AC\
    Про сговор\n\nЭто, пожалуй, ключевое в подобных спорах. Самый очевидный способ\
    \ его подтвердить — банковская выписка. В ней видно, что работник получил крупную\
    \ сумму и почти сразу снял всё наличными или перевёл третьему лицу, как правило\
    \ — бенефициару.\n\n\U0001F517Примеры из практики:\nПостановление АС Московского\
    \ округа от 06.02.2020 по делу N А40-137960/17; Постановление АС Московского округа\
    \ от 01.04.2024 по делу N А41-81180/2019\n\n➡️Оговорка: в обоих делах сговор в\
    \ итоге доказан не был — но суды подробно описали логику его выявления через выписку.\n\
    \n❓Подтверждает ли сговор то, что работник перешёл на новое место вслед за своим\
    \ руководителем?\n\nПолучил хорошие выплаты перед банкротством, а затем ушёл за\
    \ своим руководителем в другую организацию. Казалось бы — ну точно сговор. Однако\
    \ совсем не обязательно.\n\n⚖️Позиция суда:\nПереход рядового работника с опытом\
    \ работы 15 лет вслед за своим руководителем в другую организацию может быть обусловлен\
    \ наличием у работника положительной репутации \n\U0001F517Источник: Постановление\
    \ АС Восточно-Сибирского округа от 19.04.2021 по делу № А33-18531/2018.\n\nХорошая\
    \ позиция для защиты. Хотя с важной оговоркой: суд говорит о рядовом работнике.\
    \ С топ-менеджментом всё сложнее — в отношении них начинают действовать различные\
    \ презумпции, которые могут переложить бремя доказывания.\n\n\U0001F50EПро бремя\
    \ доказывания\n\nСуды распределяют его по-разному. Позиция в защиту работника\
    \ часто сводится к тому, что он не обязан принимать в расчёт финансовые проблемы\
    \ работодателя и не должен нести убытки от его банкротства.\n\n⚖️Однако есть и\
    \ другой подход \nИменно тот, кто претендует на экстраординарно высокий размер\
    \ оплаты труда и поощрительных выплат, несёт бремя обосновать своё право на них.\
    \ Особенно если речь идёт не о рядовом сотруднике, а о человеке, который предположительно\
    \ влиял на ключевые решения компании.\n⚖️Источник: Постановление АС Западно-Сибирского\
    \ округа от 14.04.2023 по делу N А75-23174/2019\n\nБольшие выплаты при необходимости\
    \ придётся объяснить. И лучше — заранее, а не когда пришла повестка из суда.\n\
    \n\U0001F3F7Прочёл в законе\n\nРезервный канал в MAX"
