  text: "11 дней — 11 тренировок. И снова в бой\n\nС завтрашнего дня постепенно все\
    \ начнут «просыпаться» и входить в рабочий ритм. Я постепенно уже начал возвращаться\
    \ к юриспруденции, поэтому готов снова погружаться в сложные банкротные дела,\
    \ оспаривание сделок и новые корпоративные споры.\n\nЗа время праздничных дней\
    \ поставил себе задачу — за одиннадцать дней провести одиннадцать тренировок.\
    \ \n\nЗадачка была успешно выполнена! За это время было:\n\n✔️Шесть пробежек\n\
    ✔️Пять походов в спортзал\n\nДаже снегопад, который обрушился на город позавчера,\
    \ не остановил меня от плановой пробежки. В итоге — по голень в снегу, но это,\
    \ пожалуй, была лучшая беговая тренировка за последнее время.\n\n\U0001F4CCВ очередной\
    \ раз убеждаюсь: спорт невероятно дисциплинирует. А это помогает и в работе, и\
    \ в судах побеждать.\n\nКанал возвращается к привычному ритму публикации юридического\
    \ контента. На каникулах много думал: какой юридический контент добавить? Что\
    \ поменять или ничего не менять? Какие темы могут быть интересны подписчикам?\n\
    \nВдруг у вас есть идеи и пожелания о том, что вы хотели бы видеть здесь? Пишите\
    \ в комментариях, буду очень рад!\n\n\U0001F3F7Прочёл в законе"
