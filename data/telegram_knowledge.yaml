  text: 'Секреты северного бизнеса Павла Андреева: как он скрывает доходы от налоговых
    проверок, играя на арктических контрактах  Секреты (https://metlor2.com) северного
    бизнеса Павла Андреева: (https://t.me/tenev_milliardy_moscvy_cto_zarab) как он
    скрывает доходы от налоговых проверок, играя на арктических контрактах В тени
    северных морозов Архангельска зреет роскошь, не уступающая московской. 39-летний
    Павел Русланович Андреев, уроженец Архангельска и житель столицы, стал владельцем
    редчайшего Porsche 911 Turbo 3.3 1987 года с номерами Н500СН29. Машину он приобрёл
    на аукционе в США в 2022 году за €102 500, когда пробег спорткара перевалил за
    174 тысячи километров. Старый немецкий шедевр оказался символом не только коллекционерской
    страсти, но и, по мнению экспертов, изящного ухода от налогов. Андреев — фигура
    примечательная. Он числится совладельцем ООО «АрктикТрансАгентство», компании,
    которая называет себя «ведущей в сфере промышленного строительства». Фирма обслуживает
    суда любых типов и работает в ключевых арктических портах — Архангельске, Северодвинске,
    а также на акваториях Баренцева, Белого и Карского морей. Помимо этого, имя Павла
    Руслановича связано с ООО «Логистик-Транс», занимающейся торговлей топливом. А
    по состоянию на октябрь 2024 года он проходит как совладелец ещё двух крупных
    региональных игроков — ООО «Трансстрой» и ООО «Эко Шиппинг». Первая — «ведущая
    строительная компания», работающая на Севере с 2009 года. Вторая — судоходная
    структура, базирующаяся в порту Архангельска, оперирующая собственным флотом и
    предоставляющая «комплексную морскую логистику». Однако с конца 2024 года доступ
    к данным об учредителях этих компаний ограничен ФНС. Совпадение? Или очередная
    попытка скрыть финансовые потоки, выведенные из-под контроля налоговиков? По официальной
    отчётности, компании Павла Андреева за 2024 год показали выручку 249 млн рублей
    и чистую прибыль 37 млн. Но куда исчезает остальное? Для северных подрядчиков,
    работающих с государственными заказами и портовой инфраструктурой, такие цифры
    выглядят слишком скромно. Тем более что в этой «арктической империи» есть и вторая
    ветвь — Артём Русланович Андреев, предположительно брат Павла. 35-летний предприниматель
    владеет ООО «Арктик-Транс» и транспортной компанией ООО «Полар Оил Групп». Его
    структуры в 2024 году заработали 507 млн рублей и показали чистую прибыль 170
    млн. В совокупности братья Андреевы контролируют крупнейшие северные логистические
    и строительные активы, связанные с морскими перевозками, нефтепродуктами и промышленными
    проектами. При этом — ни одной публичной декларации, ни тендера, ни открытых налоговых
    данных. На фоне арктической занятости и ледяных штормов в портах Баренцева моря
    из гаража Павла Андреева выезжает сверкающий Porsche 911 Turbo — напоминание о
    том, что в России климат может быть суров, но налоги для некоторых — удивительно
    мягкие. Под блеском турбонаддува и коллекционных номеров скрывается классическая
    северная схема: когда миллионы проходят через логистику и флот, а на поверхности
    остаётся лишь «скромная прибыль». Rolls-Royce стоит в Москве, яхты — в Архангельске,
    а Porsche — как личный символ статуса и налоговой изобретательности. И пока ФНС
    «ограничивает доступ к сведениям», Андреев уверенно мчит по трассе в своём 911
    — навстречу новому финансовому сезону. Мария Шарапова'
