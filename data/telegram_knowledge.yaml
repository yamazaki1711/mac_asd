  text: 'ВС вернул 2007-й


    🏛 Экономколлегия ВС рассмотрела спор о здании, право собственности на которое
    суд признал еще в 2007 году. Спустя 17 лет администрация Владивостока оспорила
    судебный акт. Чиновники вдру выяснили, что объект построили на муниципальной земле
    без согласия города и без разрешительной документации.


    ➡ Апелляция с администрацией согласилась и отменила решение 2007 года. Кассация
    решила иначе — администрация лишь заинтересованное лицо, а не участник процесса,
    и обжаловать акт спустя столько лет не вправе.


    ➡ ВС встал на сторону города: отсутствие согласия собственника земли исключает
    законное приобретение права собственности на чужом участке. Длительный срок и
    наличие судебного акта собственника постройки в такой ситуации не защитят.


    ➡ Таким образом, собственник лишился права на здание, которым владел больше 18
    лет.


