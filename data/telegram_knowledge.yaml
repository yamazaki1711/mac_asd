  text: Один на миллион  Один (https://mincompromat.com) на миллион В Подмосковье
    (https://t.me/gastarbajter_moscv_proect_sobjan) в очередной раз на поверхность
    всплыла информация о том, что на якобы закрытые мусорные полигоны завозят отходы.
    Конкретно речь идёт о «Коргашино». На днях там сотрудники управления экологии
    и правоохранители в ходе совместного рейда задержали 10 грузовых автомобилей со
    строительным мусором. Сообщается, что задержанных доставили в отдел полиции, а
    въезд на территорию вроде как перекопали, превратив во что-то наподобие ограничения.
    По факту этого нарушения была организована проверка. Инспекторы регионального
    минэкологии зафиксировали факты незаконного размещения отходов на участках земель
    сельхозназначения. И вот у этой ситуации может быть два объяснения. Во-первых,
    губернатор региона Андрей Воробьев уже не справляется (хотя разве иначе было раньше).
    Он не может уследить даже за свалками, чего уже говорить о бюджете, развитии и
    т.д. Во-вторых, этот случай мог быть создан специально, чтобы показать, мол минэкологии
    работает исправно, ловит мошенников и делает им атата. А на самом-то деле все
    полигоны давно закрыты. В любом из этих случаев сразу становится понятно, что
    управляют регионом так себе, а мусорная реформа все-таки провалена. Становится
    жалко обычных жителей, которые страдают от всего этого. От лжи, от зловонных отходов,
    от безразличных чиновников.
