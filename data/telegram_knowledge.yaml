  text: "Когда суды верят в незнание русского языка при оспаривании сделок»\n\nВыше\
    \ рассказывал о трёх делах, где суды не поверили в незнание русского языка при\
    \ оспаривании завещаний и договора дарения. \n​\nСегодня расскажу о двух делах,\
    \ где аргумент «я не знал русского» сработал — сделки признали недействительными.\n\
    \n\U0001F4C2История первая: обман у нотариуса в Дагестане\n\nОспаривался договор\
    \ дарения недвижимости. Истец утверждал, что знакомый заверил его, что у нотариуса\
    \ он подписывает документы об освобождении от уплаты налогов за земельный участок\
    \ – поскольку у него дети с инвалидностью. \n\nВ итоге подписал договор дарения.\
    \ Содержания его не понимал, так как родной язык для него – аварский, русским\
    \ владеет плохо.\n​\nНотариус в суде пояснила, что общение истца и ответчика по\
    \ поводу сделки происходило на аварском языке. Суть их прихода объяснил ответчик.\
    \ Истец заходил, выходил, куда-то торопился, договор не читал, но подписал его.\
    \ Содержание договора нотариус объяснила ему на аварском языке.\n​\nСуд пришёл\
    \ к выводу, что истец подписал договор дарения, не читая его, поскольку не владел\
    \ русским языком. Сделку признали недействительной,\n\n\U0001F517Источник: Апелляционное\
    \ определение СК по гражданским делам Верховного Суда Республики Дагестан от 04\
    \ августа 2023 г. по делу № 33-5461/2023\n\n\U0001F4C2История вторая: пошёл в\
    \ МФЦ переоформить коммуналку — продал участок тестю\n\nСупруга отправила мужа\
    \ в МФЦ — якобы для переоформления документов по коммунальным услугам. Компанию\
    \ составил тесть.\n​\nИтог: муж «продал» земельный участок отцу своей жены. Денег\
    \ за продажу не получил.\n​\nОбратился в суд с иском о признании сделки недействительной.\
    \ Мотивировал: не владеет русским языком и, кроме того, глухонемой.\n​\n⚖️Суд\
    \ иск удовлетворил:\nТо обстоятельство, что в договоре купли-продажи имеются сведения\
    \ о том, что расчет между сторонами произведен полностью до подписания настоящего\
    \ договора, не является доказательством передачи истцу денежных средств по договору,\
    \ поскольку истец не владеет русским языком, кроме того, является глухонемым,\
    \ договор заключался в отсутствие переводчика и сурдопереводчика, соответственно,\
    \ подписывая договор купли-продажи, он не мог понимать значение своих действий\
    \ и руководить ими.\n\U0001F517Источник: Решение Советского районного суда г.\
    \ Липецка Липецкой области от 18 ноября 2024 г. по делу № 2-5170/2024\n\n\U0001F4AC\
    Комментарий\n\nСуд применил статью 177 ГК РФ — о недействительности сделки, совершённой\
    \ лицом, не способным понимать значение своих действий. Считаю, что это спорная\
    \ квалификация.\n​\nНа уровне практики ВС РФ применение статьи 177 ГК РФ не ограничено\
    \ психическими особенностями. Но если следовать логике этого решения, получается,\
    \ что человек, который не слышит, не видит и не владеет русским, по умолчанию\
    \ не осознаёт своих действий при подписании договоров.\n​\nПо такой логике любая\
    \ сделка такого человека может быть оспорена как недействительная.\n\nВывод: оспорить\
    \ сделку по основанию незнания русского языка реально, но только при наличии доказательств\
    \ реального порока воли.\n​\nНедостаточно сказать «не знал». Нужно доказать, что\
    \ не было переводчика, обманули о сути документа, невозможно было воспринять текст.\
    \ Иначе суд найдёт вашу подпись на паспорте или справке о соцвыплатах — и откажет.\n\
    \nP.S. Ссылок на судебные акты нет, так как сайты СОЮ в очередной раз \"прилегли\"\
    (\n\n\U0001F4FDРанее по теме\n▫️Почему суды не верят в незнание русского языка\
    \ при оспаривании сделок»\n\n\U0001F3F7Прочёл в законе"
