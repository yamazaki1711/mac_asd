  text: '‼ Оступившись перед ФТС однажды, льготы можно потерять навсегда 👇


    🔥 Даже уплата штрафа в размере 263 млн ₽ не может смягчить позицию Таможни, решившей
    лишить декларанта льгот из-за нарушения установленных требований.


    ✈ Авиакомпания ввезла на территорию РФ грузовой самолет. Его поместили под процедуру
    временного ввоза, но авиакомпания нарушила процедуру. ФТС начислила авиакомпании
    штраф и отменила освобождение от уплаты таможенных пошлин и налогов. Авиакомпания
    решила это оспорить.


    📌 Формулировка иска


    ✏ О признании недействительным решения Таможни


    📌 Позиции судов


    🔵 Все три инстанции встали на сторону авиакомпании.

    ⚖ СКЭС ВС РФ компании отказала.


    🗺 В ТК ЕАЭС нет положений, освобождающих декларанта при установленном факте нарушения
    процедуры временного ввоза от исполнения обязанности по уплате таможенных платежей,
    обязанность уплаты которых возникает в связи с несоблюдением условий временного
    нахождения и использования товара.


    📚 При этом отсутствие нормативно закрепленного запрета на повторное предоставление
    освобождения от уплаты таможенных платежей не свидетельствует о возможности реализации
    данного механизма.


    💸 При противоположном подходе нарушается принцип недопустимости произвольного
    предоставления таможенных льгот, предусматривающий, что любые льготы должны быть
    прямо предусмотрены законом и не могут предоставляться в отсутствие четко определенных
    правовых оснований.


    💼 Комментарий юристов "Реаналитики":


    🧩 Авиакомпания не сможет рассчитывать на повторное предоставление таможенных льгот.
