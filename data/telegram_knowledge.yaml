  text: "УМ и ДЕНЬГИ\n\nВ комментариях к предыдущему посту развернулась интересная\
    \ беседа на тему \"если ты такой умный, то почему такой бедный?\", а вернее наоборот\
    \ \"почему ты такой богатый, но не выглядишь как академик РАН\"? И мне захотелось\
    \ высказать свои мысли на этот счёт, а именно: я считаю, что ум никак не помогает\
    \ получать большие деньги, а напротив, скорее мешает это делать.\n\nПо моему мнению,\
    \ исходя из моего жизненного опыта, для получения больших денег нужны 4 составляющих\
    \ (не обязательно все сразу, но желательно): \n\n1) Удача. Это то, про что \"\
    забывают\" все коучи и бизнес-тренеры. А меж тем - это основная составляющая финансового\
    \ успеха. В нашей стране жарить шашлык умеют миллионы людей, но лишь один делал\
    \ это на даче у будущего президента, обладал достаточной харизмой, чтобы расположить\
    \ к себе его окружение и достаточной наглостью, чтобы присвоить себе народное\
    \ достояние и попасть в список Форбс. О харизме и наглости чуть ниже. Что же касается\
    \ удачи, то тут у умных и глупых паритет. Повезти может кому угодно.\n\n2) Настойчивость.\
    \ Даже если вас посетила удача, то редко, кому везёт с первого раза. А даже если\
    \ и везёт, то важно не останавливаться и продолжать. Тут глупые люди имеют абсолютное\
    \ преимущество, так как не умеют рефлексировать. Пока умный будет анализировать\
    \ причины своих неудач, глупый будет действовать дальше и с гораздо большей вероятностью\
    \ добьётся результата.\n\n3) Харизма, коммуникативные способности, социальные\
    \ связи. Важное качество, так как если ты не располагаешь к себе людей и не обладаешь\
    \ коммуникативными навыками, тебе просто не доверят много денег. Однако эти качества\
    \ никак не связаны с умственными способностями и, на мой взгляд, больше обусловлены\
    \ устройством психики человека, его генетикой.\n\n4) Наглость. Для получения больших\
    \ денег человек не должен рефлексировать по поводу морально-этических норм, принципов\
    \ и правил. Он должен просто взять то, что ему нужно, силой. Похитить президента\
    \ чужой страны, например. \U0001F601 Тут у глупых, опять же, огромное преимущество.\
    \ Умный будет долго анализировать последствия и опираться на морально-этические\
    \ принципы, а глупый просто пройдёт по головам и сделает то, что ему нужно.\n\n\
    Итого: у глупых и наглых людей чисто статистически гораздо больше шансов получить\
    \ большие деньги. Это не значит, что среди богачей вообще нет умных людей. Есть.\
    \ Но удивляться тому, что владельцы огромных состояний порой совсем не блистают\
    \ умом - довольно странно. Чисто статистически, не особо умных в мире богатых\
    \ гораздо больше.\n\nКстати, я считаю, что именно с этим и связана деградация\
    \ нашего общества. Деньги - это власть и влияние. А когда власть и влияние достаются\
    \ глупым, посредственным людям, иногда и вовсе откровенным дегенератам, и когда\
    \ они начинают устанавливать свои правила для большинства, то всё вокруг и начинает\
    \ деградировать.\n\nПростите, если разбил кому-то розовые очки. Сам в своё время\
    \ был неприятно удивлён. Шнейне, пепе, втфа."
