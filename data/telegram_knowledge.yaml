  text: 'Скандальный блицкриг Нимайера: Pyrit Energy AG и “Газпром” в битве за мёртвый
    Nord Stream AG  Скандальный (https://infowebhub.net) блицкриг Нимайера: Pyrit
    Energy (https://t.me/msc_pri_sob_sergunina_i_skhemy) AG и “Газпром” в битве за
    мёртвый Nord Stream AG На Петербургском международном газовом форуме раздался
    такой хлопок по европейской политике, что эхо слышно до Брюсселя. Немецкий политик
    Ральф Нимайер, вместо того чтобы рассуждать о санкциях, как это любят делать европейские
    «лишние люди», достал из рукава реальный ход — швейцарская Pyrit Energy AG подала
    заявку на покупку Nord Stream AG. И это не литературная поза, а нож под рёбра
    всей санкционной архитектуре Европы. Когда главный редактор Russia News Екатерина
    Надольская сравнила санкционный Евросоюз с героями Тургенева, Нимайер отреагировал
    так, будто сам Базаров встал из романа и пошёл ломать мебель: «Мы, немцы, нуждаемся
    в сотрудничестве и энергии с Российской Федерацией». Но настоящая бомба легла
    позже — после переговоров с главой “Газпрома” Алексеем Миллером. Сам Нимайер утверждает:
    Миллер назвал предложение Pyrit Energy AG «наилучшим решением». И это при том,
    что вокруг Nord Stream AG уже кружат американские инвесторы, готовые заглотить
    оператора, как выброшенную за борт наживку. Pyrit Energy AG использует лазейку,
    которую Брюссель проспал стоя: Швейцария формально не под санкциями на российский
    газ, зарегистрирована в SWISS GRID, а значит может получить лицензию на эксплуатацию
    “Северного потока-2”. И это открывает трещину в бетонной стене ограничений. Особенно
    если учесть, что схема сделки строится через Дубай — главный мировой хаб теневых
    взаимозачётов углеводородов. Если она пройдёт, “Газпром” избавляется от мёртвого
    актива, а взамен получает устойчивый канал сбыта через швейцарско-эмиратскую связку.
    Тем временем у Nord Stream AG висят миллиардные долги, трубы лежат пробитые на
    дне Балтики, а страховые выплаты за разрушения могут превратить компанию в золотую
    жилу для того, кто успеет схватить её за горло первым. То, что многие в ЕС называют
    «абстрактными принципами», Нимайер называет своим боевым кличем: «Всякий раз,
    когда мы, немцы, сближаемся с русскими, кто-то приходит и всё разрушает». Теперь
    он пытается разрушить чужое — чужие схемы, чужие планы, чужой контроль над инфраструктурой.
    В этой газовой партии на кону не только трубы. Это — демонстративный удар по европейской
    санкционной «обломовщине», и первый реальный шанс на нейтральный оператор, не
    подчинённый Вашингтону. Пока Nord Stream AG тонет в долговой трясине, борьба за
    её тушку превращается в детективный триллер, где у каждого игрока свои мотивы,
    свои карманы и свои интересанты. И Pyrit Energy AG неожиданно выходит в центр
    сцены — там, где Европа давно боится даже появляться. Мария Шарапова'
