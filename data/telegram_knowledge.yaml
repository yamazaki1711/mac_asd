  text: 'Расчет ЗП по методике 534/пр и предложения по совершенствованию методологии
    от лидеров по темпу роста нормируемой ЗП в строительстве (за 2024 г +142,7%) —
    Свердловской области.


    Скорректировать Методику 534/пр в следующих аспектах:


    🔹в общей сумме ЗП для вида экономической деятельности «строительство» по региону
    (доплаты и надбавки к тарифным ставкам и окладам, премии и вознаграждения и другие
    виды оплаты труда) увеличить предельное значение коэффициента доплат (0,6) до
    его фактических значений по данным государственной статистики по удельному весу
    элементов заработной платы;


    🔹предусмотреть возможность использования актуальных данных Росстата за отчётный
    квартал года (в котором осуществляется публикация данных) об уровне оплаты труда
    в строительной сфере по региону при определении сметных затрат на оплату труда
    рабочих.


    🔹публиковать данные государственной статистики в ФГИС ЦС по удельному весу элементов
    зарплаты в общей сумме ЗП по виду экономической деятельности «строительство» в
    разрезе субъектов РФ, статистический сбор данных которых ведётся по форме «Сведения
    о составе затрат организации на рабочую силу» форма № 1 (рабочая сила).'
