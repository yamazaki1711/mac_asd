  text: "Когда шансы в деле 50 на 50 — что делать?\n\nВ продолжение недавнего стрима\
    \ о судебных лайфхаках — новое видео.\n\nТак вышло, что оно было записано ещё\
    \ до стрима. Вот так удивительно совпало.\n\nВ видео рассказываю о семи приёмах,\
    \ которые реально помогают в судебном процессе. Актуально, когда шансы 50 на 50,\
    \ то есть когда доказательства и закон можно трактовать в пользу любой из сторон.\n\
    \nА ещё, я рассказал про свидетелей в арбитражном процессе: как с ними работать\
    \ и как добиться того, чтобы суд удовлетворил ходатайство об их вызове.\n\nПолучилось\
    \ по делу, с конкретными примерами. \n\nВидео доступно на всех площадках. Выбирайте\
    \ ту, что удобна вам.\n\n\U0001F4FCYouTube: https://youtu.be/Q11XiXHQRcw\n\n\U0001F46E\
