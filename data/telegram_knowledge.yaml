  text: "Руководитель Главгосэкспертизы России Игорь Манылов:\nПотери в строительстве\
    \ на стадиях от принятия инвестиционного решения до сдачи объекта достигают десятков\
    \ процентов.\nУсловные потери как разница в стоимости от стадии принятия инвестиционного\
    \ решения до сдачи проекта порой бывают серьезные. Иногда это десятки процентов.\
    \ \n\nБюджетные условия 2026 года и всей трехлетки являются необычными и тяжелыми.\n\
    Сегодня в условиях жесткого дефицита нужно искать деньги внутри процессов, повышать\
    \ эффективность, находить способы их доставать, когда их нет где-то в мешке. Если\
    \ научиться \"доставать\" эти потери и направлять средства на реализацию новых\
    \ проектов, то можно достичь положительного эффекта. При этом необходимо всерьез\
    \ заниматься усилением  заказчика строительства и укреплением его роли на всем\
    \ протяжении жизненного цикла объекта. В том числе для этого мы создаем для заказчиков\
    \ цифровые инструменты и сервисы. Например, предлагаем активнее использовать такой\
    \ цифровой продукт, как «Витрина проектов», которая постоянно развивается, наполняется\
    \ дополнительным функционалом и данными.\n\nДа кто ж против то. Давайте для начала\
    \ начнем с достоверности сметной стоимости и кто за что отвечает. Про «Витрину»\
    \ кажется Счетная палата уже все растолковала."
