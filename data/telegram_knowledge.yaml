    \n«Запросы от ФНС через маркетплейсы: к чему готовиться продавцам»\n\nФНС получает\
    \ данные о продавцах автоматически: в течение двух дней с момента доступа к платформе.\
    \ Алгоритм ищет признаки дробления - и муж с женой, управляющие кабинетами с одного\
    \ ноутбука, попадают в выборку наравне со схемами.\n\nЛичный кабинет на маркетплейсе\
    \ - это юридический адрес для налогового органа. Не витрина, не рекламный инструмент.\
    \ Человек, который за него отвечает, должен быть в одной команде с бухгалтером\
    \ и юристом. \n\nГосударство ввело еще один инструмент контроля."
