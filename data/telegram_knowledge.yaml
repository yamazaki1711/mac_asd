  text: 'ПРОГОСЗАКАЗ.РФ (VK)


    ⚖️ Неверно выбранный заказчиком код ОКПД2 привел к нарушению со стороны оператора
    электронной площадки


    Участник обжаловал действия оператора электронной площадки. По его мнению, оператор
    не обеспечил надежность функционирования программно-аппаратных средств, используемых
    при проведении закупки, в связи с чем при подаче заявки на участие у участника
    отсутствовала возможность указать номер реестровой записи из РРПП, что привело
    к отклонению заявки.


    Представитель оператора электронной площадки не согласился с доводом участника
    и сообщил, что на момент подачи заявки программно-аппаратный комплекс оператора
    электронной площадки работал в штатном режиме, сбоев не зафиксировано, информация
    указана в соответствии со сформированным заказчиком извещением в ЕИС.


    Комиссия ФАС России указала, что заказчиком в извещении установлен запрет на допуск
    товаров, работ, услуг, происходящих из иностранных государств, в соответствии
    с положениями Постановления № 1875. В то же время при заполнении заявки на участие
    в закупке у участника отсутствовала возможность указать номер реестровой записи
    из РРПП.


    Антимонопольный орган отметил, что оператор электронной площадки обязан обеспечить
    участникам закупки возможность указать номер реестровой записи из РРПП и признал
    в действиях оператора нарушения Закона № 44-ФЗ.


    В связи с неверным выбором кода ОКПД2 санкции за нарушения Закона № 44-ФЗ были
    наложены и на заказчика.

    Не согласившись с решением ФАС России, заказчик обратился в суд.


    🔻Правовая оценка суда:


    Согласно извещению, предметом закупки является выполнение работ по обновлению
    программного обеспечения оборудования для подсистемы мониторинга параметров транспортного
    потока на автомобильных дорогах общего пользования регионального значения.


    На указанные работы распространяется запрет, предусмотренный пунктом 1 Постановления
    № 1875 (позиция № 146 приложения № 1 к Постановлению № 1875). Данной позиции соответствуют
    коды ОКПД2 58.2, 61, 62, 63, 64. При этом в извещении заказчиком указан код ОКПД2
    42.11.20.300 «Работы по содержанию автомобильных дорог».

    Неверный выбор кода ОКПД2 при описании объекта закупки искажает суть требуемых
    услуг (в данном случае – подмена понятий «работы по содержанию автомобильных дорог»
    и «выполнение работ по обновлению программного обеспечения оборудования для подсистемы
    мониторинга параметров транспортного потока на автомобильных дорогах общего пользования
    регионального значения»), вводит участников в заблуждение и необоснованно ограничивает
    круг потенциальных поставщиков, подрядчиков, исполнителей, которые ориентируются
    на корректный код для поиска процедуры закупки. Код должен выбираться исходя из
    точного и достоверного описания объекта, а при отсутствии идеального соответствия
    – выбираться максимально релевантный специфике закупаемого.


    Таким образом, комиссия ФАС России пришла к обоснованному выводу, что действия
    оператора электронной площадки нарушают часть 13 статьи 24.1 Закона № 44-ФЗ, а
    действия заказчика нарушают положения пункта 5 части 1 статьи 42 Закона № 44-ФЗ.


    Пояснения: Код ОКПД2 42.11.20.300, указанный заказчиком в извещении, отсутствует
    в приложении № 1 к Постановлению № 1875. По всей видимости, программно-аппаратный
    комплекс оператора электронной площадки, на сайте которого осуществлялась закупка,
    дает возможность указать номер из РРПП при подаче заявки только при соответствии
    кода ОКПД2 приложению 1 или 2 к Постановлению № 1875, но не интегрируется напрямую
    из извещения. Это и повлекло за собой признание нарушения со стороны оператора.


    📄 Решение АС г. Москвы от 26.03.2026 г. по делу № А40-266017/2025'
