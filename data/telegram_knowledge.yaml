  text: '📉Антикризисные послабления в строительстве окончательно отменили


    Постановлением Правительства РФ от 28.04.2026 № 479 отменили ранее действовавшие
    антикризисные меры для стройотрасли.

    Речь идет о Постановлении Правительства № 579 от 04.04.2022 и Постановлении Правительства
    № 680 от 16.04.2022.


    ➡️ПП № 579 позволяло в упрощенном порядке вносить изменения в проектную документацию
    и результаты инженерных изысканий, например, при замене строительных ресурсов
    на аналоги, а также устанавливало особенности проведения экспертизы.


    ➡️ПП № 680 давало возможность менять существенные условия госконтрактов в строительстве
    — в том числе из-за роста цен и других факторов.


