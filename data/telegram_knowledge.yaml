  text: "Экспертная консультация по спорам с банками  \n\nВчера провел консультацию\
    \ для директора ООО. История клиента следующая:  \n\n1,5 года назад банки последовательно\
    \ заблокировали все счета компании. Часть из них закрыли, часть оставили в замороженном\
    \ состоянии. Клиент обратился в юридическую фирму: подготовили претензию, затем\
    \ подали иск. Судебный процесс с банком длился 7 месяцев (срок, к слову, небольшой),\
    \ но дело было проиграно.  \n\nСтал анализировать ситуацию. Оказалось, у компании\
    \ было две отметки в «черном списке» ЦБ (на основании отказов в проведении операций).\
    \ Банк, ссылаясь на это, расторг договор. Юристы пытались доказать незаконность\
    \ расторжения, но суд подтвердил правомерность действий банка — нарушений с его\
    \ стороны не было.  \n\nИтог: 1,5 года потеряны. Причина — неверный алгоритм действий.\
    \ Вместо суда с банком нужно было устранить черные метки.\n\nНа консультации я\
    \ отметил: если бы ко мне обратились сразу, удалось бы избежать ошибок. Директор\
    \ ответил, что не знал о возможности такой экспертной помощи.  \n\nПризнаю: ранее\
    \ недостаточно освещал эту услугу. Исправляюсь.  \n\nЕсли у вас заблокированы\
    \ счета, возникли споры с банком или иные сложности — запишитесь ко мне на консультацию.\
    \ Вместе:  \n- Разберем ситуацию до мелочей;  \n- Выявим слабые места и риски;\
    \  \n- Составим четкий план действий.  \n\nДаже если вы решите действовать самостоятельно\
    \ или с другим юристом, понимание правильной стратегии сэкономит вам время и ресурсы.\
    \  \n\nЗаписаться: @eshupikov."
