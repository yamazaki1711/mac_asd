  text: "ИНФОГАЗЕЛЬ ДОПРЫГАЛАСЬ\n\nКредитный брокер и «специалист по инвестициям в\
    \ недвижимость» Елизавета Мерзлякова, которая на поверку оказалась обычной инфоцыганкой,\
    \ запомнилась тем, что настолько испугалась встречи с нами, что буквально перепрыгнула\
    \ диван в ресторане и убежала. Собственно, за это и была прозвана Инфогазелью.\
    \ Теперь, как говорится, допрыгалась: Елизавета задержана полицией, и ей предъявлено\
    \ обвинение в мошенничестве.\n\nОколо года Елизавета Мерзлякова собирала с несчастных\
    \ жертв денежные средства на якобы какие-то займы под огромные проценты, а сама\
    \ жила на широкую ногу. Но сказка закончилась довольно быстро, и теперь Елизавете\
    \ грозит до 10 лет лишения свободы. Теперь вместо роскошной жизни будет вязать\
    \ варежки. Не очень понимаю, о чём думают все эти люди, когда решают, что обманывать\
    \ людей - это быстрый и эффективный способ заработка. Все такие истории обычно\
    \ заканчиваются одинаково.\n\nЮридическая компания «Ярдрей» завершила победой\
