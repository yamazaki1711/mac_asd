  text: '⚖️ Суд увидел дробление госзакупки в двух контрактах с единственным поставщиком
    на услуги охраны школы


    Школа заключила 2 контракта на услуги охраны по правилам малых закупок у единственного
    поставщика. Один в январе – на первую половину года, другой в июле – на вторую
    половину. Услуги приняли и оплатили на общую сумму более 1 млн руб.


    Прокуратура выявила признаки искусственного дробления закупки и потребовала признать
    контракты недействительными.


    Суды удовлетворили иск и обязали исполнителя вернуть оплату. Дробление единой
    услуги по двум периодам в течение одного финансового года в условиях, когда заказчик
    нуждался в охране школы на весь период, говорит о тождественности предмета контрактов
    и об искусственности дробления с целью ухода от конкурентных процедур. #дроблениезакупок


    Документ: Постановление АС Северо-Кавказского округа от 07.04.2026 по делу N А32-69092/2024


