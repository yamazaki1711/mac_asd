  text: "В ГОСТЯХ У КАНАЛА «СТРОЙХЛАМ» \n\nВышел подкаст с мои участием на канале\
    \ Сергея Петруши «СтройХлам». Получилось скорее не интервью, а откровенный разговор.\
    \ В выпуске я рассказываю о своём опыте переезда из квартиры в загородный дом,\
    \ о том, как меняется жизнь за городом и почему, пожив в доме на постоянной основе,\
    \ начинаешь по-другому смотреть на жизнь в квартире.\n\nТакже поговорили о разнице\
    \ между арендными и собственными домами, о проблемах качества жилья и земельных\
    \ участков, о работе риэлторов и о том, почему в ряде случаев их участие действительно\
    \ может сильно упростить жизнь. Не обошли стороной и профессиональные темы: «дело\
