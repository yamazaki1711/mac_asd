  text: "‼ Что имеет большую силу – показания свидетелей или акт сдачи? \U0001F447\
    \n\n\U0001F5DD Нельзя заставлять арендатора, фактически освободившего помещение,\
    \ платить за аренду, если из доказательств у него – только свидетельские показания,\
    \ а не акт сдачи.\n\n\U0001F4ED Договор содержал условие об обязательном письменном\
    \ уведомлении контрагента при одностороннем расторжении договора аренды. Арендатор\
    \ освободил помещение и оставил в нем акт, подписанный только со своей стороны.\
    \ Но арендодатель счел, что порядок одностороннего расторжения договора соблюдён\
    \ не был и продолжил начислять арендную плату.\n\n\U0001F4CC Формулировка иска\n\
    \n✏ О взыскании задолженности по арендной плате\n\n\U0001F4CC Позиции судов \n\
    \n\U0001F535 Все три инстанции иск удовлетворили.\n⚖ СКЭС ВС РФ отправила дело\
    \ на новое рассмотрение.\n\n\U0001F4DC Неисполнение сторонами обязанности по составлению\
    \ акта возврата арендуемого имущества, предусмотренной п. 2 ст. 655 ГК РФ, не\
    \ свидетельствует о невозможности арендатора иными доказательствами подтверждать\
    \ фактическое освобождение арендуемого помещения (п. 31 Обзора судебной практики\
    \ ВС РФ № 2 от 22.07.2020 г.)\n\n✍ Для констатации факта прекращения обязанности\
    \ арендатора вносить арендную плату по договору аренды должны быть установлены\
    \ следующие обстоятельства: \n\n✅ прекращение договора аренды (вследствие истечения\
    \ срока договора, одностороннего отказа от договора и т.д.);\n✅ возвращение арендатором\
    \ арендуемого имущества арендодателю.\n\n❓ А если помещение возвращено в неудовлетворительном\
    \ состоянии?\n\n\U0001F3DA Ненадлежащее состояние возвращенного помещения не свидетельствует\
    \ о сохранении у арендатора обязанности по внесению арендной платы, но является\
    \ основанием для возмещения убытков,\n\n\U0001F4BC Комментарий юристов \"Реаналитики\"\
    :\n\n\U0001F9E9 ВС РФ свел на нет разницу в силе двух основных доказательств –\
    \ свидетельских показаний и актов сдачи.\n\n\U0001F50D Определение ВС РФ от 03.04.2026\
    \ г. по делу № А49-2792/2023\nhttps://m.kad.arbitr.ru/Card/e313d008-053c-41ff-abed-3fcd9dff6221\n\
    \n⁉ Как Вы думаете, пойдет ли данный кейс на пользу бизнесу?\n\n\U0001F44D – Да,\
    \ многие арендаторы смогут защитить свои права.\n\U0001F914 – Нет.\n\nPS: Выводы\
    \ являются обобщёнными. Для конкретных рекомендаций и решений обратитесь в “Реаналитику”\n\
    reanalitika.ru.\n\n#арбитражныйпроцесс, #аренда, #договор, #расторжение\n@arbitrium_processus\n\
    https://t.me/arbitrium_processus"
