  text: "‼ Легализация Атлантиды, или отсутствие дедлайнов для извлечения отходов\
    \ из воды \U0001F447\n\n\U0001F30A ВС РФ не стал учитывать длительность нахождения\
    \ затонувшего судна под водой при исчислении суммы возмещения вреда. \n\n\U0001F6F3\
    \ В водохранилище затонула баржа с каменным углем. Компания (собственник судна)\
    \ вытащила его со дна спустя два месяца. Росприроднадзор рассчитал сумму возмещения\
    \ вреда как за сброс крупногабаритных отходов (судна и угля). \n\n\U0001F4CC Формулировка\
    \ иска\n\n✏ О взыскании средств в счет возмещения вреда, причиненного водному\
    \ объекту\n\n\U0001F4CC Позиции судов\n\n\U0001F535 Три инстанции решили, что\
    \ за сброс судна компании платить не нужно, она возместит вред только за сброс\
    \ угля.\n⚖ СКЭС ВС РФ отправила дело на новое рассмотрение.\n\n♻ Если собственник\
    \ в разумный срок не исполнил обязанность по подъему затонувшего судна, оно по\
    \ сути стало крупногабаритным отходом производства и потребления, то применяется\
    \ специальная формула.\n\n\U0001F449 Но при этом при расчете вреда по данной формуле\
    \ не предусмотрено применение коэффициента, учитывающего длительность нахождения\
    \ объекта в воде.\n\n\U0001F4CA Суд не должен ограничиваться формальной констатацией\
    \ наличия состава правонарушения и не может не учитывать последующей динамики\
    \ правоотношений, оказывающей влияние на их существо, в частности исключающей\
    \ (или существенно снижающей) вредоносность имевшего место нарушения норм права.\n\
    \n⛲ Росприроднадзор не представил доказательств того, что пребывание данной баржи\
    \ в воде до ее подъема повлекло наступление негативных последствий для среды,\
    \ в т.ч. загрязнения вод и т.д.\n\n\U0001F4BC Комментарий юристов \"Реаналитики\"\
    : \n\n\U0001F9E9 Дело направлено на новое рассмотрение, т.к. судам еще предстоит\
    \ выяснить, по какой из формул нужно производить оценку возмещения вреда за затонувший\
    \ уголь. Но очевидно, что ВС РФ сделал для компании некоторые послабления, отказавшись\
    \ учитывать сроки нахождения судна под водой.\n\n\U0001F50D Определение ВС РФ\
    \ от 03.02.2026 г. по делу № А19-3121/2024\nhttps://m.kad.arbitr.ru/Card/7d43c543-5402-40b5-ac16-83d4220094b4\n\
    \n⁉ Как Вы думаете, справедлив ли такой подход?\n\n\U0001F44D – Вполне.\n\U0001F914\
    \ – Нет.\n\nPS: Выводы являются обобщёнными. Для конкретных рекомендаций и решений\
    \ обратитесь в “Реаналитику”\nreanalitika.ru.\n\n#арбитражныйпроцесс, #окружающаясреда\n\
    @arbitrium_processus\nhttps://t.me/arbitrium_processus"
