  text: '‼ Идеально выполненные работы – не помеха для неустойки 👇


    🕰 Добросовестное поведение и отсутствие претензий совсем не панацея от договорных
    неустоек, особенно в рамках госконтрактов. Быть "хорошим подрядчиком" – это не
    только про качество, но и про точное соблюдение контрактного законодательства.


    🏗 Подрядчик выполнял для учреждения работы в рамках контракта. Позже стороны заключили
    допсоглашение об увеличении срока выполнения работ на год. В новые сроки подрядчик
    уложился, выполнил работы качественно, у заказчика претензий не было. Но прокурор
    решил, что изменение срока было незаконным и нужно наказать подрядчика неустойкой...


    📌 Формулировка иска


    ✏ О признании ничтожным допсоглашения


    📌 Позиции судов


    🔵 Первая инстанция иск удовлетворила.

    🔴 Апелляция в иске отказала.

    ⚖ Кассация, включая СКЭС ВС РФ, снова согласились с прокурором.


    ❌ Отсутствие претензий к выполненным работам не имеет правового значения для настоящего
    спора, т.к. выполнение работ в полном объеме и отсутствие у заказчика к ним претензий
    по объему, качеству и стоимости, не исключает возможности привлечения подрядчика
    к договорной ответственности в случае нарушения сроков выполнения работ (ч.6 и
    7 ст. 34 Закона № 44-ФЗ).


    📜 При заключении и исполнении контракта изменение его существенных условий не
    допускается, за исключением случаев, предусмотренных законом (ч. 2 ст. 34 Закона
    № 44-ФЗ).


    ⏳ Такие случаи предусмотрены положениями ст.ст. 95 и 112 Закона № 44-ФЗ. Так,
    допускается изменение срока исполнения контракта в случае возникновения независящих
    от сторон контракта обстоятельств, влекущих невозможность его исполнения.


    ✍ Подрядчик при той степени заботливости и осмотрительности, присущей профессиональным
    участникам контрактных правоотношений, должен был надлежащим образом оценить объем,
    характер и сложность выполняемых работ в корреляции с условиями контракта.


    💼 Комментарий юристов "Реаналитики":


    🧩 Можно заметить в данном случае ярко выраженное проявление формализма, присущего
    контрактным правоотношениям.


    🔍 Определение ВС РФ от 06.03.2026 г. по делу № А56-62928/2024

    https://m.kad.arbitr.ru/Card/415c60e7-5169-42cd-bed5-b0a2d81b1586


    ⁉ Как Вы думаете, справедлив ли такой подход?


    👍 – Да.

    🤔 – Нет, это чистый формализм, главное – качество работ.


