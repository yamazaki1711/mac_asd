  text: "‼ Уйти от уплаты убытков, уничтожив...акт, на основании которого они взысканы\
    \ \U0001F447\n\n\U0001F525 Иными словами, для этого нужно стать административным\
    \ истцом. ВС РФ дал толчок для работы такого нестандартного механизма, несмотря\
    \ на сопротивление нижестоящих судов.\n\n\U0001F6A7 Компания проводила ремонтные\
    \ работы, что повлекло простой электротранспорта предприятия (МУП). МУП, опираясь\
    \ на условия распоряжения администрации, взыскало с нее убытки. Но вскоре распоряжение\
    \ было признано недействительным, и компания обратилась за пересмотром дела.\n\
    \n\U0001F4CC Формулировка иска\n\n✏ О взыскании убытков\n\n\U0001F4CC Позиции\
    \ судов\n\n\U0001F534 Все три инстанции отказали в пересмотре.\n⚖ СКЭС ВС РФ отправила\
    \ дело на новое рассмотрение.\n\n\U0001F4DC Если административный истец добился\
    \ признания нормативного правового акта недействующим, то его не следует применять\
    \ при рассмотрении спора, вне зависимости от того, с какого момента этот правовой\
    \ акт признан недействующим (постановления КС РФ от 06.07.2018 г. № 29-П и от\
    \ 11.01.2019 г. № 2-П).\n\n\U0001F449 Данная правовая позиция основана на том,\
    \ что лицо, обратившееся с административным иском, отстоявшее свою позицию, понесшее\
    \ затраты, имеет разумные основания ожидать, что решение об удовлетворении его\
    \ требования будет способствовать дальнейшей защите его прав.\n\n\U0001F4BC Комментарий\
    \ юристов \"Реаналитики\": \n\n\U0001F9E9 Компания прошла непростой путь, чтобы\
    \ избавиться от необходимости выплачивать убытки, но суды не хотели пересматривать\
    \ дело по новым обстоятельствам. Данным определением ВС РФ вселил бизнесу надежду,\
    \ что усилия небесполезны.\n\n\U0001F50D Определение ВС РФ от 16.01.2026 г. по\
    \ делу № А57-7537/2022\nhttps://m.kad.arbitr.ru/Card/6711c666-d8f5-4513-b4ee-7c17fa6aeb34\n\
    \n⁉ Как Вы думаете, поможет ли данный кейс бизнесу, оказавшемуся в аналогичных\
    \ ситуациях?\n\n\U0001F44D – Вполне.\n\U0001F914 – Нет.\n\nPS: Выводы являются\
    \ обобщёнными. Для конкретных рекомендаций и решений обратитесь в “Реаналитику”\n\
    reanalitika.ru.\n\n#арбитражныйпроцесс, #ксрф, #акт\n@arbitrium_processus\nhttps://t.me/arbitrium_processus"
