  text: 'ПРОГОСЗАКАЗ.РФ (VK)


    ⚖️ Попытка поставить иностранный товар обернулась для поставщика включением в
    РНП


    Заказчик установил в извещении ограничение и продекларировал отсутствие в РРПП
    товара с характеристиками, соответствующими потребностям заказчика. Победитель
    предложил к поставке товар из России, а две заявки конкурентов были отклонены
    в связи с применением ограничительного правила «второй лишний».


    В ходе исполнения контракта поставщик разместил в ЕИС документы о поставке оборудования
    по контракту, а именно насоса мембранно-поршневого и насоса мембранного, с указанием
    страны происхождения товара – Российская Федерация.


    Заказчик отказал в приемке по следующим основаниям:

    • по позиции 1 указано: «Страна происхождения товара (производитель изделия Comet,
    Италия) не соответствует спецификации к контракту»;

    • по позиции 2: «Страна происхождения товара (производитель изделия YONGJIA AO
    CHENG, Китай) не соответствует спецификации к контракту».


    В ответ на претензию поставщик направил письмо, в котором указал, что на территории
    Российской Федерации товар с указанными в извещении характеристиками не производится,
    поэтому им поставлен товар иностранного производства. Кроме того, было предложено
    расторгнуть контракт по соглашению сторон.


    Затем поставщик повторно разместил документ о приемке в ЕИС, а заказчик повторно
    отказал поставщику в приемке и пригрозил односторонним расторжением контракта.


    Однако поставщик решил действовать на опережение и сам расторг контракт в одностороннем
    порядке, мотивируя это тем, что заказчик дважды отказал в приемке товара.


    Но такой остроумный ход не спас поставщика от включения в РНП. Попытка обжаловать
    решение контрольного органа в суде также не увенчалась успехом.


    🔻Правовая оценка суда:


    В извещении о закупке было установлено ограничение в части страны происхождения
    товара, а также задекларировано отсутствие в РРПП товара с характеристиками, соответствующими
    потребностям заказчика, с приложением копий уведомлений в Минпромторг.


    Заявка поставщика содержала в отношении предложенного к поставке товара указание
    на страну происхождения такого товара – «Российская Федерация».


    При подведении итогов определения поставщика было применено ограничение, заявки,
    содержащие предложения о поставке товара иностранного происхождения, были отклонены.
    Предприниматель был признан победителем закупки в связи с предложением товаров
    российского производства, контракт заключен на поставку товаров именно российского
    происхождения с учетом требований национального режима.


    Отсутствие товара в РРПП не является свидетельством отсутствия оборота такового
    на территории Российской Федерации. Поставщик проигнорировал положения законодательства
    о контрактной системе как на стадии участия в аукционе, заявив о возможности поставки
    товара российского происхождения без намерения (иное не доказано) впоследствии
    осуществить такую поставку, так и на стадии исполнения контракта, поставив заказчику
    товар иностранного происхождения, что противоречило существенному условию контракта.


    Указанное очевидным образом свидетельствует о недобросовестном поведении поставщика,
    в связи с чем включение антимонопольным органом сведений о нем в реестр недобросовестных
    поставщиков арбитражным судом сочтено соразмерным.


    📄 Решение АС Омской области от 09.04.2026 по делу № А46-1252/2026'
