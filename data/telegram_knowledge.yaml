  text: "С 1 марта 2026 года синхронизируются положения приказа Минстроя России от\
    \ 16.05.2023 г. № 344/пр и Постановления Правительства от 17.05.2024 г. N 614\n\
    \nС 1 марта п. 5 Порядка ведения исполнительной документации при строительстве,\
    \ реконструкции, капитальном ремонте ОКС, утв. приказом Минстроя России от 16.05.2023\
    \ г. № 344/пр. (ред. Приказа Минстроя России от 23.06.2025 № 369/пр) дополняется\
    \ форматами для ЦИМ/ИЦММ.\n\nВ случае, если на официальном сайте Минстроя России\
    \ в сети Интернет отсутствует xml-схема, подлежащая использованию для формирования\
    \ ИД в форме электронных документов, ИД в форме электронных документов представляется\
    \ в следующих форматах:\nа) doc, docx, odt - для документов с текстовым содержанием,\
    \ не включающим формулы;\nб) pdf - для документов с текстовым содержанием, в т.ч.\
    \ включающих формулы и (или) графические изображения, а также документов с графическим\
    \ содержанием.\n\nВ тех случаях, когда ИД включается в ИМ ОКС, ее графическая\
    \ часть дополняется ЦИМ в формате IFC или ином формат данных с открытой спецификацией.\
    \ Т.е. речь идет о дополнение графической части ИД, представляемой в форматах\
    \ указанных в п.п. «б» п.5 344/пр (PDF) еще и ЦИМ (IFC или ином), не взамен, не\
    \ путайте, с учетом условия взаимосвязи между ними, определяемой условиями договора.\n\
    \nОтметим, что в отличии от ЦИМ, согласно п.п. «в» п. 3 Состава СДМ, включаемых\
    \ в ИМ ОКС, утв. ПП РФ от 17.05.2024 г. N 614, ИЦММ не дополняет графическую часть\
    \ исполнительной документации.\n\nУказанные положения из п.п. «г» п. 5 Порядка\
    \ ведения исполнительной документации при строительстве, реконструкции, капитальном\
    \ ремонте ОКС, утв. Приказом Минстроя России от 16.05.2023 г. № 344/пр, не соответствует\
    \ акту более высокой юридической силы - ПП РФ от 17.05.2024 г. N 614.\n\nСогласно\
    \ ч. 7 ст. 3 Федерального закона от 31.07.2020 N 247-ФЗ «Об обязательных требованиях\
    \ в РФ», в случае действия противоречащих друг другу обязательных требований в\
    \ отношении одного и того же объекта и предмета регулирования, установленных НПА\
    \ разной юридической силы, подлежат применению обязательные требования, установленные\
    \ нормативным правовым актом большей юридической силы (т.е. ПП РФ 614).\n\nИ еще\
    \ очень важный момент, о котором мы писали ранее и подробно.\n\nТезисно:\n • ни\
    \ один из 13 видов ИД из Приказа № 344/пр, в т.ч. 3 из них, относящиеся к графической\
    \ части ИД, не содержит в своём составе ни ЦИМ, ни ИЦММ - как их часть или как\
    \ их разновидность/форму воплощения;\n • ЦИМ и ИЦММ не подменяют собой текстовую\
    \ и (или) графическую части ИД, которая в силу ч. 1.5 ст. 52 ГрК РФ формируется\
    \ исключительно в текстовой и графической формах;\n   • ИД ведется строго на основе\
    \ ПД, РД и выполненными на их основании работами (ч.1.4 ст.52 ГрК РФ), графическая\
    \ часть которых в составе ИМ ОКС может дополняться ЦИМ;\n  • включение ЦИМ и ИЦММ\
    \ в ИМ ОКС не изменяет правовую природу ИД и не трансформирует графическую часть\
    \ ИД в ЦИМ;\n  • ЦИМ может использоваться как основа для формирования отдельных\
    \ текстовых и/или графических материалов ИД, и только лишь дополняет её графическую\
    \ часть и только в составе ИМ ОКС, а также только при наличии условий, установленных\
    \ п. 3 «в» ПП РФ № 614 (наличие ЦИМ на этапе АСП и (или) требование задания и\
    \ (или) договора);\n  • ИЦММ на обязательной основе не дополняет графическую часть\
    \ ИД, подлежащей включению в ИМ ОКС на этапе осуществления строительства;\n  •\
    \ установление форматов IFC (ЦИМ) и LandXML (ИЦММ) в Приказе № 344/пр с 1 марта\
    \ является лишь синхронизацией с ПП РФ № 614 и применяется только при отсутствии\
    \ XML-схем, а не является введением новых форм ИД;\n   • ЦИМ в составе ИМ ОКС,\
    \ дополняющая графическую часть ИД, является взаимосвязанным электронным документом\
    \ с другими СДМ, включаемыми в ИМ ОКС. При этом, характер, объём и степень взаимосвязанности\
    \ ЦИМ и ИЦММ в составе ИМ ОКС как с ИД на этапе осуществления строительства, так\
    \ и с иными СДМ, включаемыми в ИМ ОКС, на других этапах работ, определяются договором,\
    \ в т.ч. с учётом требований документов по стандартизации, возможностей используемых\
    \ ИС (СОД, САПР, пр.) и указанных форматов, а также с учетом состава ИД.\n\n\U0001F575\
    ‍♂️BIMSERT в \U0001F4F8 Телемост"
