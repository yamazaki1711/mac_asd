  text: "Как мы силком заставили мэрию Новосибирска сделать тротуары и фонари\n\n\U0001F416\
    \ Знакомо чувство, когда в центре миллионника идешь по грязи, как в самой глухой\
    \ деревне? \U0001F92C\n\nУлицы Трудовая и Ядринцевская в Новосибирске годами были\
    \ именно таким местом. За перекрестком с ул. Семьи Шамшиных не было ни нормальных\
    \ тротуаров, ни освещения. Люди рисковали здоровьем каждый день\n\nВ чём был корень\
    \ зла?\nВсё просто: \n\U0001F4C3мэрия раздавала разрешения застройщикам на возведение\
