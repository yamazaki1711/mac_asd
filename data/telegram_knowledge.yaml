  text: "Прямо сейчас к Луне летят астронавты.\n\nНочью 2 апреля 2026 года (по Москве)\
    \ с пусковой площадки 39B Космического центра имени Джона Кеннеди во Флориде успешно\
    \ стартовала сверхтяжёлая одноразовая ракета Space Launch System. Четыре астронавта\
    \ на корабле Orion совершают первый за более чем 50 лет пилотируемый полёт за\
    \ пределы околоземной орбиты. Последний раз человек находился вблизи Луны в декабре\
    \ 1972 года, когда в рамках миссии «Аполлон-17» на поверхность спутника высадились\
    \ Юджин Сернан и Харрисон Шмитт.\n\nУже в понедельник корабль пролетит над обратной\
    \ стороной Луны, и экипаж увидит то, что до них видели только на снимках.\n\n\
    Кстати, в 1959 году советская станция «Луна-3» передала на Землю снимки обратной\
    \ стороны. \n\nА ещё раньше «Луна-2» стала первым в истории аппаратом, достигшим\
    \ поверхности Луны. \n\nПервая мягкая посадка - тоже наша: «Луна-9», 1966 год.\
    \ \n\nИ первый автоматический планетоход в истории - «Луноход-1», 1970 год. Советский\
    \ Союз открыл человечеству дорогу к Луне. \n\nХочется верить, что Россия ещё вернётся\
    \ туда с новыми миссиями и напомнит миру, кто начинал эту гонку.\n\nСобрала интересные\
    \ факты о Луне:\n\n\U0001F539 Луна пахнет палёным порохом. Астронавты «Аполлонов»\
    \ рассказывали: лунная пыль отдаёт запахом сгоревшего фейерверка. А ещё она острая,\
    \ как стекловата, и опасна для дыхательных путей.\n\n\U0001F539 Сутки на Луне\
    \ длятся 29,5 наших дней. Солнце поднимается очень медленно: от рассвета до зенита\
    \ проходит целая неделя.\n\n\U0001F539 Лунотрясения - реальность. Сейсмометры,\
    \ установленные миссиями «Аполлон», фиксировали более тысячи в год, некоторые\
    \ силой до 5,5 баллов. И длятся они непривычно долго - до 10–20 минут. Причина\
    \ - приливное воздействие Земли и перепады температур от –173 °C до +127 °C.\n\
    \n\U0001F539 На Луне есть вода. В вечно затенённых кратерах на полюсах, куда ни\
    \ разу не попадал солнечный свет, температура опускается до –248 °C. В таких холодных\
    \ ловушках заморожены сотни миллионов тонн водяного льда. Будущие лунные базы\
    \ смогут использовать этот ресурс.\n\n\U0001F539 Обратная сторона Луны усыпана\
    \ кратерами. Но не потому, что она «прикрывала» Землю. На видимой стороне тонкая\
    \ кора пропускала лаву, которая заливала и сглаживала древние кратеры. А обратная\
    \ сторона сохранила все следы ударов. Самый грандиозный - бассейн Южный полюс\
    \ – Эйткен: 2500 км в диаметре и около 8 км в глубину. Один из крупнейших ударных\
    \ кратеров в Солнечной системе.\n\n\U0001F539 Лунная пыль электризуется и летает.\
    \ Ультрафиолет заряжает пылинки, и они левитируют над поверхностью, создавая сумеречные\
    \ лучи на рассвете и закате. Эта пыль прилипает ко всему - скафандрам, технике,\
    \ приборам - и её почти невозможно удалить.\n\nДавайте обсудим были американцы\
    \ на луне или СССР из каких-то соображений подыграл мистификации? Выскажитесь\
    \ в комментариях \U0001F447"
