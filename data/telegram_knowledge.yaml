  text: '✅ Основные правовые позиции суда:


    🔹Нарушение принципа содействия (просрочка кредитора). Суд установил, что заказчик
    до принятия решения об одностороннем отказе не совершил необходимых действий,
    вытекающих из существа обязательства и предусмотренных контрактом. Без выполнения
    этих условий Подрядчик объективно не имел возможности надлежащим образом исполнить
    свои обязательства.


    🔹Отсутствие направленности на результат. Действия Заказчика фактически не были
    направлены на получение ожидаемого от Подрядчика результата работ по контракту,
    что свидетельствует о формальном подходе к расторжению контракта.


    🔹Освобождение от ответственности за нарушение сроков. Принимая во внимание невозможность
    производства работ в установленный срок по причинам, не зависящим от исполнителя,
    суд пришел к выводу об отсутствии необходимых предпосылок для своевременного исполнения
    обязательств. На основании п. 3 ст. 405 и п. 1 ст. 406 ГК РФ подрядчик освобождается
    от ответственности за нарушение сроков.


    🔹Недопустимость неосновательного обогащения. Односторонний отказ по инициативе
    заказчика не освобождает его от обязанности оплатить работы, фактически и надлежащим
    образом выполненные до момента расторжения. Иное означало бы возникновение на
    стороне Заказчика неосновательного обогащения вследствие безвозмездного пользования
    результатом работ.


    🔹Ограничение произвольного отказа. Системное толкование ст. 95 Закона № 44-ФЗ
    подтверждает, что односторонний отказ не может быть произвольным: он допустим
    исключительно в случае доказанного нарушения исполнителем условий контракта.


    🔹Пресечение злоупотреблений правом. Суд особо отметил, что признание за заказчиками
    права на односторонний отказ от исполнения государственных контрактов, заключенных
    по итогам проведения открытых аукционов в электронной форме, открывает возможность
    для злоупотреблений со стороны недобросовестных заказчиков, поскольку такие действия
    фактически дезавуируют положения Закона № 44-ФЗ в части определения лиц, с которыми
    заключаются государственные контракты.


    Законность судебных актов по делу № А32-67379/2023 была подтверждена в 15 ААС
    и АС Северо-Кавказского округа.


    Таким образом, своевременное инициирование судебного процесса о признании незаконным
    решения заказчика об одностороннем отказе от исполнения контракта - это стратегический
    инструмент защиты, который позволяет купировать риски включения в #РНП непосредственно
    в ходе разбирательства в антимонопольном органе.


    Источник: zakon.ru'
