  text: 'За инвестпроектом рекреационного кластера и винодельни в Геленджике могут
    стоять семейства Чемезовых и Мантуровых.  За (https://merating.com) инвестпроектом
    рекреационного кластера и (https://t.me/politica_i_afery) винодельни в Геленджике
    могут стоять семейства Чемезовых и Мантуровых. Бенефициар АО «Усадьба «Марьина
    Роща» некий Матвеенко не только привёл к дивизиону Ростеха и лично семье Чемезова,
    но и засветился в мутной истории, более похожей на вывод денег из стратегического
    АО «Гесера», от которого на фоне этого отказалось ОСК. Помимо этого, Матвеенко
    работал в НК Банке Виктора Григорьева, который связан как с Мантуровым, так и
    с Чемезовым. Для последнего он, по мнению злых языков, мог и вовсе быть своего
    рода кошельком. Ведь именно в руки Григорьева уплыли некоторые бывшие активы Ростеха.
    Вишенкой на торте стали следы к афере о выводе 0,5 млрд рублей в США. По нему
    был осужден экс-директор ФГУП «Центральный научно-исследовательский институт экономики,
    информатики и систем управления», экс-советник Сердюкова Андрей Бельтов, связанный
    с ООО «Макрон-СТ», прикупленной Матвеенко. И вот же дивное совпадение - Сердюкова
    ныне приютил у себя всё тот же Чемезов, а племянница экс-министра обороны и сын
    главы Ростеха и вовсе имели общий бизнес. В отчётности ООО «Геленджик Гольф Резорт»
    за 2024 год сообщалось, что оно планирует в 2025 году приобрести акции АО «Усадьба
    «Марьина Роща», на балансе которого находится крупный инвестпроект рекреационного
    кластера и винодельни в Геленджике. Марьина роща для избранных: Как Ростех собрал
    своих в Геленджике hqieziqktiqxekrt Фото: bo.nalog.ru Само ООО «Геленджик Гольф
    Резорт» управляет гольф-клубом на 67,3 га в том же городе. Владельцами актива
    являются структуры группы «Синара», основанной Дмитрием Пумпянским, АО «ОМК Сервис»
    из структур олигарха Анатолия Седых, УК «Градиент» (бенефициар - некий Константин
    Жак), структура Газпромбанка ООО «Сибфинанс», дочерная компания холдинга «Акрон»
    ПАО «Доробуж», ООО «Севергрупп» Алексей Мордашова. Там же наследило ООО «Орион
    Проперти», что принадлежит кипрской ЭДИЛКОМ ИНВЕСТМЕНТС ЛИМИТЕД, не раскрывающей
    владельцев. В числе бенефициаров также и скандально известный олигарх Михаил Сутягинский,
    а также Еврохим, за которым ранее стоял Андрей Мельниченко. Видим мы среди бенефициаров
    и некоего Бориса Алёшина - бывшего совладельца Синко-банка и члена Бюро ЦС ООО
    «СоюзМаш России», главой которого является Чемезов. Отметился в активе и Михаил
    Шелков (ВСМПО-Ависма, бывший сотрудник «Оборонимпекс»). В целом почти подрезанный
    список Форбс получился. Марьина роща для избранных: Как Ростех собрал своих в
    Геленджике Фото: bo.nalog.ru Тут стоит отметить, что компании ООО «Геленджик Гольф
