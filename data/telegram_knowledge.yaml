    долг снизился до 112,3 млрд руб.;


    ✅Соотношение чистого корп. долга к скорр. EBITDA снизилось с 1,06х до 0,9x;


    ✅Соотношение чистого долга за вычетом проектного долга и остатков на счетах эскроу
    к скорр. EBITDA составило 2,98х.


    «В 2025 году мы работали над повышением своей операционной эффективности, оптимизацией
    земельного банка и снижение уровня долга, благодаря чему повысили финансовую устойчивость
    компании. В этом году мы и дальше продолжим двигаться с данном направлении, запуская
    новые проекты и открывая для себя новые возможности для развития, например, строительство
    коммерческой недвижимости»,— прокомментировали отчёт в компании.


