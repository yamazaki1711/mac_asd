  text: "⚡️ 5 пунктов без которых договор подряда не работает\n\nЗа 20 лет я разобрала\
    \ сотни договоров подрядчиков. И в 9 случаях из 10 проблема одна: договор есть,\
    \ но самое главное написано плохо и работает против подрядчика.\n\n1️⃣ Предмет\
    \ договора\n\nСамая базовая вещь, и одновременно самая часто проваленная.\n\n\
    Договор считается заключённым только тогда, когда стороны согласовали все существенные\
    \ условия. Для подряда это предмет: что именно делается, в каком объёме и какой\
    \ результат должен получиться.\n\nЧто должно быть прописано: ▪️ виды работ (конкретные,\
    \ не «строительные работы по объекту»); \n▪️ объём работ (в м², м³, штуках, тоннах,\
    \ погонных метрах); \n▪️ результат, который должен получиться; \n▪️ адрес и характеристики\
    \ объекта; \n▪️ ссылка на смету, спецификацию или техническое задание как неотъемлемую\
    \ часть договора.\n\nЕсли предмет не определён, договор является незаключённым.\
    \ Это значит: нельзя взыскать долг по договору, нельзя начислить договорную неустойку,\
    \ нельзя ссылаться на договорные сроки. Вы окажетесь в режиме неосновательного\
    \ обогащения, и доказывать придётся каждый рубль через экспертизу.\n\nПоэтому,\
    \ не пишем дом 1 штука, ремонт неизвестно чего, неизвестно где.\n \n2️⃣ Приёмка\
    \ работ\n\nЧто должно быть прописано: \n▪️ срок на подписание акта (5-10 дней);\
    \ \n▪️ что такое мотивированный отказ и когда он допустим; \n▪️ способ передачи\
    \ акта (нарочно, ЭДО, мессенджер); \n▪️ что при отсутствии отказа в срок работы\
    \ считаются принятыми; \n▪️ порядок устранения дефектов и составления акта выявления\
    \ дефектов.\n\nБез этого заказчик молчит месяцами, а вы не можете получить деньги.\n\
    \n3️⃣ Сроки выполнения работ\n\nЧто должно быть прописано: \n▪️ конкретные даты\
    \ начала и окончания; \n▪️ право приостановки срока: непередача проектной документации,\
    \ ограничение доступа на объект, погодные условия, просрочка оплаты, уклонение\
    \ от подписания актов, отсутствие материалов заказчика, выполнение работ сторонними\
    \ организациями, обнаружение скрытых препятствий, период приёмки; \n▪️ порядок\
    \ уведомления о приостановке.\n\nБез этого срок «идёт» даже когда вы стоите и\
    \ ждёте заказчика. А с вас потом пени и неотработанный аванс.\n\n4️⃣ Право подрядчика\
    \ на односторонний отказ от договора\n\nПо умолчанию (ст. 717 ГК РФ) от договора\
    \ может отказаться только заказчик. Подрядчик нет, если это прямо не прописано.\n\
    \nЧто должно быть прописано: \n▪️ право подрядчика выйти из договора во внесудебном\
    \ порядке с уведомлением за 15 дней; \n▪️особый порядок при просрочке оплаты больше\
    \ 10 дней (договор прекращается датой уведомления, без срока ожидания); \n▪️ обязанность\
    \ направить итоговый акт в течение 10 дней после прекращения.\n\nБез этого вы\
    \ заложник: заказчик не платит, не пускает, не отвечает. А уйти нельзя, взыщут\
    \ пени.\n\n5️⃣ Переписка и уполномоченные лица\n\nСамая недооценённая часть договора.\
    \ И самая важная в суде.\n\nЧто должно быть прописано: \n▪️ ФИО, телефон, e-mail\
    \ и мессенджер уполномоченных лиц с обеих сторон; \n▪️ перечень иных лиц, имеющих\
    \ право подписывать документы; \n▪️ признание юридической силы переписки в мессенджере\
    \ и по e-mail; \n▪️ признание электронных писем; \n▪️ обязанность уведомлять об\
    \ изменении контактов.\n\nБез этого в суде ваш скриншот переписки превращается\
    \ в «не доказано, что это исходит от стороны».\n\n\U0001F4CC Возьмите свой действующий\
    \ договор. Откройте. Проверьте все пять пунктов.\nЕсли хотя бы один отсутствует\
    \ или прописан формально, договор работает не на вас, а против.\n\n\U0001F4E9\
    \ Пришлите договор на разбор: @grikevich \n\n\nMAX - резервный канал"
