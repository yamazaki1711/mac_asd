  text: '⚖️ Четыре минуты, которые отменили решение


    Учреждение (заказчик) и общество (исполнитель) заключили госконтракт на разработку
    проектной документации. Работы второго и третьего этапов сдали с просрочкой. Заказчик
    начислил 768 685,79 руб. неустойки, а после отказа ее уплатить обратился в суд.


    Первая инстанция и апелляция иск удовлетворили. Они исходили из верности расчета
    пеней и превышения 5% цены контракта, что исключало списание по Правилам № 783.


    Суд округа решения отменил и направил дело на новое рассмотрение из-за безусловного
    процессуального нарушения — ответчика не известили о процессе надлежащим образом.


    Определение суда направили по юридическому адресу, но конверт вернулся с отметкой
    «организация не найдена». Кассация выявила, что срок хранения отправления не соблюден:
    письмо передали почтальону со значительной задержкой, попытка вручения была зафиксирована
    с интервалом в четыре минуты и признана неудачной, после чего отправление практически
    сразу вернули, не выдержав семидневный срок. Доказательств оставления извещения
    в почтовом ящике адресата материалы дела не содержат, что подтвердила и сама почтовая
    организация.


    Суд округа подчеркнул: возврат корреспонденции не доказывает надлежащее извещение,
    если правила вручения нарушены. Это лишило ответчика возможности представить возражения,
    поэтому состоявшиеся судебные акты отменены по пункту 2 части 4 статьи 288 АПК
    РФ. #неустойка


    Документ: Постановление АС Северо-Кавказского округа от 16.04.2026 № Ф08-1117/2026
    по делу N А63-11367/2025


    Источник: Время Бухгалтера'
