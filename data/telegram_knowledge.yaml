  text: "‼ Почему опасно вносить отметку о недостоверности сведений в ЕГРЮЛ \U0001F447\
    \n\n\U0001F525 Оказалось, что это капкан для директоров, которые сначала вносят\
    \ сведения о том, что они не являются директорами, а затем – пытаются создать\
    \ новые компании. Закон запрещает это делать в течение 3 лет, но даже из этого\
    \ правила есть небольшие исключения.\n\n\U0001F4DC Директор компании обратился\
    \ в ФНС с заявлением о недостоверности сведений о нем как о руководителе компании.\
    \ Спустя четыре года с этой даты, но через год с момента исключения сведений об\
    \ этой компании из ЕГРЮЛ он снова обратился в ФНС за внесением сведений о том,\
    \ что он имеет право без доверенности действовать от имени нового юрлица.\n\n\U0001F4CC\
    \ Формулировка иска\n\n✏ О признании недействительным решения ФНС\n\n\U0001F4CC\
    \ Позиции судов\n\n\U0001F534 Все три инстанции в иске отказали.\n⚖ СКЭС ВС РФ\
    \ отправила дело на новое рассмотрение.\n\n✍ Существует временный запрет на создание\
    \ новых юрлиц и на участие в управлении для граждан, которые проявили недобросовестность,\
    \ ранее уклонились от совершения необходимых действий по прекращению юрлица в\
    \ процедурах ликвидации или банкротства, что может также означать уклонение от\
    \ исполнения обязательств перед кредиторами (Определение КС РФ от 13 марта 2018\
    \ г. № 581-О).\n\n❌ Данный запрет не может расцениваться как нарушающий права\
    \ контролирующих лиц свободно распоряжаться своими способностями к труду, выбирать\
    \ род деятельности и профессию.\n\n⏳ Но на момент исключения компании из ЕГРЮЛ,\
    \ прошло более 3-х лет с даты подачи истцом заявления об исключении данных о себе\
    \ из ЕГРЮЛ.\n\n\U0001F4C3 Отсутствие в реестре сведений о другом гендиректоре\
    \ этого общества на момент исключения общества из ЕГРЮЛ не может означать наличие\
    \ у истца таких полномочий на эту дату, даже если учредители не назначили иное\
    \ лицо в качестве гендиректора. \n\n\U0001F4BC Комментарий юристов \"Реаналитики\"\
    : \n\n\U0001F9E9 ФНС должна устранить допущенные нарушения прав и законных интересов\
    \ заявителя. Можно заметить, что из подобных ситуаций достаточно трудно найти\
    \ лазейку, поэтому перед подачей заявления о недостоверности сведений в ФНС необходимо\
    \ помнить о наличии 3-летнего запрета на создание юрлиц.\n\n\U0001F50D Определение\
    \ ВС РФ от 04.02.2026 г. по делу № А40-223022/2024\nhttps://m.kad.arbitr.ru/Card/90e7ed7c-6159-4dc5-8b5d-3e180f9181a3\n\
    \n⁉ Как Вы думаете, справедлив ли такой подход?\n\n\U0001F44D – Вполне.\n\U0001F914\
    \ – Нет.\n\nPS: Выводы являются обобщёнными. Для конкретных рекомендаций и решений\
    \ обратитесь в “Реаналитику”\nreanalitika.ru.\n\n#арбитражныйпроцесс, #фнс, #юрлицо,\
    \ #егрюл\n@arbitrium_processus\nhttps://t.me/arbitrium_processus"
