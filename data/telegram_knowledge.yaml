  text: '⚖️ Должна ли комиссия заказчика проверять нарушение исключительных прав на
    предлагаемый участником товар?


    Заказчик проводил аукцион на поставку лекарственных препаратов (МНН Дапаглифлозин).
    Победителем аукциона признана компания, предложившая препарат с данным МНН.


    Правообладатель патента на оригинальный препарат с таким же МНН оспорил действие
    комиссии в антимонопольный орган.


    По его мнению, оригинальному препарату предоставлена охрана в РФ на основании
    патента, в связи с чем продажа препарата с тем же активным веществом до истечения
    срока действия патента на оригинал нарушает исключительные права правообладателя.


    ФАС России с такой позицией согласилась: заявка победителя содержала недостоверные
    сведения об отсутствии нарушения исключительных прав третьих лиц, связанных с
    поставкой и использованием товара. Такая заявка подлежала отклонению по п. 8 ч.
    12 ст. 48 Закона № 44-ФЗ.


    Действия комиссии заказчика по допуску спорной заявки признаны неправомерными.


    Заказчик оспорил решение ФАС в суде.


    Суды трёх инстанций признали решение ФАС незаконным, а нарушение в действиях комиссии
    недоказанным:


    ● на дату подачи заявки в ГРЛС имелась информация о регистрации и введении в гражданский
    оборот на территории РФ лекарственного препарата, который предложил победитель;

    ● комиссия по осуществлению закупок полномочиями по проверке и установлению факта
    нарушения патентных прав не обладает. Рассмотрение патентных споров между хозяйствующими
    субъектами - исключительная компетенция суда. На дату рассмотрения заявок отсутствовал
    вступивший в законную силу судебный акт, которым было бы установлено нарушение
    участником закупки исключительного права;

    ● законодатель не обязывает комиссию по осуществлению закупок проверять сведения,
    указанные в заявках участников, а лишь устанавливает, что в случае обнаружения
    недостоверной информации комиссия обязана такую заявку отклонить, т.е. она анализирует
    заявку исключительно на соответствие требованиям документации об аукционе;

    ● расширительное толкование норм Закона № 44-ФЗ недопустимо: в этих правоотношениях
    действует принцип - разрешено только то, что прямо предусмотрено;

    ● сам факт регистрации воспроизведённого препарата и введение его в гражданский
    оборот даже при наличии действующих патентов не мог расцениваться комиссией как
    нарушение чьих-либо прав на изобретение по патенту в отсутствие вступивших в законную
    силу судебных актов, подтверждающих такое нарушение;

    ● самостоятельная проверка наличия или отсутствия нарушения исключительных прав
    невозможна, т.к. комиссия заказчика не обладает полномочиями по контролю патентных
    прав.


    При таких обстоятельствах комиссия по осуществлению закупок при проверке заявок
    должна была руководствоваться только Законом № 44-ФЗ, который содержит исчерпывающий
    перечень оснований для отклонения заявок. Комиссия была вправе проверять информацию,
    включённую в документы заявки, на предмет достоверности, и в отсутствие доказательств
    обратного при определении победителя должна была исходить из добросовестности
    участников закупки.


    Верховный Суд РФ признал такие выводы правильными и не стал пересматривать дело.
    #ВС #рассмотрениезаявок


    Документ: Определение ВС РФ от 23.04.2026 по Делу № А40-284176/2024


    Источник: ЭТП «Фабрикант»'
