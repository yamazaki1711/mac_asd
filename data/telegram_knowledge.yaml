    с правоохранителями.


    Договор аренды должен был действовать до 1 мая. Семья исправно вносила платежи.
    По закону мужчина с дочерью могут проживать в этой квартире до конца этого срока.
    Но арендодатель утверждает, что срок договора истёк 22 апреля. Теперь мужчина
    с ребёнком вынужден жить в отеле.'
