  text: "Налоговая вправе проводить повторную проверку за один период, даже если в первой\
    \ участвовали те же сотрудники\n\n➡️ Инспекция по итогам выездной проверки доначислила\
    \ компании почти 35 млн рублей налогов за 2021 год. Через два года была назначена\
    \ повторная проверка за тот же период, но уже управлением ФНС. По результатам\
    \ новой проверки компания получила доначисления на 447 млн рублей. \n\nКомпания\
    \ оспорила повторную проверку в суде. Три инстанции удовлетворили требования.\
    \ Суды указали, что по закону повторная проверка проводится в порядке контроля\
    \ за деятельностью нижестоящей инспекции. \n\n\U0001F4CD Поскольку в первой проверке\
    \ участвовали в основном сотрудники того же УФНС, суды сочли, что оснований для контрольной\
    \ проверки не было.\n\nВерховный суд отменил акты. Форма организации первичной\
    \ проверки не препятствует проведению повторной. \n\nВышестоящий налоговый орган\
    \ в порядке контроля вправе проверить деятельность налогоплательщика заново и\
    \ в полном объеме, а также пересмотреть выводы первичной проверки и выявить новые\
    \ нарушения.\n\n\U0001F4C4 Источник: определение ВС от 18.03.2026 по делу № А07-18520/2024\n\
