  text: "‼ Бизнесмены должны владеть китайским языком \U0001F447\n\n\U0001F525 Незнание\
    \ китайского – проблема того, кто его не успел выучить. А предоставление инструкций\
    \ на русском языке к поставляемому оборудованию вовсе не обязательно.\n\n\U0001F1E8\
    \U0001F1F3 Поставщик предоставил покупателю криогенную установку из КНР с инструкцией\
    \ на китайском языке. Но покупатель настаивал, что это совершенно не та установка,\
    \ на которую выдана спецификация, и обратился в суд.\n\n\U0001F4CC Формулировка\
    \ иска\n\n✏ О расторжении договора на поставку оборудования\n\n\U0001F4CC Позиции\
    \ судов\n\n⚖ Суды всех трех инстанций, включая СКЭС ВС РФ, истцу отказали.\n\n\
    \U0001F575 В дело привлекли эксперта. Он установил, что отсутствует часть необходимой\
    \ документации (на русском языке), но в целом криогенная установка вполне соответствует\
    \ условиям договора.\n\n\U0001F529 Поставленное оборудование является комплектным\
    \ и пригодным для использования в соответствии с теми целями, которые согласованы\
    \ в договоре, т.е. ответчиком в полной мере соблюдены требования к производимому\
    \ продукту и производительности оборудования.\n\n\U0001F1F7\U0001F1FA А отсутствие\
    \ части технической документации (на русском языке) не признано судами существенным\
    \ условием для использования криогенной установки по назначению, ее отсутствие\
    \ не влечет для покупателя такой ущерб, что он в значительной степени лишился\
    \ того, на что был вправе рассчитывать при заключении договора. \n\n\U0001F4DC\
    \ Недостающая документация (на русском языке) может быть запрошена у завода-изготовителя.\n\
    \n❌ Поэтому оснований для расторжения договора нет.\n\n\U0001F4BC Комментарий\
    \ юристов \"Реаналитики\": \n\n\U0001F9E9 Так появился еще один капкан договора\
    \ поставки. Фактически данный кейс развязывает многим поставщикам руки. Теперь\
    \ им не нужно заботиться о получении инструкций на русском языке, если это не\
    \ согласовано в договоре. Поэтому лучше заранее прописать данное условие.\n\n\U0001F50D\
    \ Определение ВС РФ от 28.10.2025 г. по делу № А60-6262/2023\nhttps://m.kad.arbitr.ru/Card/d0035457-3a0f-4c97-ad52-8c61cd65bb3d\n\
    \n⁉ Как Вы думаете, справедливо ли разрешать не предоставлять инструкцию на русском?\n\
    \n\U0001F44D – Да.\n\U0001F914 – Нет.\n\nPS: Выводы являются обобщёнными. Для\
    \ конкретных рекомендаций и решений обратитесь в “Реаналитику”\nreanalitika.ru.\n\
    \n#арбитражныйпроцесс, #китай, #кнр, #поставка\n@arbitrium_processus\nhttps://t.me/arbitrium_processus"
