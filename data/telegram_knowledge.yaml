  text: '⚖️ Когда заказчику не удастся оспорить договор по мотиву нарушения закупочной
    процедуры?


    Государственное бюджетное учреждение заключило с предпринимателем договор на оказание
    услуг по очистке кровли от снега, наледи и сосулек на сумму 1,5 млн рублей. По
    завершении договора сторонами был подписан акт сдачи-приёмки.


    В последующем учреждение предъявило иск о признании договора недействительным,
    сославшись на нарушение требований Закона № 44-ФЗ (непроведение конкурентной закупки).


    Суды отказали заказчику в иске.


    🔻На что они обратили внимание?


    Суды указали на то, что учреждение заключало договор не за счёт бюджетных средств,
    а с использованием иных источников, приносящих заказчику доход. В этом случае
    он вправе применять Закон № 223-ФЗ.


    Кроме того, в силу положений регионального законодательства, уборка наледи и снега
    должна быть обеспечена учреждением в течение двух суток с момента окончания снегопада.
    Соблюдение этого срока объективно несовместимо с проведением конкурентной процедуры.


    В случае экстренного характера закупки в отсутствие заключённого контракта исполнителю
    не может быть отказано в оплате выполненных работ (оказанных услуг).


    Во внимание было принято также непоследовательное поведение заказчика (по заключению
    договора, принятию исполнения без замечаний и последующему оспариванию), которое
    не может быть признано добросовестным. #ЕП


    Документ: Постановление АС Московского округа от 15.04.2026 по Делу № А40-46709/2025


    Источник: ЭТП «Фабрикант»'
