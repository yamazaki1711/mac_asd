  text: '📃С 1 апреля вступил в силу ГОСТ по газоспасательным работам на ОПО


    Росстандарт принял ГОСТ Р 12.0.330.1-2026 «Система стандартов безопасности труда.
    Газоспасательные работы. Общие требования».


    Стандарт устанавливает общие требования к организации и проведению газоспасательных
    работ на опасных производственных объектах, а также к структуре, численности и
    оснащенности газоспасательных служб и формирований.


    Документ предназначен для органов управления, организаций, которые выполняют газоспасательные
    работы, а также для должностных лиц и исполнителей, ответственных за их организацию
    и проведение.


    📌Под газоспасательными работами понимаются действия по спасению людей, защите
    окружающей среды и локализации аварий в условиях превышения предельно допустимых
    концентраций опасных веществ или снижения содержания кислорода менее 18% с применением
    изолирующих средств защиты.


    📝ГОСТ включает требования к безопасной организации и проведению работ,  рекомендации
    по размещению газоспасательных служб, нормативы времени прибытия на объекты, требования
    к структуре, численности и оснащению подразделений, основы оперативных действий
    при ликвидации аварий, формы документов и оперативных планов.


