  text: "‼ Если Таможне кажется, она должна обращаться в другое королевство, а не\
    \ к декларанту\U0001F447\n\n\U0001F525 ВС РФ запретил Таможне придираться к сертификатам\
    \ из-за упоминания двух разных стран – грузополучателя и страны происхождения\
    \ товара. Это не повод признавать сертификат недействительным. При наличии сомнений\
    \ ФТС нужно обращаться к иностранному государству...\n\n\U0001F1F9\U0001F1ED Компания\
    \ ввезла из королевства Таиланд полиэтилен, грузополучателем в сертификатах указывалась\
    \ компания из КНР, кроме того, транспортировка осуществлялась через ОАЭ. Таможня\
    \ из-за путаницы в странах посчитала, что в сертификате неверно указана страна\
    \ происхождения. Компания обратилась в суд за обжалованием действий ФТС.\n\n\U0001F4CC\
    \ Формулировка иска\n\n✏ О признании незаконным решения Таможни\n\n\U0001F4CC\
    \ Позиции судов\n\n\U0001F535 Первая инстанция встала на сторону истца.\n\U0001F534\
    \ Апелляция и кассация истцу отказали.\n⚖ СКЭС ВС РФ засилила решение суда первой\
    \ инстанции.\n\n✍ Указание в сертификате грузополучателем лица, не являющегося\
    \ декларантом, само по себе не может свидетельствовать о том, что сертификаты\
    \ не являются подлинными.\n\n\U0001F4DC Перечень обстоятельств, дискредитирующих\
    \ конкретный сертификат о происхождении товара, является исчерпывающим.\n\n\U0001F3B3\
    \ Иных случаев, когда происхождение товара считается неподтвержденным на основании\
    \ такого сертификата, не предусмотрено. \n\n❌ Несоответствие других сведений в\
    \ документе о происхождении товара не отнесено к основаниям для признания происхождения\
    \ неподтвержденным.\n\n\U0001F5FA Изменение страны назначения в ходе транспортировки\
    \ товара не создает обязанность заменять ранее выданный сертификат.\n\n\U0001F4BC\
    \ Комментарий юристов \"Реаналитики\":\n\n\U0001F9E9 В аналогичных ситуациях ВС\
    \ РФ порекомендовал Таможне в случае сомнений обращаться с запросом в соответствующие\
    \ страны для проверки достоверности содержащихся в сертификате сведений.\n\n\U0001F50D\
    \ Определение ВС РФ от 05.03.2026 г. по делу № А51-15689/2024\nhttps://m.kad.arbitr.ru/Card/3947fd10-b73f-441e-99fa-3d1212a8f631\n\
    \n⁉ Как Вы думаете, часто ли Таможня нарушает права декларантов?\n\n\U0001F44D\
    \ – Да, случаев миллионы\n\U0001F914 – Нет.\n\nPS: Выводы являются обобщёнными.\
    \ Для конкретных рекомендаций и решений обратитесь в “Реаналитику”\nreanalitika.ru.\n\
    \n#арбитражныйпроцесс, #фтс, #таможня\n@arbitrium_processus\nhttps://t.me/arbitrium_processus"
