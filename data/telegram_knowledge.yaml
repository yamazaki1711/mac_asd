  text: 'Разработан новый стандарт страхования ипотеки


    Всероссийский союз страховщиков (ВСС) разработал стандарт, который может решить
    проблему с навязыванием страховок и неполучением выплат по страховым случаям. 


    В чем суть


    1️⃣Закрепляется, что при страховании заемщиков «запрещаются любые формы давления,
    скрытого стимулирования или моделирования ситуаций, побуждающих получателя страховых
    услуг, заемщика по договору кредита».


    2️⃣Приведен перечень случаев, в которых страховщик может отказать в выплате.


    Например:


    🔵если «страхователь умышленно не принял разумных и доступных ему мер», чтобы уменьшить
    возможные убытки;


    🔵если убыток возник в результате «умышленных действий страхователя»; 


    🔵если убыток возник в результате военных действий, прилета БПЛА;


    🔵если убыток возник из-за изъятия, ареста или уничтожения застрахованного имущества
    по распоряжению госорганов;


    🔵если ущерб полностью возмещен третьими лицами.


    3️⃣Страховщик вправе пересмотреть условия договора, в частности, размер страховой
    премии, если станет ясно, что выросла степень риска. 


    Стандарт направлен на рассмотрение в Центробанк.


    🥲«Законы стройки» в MAX'
