  text: "Кого привлекут к субсидиарке — и как защититься\n\nТакое бывает. И чаще,\
    \ чем кажется.\n\nДал интервью изданию Клерк.ру о субсидиарной ответственности.\
    \ Говорили про то, что это такое и, что реально помогает защититься.\n\n \U0001F4CE\
    Кратко — самое важное:\n\n\U0001F535Понятие «контролирующее лицо» сейчас размыто.\
    \ Им могут признать не только директора, но и любого, кто реально контролировал\
    \ деятельность компании.\n\n\U0001F535Недостоверные сведения об активах на балансе\
    \ — это обман контрагентов. Они полагали, что компания платёжеспособна, а потом\
    \ выяснилось, что это была ложь. Это потенциальная субсидиарка.\n\n\U0001F535\
    Главный совет бухгалтеру: всё, что просит директор, все сведения по сделкам и\
    \ финансам — фиксируйте письменно. На документах, на основании которых составляется\
    \ отчётность, должна стоять подпись руководителя.\n\n\U0001F535Если заявление\
    \ подано и к бухгалтеру, и к директору, я не советую брать одного юриста на двоих.\
    \ Директора часто пытаются переложить вину. «Юрист директора» в какой-то момент\
    \ просто займёт позицию того, кто платит.\n\n➡️В полном материале — ещё больше\
    \ рекомендаций: как подготовиться к суду и как вести себя в процессе (ЧИТАТЬ)\n\
    \n\U0001F3F7Прочёл в законе\n\nРезервный канал в MAX |ВК"
