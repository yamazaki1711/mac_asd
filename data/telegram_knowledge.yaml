  text: 'Новый перечень стратегически значимых лекарств включает 206 наименований


    Перечень стратегически значимых лекарств разбит на 2 раздела: в первом – 61 наименование,
    во втором – 145. Документ вступил в силу 27 апреля. Из прежнего списка в новый
    не вошло 9 позиций: бензатина бензилпенициллин, бозентан, прокарбазин, проурокиназа
    и др.


    По информации правительства, лекарства из перечня будут иметь приоритет при госзакупках.
    Производство стратегически значимых лекарств получит господдержку для организации
    полной локализации процесса в РФ.


    ❗️Напомним, правила и критерии формирования перечня правительство утвердило в
    марте 2026 года. #лекарства


    Документы:

