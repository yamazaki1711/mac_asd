  text: "‼ Теперь даже руководители не могут быть оформлены по договору ГПХ \U0001F447\
    \n\n\U0001F451 Несмотря на некоторое привилегированное положение управленцев,\
    \ оказание услуг по руководству организацией считается полноценными трудовыми\
    \ отношениями. Поэтому платить НДФЛ все же придётся.\n\n\U0001F4B8 ФНС доначислила\
    \ компании сумму налога, посчитав, что руководитель, оформленный по договору о\
    \ передаче полномочий единоличного исполнительного органа управляющему, на самом\
    \ деле осуществляет трудовые функции. Компанию это не устроило, она обратилась\
    \ в суд.\n\n\U0001F4CC Формулировка иска\n\n✏ О признании недействительным решения\
    \ ФНС\n\n\U0001F4CC Позиции судов\n\n⚖ Все три инстанции, включая СКЭС ВС РФ,\
    \ согласились с ФНС, доначислившей компании суммы НДФЛ.\n\n\U0001F4C5 В отношении\
    \ руководителя организации не может служить определяющим фактором трудовых отношений\
    \ наличие места и графика работы, подчиненности правилам внутреннего трудового\
    \ распорядка, поскольку специфика осуществляемой компанией деятельности не требует\
    \ от руководителя постоянного нахождения на рабочем месте.\n\n\U0001F4DC В договоре\
    \ о передаче полномочий не определены характерные для гражданско-правовых отношений:\n\
    \n✔ сроки выполнения работ (оказания услуг);\n✔ не указан конкретный перечень\
    \ услуг.\n\n✍ Фактически условиями данного договора предусмотрено осуществление\
    \ управляющим обязанностей по руководству текущей деятельностью компании, заключение\
    \ сделок, направленных на осуществление хозяйственной деятельности, состоящей\
    \ в оптовой продаже товара, а не выполнение конкретных заданий (задач) заказчика.\n\
    \n\U0001F4BC Комментарий юристов: \n\n\U0001F9E9 Таким образом, ключевую роль\
    \ в квалификации правоотношения как трудового сыграло отсутствие конкретики в\
    \ договоре (описания задач, перечня услуг и сроков их выполнения).\n\n\U0001F50D\
    \ Определение ВС РФ от 11.12.2025 г. по делу № А43-16178/2024\nhttps://m.kad.arbitr.ru/Card/6b48c75d-d190-44ef-b680-37936bd39db4\n\
    \n⁉ Вы согласны с таким подходом?\n\n\U0001F44D – Да.\n\U0001F914 – Нет.\n\nPS:\
    \ Выводы являются обобщёнными. \n\n#арбитражныйпроцесс, #фнс, #налог, #налоговая,\
    \ #ндфл\n@arbitrium_processus\nhttps://t.me/arbitrium_processus"
