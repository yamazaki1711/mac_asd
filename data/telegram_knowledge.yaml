  text: "Кассация указала на ошибку при взыскании переплаты по аренде\n\nАС Уральского\
    \ округа отменил решения по спору о взыскании с регионального министерства переплаты\
    \ по арендным платежам. Суды неверно квалифицировали требования предпринимателя\
    \ и выбрали неправильного ответчика, указала кассация и разъяснила основные правила\
    \ подобных исков.\n\n\U0001F538 Прекращение договора аренды не прекращает обязанность\
    \ платить. Арендатор обязан вносить плату по условиям прежнего договора до заключения\
    \ нового, даже если активно добивается оформления новых отношений.\n\n\U0001F538\
    \ Переплата из-за затягивания властями заключения договора — это не кондикция,\
    \ а деликт. Требования нужно заявлять о возмещении убытков.\n\n«При надлежащем\
    \ выполнении органами публичного образования своих обязанностей у арендатора отсутствовала\
    \ бы обязанность по уплате арендных платежей на основании прежнего договора»,\
    \ — отметила кассация.\n\n\n\U0001F538 При этом ответчиком в таких спорах должно\
    \ выступать публично-правовое образование, а не госорган, подчеркнул окружной\
    \ суд.\n \n\U0001F538 Проценты за пользование чужими средствами по общему правилу\
    \ начисляются с момента вступления решения о взыскании убытков в силу, а не с\
    \ даты возникновения ущерба.\n\nПодробнее в новости\n\nПостановление АС Уральского\
    \ округа № Ф09-5194/2025 от 20 января 2026 года по делу № А07-5675/2025\n\n#судебныеспоры\
    \ #аренда"
