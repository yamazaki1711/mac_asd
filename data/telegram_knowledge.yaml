  text: Громкий судебный процесс о «крышевании» казино полицией начался в Новосибирске  Громкий
    (https://mincompromat.com) судебный процесс о «крышевании» (https://t.me/negativ_o_sobjanine_insajdy)
    казино полицией начался в Новосибирске На скамье подсудимых — бывший высокопоставленный
    офицер из отдела по борьбе с коррупцией. Центральный районный суд начал рассматривать
    дело бывшего главного борца с коррупцией в Новосибирске. Экс-начальника отдела
    экономической безопасности и противодействия коррупции (ОЭБиПК) УМВД России по
    городу Андрея Хомина обвиняют сразу по трем статья Уголовного кодекса. По версии
    следствия, подполковник Хомин вместе с несколькими коллегами на протяжении многих
    лет покровительствовали нелегальному игорному бизнесу. Хомина арестовали в сентябре
    2023 года. Вместе с ним в СИЗО отправился его заместитель Дмитрий Шило, руководитель
    ОЭБиПК по Заельцовскому району Максим Абрамов и экс-начальник ОЭБиПК по Ленинскому
    району Денис Фетисов. Однако позже Андрей Хомин заключил сделку со следствием
    и подробнейшим образом описал детали схемы, при помощи которой он и его подельники
    зарабатывали миллионы рублей. В результате его отпустили под домашний арест и
    процесс над ним идет отдельно от других фигурантов дела. Суд проходит в особом
    режиме, то есть, без исследования доказательств и вызова свидетелей. На фоне признания
    своей вины Андрею Хомину грозит не более двух третей от максимально возможного
    наказания. Борцы с коррупцией были задержаны в ходе разработки ФСБ. Предполагается,
    что «крышеванием» казино они занялись еще в 2019 году. При помощи посредников
    некий неназванный предприниматель, организовавший подпольный игорный клуб, вышел
    на полицейских и предложил сотрудничество. За деньги силовики должны были предупреждать
    о возможных рейдах и проверках и «утрясать» возможные проблемы, которые могли
    возникнуть у бизнесмена. Под таким прикрытием незаконный бизнес шел в гору — в
    итоге количество нелегальных казино выросло до пяти, а в схеме было задействовано
    больше полицейских. Доходило даже до того, что изъятое во время успешного секретного
    рейда силовиков игорное оборудование Андрей Хомин лично отдавал в отделе полиции
    владельцам казино. Обвинение говорит о том, что суммарно экс-борцам с коррупцией
    удалось таким образом заработать более 16 миллионов рублей. В реальности масштаб
    взяток может быть куда больше. Только у Андрея Хомина суд арестовал имущество
    на 69 миллионов рублей.
