  text: "‼ Счастливчикам везет вдвойне... \U0001F447\n\n\U0001F4B8 ...Или почему покупка\
    \ безнадежной дебиторки у банкрота всего за 2 000 ₽ (!) нисколько не умаляет прав\
    \ нового кредитора. А еще судебная практика обогатилась новым термином \"алгоритм\
    \ доказывания\".\n\n\U0001F4CC Формулировка иска\n\n✏ О привлечении к субсидиарной\
    \ ответственности и взыскании убытков\n\n\U0001F4CC Позиции судов\n\n\U0001F534\
    \ Все три инстанции цессионарию отказали.\n⚖ СКЭС ВС РФ встала на его сторону.\n\
    \n✍ Судами нарушены алгоритмы доказывания, выработанные судебной практикой при\
    \ рассмотрении аналогичных споров. \n\n\U0001F3B2 Истцу достаточно доказать наличие\
    \ задолженности, признаки недействующего юрлица и контроль над должником со стороны\
    \ ответчика.\n\n\U0001F3AF А на ответчика возлагается бремя доказывания добросовестности\
    \ и разумности своих действий (п. 2 Обзора судебной практики от 19.11.2025 г.)\n\
    \n\U0001F449 Приобретение долга у банкрота не умаляет прав нового кредитора. Добросовестный\
    \ цессионарий вправе рассчитывать на судебную защиту в том объеме, в котором ею\
    \ обладал цедент на момент уступки.\n\n\U0001F4BC Комментарий юристов \"Реаналитики\"\
    : \n\n\U0001F9E9 Кроме того, не имеет значение то, что цессионарий не направил\
    \ возражения против исключения должника из ЕГРЮЛ, это не препятствует впоследствии\
    \ предъявлению им требования о привлечении КДЛ к субсидиарной ответственности\
    \ (п. 4 Обзора судебной практики от 19.11.2025 г.).\n\n\U0001F50D Определение\
    \ ВС РФ от 25.02.2026 г. по делу № А40-105555/2024\nhttps://m.kad.arbitr.ru/Card/3454f355-e426-49a8-a3cf-92b95ca74e32\n\
    \n⁉ Заметили ли Вы значительное послабление стандарта осмотрительности?\n\n\U0001F44D\
    \ – Да.\n\U0001F914 – Нет.\n\nPS: Выводы являются обобщёнными. Для конкретных\
    \ рекомендаций и решений обратитесь в “Реаналитику”\nreanalitika.ru.\n\n#арбитражныйпроцесс,\
    \ #цессия, #цессионарий\n@arbitrium_processus\nhttps://t.me/arbitrium_processus"
