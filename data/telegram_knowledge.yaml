  text: 'Как будут пересматривать границы заповедников


    Правительство внесло в Госдуму законопроект, который впервые создает механизм
    изменения границ особо охраняемых природных территорий. Поправки затронут более
    11 800 заповедников, национальных парков и заказников на площади свыше 240 млн
    га — это 12% территории страны. Природоохранные организации критикуют законопроект
    за размытые формулировки и риски застройки заповедников под видом «национальных
    интересов».


    📋 Действующий закон об ООПТ приняли еще в 1995 году, он не предусматривает механизма
    корректировки уже существующих территорий, объясняет Минприроды. Чтобы это исправить,
    правительство предлагает:


    ◾Разрешить изъятие земель из ООПТ для размещения объектов обороны и федерального
    значения — АЭС, железных дорог, аэропортов, федеральных трасс.


    ◾Создать специальные комиссии из депутатов, сенаторов, представителей администрации
    президента, правительства и ФСБ для принятия решений об изменении границ.


    ◾Ввести компенсационный сбор — пользователи объектов будут ежегодно платить целевой
    взнос на охрану природных территорий.


    Подробнее в новости


    Законопроект № 1096223-8


    #законодательство'
