  text: "Стройка и ремонт отнимают много сил, поэтому мы придумали, как провести перерыв\
    \ весело и с пользой для бюджета.\n\nЗапускаем залипательную игру «3 в ряд» от\
    \ ТЕХНОНИКОЛЬ! \n\nМы заменили привычные кристаллы на кое-что поважнее: собирайте\
    \ комбинации из трех и более упаковок нашей минеральной тепло - и звукоизоляции\
