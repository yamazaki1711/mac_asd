  text: 'Уплата договорной неустойки не означает регресс — ВС


    ➡️ Истец потребовал взыскать с покупателя сумму, которую ранее уплатил продавцу
    как договорную неустойку. Он ссылался на то, что просрочка возникла из‑за нарушения
    ответчиком срока вывоза металлолома. Первая инстанция отказала в иске из-за пропуска
    исковой давности, исчисленный с окончания срока вывоза товара.


    Апелляция и кассация с этим не согласились. Они посчитали иск регрессным. Значит
    срок исковой давности надо считать с момента уплаты неустойки продавцу.


    ⚖️ Верховный суд оставил в силе решение первой инстанции. Регресс применяется,
    когда одно лицо возмещает вред за другое. В данном случае продавец уплатил неустойку
    сам за себя по своему договору купли-продажи с продавцом, а не за ответчика. 


    А раз требование не является регрессным, применяется общий порядок исчисления
    срока исковой давности: с момента, когда лицо узнало или должно было узнать о
    нарушении своего права. 


    📄 Источник: определение ВС от 18.02.2026 по делу № А40-179769/2024


