  text: "\U0001F608 Друзья, рубрика «миллионы за товарный знак» продолжается.\n\n\
    На этот раз героиня - удмуртский предприниматель Вера Пирожок.\n\nИстория простая:\
    \ Вера торговала на Ozon инструментами Makita. По всей видимости (судя по делу)\
    \ не оригинальными, а с шильдиком, где не было ни даты изготовления, ни серийного\
    \ номера, ни даже знака ЕАС.\n\nЯпонская Makita Corporation, которая является\
    \ правообладателем товарного знака Makita (зарегистрирован в 2019), посчитала.\
    \ И вышло, что с февраля 2023 по январь 2024 Вера продала больше 38 тысяч единиц\
    \ такого «инструмента».\n\nПо минимальной оценке - это почти 700 млн рублей ущерба.\
    \ В иске японцы снизили требования до 300 млн.\n\nСчитали по всей видимости по\
    \ данным статистики маркетплейса. О том как суды сейчас быстро разбирают такую\
    \ доказательную базу писал недавно подробно на Zakon.ru\n\nСуд взыскал 300 млн\
    \ компенсации плюс два миллиона госпошлины \U0001F937‍♂\n\nСуды в таких спорах\
    \ уже не церемонятся. Особенно когда речь идёт о массовых продажах на маркетплейсах.\
    \ Цифры там прозрачные, база доказательная - железобетонная.\n\nИ да, 300 млн\
    \ для индивидуального предпринимателя - это не просто «много». Это точка невозврата.\
    \ Стоило ли оно того? \n\nЗавидую я, конечно, японцам. У них и инструменты хорошие,\
    \ и юристы - звери \U0001F601"
