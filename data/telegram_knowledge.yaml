  text: '❓ Как определяется глубина котлована и величина откоса в разделе  ПОС 📋📋📋


    ➡️ Первый шаг – нужно определить от каких отметок будет выполняться разработка
    котлована.

    Глубина котлована зависит от многих факторов и первое, на что нужно обратить внимание
    – от каких отметок будет определяться глубина, от черных или красных. В разделе
    ПЗУ на плане земляных масс указывается черная отметка земли — отметка существующая
    до начала работ и красная отметка земли — планировочная отметка. Данное решение
    принимается на основании описанной в разделе ПОС организационно-технологической
    схемы (ОТС).  💡 Давайте рассмотрим наиболее частые вариант:

    1. Если разделом ПЗУ не предусматриваются решения по снятию грунта (см. «План
    земляных масс»), то разработка котлована выполняется от черных отметок;

    2. Если разделом ПЗУ предусматривается снятие растительного или техногенного грунта,
    то разработка котлована выполняется от промежуточных отметок после снятия растительного
    или техногенного грунта;

    3. Если разделом ПЗУ предусматривается устройство насыпи, и с учетом конструктивных
    решения строительство возможно только после устройства проектируемой насыпи, то
    при указании соответствующих обоснований в ОТС разработка котлована выполняется
    от красных отметок.

    При спокойном рельефе местности на участке строительства для подсчетов можно принять
    среднее значение черных отметок.

    ➡️ Следующий шаг -  необходимо определить отметку дна котлована, которая зависит
    от конструктивных решений проектируемого здания и сооружения. Как правило, отметка
    дна котлована соответствует отметки низа подготовки фундамента. В случае замещения
    грунта или устройства подушки в основания фундамента, отметка дна котлована будет
    соответствовать отметки низа подушки.

    Разница между исчисленной таким образом отметкой рельефа и проектной отметкой
    дна котлована составит глубину земляных выемок.

    При значительных перепадах рельефа пятно застройки разбивается на участки примерно
    с

    одинаковыми отметками, которые затем усредняются.

    ⏺️ Крутизна откоса бывает нормативной и ненормативной (определяется расчетом)
    и зависит от вида грунта и глубины котлована. Нормативный показатель приведен
    в приложение N 4 к Правилам по охране труда при строительстве, реконструкции и
    ремонте, утвержденным приказом Министерства труда и социальной защиты Российской
    Федерации от 11 декабря 2020 г. N 883н и СНиП 12-04-2002 п.5.2.6.

    ВАЖНО! Крутизна откосов траншей и котлованов глубиной более 5 м во всех случаях,
    глубиной менее 5 м при неблагоприятных гидрогеологических условиях и при грунтах,
    на предусмотренных таблицей, должна  устанавливаться в проекте по расчету.‼️‼️‼️‼️'
