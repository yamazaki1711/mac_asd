  text: '«Дело Долиной» не для всех


    Верховный суд оставил в силе решения апелляции и кассации, признавших недействительной
    сделку по продаже квартиры 73-летней женщины директору риелторского агентства.
    Ссылка покупателя на резонансное «дело Долиной», где ВС поддержал приобретателя,
    не сработала, пишет Право.ru.


    🏠 Пожилая собственница под влиянием мошенников продала единственное жилье за 1,9
    млн руб., деньги передала курьеру. Психолого-психиатрическая экспертиза установила,
    что женщина не понимала значения своих действий.


    📌 Покупатель настаивал на добросовестности, но суды учли его профессиональный
    статус: руководитель агентства недвижимости не мог не видеть заниженной цены и
    срочности продажи. ВС с этим согласился.


    💼 Ведущий юрист Land Law Firm Софья Бабушкина отмечает: универсального подхода
    к таким спорам нет, и суды дифференцировали стандарт добросовестности по профессиональному
    статусу участника оборота. Риелторам и агентствам недостаточно формальной проверки
    юридической чистоты сделки — от них ждут повышенной осмотрительности, особенно
    при срочной продаже или заниженной цене.


    📎 При этом, по словам эксперта, новая позиция ВС — это лишь часть пазла судебной
    практики, которая формируется по подобным делам прямо сейчас.


    Подробнее в новости


