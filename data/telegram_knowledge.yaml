  text: "‼ Чужая подпись – не повод считать договор незаключенным \U0001F447\n\n✍\
    \ Все потому, что имеет значение наличие фактических правоотношений. Тогда подпись\
    \ на договоре превращается в простую формальность, без которой можно обойтись.\n\
    \n\U0001F3E0 Один ИП передал другому ИП помещение в безвозмездное пользование,\
    \ ссудополучатель в свою очередь сдал его в аренду. После смерти сторон один из\
    \ наследников заявил о том, что договор безвозмездного пользования не может считаться\
    \ заключённым из-за наличия на нем чужой подписи, что подтверждалось экспертизой.\n\
    \n\U0001F4CC Формулировка иска\n\n✏ О признании договора незаключенным\n\n\U0001F4CC\
    \ Позиции судов\n\n⚖ Все три инстанции, включая СКЭС ВС РФ, в иске отказали.\n\
    \n\U0001F4B8 Если сторона приняла от другой стороны полное или частичное исполнение\
    \ по договору либо иным образом подтвердила действие договора, она не вправе недобросовестно\
    \ ссылаться на то, что договор является незаключенным (п. 3 ст. 432 ГК РФ).\n\n\
    \U0001F4DC Заявление о недействительности сделки не имеет правового значения,\
    \ если ссылающееся на недействительность сделки лицо действует недобросовестно,\
    \ в частности если его поведение после заключения сделки давало основание другим\
    \ лицам полагаться на действительность сделки (п. 5 ст. 166 ГК РФ, п. 2 ст. 431.1\
    \ ГК РФ).\n\n\U0001F4BC Комментарий юристов \"Реаналитики\":\n\n\U0001F9E9 Фактическое\
    \ исполнение спорного договора и владение имуществом подтверждает наличие волеизъявления\
    \ сторон. \n\n\U0001F50D Определение ВС РФ от 06.03.2026 г. по делу № А43-38143/2023\n\
    https://m.kad.arbitr.ru/Card/594f849c-eac4-442e-8d7a-4726f6d8d001\n\n⁉ Как Вы\
    \ думаете, нужно ли вообще оценивать наличие подписи на договоре?\n\n\U0001F44D\
    \ – Да, но в совокупности с другими доказательствами.\n\U0001F914 – Нет, она не\
    \ имеет значения.\n\nPS: Выводы являются обобщёнными. Для конкретных рекомендаций\
    \ и решений обратитесь в “Реаналитику”\nreanalitika.ru.\n\n#арбитражныйпроцесс,\
    \ #договор, #подпись\n@arbitrium_processus\nhttps://t.me/arbitrium_processus"
