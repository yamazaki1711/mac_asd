    технической части ПД по различным видам объектов;

    📌 увеличение сроков и стоимости разработки ПД;

    📌 нормативное перераспределение стоимости проектных работ между стадиями ПД и
    РД в сторону ПД (как минимум 70%/30%);

    📌 упрощение порядка применения типовой ПД.


    Возможный результат: общее сокращение инвестиционно-строительнго процесса за счет
    обеспечения приемлемой точности и достоверности определения сметной стоимости
    на первоначальном этапе и снижения количества корректировок ПСД в процессе строительства.


    Преимущества: сокращение общего срока и стоимости реализации значительного количества
    типовых и серийных проектов за счет сокращения объёма корректировок и прохождения
    повторных экспертиз ПСД и унификации проектных решений, обеспечение приемлемой
    точности и достоверности определения сметной стоимости на первоначальном этапе
    вследствие более глубокой проработки проектных решений в части определения и обоснования
    объемов работ и затрат, сужение границ возможного изменения стоимости строительства.


    Недостатки: увеличение сроков и стоимости проектных работ, проверок, экспертизы
    и согласования ПСД на первоначальном этапе; необходимость внесения значительных
    изменений в инвестиционно-строительный процесс и уточнения порядка разработки
    ПД по типовым проектам и формирования работающей и функциональной библиотеки типовых
    проектов.


