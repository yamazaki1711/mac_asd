  text: 'ПРОГОСЗАКАЗ.РФ (VK)


    ⚖️ Споры о необходимости требовать совокупное количество баллов на медицинские
    перчатки продолжаются


    Заказчик закупал «Перчатки хирургические из латекса гевеи, неопудренные», код
    КТРУ 22.19.60.113-00000001, которому соответствует единственный код ОКПД2 22.19.60.113цией
    № 69 пр, и установил ограничение закупок товаров, происходящих из иностранных
    государств, в соответствии с Постановлением № 1875, сопоставив данный товар с
    позииложения № 2.


    Один из участников закупки в составе заявки приложил регистрационное удостоверение
    № РЗН 2023/19829 и номер реестровой записи из РРПП 10540910, в котором указан
    код ОКПД2 22.19.60.111.


    Заказчиком данная заявка была отклонена ввиду отсутствия в заявке сведений о совокупном
    количестве баллов. Антимонопольная служба признала отклонение законным. Участник
    решил оспорить решение контрольного органа в суде.


    🔻Правовая оценка суда:


    Товар с кодом ОКПД2 – 22.19.60.111 «Перчатки хирургические резиновые» содержится
    в разделе VII «Медицинские изделия» приложения к Постановлению № 719.


    В целях отнесения продукции с кодом ОКПД2 – 22.19.60.111 «Перчатки хирургические
    резиновые» к промышленной продукции, произведенной на территории Российской Федерации,
    необходимо подтвердить выполнение с 01.01.2019 следующих требований:


    ● наличие у юридического лица – налогового резидента стран – членов ЕАЭС прав
    на техническую документацию и конструкторскую документацию в объеме, достаточном
    для производства соответствующей продукции на срок не менее 5 лет;

    ● соблюдение процентной доли стоимости использованных при производстве (изготовлении)
    иностранных товаров – не более 50 процентов цены товара.


    Иных критериев, в том числе требующих достижения баллов, для продукции с кодом
    ОКПД2 22.19.60.111 Постановлением № 719 не предусмотрено.


    При этом товар с кодом ОКПД2 22.19 «Изделия из резины прочие (за исключением услуг)»,
    для которого предусмотрено указание информации о совокупном количестве баллов
    за выполнение (освоение) на территории Российской Федерации соответствующих операций
    (условий), содержится в разделе XXI «Химическая и нефтегазохимическая продукция».


    Таким образом, необходимо различать критерии отнесения продукции к товарам российского
    происхождения для кодов ОКПД2 22.19.60.111 и 22.19.60.113, так как для последнего
    кода в разделе XXI «Химическая и нефтегазохимическая продукция» определены требования
    о наличии баллов.


    Вместе с тем, поскольку код ОКПД2 – 22.19.60.111 «Перчатки хирургические резиновые»
    содержится в разделе VII «Медицинские изделия» приложения к Постановлению № 719,
    применение к указанному товару критериев по коду ОКПД2 – 22.19 «Изделия из резины
    прочие (за исключением услуг)», включенному в раздел XXI «Химическая и нефтегазохимическая
    продукция» приложения к Постановлению № 719, не допускается.


    Код ОКПД2 22.19.60.111 продукции, указанный заявителем в своей заявке соотносится
    с предметом рассматриваемой закупки. Следовательно, к указанной продукции не применяется
    требование о совокупном количестве баллов, установленное Постановлением № 719.


    Решение УФАС было признано незаконным.


    В другом деле по аналогичным обстоятельствам арбитражный суд вынес совершенно
    противоположное решение, согласно которому на хирургические перчатки распространяются
    требования о совокупном количестве баллов (Решение АС Омской области от 02.04.2026
    по делу № А46-24245/2025).


    📄 Решение АС города Москвы от 23.12.2025 по делу № А40-194741/2025'
