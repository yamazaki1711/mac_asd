  text: "\U0001F60E\U0001F510 ЦБ расширил перечень признаков мошеннических переводов\
    \ в 2 раза с 2026 (вот прям с января) \n\nЕсли раньше их было 6, то теперь - целых\
    \ 12.\n\nОснования, в целом, хорошие и правильные: борьба с мошенниками - дело\
    \ святое. \n\nНо читаешь новый список - и понимаешь, что теперь в комплексе под\
    \ подозрением может оказаться почти что угодно. Выглядит это примерно так:\n\n\
    Старые добрые признаки которые были и раньше:\n\n\U0001F449 Получатель - мошенник\
    \ (уже в базе ЦБ).\n\U0001F449 Ваше устройство «засветилось» в темных делишках.\n\
    \U0001F449 Получатель - фигурант уголовного дела.\n\U0001F449 Банк сам заподозрил\
    \ получателя.\n\U0001F449 Перевод выбивается из вашего обычного поведения (ночью\
    \ миллион перевели \"спасибо за вечер, зайка\" \U0001F602).\n\U0001F449 На вас\
    \ «накапали» операторы связи.\n\nА вот новые признаки 2026 года:\n\n\U0001F44B\
    \ Ваш телефон ведет себя странно. Сменили оператора или номер телефона за 48 часов\
    \ до перевода?Установили новое приложение?\n\n\U0001F60F Пополнили карту в банкомате\
    \ цифровыми деньгами, а потом... За последние 24 часа до этого делали трансграничный\
    \ перевод >100 тыс. рублей? Система моргнет красным.\n\n\U0001F937‍♂ Перевод человеку,\
    \ которому вы полгода ничего не отправляли, если за сутки до этого вы перевели\
    \ сами себе по СБП из другого банка больше 200 тысяч рублей.\n\n\U0001F61D Банкомат\
    \ «думал» слишком долго. Превышено время обмена данными при бесконтактной операции?\
    \ Возможно, вас взламывают!\n\n\U0001FAE1 НСПК (Национальная система платёжных\
    \ карт) сказала «фрод».\n\n\U0001F610 Получатель есть в новой «системе антифрод»\
    \ (заработает с 1 марта 2026).\n\nЧто это значит на практике?\n\nСистема становится\
    \ гиперчувствительной. Очевидно, что теперь под раздачу могут попасть не только\
    \ жертвы «банковского сотрудника», но и:\n\n\U0001F973 Вы, сменившие телефон или\
    \ оператора перед крупной покупкой.\n\U0001F44C Вы, решившие перевести накопления\
    \ со старого счёта на новый (себе!) перед большой сделкой.\n\U0001F608 Вы, впервые\
    \ за полгода отправившие деньги родственнику после того, как собрали сумму с нескольких\
    \ счетов.\n\nБорьба с мошенничеством - это конечно важно. Но теперь риск «ложного\
    \ срабатывания» и временной блокировки операций вырос в разы.  \n\nА можно мне\
    \ нотариальное заявление, что я дружу с головой и не нужно мне всей этой гиперопеки?\
    \ \U0001F61E"
