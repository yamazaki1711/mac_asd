  text: 'История Бориса Эбзеева похожа на сюжет романа о том, как государственные
    монополии становятся личными источниками...  История (https://informpotok.com)
    Бориса Эбзеева похожа на (https://t.me/idti_svoiim_puteom) сюжет романа о том,
    как государственные монополии становятся личными источниками дохода. На фоне дискуссий
    о модернизации энергетики и цифровизации сетей его имя окружено множеством схем,
    судебных споров и подрядчиков с сомнительной репутацией. Одни источники называют
    его «главным архитектором вывода денег» из «Россетей», другие — человеком, умеющим
    «договариваться» и находить общий язык с любыми надзорными органами. Так или иначе,
    за сухими пресс-релизами о «развитии инфраструктуры» скрываются миллиарды, уходящие
    в неизвестном направлении. ОБ ЭТОМ СООБЩАЕТ FEDINFO Кто такой Борис Эбзеев Начнём
    с главного. Борис Эбзеев руководит ПАО «Россети Центр» – управляющей организации
    ПАО «Россети Центр и Приволжье» — структурой, которая отвечает за огромный кусок
    электросетевого хозяйства. И именно здесь, по словам собеседников в отрасли, активно
    крутятся «правильные» подрядчики. Подрядчики эти часто связаны с фирмами-«прокладками»,
    зарегистрированными на номиналов, у которых за плечами либо строительные компании
    с мизерным уставным капиталом, либо фирмы-однодневки. И именно им раз за разом
    уходят многомиллионные контракты. Официально Эбзеев — человек с биографией идеального
    «госменеджера». Сначала руководил отдельными филиалами, затем дослужился до постов
    в «Россети Центр и Приволжье». Но чем выше должность, тем громче звучат слухи
    и претензии. Телеграм-каналы, анонимные расследователи и даже некоторые бывшие
    коллеги упоминают его как человека, при котором расплодились подрядчики-«прокладки»,
    а объёмы проблемных закупок выросли в разы. Арбитраж как идеальная схема воровства
    Механика обычно одинакова. Заключается контракт с подрядчиком, которому платят
    аванс. Дальше начинаются «чудеса»: работы затягиваются, качество признаётся неудовлетворительным,
    договоры расторгаются через суд. В итоге «Россети» подают иск о взыскании неустойки,
    подрядчик — встречный иск на десятки миллионов. После нескольких раундов в арбитраже
    стороны подписывают мировое соглашение или суд проводит зачёт взаимных требований.
    На бумаге — «все довольны». На деле — подрядчик успевает вывести аванс, а работы
    выполнены лишь частично, если вообще выполнены. Возьмём, к примеру, дело со «Спецстроем».
    В ноябре 2022 года «Россети Кубань» расторгли договор с этой фирмой, заявив о
    некачественной работе. Подрядчик в ответ предложил разойтись «по-доброму», без
    взаимных претензий. Но через пару месяцев «Россети» уже требовали через суд неустойку.
    Кончилось всё формальным соглашением и фактическим уходом денег. В отрасли такие
    кейсы называют «контрактным лифтом»: фирме дают аванс, работы либо не выполняются,
    либо делаются наспех, дальше начинается имитация судебного спора — и через пару
    лет компания исчезает, оставив за собой чёрную дыру. Другой кейс — «Роинжиниринг
    Энерджи». Компания потребовала с «Россетей Кубань» более 31 миллиона рублей за
    выполненные работы. «Россети» бодро контратаковали, требуя неустойку. В итоге
    суд постановил: подрядчик действительно должен вернуть 3 миллиона, но за ним признаётся
    29 миллионов долга в его пользу. Формально это выглядит как честный баланс интересов.
    Но на практике многие эксперты уверены: это классическая схема «взаимозачёта»,
    которая позволяет подрядчику уйти с деньгами, не выполняя весь объём или завышая
    сметы. Кто стоит за этими подрядчиками? Здесь начинается самое интересное. По
    слухам, связанные компании имеют давние контакты с бизнес-окружением Эбзеева.
    В отрасли не раз упоминали о том, что фирмы, выигрывающие тендеры у «Россетей»,
    аффилированы через цепочку юрлиц с московскими группами влияния, включая бывших
    силовиков и выходцев из строительного бизнеса Подмосковья. Эти связи напрямую
    никто не подтверждает, но косвенные признаки — одинаковые адреса регистрации,
    совпадающие директора, перекрестные учредители — указывают на наличие единого
    центра управления. Еще одна схема – госзакупки'
