  text: 'В столичном строительном блоке произошли кадровые перестановки


    Мэр Москвы Сергей Собянин провел ряд назначений в строительной и имущественной
    сферах столичной администрации. Руководителем департамента гражданского строительства
    назначен Алексей Александров, сменивший на этом посту Рафика Загрутдинова. Одновременно
    департамент гражданского строительства был реорганизован: к нему присоединён департамент
    развития новых территорий, что отражает стремление властей к более централизованному
    управлению строительными проектами в Москве и Новой Москве.


    Кроме того, новым министром правительства Москвы — руководителем департамента
    городского имущества (ДГИ) стала Екатерина Соловьева, ранее возглавлявшая московское
    управление Федеральной антимонопольной службы. Ее предшественник Максим Гаман
    теперь возглавит АО "Мосинжпроект" — крупнейшего городского подрядчика, ответственного
    за реализацию ключевых инфраструктурных проектов столицы.'
