  text: '❤️ 14 февраля: Любовь, суд и замена юристов на искусственный интеллект


    Хотел написать «юридический» пост на тему 14 февраля и заодно протестировать возможности
    ИИ.


    Идея была такая: найти подходящее судебное решение и интересно про него написать.


    И вот к поиску судебной практики я подключил ИИ. Написал промт на поиск свежего
    судебного решения про 14 февраля и любовь и отправил его в чат GPT, ГигаЧат и
    ДипСик. Типа пусть конкурируют.


    Три нейронки выдали плюс-минус похожие результаты, но было одно дело, которое
    показалось мне интересным:


    «В 2024 году суд Краснодара обязал девушку вернуть бывшему молодому человеку 500
    тыс. руб., которые тот перевел с пометкой «На наши кольца к 14.02». Ответчик утверждал,
    что это был подарок, но суд признал перевод целевым займом — из-за отсутствия
    договора дарения и наличия четкой цели в назначении платежа»


    Нейросети справились неплохо — в качестве материала для поста это дело показалось
    подходящим, и я стал искать первоисточник — само судебное решение.


    И знаете что? Оказалось, что такого дела нет и никогда не было. Этот результат
    оказался галлюцинацией искусственного интеллекта.


    Забавно, конечно. Ладно я, использую ИИ скорее для развлечения. Но очень многие
    эксперты по нейросетям (ранее - эксперты по криптовалютам и ковиду) рекомендуют
    юристам использовать нейронки именно для подбора судебной практики. А иногда и
    для подготовки процессуальных документов.


    Этот случай с несуществующим судебным решением демонстрирует одну из ключевых
    проблем ИИ – генерацию недостоверной информации. Это необходимо учитывать при
    использовании нейросетей в профессиональной деятельности, где точность данных
    критична.


    Короче говоря, пока нейросети юриста не заменят. Но назначение платежа в переводах
    лучше все-таки указывать 😎.


    С уважением,

    Адвокат Евгений Шупиков


    П.С. Кстати, что с 14 февраля? Уже подарили/получили подарки или ждем вечера?'
