  text: 'Особые требования к упаковке медизделий не требуют медико-технического обоснования,
    решило УФАС


    Участник аукциона на поставку операционных халатов пожаловался на избыточные требования
    к их двойной упаковке в виде пакета из медицинской бумаги и полимерной пленки.


    Заявитель отметил: ГОСТ Р 58551-2019 разрешает заказчикам устанавливать специфические
    требования к подобной продукции только при наличии медико-технического обоснования,
    которое заказчик не привел. При этом ГОСТ 11607-1-2018 допускает использовать
    и иные варианты упаковочных систем.


    УФАС не нашло нарушения:


    ● заказчик вправе устанавливать характеристики товара, отвечающие его потребностям.
    Закон N 44-ФЗ не обязывает его подстраиваться под всех участников рынка;

    ● требования к упаковке были обусловлены спецификой применения медизделий в условиях
    операционного блока, что соотносится с целями оказания медпомощи и не противоречит
    законодательству.


    Контролеры также не увидели нужды в отдельном медико-техническом обосновании параметров
    упаковки, поскольку они не выходили за пределы стандартных характеристик медизделий
    подобного вида. #ТЗ


    Документ: Решение Красноярского УФАС России от 16.03.2026 N 024/06/105-664/2026


    © КонсультантПлюс'
