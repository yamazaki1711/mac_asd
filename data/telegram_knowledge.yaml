  text: '❓ Разработка скальных грунтов – что нужно учесть в ПОС и ВОР ПОС 📋📋📋


    ✍ Согласно ГЭСН 81-02-01-2020 р. I Общие положения п. 1.1.29 при разработке грунтов,
    содержащих негабаритные включения, в проекте должны быть предусмотрены мероприятия
    по их разрушению или удалению за пределы площадки. Негабаритными считаются валуны,
    камни, куски разрыхленного мерзлого и скального грунта, наибольший размер которых
    превышает:

    - 2/3 ширины ковша - для экскаваторов, оборудованных обратной лопатой или оборудованием
    прямого копания;

    - 1/2 ширины ковша - для экскаваторов, оборудованных драглайном;

    - 2/3 наибольшей конструктивной глубины копания - для скреперов;

    - 1/2 высоты отвала - для бульдозеров и грейдеров;

    - 1/2 ширины кузова и по весу половину паспортной грузоподъемности - для транспортных
    средств;

    - 3/4 меньшей стороны приемного отверстия - для дробилки;

    - 30 см - при разработке вручную с удалением подъемными кранами.

    ➡️ При разработке скального грунта предусматривается:

    -  разрыхление скального грунта отбойными молоткам;

    - бурение отверстий в скальном грунте установками алмазного бурения;

    - разборка скального грунта бетоноломом (гидроклиньями);

    - канатная алмазная резка скального грунта;

    - нарезка продольных прорезей баровой машиной;

    - послойное рыхление грунтов экскаватором с клин-бабой;

    - рыхление скального грунта гидромолотом на базе экскаватора;

    ✏️ При засыпке траншеи и котлованов выполняется предварительное рыхление скального
    грунта бульдозером.

    Согласно ГЭСН 81-02-01-2020 р. I Общие положения п. 1.1.59 ГЭСН на разработку
    скального грунта отбойными молотками (табл. 01-02-065) следует применять в случаях,
    когда не допускается производство взрывных работ.

    Согласно ГЭСН 81-02-01-2020 р. II Исчисление объемов работ п. 2.1.1 при разработке
    мерзлых грунтов и скальных грунтов в траншеях бульдозером с клыком с предварительным
    рыхлением грунтов клыком, размеры траншей по дну следует определять из учета ширины
    ножа бульдозера, задействованного на рыхлении грунта.'
