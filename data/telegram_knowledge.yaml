  text: "Сейчас совокупный годовой доход топ-менеджеров с учётом бонусов может составлять\
    \ 30, 60 и более млн рублей — основательница рекрутинговой компании Danilova Executive\
    \ Search & Consulting Дарья Данилова в интервью директору Всеостройке.рф С. Опрышко\n\
    \n\U0001F7E0Сколько стоит для компании найти топ-менеджера через рекрутинговое\
    \ агентство\nРыночная ставка за услуги по подбору руководителей высшего звена\
    \ составляет 25–30% от совокупного годового дохода кандидата. \n\n«В результате\
    \ из более чем 200 специалистов, с которыми ведется работа, в финальный список,\
    \ как правило, попадают всего 8–10 человек — именно те, кто максимально соответствует\
    \ задаче бизнеса и готов к переходу».\n\n\U0001F7E0Как изменился подход к подбору\
    \ руководителей в последние годы\n«В последние годы ключевым стал запрос на предпринимательское\
    \ мышление: от руководителя ждут не просто выполнения функций, а способности относиться\
    \ к бизнесу как к своему — находить точки роста, повышать эффективность и принимать\
    \ решения с учётом экономики проекта. В девелопменте финансовая дисциплина всегда\
    \ была критически важна».\n\n\U0001F7E0Где сегодня наибольший спрос на подбор\
    \ топ-менеджеров\nПо словам Дарьи, в основном это ОАЭ, Саудовская Аравия и Узбекистан.\n\
    \n\U0001F7E0«Золотой возраст» для топовых позиций\nОптимальный — 40–45 лет. На\
    \ фоне усиливающегося дефицита профессионалов компании всё чаще готовы рассматривать\
    \ кандидатов 50–55 лет — при условии подтверждённого опыта, глубокой экспертизы\
    \ и, главное, достаточного уровня энергии, вовлечённости в бизнес-повестку и способности\
    \ развиваться вместе с рынком.\n\n\U0001F7E0Кого предпочитают брать — мужчин или\
    \ женщин?\n«Сегодня гендерные различия при подборе топ-менеджеров утрачивают прежнюю\
    \ значимость. Среди директоров по девелопменту становится все больше женщин, хотя\
    \ раньше это была абсолютно мужская профессия. Женщины занимают ведущие позиции\
    \ и среди коммерческих, и среди генеральных директоров».\n\nПолное интервью смотрите\
