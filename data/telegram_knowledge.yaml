  text: 'Разрешено изменение существенных условий «строительных» контрактов в связи
    с увеличением ставки НДС


    Опубликовано постановление Правительства РФ, предусматривающее возможность в срок
    до 1 октября 2026 года по соглашению сторон на основании ч. 65.1 ст. 112 Закона
    № 44-ФЗ изменить следующие существенные условия контрактов:


    ● цену контракта в пределах увеличения ставки НДС в отношении товаров, работ,
    услуг, приёмка которых производится после 1 января 2026 года;

    ● объём и (или) виды выполняемых работ, строительных ресурсов без увеличения цены
    контракта.


    Новшество распространяется на заключённые для обеспечения федеральных нужд:


    ● «строительные» контракты жизненного цикла (ч. 16 ст. 34 Закона № 44-ФЗ),

    ● контракты на выполнение работ «под ключ» (ч. 16.1 ст. 34, ч. 56 ст. 112 Закона
    № 44-ФЗ),

    ● «строительные» контракты с одновременной поставкой оборудования, предусмотренного
    проектной документацией (ч. 63.1 ст. 112 Закона № 44-ФЗ),

    ● контракты, предметом которых является выполнение работ по инженерным изысканиям,
    архитектурно-строительному проектированию, строительству, реконструкции, техническому
    перевооружению, капитальному ремонту, сносу объектов капитального строительства,
    текущему ремонту зданий, благоустройству территории, работ по сохранению объектов
    культурного наследия, строительному контролю, авторскому надзору.


    Возможность изменить существенные условия по данному основанию распространяется
    также на контракты в сфере строительства, заключённые до 1 января 2026 года, если
    увеличенный размер ставки #НДС не предусмотрен условиями контрактов.


    Региональным органам власти и местным администрациям рекомендовано принять меры,
    обеспечивающие возможность изменения условий контрактов с аналогичным предметом.


    Документ вступил в силу 15 апреля 2026 года.


    Документ: Постановление Правительства РФ от 15.04.2026 № 416


    Источник: ЭТП «Фабрикант»'
