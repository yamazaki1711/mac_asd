  text: 'ПРОГОСЗАКАЗ.РФ (VK)


    ⚖️ Несоответствие товара из РРПП предмету закупки является основанием для отклонения
    заявки


    Заказчик оспорил решение УФАС в суде. По его мнению, комиссия заказчика не должна
    проверять характеристики товара, в отношении которого представлены реестровые
    номера из РРПП. В соответствии с Постановлением № 1875, целью указания номера
    реестровой записи в заявке на участие в закупке является подтверждение страны
    происхождения товара, а не подтверждение характеристик предлагаемого товара.


    Антимонопольная служба возражала против данных доводов, указывая, что в заявке
    участника представлен реестровый номер на товар, содержащий иное наименование
    и иное предназначение, чем наименование и характеристики товара, указанные в извещении
    о закупке.


    🔻Правовая оценка суда:


    Объектом закупки являются рамка А3 в количестве 700 штук, рамка А4 в количестве
    1900 штук. Согласно извещению о проведении электронного аукциона, заказчик применил
    ОКПД2 22.29.26.190 - Изделия пластмассовые прочие. Материал рамки — пластик. Товар
    соответствует позиции 80 приложения № 2 к Постановлению № 1875, в связи с чем
    заказчиком установлено ограничение на допуск иностранных товаров.


    В спорной заявке участник предоставил выписку из РРПП под номером 10436438 с наименованием
    «Рамка». В описании данного товара в каталоге ГИСП размещена следующая информация:
    «Рамка служит для установки электроустановочных изделий с посадочным местом».


    Производитель рамки ООО «ИЭК ХОЛДИНГ» является ведущим производителем и поставщиком
    электротехнической продукции и не занимается производством рамок, являющихся предметом
    закупки (рамок для благодарственных писем).


    Таким образом, представленная предпринимателем выписка из РРПП не соответствует
    объекту закупки, указанному в извещении.


    Сам по себе факт того, что номер реестровой записи 10436438 действительно содержится
    в РРПП, не свидетельствует о соответствии предложенного предпринимателем товара
    требованиям извещения о закупке в части соблюдения положений законодательства
    о «национальном режиме». Номер реестровой записи 10436438 подтверждает страну
    происхождения товара, однако товара, не относящегося к предмету закупки и не заявленного
    в извещении о закупке заказчиком.


    Предложение предпринимателем к поставке рамок А3 и А4 при использовании реестровой
    записи реестра российской промышленной продукции № 10436438, которая включена
    в реестр по заявке производителя товара ООО «ИЭК ХОЛДИНГ» для подтверждения российского
    происхождения продукции «Рамка для установки электроустановочных изделий с посадочным
    местом», нарушает перечисленные положения законодательства о контрактной системе
    и цель установления «национального режима».


    📄 Решение АС Вологодской области от 27.03.2026 г. по делу № А13-184/2026'
