  text: "\U0001F6E3 Дорожным подрядчикам грозит массовое банкротство \n\nНациональная\
    \ ассоциация инфраструктурных компаний обратилась в Правительство РФ с предложениями\
    \ по поддержке подрядных организаций в сфере транспортного строительства в связи\
    \ с ухудшением их финансового состояния.\n\nПо данным ассоциации, ключевыми проблемами\
    \ отрасли стали сокращение бюджетного финансирования, задержки приемки и оплаты\
    \ выполненных работ, а также рост административной и проверочной нагрузки. Это\
    \ приводит к кассовым разрывам и вынуждает компании привлекать кредиты либо накапливать\
    \ задолженность по налогам.\n\nВ числе предложенных мер:\n➡️введение до конца\
    \ 2027 года моратория на банкротство подрядчиков;\n➡️мораторий на привлечение\
    \ руководителей к субсидиарной и уголовной ответственности при банкротстве;\n\
    ➡️ограничение проверок со стороны контрольных органов, включая Счетную палату,\
    \ Федеральное казначейство, Генеральную прокуратуру РФ и ФНС;\n➡️предоставление\
    \ отсрочек по налогам и сборам на срок до 12 месяцев с возможностью продления;\n\
    ➡️введение моратория на начисление штрафов и пеней по госконтрактам до завершения\
    \ работ.\n\nТакже ассоциация обратила внимание на практику одностороннего отказа\
    \ заказчиков от исполнения контрактов и предложила закрепить подход, при котором\
    \ такие решения допускаются только при отсутствии нарушений со стороны заказчика\
    \ и наличии подтвержденной вины подрядчика.\n\nСовокупный объем дебиторской задолженности\
    \ и непредъявленной выручки достиг 696 млрд руб., что, по оценке ассоциации, свидетельствует\
    \ о системных кассовых разрывах. При этом рост кредитования ограничен высокой\
    \ ключевой ставкой и отказами банков в выдаче новых займов.\n\n\U0001F609 Подписаться\
    \ на Актион Строительство | \U0001F972Актион Строительство в MAX"
