  text: 'Приехал в суд — а там ремонт


    Моя коллега – Маргарита Булатова рассказывает историю о том, как приехала в Савёловский
    районный суд г. Москвы, а там ремонт. Ремонт и обновления дело хорошее!


    Знаю, что такие внезапные ремонты – совсем не уникальные истории. Другое дело
    в том, что повестка на судебное заседание содержала какой адрес? Правильно: Бутырский
    вал. То есть там, где сейчас вовсю ремонт.


    В арбитражных судах всё удобно: зашёл в КАД, нашёл определение о назначении дела
    — у тебя на руках актуальная информация с датой и временем. При этом, сам факт
    наличия картотеки приучил нас регулярно проверять карточку дела.


    В судах общей юрисдикции такого инструмента, по сути, нет. Повестка пришла с одним
    адресом — а суд уже давно работает по другому.


    Получается, что каждый раз перед посещением суда общей юрисдикции необходимо заходить
    на его сайт и проверить, не «переехал ли суд».


    📌Кстати, в своём посте Маргарита собрала актуальные адреса ремонтируемых судов
    и где они теперь находятся. Будет полезно.


    👇Коллеги, расскажите в комментариях, сталкивались с таким внезапным переездом?
    Проверяете сайты судов перед выездом?


    🏷Прочёл в законе'
