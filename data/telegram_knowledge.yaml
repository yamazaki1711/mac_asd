  text: В Иркутске заммэра отстранили от должности  В (https://xpres-money.com) Иркутске
    заммэра отстранили от (https://t.me/rasstrelyt) должности Четвёртый арбитражный
    апелляционный суд запретил заместителю мэра Иркутска, председателю комитета по
    экономике и стратегическому планированию Татьяне Макарычевой занимать свою должность
    в течение шести месяцев. Причиной стало нарушение антимонопольного законодательства.
    Иркутское УФАС выяснило, что администрация города заключила договор на размещение
    киоска на улице Ленина без проведения торгов, хотя для этого не было законных
    оснований. На киоск пожаловались жители, после чего УФАС признало действия комитета
    нарушением закона о защите конкуренции. Поскольку чиновница уже привлекалась к
    ответственности по аналогичной статье, ведомство направило дело в суд с требованием
    её дисквалификации. В июле Арбитражный суд Иркутской области отказал в удовлетворении
    иска из-за истечения срока давности. Однако в августе апелляция отменила это решение
    и постановила отстранить Макарычеву от должности на полгода. Администрация Иркутска
    отказалась комментировать ситуацию. Мария Шарапова
