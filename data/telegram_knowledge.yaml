  text: '⚖️ ‌Опережающий иск к заказчику как способ защиты от РНП: признание одностороннего
    отказа от исполнения госконтракта незаконным и взыскание оплаты за выполненные
    работы


    Процессуальная активность исполнителя при получении уведомления заказчика об одностороннем
    отказе от исполнения контракта является одним из решающих факторов защиты от РНП.
    В данном споре мы реализовали стратегию судебного обжалования действий заказчика
    до завершения проверки в УФАС по Краснодарскому краю. Это позволило сформировать
    доказательственную базу добросовестности исполнителя и взыскать оплату за фактически
    выполненную работу в судебном порядке.


    Обстоятельства спора


    Министерством транспорта и дорожного хозяйства Краснодарского края было принято
    решение об одностороннем отказе от исполнения контракта в связи с невыполнением
    ООО «Кадастровый Центр» работ в полном объеме, после чего у общества появилась
    опасность попасть в РНП.


    Не согласившись с действиями Министерства и не дожидаясь решения антимонопольного
    органа относительно РНП, мы обратились в Арбитражный суд Краснодарского края с
    иском о признании незаконным решения об одностороннем отказе от исполнения контракта
    и взыскании стоимости фактически выполненных работ.


    Защита в УФАС


    На момент проверки антимонопольным органом факта одностороннего отказа Заказчика
    от исполнения контракта у нас на руках уже было определение суда по делу № А32-67379/2023
    о принятии вышеуказанного иска к производству, которое мы приобщили в обоснование
    нашей позиции, тем самым подтвердив намерение защищать свои интересы в суде.


    В антимонопольном органе мы доказывали, что принимали необходимые меры для надлежащего
    исполнения условий контракта, что подтверждало добросовестное отношение общества
    к выполняемой работе и намерение исполнить свои обязательства по контракту.


    УФАС по Краснодарскому краю оценил поведение Общества на предмет его добросовестности
    и направленности действий на фактическое исполнение контракта и отказал во включении
    сведений о компании в РНП.


    🔻Решение суда и ключевые выводы:


    Арбитражный суд Краснодарского края по делу № А32-67379/2023 исковые требования
    ООО «Кадастровый Центр» к Министерству удовлетворил в полном объеме:


    ● признал незаконным (недействительным) решение Министерства об одностороннем
    отказе от исполнения государственного контракта.

    ● взыскал с Министерства в пользу общества денежные средства за фактически выполненные
    работы, расходы на проведение судебной экспертизы, расходы по уплате госпошлины.'
