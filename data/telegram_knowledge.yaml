  text: '📖Главгосэкспертиза внедрит ИИ-сервис проверки проектной документации в личном
    кабинете заказчика


    ГГЭ планирует до конца 2026 года запустить в личном кабинете заказчика новый сервис
    на базе искусственного интеллекта. Об этом сообщил Александр Перепелица на отраслевом
    форуме по управлению строительными проектами.


    Речь идет о цифровом инструменте, который позволит автоматически анализировать
    проектную документацию еще до подачи на экспертизу. Сервис будет формировать чек-листы
    с выявленными ошибками и несоответствиями, что даст возможность устранить их заранее
    и снизить риск получения отрицательного заключения.


    ➡️В системе ГГЭ накоплен значительный массив данных: миллионы файлов сметной документации,
    сотни тысяч заключений экспертизы и десятки тысяч пояснительных записок. За последние
    три года объем машиночитаемых данных вырос кратно, что позволило активнее внедрять
    инструменты автоматизированной проверки.


    ИИ уже применяется для поиска ошибок и несоответствий, в том числе на этапе входного
    контроля. Новый сервис фактически переносит эту функциональность на сторону заявителя,
    позволяя проводить предварительную самопроверку до подачи документации в экспертизу.


