  text: 'Очередная победа по 161-ФЗ


    Друзья, в предновогодней суете не успел рассказать об очередном успешном кейсе
    разблокировки ИП по 161-ФЗ.


    История интересная: предприниматель проводил операции с криптовалютой через расчётный
    счёт в Точка Банке. Банк, позиционирующий себя как современный, изначално ответил
    формально: «Мы не при делах, идите судитесь с ЦБ». Потом предложил клиенту урегулировать
    проблему с отправителем самостоятельно 🤦🏻‍♂️ Но в итоге все закончилось хорошо,
    банк пошёл навстречу и помог исключить реквизиты ИП из базы.


    Подробный разбор кейса доступен по ссылке — https://shupikov.com/tpost/kak-my-razblokirovali-ip-po-161-fz


    С уважением,

    Адвокат Евгений Шупиков


