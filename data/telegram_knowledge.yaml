  text: "‼ Новый список ошибок подрядчиков: от некомплекта до сдачи работ по э/п \U0001F447\
    \n\n✍ Подрядчик допустил сразу три ошибки и проиграл спор, несмотря на то что\
    \ заказчик не заявлял о замечаниях к работе. Суды объяснили, почему нельзя отправлять\
    \ результат работ по э/п и по какой причине некомплектные работы не имеют потребительской\
    \ ценности.\n\n\U0001F4BB Подрядчик сдал документацию, предназначенную для строительства.\
    \ Заказчик мотивированного отказа и замечаний не заявлял, но сделал экспертизу,\
    \ установившую недостатки в работах, и не стал платить. Подрядчик обратился в\
    \ суд.\n\n\U0001F4CC Формулировка иска\n\n✏ О взыскании задолженности и неустойки\
    \ по договору \n\n\U0001F4CC Позиции судов\n\n⚖ Все три инстанции, включая СКЭС\
    \ ВС РФ, в иске отказали.\n\nОшибка 1⃣\n\n\U0001F449 Недоработанная и некомплектная\
    \ проектная документация, не прошедшая экспертизу достоверности сметной стоимости,\
    \ не могла быть использована как готовый «комплект» и в данном контексте потребительской\
    \ ценности не имела.\n\nОшибка 2⃣\n\n\U0001F449 Подрядчик не выполнил обязательное\
    \ условие договора в части предварительного согласования всех технических решений,\
    \ методов ремонта и организации строительства с заказчиком.\n\nОшибка 3⃣\n\n\U0001F449\
    \ Сдача работ на электронный адрес не предусмотрена условиями заключенного договора.\n\
    \n\U0001F4BC Комментарий юристов \"Реаналитики\":\n\n\U0001F9E9 Частично выполненные\
    \ истцом работы не имели для ответчика потребительской ценности, т.к. в отсутствие\
    \ проектной документации, получившей положительное заключение госэкспертизы, получить\
    \ разрешение на строительство не представляется возможным. Поэтому спорная рабочая\
    \ документация не имела потребительской ценности для целей строительства. \n\n\
