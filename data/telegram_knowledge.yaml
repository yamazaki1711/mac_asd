  text: 'Группа «Самолет» опубликовала отчётность по МСФО за 2025 год


    ✅Выручка выросла на 8% до 366,8 млрд руб.;


    ✅ Валовая прибыль увеличилась на 19% до 131 млрд руб.;


    ✅ EBITDA выросла на 24% и достигла 103,3 млрд руб.;


    ✅ Скорр. чистая прибыль на расход от выбытия инвестиции в проект «Квартал Марьино»
    составила 2,5 млрд руб.


