  text: 'Гибкая подводка нужна для подключения сантехнических приборов, там, где жёсткой
    трубой подключаться неудобно.

    Она соединяет водорозетку или кран с сантехническим прибором или оборудованием
    подключаемым к водопроводу и позволяет сделать монтаж быстро и аккуратно.


    Но важный момент для потребителя: как правильно выбрать длину.

    Слишком короткая подводка будет натянута, слишком длинная — начнёт перегибаться.

    Любая гибкая подводка не терпит избыточное механическое воздействие.


    Разберём, какие длины используются чаще всего.


    Лучше выбирать длину так, чтобы подводка лежала с небольшим мягким изгибом.


    Компания РОСТерм производит гибкую подводку с внутренним шлангом EPDM и PEX. Производство
    сопровождается контролем качества на всех этапах - от проверки сырья до испытаний
    готовой продукции в собственной лаборатории.


    Забирайте памятку и делитесь, была ли полезна эта информация?'
