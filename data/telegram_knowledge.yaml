  text: "Налоговая не вправе учитывать безнадежную недоимку при формировании сальдо\
    \ ЕНС\n\n➡️ Спор вытекает из оспаривания действий государственного органа. Учреждение\
    \ обратилось в суд с заявлением к налоговой инспекции. Истец является налогоплательщиком,\
    \ а ответчик – налоговым органом. Налоговая инспекция неверно сформировала сальдо\
    \ единого налогового счета учреждения. Она учла недоимку, которую ранее другой\
    \ суд признал безнадежной к взысканию. В результате на эту недоимку начислялись\
    \ пени, что нарушило права учреждения.\n\nПозиции сторон и решение суда смотрите\
    \ в карточках ⬆️\n\n⚖️ Кассация указала:\n\nВступило в силу решение суда, которым\
    \ недоимка по налогу была признана безнадежной к взысканию. Налоговый орган не\
    \ должен был учитывать эту сумму при формировании сальдо единого налогового счета.\
    \ Денежные средства, уплаченные налогоплательщиком, не могли быть зачтены в счет\
    \ погашения этой безнадежной недоимки. \n\nПо закону платежи на единый налоговый\
    \ счет должны погашать обязательства в строгой последовательности. Сначала погашается\
    \ недоимка, начиная с самой ранней, затем текущие налоги, пени и штрафы. Неверный\
    \ зачет средств привел к незаконному начислению пеней и неверному отражению совокупной\
    \ обязанности налогоплательщика.\n\nРеквизиты: постановление Арбитражного суда\
    \ Московского округа от 31.03.2026 № Ф05-2245/2026 по делу № А40-62663/2025.\n\
    \n\U0001F3F7 Больше кейсов из практики арбитражных судов за март 2026 года смотрите\
    \ в обзоре Системы Юрист. Подписчикам канала открыли гостевой доступ к материалу\
    \ на три дня. \n\n#кейсы\n\n⚪️ Система Юрист в Телеграм | Сообщество ВК | Канал\
    \ в MAX"
