  text: "‼ Как платить, когда нет прибора учета?\U0001F447\n\n\U0001F9EE По запутанным\
    \ расчетам на основании актов обследования или по числу проживающих лиц? Правильный\
    \ ответ: по числу проживающих лиц. Это правило применимо даже к санаториям, интернатам\
    \ и т.д.\n\n\U0001F3E5 Санаторий пытался обязать поставщика заключить договор,\
    \ но в нем не было согласовано условие о способе расчетов. Санаторий полагал,\
    \ что заплатит за горячую воду по количеству пациентов, а поставщик – по расчетным\
    \ расходам воды для санитарно-технических приборов. \n\n\U0001F4CC Формулировка\
    \ иска\n\n✏ О понуждении к заключению госконтрактов\n\n\U0001F4CC Позиции судов\n\
    \n\U0001F535 Все три инстанции встали на сторону поставщика.\n⚖ СКЭС ВС РФ защитила\
    \ права санатория.\n\n\U0001F6B0 Лицо, предоставляющее коммунальные услуги (исполнитель\
    \ коммунальных услуг), оплачивает объем коммунальных ресурсов, определяемый в\
    \ том же порядке, что и объем коммунальной услуги, оплачиваемый конечными потребителями\
    \ (определение ВС РФ от 30.01.2024 г. № 307-ЭС23-20474).\n\n⏱ Если горячая вода\
    \ поставляется гражданам на жилищные нужды, то при отсутствии у них приборов учета\
    \ законодательство допускает определение поставленных им объемов воды исходя из\
    \ количества жильцов и нормативов потребления коммунальных услуг, утверждаемых\
    \ органами госвласти субъектов РФ (ч. 1 ст. 157 ЖК РФ, п. 42 Постановления Правительства\
    \ РФ от 06.05.2011 г. № 354).\n\n\U0001F4BC Комментарий юристов \"Реаналитики\"\
    : \n\n\U0001F9E9 Поставщик являлся профессиональным участником рынка теплоснабжения\
    \ и горячего водоснабжения, в силу чего в его интересах было своевременно установить\
    \ приборы учета коммунальных ресурсов.\n\n\U0001F50D Определение ВС РФ от 13.02.2026\
    \ г. по делу № А32-11398/2023\nhttps://m.kad.arbitr.ru/Card/58862ad2-e6ba-437a-8ce8-a0db00ca1cba\n\
    \n⁉ Как Вы думаете, справедливо ли считать по числу пациентов?\n\n\U0001F44D –\
    \ Да.\n\U0001F914 – Нет.\n\nPS: Выводы являются обобщёнными. Для конкретных рекомендаций\
    \ и решений обратитесь в “Реаналитику”\nreanalitika.ru.\n\n#арбитражныйпроцесс,\
    \ #жкх, #ресурсы\n@arbitrium_processus\nhttps://t.me/arbitrium_processus"
