  text: "Если просрочка возникла по вине заказчика, это не “оправдание”. Это ваша\
    \ защита\n\nПодрядчику кажется: заказчик тормозил, мешал, не передавал документы\
    \ — но суду это вряд ли будет интересно.\n\nНаоборот. Именно это и может стать\
    \ одной из главных точек защиты.\n\nОчень многие подрядчики почему-то воспринимают\
    \ вину заказчика как “обстоятельство для разговора”.\n\nМол, мы-то знаем, что\
    \ виноват не только подрядчик.\n\nНо в споре важно не “знать”, а доказать.\n\n\
    Если заказчик:\n• поздно передал проект;\n• не дал фронт работ;\n• долго согласовывал\
    \ решения;\n• менял задания по ходу;\n• тормозил доступ;\n• затягивал ответы,\n\
    то это не лирика. \n\nЭто факты, которые напрямую влияют на сроки и, соответственно,\
    \ на неустойку.\n\nИ вот здесь подрядчик очень часто сам себя ослабляет.\n\nПотому\
    \ что не фиксирует такие вещи письменно.\nНа площадке все все понимают, а в суде\
    \ — тишина.\n\nЧто важно?\n\n1.  Вина заказчика — это не эмоция, а доказательственный\
    \ блок.\n2.  Если просрочка связана не только с подрядчиком, это надо превращать\
    \ в документы еще в процессе работ.\n3.  Чем позже вы начинаете это собирать,\
    \ тем слабее позиция.\n\nЧто имеет значение?\n• письма о непередаче фронта;\n\
    • замечания к проекту;\n• переписка о несогласованных решениях;\n• фиксация отсутствия\
    \ доступа;\n• документы о сдвиге сроков по причинам, зависящим от заказчика.\n\
    Если у вас проект, где фактически тормозил заказчик, а претензии теперь предъявляют\
    \ вам, напишите “вина заказчика” в личку @grikevich.\n\n\U0001F4E9 Telegram: @grikevich\n\
    \U0001F4DE +7 985 227-74-98\n\U0001F4F2 WhatsApp - написать по ссылке\n✉️ E-mail:\
    \ oxanagrikevich@yandex.ru\nMAX - резервный канал"
