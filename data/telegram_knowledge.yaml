  text: "‼ Сказ об обязанности платить за город патент, которого нет \U0001F447\n\n\
    \U0001F4B8 ВС РФ обратил внимание судов на норму, которая запрещает вернуть уплаченное\
    \ роялти за недействительный патент. Позиция ВС РФ категорична: платить за патент\
    \ нужно до момента его признания недействительным.\n\n\U0001F529 Компания предоставила\
    \ заводу неисключительную лицензию на использование изобретения, охраняемого патентом.\
    \ Затем патент признали недействительным, а завод обратился за возвратом роялти.\n\
    \n\U0001F4CC Формулировка иска\n\n✏ О взыскании процентов по ст. 395 ГК РФ \n\n\
    \U0001F4CC Позиции судов \n\n\U0001F534 Все три инстанции в иске отказали.\n⚖\
    \ СКЭС ВС РФ отправила дело на новое рассмотрение.\n\n⏳ С момента признания патента\
    \ \nнедействительным заключенные лицензионные договоры прекращают свое действие.\
    \ \n\n\U0001F4DC Но лицензионные договоры, заключенные на основе патента на изобретение,\
    \ признанного впоследствии недействительным, сохраняют действие в той мере, в\
    \ какой они были исполнены к моменту принятия решения о недействительности патента\
    \ (п. 6 ст. 1398 ГК РФ).\n\n❌ В случае признания патента на изобретение недействительным\
    \ лицензиар вправе требовать уплаты лицензионных платежей за период, когда лицензионный\
    \ договор исполнялся сторонами, предполагая о действительности патента.\n\n\U0001F449\
    \ Лицензиат не имеет права на возврат лицензионных платежей за период, предшествующий\
    \ признанию патента недействительным.\n\n\U0001F4BC Комментарий юристов \"Реаналитики\"\
    :\n\n\U0001F9E9 Юридически значимым обстоятельством для правильного разрешения\
    \ спора является установление факта исполнения сторонами договора за \nпериод,\
    \ предшествующий признанию патента недействительным.\n\n\U0001F50D Определение\
    \ ВС РФ от 02.12.2025 г. по делу № А09-4451/2022\nhttps://m.kad.arbitr.ru/card/4a2598ae-66a7-48a2-b8a9-3f38373d1f7c\n\
    \nPS: Выводы являются обобщёнными. Для конкретных рекомендаций и решений обратитесь\
    \ в “Реаналитику”\nreanalitika.ru.\n\n#арбитражныйпроцесс, #патент, #сип, #интеллектуальныеправа,\
    \ #лицензионныйдоговор\n@arbitrium_processus\nhttps://t.me/arbitrium_processus"
