  text: '⚖️ Уведомление о подписании госконтракта попало в спам – довод помог оспорить
    включение сведений в РНП


    Победитель не подписал контракт в срок, поскольку уведомление от площадки попало
    в папку "спам" электронной почты. Заказчик сформировал протокол уклонения от сделки,
    а УФАС включило сведения в #РНП.


    Три инстанции не увидели оснований для столь строгой санкции, поскольку победитель:


    ● доказал, что уведомление от электронной площадки попало в папку "спам";

    ● подписал проект контракта с незначительной просрочкой в понедельник утром, когда
    регламентированный срок истек в пятницу;

    ● имел успешный опыт исполнения более 500 аналогичных контрактов, в т.ч. с тем
    же заказчиком.


    Не усмотрело недобросовестности в действиях победителя в похожей ситуации и Красноярское
    УФАС (Решение от 20.08.2025 N 024/10/104-2407/2025).


    Документ: Постановление АС Западно-Сибирского округа от 21.04.2026 по делу N А70-17891/2025


