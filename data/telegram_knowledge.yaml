  text: "Срочность не оправдывает плохое планирование \n\nМожет ли заказчик по Закону\
    \ № 223-ФЗ провести закупку у единственного поставщика на основании срочности,\
    \ если сроки исполнения договора были известны заранее? Многие заказчики считают,\
    \ что могут, но это ошибка. \n\nНапример, заказчик по Закону № 223-ФЗ является\
    \ исполнителем по контракту, заключенному по Закону № 44-ФЗ в январе. Срок его\
    \ исполнения — апрель. В апреле, за два дня до окончания срока, размещает закупку\
    \ у единственного поставщика, ссылаясь на срочность и говорит. «У нас сроки поджимают».\
    \ Это неправильный подход, т.к. понятие срочности в закупках у единственного поставщика\
    \ не вкладывается в плоскость ненадлежащего планирования. Таким образом, оснований\
    \ для закупки у единственного поставщика у него нет. \n\nТо же самое с планом\
    \ закупок. Планом определена закупка в апреле. Наступил апрель, заказчик понимает,\
    \ что не успевает. Проводит закупку у единственного поставщика: «Нам срочно».\
    \ Это не срочность, это ненадлежащее планирование. \n\nСрочность — это непредвиденные\
    \ обстоятельства. Обрушилась кровля, вышла из строя машина, произошло ЧП. Срочность\
    \ определяется не предметом закупки, а обстоятельствами, которые возникли внезапно.\
    \ Если у заказчика не было возможности спланировать закупку заранее — это срочность.\
    \ Если сроки были известны с января, а заказчик вспомнил о них в апреле — это\
    \ нарушение. \n\nЕщё одна ошибка — ссылка на отсутствие денег. Не было средств\
    \ для оплаты, поэтому не размещали закупку, ждали финансирования от заказчика.\
    \ Это тоже не основание для срочности. Выходя на закупку, заказчик должен оценивать\
    \ все риски, включая возможность оплаты последующей закупки. Размещение закупки\
    \ не ждёт денег от вышестоящего заказчика. #223фз\n\nИсточник: ‌Центр \"Закон.гуру\"\
    \ (VK)"
