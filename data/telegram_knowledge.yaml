  text: "‼ Проценты за аванс взыскиваются со дня его выдачи \U0001F447\n\n\U0001F311\
    \ Мало кто знает оборотную сторону получения аванса как коммерческого кредита.\
    \ В случае нарушения обязательств проценты за него начинают \"капать\" не со дня\
    \ просрочки обязательства, а со дня его получения (!)\n\n⛑ Подрядчик не отработал\
    \ аванс, а договор содержал условие о том, что в случае неисполнения своих обязательств\
    \ подрядчик обязан оплатить проценты за пользование авансом как коммерческим кредитом\
    \ по день фактической отдачи аванса.\n\n\U0001F4CC Формулировка иска\n\n✏ О взыскании\
    \ неотработанного аванса и процентов за пользование коммерческим кредитом, а также\
    \ неустойки и процентов по ст. 395 ГК РФ\n\n\U0001F4CC Позиции судов\n\n\U0001F534\
    \ Все три инстанции отказали истцу во взыскании процентов за аванс.\n⚖ СКЭС ВС\
    \ РФ отправила дело на новое рассмотрение.\n\n\U0001F4B8 Коммерческий кредит –\
    \ не санкция, а один из видов займа, поэтому проценты за пользование кредитом\
    \ (авансом) являются платой за пользование денежными средствами.\n\n\U0001F9EE\
    \ Аванс – не расчет за выполненные работы, поэтому проценты могут начисляться\
    \ с момента получения аванса, когда просрочка исполнения отсутствует.\n\n❓ В чем\
    \ отличие неустойки за просрочку выполнения работ от процентов за пользование\
    \ авансом?\n\n⏳ Неустойка может быть \nприменена только с момента истечения срока\
    \ исполнения, а проценты по ст. 823 ГК РФ – сразу с момента получения аванса.\n\
    \n\U0001F4BC Комментарий юристов \"Реаналитики\": \n\n\U0001F9E9 После наступления\
    \ просрочки исполнения одновременно могут начисляться и проценты по \nст. 823\
    \ ГК РФ как плата за пользование авансом, и неустойка как мера ответственности.\n\
    \n\U0001F50D Определение ВС РФ от 26.12.2025 г. по делу № А40-4659/2024\nhttps://m.kad.arbitr.ru/Card/1d7f0885-297d-4f7f-95d9-f6bdb527afe6\n\
    \n⁉ А Вы согласны с тем, что проценты по ст. 823 ГК РФ начисляются с момента получения\
    \ аванса?\n\n\U0001F44D – Да.\n\U0001F914 – Нет.\n\nPS: Выводы являются обобщёнными.\
    \ Для конкретных рекомендаций и решений обратитесь в “Реаналитику”\nreanalitika.ru.\n\
    \n#арбитражныйпроцесс, #подряд, #коммерческийкредит, #неустойка\n@arbitrium_processus\n\
    https://t.me/arbitrium_processus"
