  text: "«Документы у нас где-то есть» - самая опасная фраза подрядчика\n\nПодрядчику\
    \ кажется: документы у нас точно есть, просто сейчас не под рукой. Потом найдем,\
    \ соберем и спокойно все покажем. \n\nНо в реальной стройке именно эта фраза очень\
    \ часто становится началом больших проблем.\n\nПока объект идет нормально, отсутствие\
    \ порядка в документах кажется терпимой мелочью. \n\nОдин журнал у прораба, другой\
    \ у ПТО, акты у инженера, часть переписки в почте, часть в WhatsApp, часть уволившийся\
    \ сотрудник вел с личного телефона. Всем кажется, что это не критично. \n\nДо\
    \ первой претензии. До первой проверки. До первого спора по срокам или качеству.\n\
    \nПроблема в том, что в конфликте документы перестают быть \"бумажками\" и становятся\
    \ доказательствами. И как только заказчик пишет, что вы сорвали срок, не выполнили\
    \ объем, не передали исполнительную документацию или сделали работы с недостатками,\
    \ у вас есть очень короткое время, чтобы показать цельную картину. \n\nНе куски.\
    \ Не объяснения. Не \"сейчас дособерем\". А именно цельную, логичную, подтвержденную\
    \ документами позицию.\n\nИ вот здесь выясняется неприятная вещь. Если компания\
    \ не может быстро собрать документы, то для суда, для проверяющего и для оппонента\
    \ это выглядит не как \"не успели принести\", а как \"позиция слабая, порядок\
    \ не ведется, доказательств нет\". \n\nДальше уже против вас начинает работать\
    \ не только сам конфликт, но и впечатление о вашей неорганизованности.\n\nНа практике\
    \ это выглядит очень типично. Заказчик заявляет, что подрядчик не выполнил часть\
    \ работ и требует вернуть аванс. Подрядчик говорит: работы делались, просто документы\
    \ у нас сейчас в разных местах. Или приходит проверка, спрашивают журналы, акты,\
    \ приказы, документы на материалы, а на объекте начинается суета и поиск по чатам.\
    \ В этот момент вы уже проигрываете не сам спор, а управляемость.\n\nЧто важно?\
    \ \n\nВо-первых, документы на стройке должны быть не \"где-то\", а в системе.\
    \ \n\nВо-вторых, папка объекта - это не архив и не прихоть юриста, а ваш бронежилет\
    \ в споре и на проверке. \n\nВ-третьих, если у вас нет структуры хранения, реестра\
    \ и ответственного, любой конфликт будет бить по вам в два раза сильнее.\n\nЧто\
    \ должно быть у подрядчика всегда? \n\nДоговор с приложениями\nАктуальная проектная\
    \ документация \nИсполнительная документация \nЖурналы \nАкты\nПереписка по препятствиям\
    \ \nДокументы по людям на объекте \nДокументы по материалам \nПриказы по ответственным\
    \ \nКалендарь юридических обязательств \nи единая папка объекта. \nЭто минимум.\
    \ Не максимум.\n\nЕсли вы понимаете, что у вас сейчас объект живет в режиме \"\
    документы точно есть, просто надо поискать\", напишите \"папка объекта\" в личку\
    \ @grikevich. Я дам структуру папки объекта и шаблон реестра документов, чтобы\
    \ вы не начинали каждый спор с паники.\n\n\U0001F4E9 Telegram: @grikevich\n\U0001F4DE\
    \ +7 985 227-74-98\n\U0001F4F2 WhatsApp - написать по ссылке\n✉️ E-mail: oxanagrikevich@yandex.ru\n\
    MAX - резервный канал"
