  text: "\U0001F631 А что с телегой происходит? \n\nПару дней назад - тишина. Потом\
    \ всплывают долги Telegram 20 миллионов по штрафам. \n\nВчера - Дуров. Его пост\
    \ всегда считывается как шифровка. «Не дадим тележеньку в обиду». Звучало почти\
    \ по-отечески) \n\nИ днем РБК выдает материал. Роскомнадзор, мол, запускает машину.\
    \ Не блокировку, это слишком грубо. Замедление. От которого чешется голова: это\
    \ у меня интернет лёг, или...?\n\nИ ладно бы новость. Но ведь жалобы от пользователей\
    \ уже были. И вчера, и позавчера. Фотки не грузятся, голосовухи прерываются. Совпадение?\n\
    \n2018 год наглядно показал, как это работает. Тогда бились насмерть из-за ключей\
    \ шифрования. Сейчас причина иная «борьба с преступностью», «несвоевременная блокировка\
    \ каналов».\n\nСуть не в причинах. Суть в методе. Полная блокировка - это война,\
    \ с партизанскими методами. Замедление - это что-то более изощренное. \n\nЮридически\
    \ - это кажется «меры по обеспечению безопасности». Технически - докажи, что это\
    \ целенаправленно.\n\nА ваши сообщения уже начали «путешествовать» чуть дольше\
    \ обычного? Признавайтесь \U0001F602"
