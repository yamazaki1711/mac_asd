  text: "\U0001F4C4Приняли новые стандарты на методы определения прочности клееных\
    \ деревянных конструкций\n\nС 1 июля 2026 года вступят в силу два обновленных\
    \ ГОСТа на определение прочности деревянных конструкций. \n\n\U0001F4CC ГОСТ 33120-2026\
    \ «Конструкции деревянные клееные. Методы определения прочности клеевых соединений»\
    \ заменит ГОСТ 33120-2014.\nСтандарт распространяется на клееные деревянные конструкции,\
    \ а также на конструкции из древесины в сочетании с древесно-плитными материалами.\
    \ Документ устанавливает методы испытаний для определения прочности клеевых соединений,\
    \ включая испытания при скалывании вдоль волокон, послойном скалывании, растяжении\
    \ вдоль волокон и для зубчатых соединений. Кроме того, документ содержит требования\
    \ к отбору образцов, оборудованию, инструментам и формы протоколов испытаний.\n\
    \n\U0001F4CC ГОСТ 34349-2026 «Конструкции деревянные клееные. Методы определения\
    \ длительной прочности клеевых соединений» заменит ГОСТ 34349-2017.\nЭтот стандарт\
    \ регулирует методы оценки длительной прочности клеевых соединений в деревянных\
