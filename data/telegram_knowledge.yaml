  text: "Переписал квартиру на жену перед банкротством. Что могло пойти не так?\n\n\
    Одна из самых популярных «схем» среди должников — переоформить имущество на супруга\
    \ через фиктивный развод. На бумаге всё выглядит законно: развелись, поделили\
    \ имущество, каждый пошёл своей дорогой.\n\nНо суды давно научились «разворачивать»\
    \ такие сделки. Почему схема не работает?\n\n\U0001F3DBСуд смотрит:\n✔️Когда появились\
    \ (или возникла угроза появления) долги, а когда оформили развод;\n✔️Продолжают\
    \ ли супруги жить вместе;\n✔️ Были ли признаки неплатёжеспособности на момент\
    \ сделки;\n✔️Кто реально пользуется имуществом. \n\nНа праздниках время даром\
    \ не терял и записал новое видео, в котором рассказываю, почему схемы по выводу\
    \ активов на родственников не работают.\n\nВ этот раз получилось классно: понятно\
    \ и в формате сторителлинга рассказал истории о том, как бизнесмены пытались спрятать\
    \ квартиру, машину, дачу и к чему это привело.\n\nКак обычно, видео доступно на\
    \ всех площадках.\n\n\U0001F4FCYouTube: https://youtu.be/EBqJHYR2J8c\n\n\U0001F46E\
    ‍♂️ВК Видео: https://vkvideo.ru/video-221241344_456239037\n\n\U0001F3B9Дзен: https://dzen.ru/video/watch/6960b4cfb7535857988e873a?share_to=link\n\
    \n\U0001F39EРутуб: https://rutube.ru/video/29e7ad41ffeb30867f6a41f3675da46c/\n\
    \nНе повторяйте чужих ошибок. Смотрите сейчас.\n\n\U0001F3F7Прочёл в законе"
