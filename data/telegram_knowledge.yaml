  text: '❓ Срезка недобора и доработка грунта вручную – что нужно учесть в ПОС и ВОР
    ПОС


    🔎 Согласно ГЭСН 81-02-01-2020 р. I Общие положения п. 1.1.16 затраты на срезку
    недоборов грунта при его механизированной разработке следует определять:

    - в железнодорожных и автомобильных выемках - по ГЭСН табл. 01-01-049, 01-03-047;

    - в котлованах под фундаменты, в котлованах и каналах гидротехнических сооружений
    и других выемках – по соответствующим нормам настоящего сборника в зависимости
    от способов производства работ, определяемых проектом.

    ✏️ Согласно ГЭСН 81-02-01-2020 р. II Исчисление объемов работ п. 2.1.3 объем работ
    при механизированной разработке котлованов и траншей при строительстве зданий
    и сооружений, выемок при строительстве автомобильных и железных дорог, следует
    определять по проектным данным за вычетом объема недобора грунта.

    📌 Согласно СП 45.13330.2017 «Земляные сооружения, основания и фундаменты» п. 6.1.6
    выемки в грунтах, кроме валунных, скальных и указанных в 6.1.5, следует разрабатывать,
    как правило, до проектной отметки с сохранением природного сложения грунтов основания.
    ‼️Допускается разработка выемок в два этапа: черновая - с отклонениями, приведенными
    в п. 1 - 4 таблицы 6.3, и окончательная (непосредственно перед возведением конструкции)
    – с отклонениями, приведенными в поз. 5 той же таблицы.

    👍 Т.е., пользуясь данными таблицы 6.3 можно определить величину недобора, данное
    значение умножить на площадь котлован по дну и определить объем недобора грунта.

    📎 Согласно расценок ГЭСН срезка недобора грунта выполняется механизировано при
    помощи бульдозера, но согласна приложения 1.12 также предусматривается доработка
    вручную.

    ✔️ Доработка вручную - это срезка недоборов. Недобор грунта — это слой грунта,
    оставляемый в выработке (забое скважины или дне котлована) и подлежащий последующему
    удалению (СП 46.13330.2012 «Мосты и трубы»).

    С учетом выше указанного, объем ручной доработки грунта определяется аналогично  объему
    срезки недобора.


    ‼️ В некоторых экспертизах  объем недобора требуют определять в процентном отношении.
    Согласно книги «Определение объемов строительные работ» Б.И.Голубев 1975г. объем
    недобора грунта при механизированной разработке котлованов и траншей определяется
    в соответствии с техническими условиями и проектом организации строительства.
    Для котлованов объемом до 5000 м3 недобора следует принимать в размере 7% общего
    объема работ; при этом 75% объема срезки надлежит определять мехазированым способом,
    а 25% — вручную. Для траншу недоборы надо принимать в размере 3% общего объект
    работ со срезкой всего объема недобора вручную. Недоборы входят в общий объем
    земляных работ. Объем недоборов грунта в железнодорожных выемках, разрабатываемых
    механизированным способом, следует принимать в размере 10% профильного объема
    выемок в грунтах I—IV групп.

    ВАЖНО! В ПОС и ВОР.ПОС ссылки на техническую литературу не допускаются! Ссылаться
    можно только на действующие нормативные документы.'
