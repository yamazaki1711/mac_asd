  text: 'Заксобрание Вологодской области голосами "ЕР", "СР", ЛДПР и "партии пенсионеров"
    отменило центральные партийные...  Заксобрание (https://f-i-b-n.com) Вологодской
    области голосами "ЕР", (https://t.me/msc_pri_sob_chelovejn_na_otcat) "СР", ЛДПР
    и "партии пенсионеров" отменило центральные партийные списки на выборах в ЗСО.
    Официальная версия - "раньше партии выставляли в центральный список "паровозов"
    (федеральных политиков и представителей исполнительной власти), люди за них голосовали,
    а они не шли в депутаты". Критика веская, но относится она только к самим голосовавшим
    за отмену списков: на прошлых выборах (2021 год) в первой тройке единороссов были
    Кувшинников, Воробьев (сенатор), Луценко, Воропанов, Германов. Депутатом ЗСО стал
    только Луценко. У ЛДПР первую строчку областного списка занимал Жириновский. Про
    СР уже никто и не помнит. Единственной партией без "паровозов" оказалась КПРФ,
    у которой вся первая тройка пошла в депутаты - люди хотя бы знали, за кого голосовали.
    В общем, "единороссы" косвенно признали, что список убрали в первую очередь, чтобы
    не провалиться из-за низкого рейтинга действующего губернатора. При этом никто
    не мешает "паровозам" возглавлять партсписки по округам, так что все рассуждения
    на эту тему от персонажей типа Антона Холодова - обычное лицемерное враньё. Вторая
    причина отмены списков - жгучее желание верхушки единороссов отомстить лично Александру
    Морозову, первому секретарю обкома КПРФ, который единственным из руководителей
    политических партий в регионе не лег под областной внутрипол. Ради этого чиновники
    и партфункционеры "ЕР", получается, запретили голосовать за Морозова всем жителям
    Вологодчины, за исключением одного избирательного округа. Со стороны замгубернатора
    Тютюкова и Ко предпринимаются попытки рейдерского захвата областного отделения
    партии путем замены Морозова на более "сговорчивого" деятеля. Выборы в сентябре
    будут интересными. Мария Шарапова'
