    в рекреационные для строительства объектов сельского туризма. Речь идет об участках,
    которые не относятся к сельхозугодьям.


    Как будет работать механизм:


    🔸 Основанием для перевода будут утвержденные документы территориального планирования.
    Минсельхоз получит право согласовывать документацию до утверждения регионами.


    🔸 Белый дом поручил авторам определить виды объектов для агротуризма и предусмотреть
    механизм обратного перевода земель, если их не используют по назначению.


    🔸 На участках можно строить гостевые дома, туристические комплексы и другие объекты
    для приема туристов.


    Закон вступит в силу с 1 сентября 2026-го в случае его принятия. А пока документ
    отправляется на рассмотрение в Госдуму.


