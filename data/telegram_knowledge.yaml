  text: "‼ Компенсация морального вреда – тоже убытки\U0001F447\n\n\U0001F4B8  ВС\
    \ РФ признал, что если застройщику пришлось выплачивать гражданам компенсацию\
    \ морального вреда по вине подрядчика, то он имеет право взыскать с него эти убытки\
    \ и многое другое. А это значит, что иногда убытки могут вырасти в 8 раз по сравнению\
    \ с ожидаемыми.\n\n\U0001F3D7 Подрядчик обязался выполнить застройщику пусконаладочные\
    \ работы для группы МКД в соответствии с условиями исполнения контракта, проектной\
    \ и рабочей документацией, национальными стандартами, СП, СНиП, ГОСТ, ТУ. Собственники\
    \ квартир обнаружили в них недостатки. Застройщик обратился за взысканием с подрядчика\
    \ убытков.\n\n\U0001F4CC Формулировка иска\n\n✏ О взыскании убытков\n\n\U0001F4CC\
    \ Позиции судов\n\n\U0001F534 Первая инстанция взыскала лишь незначительную часть\
    \ требований – 50 000 ₽. \n⚖ Апелляция и кассация, включая СКЭС ВС РФ, увеличили\
    \ сумму удовлетворенных исковых требований до 410 000 ₽.\n\n❓ Что включено в убытки?\n\
    \n✅ расходы на устранение строительных недостатков;\n✅ компенсация морального\
    \ вреда потребителям;\n✅ штрафы за отказ добровольного удовлетворения требований\
    \ потребителя; \n✅ расходы по оплате услуг представителя;\n✅ почтовые расходы,\
    \ \n✅ госпошлины.\n\n\U0001F4DA Подрядчик был обязан выполнить подрядные работы\
    \ на объекте не только в соответствии с условиями контракта, проектно-сметной\
    \ документации, но и национальными стандартами, СП, СНиП, ГОСТ, ТУ и другими нормативными\
    \ документами, действующим законодательством РФ и субъекта. Поэтому возмещение\
    \ стройрасходов обязательно.\n\n\U0001F449 Компенсация морального вреда в пользу\
    \ физлица по решению суда общей юрисдикции или мирового судьи не исключает возможности\
    \ предъявления лицом, выплатившим такую компенсацию, требования о взыскании на\
    \ основании ст. ст. 15, 393 ГК РФ убытков в этой части как понесенных расходов\
    \ к контрагенту, не исполнившему или ненадлежащим образом исполнившему обязательство\
    \ (ПП ВАС РФ от 18.05.2011 г. № 16777/10).\n\n\U0001F4BC Комментарий юристов \"\
    Реаналитики\": \n\n\U0001F9E9 Данный кейс примечателен тем, что при всей сложности\
    \ установления причинно-следственной связи как необходимого условия взыскания\
    \ убытков истцу удалось возместить почти все понесенные потери.\n\n\U0001F50D\
    \ Определение ВС РФ от 24.02.2026 г. по делу № А07-7806/2024\nhttps://m.kad.arbitr.ru/Card/69146ed3-6da1-424d-a6fd-5f8306c48cab\n\
    \n⁉ Как Вы считаете, справедлив ли такой подход?\n\n\U0001F44D – Вполне, так и\
    \ должно быть.\n\U0001F914 – Нет, есть спорные моменты.\n\nPS: Выводы являются\
    \ обобщёнными. Для конкретных рекомендаций и решений обратитесь в “Реаналитику”\n\
    reanalitika.ru.\n\n#арбитражныйпроцесс, #убытки, #мкд, #подряд\n@arbitrium_processus\n\
    https://t.me/arbitrium_processus"
