  text: '‌При проверке заказчиками российских участников закупок станут применяться
    сервисы ФНС России


    Минфин России опубликовал для общественного обсуждения законопроект, который предусматривает
    проверку участников закупок по ряду требований, предъявляемых к ним в рамках 44-ФЗ
    и 223-ФЗ, с помощью сервисов оценки деятельности российских юридических лиц и
    индивидуальных предпринимателей, созданных ФНС России.


    Законопроектом вводится механизм автоматической передачи на постоянной основе
    из ФНС России в единую информационную систему в сфере закупок (ЕИС) регулярно
    обновляемых результатов оценки деятельности российских участников закупок.


    При проведении электронных закупок заказчики смогут автоматически получать данные
    из ЕИС для подтверждения соответствия российских участников закупок отдельным
    обязательным требованиям: отсутствие задолженности по уплате налогов, недостоверности
    в ЕГРЮЛ, непроведение ликвидации, невключение в число иностранных агентов или
    лиц, причастных к экстремистской деятельности или терроризму.


    Новации обеспечат представление заказчикам объективной информации о соответствии
    российских участников закупок данным требованиям и упростят им процедуру закупки,
    поскольку исключат необходимость проведения ими самостоятельных проверок участников
    на соответствие этим требованиям.


    Учитывая необходимость предварительной подготовки систем, предполагается, что
    новации станут применяться к закупкам, которые будут проводиться с 1 января 2027
    года.


    Изменения не затронут участие иностранных лиц в российских закупках, поскольку
    в сервисах ФНС России отсутствует информация об их хозяйственной деятельности.
    Соответственно, иностранные участники закупок по-прежнему будут подтверждать свое
    соответствие вышеуказанным отдельным требованиям декларативно.


    Источник: minfin.gov.ru'
