  text: "И про заказчика. Пока разбираетесь с субподрядчиком, перед заказчиком идут\
    \ ваши сроки. Уведомите его письменно: обнаружены обстоятельства, принимаем меры\
    \ по замене субподрядчика, просим скорректировать график. Это не гарантирует продление,\
    \ и не извиняет просрочку, но заказчик может пойти на встречу, видя вашу добросовестность.\
    \ В споре суд это учтёт.\n\nНапишите мне @grikevich «отказ» - получите памятку\
