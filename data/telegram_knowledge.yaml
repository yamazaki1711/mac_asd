  text: '🔥Утвердили новый СП по пожарной безопасности для высотных зданий


    Официально издали СП 550.1311500.2026 «Здания высотные. Требования пожарной безопасности»,
    утвержденный приказом МЧС России от 26.02.2026 № 137. Документ вступает в силу
    с 1 июня 2026 года.


    Свод правил устанавливает требования пожарной безопасности при проектировании,
    а также при изменении функционального назначения, реконструкции, капитальном ремонте
    и техническом перевооружении зданий — в части, соответствующей объему выполняемых
    работ.


    ➡️СП распространяется на:

    — жилые здания класса функциональной пожарной опасности Ф1.3 высотой более 75
    м;

    — здания общественного назначения, в том числе многофункциональные, высотой более
    50 м.


