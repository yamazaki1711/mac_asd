  text: "⚡️ Сбер против PayQR (как с главного банка страны взыскали 1.4 млрд за товарный\
    \ знак) \n\nЯ все это уже разложил по полочкам подробно в новой статье на VC.\n\
    \nКому нужны цитаты, картинки и хронология судебных заседаний - велкам. Там плотно,\
    \ но честно \U0001F608\n\nА сюда - только выжимка. Потому что вы свои люди.\n\n\
    Коротко:\n\n\U0001F449 9 февраля 9 ААС взыскал таки со Сбера 1,4 млрд рублей в\
    \ пользу разработчика PayQR (ООО \"Фит\") \n\nНе потому что Сбер украл код. И\
    \ не потому что скопипастил приложение \U0001F60F\n\nА потому что они использовали\
    \ чужой бренд, о котором знали с 2016 года. Стартап начал пилить систему оплаты\
    \ через QR когда деревья были большими ещё в 2013 году и методично регистрировал\
    \ товарные знаки, патенты и своё ПО. \n\nПримечательно, что Сбер вёл плотные переговоры\
    \ с разработчиком несколько лет, смотрели технологию - но покупать не стали. \n\
    \nПереговорили, посмотрели презентацию, вникли - и через три года запустили свой\
    \ «Плати QR».\n\nСвое, но очень похожее. До степени смешения, как сказал суд.\n\
    \nИ вот тут важное.\n\nСбер не просто проиграл (после 2 лет). Он проиграл в том\
    \ числе методологии расчетов. \n\nИстец пришел в суд не с абстрактной суммой.\
    \ А с формулой: 13,3% от выручки банка с этого сервиса. \n\nПочему 13,3%? Потому\
    \ что такую ставку роялти эксперты нашли на рынке для аналогичных технологий.\
    \ И за одни экспертизы Сбер отдельно должен вернуть более 400к.\n\nСуд посчитал.\
    \ И согласился.\n\nХочешь использовать чужое - плати (купи). Не хочешь платить\
    \ - не используй.\n\nА если использовал без спроса - готовься отдать процент с\
    \ того, что заработал.\n\nВсе. Кто хочет почитать подробно - ссылка на VC в закрепе\
    \ \U0001F44B\n\nКстати, напоминаю про своего Ассистента без Багов (в боте удобный\
    \ навигатор по всем гайдам, чек-листам и полезным материалам на канале) \U0001F44D"
