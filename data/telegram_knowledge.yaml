  text: 'Механизм привлечения к административной ответственности поставщиков за поставку
    некачественных товаров предложили уточнить


    Минпромторг разработал проект поправок в ст. 4.5 КоАП РФ, направленный на увеличение
    сроков давности привлечения к административной ответственности поставщиков за
    поставку некачественных товаров для продукции военного назначения с длительным
    производственным циклом.


    Инициаторы проекта отмечают недостаточную эффективность действующих механизмов
    привлечения к ответственности таких поставщиков.


    Особенно данная проблема актуальна для продукции, применяемой в судостроении.


    Предлагается увеличить до шести лет срок давности привлечения к ответственности
    за нарушение законодательства в сфере гособоронзаказа по ч. 6 ст. 7.30.3 КоАП
    РФ.


    В случае принятия поправок в ст. 4.5. КоАП РФ их реализация окажет воздействие
    на широкий спектр отраслей промышленности с длительным технологическим циклом
    производства продукции (включая добывающую, ракетно-космическую, электронную,
    фармацевтическую промышленность, энергетическое машиностроение и другие отрасли),
    специфика которых также требует пересмотра сроков давности привлечения к административной
    ответственности.


    Общественное обсуждение законопроекта завершат 22 апреля 2026 года. #планы


    Документ: Законопроект № 167003


    Источник: ЭТП «Фабрикант»'
