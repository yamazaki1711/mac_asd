  text: '​Рынок ЖБИ в октябре 2025 года


    В октябре 2025 года российская отрасль железобетонных изделий (ЖБИ) продолжила
    спад. Выпуск продукции уменьшился на 20,0% по сравнению с октябрем 2024 года.
    По итогам десяти месяцев снижение составило 17,1% к аналогичному периоду прошлого
    года. Отрицательная динамика затронула почти все ключевые категории железобетонных
    изделий.


    Динамика производства по ключевым группам в октябре 2025 года к октябрю 2024 года
    (в скобках январь – октябрь 2025 года к январю – октябрю 2024 года):


    • элементы конструктивные: -32,9% (-30,0%);

    • конструкции и детали специального назначения: -30,4% (-21,7%);

    • плиты, панели, настилы перекрытий и покрытий: -22,2% (-15,9%);

    • сборные железобетонные конструкции прочие: -14,5% (-20,0%);

    • конструкции стен и перегородок сборные: -16,1% (-18,8%);

    • каркасные конструкции зданий и сооружений: -17,9% (-12,9%);

    • сборные железобетонные фундаментные конструкции: -18,3% (-16,9%);

    • конструкции и детали инженерных сооружений: -4,2% (+3,3%).


    Наиболее глубокое падение наблюдается в сегменте конструктивных элементов и изделий
    специального назначения, что отражает общий спад строительной активности и сокращение
    числа инвестиционных проектов.


    Потребление и ценовая динамика


    Потребление ЖБИ в октябре 2025 года снизилось на 20,1% к уровню прошлого года.


    По итогам января – октября 2025 года совокупное падение составило 17,1%.


    Снижение спроса продолжается как со стороны жилищного строительства, так и инфраструктурного
    сектора, где запуск новых проектов остается ограниченным.


    Предприятия сталкиваются с противоречивым ценовым давлением: растущие издержки
    требуют повышения цен, тогда как слабый спрос заставляет производителей идти на
    их снижение, что фактически ставит под угрозу способность бизнеса работать без
    убытков.


    Факторы, формирующие спрос


    (1) Динамика строительной отрасли. Спад в строительной отрасли продолжается: он
    сопровождается сокращением ввода жилья (-4,6% г/г), низкой активностью девелоперов,
    ограниченным запуском новых проектов (-15% г/г).


    (2) Инвестиционная активность и финансовые условия для реализации проектов. После
    роста в начале года (+8,7% г/г), инвестиции в основной капитал в III квартале
    2025 года ушли в минус (-3,1% г/г). Банковская ставка по кредитам продолжает держаться
    на высоком уровне.


    (3) Макроэкономические условия потребителей. Снижение доступности банковского
    финансирования и падение числа ипотечных сделок (-40,0% г/г) в сегменте ИЖС оказывают
    дополнительное влияние на спрос на конструктивные и стеновые изделия.


    Перспективы


    В среднесрочной перспективе рынок ЖБИ, вероятно, продолжит нисходящую динамику.
    Ключевыми факторами снижения выступают:


    • дефицит инвестиций в строительной отрасли;

    • низкая активность в жилищном и инфраструктурном строительстве;

    • ограничение финансирования и сдержанная политика банков;

    • сохраняющийся запас готовой продукции на складах предприятий.


    Ситуация может стабилизироваться при оживлении строительного спроса и улучшении
    условий кредитования.


    Подробнее в материале СМПРО Pro рынок. Анализ рынка железобетонных изделий и конструкций
    в России. Октябрь 2025.'
