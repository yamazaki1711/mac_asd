  text: "Водоканалы избавят от мелких посредников\n\nОпубликован Проект Постановления\
    \ Правительства РФ «О внесении изменений в некоторые акты Правительства Российской\
    \ Федерации». \n\nВ чем суть  \n\nПродолжается консолидация организаций в сфере\
    \ водоснабжения и водоотведения. \n\nНа этот раз из цепи исключаются мелкие транзитные\
    \ организации, которые раньше могли эксплуатировать отдельные участки сетей водоснабжения\
    \ и водоотведения и предоставлять платные услуги по транспортировке воды и сточных\
    \ вод на своих участках сетей.\n\nЭто связано с тем, что расходы отрасли на оплату\
    \ таким транзитникам значительно выросли. А их приходится закладывать в тарифы\
    \ водоснабжения, что сокращает возможность вложений на ремонт и модернизацию сетей.\n\
    \nПоэтому еще более ужесточаются требования к транзитным компаниям.\n\n1️⃣Теперь\
    \ недостаточно просто иметь участок сети, нужно чтобы его непрерывная протяженность\
    \ составляла: \n\n⚫️в городах с населением свыше 1 млн человек — от 20 км в 2026\
    \ году до 60 км с 2028 года;\n⚫️в городах 500 тыс. - 1 млн человек — от 6 до 24\
    \ км;\n⚫️в городах 250-500 тыс. человек — от 2 до 8 км.  \n\n2️⃣Арендованные и\
    \ лизинговые сети больше не учитываются при определении соответствия требованиям.\n\
    \nЭти меры избавят рынок от мелких игроков, снизят конкуренцию, что теоретически\
    \ должно повысить эффективность водоснабжения и водоотведения.  \n\n\U0001F972\
    «Законы стройки» в MAX"
