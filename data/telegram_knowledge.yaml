  text: '⚖️ Проблемы у смежника не спасли от двух лет в реестре недобросовестных поставщиков


    Учреждение и общество заключили муниципальный контракт на поставку утеплённого
    мобильного павильона. Срок передачи товара — не позднее 8 декабря 2024 года. К
    этой дате павильон не прибыл. Заказчик выставил претензию с новым сроком — до
    20 декабря, но поставка вновь не состоялась. Учреждение расторгло контракт в одностороннем
    порядке и направило сведения в антимонопольный орган.


    Управление включило информацию об обществе, его директоре и участнике в РНП сроком
    на два года. Поставщик оспорил это решение в суде. Первая инстанция иск удовлетворила.
    Апелляция решение отменила и в требованиях отказала. Кассация поддержала апелляционный
    суд.


    Суды указали, что поставщик не исполнил обязательства в срок. Ссылки на вину заказчика
    (задержка финального эскиза, отсутствие данных о розетках) отклонены. Схема размещения
    технических выводов имелась в приложении к контракту, а доказательств невозможности
    изготовить павильон без эскиза для оклейки не представлено. Запросы о недостающих
    сведениях общество заказчику не направляло.


    Довод о неисполнении обязательств собственным контрагентом, задержавшим комплектующие,
    также не принят. Риск срыва поставки смежником — это предпринимательский риск
    самого общества, а не форс-мажор. Товар не был передан ни в основной, ни в дополнительный,
    ни в десятидневный срок после уведомления о расторжении, что подтверждает недобросовестность
    поставщика. #форсмажор


    Документ: Постановление АС Западно-Сибирского округа от 28.01.2026 № Ф04-4471/2025
    по делу № А45-5361/2025


    Источник: Время Бухгалтера'
