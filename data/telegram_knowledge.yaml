  text: "«УТРОМ ДЕНЬГИ — ВЕЧЕРОМ СТУЛЬЯ»\n\nПродолжаем рубрику неудачных инвестиций\
    \ или просто рискованной авантюры.\n\nНаш клиент в 2018 году заключил соглашение\
    \ и передал контрагенту деньги как инвестиции под создание бизнеса и получения\
    \ процентного дохода. Контрагент действительно создал юрлицо, работал, вел предпринимательскую\
    \ деятельность. Учредителем и руководителем был также он. До 2020 года выплаты\
    \ шли, а после 2020-го всё остановилось. На связь не выходил, по телефону и в\
    \ сообщениях ноль реакции.\n\nВ марте 2025, уже после открытия нашего офиса в\
    \ Тюмени, клиент пришёл к нам разбираться в ситуации по закону. Досудебно попробовали\
    \ по-хорошему, но это тот случай, когда «по-хорошему» разговариваешь сам с собой.\
    \ Поэтому пошли в суд. И вот тут начинается самое интересное: только после подачи\
    \ иска и судебного заседания должник внезапно вышел на связь.\n\nВ разговоре с\
    \ нашим представителем юридической компании «Ярдрей» в Тюмени Азаматом Огоевым\
    \ должник быстро понял математику последствий: решение суда, исполнительный лист,\
    \ дальше приставы, аресты счетов и имущества. И на этом фоне резко стало возможным\
    \ то, что ещё вчера было невозможно. В итоге стороны пришли к мировому соглашению.\n\
    \n18.11.2025 Новоуренгойский районный суд (ЯНАО-Югра) по делу № 2-3135/2025 утвердил\
    \ мировое соглашение. Условия полностью устраивают нашего клиента.\n\nПочему должнику\
    \ стало не до игр?\nСтатья 309 ГК РФ: взял на себя обязательства — исполняй их\
    \ нормально, как в договоре, а не как получится.\nСтатья 395 ГК РФ: если удерживаешь\
    \ чужие деньги или тянешь с возвратом — платишь проценты. Они считаются по ключевой\
    \ ставке Банка России за соответствующие периоды.\nСтатья 100 ГПК РФ: возмещение\
    \ расходов на оплату услуг представителя.\n\nА для того, чтобы сэкономить время\
    \ и нервы, лучше сразу подключать юристов, которые умеют доводить такие истории\
    \ до результата.\n\nНаши контакты оставляю ниже, номер телефона представительства\
    \ юридической компании «Ярдрей» в Тюмени единый, как и для всех представительств\
    \ в России\U0001F447\n\nЮридическая компания \"Ярдрей\" \n\n• Телефон:\n\U0001F1F7\
    \U0001F1FA Россия: +79995554141 \n\U0001F1F0\U0001F1FF Казахстан: +77711554141\
