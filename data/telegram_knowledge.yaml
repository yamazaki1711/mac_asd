  text: "‼ Безнадежность – больше не спасательный круг для КДЛ\U0001F447\n\n\U0001F30A\
      Даже когда шторм банкротства оказался позади и задолженность признана безнадежной,\
    \ руководители юрлиц все равно под угрозой привлечения к ответственности.\n\n\U0001F4B8\
    \ По заявлению ФНС в отношении компании возбудили дело о банкротстве. Производство\
    \ прекратили из-за отсутствия средств, ФНС решила взыскать задолженность с руководителей\
    \ компании.\n\n\U0001F4CC Формулировка иска\n\n✏ О привлечении КДЛ к субсидиарной\
    \ ответственности \n\n\U0001F4CC Позиции судов\n\n\U0001F534 Первая инстанция\
    \ ФНС отказала.\n\U0001F535 Апелляция привлекла КДЛ к ответственности.\n\U0001F7E0\
    \ Но при новом рассмотрении дела суды снова отказали ФНС.\n⚖ СКЭС ВС РФ отправила\
    \ дело на новое рассмотрение.\n\n2⃣ Главные отговорки, которые разрушил ВС РФ\n\
    \n\U0001F449 У ФНС минимальная доля требований, поэтому права у нее нет\n\n\U0001F4CA\
    \ Недоказанность признака превышения налоговых требований 50% над остальными требованиями\
    \ третьей очереди не блокирует возможность привлечения к ответственности КДЛ при\
    \ доказанности совершения ими противоправных деяний, повлекших несостоятельность\
    \ должника.\n\n\U0001F449 Безнадежная задолженность – приговор\n\n✍ Задолженность\
    \ по налогам признана безнадежной к взысканию не в связи с упущениями в работе\
    \ или неправомерными действиями ФНС, а ввиду отсутствия перспектив её взыскания\
    \ с фактически несостоятельной компании.\n\n❗ Сама такая \"безнадежность\" может\
    \ быть вызвана противоправными действиями КДЛ. В связи с этим они не могут освобождаться\
    \ от субсидиарной ответственности по обязательствам подконтрольного им лица по\
    \ налоговой задолженности лишь на том основании, что она безнадежна к взысканию.\n\
    \n\U0001F4BC Комментарий юристов \"Реаналитики\": \n\n\U0001F9E9 Более того, ВС\
    \ РФ в данном деле напомнил о том, что суды фактически повторно рассмотрели тот\
    \ же самый спор без оснований (новых и вновь открывшихся обстоятельств).\n\n\U0001F50D\
    \ Определение ВС РФ от 19.02.2026 г. по делу № А41-84436/2020\nhttps://m.kad.arbitr.ru/Card/70e7e561-d4db-4631-9e6c-08c7f1235f30\n\
    \n⁉ Как Вы считаете, легко ли привлечь экс-руководство к субсидиарной ответственности?\n\
    \n\U0001F44D – Вполне.\n\U0001F914 – Нет, весьма сложно.\n\nPS: Выводы являются\
    \ обобщёнными. Для конкретных рекомендаций и решений обратитесь в “Реаналитику”\n\
    reanalitika.ru.\n\n#арбитражныйпроцесс, #кдл, #ответственность, #субсидиарка \n\
    @arbitrium_processus\nhttps://t.me/arbitrium_processus"
