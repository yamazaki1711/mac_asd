  text: "КТРУ обновился, пока вы готовили закупку. Как не узнать об этом от ФАС?\n\
    \nБольшинство заказчиков проверяют каталог товаров, работ, услуг один раз — когда\
    \ впервые готовят закупку по конкретной позиции. Дальше документация копируется,\
    \ немного правится и уходит в публикацию. Это работает ровно до того момента,\
    \ пока позиция в каталоге не изменилась. А она меняется — тихо, без уведомлений,\
    \ иногда принципиально.\n\n#КТРУ живёт своей жизнью. Одни позиции не трогали с\
    \ момента появления в каталоге. Другие уточнялись несколько раз за год. Заказчик\
    \ об этом, как правило, не знает — потому что система не обязана его оповещать.\
    \ Он узнаёт позже: от участника закупки, который подаёт жалобу, или от антимонопольного\
    \ органа, который её рассматривает.\n\nХарактерная ситуация: заказчик закупает\
    \ продукты питания, ссылается на характеристики из позиции КТРУ — и указывает\
    \ значение, которое в актуальной редакции уже изменилось. Формально описание объекта\
    \ закупки не соответствует каталогу. То, что заказчик просто не заметил обновления,\
    \ обстоятельством, смягчающим ответственность, не является.\n\nЕсть и менее очевидная\
    \ проблема. Даже если сама позиция не изменилась, мог измениться её статус — например,\
    \ характеристика из необязательной стала обязательной. Или появилась новая обязательная\
    \ характеристика, которой раньше не было. В документации заказчика её нет — и\
    \ это уже нарушение, хотя месяц назад всё было в порядке.\n\nОтдельная история\
    \ — когда позиция в каталоге есть, но заказчик по привычке работает мимо неё.\
    \ Иногда это происходит потому, что предыдущая закупка проводилась до того, как\
    \ позиция вступила в силу, и этот порядок работы просто закрепился. Между тем\
    \ постановление Правительства РФ № 145 однозначно: если позиция вступила в силу\
    \ — её применение обязательно. Никаких переходных периодов для конкретного заказчика\
    \ здесь нет.\n\nПрактический вывод простой, но его мало кто выполняет последовательно:\
    \ актуальность позиции КТРУ нужно проверять перед каждой закупкой. Не раз в квартал,\
    \ не когда «что-то изменилось в законодательстве» — а каждый раз. Это занимает\
    \ несколько минут. Жалоба, предписание и административное производство занимают\
    \ значительно больше.\n\nЗнание правил — это только половина работы. Вторая половина\
    \ — понимание того, как эти правила меняются и почему ошибки, которые вчера были\
    \ безобидными, сегодня становятся основанием для штрафа. \n\nИсточник: Центр \"\
    Закон.гуру\" (VK)"
  text_preview: 'КТРУ обновился, пока вы готовили закупку. Как не узнать об этом от
