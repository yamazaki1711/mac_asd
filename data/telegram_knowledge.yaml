  text: "‼ ВС РФ пресек вывод $5 млрд заграницу через мнимый займ \U0001F447\n\n\U0001F4B5\
    \ Спор о больших деньгах может коснуться и малого бизнеса, который прикрывает\
    \ вывод капитала договорами займа и цессии. Теперь ВС РФ не дает шансов обеим\
    \ сторонам процесса и признает такое поведение шиканой.\n\n\U0001F3E6 Одна компания\
    \ выдала займ другой в обмен на долю в уставном капитале. Затем заимодавец совершил\
    \ цессию в пользу иностранного юрлица. Займодавец решил взыскать задолженность\
    \ по договору займа, а заемщик – оспорить цессию.\n\n\U0001F4CC Формулировка иска\n\
    \n✏ О взыскании задолженности по договору займа; о признании цессии недействительной\n\
    \n\U0001F4CC Позиции судов\n\n\U0001F534 Первая инстанция в первоначальном и встречном\
    \ исках отказала.\n\U0001F535 Апелляция и кассация встали на сторону истца.\n\
    ⚖ СКЭС ВС РФ согласилась с первой инстанцией.\n\n\U0001F4D5 Сделки, заключенные\
    \ без намерения реального исполнения последних сторонами, а также с целью причинения\
    \ вреда правам кредиторов, могут быть квалифицированы как злоупотребление правом.\n\
    \n\U0001F5FA Договоры уступки заключены в целях преодоления запрета, установленного\
    \ Указом Президента РФ от 05.03.2022 г. № 95 и Постановлением Правительства РФ\
    \ от 06.03.2022 г. № 295, на совершение операций по перечислению денежных средств\
    \ в пользу иностранных компаний из недружественных стран.\n\n\U0001F9EE Не была\
    \ доказана реальность хозяйственных операций между сторонами в отношении договоров\
    \ уступки в отсутствие доказательства оплаты по ним.\n\n\U0001F4BC Комментарий\
    \ юристов \"Реаналитики\": \n\n\U0001F9E9 ВС РФ сослался на классический аргумент\
    \ – нарушение ст. 10 ГК РФ. Суд отказывает в защите права, в\nотношении которого\
    \ допущено недобросовестное его осуществление.\n\n\U0001F50D Определение ВС РФ\
    \ от 30.12.2025 г. по делу № А40-252116/2024\nhttps://m.kad.arbitr.ru/Card/5d9c9ca3-825a-443f-8990-f73378d8652d\n\
    \n⁉ Как Вы думаете, справедлив ли отказ суда?\n\n\U0001F44D – Да.\n\U0001F914\
    \ – Не думаю.\n\nPS: Выводы являются обобщёнными. Для конкретных рекомендаций\
    \ и решений обратитесь в “Реаналитику”\nreanalitika.ru.\n\n#арбитражныйпроцесс,\
    \ #займ, #мнимость\n@arbitrium_processus\nhttps://t.me/arbitrium_processus"
