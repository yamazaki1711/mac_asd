  text: 'В Реестр требований будут включать только СП «Основные положения»


    На расширенном заседании ТК 465 «Строительство», которое прошло 16 апреля на площадке
    НИУ МГСУ, обсудили ключевые изменения в системе технического регулирования строительной
    отрасли.


    Директор ФАУ «ФЦС» Владимир Калинкин сообщил, что в 2026 году планируется актуализация
    и разработка сводов правил с учетом положений СП 555. При этом подход к формированию
    Реестра требований будет пересмотрен.


    «В Реестр требований будут включаться только положения сводов правил уровня „Основные
    положения“, описывающие требования к результату, а не инструменты его достижения».


    При этом своды правил сохраняют свою роль:

    «СП „Правила проектирования“ сохраняют статус доказательной базы Технического
    регламента».

    «Этот механизм направлен не на механическое разделение нормативной базы, а на
    решение задач проектирования с учетом возможности для проектировщиков использовать
    альтернативные способы обоснования».


    Практически формируется модель, при которой требования задают результат, а не
    жестко фиксируют способ его достижения. Это открывает возможность для альтернативных
    проектных решений при условии их обоснования.


