  text: "❓ Что нужно учесть при разработке транспортной схемы  в разделе \U0001F4CB\
    \U0001F4CB\U0001F4CB\n\n➡️ В соответствии с Постановлением Правительства РФ от\
    \ 16 февраля 2008г. № 87 (далее Положение) в разделе 7 в п. «б» приводится описание\
    \ транспортной инфраструктуры.\n\U0001F4CE В соответствии с п. 4.9 МДС  12-46.2008\
    \ оценка развитости транспортной инфраструктуры (см. п. 4.7, б) производится на\
    \ основании плана транспортной инфраструктуры района строительства. По итогам\
    \ оценки составляется транспортная схема (далее ТС).\n⭐️ В соответствии с п. 4.9\
    \ МДС  12-46.2008 по итогам оценки составляется транспортная схема с указанием\
    \ расстояний и направлений перевозки грузов, которая наносится на строительный\
    \ генеральный план. \U0001F4CC В случае необходимости на отдельном чертеже разрабатывается\
    \ транспортная схема строительства, на которой обозначены действующая дорожная\
    \ сеть, а также необходимые дополнительные дороги, подъезды, площадки и т.п.\n\
    ➡️ Основные документы, которыми пользуются при определении стоимости транспортных\
    \ расходов являются:\n- Приказ Минстроя России от 08.02.2017 N 77/пр \"Об утверждении\
    \ Методики применения сметных цен строительных ресурсов\" (Далее Методика 77/пр);\
    \ \n- Приказ Министерства строительства и жилищно-коммунального хозяйства Российской\
    \ Федерации от 14 июля 2022 г. № 571/пр «Об утверждении методики применения сметных\
    \ норм» (Далее Методика 571/пр);\n- Приказ Министерства строительства и жилищно-коммунального\
    \ хозяйства Российской Федерации от 26 октября 2022 г. n 904/пр «Об утверждении\
    \ методики определения сметных цен строительных ресурсов» (Далее Методика 904/пр);\n\
    - Приказ Минстроя России от 04.08.2020 N 421/пр \"Об утверждении Методики определения\
    \ сметной стоимости строительства, реконструкции, капитального ремонта, сноса\
    \ объектов капитального строительства, работ по сохранению объектов культурного\
    \ наследия (памятников истории и культуры) народов Российской Федерации на территории\
    \ Российской Федерации\" (Далее Методика 421/пр)."
