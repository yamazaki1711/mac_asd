  text: "ВС направил на новое рассмотрение спор о субсидиарке вне банкротства\n\n\
    ➡️ ИП приобрел право требования просуженного долга. К тому моменту должника уже\
    \ исключили из ЕГРЮЛ из-за недостоверных сведений. Поэтому новый кредитор решил\
    \ взыскать долг с тех, кто контролировал его: бывших руководителей и участников\
    \ должника. Заявитель просил привлечь их к субсидиарке вне банкротства и взыскать\
    \ солидарно всю сумму долга, проценты и индексацию.\n\nТри инстанции отказали\
    \ ИП. Само по себе исключение из ЕГРЮЛ не доказывает вину руководителей в неуплате\
    \ долга, а истец приобрел безнадежный долг за копейки, зная о безнадежности взыскания.\n\
    \n⚖️ Верховный суд напомнил, что по делам о субсидиарной ответственности вне банкротства\
    \ действуют особые правила. Истцу достаточно доказать наличие задолженности, факт\
    \ исключения компании из ЕГРЮЛ и то, что ответчик контролировал должника. После\
    \ этого ответчик обязан доказать свою добросовестность и разумность действий,\
    \ а также пояснить, почему обязательства не исполнили. \n\nЕсли КДЛ уклоняется\
    \ от пояснений и документов, суд вправе исходить из того, что погашение задолженности\
    \ стало невозможным именно из-за его действий.\n\n\U0001F4C4 Источник: определение\
    \ ВС от 25.02.2026 по делу № А40-105555/2024\n\n⚪ Арбитражная практика для юристов\
    \ | \U0001F1F7\U0001F1FA Читать нас в MAX"
