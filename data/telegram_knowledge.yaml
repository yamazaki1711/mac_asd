  text: "По сообщениям СМИ, Минстрой рассматривает возможность продления моратория\
    \ на штрафы и неустойки для застройщиков. Речь идет о продолжении меры поддержки\
    \ отрасли в условиях сохраняющейся волатильности на рынке недвижимости и адаптации\
    \ девелоперских проектов к новым экономическим реалиям.\n\nС одной стороны, поддержка\
    \ отрасли на фоне падения продаж кажется понятной. С другой - затяжной мораторий\
    \ рискует еще сильнее ослабить дисциплину игроков и подорвать доверие покупателей\
    \ жилья, которым сейчас особенно важно ощущать надежность правовой защиты. \n\n\
    Следим за развитием - это важный сигнал о том, как власть балансирует между сохранением\
    \ бизнеса и защитой прав дольщиков в условиях нестабильности рынка."
