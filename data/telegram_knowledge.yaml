  text: 'Госдума разрешит строить на землях ООПТ


    📋 Госдума приняла в первом чтении законопроект, который позволяет исключать земельные
    участки из состава особо охраняемых природных территорий и строить на них объекты
    федерального значения.


    🔎 Какие основания предусмотрели? Три: размещение объектов обороны и безопасности,
    строительство объектов федерального значения и необратимая утрата территорией
    охранного статуса из-за природных ЧС. Решение будет принимать специальная комиссия
    из депутатов, сенаторов и представителей администрации президента, правительства
    и ФСБ.


    ⚠️ Что вызвало споры? Депутаты раскритиковали размытость ключевых понятий — в
    законопроекте нет четких критериев «федеральной значимости» объектов и не определено
    понятие «необратимой утраты» охранного статуса. Законопроект поддержала только
    «Единая Россия», остальные фракции голосовать за документ отказались.


    📌 В декабре мы рассказывали о том, какую критику этот законопроект вызвал среди
    экологов.


