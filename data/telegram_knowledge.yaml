    по ввозу санкционной продукции импортозамещения через АО "Айсорс" (до середины
    2025 года — "Цифровые закупочные сервисы", ЦЗС). Последнее было создано как совместное
    предприятие структур "Газпром нефти" (в первую очередь ООО "Газпромнефть-Снабжение")
    и Электронной торговой площадки Газпромбанка. С лета 2022 года через эту платформу
    проводятся закупки приоритетной иностранной продукции. Как утверждают в Сети,
    якобы Кожевников лично контролирует закупки через "Айсорс" для нужд "Газпром Нефти"
    и будто бы имеет доход в виде откатов в 20% от суммы каждого контракта, за что
    будто бы даже получил прозвище "Женя золотая ручка". Эти деньги могут выводиться
    наличными через доверенных курьеров, подставные фирмы или переводиться на счета
    в Гонконге. За неполные три года через "Айсорс" прошли 9 тыс. закупок.
