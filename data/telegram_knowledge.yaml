  text: 'ПРОГОСЗАКАЗ.РФ (VK)


    ⚖️ Для подтверждения страны происхождения товара необходимо предоставлять выписку
    на сам товар, а не его составные части


    Заказчик осуществлял закупку сварочного аппарата и установил запрет на закупку
    иностранных товаров, предусмотренный п. 1 Постановления № 1875.


    Участник закупки предложил в заявке сразу несколько выписок из РРПП, а именно
    на источник питания, механизм подачи проволоки и блок жидкостного охлаждения.
    По мнению участника, эти элементы являются ключевыми компонентами сварочного аппарата,
    в связи с чем заказчик обязан был признать такую заявку соответствующей. При этом
    в заявке участника, сформированной с использованием электронной площадки путем
    заполнения экранных форм, была указана исключительно реестровая запись на товар
    «Источник питания МС-500М1».


    Комиссия заказчика отклонила заявку.

    Антимонопольная служба посчитала отклонение обоснованным, указав, что для подтверждения
    страны происхождения товара необходимо было представить сведения, подтверждающие
    страну происхождения непосредственно сварочного аппарата, а не какой-либо его
    составной части.


    🔻Правовая оценка суда:


    Исходя из технического задания, комплектация сварочного аппарата состоит из следующих
    компонентов: модуль охлаждения; выносной подающий механизм; кабель-пакеты; крепление
    для баллона; тележка. Следовательно, представленные заявителем реестровые записи
    не совпадают с комплектацией, указанной в техническом задании.


    Таким образом, довод заявителя о том, что заявка последнего была отклонена лишь
    на основании иного кода ОКПД2, не соответствует действительности.


    Сопоставляя товар, предложенный участником закупки, с объектом закупки для нужд
    заказчика, комиссия должна руководствоваться комплексным подходом, оценивая все
    представленные в составе заявки документы, а не только лишь формальное согласие
    участника закупки на поставку заказчику товара и представление реестровой записи,
    не соответствующей предмету закупки.


    При этом Законом № 44-ФЗ не предусмотрены правовые основания для допуска заявок
    в случае несоответствия декларируемого товара требованиям извещения.


    Комиссия УФАС правомерно пришла к выводу, что доводы жалобы заявителя являются
    необоснованными.


    📄 Решение АС г. Москвы от 24.03.2026 г. по делу № А40-346352/2025 (суд также отказал
    признавать заключенный контракт недействительным № А40-335458/2025)'
