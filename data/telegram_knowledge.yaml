  text: 'Мораторий на штрафы для застройщиков продлят до конца 2025 года - Минстрой


    Благодаря этому Минстрой продлит срок сдачи более тысячи новостроек до второй
    половины 2025 года. Если точнее, то для 1,4 тыс. проектов. Об этом министр строительства
    и ЖКХ Ирек Файзуллин рассказал на Петербургском международном экономическом форуме
    (ПМЭФ)


    По его словам текущая распроданность новостроек с вводом в 2026 году достигает
    31%. Приток средств, вошедший в строительную сферу от дольщиков за 2025 год, оценивается
    в 700-800 млрд руб.

    «Чтобы вся система устойчиво работала, мы считаем, что прирост должен быть где-то
    1,6-1,8 трлн руб. Мы в целях того, чтобы некоторые сложности снять у застройщиков,
    приняли решение о продлении моратория на вторую половину 2025-го года, то есть
    возможность сдвинуть сроки».

    По данным Росстата, в мае 2025 года было сдано 5,9 млн кв. м жилья (-17% в годовом
    выражении). Снижение объемов сдачи фиксируется второй месяц подряд. В апреле оно
    составило 7,4%.


    Мораторий освобождает застройщиков от уплаты штрафов за нарушение сроков исполнения
    обязательств, предусмотренных договором, в том числе при строительстве жилья с
    господдержкой. Он действует с 2022 года и ранее уже продлевался.'
