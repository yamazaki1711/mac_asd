  text: "‼ ФНС оценивает факт использования VPN \U0001F447\n\n\U0001F5FA В настоящее\
    \ время формируется устойчивая судебная практика, придающая значение факту использования\
    \ VPN в различных правоотношениях. Не обошел этот процесс и взаимодействия с ФНС.\n\
    \n\U0001F30E ФНС подловила компанию на использовании формального документооборота\
    \ для получения налогового вычета и привлекла ее к ответственности. Компания с\
    \ этим не согласилась и обратилась в суд.\n\n\U0001F4CC Формулировка иска\n\n\
    ✏ О признании недействительным решения ФНС \n\n\U0001F4CC Позиции судов \n\n\U0001F534\
    \ Две инстанции отказали в иске.\n\n✍ Не допускается принятие к бухгалтерскому\
    \ учету документов, которыми оформляются не имевшие места факты хозяйственной\
    \ жизни, в том числе лежащие в основе мнимых и \nпритворных сделок.\n\nНалоговые\
    \ декларации спорные контрагенты предоставляли с IP-адресов, находящихся за пределами\
    \ территории Российской Федерации, что свидетельствует о применении средств подмены\
    \ IP-адресов (VPN) в целях сокрытия реального IP-адреса, с которого представлялась\
    \ отчетность.\n\U0001F3E6 Помимо этого суды учли и другие признаки формального\
    \ документооборота: заключение договоров на следующий день после регистрации контрагента\
    \ в качестве юрлица, отсутствие в договорах информации о расчетных счетах контрагента\
    \ и т.д.\n\n\U0001F4BC Комментарий юристов:\n\n\U0001F9E9 Теперь стоит задуматься\
    \ о выключении VPN во время отправки налоговых деклараций. Хотя все же в подобных\
    \ спорах оценивается вся совокупность обстоятельств, а не отдельные факты.\n\n\
    \U0001F50D Постановление 19 ААС от 05.03.2026 г. по делу № А14-16649/2024\nhttps://m.kad.arbitr.ru/Card/2f307091-2c42-4724-936d-95e0377bf4b1\n\
    \n⁉ Как Вы думаете, будут ли суды оценивать использование VPN в различных спорах?\n\
    \n\U0001F44D – Конечно.\n\U0001F914 – Нет.\n\nPS: Выводы являются обобщёнными.\n\
    \n#арбитражныйпроцесс, #фнс, #налоговая, #vpn\n@arbitrium_processus\nhttps://t.me/arbitrium_processus"
