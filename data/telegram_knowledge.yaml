  text: 'ПРОГОСЗАКАЗ.РФ (VK)


    ⚖️ На хирургические перчатки распространяются требования о совокупном количестве
    баллов


    Антимонопольным органом при рассмотрении жалобы предпринимателя было установлено,
    что закупаемый заказчиками товар соответствует позиции 69 «Предметы одежды и ее
    аксессуары из вулканизированной резины, кроме твердой резины (эбонита)» с кодом
    ОКПД2 22.19.6 приложения № 2 к Постановлению № 1875. В извещении об осуществлении
    закупки были установлены соответствующие ограничения.


    Рассмотрев жалобу, контрольный орган признал ее необоснованной, посчитав, что
    комиссия заказчика обоснованно отклонила заявку предпринимателя.


    Решение антимонопольного органа было обжаловано в суде. Предприниматель посчитал,
    что для кода ОКПД2 22.19.60.111 «Перчатки хирургические резиновые», который присвоен
    товару, предложенному предпринимателем, отсутствует требование о совокупном количестве
    баллов.


    🔻Правовая оценка суда:


    Заказчиком закупаются перчатки хирургические из латекса гевеи, неопудренные, в
    соответствии с позицией КТРУ 22.19.60.113-00000001. В отношении закупаемого товара
    заказчиком на официальном сайте ЕИС определен код ОКПД2 22.19.60.113 «Перчатки
    хирургические из каучукового латекса стерильные одноразовые», которому присвоен
    НКМИ 122630 «Перчатки хирургические из латекса гевеи, неопудренные». В КТРУ имеются
    позиции, сформированные на основании спорного кода ОКПД2 22.19.60.111:


    ➡️ 22.19.60.111-00000001 «Перчатки хирургические из полихлорпрена, неопудренные».
    НКМИ 139310 «Перчатки хирургические из полихлорпрена, неопудренные»;

    ➡️ 22.19.60.111-00000002 «Перчатки хирургические нитриловые, неопудренные». НКМИ
    185700 «Перчатки хирургические нитриловые, неопудренные».


    В соответствии с пунктами 3.1 и 3.2 ГОСТ Р 52239-2024 перчатки медицинские классифицируются,
    в том числе по типу:

    ➡️ Тип 1: перчатки, изготовленные на основе латекса натурального каучука;

    ➡️ Тип 2: перчатки, изготовленные на основе нитрильного латекса, полихлоропренового
    латекса, раствора бутадиен-стирольного каучука, каучуковой эмульсии на основе
    сополимера бутадиен-стирола или раствора термопластичного эластомера (термоэластопласта).


    Таким образом, для хирургических перчаток, произведенных из латекса на основе
    натурального каучука (то есть на природной основе), предусмотрен специальный код
    ОКПД2 22.19.60.113, в связи с чем код ОКПД2 22.19.60.111 применяется к иным перчаткам
    резиновым (из латекса на основе синтетических каучуков).


    Пунктом 7 примечаний к Постановлению № 719 установлено, что продукция химической
    и нефтегазохимической промышленности может быть отнесена к российской промышленной
    продукции при условии достижения в совокупности следующего суммарного количества
    баллов за выполнение на территории Российской Федерации указанных операций (условий)
    для каждой единицы продукции по видам деятельности: 22.19 «Изделия из резины прочие
    (за исключением услуг)» – не менее 120 баллов.


    То обстоятельство, что предложенный предпринимателем к поставке товар внесен в
    РРПП по коду ОКПД2 22.19.60.111, в рассматриваемом случае значения не имеет, на
    что верно указало УФАС.


    Вместе с тем, реестровая запись № 10540910 в отношении товара, предложенного предпринимателем,
    не содержала сведений о совокупном количестве баллов, при этом реестровая запись
    № 10492571, указанная иным участником закупок, такие сведения о совокупном количестве
    баллов содержала.


    Таким образом, комиссия заказчика правомерно отклонила заявку предпринимателя.


    📄 Решение АС Омской области от 02.04.2026 г. по делу № А46-24245/2025'
