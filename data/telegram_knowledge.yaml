  text: "❓ Строительный контроль – что включает и кто выполняет\n\n\U0001F50E Строительный\
    \ контроль при осуществлении строительства, реконструкции и капитальном ремонте\
    \ объектов капитального строительства осуществляется на основании ГрК РФ Ст. 53\
    \   и  Постановления Правительства РФ № 468 от 21 июня 2010 года.\n\U0001F4CC\
    \ В соответствии со статьей 53 п.4 Градостроительного кодекса РФ, в процессе строительства\
    \ объекта должен проводиться контроль над выполнением работ, которые оказывают\
    \ влияние на безопасность объекта строительства.\n➡️Строительный контроль проводится\
    \ в процессе строительства, реконструкции, капитального строительства в целях\
    \ проверки соответствия выполняемых работ проектной документации, требованиям\
    \ технических регламентов, результатам инженерных изысканий, требованиям градостроительного\
    \ плана земельного участка.\n\U0001F44DСтроительный контроль проводиться лицом,\
    \ осуществляющим строительство. ➡️В случае осуществления строительства, реконструкции,\
    \ капительного ремонта на основании договора строительный контроль проводиться\
    \ застройщиком или заказчиком. \nЛицо, осуществляющее строительство, в составе\
    \ строительного контроля выполняет:\n✔️ входной контроль рабочей документации,\
    \ предоставленной застройщиком (техническим заказчиком);\n✔️ освидетельствование\
    \ геодезической разбивочной основы объекта капитального\nстроительства;\n✔️ входной\
    \ контроль применяемых строительных материалов, изделий, конструкций, полуфабрикатов\
    \ и оборудования в необходимом объеме согласно утвержденной проектной документации,\
    \ документам по стандартизации, положениям договора с застройщиком (техническим\
    \ заказчиком), включая ведение журнала входного контроля и иной исполнительной\
    \ документации по результатам входного контроля (в соответствии с ГОСТ 24297 и\
    \ иными документами по стандартизации);\n✔️ операционный контроль в ходе выполнения\
    \ строительно-монтажных работ в полном объеме согласно утвержденной проектной\
    \ документации, документам по стандартизации, положениям договора с застройщиком\
    \ (техническим заказчиком), в том числе контроль соблюдения требований охраны\
    \ труда и включая записи в соответствующем разделе общего журнала работ;\n✔️ контроль\
    \ качества готовой     строительной продукции (результатов строительно-монтажных\
    \ работ) (приемочный контроль) в полном объеме согласно утвержденной проектной\
    \ документации, документам по стандартизации, положениям договора с застройщиком\
    \ (техническим заказчиком) по завершении строительно-монтажных работ;\n✔️ освидетельствование\
    \ работ в полном объеме, в том числе скрытых (перечень скрытых работ, подлежащих\
    \ освидетельствованию, устанавливается в действующих нормативных документах, проектной\
    \ и рабочей документации);\n✔️ освидетельствование ответственных строительных\
