  text: "Кассация применила эстоппель: подписание договора факсимиле не помогло признать\
    \ его незаключенным\n\n➡️«Новелко» , иностранная компания и ГК «Пластик» подписали\
    \ договор перевода долга. По его условиям компания задолжала «Пластику» 21,3 тыс.\
    \ евро по договору поставки, а «Новелко» обязалось вернуть кредитору эту сумму.\
    \ Со стороны «Новелко» и компании договор подписан от имени директора с использованием\
    \ факсимиле. «Новелко» обратилось в суд с иском к «Пластик» о признании договора\
    \ незаключенным.\n\nИстец указал, что подпись руководителя выполнена без согласования\
    \ условиями договора, что нарушает требование о письменной форме сделки. Ответчик\
    \ настаивал на том, что договор заключен путем обмена документами с электронных\
    \ адресов сторон в результате длительной переписки по согласованию условий, а\
    \ поведение истца и компании является недобросовестным и направленным на неисполнение\
    \ обязательств. Суд первой инстанции иск удовлетворил, апелляция поддержала это\
    \ решение.\n\n\U0001F528 Кассационная инстанция отменила судебные акты и отказала\
    \ в иске. Суд указал, что подписи директора со стороны «Новелко» и компании скреплены\
    \ оттисками их печатей. Принадлежность печатей и нахождение их у представителей\
    \ не оспаривались, доказательств их выбытия, кражи или утери не представлено,\
    \ о фальсификации оттисков не заявлялось. \n\nИстец и компания, зная об отсутствии\
    \ в договоре условия о подписании факсимиле, тем не менее подписали его таким\
    \ способом. Подписание истцом договора, а затем обращение в суд с иском о его\
    \ незаключенности суд счел умышленным, недобросовестным и очевидным злоупотреблением\
    \ правом.\n\nСуд применил принцип эстоппеля: сторона лишается права ссылаться\
    \ на возражения в отношении ранее совершенных действий, если ее поведение свидетельствовало\
    \ о действительности сделки. «Новелко» и компания — аффилированные лица, так как\
    \ у них один директор. В деле есть доказательства заключения договора путем обмена\
    \ документами с электронных адресов, принадлежащих сторонам, причем договор исходил\
    \ от истца.\n\n\U0001F4C4 Источник: постановление АС Волго-Вятского округа от\
    \ 04.03.2026 по делу № А43-20170/2024\n\n⚪ Арбитражная практика в Телеграм | Сообщество\
    \ ВК | Канал в MAX"
