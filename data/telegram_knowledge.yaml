  text: "Важная информационная повестка: Минстрой России вместе с российскими организациями\
    \ представил ключевые практики в области градостроительства и урбанизации представителям\
    \ ООН-Хабитат\n\nТак, о своем опыте рассказали представители Евразийского банка\
    \ развития, BЭБ.PФ, ФАУ «ЕИПП РФ», КБ «Стрелка». \n\n«Мы готовы качественно перестроить\
    \ взаимодействие с ООН-Хабитат и расширить наше представительство на международной\
    \ арене. Мы хотим, чтобы наше взаимодействие давало конкретный результат — не\
    \ просто количество мероприятий, а запущенные проекты, подписанные соглашения.\
    \ У нас действительно есть колоссальный опыт, которым мы готовы делиться и реализовывать\
    \ новые совместные проекты», — отметил замминистра строительства и ЖКХ РФ Никита\
    \ Стасишин, который провёл встречу с директором регионального офиса программы\
    \ по Восточной Европе и Центральной Азии Эрфаном Али. \n\nВ дальнейшем планируется\
    \ обмен опытом устойчивого развития населенных пунктов и лучшие практики в области\
    \ градостроительства, архитектуры и коммунальной сферы. \n\nТакже российская сторона\
    \ заявила, что будет участвовать в 13-й сессии Всемирного форума городов (WUF13)\
    \ в Баку, которая пройдет 17–22 мая 2026 года. Там планируется стенд Минстроя\
    \ России. \n\n\U0001F972«Законы стройки» в MAX"
