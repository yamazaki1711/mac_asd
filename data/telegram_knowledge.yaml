  text: 'ПРОГОСЗАКАЗ.РФ (VK)


    ⚖️ Подтверждение страны происхождения лекарственного препарата сертификатом СТ-1


    На участие в закупке лекарственного препарата норэпинефрин было подано 3 заявки.


    ▶️ Заявка № 1 содержала: сертификат СТ-1 № 40300000060 и регистрационное удостоверение
    ЛП № (006586)-(РГ-RU);

    ▶️ Заявка № 2 содержала: сертификат СТ-1 № 40300000060 и регистрационное удостоверение
    ЛП № (006586)-(РГ-RU);

    ▶️ Заявка № 3 содержала: регистрационное удостоверение № ЛП-007101, сертификат
    по форме СТ-1 № 4144041008 и документ, содержащий сведения о стадиях технологического
    процесса производства лекарственного средства, осуществляемых на территории Российской
    Федерации (СП-0003038/10/2024).


    Комиссия заказчика признала все заявки соответствующими, однако антимонопольный
    орган пришел к выводу, что заявки № 1 и № 2 должны были быть приравнены к заявкам
    с предложением товаров иностранного происхождения и отклонены комиссией по осуществлению
    закупок по причине неподтверждения такими участниками страны происхождения товарной
    позиции в заявке.


    Суд первой инстанции признал решение антимонопольного органа недействительным,
    однако апелляция отменила решение нижестоящего суда.


    🔻Правовая оценка суда:


    Разделом 7 Правил определения страны происхождения товаров, являющимися неотъемлемой
    частью Соглашения о Правилах определения страны происхождения товаров в Содружестве
    Независимых Государств от 20 ноября 2009 г., установлено, что в сертификате СТ-1
    устанавливаются следующие критерии происхождения товаров:


    • «П» – товар, полностью произведенный в государстве – участнике Соглашения;

    • «Д1905» – товар, подвергнутый достаточной обработке/переработке, с указанием
    первых четырех цифр кода товарной позиции по ТН ВЭД конечной продукции, например
    – 1905;

    • «К» – товар, страна происхождения которого определена на основе кумулятивного
    принципа.


    Заявки № 1 и № 2 содержали сертификат СТ-1 40300000060 с указанием в графе 9 «Д3004».
    Согласно разделу 7 Правил определения страны происхождения товаров, такое обозначение
    присваивается товару, подвергнутому достаточной обработке (переработке) на территории
    ЕАЭС. В связи с этим обозначенные сертификаты не подтверждают, что полное производство
    лекарственного препарата (все стадии) осуществляется на данной территории. Подтверждением
    полного производства лекарственного препарата на территории ЕАЭС является обозначение
    символа «П».


    Согласно ГРЛС, производитель предлагаемого к поставке лекарственного препарата
    МНН – Метформин (регистрационное удостоверение ЛП № (006586)-(РГ-RU)) при его
    производстве использует фармацевтические субстанции, произведенные Мединекс Лабораториз
    Пвт. Лтд (Индия), Вухан Вуйао Фармасьютикал Ко. Лтд (Китай), что не позволяет
    сделать вывод о производстве всех стадий лекарственного препарата на территории
    Российской Федерации.


    Выводы суда первой инстанции о том, что сертификат соответствия по форме СТ-1
    с обозначением «Д3004» свидетельствует, что товар подвергнут существенной обработке
    (переработке) на территории ЕАЭС, и данного обстоятельства достаточно в целях
    применения положений Правил № 1875, отклоняются, так как обработка (переработка)
    товара для придания ему характерных свойств на территории ЕАЭС не равнозначна
    осуществлению всех стадий производства лекарственного препарата на территории
    ЕАЭС.


    📄 Постановление Второго ААС от 02.04.2026 по делу № А29-8869/2025'
