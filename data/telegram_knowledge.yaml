  text: "Возможные направления развития системы ценообразования и сметного нормирования\n\
    (часть 1)\n\nИсходя из результатов анализа, можно предположить следующие возможные\
    \ направления развития системы ценообразования и сметного нормирования (применительно\
    \ к стадии архитектурно-строительного проектирования) в среднесрочной перспективе\
    \ (до 2030 г.):\n\n1️⃣ Продолжение реализации текущей стратегии.\n\nДанный вариант\
    \ можно характеризовать как наиболее вероятный в текущих условиях.\n\nОн предусматривает\
    \ точечную настройку сложившейся системы без значительных преобразований:\n☑️\
    \ локальную актуализацию номенклатуры сметных норм (по запросам инициаторов) без\
    \ общего пересмотра и гармонизации всей системы;\n☑️ уточнение и детализация нормативно-методических\
    \ документов в соответствии с запросами и влиянием внешних факторов (изменение\
    \ налоговых ставок и ставок по кредитам, изменение заработной платы в строительстве,\
    \ введение дополнительных требований к участникам инвестиционно-строительного\
    \ процесса и самому процессу и т.п.);\n☑️ дальнейшее ужесточение требований к\
    \ составу и содержанию сметной части ПД без изменения требований к полноте содержания\
    \ и глубине проработки технической части предпроектной документации и ПД;\n☑️\
    \ развитие локальных инструментов автоматизации (КПСР, «Витрина проектов», автоматизация\
    \ расчета НМЦК и т.д.), с расширением платного функционала;\n\nВероятный результат:\
    \ \n\U0001F4CC дальнейшее увеличение числа корректировок проектно-сметной документации;\n\
    \U0001F4CC увеличение стоимости и сроков разработки ПСД;\n\U0001F4CC увеличение\
