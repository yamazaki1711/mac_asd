  text: "Ставить счетчики в новостройках и после реконструкции МКД станет необязательно\n\
    \nОпубликован Законопроект № 1212352-8 «О внесении изменения в статью 13 Федерального\
    \ закона \"Об энергосбережении и о повышении энергетической эффективности и о\
    \ внесении изменений в отдельные законодательные акты Российской Федерации (об\
    \ уточнении требований к оснащению многоквартирных домов приборами учета тепловой\
    \ энергии)».  \n\nВ чем суть  \n\nИзменяются правила установки индивидуальных\
    \ счетчиков тепла в МКД.   \n\n1️⃣Индивидуальные счетчики тепла будут ставить\
    \ в МКД только при наличии технической возможности. \n\nВ частности, в домах с\
    \ вертикальной разводкой вместо обычных счетчиков можно будет использовать альтернативные\
    \ способы учета. Например, распределители тепла. \n\n2️⃣Отменяется обязательность\
    \ установки счетчиков тепла в новостройках и в МКД после реконструкции.    \n\n\
    Напоминаем  \n\nВ МКД с вертикальной разводкой поставить классические индивидуальные\
    \ счетчики зачастую невозможно. Поэтому обязательность установки отменяется. \n\
    \n\U0001F972«Законы стройки» в MAX"
