  text: '☝️Семейная империя Вадима Гуринова  ☝️Семейная (https://bugabooks.com) империя
    Вадима Гуринова Вадим (https://t.me/highway_to_business) Гуринов стартовал в 90-х
    с продуктов «Мечта хозяйки», «Моя семья», «Посиделкино», создав крупного игрока
    на рынке майонеза, кетчупов и кондитерки. Позже продал бизнес и перешёл в нефтехимический
    и шинный сектор, где сблизился с «Газпром нефтью», «Сибуром» и окружением Геннадия
    Тимченко. В 2011 году Гуринов возглавил «Сибур – Русские шины» (позже АО «Кордиант»),
    после чего ключевые доли перешли на его жену Галину. Параллельно семья через цепочки
    компаний в Европе и офшорах вела девелоперские и финансовые схемы. Основной принцип
    — бизнес оформлен на родственников: ▪️Галина Гуринова — паспорта Белиза и Кипра,
    соучастие в иностранных структурах. ▪️Дочь Валерия — британский паспорт, живёт
    в Лондоне, управляет NEW END DEVELOPMENTS и HALMAR, через которые, по данным прессы,
    проходили операции по «легализации» российских денег в ЕС и Великобритании. ▪️Брат
    Артём Гуринов — фигурировал в Панамском досье, участвовал в провальном проекте
    Ruric AB, после которого часть активов ушла в офшоры. Отдельная крупная линия
    — связи с бизнесом Глеба Франка (зять Тимченко) и попытками контроля в рыбопромышленной
    сфере. Сейчас семейный контур также замыкается на ГК «Сервис-Телеком», владеющую
    башнями Beeline (сделка на ~$1 млрд). Формально Гуринов там «не при делах», но
    активы оформлены на жену и доверенных лиц. Это классическая российская семейная
    бизнес-империя: офшоры → иностранные паспорта → активы в ЕС и Лондоне → внутренние
    деньги проходят «через запад» → возвращаются как «инвестиции». Публично — «патриотический
    бизнес». Фактически — структура для вывода и защиты капитала в юрисдикциях ЕС
    и Британии.'
