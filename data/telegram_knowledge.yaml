  text: "Как находят скрытых контролирующих лиц?\n\nК недавнему посту обещал рассказать,\
    \ как находят скрытых контролирующих лиц. Рассказываю.\n\nСпособов много, но один\
    \ из самых неожиданных — бизнес-подкасты.\n\nПредставьте: предприниматель приходит\
    \ в подкаст, рассказывает о своём бизнесе, с гордостью называет себя фактическим\
    \ владельцем. При этом формально никакого отношения к компании не имеет. Ни в\
    \ уставе, ни в ЕГРЮЛ.\n\nЕсли дело доходит до банкротства, то эти записи становятся\
    \ доказательствами. И суды их используют (пусть и не всегда).\n\n\U0001F3DBВот\
    \ реальные примеры из судебной практики:\n\nСуды указали, что одним из доказательств\
    \ аффилированности компаний и того, что их конечными владельцами являются ответчики,\
    \ является интервью ответчика, опубликованное 19.01.2021 на YouTube-канале «Павел\
    \ Гительман», в котором он сообщил, что в структуру корпорации входит около 50\
    \ компаний и что основным собственником является он сам.\n\n‼️Оговорка: кассация\
    \ в итоге отменила судебные акты по этому делу, но как доказательство, которое\
    \ создало ответчику серьёзные проблемы, пример показательный.\n\n\U0001F517Источник:\
    \ Постановление АС Московского округа от 7 марта 2024 г. № Ф05-14220/22 по делу\
    \ № А40-37108/2020\n\nВ подкасте «Механики Бизнеса» ответчик представлен как основатель\
    \ и собственник должника.\n\U0001F517Источник: Постановление АС Московского округа\
    \ от 20 февраля 2026 г. № Ф05-14792/25 по делу № А40-265637/2023\n\nВ ещё одном\
    \ деле было представлено множество примеров интервью ответчика, его публичных\
    \ заявлений о его участии в деятельности должника. \n\nСуд делает вывод:\nСледовательно,\
    \ факт вхождения ОАО \"ГлобалЭлектроСервис\", владеющего 100% долей участия ООО\
    \ \"УПТК\", в группу \"Сумма\", конечными бенефициарами которых являются братья\
    \ Магомедов Зиявудин Гаджиевич и Магомедов Магомед Гаджиевич, подтверждается многочисленными\
    \ публикациями в СМИ, а также установлено судебными актами.\n\U0001F517Источник:\
    \ Постановление Девятого арбитражного апелляционного суда от 07.03.2023 по делу\
    \ № А40-110809/2016 \n\n➡️Я лично в своей практике доказывал статус контролирующего\
    \ лица в том числе через публичные заявления. Это лишь одно звено в цепочке доказательств,\
    \ но оно создаёт хороший эффект.\n\n❗️Вывод простой: желание продвинуть личный\
    \ бренд (если что, не осуждаю, наоборот даже) через подкаст, интервью может обернуться\
    \ тем, что вас раскроют как скрытого бенефициара. Консультируйтесь с юристами\
    \ перед интервью.\n\n\U0001F4FDРанее по теме\n▫️Четыре популярных мифа о субсидиарной\
    \ ответственности\n\n\U0001F3F7Прочёл в законе"
