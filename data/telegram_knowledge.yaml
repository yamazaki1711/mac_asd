  text: "«Ваши акты переданы неуполномоченным лицам, а значит работы к приемке не\
    \ предъявлены и оплате не подлежат». Подрядчик против группы с выручкой 3 млрд.\n\
    \nПодрядчик работы выполнил, акты передал на площадке. Получил отметки на вторых\
    \ экземплярах. Но заказчик не оплатил.\n\nПозиция: Ваши акты КС-2 - фикция. Один\
    \ подписант никогда у нас не работал. Второй на даты подписания был на больничном\
    \ - вот пять листков нетрудоспособности. Эти подписи ничего не стоят».\n\nСправка\
    \ отдела кадров. Ответ налоговой и ПФР. Оригиналы больничных. Всё грамотно и красиво.\n\
    \nНа стороне заказчика - управляющая компания одного из крупнейших логистических\
    \ комплексов России. Восемьсот сотрудников. Юристы соответствующего уровня.\n\n\
    На моей стороне - небольшая компания-электромонтажник, которая полгода работала,\
    \ сдала объект и теперь рискует не получить почти 8 миллионов.\n\nДоказать подлинность\
    \ подписи человека, которого в штате никогда не было - нельзя. Доказать дееспособность\
    \ подписи человека на больничном - нельзя. На бумаге у нас ноль.\n\nЯ листаю акт\
    \ КС-2 в третий раз. И вижу одну деталь, которую все пропустили.\n\nВходящий штамп.\
    \ На самом акте. Поставлен канцелярией заказчика.\n\nОдин штамп. Одна дата. Подлинник.\n\
    \nДальше всё схлопывается за две минуты. \n\nПункт 5.3 договора: 5 рабочих дней\
    \ на мотивированный отказ. Молчание = приёмка. Заказчик молчал.\n\nКто подписал\
    \ акт - уже не имеет значения. Неуполномоченный. Нештатный. На больничном. На\
    \ Луне. Срок прошёл. Работы приняты.\n\nПлати.\n\n7,9 млн в пользу подрядчика.\n\
    \nПодрядчики проигрывают такие дела не потому, что плохо работают. А потому, что\
    \ не знают 5–6 точек, в которых заказчик готовит вам ловушку ещё до первого спора.\n\
    \nЯ собрала их в один чек-лист: «Как гарантированно получить оплату за выполненные\
    \ работы».\n\nТо, что я отрабатываю в каждом деле против крупного заказчика.\n\
    \n\U0001F449 Забрать в боте: @advokatgrikevich_bot \n\nMAX - резервный канал"
