  text: "ОТ КАСТИНГА ДО ПРИГОВОРА\n\nМногие в комментариях спрашивали, чем в итоге\
    \ закончилось дело псевдомодельного агентства «Grand», где девушкам под красивыми\
    \ разговорами про карьеру, съёмки, подиум и «успешное будущее» по факту продавали\
    \ кредиты на воздух.\n\nЭтим делом мы занимались вместе с адвокатом Азаматом Огоевым,\
    \ представителем юридической компании «Ярдрей» в Тюмени. Мы снимали ролик о том,\
    \ как пришли в это агентство, вызывали полицию и как от нас пытались убегать владельцы\
    \ этого заведения. Параллельно общались с пострадавшими, фиксировали всё на камеру\
    \ и добивались того, чтобы всё это получило вполне конкретные процессуальные последствия.\
    \ К счастью, все причастные по этому делу задержаны, стали героями телевизионного\
    \ выпуска и сейчас ожидают приговора суда.\n\nПо нашей практике такие истории\
    \ почти всегда заканчиваются одинаково. Те, кто рассчитывает на лёгкие деньги,\
    \ в итоге получают не красивую жизнь, а уголовное дело и вполне понятные последствия.\n\
    \nКонтакты представительства юридической компания \"Ярдрей\" г. Тюмень\n\n• Телефон:\n\
    \U0001F4DE +79995554141 \n\U0001F4CCОдесская улица, 3а к1\n\n\U0001F4F1 Телеграм:\
