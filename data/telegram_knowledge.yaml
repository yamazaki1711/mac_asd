  text: "Разбор проекта ПНСТ на «собирательный» журнал \n\nЧасть 2 из 2\n\nЕсли закрыть\
    \ глаза на явные ляпы, коих очень много и кривые формы, а брать только идею и\
    \ логику реализации, то проект ПНСТ про цифровой документ должен быть сплошь в\
    \ блок-схемах. Но в приложении только одна принципиальная схема, которая не отвечает\
    \ вообще ни на что и дает волю фантазии вендорам сделать как им вздумается, учтя\
    \ по дороге все хотелки заказчиков и наплевав на требования НПА и стандартов.\
    \ \n\nПро передачу данных вообще прикол. Такое ощущение, что авторы не видели\
    \ ни ИСУП, ни ВИС и думают, что есть какая-то единая среда, куда дают доступ ГСН\
    \ и прочим проверяющим. Нет никакой СОД! Есть куча локальных СОДиков с проблемами\
    \ интеграции из-за битых XML-схем и прочих болячек. И каждый в своей работает.\n\
    \nБайпас. Об этом вообще все забывают и авторы проекта ПНСТ не стали исключением,\
    \ а зря. Запасной вариант ведения документации в бумаге должен быть. Более того,\
    \ по крайней мере на данном этапе электронные документы и их бумажные дублеры\
    \ должны если не зеркалиться, то быть очень похожими. \n\nЕсли этого не сделать,\
    \ то, во-первых, переход на цифру будет очень длительным и болезненным. Во-вторых,\
    \ при отсутствии интернета и возможности составления и подписания документов в\
    \ цифре (плюс секретка) все просто встанет или будет сильно тормозиться. \n\n\
    По одной фразе, что ПНСТ ничего из существующего не меняет и по другим несостыковкам\
    \ становится ясно, что авторы сами еще не определились, взамен АОСР форма по приложению\
    \ Б, или в дополнение. Единый цифровой журнал работ, или просто собирает все из\
    \ существующего. Если всё-таки в дополнение, то почему новая форма с кучей данных\
    \ не должна считаться дублированием данных?\n\nНе понятно, что там за успешный\
    \ практический опыт такой был, потому что никаким заявленным сокращением издержек\
    \ по уменьшению трудозатрат специалистов на формирование и ведение исполнительной\
    \ тут и близко не пахнет. \n\nЯ, конечно, понимаю, что, возможно, в нынешних реалиях\
    \ легче сделать новый стандарт, чем изменить существующий, особенно НПА. Но все\
    \ же, почему простая идея убрать лишние и дублирующие данные в существующих документах\
    \ не посещает умы нормотворцев?\n\nМы делали подробнейший анализ и про общий журнал,\
    \ и про спецжурналы, и про акты, про все эти проблемы, и как их решить. Все давно\
    \ уже придумано и работает! Зачем изобретать велосипед?\n\nНо на чужом ни имя\
    \ себе не сделаешь, ни диссер не защитишь. Поэтому рождаются такие вот новые «идеи»,\
    \ которые даже в теории не выдерживают никакой критики. Не говоря уже о практике.\n\
    \nP.S.: а если это вообще описание СОД чьего-то ПО, то смысл? В чем тут сокращение\
    \ дублирования данных? Все вендоры и без ПНСТ уже лепят экранные данные как хотят\
    \ в разрез существующих форм документов...\n\n#нормирование #бюрократия #цифра\
    \ #формы"
  text_preview: "Разбор проекта ПНСТ на «собирательный» журнал \n\nЧасть 2 из 2\n\n\
