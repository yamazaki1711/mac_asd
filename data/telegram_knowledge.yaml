  text: 'Нельзя требовать снос построек через возврат аренды земли


    🏗 Компания арендовала у мэрии участок для строительства склада. За время аренды
    возвела трансформаторную подстанцию, водопровод, фундамент и здание склада.


    ⏱ Срок аренды истек в августе 2021 года. Спустя два годаэрия потребовала вернуть
    участок свободным от всех сооружений, включая капитальные объекты.


    🧑‍⚖ Три инстанции встали на сторону мэрии. Суды решили: договор закончился — верните
    землю в исходном состоянии. Склад построен без разрешения, право собственности
    не оформлено.


    🏛 Верховный суд отменил все акты. Судьи указали: нельзя требовать освободить публичный
    участок от построенных объектов недвижимости через возврат аренды. Для изъятия
    капитальных строений и объектов незавершенного строительства предусмотрены специальные
    процедуры.


    ↩ Дело направили на новое рассмотрение. Суду нужно разобраться, являются ли строения
    недвижимостью, и применить правильные нормы закона.


    Подробнее в новости


    Определение № 303-ЭС25-6975 от 4 декабря 2025 года по делу № А37-2657/2023


