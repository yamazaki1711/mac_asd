  text: "Почему подрядчики проигрывают суды не по закону, а по документам\n\nПодрядчику\
    \ кажется: если я действительно прав, суд это увидит. \n\nНо строительный спор\
    \ почти никогда не выигрывается силой внутренней уверенности. Он выигрывается\
    \ силой документов.\n\nЭто очень неприятная правда для рынка, но она честная.\
    \ \n\nПодрядчик может реально работать, реально не быть главным виновником просрочки,\
    \ реально выполнять объем. \n\nНо если это не собрано в документы, переписку,\
    \ акты, журналы, письма и понятную хронологию, его \"правота\" остается внутри\
    \ него. В спор она не превращается.\n\nОчень часто после первого заседания или\
    \ после получения иска подрядчик говорит одну и ту же фразу: \"Но это же и так\
    \ понятно\". \n\nНет. \n\nНе понятно. \n\nСуду непонятно, эксперту непонятно,\
    \ оппоненту невыгодно это понимать. \n\nЕсли у вас нет письма о препятствии, значит\
    \ препятствие надо будет долго и мучительно доказывать. \n\nЕсли нет письма о\
    \ дефектах проекта, значит можно считать, что вы спокойно продолжали работать.\
    \ Если нет письма о готовности к сдаче, значит заказчик может строить линию о\
    \ неготовности результата.\n\nСудебный спор - это не место, где в последний момент\
    \ \"догадаются, что вы правы\". \n\nСуд - это место, где выигрывает тот, кто лучше\
    \ подготовил доказательства. \n\nПоэтому хороший юрист в строительном споре начинает\
    \ работать не с красивой речью в заседании, а с разбором документов, хронологии\
    \ и слабых мест позиции.\n\nЕсли у вас уже есть спор или вы видите, что он идет\
    \ к суду, напишите \"спор\" в личку @grikevich. Я подскажу, какие документы и\
    \ доказательства надо поднимать в первую очередь, чтобы не заходить в процесс\
    \ с пустыми руками.\n\U0001F4E9 Telegram: @grikevich\n\U0001F4DE +7 985 227-74-98\n\
    \U0001F4F2 WhatsApp - написать по ссылке\n✉️ E-mail: oxanagrikevich@yandex.ru\n\
    MAX - резервный канал"
