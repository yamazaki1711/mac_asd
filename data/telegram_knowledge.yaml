  text: "❓ Что нужно учесть в разделе  \U0001F4CB\U0001F4CB\U0001F4CB при производстве\
    \ работ в три смены ?\n\n✍ Согласно п. 19 общих положений СНиП 1.04.03-85* часть\
    \ 1 нормы продолжительности строительства объектов предполагают выполнение строительно-монтажных\
    \ работ основными строительными машинами в две смены, а остальных работ - в среднем\
    \ в 1,5 смены; при организации всех работ в две смены необходимо учитывать коэффициент\
    \ 0,9, а при работе в три смены - 0,8. \n➡️ В соответствии с СП 48.13330.2019\
    \ п. 8.1.7 особенности производства работ в ночное время (в третью смену) устанавливаются\
    \ требованиями Федерального закона от 29 декабря 2004 г. N 190-ФЗ \"Градостроительный\
    \ кодекс Российской Федерации\", Федерального закона от 30 марта 1999 г. N 52-ФЗ\
    \ \"О санитарно-эпидемиологическомблагополучии населения\", СанПиН 2.1.2.2645-10,\
    \ СП 51.13330.2011.\n\U0001F4CC В соответствии с СП 51.13330.2011 4.2 при оценке\
    \ уровней шума строительной площадки следует руководствоваться шумовыми характеристиками\
    \ строительных машин и технологического оборудования, учитывать длительность их\
    \ работы в течение смены. Мероприятия по защите от шума следует разрабатывать\
    \ с учетом применения шумозащитного ограждения строительных площадок, звукоизолирующих\
    \ кожухов для машин и технологического оборудования, учета наиболее шумных периодов\
    \ работы строительных машин и технологического оборудования и использования других\
    \ шумозащитных средств, совместное применение которых позволяет обеспечить выполнение\
    \ требований санитарных норм по допустимым уровням шума на прилегающей территории\
    \ и в застройке"
