  text: "Заказчику кажется: выгнал подрядчика - нанял нового - поехали дальше.\n\n\
    Но если отказ от договора не оформить и не закрыть документально границу \"кто\
    \ что сделал\", можно внезапно заплатить за одни и те же работы дважды.\n\nЗачем\
    \ вообще заказчику направлять отказ от договора?\n\nПо умолчанию заказчик действительно\
    \ может отказаться от договора подряда до сдачи результата. Но право - это только\
    \ половина дела. Вторая половина - доказательства.\n\nЕсли отказ не направлен\
    \ (или направлен, но вы не закрыли приемку правильно), подрядчик может:\n\n• \
    \ подождать, пока объект доделают другие,\n•  понять фактический объем,\n•  направить\
    \ акты \"на выполненные работы\",\nи дальше в суде у вас начинается тяжелая история:\
    \ доказывать, кто именно выполнял, где граница, какие работы относятся к первому\
    \ подрядчику, а какие ко второму. Эксперты нередко говорят: \"разграничить невозможно\"\
    . А суд может сделать неприятный вывод.\n•  \nПример из практики:\n\nЗаказчик\
    \ считал, что подрядчик не выполнил работы на сумму аванса, и пошел взыскивать\
    \ \"неотработанный аванс\", неустойку и убытки, часть работ заказчик доделывал\
    \ сам или через третьих лиц.\n\nА подрядчик в ответ заявил: работы сданы, заказчик\
    \ уклонялся от приемки, и представил односторонние акты и доказательства направления\
    \ документов.\n\nСуд в итоге занял позицию, неприятную для заказчика: письма заказчика\
    \ не подтвердили корректную процедуру отказа от приемки, дефектные акты по договору\
    \ не оформлялись, а замечания во многом касались исполнительной документации и\
    \ не доказывали непригодность результата. В итоге заказчику отказали во взыскании\
    \ \"неотработанного аванса\", а подрядчику взыскали долг и неустойку.\n\nЧто вынести\
    \ заказчику из этой истории?\n\n1.  Отказ от договора - это не формальность. Это\
    \ граница, после которой вы должны четко понимать, что принято, что не принято\
    \ и почему.\n2.  Если не хотите принимать работы - нужна процедура: дефектный\
    \ акт, конкретные недостатки, сроки, фиксация. Не \"общее письмо\".\n3.  Перед\
    \ тем как заводить нового подрядчика, сначала закрывайте старого: отказ - фиксация\
    \ объема - документы - границы ответственности.\n\n\nКак оформить отказ правильно?\n\
    \n•  направить уведомление в порядке договора (адреса, каналы, сроки)\n•  продублировать\
    \ \"железно\": ценное письмо + опись + чек\n•  зафиксировать статус работ на дату\
    \ отказа: осмотр, реестр документов, фото/видео, перечень незавершенного, перечень\
    \ дефектов\n•  если есть недостатки - оформить по процедуре договора (дефектный\
    \ акт)\n\nЕсли вы заказчик и хотите прекратить договор так, чтобы потом не доказывать\
    \ в суде \"кто что делал\" и не платить дважды - напишите \"отказ\" в личку @grikevich.\
    \ Я дам шаблон уведомления и чек-лист фиксации объема на дату прекращения.\n\n\
    \U0001F4E9 Telegram: @grikevich\n\U0001F4DE +7 985 227 74 98\n\U0001F4F2 WhatsApp\
    \ - написать по ссылке\nMAX  - резервный канал"
