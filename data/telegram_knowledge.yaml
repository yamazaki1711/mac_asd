  text: "Выиграли торги. Подписали контракт. Посчитали экономику - и поняли: работать\
    \ придётся в минус. \n\nПришли к заказчику, честно объяснили ситуацию. Заказчик\
    \ выслушал, кивнул, всё понял. Говорит: конечно, бывает, давайте разойдёмся спокойно.\
    \ Только напишите письмо, что не можете исполнить по такой цене. Для отчётности.\n\
    \nНаписали.\n\nВ тот же день заказчик оформил односторонний отказ от контракта\
    \ и направил сведения в ФАС. Основание - то самое письмо. Компанию включили в\
    \ реестр недобросовестных поставщиков.\n\nДва года без госзакупок. Ни 44-й, ни\
    \ 223-й закон.\n\nА узнали они об этом через несколько месяцев - когда подали\
    \ заявку на новый аукцион и получили отказ. К тому моменту обжаловать было поздно.\n\
    \nЗаказчик не помогал. Заказчик собирал доказательства. \n\nЯ вижу такие схемы\
    \ регулярно. Заказчик звонит, говорит по-дружески, просит «просто написать». А\
    \ потом это «просто написать» ложится в материалы ФАС как главное доказательство\
    \ вашей вины.\n\nПравило, которое должно быть вбито в голову каждого, кто работает\
    \ с госзакупками:\n\nНикогда не пишите заказчику, что не можете или не хотите\
    \ исполнять контракт. Ни в письме, ни в переписке, ни в мессенджере. Ни в какой\
