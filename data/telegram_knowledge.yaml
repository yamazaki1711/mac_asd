    технологий как в проектировании, так и в строительстве, а также на подготовку
    кадров.


    Важно

    Федеральный проект «Новый ритм строительства» является частью национального проекта
    «Инфраструктура для жизни». Его ключевая цель — повышение эффективности создания
    промышленной, социальной и транспортной инфраструктуры за счет оптимизации административных
