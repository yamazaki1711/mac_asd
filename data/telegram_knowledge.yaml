  text: "‼ Исковая давность канула в Лету \U0001F447\n\n⏳ Не опять, а снова дело с\
    \ истекшим сроком исковой давности. Уже стало системой обращение прокуроров в\
    \ защиту интересов РФ спустя десятки лет. На этот раз ответчиком стал обычный\
    \ подрядчик по госконтракту. Поэтому уничтожение исковой давности подбирается\
    \ к бизнесу все ближе. Правда, в этот раз ответчик сам не стал заявлять о ее применении...\n\
    \n\U0001F6A8 Подрядчик в рамках госконтракта обязался выполнить работы по оснащению\
    \ воинских частей средствами охраны, но так это не сделал. Спустя 10 лет прокурор\
    \ обратился с иском в интересах РФ о взыскании неотработанного аванса.\n\n\U0001F4CC\
    \ Формулировка иска\n\n✏ О взыскании ущерба и процентов по ст. 395 ГК РФ\n\n\U0001F4CC\
    \ Позиции судов\n\n\U0001F534 Все три инстанции в иске отказали.\n⚖ СКЭС ВС РФ\
    \ согласилась с прокурором.\n\n✍ Исковая давность применяется только по заявлению\
    \ стороны в споре, которая в силу положений ст. 65 АПК РФ несет бремя доказывания\
    \ обстоятельств, свидетельствующих об истечении срока исковой давности (п. 2 ст.\
    \ 199 ГК РФ, п. 10 постановления ПП ВС РФ от 29.09.2015 г. № 43).\n\n⌛ Выводы\
    \ судов о пропуске предприятием срока на обращение в суд с соответствующим заявлением\
    \ противоречат п. 2 ст. 199 ГК РФ. Ответчик по делу не принимал участия в судебных\
    \ заседаниях, отзыв на заявление не представил, также не были представлены возражения\
