  text: '🔔Минстрой обновляет индикаторы риска для жилищного надзора после отмены муниципального
    контроля


    На публичное обсуждение вынесли проект приказа Минстроя, которым предлагается
    утвердить типовые индикаторы риска нарушений при осуществлении государственного
    жилищного надзора взамен приказа Минстроя от 20.05.2025 № 301/пр.


    Документ подготовили в развитие Федерального закона от 20.02.2026 № 23-ФЗ, по
    которому с 1 сентября 2026 года отменяется муниципальный жилищный контроль, а
    все полномочия переходят на уровень регионального госнадзора.


    Основное изменение заключается в том, что исключили формулировки с муниципальным
    жилищным контролем. При этом сами индикаторы по содержанию практически не изменились,
    но их формулировки уточнили и унифицировали.


    По проекту сохраняются два базовых триггера для внеплановых проверок:

    ➡️Задолженность перед ресурсоснабжающими организациями.

    Наличие сведений о поданных в арбитражный суд исков о взыскании задолженности
    по договорам ресурсоснабжения или обращения с ТКО на сумму более 300 тыс. руб.,
    сформировавшейся за последние 12 месяцев.


    ➡️Начисление отопления по нормативу.

    Если плата за отопление начисляется по нормативу (а не по приборам учета) более
    трех расчетных периодов подряд.


