  text: "Взыскали 5 млн. + руб. по договору об инвестициях и вспомнили басню Крылова\
    \  \n\nНаш клиент заключил с организацией договор об инвестировании собственных\
    \ средств в строительную деятельность\n\n\U0001F4B8 Однако вместо выплаты инвестиционного\
    \ дохода контрагент уклонился от исполнения обязательств и перестал выходить на\
    \ связь\n\nКогда наш доверитель к нам обратился, то уже успел сам направить претензию\
    \ ответчику\n\n\U0001F6AE Данный документ не содержал требований по оплате и расчет\
    \ неустойки и был отправлен неверным способом, поэтому пришлось готовить его заново\
    \ и отправлять его через правильные каналы \n\n⛔ Последствием неправильной отправки\
    \ претензии стали плюс два месяца на исправление ошибки и ожидания почтовых сроков\n\
    \n\U0001F4D6 Про занятие чужой профессией лучше всех написал Иван Крылов в басне\
    \ \"Щука и Кот\": \"Беда, коли пироги начнет печи сапожник, а сапоги тачать пирожник\"\
    \n\nВ нашем деле клиент допустил ошибку из-за спешки, а потом все таки обратился\
    \ к юристам\n\nК сожалению, претензия - это не бытовая переписка и ошибки при\
    \ ее подготовке и отправке влекут серьезные юридические последствия\n\n\U0001F449\
    \ Например, в потребительском споре на 3 млн. руб. неправильная претензия повлечет\
    \ для истца уменьшение суммы взыскания на треть, а это приличная сумма (1 млн.\
    \ руб.)\n\nПоэтому в случае спора рекомендуем обратиться к знающим людям с юридическим\
    \ образованием и необходимым опытом, и не экспериментировать\n \n\nРуководитель\
    \ юридической компании \"ПРАВАУ\" \nРоман Гулиев"
