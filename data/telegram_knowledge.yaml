  text: "Минстрой РФ пересмотрел минимальные лицензионные требования к УК\n\nРечь\
    \ идет о Проекте Постановления Правительства «О внесении изменений в постановление\
    \ Правительства Российской Федерации от 28 октября 2014 г. № 1110». \n\nРанее\
    \ в нем предлагались более жесткие требования к УК для получения лицензии. Мы\
    \ рассказывали о них ЗДЕСЬ. Теперь требования смягчены.\n\nВ чем суть\n\n1️⃣Убрали\
    \ требование иметь в штате инженера, в т. ч. разбирающегося в ИИ.\n\n2️⃣Исключили\
    \ требование иметь офис УК в том же городе, где находятся обслуживаемые МКД. Это\
    \ облегчит работу областным УК. \n\n3️⃣Снято требование иметь в собственности\
    \ определенную технику. Ее разрешили брать в аренду.  \n\n4️⃣Также разрешено не\
    \ иметь в штате всех необходимых работников, а привлекать по договорам подряда.\n\
    \nПредполагается, что смягчение требований позволит УК более гибко настраивать\
    \ процессы управления многоквартирными домами. \n\n\U0001F972«Законы стройки»\
    \ в MAX"
