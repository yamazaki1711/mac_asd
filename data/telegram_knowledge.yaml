  text: "‼ Никто ничего не должен Таможне за посуду \U0001F447\n\n\U0001F5FA Добиться\
    \ взыскания убытков с ФТС, которая не учла исключения из правил об обязательном\
    \ санитарном контроле, оказалось легко. Все три инстанции единодушно поддержали\
    \ истца, который ввез на территорию РФ товар-исключение.\n\n\U0001F3FA ФТС запретила\
    \ ввоз форм для выпечек, ланч боксов для супов, т.к. на них не было документов,\
    \ подтверждающих их безопасность в части санитарно-карантинных и гигиенических\
    \ требований. Компания с позицией ФТС не согласилась и обратилась в суд.\n\n\U0001F4CC\
    \ Формулировка иска\n\n✏ О взыскании с ФТС убытков\n\n\U0001F4CC Позиции судов\n\
    \n⚖ Суды всех трех инстанций, включая СКЭС ВС РФ, встали на сторону компании.\n\
    \n\U0001F682 В \"Едином перечне продукции (товаров), подлежащей государственному\
    \ санитарно-эпидемиологическому \nнадзору (контролю) на таможенной границе и таможенной\
    \ территории\" содержится упоминание о товарах, контактирующих с пищевыми продуктами.\n\
    \n\U0001F4DC Но в этом же перечне предусмотрено исключение из данной категории.\
    \ Так, не подлежит санитарному контролю посуда.\n\n\U0001F37D Понятие посуда является\
    \ родовым и определяющим для спорных товаров. \n\n\U0001F35C Поэтому представление\
    \ при ввозе спорных товаров на таможенную территорию Таможенного союза документов,\
    \ подтверждающих их безопасность в части санитарно-карантинных и гигиенических\
    \ требований, не требовалось.\n\n\U0001F4BC Комментарий юристов \"Реаналитики\"\
    :\n\n\U0001F9E9 Ранее мы анализировали кейс о том, как техническое описание товара\
    \ защитило компанию в споре с ФТС, которая пыталась признать наушники комплексным\
    \ товаром.\n\n\U0001F50D Определение ВС РФ от 11.12.2025 г. по делу № А78-14206/2022\n\
    https://m.kad.arbitr.ru/Card/a903ecd4-4e95-4f6d-ae23-31f00812df8f\n\n⁉ Вы заметили\
    \ смягчение судебной практики по отношению к бизнесу в спорах с ФТС?\n\n\U0001F44D\
    \ – Да.\n\U0001F914 – Нет, пока слабо заметно, только единичные решения.\n\nPS:\
    \ Выводы являются обобщёнными. Для конкретных рекомендаций и решений обратитесь\
    \ в “Реаналитику”\nreanalitika.ru.\n\n#арбитражныйпроцесс, #фтс, #таможня, #товары,\
    \ #импорт\n@arbitrium_processus\nhttps://t.me/arbitrium_processus"
