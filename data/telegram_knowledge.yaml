  text: "ПОЖАР НА 2,8 МИЛЛИОНА\n\n23 мая 2025 года в тюменское представительство юридической\
    \ компании «Ярдрей» обратился индивидуальный предприниматель. На него подали иск\
    \ в Тобольский городской суд Тюменской области о взыскании 2 800 000 рублей ущерба\
    \ после пожара. 31 марта 2024 года наш клиент передал покупателю рекламную конструкцию\
    \ и выполнил её монтаж. Подключение к электричеству в его обязанности не входило.\
    \ А уже 14 апреля 2024 года в здании, где была установлена вывеска, произошёл\
    \ пожар. Сгорели крыша, сама конструкция и другое имущество. После этого весь\
    \ ущерб попытались повесить на нашего клиента.\n\nНо здесь есть момент, который\
    \ истец почему-то решил обойти стороной. С момента подписания УПД собственником\
    \ рекламной конструкции стал покупатель. А значит, именно он отвечал за её подключение,\
    \ эксплуатацию, обслуживание и соблюдение требований пожарной безопасности. Это\
    \  следует из закона: Статья 38 Федерального закона «О пожарной безопасности»\
    \ прямо говорит, что ответственность за нарушение требований пожарной безопасности\
    \ несут собственники имущества. Поэтому попытка после передачи конструкции переложить\
    \ всё на продавца выглядела, мягко говоря, сомнительно.\n\nПо делу назначили судебную\
    \ экспертизу. И даже она не дала истцу того результата, на который он рассчитывал.\
    \ Эксперт указал лишь, что пожар мог возникнуть из-за аварийного режима работы\
    \ электрооборудования вывески. Именно \"мог возникнуть\", а вот установить причинно-следственную\
    \ связь между пожаром и действиями нашего клиента экспертиза уже не смогла. Причина\
    \ простая: никаких вещественных доказательств не сохранилось, к моменту приезда\
    \ пожарной службы всё уже сгорело. То есть иск на 2,8 миллиона рублей был, а вот\
    \ доказательств вины нашего клиента - нет.\n\n18 декабря 2025 года Тобольский\
    \ городской суд Тюменской области отказал в удовлетворении иска в полном объёме.\
    \ Истец с этим не согласился и подал апелляционную жалобу в Тюменский областной\
    \ суд. Но и там ничего не получилось: 6 апреля 2026 года апелляция оставила жалобу\
    \ без удовлетворения, а решение суда первой инстанции - без изменения.\n\nТеперь\
    \ же у нашего клиента имеется полное и законное право обращения в суд с заявлением\
    \ о возмещении понесённых расходов на оплату юридических услуг, в чём также нами\
    \ будет оказана помощь без дополнительной платы.\n\nКонтакты представительства\
    \ юридической компания \"Ярдрей\" г. Тюмень\n\n• Телефон:\n\U0001F4DE +79995554141\
    \ \n\U0001F4CCОдесская улица, 3а к1\n\n\U0001F4F1 Телеграм: @Yardreysupport\n\U0001F4F2\
    \ MAX: +79995554141\n\U0001F4F1 WhatsApp: http://wa.me/79995554141"
