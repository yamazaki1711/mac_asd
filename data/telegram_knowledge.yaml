  text: 'Зарядная станция на территории — новый источник дохода для коммерческой недвижимости
    с парковками и жилых комплексов.


    Яндекс Электро устанавливает зарядные станции под ключ и берет на себя весь цикл
    работы: финансы, монтаж, подключение, круглосуточный мониторинг, оплату электричества
    и страхование.


    Владельцы локаций не вкладывают собственные средства, а получают :

    — разовую выплату до 300 000 руб. за установку (сумма зависит от города, заезда
    и парковочных мест);

    — до 6 000 руб. за каждый киловатт выделенной мощности;

    — новый платежеспособный трафик владельцев электромобилей.


    Локации подбираются по гео-аналитике Яндекса — модель учитывает больше 50 параметров,
    в том числе загрузку соседних станций. Если на площадке нет свободной мощности,
    оператор помогает с технологическим присоединением.


    Программа актуальна для БЦ, ТЦ, ЖК с гостевыми парковками, паркингов, автодилеров,
    ритейла. Для агентов, которые приводят новые локации, действуют отдельные условия.


    Оставить заявку — на сайте Электро.'
