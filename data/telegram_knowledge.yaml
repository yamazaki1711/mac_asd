  text: 'Кассация вернула спор на новый круг, потому что ответчик не доказал передачу
    криптовалюты должнику


    ➡️ Управляющий оспаривал платежи должника на 832 тыс. рублей. Он полагал, что
    переводы сомнительные, под влиянием заблуждения и без встречного представления. Но
    суды двух инстанций отказали в удовлетворении требований, решив, что должник взамен
    получил криптовалюту.


    Кассация направила спор на новое рассмотрение. Суды, делая вывод о том, что ответчик
    заключил сделку по продаже криптовалюты и исполнил свою обязанность по передаче
    товара покупателю, фактически не проверили равноценность встречного предоставления
    по сделке. 


    🔖 Представленные ответчиком скриншоты не позволяют установить факт передачи криптовалюты.
    Нет доказательств, что именно должник получил встречное исполнение.


    Криптовалюта является объектом гражданских прав, однако, это не освобождает от
    надлежащего доказывания исполнения условий сделки.


    📄 Источник: постановление АС Восточно-Сибирского округа от 02.04.2026 по делу
    № А19-25494/2023


    ⚪ Арбитражная практика в Телеграм | Сообщество ВК | Канал в MAX'
