  text: '«👥 Форум «PROПРОЕКТ-2026» представил ключевые тренды в проектировании систем
    безопасности


    Ежегодный всероссийский инженерный форум, организованный компанией «РУБЕЖ» и АНО
    «Консорциум «ПОПСБ», объединил экспертов для обсуждения изменений нормативной
    базы и их практического применения.


    В центре внимания — обновления СП-3, СП-484 и СП-6: новые требования направлены
    на повышение отказоустойчивости и функциональности систем противопожарной автоматики.


    Среди трендов 2026 года:

    🔵 усиление регулирования национального режима закупок и контроля качества проектной
    документации;

    🔵 расширение применения и приоритет отечественного оборудования и ПО;

    🔵 переподготовка и аттестация специалистов для решения дефицита кадров.


    В рамках форума выступили Александр Рожков, Директор департамента правового обеспечения
    НОПРИЗ, Оксана Пестова, эксперт Института госзакупок, и Елена Шевцова от АНО «Консорциум
    «ПОПСБ». Они осветили новые требования к проектной документации приемке по ФЗ-309,
    значимость российского ПО в цифровых инфраструктурах и подходы к риск-ориентированной
    архитектуре противопожарной защиты.


    Одним из итогов форума также стало подписание соглашения о сотрудничестве между
    Федеральной палатой пожарно-спасательной отрасли и производителями систем безопасности.»'
