    \ Классификация предприятий торговли». \n\nВ чем суть \n\nУтвержден стандарт для\
    \ предприятий торговли: супермаркетов, киосков, пунктов выдачи заказов (ПВЗ) и\
    \ т. д.\n\n1️⃣Приведены:\n\n\U0001F535классификация предприятий торговли по различным\
    \ признакам;\n\U0001F535общие требования к ним. \n\n2️⃣Установлены типология объектов\
    \ розничной торговли и их критерии: \n\n\U0001F535размер торговых площадей;\n\U0001F535\
    специализация ассортимента;  \n\U0001F535формат обслуживания покупателей;\n\U0001F535\
    особенности применяемых технологических процессов.  \n\nНапоминаем\n\nВ Wildberries\
    \ прокомментировали ГОСТ в части ПВЗ и сообщили, что попытка приравнять пункты\
    \ выдачи к традиционным торговым объектам является неправомерной. \n\nЭто может\
    \ негативно отразиться на развитии сети, которая охватывает тысячи населенных\
    \ пунктов по всей стране. \n\n\U0001F972«Законы стройки» в MAX"
