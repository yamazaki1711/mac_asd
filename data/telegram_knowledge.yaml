  text: "Нужно ли показывать котлован в ПОС?\U0001F6A7\n\n1. Нормативы\nОсновной документ\
    \ — это Постановление Правительства РФ №87, буквальная формулировка к СГП:\nц)\
    \ строительный генеральный план подготовительного периода строительства, реконструкции,\
    \ капитального ремонта (при необходимости) и основного периода строительства,\
    \ реконструкции, капитального ремонта с определением мест расположения постоянных\
    \ и временных зданий и сооружений, мест размещения площадок и складов временного\
    \ складирования конструкций, изделий, материалов и оборудования, мест установки\
    \ стационарных кранов и путей перемещения кранов большой грузоподъемности, инженерных\
    \ сетей и источников обеспечения строительной площадки водой, электроэнергией,\
    \ связью, а также трасс сетей с указанием точек их подключения и мест расположения\
    \ знаков закрепления разбивочных осей\nВ составе раздела ПОС нет прямого требования:\n\
    • разрабатывать детальную проработку котлована,\n• показывать геометрию откосов,\n\
    • выполнять отдельные решения именно по земляным работам.\n\nПОС это:\n\U0001F449\
    \ организационно-технологическая схема строительства\n\U0001F449 а не рабочая\
    \ проработка отдельных процессов\n\n2. С юридической точки зрения\nЭкспертиза\
    \ и нормативы требуют не «котлован как картинку», а:\n✔ обеспеченность решений:\n\
    • по размещению временной инфраструктуры\n• по логистике\n• по очередности работ\n\
    ✔ реализуемость строительства в границах участка\nА котлован — это уже способ\
    \ реализации, который:\n• либо раскрывается в ППР,\n• либо в специализированных\
    \ разделах (например, КЖ, ГП, инженерная защита и т.д.)\n\nПоэтому требование\
    \ «покажите котлован в ПОС»\nне имеет прямого нормативного основания\n\nНужно\
    \ ли делать отдельный СГП на работы ниже 0.000?\n\n1. Прямого требования нет\n\
    Ни в Постановление Правительства РФ №87, ни в профильных СП нет нормы: \nобязательно\
    \ разрабатывать СГП для нулевого цикла\n2. Но есть ключевой принцип \nПОС должен\
    \ обеспечивать: реализуемость строительства\nА это автоматически означает, что\
    \ исполнитель должен проверить:\n• не выходят ли откосы за границы участка\n•\
    \ возможна ли разработка котлована в принципе\n• есть ли место для техники\n•\
    \ как будет организовано движение транспорта\n• где размещаются краны/экскаваторы\n\
    • не блокирует ли котлован стройплощадку\n\n⚖️ Где проходит граница «нужно/не\
    \ нужно»\n❌ Не обязательно:\n❗️отражать котлован «для галочки»\n❗️делать отдельный\
    \ СГП ниже 0, если:\n• обычная глубина\n• нет стеснённых условий\n• нет сложной\
    \ технологии\n\n✅ Обязательно (с практической и экспертной точки зрения), если:\n\
    1. Значительное заглубление\n• паркинги\n• технические этажи\n• фундаменты глубокого\
    \ заложения\n\U0001F449 без проработки котлована ПОС становится нереализуемым\n\
    \n2. Стеснённая застройка\n• границы участка «впритык»\n• рядом здания/сети\n\U0001F449\
    \ нужно понимать откосы / крепления\n\n3. Сложные инженерные решения\n• шпунт\n\
    • крепление стенок котлована\n• водопонижение\n\U0001F449 это уже влияет на организацию\
    \ строительства\n\n4. Ограниченная логистика\n• один въезд\n• плотная площадка\n\
    \U0001F449 котлован может «разрезать» стройплощадку\n\n\U0001F4A1 Ключевая практичекая\
    \ и экспертная мысль: \nПОС — это не про «рисовать всё подряд»,\nПОС — это про\
    \ доказать, что стройка возможна\n\n\U0001F449 Отсутствие в ПОС проработки котлована\
    \ и отдельного СГП на нулевой цикл допустимо, если это не влияет на реализуемость\
    \ строительства и не требует специальных организационно-технологических решений.\n\
    \n\U0001F449 При этом проектировщик обязан:\n• проверить габариты котлована\n\
    • оценить влияние на стройгенплан\n• обеспечить возможность движения техники\n\
    \n⚠️ На каком этапе чаще всего допускают ошибки\n❌ Делают СГП ниже 0 «потому что\
    \ требуют»\n❌ Или наоборот — не проверяют вообще ничего\n\nПравильный подход:\n\
    \U0001F449 не формализм, а обоснованность решений\n\n✅Ключевой вывод:\nКотлован\
    \ и СГП на работы ниже 0.000 - не обязательный элемент ПОС по нормативам.\nНо\
    \ он становится обязательным, если без этого невозможно доказать реализуемость\
    \ строительства\n\nСтавьте реакции, если статья была интересной и полезной \U0001F44D\
    \nПишите комментарии, если есть чем дополнить \U0001F4AC\n\nНапоминаю ➡️ПОС ППР\
    \ Профи в Max (чтобы не потеряться) \U0001F917"
