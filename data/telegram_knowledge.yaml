  text: "‼ За выигранный спор юристу заплатили 1 ₽, и ВС РФ счел это правильным\U0001F447\
    \n\n\U0001F525 ВС РФ не нашел никакой шиканы со стороны клиента, заплатившего\
    \ за юруслуги всего 1 ₽. Все дело оказалось в злосчастной формулировке договора.\n\
    \n\U0001F4B8 Юрист оказывал компании услуги по сопровождению судебного взыскания\
    \ просроченной задолженности и выиграл дело. Договор предусматривал вознаграждение\
    \ из двух частей – 1 рубля и гонорара успеха. Но в итоге юрист получил только\
    \ 1 рубль – и ему пришлось обращаться в суд.\n\n\U0001F4CC Формулировка иска\n\
    \n✏ О взыскании дополнительного вознаграждения по договору\n\n\U0001F4CC Позиции\
    \ судов\n\n⚖ Все три инстанции, включая СКЭС ВС РФ, в иске отказали.\n\n\U0001F4DC\
    \ Предположительные доводы истца о злоупотреблении правом со стороны ответчика\
    \ не нашли своего подтверждения в материалах дела, были правомерно отклонены судами,\
    \ и по существу направлены на переоценку доказательств. Все было в соответствии\
    \ с условиями договора.\n\n❓Как звучала роковая формулировка?\n\n✍ Дополнительное\
    \ вознаграждение «гонорар успеха» в размере 25% подлежит оплате заказчиком в течение\
    \ 10 дней с момента возникновения права собственности на имущество должника, в\
    \ том числе на денежные средства.\n\n❓ Что это означает?\n\n\U0001F4B0 Получение\
    \ дополнительного вознаграждения обусловлено не \nпринятием конкретного решения\
    \ судом (положительного), а реальным получением доверителем денежных средств –\
    \ возникновением на них права собственности, которое возникает в момент их зачисления\
    \ на счет/получения в наличной форме.\n\n\U0001F449 То есть в данном случае мало\
    \ было выиграть дело, нужно было, чтобы свершилось условие \"возникновения права\
    \ собственности на имущество должника\".\n\n\U0001F4BC Комментарий юристов \"\
    Реаналитики\": \n\n\U0001F9E9 Получилось, что юрист сам виноват в том, что прописал\
    \ в договоре в качестве вознаграждения всего 1 ₽, а оставшуюся сумму указал как\
    \ гонорар успеха, но так ее и не получил. \n\n\U0001F9E9 Данный кейс наводит на\
    \ мысль о постепенном искоренении из практики \"гонораров успеха\" либо о тщательном\
    \ продумывании условий их выплаты.\n\n\U0001F50D Определение ВС РФ от 11.09.2024\
    \ г. по делу № А40-180933/2023\nhttps://m.kad.arbitr.ru/Card/9190a20a-f040-4815-ad73-fdf85db0a757\n\
    \n⁉ Как Вы думаете, справедливо ли юристу уплатили 1 рубль за оказанные услуги?\n\
    \n\U0001F44D – Да.\n\U0001F914 – Нет.\n\nPS: Выводы являются обобщёнными. Для\
    \ конкретных рекомендаций и решений обратитесь в “Реаналитику”\nreanalitika.ru.\n\
    \n#арбитражныйпроцесс, #юруслуги, #гонораруспеха\n@arbitrium_processus\nhttps://t.me/arbitrium_processus"
