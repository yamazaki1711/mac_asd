  text: "‼ Транспортный коллапс – не повод заключать контракт без торгов \U0001F447\
    \n\n\U0001F68C  ВС РФ не признал \"уважительным\" повод заключить контракт без\
    \ торгов для урегулирования транспортной ситуации. Ошибки перевозчика влекут только\
    \ его ответственность, а не возможность заключить контракт с новым перевозчиком.\n\
    \n\U0001F4DC Администрация решила заключить контракт с пассажирским автотранспортным\
    \ предприятием (ПАТП) в обход конкурентных процедур, аргументируя это тем, что\
    \ нужно стабилизировать транспортную ситуацию в городе. Предыдущий перевозчик\
    \ обратился за оспариванием.\n\n\U0001F4CC Формулировка иска\n\n✏ О признании\
    \ недействительными результатов торгов\n\n\U0001F4CC Позиции судов\n\n\U0001F534\
    \ Суды всех трех инстанций в иске отказали.\n⚖ СКЭС ВС РФ иск удовлетворила.\n\
    \n\U0001F68D Осуществляя закупку у единственного поставщика, заказчик должен иметь\
    \ разумные и объективные причины, объясняющие, что применение конкурентных процедур\
    \ либо является неэффективным, либо в значительной степени лишают заказчика того\
    \ результата, которого он намеревался достичь, планируя закупку.\n\n⏳ Об этом\
    \ свидетельствует то, что товарный рынок ограничен или цены на объект закупки\
    \ колеблются в узком диапазоне; осуществление срочного размещения заказа, закупка\
    \ на товарном рынке, где преобладает недобросовестная конкуренция.\n\n\U0001F449\
    \ Нарушение перевозчиком принятых на себя обязательств – основание для применения\
    \ штрафных санкций, а также иных мер ответственности, но это обстоятельство не\
    \ может служить основанием для осуществления закупок у единственного поставщика,\
    \ даже при соблюдении установленного законодательством для применения этого способа\
    \ годового объема закупок. \n\n✍ Ненадлежащее оказание услуг предыдущим перевозчиком\
    \ и привлечение его за данные нарушения к административной ответственности могут\
    \ быть учтены при проведении конкурентной процедуры, равно как и наличие либо\
    \ отсутствие \nположительного опыта при оказании аналогичных услуг у всех претендентов,\
    \ участвующих в закупке.\n\n\U0001F4BC Комментарий юристов \"Реаналитики\": \n\
    \n\U0001F9E9 Можно заметить достаточно строгий подход в данном случае. Обойти\
    \ конкурентные процедуры становится все сложнее.\n\n\U0001F50D Определение ВС\
    \ РФ от 09.02.2026 г. по делу № А56-45000/2024\nhttps://m.kad.arbitr.ru/Card/945d935b-f052-4b3a-910f-b1d22dbd14f6\n\
    \n⁉ Как Вы думаете, если бы администрация подкрепила доказательствами нарушение\
    \ перевозчиком своих обязательств, это помогло бы ей?\n\n\U0001F44D – Да.\n\U0001F914\
    \ – Нет.\n\nPS: Выводы являются обобщёнными. Для конкретных рекомендаций и решений\
    \ обратитесь в “Реаналитику”\nreanalitika.ru.\n\n#арбитражныйпроцесс, #перевозки,\
    \ #торги\n@arbitrium_processus\nhttps://t.me/arbitrium_processus"
