  text: 'Сегодня вечером решили посмотреть комедию. Случайно выбрали «Ёлки-Иголки»
    с Прилучным. Признаться честно, я не слишком внимательно следил за сюжетом, потому
    что параллельно играл в шахматы онлайн. Но один эпизод буквально вырвал меня из
    игры и завладел всем вниманием. Там отец главной героини (могу ошибаться, не вслушивался)
    читал книгу. И вот какой отрывок прозвучал:


    «Мало ли есть на свете хороших вещей, от которых мне не было проку... Вот хотя
    бы и рождественские праздники. Но все равно, помимо благоговения, которое испытываешь
    перед этим священным словом, и благочестивых воспоминаний, которые неотделимы
    от него, я всегда ждал этих дней как самых хороших в году. Это радостные дни —
    дни милосердия, доброты, всепрощения. Это единственные дни во всем календаре,
    когда люди, словно по молчаливому согласию, свободно раскрывают друг другу сердца
    и видят в своих ближних, — даже в неимущих и обездоленных, — таких же людей, как
    они сами. Так пусть же новый год принесет тебе счастье, тебе и многим другим,
    чье счастье ты можешь составить. Пусть каждый новый год будет счастливее старого…»


    Мне стало интересно, что это за фрагмент. Загуглил — оказалось, это цитата из
    рассказа Чарльза Диккенса «Рождественская песнь в прозе». В школе мне не довелось
    прочесть это произведение, поэтому я начал смотреть сюжет, читать отзывы и...
    похоже, нашёл себе книжку на новогодние праздники.


    П.С. Может составим список для уютного чтения на каникулах? Поделитесь в комментариях,
    какую одну книгу вы бы посоветовали для этих долгих вечеров — ту, что создает
    особое, может быть, даже новогоднее настроение.'
