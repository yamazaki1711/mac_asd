  text: "Прекращение предварительного договора не отменяет неустойку за нарушение\
    \ его условий\n\n➡️ Спор возник из предварительного договора купли-продажи нежилого\
    \ помещения. Сторонами спора являются два индивидуальных предпринимателя. Истец\
    \ выступает продавцом, а ответчик – покупателем. Стороны договорились заключить\
    \ основной договор в будущем. Покупатель должен был внести задаток в обеспечение\
    \ сделки. Ответчик нарушил сроки и размер внесения задатка. Основной договор стороны\
    \ так и не заключили. Истец обратился в суд для взыскания штрафа за нарушение\
    \ обязательств по внесению задатка.\n\nПозиции сторон и решение суда смотрите\
    \ в карточках ⬆️\n\n⚖️ Кассация отметила:\n\nШтраф был установлен за нарушение\
    \ самостоятельного обязательства. Это обязательство касалось своевременной и полной\
    \ уплаты задатка. Оно не было связано с обязательством заключить основной договор.\
    \ Поэтому для взыскания штрафа не имело значения, по чьей вине не был заключен\
    \ основной договор. \n\nОтветчик нарушил обязательство по внесению задатка в период\
    \ действия предварительного договора. Последующее прекращение предварительного\
    \ договора не аннулирует обязанность ответчика уплатить неустойку за допущенное\
    \ им нарушение.\n\nРеквизиты: постановление Арбитражного суда Северо-Западного\
    \ округа от 10.04.2026 № Ф07-1678/2026 по делу № А56-53854/2025.\n\n\U0001F3F7\
    \ Больше кейсов из практики арбитражных судов за апрель 2026 года смотрите в обзоре\
    \ Системы Юрист. Подписчикам канала открыли гостевой доступ к материалу на три\
    \ дня. \n\n#кейсы\n\n⚪️ Система Юрист в Телеграм | Сообщество ВК | Канал в MAX"
