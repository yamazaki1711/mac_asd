  text: '⚡️ Госдума приняла закон о совершенствовании саморегулирования в строительстве


    👨‍⚖️ 22 июля 2025 года Госдума приняла в 3 чтении проект Федерального закона №
    779131-8 «О внесении изменений в Градостроительный кодекс Российской Федерации»,
    направленный на реализацию мероприятий, предусмотренных Стратегией развития строительной
    отрасли и ЖКХ РФ на период до 2030 года с прогнозом до 2035 года.


    ❗ЗАКОНОМ ПРЕДУСМОТРЕНЫ СЛЕДУЮЩИЕ ИЗМЕНЕНИЯ:


    🌐вводятся правила саморегулирования, которые разрабатываются соответствующими
    нацобъединениями в соответствии с нормативным правовым актом Минстроя России;


    🌐устанавливается обязанность СРО, в случае утверждения нацобъединением правил
    саморегулирования, утвердить соответствующие внутренние документы или привести
    имеющиеся документы в соответствие с правилами саморегулирования;


    🌐устанавливается обязанность члена СРО уведомлять СРО о заключенных им договорах
    строительного подряда, договорах подряда на осуществление сноса, а также о фактическом
    совокупном размере обязательств по договорам, заключенным с использованием конкурентных
    способов заключения договоров;


    🌐скорректирована статья 55.8 в части права члена СРО выполнять строительство,
    реконструкцию, капитальный ремонт, снос объектов капитального строительства исключительно
    исходя из размера взноса, внесенного в компенсационный фонд СРО;


    🌐устанавливается обязанность члена СРО уведомлять СРО о предъявлении к нему иска
    о взыскании причиненного вреда и (или) ущерба, возмещение которых предусмотрено
    статьями 60 и 60.1 ГрК;


    🌐расширяются функции соответствующих нацобъединений, а именно: разработка и утверждение
    правил саморегулирования; оценка соблюдения СРО требований к СРО и ее деятельности;


    🌐вводится право соответствующих нацобъединений устанавливать в правилах саморегулирования
    требования к наличию у членов СРО по месту основной работы специалистов иных профессий,
    сведения о которых не включаются в НРС, и к их численности;


    🌐устанавливается право физического лица – специалиста НРС уведомить соответствующее
    нацобъединение о расторжении с ним трудового договора с приложением копий документов,
    подтверждающих факт расторжения трудовых отношений;


    🌐устанавливается новое основание для исключения СРО из государственного реестра
    СРО, а именно несоответствие такой СРО требованиям к количеству членов СРО и (или)
    требованиям к размеру и (или) размещению на специальном банковском счете ее компфонда
    (компенсационных фондов); по этому основанию Ростехнадзор может исключить сведения
    о СРО из госреестра СРО во внесудебном порядке на основании заключения нацобъединения;


    🌐исключается региональный оператор из списка субъектов, с которым ИП или юрлицо,
    не являющиеся членами СРО, могут заключать договоры строительного подряда до 10
    млн рублей;


    🌐вводится полномочие Минстроя России направлять в нацобъединения требования о
    необходимости проведения нацобъединением оценки соблюдения саморегулируемыми организациями
    требований к саморегулируемой организации и ее деятельности и о принятии мер по
    недопустимости нарушения установленных требований.


    1️⃣1️⃣  НОСТРОЙ обращает внимание на то, что правила саморегулирования будут разрабатываться
    в тесной координации с Минстроем России и Минэкономразвития России, а также профессиональным
    сообществом.


    📑 Принятый Госдумой документ будет рассмотрен Совфедом на заключительном заседании.'
