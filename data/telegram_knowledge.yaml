  text: "‼ Фраза \"первое слово дороже второго\" стала юридической \U0001F447\n\n\
    ✍ Судебная практика пополняется самыми разнообразными и иногда курьезными фразами.\
    \ На этот раз принцип эстоппеля в переводе с юридического прозвучал как \"первое\
    \ слово дороже второго\", а добросовестность как \"презумпция логичного, предсказуемого\
    \ и последовательного поведения\".\n\n\U0001F4ED В досудебной переписке поставщик\
    \ сообщил, что устранил недостатки в товаре. А затем и вовсе заявил, что недостатков\
    \ не было и приложил сертификат соответствия. Покупатель обратился в суд.\n\n\U0001F4CC\
    \ Формулировка иска\n\n✏ О взыскании денежных средств и штрафа по договору\n\n\
    \U0001F4CC Позиции судов\n\n\U0001F534 Две инстанции покупателю отказали.\n⚖ Кассация\
    \ отправила дело на новое рассмотрение.\n\n♟ Ответчик изменил линию поведения,\
    \ указав, что поскольку была проведена калибровка оборудования третьим лицом,\
    \ которое выдало сертификат и не выявило недостатков в товаре, оборудование следует\
    \ считать товаром надлежащего качества. Но это неправильно.\n\nСуд округа полагает,\
    \ что в данном случае действует правило: первое слово дороже второго. \n\U0001F3B3\
    \ Исходя из презумпции логичного, предсказуемого и последовательного поведения\
    \ сторон в гражданско-правовых отношениях, готовность поставщика произвести ремонт,\
    \ а затем выплатить компенсацию за недостатки, нельзя объяснить ничем иным, как\
    \ виновностью поставщика в возникновении недостатков.\n\n\U0001F4DC Более того,\
    \ суд не назначил экспертизу, хотя она необходима.\n\n\U0001F4BC Комментарий юристов\
    \ \"Реаналитики\": \n\n\U0001F9E9 Судебная практика обогащает юридическую технику.\
    \ Можно считать, что это попытки толкования не всем понятных юридических терминов.\n\
    \n\U0001F50D Постановление АС МО от 31.07.2025 г. по делу № А40-146414/2023\n\
    https://m.kad.arbitr.ru/Document/Pdf/8aae578d-3f48-47da-b18d-4b1854907b18/bc9943f4-6694-4f65-bdbf-ee0a3742276f/A40-146414-2023_20250731_Reshenija_i_postanovlenija.pdf?isAddStamp=True\n\
    \n⁉ Как Вы думаете, можно ли судам использовать такие фразы?\n\n\U0001F44D – Да.\n\
    \U0001F914 – Нет.\n\nPS: Выводы являются обобщёнными. Для конкретных рекомендаций\
    \ и решений обратитесь в “Реаналитику”\nreanalitika.ru \n\n#арбитражныйпроцесс,\
    \ #эстоппель, #риторика\n@arbitrium_processus\nhttps://t.me/arbitrium_processus"
