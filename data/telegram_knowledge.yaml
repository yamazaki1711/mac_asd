  text: "Как соблюсти досудебный порядок. Ошибки, на которые суды обращают внимание\
    \ в 2026 году\n\n➡️Роман Масаладжиу, заместитель главного редактора журнала «Арбитражная\
    \ практика для юристов», к. ю. н., рассказал про 10 самых частых ошибок при соблюдении\
    \ досудебного порядка, а также способы этих ошибок избежать.\n\nВ последние годы\
    \ суды все реже обращают внимание на ошибки при соблюдении досудебного порядка.\
    \ Чаще всего суды считают, что допущенные нарушения носят формальный характер,\
    \ а стороны без суда не договорятся. \n\nВ таких ситуациях суды предпочитают не\
