  text: 'Коллега-юрист рассуждает о входном контроле ПД и РД


    Оно как бы все понятно, есть требования – выполняй. Но на практике все бывает
    сложнее. И давайте тоже немного порассуждаем в каких условиях эти требования приходится
    исполнять.


    К ВК ПД по идее должны подходить на стадии закупок и заключения контракта на СМР,
    плюс есть ПЗГЭ, которое типа дает уверенность, что там все ок. А вот с РД могут
    быть проблемы.


    Потому что, во-первых, несоответствие РД – ПД – это проблемы с ГСН, административки,
    потеря времени на корректировки, повторные ГГЭ и как следствие, срыв срока объекта
    в эксплуатацию или даже отказ в выдаче ЗОС.


    Во-вторых, косяки РД, которые не затрагивают ПД – это все равно корректировки
    и допы.


    В-третьих, изменения в РД, даже если не будет допработ – это корректировки сметы.


    Это статьи 743 и 744 ГК, по которым грамотный подрядчик может еще и расторгнуться.


    Регулятор и заказчик здесь сходятся в том, что подрядчик должен найти все косяки
    в ПД, РД и соответственно в сметах как можно раньше. Все боятся корректировок,
    допов и пытаются через ВК хотя бы переложить ответственность на подрядчика.


    Подрядчика тут тоже понять можно. При чем тут он и проектирование? Зачем ему отвечать
    за чужое, когда вот штамп поставили на РД, а до этого ПД прошла ГГЭ?


    Слабое место здесь – сроки и риски.


    Вся наша система проектирования и строительства была и остается основанной на
    принципах плановой экономики.


    В ней нет места крупным ошибкам и корректировкам, в том числе из-за замен одних
    марок материалов на другие (не было такого разнообразия). Поэтому в этой системе
    нет места обстоятельной работе проектировщика по корректировкам на стадии строительства.
    Только авторский надзор. Не нужны и большие запасы непредвиденных расходов. Но.


    С приходом рыночных отношений схема должна была измениться. Сроки проектирования
    сократились, но нормативы затрат при этом, может из-за автокада, но уменьшились.
    В несколько раз.


    Низкое количество ошибок и несоответствий РД, ПД и смет раньше обеспечивалось
    ранней передачей РД подрядчику. За 6 месяцев должны были передавать. Понятно,
    что скорее всего сроки отодвигались, но все же, даже 3-4 месяца, это не 1-2 недели
    как сейчас.


    И только после устранения замечаний подрядчика заказчик ставил штамп «В производство
    работ». Даже сейчас этот штамп до проведения ВК подрядчиком выглядит не очень
    логичным.


    Сейчас такая схема просто невозможна, и кто-то должен был обратить внимание на
    эти несоответствия модели проектирования – рынку.


    Как должно быть в рынке, чтобы это все заработало нормально? В том, что оно не
    работает, наверное, уже ни у кого не осталось сомнений.


    Во-первых, нужно чтобы проектировщик работал до конца стройки. 20-30% от ПИР буржуи
    оставляют на стадию строительства не просто так.


    Во-вторых, нужно отдать разработку РД подрядчику, выполняющему СМР, естественно
    также не за бесплатно. Тогда ВК РД будет проводить проектировщик и соответственно
    ставить на ней штамп «В производство работ».


    Плюс, чтобы заработал 44-ФЗ торговые наименования (марки) по данным ПД (как в
    КТРУ) должен устанавливать подрядчик. Естественно, по согласованию проектировщика
    и заказчика. И не будет бОльшей части изменений только потому, что это изменением
    в принципе не должно считаться.


    В-третьих, должны быть увеличены запасы непредвиденных расходов соразмерно возросшим
    рискам. В плане было все по минимуму. Но чудес – не бывает.


    Только тогда никто не будет бояться корректировок, а ВК ПД и РД не будет носить
    такой ультимативный характер.


    Но на это все нужно добавить денег и тем и другим, плюс зарезервировать больше
    на допы, а хочется оставаться там, где подешевле, с нормативами как в плановой
    системе экономики.


    Поэтому регулятор мечется, пытается цифровизовать это, приравнивает РД к ПД, отдает
    ПИРы подрядчику и другие непродуманные решения, делающие только хуже, лишь бы
    было подешевле.


    И ни о каком изменении модели проектирования с изменением нормативов затрат проектировщикам
    и подрядчикам нет ни в каких дорожных картах и стратегиях.


    Поэтому наблюдаем дальнейшее издыхание госстройки…


    Мы в мах


    #нормирование #проектирование'
