  text: "ЦБ наконец-то раскатал губу и рассказал, как мы будем жить с криптой по-новому.\
    \ \n\nПервый зампред Чистюхин выдал программное заявление. Коротко, но емко \U0001F60A\
    \ Гайки закручиваются, причём с характерным скрипом) \n\nЯ отдохнул на островах,\
    \ чтобы вернуться и с чистой головой вникать в эти прелести. Пхи Пхи, кстати,\
    \ был шумный, Рача тихий. А вот наше крипторегулирование, похоже, выбрало путь\
    \ «громкой тишины» когда все вроде бы разрешили, но сделали так, что лучше бы\
    \ не начинали \U0001F601\n\n1// Вывод средств только на идентифицированные кошельки.\n\
    \nКупил крипту у легального российского посредника? Пожалуйста, переводи хоть\
    \ на Binance, хоть на Bybit они считаются «кастодиальной инфраструктурой», то\
    \ есть там тебя знают, и это хорошо. А вот с российского кошелька на зарубежный\
    \ «некастодиальный» (анонимный) уже нельзя. Путь закрыт. Ну есть мозги?) \n\n\
    2// Личные кошельки не трогаем, но сделки декларируй.\n\nХранить крипту на своем\
    \ холодном кошельке можно. Никто к тебе домой не придёт и не обыщет SSD. Но как\
    \ только ты захотел с ней что-то сделать (продать, обменять, подарить) будь добр,\
    \ задекларируй активы. А если хранишь их за рубежом тоже иди в налоговую и расскажи,\
    \ сколько у тебя там сатошей. Да конечно найс... \n\n3// Уголовка за работу без\
    \ лицензии.\n\nОбычные обменники, «серые» брокеры и биржи, которые решат оказывать\
    \ услуги без лицензии, могут попасть под уголовную статью. Ну то, что писали еще\
    \ в августе прошлого года... \n\n4// Безнал можно, наличка  нельзя\n\nОбменивать\
    \ крипту на наличные рубли или доллары запретят. Только безналичные\n\nЧто я обо\
    \ всм этом думаю.\n\nНу мы молодцы, что добрались) \n\nНо система получилась жсткая.\
    \ И очень контролирующая. Идея «декларируй всё, что шевелится» мне, как человеку,\
    \ который ценит относительную приватность, не сильно нравится.\n\nНо надо отдать\
    \ должное ЦБ действует логично. Пытались видимо вписать крипту в существующую\
    \ финансовую архитектуру. \n\nДумаю мысль была такая) но исполнение...\n\nВот\
    \ ты купил биткоин на легальной бирже, а потом перевел на свой холодный кошелк\
    \ и улетел с ним в другую страну  что тогда? Куда тебе?) \U0001F602\n\n Судя по\
    \ логике Чистюхина, ты должен об этом сообщить. Но как это технически проконтролировать?\
    \ Ну а, допустим, я забыл... \n\nВ общем, живем в эпохуперемен пойду разбираться,\
    \ считается ли мой тайский отдых «хранением крипты за рубежом» или нет. Шучу.\
    \ Или нет? \U0001F601"
