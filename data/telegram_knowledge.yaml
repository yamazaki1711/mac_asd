  text: "ЗАБОЙ ПРОДОЛЖАЕТСЯ\n\nВ предыдущем посте про село Козиха Ордынского района\
    \ Новосибирской области я уже писал, что после выезда наших юристов с камерой\
    \ история с забоем скота резко притормозила. Но, как выяснилось, ненадолго. \n\
    \nНа следующей день всё продолжилось, только тактика изменилась: теперь людей\
    \ различными запугиваниями подводят к тому, чтобы они сами, «добровольно», отдавали\
    \ своих животных на убой.\n\nПоэтому ещё раз для всех, кто может оказаться в такой\
    \ ситуации. \n\nПервое: фиксируйте всё на видео. Вообще всё! Лица, разговоры,\
    \ действия, документы, машины, номера. Видео в таких историях — это главное доказательство.\
    \ И сразу уберите разблокировку телефона по лицу или отпечатку, поставьте обычный\
    \ пароль. В таком случае незаконно зайти в ваш смартфон, скажем так, добровольно-принудительным\
    \ методом и удалить видеодоказательства у них не получиться. Передавать телефон,\
    \ показывать записи или тем более удалять их вы не обязаны.\n\nВторое: не соглашайтесь\
    \ ни на какое «добровольно». Никаких устных согласий на изъятие или забой скота\
    \ без документов. Хотят что-то забирать — пусть составляют официальный акт с указанием\
    \ оснований, перечня имущества и данных должностных лиц. \n\nТретье: заранее собирайте\
    \ всё, что подтверждает, что животные принадлежат именно вам: договоры, ветеринарные\
    \ документы, фото, видео, показания свидетелей. Идеально, если при происходящем\
    \ будут третьи лица. Записывайте их контакты, если получится, берите письменные\
    \ объяснения.\n\nИ ещё важный момент. Полицейский не может просто сказать: «Уйдите»,\
    \ «Не снимайте», «Отойдите отсюда». Ответственность наступает только за неповиновение\
    \ законному требованию сотрудника полиции. Поэтому на каждое такое указание вы\
    \ вправе спокойно спросить: на основании какой нормы закона это требование выдвигается?\
    \ Если внятного ответа нет, это нужно фиксировать на видео.\n\nЕсли вы уже пострадали\
    \ от таких действий, собирайте все возможные доказательства и обращайтесь в юридическую\
    \ компанию «Ярдрей». \n\nБудем добиваться не символической подачки, а реальной\
    \ компенсации за причинённый ущерб.\n\nЮридическая компания \"Ярдрей\" \n\n• Телефон:\n\
    \U0001F1F7\U0001F1FA Россия: +79995554141 \n\U0001F1F0\U0001F1FF Казахстан: +77711554141\
    \ \n\U0001F1E7\U0001F1FE Беларусь: +79995554141 (Единый номер с РФ)\n\U0001F1EC\
    \U0001F1EA Грузия: +995544114141\n\U0001F4F1 Телеграм: @Yardreysupport\n\U0001F4F2\
    \ MAX: +79995554141\n\U0001F4F1 WhatsApp: http://wa.me/79995554141\n• Почта: support@yardrey.ru\n\
    • Сайт: www.yardrey.ru"
