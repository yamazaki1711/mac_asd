  text: "Юридические сериалы\n\nУ большинства праздники продолжаются. Многие в праздники\
    \ смотрят сериалы. Решил поделиться мнением о двух сериалах, которые так или иначе\
    \ связаны с юриспруденций.\n\nРеалистичный сериал о суде\n\nСамый лучший юридический\
    \ сериал, который я смотрел — «Американская история преступлений». Речь именно\
    \ о первом сезоне, которые подробно, почти документально пересказывает дело О.\
    \ Джей Симпсона.\n\nВ этом сериале есть всё, что нужно от судебной драмы: тактика\
    \ защиты и обвинения, их ошибки и наглядный показ самого судебного процесса. \n\
    \nНа мой взгляд, это самый реалистичный сериал о работе юристов, обвинителей и\
    \ судей.\n\nРоссийский сериал о корпоративной борьбе\n\nВторой сериал о котором\
    \ хочу рассказать — российский. Сериал «Золотое дно». Я бы назвал его сериалом\
    \ о корпоративной войне на минималках, некоторые называют его российской адаптацией\
    \ сериала «Наследники».\n\nЮридических неточностей в нём достаточно, не все особенности\
    \ корпоративного управления компании показаны реалистично, но в качестве базового\
    \ понимания как это всё работает подойдёт.\n\nВ одной из серий второго сезона\
    \ (который идет прямо сейчас) был показан хороший наглядный пример правовых хитростей.\
    \ \n\nНадеюсь это не будет большим спойлером, поэтому расскажу: акционеры компании\
    \ хотят продать акции сторонним лицам. Часть акционеров этого допустить не хочет.\n\
    \nНеожиданно государство вводит запрет на выход из состава участников компаний,\
    \ которые выполняют государственный заказ.\n\n\U0001F4A1Что надо сделать? Правильно:\
    \ получить государственный заказ и никто из акционеров не сможет продать свою\
    \ часть до выполнения этого заказа.\n\nСама ситуация выдумана, но что-то такое\
    \ вполне может быть. Мне понравилось как это было показано.\n\nА, какие сериалы\
    \ смотрите вы? Делитесь!\n\n\U0001F3F7Прочёл в законе"
