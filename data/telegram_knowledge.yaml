  text: '⚖️Конституционный суд ограничил льготы застройщикам по старым нарушениям


    Конституционный суд постановил: сниженный штраф в размере 5% вместо 50% по спорам
    с дольщиками применяется только к нарушениям после 1 сентября 2024 года.


    ➡️Если застройщик допустил просрочку или отказался удовлетворить требования дольщика
    до этой даты, действует прежнее правило — штраф 50% от присужденной суммы (по
    Закону о защите прав потребителей).


    📌Ключевая позиция КС:

    — нормы, ухудшающие положение граждан, не имеют обратной силы;

    — снижение штрафа — это новая льгота для застройщиков, и она не может распространяться
    на «старые» нарушения;

    — ограничение ответственности застройщиков признано допустимым, но носит временный
    и антикризисный характер.


    При этом суд отдельно указал на недопустимость злоупотреблений — например, если
    застройщик сознательно затягивал выплаты, чтобы попасть под новые правила.


    Решение затронет значительный массив споров: по оценкам юристов, речь может идти
    о десятках тысяч дел по нарушениям 2022–2024 годов.


