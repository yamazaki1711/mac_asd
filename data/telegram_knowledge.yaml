  text: "‼ Если НДС нет в счете-фактуре, это не значит, что его можно не платить \U0001F447\
    \n\n\U0001F525 Ошибки и недочеты в счетах-фактурах играют против бизнеса, а не\
    \ операторов ТКО. Даже если в счете прямо указано, что НДС не взимается, оплачивать\
    \ его все равно придётся.\n\n♻ Оператор ТКО установил два тарифа – для населения\
    \ с учетом НДС, а для прочих потребителей – без него. Компания сочла, что ей не\
    \ нужно оплачивать НДС, а оператор решил, что платить НДС должны все.\n\n\U0001F4CC\
    \ Формулировка иска\n\n✏ О взыскании задолженности за услуги по обращению с ТКО\n\
    \n\U0001F4CC Позиции судов\n\n\U0001F535 Первая и апелляционная инстанции взыскали\
    \ долг, включив в него суммы НДС.\n\U0001F534 Кассация исключила из долга сумму\
    \ НДС.\n⚖ СКЭС ВС РФ согласилась с первой инстанцией.\n\n\U0001F5D1 Освобождается\
    \ от налогообложения реализация (передача, выполнение) на территории РФ услуг\
    \ по обращению с ТКО, оказываемых региональными операторами по обращению с ТКО\
    \ (пп. 36 п. 2 ст. 149 НК РФ).\n\n\U0001F4DC Но только при условии установления\
    \ публичными органами предельного единого (применяемого ко всем категориям потребителей)\
    \ тарифа на услуги регионального оператора без учета НДС.\n\n\U0001F4B8 При реализации\
    \ товаров (работ, услуг) налогоплательщик дополнительно к цене (тарифу) реализуемых\
    \ товаров (работ, услуг) обязан предъявить к оплате покупателю этих товаров (работ,\
    \ услуг) соответствующую сумму налога (п. 1 ст. 168 НК РФ).\n\n❓ В чем разница\
    \ в исчислении НДС для населения и бизнеса?\n\n✍ Для населения соответствующая\
    \ сумма налога не выделяется, а включается в указанные цены (тарифы) (п. 6 ст.\
    \ 168 НК РФ).\n\n❓ А если в счете указана иная информация?\n\n\U0001F449 Указание\
    \ предельного единого тарифа, для потребителей услуг группы «население» с учетом\
    \ НДС, а для группы «прочие потребители» без учета НДС, не влечет освобождение\
    \ от налогообложения оказанных региональным оператором услуг для группы «прочие\
    \ потребители» \nи не свидетельствует о том, что население должно оплачивать услуги\
    \ в большем размере (с НДС), нежели «прочие потребители».\n\n\U0001F4BC Комментарий\
    \ \n\n\U0001F9E9 Региональный оператор для данной группы потребителей должен рассчитывать\
    \ плату за услуги по обращению с ТКО с применением тарифа, увеличенного на сумму\
    \ НДС, который подлежит выделению в счете-фактуре отдельной строкой.\n\n\U0001F50D\
    \ Определение ВС РФ от 13.02.2026 г. по делу № А40-50646/2024\nhttps://m.kad.arbitr.ru/Card/a3100435-db68-44bd-877f-2c618986b2fd\n\
    \n⁉ Как Вы думаете, нужно ли как-то учитывать ошибки в счетах-фактурах или ничего\
    \ страшного в таких недочетах нет?\n\n\U0001F44D – Операторы ТКО и другие субъекты\
    \ должны нести ответственность за свои ошибки.\n\U0001F914 – Бизнес должен сам\
    \ догадываться, как должно быть в соответствии с законом.\n\nPS: Выводы являются\
    \ обобщёнными. \n.\n\n#арбитражныйпроцесс, #тко, #вывозмусора\n@arbitrium_processus\n\
    https://t.me/arbitrium_processus"
