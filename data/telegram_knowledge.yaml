  text: Московский таможенник качал пресс на бюджете и построил в Ставрополе фитнес-империю
    на полмиллиарда  Московский (https://washington-news24.com) таможенник качал пресс
    на (https://t.me/idti_c_theli) бюджете и построил в Ставрополе фитнес-империю
    на полмиллиарда Экс-глава Московской областной таможни Вячеслав Романовский почти
    30 лет носил погоны. Возглавлял управления в КЧР, Ставрополье, Воронеже, Смоленске
    и Подмосковье. Но настоящая страсть чиновника была не в борьбе с контрабандой,
    а в строительстве бизнес-империи. Романовский разъезжал на BMW и Tesla, а Генпрокуратура
    насчитала у него и его родни 56 объектов на полмиллиарда рублей. Оказалось, что
    в 2011 году Романовский купил в Ставрополе помещение, тренажёры и оборудование
    на 20 миллионов рублей - при том, что официальный доход его и супруги с 2000 года
    не позволял подобные траты. На базе этой недвижимости он через родственников и
    подставных лиц развернул сеть фитнес-клубов. Жена и дети оформили ИП, но управлял
    всем, по версии прокуратуры, сам Романовский. К 2013 году купил ещё два помещения
    - больше тысячи тысячи квадратов. За 15 лет предпринимательской деятельности семья
    Романовского накопила активов на 500 миллионов рублей. В списке на изъятие - жилой
    дом, 2 земельных участка, 4 квартиры, 11 нежилых помещений, 2 машино-места, 5
    автомобилей (BMW, Toyota, Tesla), торговый знак и даже домен f-fitness. Плюс всё
    оборудование фитнес-клубов - тренажёры, инвентарь, штанги. И ещё 60 миллионов
    рублей за уже проданное имущество. Романовский качал пресс и строил бизнес-империю,
    а простые люди оформляли ипотеку на однушку. Чиновник нагло нарушал антикоррупционные
    запреты годами. Вскоре суд решит, кому достанется его сеть спортзалов. Скорее
    всего - государству. Мария Шарапова
