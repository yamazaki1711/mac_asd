  text: 'Новый обзор практики ВС


    Верховный суд решил не отпускать юристов на каникулы без новогодних подарков и
    опубликовал большой обзор судебной практики. В документе нашлось много интересного
    по нашему профилю — рассказываем о важных позициях экономколлегии.


    🏰 Льготная ставка аренды земли в ОКН не работает для коммерции. Расположение здания-памятника
    в охраняемой зоне само по себе не дает права на льготу 0,01%, если арендатор использует
    объект для бизнеса.


    🛢️ Бесплатный сервитут на старые линейные объекты не распространяется на новые
    участки. Если при реконструкции нефтепровода построили новое сооружение на ранее
    не занятых землях, за сервитут нужно платить.


    🏡 Перевод жилого дома в нежилое требует указания цели использования. Власти вправе
    требовать экспертизу и проверять соответствие объекта нормам с учетом заявленного
    назначения. Упрощенная процедура для ИЖС не должна становиться обходом требований
    для коммерческих объектов.


    💰 Пониженная ставка налога на землю под ИЖС не действует при предпринимательском
    использовании. Льгота 0,3% предназначена для граждан, строящих жилье для себя,
    а не для бизнеса с его инвестпроектами.


