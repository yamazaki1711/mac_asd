  text: 'Самая дорогая ошибка подрядчика: вспомнить про снижение неустойки слишком
    поздно


    Подрядчику кажется: сначала поспорим по сути, а про снижение неустойки потом тоже
    как-нибудь заявим.


    Вот это “потом” иногда стоит очень дорого.

    Потому что в судебной работе важен не только сам аргумент, но и момент, когда
    он заявлен.


    Очень многие подрядчики концентрируются только на главной линии:

    мы не виноваты,

    срок не наш,

    объем спорный,

    заказчик мешал,

    расчет неправильный.


    И это логично.


    Но параллельно нужно понимать:

    если суд все же увидит основание для взыскания, у вас должен быть запасной эшелон
    защиты — снижение неустойки.


    И вот здесь часто происходит провал.


    Потому что об этом вспоминают поздно, формально или вообще считают “необязательной
    деталью”.


    В результате подрядчик может потерять сильный инструмент только потому, что не
    встроил его в позицию вовремя.


    Что важно?


    1.  Снижение неустойки — это не “мелочь на всякий случай”, а полноценный блок
    защиты.

    2.  Его надо продумывать заранее, а не в последний момент.

    3.  Хорошая судебная стратегия всегда строится с несколькими уровнями обороны.

    4.  Заявить о снижении можно только в первой инстанции.


    Что должно быть в позиции подрядчика?


    • аргументы по отсутствию/уменьшению самого нарушения;

    • аргументы по вине заказчика;

    • аргументы по расчету;

    • отдельный блок по несоразмерности неустойки.


    Если у вас уже идет спор и вы хотите понять, не упустили ли вы сильный довод по
    снижению неустойки, напишите “333” в личку @grikevich.


    📩 Telegram: @grikevich

    📞 +7 985 227-74-98

    📲 WhatsApp - написать по ссылке

    ✉️ E-mail: oxanagrikevich@yandex.ru

    MAX - резервный канал'
