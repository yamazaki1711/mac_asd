  text: 'Менять условия федеральных строительных контрактов из-за повышения НДС можно
    с 15 апреля 2026 года


    До 1 октября 2026 года при невозможности исполнить обязательства из-за увеличения
    ставки НДС до 22% стороны вправе по соглашению:


    ● изменить цену в пределах увеличения ставки налога (в части товаров, работ и
    услуг, приемка которых производится после 1 января 2026 года);

    ● уточнить объемы или виды работ и стройресурсов без увеличения цены.


    Новшество касается контрактов на проектирование, изыскания, строительство, реконструкцию,
    капремонт и снос объектов капстроительства, текущий ремонт зданий, благоустройство
    и выполнение ряда других работ.


    Условия корректировки: контракт заключили для федеральных нужд до 1 января 2026
    года (либо по итогам закупки, которая была объявлена до этой даты) и новой ставки
    НДС в нем нет.


    Регионам и муниципалитетам рекомендовано утвердить аналогичные правила для контрактов
    своего уровня. #стройка


    Документ: Постановление Правительства РФ от 15.04.2026 N 416


    © КонсультантПлюс'
