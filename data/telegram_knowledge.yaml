  text: "Глава Минстроя России Ирек Файзуллин в рамках рабочего визита в Ставропольский\
    \ край ознакомился с выставочной частью Кавказского инвестиционного форума\n\n\
    В составе делегации под руководством Председателя Правительства РФ Михаила Мишустина\
    \ Министр принял участие в III Кавказском инвестиционном форуме и осмотрел масштабную\
    \ экспозицию, объединившую стенды 11 субъектов РФ и институтов развития. Главная\
    \ тема КИФ-2026 — «Расширяя горизонты возможностей».\n\nНа стендах регионов развернута\
    \ вся палитра экономики Северного Кавказа. Промышленность и сельское хозяйство\
    \ представлены проектами от консервного завода в Дагестане до инновационных разработок\
    \ Ставрополья. \n\nТуризм и инфраструктура показаны на примере макетов курорта\
