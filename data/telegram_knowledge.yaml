  text: 'Сегодня жена пришла с маникюра и после моих восторженных фраз о том, какой
    же великолепный цвет, вдруг говорит:


    — Помнишь того ИП-шника, который улетел в жёлтую зону из-за фиктивной регистрации
    в Калмыкии?

    — А как же.

    — Он оттуда вышел?

    — Пока не приведёт в соответствие прописку с реальным местом жительства — не выйдет.
    А что?

    — Так вот, маникюрщица рассказывала, что у её мужа ИП, и они купили квартиру в
    Калмыкии. Прописались там, даже машину на тамошний учёт поставили. Теперь собираются
    «мигрировать» в местную налоговую, чтобы платить 1% вместо 6%. Нормальный же план?

    — План — провальный.

    — Почему? Они же всё по-серьезному: и квартиру купили, и машину перегнали...

    — А сами-то они где жить остаются? В Москве?

    — Ну да...

    — Вот банк по IP-адресу это и увидит. И налоговая увидит. И деньги с ИП они, наверное,
    на карту выводят, которой в московских кофейнях платят...

    — Ага... То есть план так себе. И что им делать?

    — Не играть в игры с налоговой.


    Практика показывает: кто слушает советы «налоговых оптимизаторов» и мигрирует
    в низконалоговые регионы, потом ищет специалистов по выходу из жёлтой или даже
    красной зоны по ЗСК. Не надо так.

    Хотя…😈


    С уважением,

    Адвокат Евгений Шупиков'
