  text: 'ПРОГОСЗАКАЗ.РФ (VK)


    ⚖️ Требование к количеству баллов определяется на дату рассмотрения заявки участника


    Участник закупки приложил в составе заявки выписку из РРПП на рентгеновский диагностический
    комплекс, но заказчик приравнял его заявку к иностранной на основании того, что
    в выписке отсутствовали сведения о совокупном количестве баллов. Участник обжаловал
    итоговый протокол, в результате чего комиссия УФАС признала, что страна происхождения
    товара (Российская Федерация) в заявке участника была подтверждена, а следовательно,
    комиссия заказчика должна была отклонить все иностранные заявки.


    🔻Правовая оценка суда:


    Предметом закупки является поставка товара – системы рентгеновской диагностической
    стационарной общего назначения цифровой; данная товарная позиция включена в приложение
    № 2 (пункты 298, 299) Постановления № 1875.


    Вместе с тем, с 01.09.2025 вступил в силу подп. «н» п. 10 Постановления № 1875,
    согласно которому требования о количестве баллов не применяются для подтверждения
    происхождения из Российской Федерации товаров, указанных в позициях 298, 299 приложения
    № 2 Постановления № 1875, если реестровые записи в РРПП сформированы по 10 октября
