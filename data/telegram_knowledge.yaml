  text: "\U0001F608 Давайте по-честному: рынок сейчас странный. \n\nВакансии вроде\
    \ есть, а хороших людей найти - проблема. Или приходят те, кто «три года пилил\
    \ тудушку», или те, кто на собеседовании говорит красиво, а код писать не умеет.\n\
    \nПоэтому я редко кого рекомендую просто так. Но тут случай особый.\n\nЗнакомьтесь,\
    \ Борис. Мы с ним пересекались по старым проектам, расходились, снова сходились\
    \ - в общем, классические три рукопожатия, но с хорошим финалом \U0001F609\n\n\
    Борис - android-разработчик с пятилетним опытом. И это не «я пять лет делал одно\
    \ и то же», а нормальный, живой рост.\n\nОн работал над приложениями, которые\
    \ потом лежали на миллионах устройств. Не просто «участвовал», а реально тащил\
    \ техническую часть. Многомодульные проекты, где важно не запутаться в зависимостях\
    \ - это его стихия.\n\nПроизводительность, оптимизация, чистота кода - для него\
    \ не абстрактные понятия, а то, за что он бьется на код-ревью.\n\nБыл опыт и в\
    \ кросс-функциональных командах. Знаете, когда дизайнер рисует «как красиво»,\
    \ аналитик хочет «собрать все данные», а разработчик потом объясняет, почему так\
    \ нельзя? Борис как раз из тех, кто умеет выстроить мост. \n\nНе молчит в углу,\
    \ а включается в диалог, чтобы продукт получился живым и работающим.\n\nИ отдельно\
    \ отмечу: он не ищет «посидеть и пописать код от звонка до звонка». Борису важно,\
    \ чтобы продукт решал реальные задачи. Чтобы было понятно, зачем это всё и кому\
    \ от этого станет легче или интереснее.\n\nСейчас он в активном поиске. Хочет\
    \ в команду, где ценят не только строки кода, но и голову на плечах.\n\nЕсли вам\
    \ нужен такой человек - вот прямой контакт: @btimofeev\n\nНу и буду признателен,\
    \ если перешлете дальше. Иногда одно сообщение в ленте закрывает вакансию, которую\
    \ искали полгода \U0001F91D\U0001F44D"
