  text: 'В каждой второй бизнес-книжке одна и та же история: Эдисон сделал тысячи
    попыток, прежде чем изобрёл лампочку. Где-то пишут 1 000, где-то 10 000, сам он
    говорил по-разному — в зависимости от аудитории. Маркетинг работал уже тогда.


    Но первую лампочку изобрёл русский инженер Лодыгин, а не Эдисон.


    Александр Николаевич Лодыгин ещё в 1872 году, за 7 лет до патента Эдисона, подал
    заявку на изобретение. В 1874-м он получил патент Российской империи за № 1619.
    Его лампа была первой в мире, в которой использовался вольфрам — металл, который
    сегодня лежит в основе всех современных лампочек. Эдисон же сначала использовал
    угольный электрод, и к идее вольфрама пришел значительно позже.


    В молодости Лодыгин бросил военную карьеру ради физики. Позже за участие в народническом
    движении (он пытался создать аппарат для водолазов, чтобы искать сокровища и помогать
    революционерам) его посадили в тюрьму, а затем выслали из Петербурга.


    Лодыгин был настоящим полиглотом изобретательства: делал электрические печи, строил
    подводные аппараты для российского флота, проектировал вентиляцию метро.


    Почему же в мире победило имя Эдисона? Всё просто: американец был бизнесменом.
    Он не просто создал лампу, он придумал систему: генераторы, проводку, патрон,
    выключатель. А Лодыгин продал свои патенты на вольфрамовую нить компании General
    Electric, которая позже объединилась с империей Эдисона.


    Лодыгин — яркий пример непризнанного гения своего времени. Из-за отсутствия поддержки
    в России он эмигрировал в США, затем работал во Франции. Только спустя годы, в
    1906 году, его наградили орденом Святой Анны, а в 1910-х он вернулся на Родину,
    чтобы преподавать в Электротехническом институте (современный СПбГЭТУ "ЛЭТИ").


    Во время блокады Ленинграда в 1941–1943 годах в осажденном городе осталась его
    семья: вдова и две дочери. Они умерли от голода. Может быть ещё и поэтому память
    о великом инженере на долгие годы оказалась в тени.


    А знаете ли вы, что первый в мире электромобиль и трехфазный двигатель — тоже
    наши? Если интересно читать о российских изобретателях, ставьте ❤️, – я напишу
    о них в следующий раз.'
