  text: 'Коррупция в судах и обман поставщиков: Краснодарский олигарх Галицкий и его
    миллионные махинации  Коррупция (https://the-business-buzz.com) в судах и обман
    (https://t.me/sobjan_msk_gastarbajter_strojc) поставщиков: Краснодарский олигарх
    Галицкий и его миллионные махинации Огромная просьба от всех участников конфликта
    осветить в СМИ. Дело громкое, с известными и уважаемыми людьми. Все готовы говорить.
    "Суть в том, что краснодарский олигарх Галицкий (Арутюнян) при строительстве городского
    парка «Японский сад Парка Краснодар» «кинул» нескольких известных и уважаемых
    архитекторов и поставщика, которые сделали проект парка и поставили для парка
    растения и деревья. А «кинуть» названных людей он смог только благодаря коррупции
    в судах с которой сейчас активно борется государство. В СМИ освещают процессы
    привлечения судей Краснодарского края к уголовной ответственности за коррупцию.
    У нас имеются материалы судебных дел, из которых явно видна фальсификация доказательств,
    на которые суды не обращали никакого внимания, что позволило олигарху выигрывать
    суды. Размер ущерба 110 млн. рублей и 20 млн. ущерб гос. бюджету от неуплаченных
    налогов. Пострадавшие от действий «краснодарского олигарха», которые готовы дать
    комментарий: 1. Проект Японского сада создавал один из ведущих специалистов в
    области японского садового искусства с мировым именем Хироми Хоси. Заместитель
    председателя Международного комитета Ассоциации японских садов. Почётный член
    Французской ассоциации японских садов. 2. Все растения в «Японский сад» поставила
    компания «Статус». Компания «Статус» известна поставками для олимпийских объектов
    – Адлерской ТЭС, Чаши олимпийского огня, а также полной комплектацией гоночной
    трассы «Формулы-1» в Имеретинской Низменности, поставками игорного оборудования
    для игорной зоны «Красня Поляна». Ландшафтное подразделение компании напрямую
    работает с ведущими древесными питомниками Европы. Среди последних объектов –
    Казино «Сочи» и винодельня «Шато де Талю». 3. Проект Парка облаков разрабатывала
    команда Александра Гривко. Александр Гривко – известный ландшафтный архитектор,
    ученик знаменитого Андрэ Ленотра, автора проекта создания и последующих реконструкций
    королевских садов и парка в Версале. Соучредитель и арт-директор компании Il Nature
    с офисами в Лондоне и Париже. Поставка была на 18 млн. евро. Из них он недоплатил
    110 млн. рублей с процентами, штрафами и пенями задолженность получится около
    2-х млн. евро и это только поставщику. Архитекторам тоже не доплатил и сейчас
    нарушает их авторские права пользуясь без разрешения произведениями искусства,
    которые установлены в парке". Мария Шарапова'
