  text: "❓ Как правильно установить автомобильный кран вблизи откоса в разделе \U0001F4CB\
    \U0001F4CB\U0001F4CB\n\n➡️ Основным нормативным документом, регламентирующим работу\
    \ подъемного сооружения (далее ПС) является Приказ Федеральной службы по экологическому,\
    \ технологическому и атомному надзору от 26 ноября 2020 г. № 461  об утверждении\
    \ федеральных норм и правил в области промышленной безопасности \"Правила безопасности\
    \ опасных производственных объектов, на которых используются подъемные сооружения\"\
    \ (далее ФНП).\nРД 11-06-2007 «Методические рекомендации  о порядке разработки\
    \ проектов производства работ  грузоподъемными машинами и технологических карт\
    \  погрузочно-разгрузочных работ» (далее РД) являются документом рекомендательного\
    \ характера (см. письмо Федеральной службы по экологическому, технологическому\
    \ и автономному надзору от 18 февраля 2021г. №09-00-6/1117 ”О разработке ППР”).\n\
    ➡️ В соответствии с п. 111 ФНП краны стрелового типа, краны-манипуляторы, подъемники\
    \ (вышки) на краю откоса котлована (канавы) должны быть установлены с соблюдением\
    \ расстояний, указанных в приложении N 1 таблица 2 к ФНП. \nУстановка автомобильного\
    \ крана осуществляется на минимально необходимом безопасном расстоянии от естественного\
    \ откоса котлована, указанного в СНиП 12-03-2001 п.7.2.4, а также таблице 2 Приложение\
    \ N 1 к ФНП.\nПри глубине котлована более 5 м и невозможности соблюдения расстояний,\
    \ указанных в таблице, откос должен быть укреплен в соответствии с ППР.\n\U0001F4A1\
    \ Согласно РД п. 4.15 привязка стреловых кранов, подъемников (вышек), кранов-манипуляторов,\
    \ устанавливаемых у откоса котлована (выемки) или траншеи, к оси здания (сооружения)\
    \ в соответствии с рисунком   определяется по формуле: \nгде    - расстояние от\
    \ оси здания до основания откоса котлована (выемки);\n   - расстояние от основания\
    \ откоса котлована (выемки) до ближайшей опоры грузоподъемной машины, определяемое\
    \ по таблице 2 приложения 1 ФНП;\n   - размер колеи или базы гусеничного крана,\
    \ а для грузоподъемных машин с выносными опорами - размер опорного контура."
