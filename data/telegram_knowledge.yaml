  text: "Судебная практика\n\nВС РФ об обязанностях подрядчиков по госконтрактам\n\
    \nВ судебной практике последних лет прослеживается ужесточение позиции судов по\
    \ отношению к подрядчикам — они в полной мере обязаны нести риски по исполнению\
    \ госконтракта.  \n\nВ частности, если подрядчик срывает сроки, ссылаясь на недостаток\
    \ исходных данных от заказчика или изменение объема работ, то должен эти факты\
    \ доказать.\n\nТо есть в обязательном порядке совершить ряд регламентированных\
    \ действий: \n\n\U0001F535приостановить работы;\n\U0001F535уведомить заказчика;\n\
    \U0001F535инициировать изменение условий контракта. \n\nЕсли это не будет сделано,\
    \ то суды посчитают, что подрядчик пытается переложить свой предпринимательский\
    \ риск на заказчика. \n\nНедавнее Определение ВС РФ от 16.04.2026 г № 308-ЭС26-2078\
    \ по делу А63-22908/2023 вновь подтверждает сложившуюся практику.\n\nВ чем суть\n\
    \nСуды начальных инстанций взыскали с подрядчика неустойку за то, что он нарушил\
    \ сроки выполнения работ по госконтракту на проектирование водоснабжения. Доказать\
    \ вину заказчика (не предоставил полные исходные данные, изменил трассу) не удалось.\n\
    \nСуд посчитал, что подрядчик обязан:\n\n\U0001F535собрать исходные данные и согласовать\
    \ новый объем работ;\n\U0001F535приостановить работы в установленном порядке,\
    \ если невозможно их исполнить;\n\U0001F535доказать невозможность исполнения работ. \n\
    \nОтдельно было указано, что участие подрядчика в госзакупках означает, что он\
    \ является полноценным участником контракта, соглашается с его условиями и должен\
    \ оценивать все риски.\n\nВС РФ в передаче жалобы для рассмотрения отказал.  \n\
    \n\U0001F972«Законы стройки» в MAX"
