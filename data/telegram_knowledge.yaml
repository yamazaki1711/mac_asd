  text: 'Секреты на торгах недопустимы


    📍 Администрация провела аукцион на аренду участка под магазины. К участию допустили
    11 заявителей, но ценовые предложения подали только трое — в том числе владелица
    кафе на соседнем участке и бывший арендатор площадки. В документации не указали:
    на участке находится летняя веранда, пристроенная к этому кафе.


    💼 Участница аукциона пожаловалась в УФАС, которое отменило торги. Предприниматель
    — владелица кафе с верандой — оспорила решение антимонопольного органа. Три инстанции
    встали на ее сторону: суды признали веранду нестационарным объектом, наличие которого
    не мешает торгам.


    👨‍⚖️ Экономколлегия ВС разъяснила: сокрытие информации об объектах на участке
    напрямую нарушает конкуренцию. Неясность правового статуса веранды создала преимущество
    предпринимателям, связанным с этим объектом. На победителя торгов возложили бы
    урегулирование отношений с владельцем веранды — это ограничило круг реальных участников.


    🏗️ Суд установил: администрация уже нарушала антимонопольное законодательство,
    предоставив площадку под веранду в 2020 году без торгов. Повторное выставление
    участка на аукцион без раскрытия всех обстоятельств вновь ограничило конкуренцию.


    Подробнее в новости


