  text: "‼ Если отзыв объемом 40 страниц – значит времени достаточно \U0001F447\n\n\
    \U0001F525 Объёмные жалобы, иски и отзывы теперь под запретом? Впервые ВС РФ слишком\
    \ эмоционально стал придавать значение объемам отзывов на кассационные жалобы.\
    \ Мы уже анализировали данный кейс в части оплаты коммунальных услуг без приборов\
    \ учета. Но он примечателен и другим свежим выводом.\n\n\U0001F6B0 Санаторий и\
    \ поставщик спорили о способе оплаты за горячую воду. Первый настаивал на оплате\
    \ по числу пациентов, второй – по расчетным расходам воды для санитарно-технических\
    \ приборов.\n\n\U0001F4CC Позиции судов\n\n\U0001F535 Все три инстанции встали\
    \ на сторону поставщика.\n⚖ СКЭС ВС РФ защитила права санатория.\n\n\U0001F4DC\
    \ Своевременное представление поставщиком (ответчиком) содержательного отзыва\
    \ на кассационную жалобу, объемом 40 страниц, и участие в судебном заседании его\
    \ руководителя и представителя опровергают его же доводы о неосведомленности о\
    \ содержании кассационной жалобы и о назначении судебного заседания, а также о\
    \ недостаточности времени для \nподготовки к участию в судебном заседании.\n\n\
    \U0001F4BC Комментарий юристов \"Реаналитики\": \n\n\U0001F9E9 Можно предположить,\
    \ что сейчас формируется новая тенденция оценки объемов заявлений, жалоб и отзывов\
    \ для характеристики поведения истцов и ответчиков.\n\n\U0001F9E9 Данный подход\
    \ похож на часто применяемый судами в последнее время принцип эстоппеля, в соответствии\
    \ с которым нельзя противоречить собственному поведению.\n\n\U0001F50D Определение\
    \ ВС РФ от 13.02.2026 г. по делу № А32-11398/2023\nhttps://m.kad.arbitr.ru/Card/58862ad2-e6ba-437a-8ce8-a0db00ca1cba\n\
    \n⁉ Как Вы думаете, справедливо ли придавать значение объему отзыва на кассационную\
    \ жалобу?\n\n\U0001F44D – Да.\n\U0001F914 – Нет.\n\nPS: Выводы являются обобщёнными.\
    \ Для конкретных рекомендаций и решений обратитесь в “Реаналитику”\nreanalitika.ru.\n\
    \n#арбитражныйпроцесс, #кассационнаяжалоба, #всрф\n@arbitrium_processus\nhttps://t.me/arbitrium_processus"
