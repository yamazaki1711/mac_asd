  text: "В Главгосэкспертизе заявили, что на этапе входного контроля до конца года\
    \ запустят новый сервис на основе ИИ в Личном кабинете заказчика:\nЭто позволит\
    \ нашим заявителям еще до захода на экспертизу получать чек-листы для оперативного\
    \ устранения всех выявленных отступлений от требований и тем самым снижать риски\
    \ отрицательных заключений\nБезусловно, работать надо напрямую с данными. Чтобы\
    \ ускорить формирование единой среды, в ГГЭ используют:\n\n\U0001F539Машиночитаемый\
    \ формат (XML)\n\U0001F539Искусственный интеллект (чтобы обрабатывать то, что\
    \ пока неструктурированно, да и вообще наверное потому, что это модно)\n\nНа цифрах,\
    \ для истории и очередного слайда:\n\U0001F53810,4 миллиона XML-файлов сметной\
    \ документации\n\U0001F538370 тысяч заключений экспертизы\n\U0001F53810 тысяч\
    \ файлов ежедневно загружаются в КПСР.\n\U0001F538объем файлов 3D-моделей (в формате\
    \ IFC) - в 6 раз (еще раз: не спрашивайте нас: что с ними происходит в ГГЭ и куда\
    \ они потом идут).\nИ всё это — про рост в 17 раз за три года! \n\nХочется, конечно,\
    \ спросить: а чего стало меньше? ГГЭ всё это время копила данные, а теперь наконец-то\
    \ обещает… создать ЦДИ (Центр инженерии данных и ИИ) и передать наработки отрасли.\
    \ \n\nТо есть отрасль послушно грузит терабайты смет, XML и IFC. ГГЭ это всё складирует,\
    \ проверяет, обучает ИИ.\n\nА обратно — ни-че-го. Ну, почти. Будет чеккер на основе\
    \ ИИ, да набор промтов, который до конца года покажет заявителю список ошибок\
    \ до экспертизы в личном кабинете.\n\n\U0001F921 И это называется \"повышение\
    \ производительности труда\"?\n\nВспомним про «Витрину проектов». Её \"вынесли\"\
    \ уже в Счётной палате, недоумённо слушали в Совете Федерации,  НОСТРОЙ вон уже\
    \ предложил Минэкономразвития создавать «витрину реализованных универсальных проектов».\
    \ Потому что от ГГЭ так и не дождались ничего, кроме горы данных без выхода наружу\
    \ и практического применения.\n\nГде прямой доступ к тем самым данным, чтобы профессионалы\
    \ сами могли с ними работать, а не получать пережёванную ИИ галлюциногенную «кашу»\
    \ и стопятьсот тысяч формальных замечаний (опять вспомним Дениса Белюка из ППК\
    \ \"ЕЗ\").\nГде база КАЦ?  А те же самые ВОР в XML по видам работ? Где XML-сметы\
    \ объектов, прошедших экспертизу, с возможностью быстро использовать лучшие решения,\
    \ анализировать применяемые сметные нормативы?\nЧто реально проектируется и строится,\
    \ какие ресурсы используются, сколько допсоглашений прошло после экспертизы и\
    \ в какую цену вышла стройка?\n\nПока всего этого нет — любые разговоры о «производительности\
    \ труда через ИИ» напоминают попытку вылечить простуду магией заклинаний. XML-то\
    \ есть, а пользы — нет. ИИ будет, а данных — ни-ни.\n\nК слову, министр строительства\
    \ и ЖКХ РФ Ирек Файзуллин поручил ГГЭ именно это и сделать на XV Всероссийском\
    \ съезде НОПРИЗ: «передать наработки отрасли». Т.е. речь не о промтах, и не результатах\
    \ ИИ-обработки! Для начала можно предоставить доступ к базе данных согласованных\
    \ КАЦ по субъектам — только это, очевидно, прямо сходу (о чудо!) кратно сократит\
    \ количество нарушений и злоупотреблений! Вот тогда и поговорим про работу с данными\
    \ напрямую и рост производительности."
