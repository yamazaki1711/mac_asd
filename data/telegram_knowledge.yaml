  text: 'Аванс без результата


    🏛 Заказчик перечислил подрядчику аванс на реставрацию объекта культурного наследия
    федерального значения. Подрядчик сорвал сроки, результат работ не сдал — заказчик
    отказался от договора и потребовал вернуть деньги.


    📑 Три инстанции в возврате отказали. Первая инстанция решила, что подрядчик выполнил
    работы на сумму больше аванса, но не привела ни одного расчета. Апелляция сама
    же установила, что подрядчик освоил аванс не полностью, — и закрыла разницу зачетом
    по другому договору, хотя спор по нему еще даже не рассмотрели.


    ⚖️ Экономколлегия напомнила: удерживать аванс без полноценного встречного предоставления
    нельзя. Суды не разобрались ни в объемах работ, ни в обоснованности зачета, а
    признание подрядчиком долга и подписанные сторонами акты взаимозачета просто проигнорировали.


    ↩ Все акты отменили, дело отправили на новое рассмотрение.


