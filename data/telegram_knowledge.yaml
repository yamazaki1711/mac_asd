  text: "Марат Хуснуллин в интервью РБК на ПМЭФ-2025 рассказал о роли строительной\
    \ отрасли в экономике России\n\n\U0001F4CDСтроительная отрасль пока сохраняет\
    \ стабильность благодаря накопленному запасу прочности. Тем не менее существует\
    \ риск снижения объемов строительства, если не принять мер.\n\n\U0001F4CDНесмотря\
    \ на все сложности, работа над инфраструктурными проектами продолжается. Удалось\
    \ удержать финансирование дорог.\n\n\U0001F4CDНа строительную отрасль приходится\
    \ 13% ВВП и миллионы рабочих мест. \n\n\U0001F4CDЗадача – построить 1 млрд кв.\
    \ м жилья, таким образом обновив каждый пятый метр жилфонда в стране. При этом\
    \ стройка выступает локомотивом экономики. \n\n\U0001F4CDЗадача по реставрации\
    \ консерватории имени Римского-Корсакова в Санкт-Петербурге была непростой, но\
    \ она успешно выполнена. Это объект мирового уровня. \n\n#ПМЭФ\n\n\U0001F1F7\U0001F1FA\
    Новости Правительства России"
