  text: '⚖️ Заказчик нарушил Закон N 223-ФЗ до поправок к КоАП РФ: суд разобрался
    с применением наказания


    Контролеры решили, что в положении о закупке закрепили неоднозначные условия сделки
    с единственным участником. Заключение договора зависело от воли заказчика. Это
    нарушило принцип равноправия сторон. Суд согласился с решением контролеров.


    Поскольку заказчик совершил нарушение до 1 марта 2025 года, контролеры признали
    его виновным по старой статье КоАП РФ. Наказание же в виде предупреждения назначили
    по новой норме, которая заработала с 1 марта 2025 года.


    Заказчик решил, что, поскольку норма КоАП РФ утратила силу, контролерам нужно
    прекратить производство по делу. Суд его не поддержал:


    ● производство по делам, возбужденным до 1 марта 2025 года, прекращают, если нарушение
    не подпадает под статьи КоАП РФ в новой редакции;

    ● в данном случае состав правонарушения перенесли в новую статью. Формальная утрата
    силы нормой не означает, что деяние перестало быть административным правонарушением;

    ● нарушение правильно квалифицировали по старой норме КоАП РФ, которая действовала
    на момент нарушения. При назначении же наказания они применили норму КоАП РФ об
    обратной силе закона, смягчающего ответственность. Заказчику вынесли предупреждение
    по новой норме, которая действовала на момент выявления нарушения. Прекращение
    производства по делу из-за того, что норма утратила силу, противоречило бы КоАП
    РФ. #223фз


