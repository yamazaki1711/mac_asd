  text: '📄Минстрой переводит выдачу разрешений на строительство полностью в электронный
    формат


    Минстрой опубликовал проект нового административного регламента по предоставлению
    госуслуги по выдаче разрешений на строительство. Документ должен заменить действующий
    приказ № 323/пр от 2020 года. Планируемая дата вступления — 1 сентября 2026 года.


    📝Главное изменение — переход на реестровую модель. Теперь результат оказания услуги
    будет существовать только в электронном виде. Разрешение на строительство фактически
    перестает быть «документом» в привычном смысле: вместо него формируется запись
    в реестре разрешений в системе «Стройкомплекс.РФ». Подтверждением станет электронная
    выписка в формате XML + PDF/A, которая будет доступна заявителю через личный кабинет
    на Госуслугах.


    Отказы также переводятся в цифровой формат — они оформляются исключительно как
    электронные документы, без формирования реестровых записей.


    Аналогичный подход предусмотрели и для дубликатов: если разрешение выдано до 1
    сентября 2026 года, его дубликат можно будет получить только в электронном виде
    через портал госуслуг.

    Бумажный формат нельзя будет получить даже через МФЦ.


    👨‍💻Еще одно важное нововведение — категоризация заявителей. Предоставление услуги
    будет осуществляться с учетом категорий (признаков) заявителя, закрепленных в
    цифровых реестрах госуслуг.


    🔷При этом проект регламента детализирует и усиливает правоприменительную часть:

    — установили исчерпывающий перечень оснований для отказа;

    — ключевые причины: отсутствие документов (по ч. 7 ст. 51 ГрК РФ), несоответствие
    ГПЗУ и документации по планировке территории, неподтвержденные полномочия заявителя,
    подача «не по адресу».


    🔷Отдельно прописали новые основания для отказа в продлении разрешения:

    — отсутствие фактически начатых работ на объекте;

