  text: "СТРАХОВКА С ИСКЛЮЧЕНИЯМИ\n\nМногие до сих пор живут с иллюзией: если есть\
    \ КАСКО на автомобиль или страховка на квартиру, дом и другое имущество, значит\
    \ всё застраховано вообще от всего. К сожалению, это не так. Когда начинаешь внимательно\
    \ смотреть договоры, особенно после перехода из другой страховой компании, очень\
    \ быстро выясняется, что полис вроде бы есть, а вот полноценного покрытия там\
    \ нет. И узнают об этом обычно уже тогда, когда страховой случай фактически наступил.\n\
    \nСейчас страховые компании подстраиваются под новую реальность. Поэтому всё чаще\
    \ в полисах появляется отдельный риск - «военные действия». \n\nНо этот пункт\
    \ включают далеко не все, а если и включают, то нередко с оговорками и исключениями,\
    \ о которых клиенту в момент оформления почему-то подробно не рассказывают. В\
    \ итоге человек уверен, что у него «полное КАСКО» или надёжно застрахованное имущество,\
    \ а потом внезапно выясняется, что не такое уж оно полное и надёжное. \n\nПоэтому\
    \ не надо смотреть только на цену полиса и верить красивым обещаниям. Надо смотреть,\
    \ что именно у вас застраховано, а что нет. Если не хотите переплачивать за бумагу,\
    \ которая в нужный момент не сработает, обращайтесь в «Ярдрей Страхование». У\
    \ нас подберут именно тот набор рисков, который нужен именно вам.\n\n«Ярдрей.Страхование»\n\
    \n\U0001F4F1Телеграмм: @yardreyinsurance\n\U0001F4F1WhatsApp: wa.me/79684743333\n\
    Телефон: +79684743333\nСайт: https://insurance.yardrey.ru\nПочта: insurance@yardrey.ru"
