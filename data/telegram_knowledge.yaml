  text: "Ирина Кузьма, Координатор НОСТРОЙ по дальневосточному федеральному округу,\
    \ член Совета НОСТРОЙ, председатель Комитета НОСТРОЙ по цифровой трансформации\
    \ строительной отрасли — о влиянии 309-ФЗ на цифровизацию и переход на отечественное\
    \ программное обеспечение. \nПроектировщикам перейти на российское ПО проще, поскольку\
    \ такие требования к ним может контролировать Главгосэкспертиза. В строительстве\
    \ же ситуация сложнее: подрядчик сможет использовать отечественное ПО, только\
    \ если заказчик официально передаст ему информационную модель объекта. \n\nСейчас\
    \ прорабатываются изменения в правила саморегулирования с предложением по контролю\
    \ СРО за использованием российского ПО через Систему оценки опыта и деловой репутации.\
    \ Предлагается привлекать к контролю вендоров для верификации ПО и исключения\
    \ нелицензионного или пиратского софта."
