  text: '⚡️Минстрой подготовил изменения в ГрК РФ в части введения стадии ТЭО.


    Предлагается дополнить ГрК РФ новой статьей 48.3, устанавливающей ТЭО в качестве
    первого этапа архитектурно-строительного проектирования.


    Обязанность по ее подготовке будет устанавливаться подзаконными актами Правительства
    РФ и ОГВ субъектов РФ только в отношении объектов, финансируемых с привлечением
    бюджетных средств.


    В случаях, когда подготовка ТЭО является обязательной, оно подлежит экспертной
    оценке в органах или организациях, уполномоченных на проведение государственной
    экспертизы ПД. Срок проведения такой оценки составляет от 15 до 20 р.д. Предметом
    экспертизы выступает обоснованность выбранных решений, возможность их реализации
    с учетом требований технических регламентов, экологических и иных норм, а также
    оптимальность сроков и этапов строительства. Результатом экспертизы может быть
    положительное или отрицательное заключение.


    Для объектов, где подготовка ТЭО обязательна, задание на проектирование должно
    утверждаться только после получения положительного заключения экспертизы ТЭО и
    соответствовать утвержденному ТЭО.


    ◽️Предполагается, что закон вступит в силу - 01.03.2027 г.


    🫡😎 П.Э.С. в МАХ'
