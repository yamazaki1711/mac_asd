  text: "‼ Отказаться от иска, а потом жалеть\U0001F447\n\n✂️Пословица \"Семь раз\
    \ отмерь и один раз отрежь\" обрела новый смысл в арбитражном процессе. ВС РФ\
    \ не разрешил ИП \"передумать\" и оспорить собственный отказ от иска. Теперь попытаться\
    \ защитить свои интересы, оспаривая отказ от иска, становится невозможным. \n\n\
    \U0001F687 Сначала ИП в споре с РЖД отказался от иска о признании контактных сетей\
    \ самовольными постройками. Но вскоре подал кассационную жалобу на положительное\
    \ для РЖД решение, ссылаясь на отсутствие оснований для принятия отказа от иска.\n\
    \n⚖ Суды, включая СКЭС ВС РФ, ИП отказали.\n\n\U0001F4DC Фактически позиция ИП\
    \ сводится к сохранению в силе решения суда первой инстанции по настоящему делу\
    \ и защите своих прав на получение компенсации.\n\n\U0001F4DA Арбитражный суд\
    \ должен проверить ходатайство об отказе от иска на предмет наличия противоречий\
    \ закону или нарушений прав других лиц, в т. ч. путем оценки доводов и возражений\
    \ сторон.\n\n\U0001F52E Отказ истца от иска противоречит закону в случае, если\
    \ арбитражный суд установит, что отказ, например, совершается истцом вследствие\
    \ обмана, насилия, угрозы или под влиянием существенного заблуждения либо при\
    \ отсутствии полномочий лиц, заявивших соответствующее ходатайство (п. 29 ПП ВС\
    \ РФ от 23.12.2021 г. № 46).\n\n\U0001F4BC Комментарий юристов \"Реаналитики\"\
    : \n\n\U0001F9E9 При отказе от иска (требования) волеизъявление истца должно быть\
    \ направлено на прекращение процесса вследствие утраты интереса к судебному рассмотрению\
    \ спора, нежелания дальнейшего использования механизмов судебной защиты (постановление\
    \ КС РФ от 26.05.2011 г. № 10-П, ПП ВАС РФ от 29.10.2013 г. № 3862/13).\n\n\U0001F50D\
    \ Определение ВС РФ от 19.01.2026 г. по делу № А78-4388/2020\nhttps://m.kad.arbitr.ru/Card/36fd4aac-b473-4556-9289-5e2fe93be0fe\n\
    \n⁉ Как Вы думаете, справедлив ли такой подход?\n\n\U0001F44D – Да.\n\U0001F914\
    \ – Нет.\n\nPS: Выводы являются обобщёнными. Для конкретных рекомендаций и решений\
    \ обратитесь в “Реаналитику”\nreanalitika.ru.\n\n#арбитражныйпроцесс, #иск, #отказ\n\
    @arbitrium_processus\nhttps://t.me/arbitrium_processus"
