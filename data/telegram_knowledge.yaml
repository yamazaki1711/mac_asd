  text: "Новый кейс от коллег из «Базис Недвижимость» — о том, как ГК СМЕЛО снизила\
    \ время передачи квартир почти в два раза\n\nСложность в том, что для Владивостока\
    \ нестабильная связь на объектах — это норма. А значит, любые цифровые инструменты\
    \ должны работать не в «идеальных условиях», а в реальной стройке.  \n\nНа базе\
    \ решения от «Базис Недвижимость» команде удалось выстроить устойчивый процесс\
    \ заселения и взять под контроль все ключевые этапы: от записи клиентов до работы\
    \ с замечаниями и аналитики в режиме реального времени.  \n\nЧто было до внедрения:\
    \  \n • 80–90 обращений в день через звонки и таблицы  \n • ожидание клиентов\
    \ на приёмке — до 40–60 минут  \n • 15–20 бумажных документов на одну квартиру\
    \  \n • задержки передачи замечаний подрядчикам — до 1–3 дней  \n • сбор сводной\
    \ информации занимал до 2 рабочих дней  \n\nЧто получилось после внедрения:  \n\
    ✔️время передачи квартиры ↓ на 47% (с 2,9 до 1,5 часа)  \n✔️количество конфликтов\
    \ ↓ на 65%  \n✔️повторные выходы инспекторов ↓ на 38%  \n✔️срок устранения замечаний\
    \ ↓ в 2,7 раза (с 14 до 5 дней)  \n✔️100% замечаний и процессов — в едином цифровом\
    \ контуре  \n\nПри этом система работает стабильно даже при нестабильной связи\
    \ — то есть не в «идеальной презентации», а в реальных условиях стройки.  \n\n\
    Подробней — в ролике \U0001F3A5 \n\n➡️Больше о кейсе — ЗДЕСЬ и в тг-канале Артёма\
    \ Глухих.\n\n\U0001F972«Законы стройки» в MAX"
