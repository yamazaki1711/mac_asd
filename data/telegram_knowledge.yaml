    ранее судимому члену этнической ОПГ за покушение на мошенничество и вымогательство
    550 тысячи рублей у медсестры. Как сообщили в УФСБ России по Волгоградской области,
    ему назначено 3,5 года лишения свободы в колонии-поселении. Гражданина Залиняна
    В.Х. признали виновным по двум статьям УК РФ: ч. 3 ст. 30, ч. 2 ст. 159 (покушение
    на мошенничество) и п.п. «а, г» ч. 2 ст. 163 (вымогательство, совершенное группой
    лиц по предварительному сговору в крупном размере). Установлено, что осужденный
    действовал в интересах своего брата, которому понадобилась фиктивная правка о
    болезни. С этой целью он обратился к медсестре ГБУЗ «ВОКБ № 1», но она помогать
    в этом не стала. - Получив отказ в исполнении услуги, осуществил вымогательство
    денежных средств у женщины в размере 550 000 рублей. Сотрудница медицинского учреждения,
