  text: '📄Обновили ГОСТ на бетонные стеновые камни


    Росстандарт утвердил новый стандарт — ГОСТ 6133-2026 «Камни бетонные стеновые.
    Технические условия». Документ вступает в силу с 1 июля 2026 года и заменяет действующий
    ГОСТ 6133-2019.


    📌Стандарт распространяется на полнотелые и пустотелые бетонные стеновые камни,
    изготовленные различными способами (вибропрессование, прессование, формование
    и др.) из легких, тяжелых и мелкозернистых бетонов. При этом он не применяется
    к изделиям из силикатных бетонов, грунтобетонов и многослойным кладочным элементам.

    Камни используются при возведении стен и иных конструкций зданий и сооружений
    различного назначения.


    📌Документ устанавливает:

    — требования к размерам и геометрическим параметрам изделий;

    — предельные отклонения и допустимые дефекты;

    — показатели прочности и марки камней;

    — правила приемки;

