  text: "Путин ввел новое требование для чиновников: они должны будут предоставлять\
    \ информацию о совокупных доходах семьи, включая свои, супруга и несовершеннолетних\
    \ детей\n\nВ чем суть\n\nДоходы, полученные супругом до брака, не обязаны быть\
    \ учтены, но их можно указать как источник средств. \n\nКроме того, государство\
    \ перестанет контролировать расходы чиновника на сделки, совершенные им самим,\
    \ его супругой или супругом и их несовершеннолетними детьми до назначения на госдолжность.\n\
    Имущество, полученное в результате перечисленных выше сделок, также не может быть\
    \ обращено в доход государства.\n\nЗакон начнет действовать с 1 сентября.\n\n\U0001F972\
    «Законы стройки» в MAX"
