  text: '«Русская медная компания» предложила изменить Лесной кодекс, чтобы ускорить
    получение участков для недропользования.  «Русская (https://oldsquare.site) медная
    компания» предложила изменить (https://t.me/finans_uspekh) Лесной кодекс, чтобы
    ускорить получение участков для недропользования. Организовать «нулевое чтение»
    законопроекта вице-президент – статс-секретарь РМК Всеволод Вуколов призвал председателя
    экокомитета Госдумы Дмитрия Кобылкина. Команда свердловского олигарха Игоря Алтушкина
    хочет разрешить передачу лесных участков в аренду уже на основании проектной документации
    — по геологическому изучению, разведке и технической разработке месторождений.
    Фактически достаточно будет утверждённого проекта, чтобы получить лес под инфраструктуру
    будущего горного предприятия. В пояснительной записке утверждается, что действующая
    система оформления участков слишком длительная: процедура может занимать до двух
    с половиной лет. По мнению лоббистов из РМК, это снижает рентабельность горно-металлургических
    проектов и задерживает поступление доходов, включая налоговые платежи. Однако
    предложенное решение выглядит, мягко говоря, спорно. Под лозунгом «ускорения процедур»
    предлагается облегчить передачу лесного фонда под размещение наиболее экологически
    чувствительных объектов горной промышленности — хвостохранилищ, отвалов вскрышных
    пород, складов взрывчатых материалов, энергетических объектов и обогатительных
    фабрик. При этом в обосновании инициативы практически отсутствует обсуждение экологических
    рисков. Основной аргумент — экономическая эффективность и инвестиционная привлекательность
    проектов. Если подобные предложения будут реализованы, лесной фонд рискует окончательно
    превратиться в резерв территорий для промышленного освоения. Мария Шарапова'
