  text: "Как суды решают после «дела Долиной»: достоверность ЕГРН начала работать?\n\
    \nНесколько дней назад СМИ сообщили о том, что пенсионерки придумали новый способ\
    \ возвращать себе проданные квартиры — после скандала вокруг дела певицы Ларисы\
    \ Долиной они стали апеллировать к собственной невменяемости. Речь идёт о статье\
    \ 177 ГК РФ.\n\nНичего нового тут, конечно, нет. На канале я неоднократно рассказывал,\
    \ что статья 177 ГК РФ — это та норма, которая на текущий момент по-прежнему позволяет\
    \ оспаривать сделки с недвижимостью (и не только) через экспертизу.\n\nО том,\
    \ как можно решить данную проблему, я писал тут. Пока продолжаем ждать Обзора\
    \ Верховного Суда по таким спорам, я решил посмотреть, есть ли что-то новое и\
    \ интересное в судебной практике.\n\n\U0001F4C4При оспаривании по статье 177 ГК\
    \ РФ — ничего нового\n\nЕсли по итогу судебной экспертизы продавца признают неспособным\
    \ понимать значение своих действий на момент сделки, то сделку признают недействительной.\n\
    \nНо относительно применения иных норм я нашёл один интересный и полезный судебный\
    \ акт.\n\n\U0001F4C2Фабула\n\nНичего нового. Истец продал квартиру якобы под влиянием\
    \ мошенников. Покупатель успел даже заключить договор с местной администрацией\
    \ о продаже квартиры в связи с переселением из аварийного жилья.\n\nИстец обратился\
    \ с иском и к первому покупателю, и к администрации. Утверждал, что продал квартиру\
    \ под влиянием мошенников.\n\nСуд отказал в удовлетворении иска.\n\n⚖️Позиция\
    \ суда\n\nВо-первых, это, похоже, один из первых судебных актов, в котором применена\
    \ позиция ВС РФ по «делу Долиной».\n\nВо-вторых, вот ещё полезные выводы суда:\n\
    \n\U0001F535Срок исковой давности. Суд посчитал его похоже пропущенным (как-то\
    \ напрямую об этом не указал, но скорее да, чем нет). Датой начала течения срока,\
    \ по мнению суда, является дата, когда истец обратился с заявлением о мошенничестве.\
    \ Иск же был подан спустя более чем год после обращения в полицию.\n\n\U0001F535\
    Сам факт возбуждения уголовного дела по признакам состава преступления, предусмотренного\
    \ ст. 159 УК РФ, не может служить основанием для установления факта мошенничества\
    \ в отношении истца.\n\n\U0001F4CCНу и самое главное:\nАдминистрация, как покупатель,\
    \ добросовестно полагалась на сведения ЕГРН, которые объективно подтверждали наличие\
    \ у продавца права собственности на спорную квартиру, им были предоставлены правоустанавливающие\
    \ документы, в то время как проверка всех право предшественников продавца с точки\
    \ зрения наличия у них правоспособности, дееспособности, полномочий на отчуждение\
    \ имущества и иных обстоятельств заключения соответствующих сделок - находится\
    \ за пределами обычно ожидаемого поведения от добросовестного участника гражданского\
    \ оборота. \n\n\U0001F4ACПочему я считаю этот вывод важным? \n\nПотому что это\
    \ уже похоже на настоящий принцип достоверности сведений ЕГРН, который должен\
    \ исключать любую возможность истребования квартиры у лица, которой действовало\
    \ добросовестно. Об этом я писал тут.\n\nИсточник: Решение Выборгского городского\
    \ суда Ленинградской области от 19 декабря 2025 г. по делу № 2-436/2025\n\nРешение\
    \ может быть полезным, но говорить о том, что запись в ЕГРН теперь = 100% защита\
    \ сделки — пока преждевременно.\n\n\U0001F4FDРанее по теме\n▫️Три поправки в закон,\
    \ которые прекратят отъём квартир\n▫️Почему шизофрения продавца — не основание\
    \ отменить сделку?\n\n\U0001F3F7Прочёл в законе"
