  text: "Сокрытие банкротом доходов через карту друга — основание для взыскания убытков\n\
    \n➡️Должник помогал продавать и покупать недвижимость в интернете. Для сбора донатов\
    \ он использовал карту банка, оформленную на друга. На эту карту поступило 1,7\
    \ млн рублей. Управляющий посчитал, что активы выведены на подконтрольное лицо,\
    \ и подал заявление о взыскании убытков.\n\nОтветчик отрицал аффилированность\
    \ и заявил, что карта использовалась только в его личных целях, деньги принадлежали\
    \ ему. В подтверждение он перечислил расходы по карте и пополнения через банкомат.\n\
    \n\U0001F4CD Две инстанции отказали управляющему со ссылкой на недоказанность\
    \ заявленных требований. Учли, что ответчик частично раскрыл доходы. Доводы истца\
    \ о том, что должник спустя 5 лет после банкротства продолжает вести бизнес и\
    \ роскошный образ жизни, суды проигнорировали. \n\nКассация вернула спор на новое\
    \ рассмотрение. Управляющий представил многочисленные косвенные доказательства,\
    \ в совокупности указывающие на возможность использования должником счета ответчика\
    \ для получения дохода. Но суды ограничились формальной фразой о «частичном раскрытии»\
    \ источников. \n\nСуды не учли, что именно на ответчике лежало бремя опровержения\
    \ доводов управляющего, чего он не сделал. Не объяснил, зачем его личная карта\
    \ использовалась для переводов от третьих лиц в связи с деятельностью другого\
    \ в интернете.\n\n\U0001F4C4 Источник: постановление АС Уральского округа от 17.03.2026\
    \ по делу № А60-69907/2019\n\n⚪ Арбитражная практика в Телеграм | Сообщество ВК\
    \ | Канал в MAX"
