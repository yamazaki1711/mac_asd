  text: 'Уточнены требования к уровню локализации отдельных видов отечественной промышленной
    продукции


    Правительство РФ скорректировало содержание отдельных имеющихся позиций, а также
    дополнило рядом новых позиций разделы "VII. Медицинские изделия" и "IX. Продукция
    радиоэлектроники" приложения к постановлению Правительства РФ от 17.07.2015 N
    719 "О подтверждении производства российской промышленной продукции" (далее -
    приложение, Постановление № 719). Кроме того, скорректированы отдельные примечания
    к приложению, в соответствии с которыми определены требования к уровню локализации
    промышленной продукции в целях ее отнесения к отечественной. В частности, изменения
    коснулись требований к продукции судостроения, медицинской промышленности, радиоэлектроники.


    Постановление Правительства РФ от 31.03.2026 № 351 вступит в силу 18 апреля текущего
    года, однако для отдельных изменений предусмотрены более поздние сроки вступления
    в силу. При этом реестровые записи реестра промышленной продукции, сформированные
    в отношении интегральных схем и продукции судостроения до дня вступления в силу
    соответствующих изменений, действительны до окончания установленного срока их
    действия.


    Напомним, что согласно подп. "а" п. 3 постановления Правительства РФ от 23.12.2024
    N 1875 порядок подтверждения страны происхождения товаров, указанных в позициях
    1 - 145 приложения N 1, позициях 1 - 433 приложения N 2 к данному постановлению,
    предполагает в том числе указание в заявке на участие в закупке номера реестровой
    записи из реестра российской промышленной продукции, содержащей в том числе информацию
    о совокупном количестве баллов за выполнение (освоение) на территории РФ соответствующих
    операций (условий), если такие требования установлены Постановлением N 719. #нацрежим


    Документ: Постановление Правительства РФ от 31 марта 2026 г. № 351


    Источник: ГАРАНТ.РУ'
