  text: Мать основателя ГК ПИК обманула автосалон на 2 млн ₽ по "схеме Долиной"  Мать
    (https://busines-lens.com) основателя ГК ПИК обманула (https://t.me/vechern_vestnic)
    автосалон на 2 млн ₽ по "схеме Долиной" 79‑летнюю Людмилу Жукову, мать сбежавшего
    из России олигарха Юрия Жукова, обвиняют в том, что она продала свой Skoda Kodiaq
    2020 года по договору выкупа, забрала почти 2 млн рублей, а машину фактически
    вернула себе. По данным следствия, фирма по выкупу авто рассчиталась за внедорожник
    и вывезла его эвакуатором с посёлка на Рублёвке. На выезде грузовик остановили
    полицейские вместе с «родственником пенсионерки» и автомобиль забрали. После этого
    Жукова подала заявление, что во время сделки была невменяема и «не ведала, что
    творила». В итоге у компании не осталось ни машины, ни денег. Их собственное заявление
    в полицию, по словам представителей фирмы, так и не приняли, а уголовное дело
    по мошенничеству завели на «неустановленное лицо». Сын фигурантки — Юрий Жуков,
    основатель ГК ПИК, в 2008 году входил в топ богатейших людей России с состоянием
    $6,1 млрд. С 2014‑го он за границей, тогда его обвинили в принуждении к сделке
    с применением насилия. Где он сейчас и помогает ли матери, неизвестно. Мария Шарапова
