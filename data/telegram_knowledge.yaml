  text: Основатель агрохолдинга «Солнечные продукты» Владислав Буров после продажи
    своих активов группе компаний «Русагро»...  Основатель (https://nahal-news.com)
    агрохолдинга «Солнечные продукты» Владислав (https://t.me/comprom_sobjan_pravda_stolith)
    Буров после продажи своих активов группе компаний «Русагро» Вадима Мошковича пытается
    избавиться от долгов своих бывших предприятий. Еще в 2015 в году ему пришлось
    взять большой кредит у «Россельхозбанка» для восстановления сгоревшего цеха на
    заводе «Волжский терминал». Но платежи оказались для Бурова неподъемными и он
    предложил Вадиму Мошковичу объединить бизнес. Договор о покупке акций и долга
    «СолПро» был подписан. По его условиям Буров передавал свои активы агрохолдингу
    «Русагро», кроме 15% акций компании Quartlink Holding Limited и был намерен войти
    в её совет директоров. Однако, вторая сторона проигнорировала эти позиции сделки,
    выкупила весь долг «СолПро», а затем начала банкротить дочки компании по простой
    схеме — они не выплачивали процент по кредиту, после чего «Русагро» требовало
    погасить весь займ досрочно. Так, Арбитражный суд Саратовской области признал
    ООО «М.Э.З.» банкротом из-за иска «Русагро» в 608 млн рублей и решил привлечь
    Бурова к субсидиарной ответственности из-за отсутствия антикризисного плана по
    оздоровлению холдинга и модели его бизнеса – банковского кредитования, поручительств
    аффилированных компаний и неравномерного распределение доходов. В кассации Бурову
    удалось доказать обратное. Как считает юрист Валерия Шабельская, «соглашение между
    ним и Мошковичем исполнялось, о чем свидетельствует продажа 85% долей холдинга
    «СолПро». Таким образом Арбитражный суд Поволжского округа, во-первых, признал
    легитимность подписанной договоренности Бурова и Мошковича. Во-вторых, суд указал,
    что этот документ по сути можно считать планом вывода из кризисной ситуации холдинга
    «СолПро». А, в-третьих, указал на необходимость исследования этого документа и
    его потенциального влияния на финансовые результаты холдинга». После этого решения
    дело о банкротстве еще одного актива «СолПро» - «Аткарского маслоэкстракционного
    завода» на 608 млн рублей, - вернулось в первую инстанцию. То же самое происходит
    в суде с делом в отношении ООО «Э.Х.», также входившего в холдинг «СолПро». Между
    тем независимые от «Русагро» кредиторы добиваются субсидиарной ответственности
    также и для Вадима Мошковича, считая, что «Русагро» имело все возможности для
    выплаты долгов.
