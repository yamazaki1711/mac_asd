  text: "❓ Как выполняется привязка стрелового крана для возведения надземной части\
    \ здания на СГП в разделе \U0001F4CB\U0001F4CB\U0001F4CB\n\n✍ В соответствии с\
    \ СТО НОСТРОЙ 2.33.52-2011 п. 6.2 последовательность привязки кранов включает:\
    \ определение требуемых параметров работы крана; выбор крана; привязку крана и\
    \ подкрановых путей к строящемуся объекту; установление зоны действия крана; выявление\
    \ условий работы; введение при необходимости ограничения в зону действия крана.\n\
    Привязка кранов, подъемников и рельсовых крановых путей производится к осям здания\
    \ (сооружения), а при реконструкции – к наружным поверхностям стен.\n➡️ При привязке\
    \ стреловых для возведения надземной части здания (сооружения) расстояние от оси\
    \ вращения крана до ближайшей оси здания (сооружения) определяется наибольшей\
    \ суммой расстояний от оси здания до его выступающих частей и габарита приближения\
    \ плюс величина габарита поворотной части крана.\nS=a+n+Rп (см. рисунок 1), где\
    \ \nа  - расстояние от оси здания до его наружной грани (выступающей части);\n\
    n - габарит приближения;\nRn - наибольший радиус поворотной части крана.\n✏️ Согласно\
    \ РД 11-06-2007  п. 4.3 расстояние между поворотной частью стреловых самоходных\
    \ кранов, платформой подъемника (вышки), краном-манипулятором при любых их положениях\
    \ и строениями, штабелями грузов, строительными лесами и другими предметами (оборудованием)\
    \ должно быть не менее 1000 мм.\n‼️‼️‼️‼️ РД 11-06-2007 «Методические рекомендации\
    \  о порядке разработки проектов производства работ  грузоподъемными машинами\
    \ и технологических карт  погрузочно-разгрузочных работ» (далее РД) являются документом\
    \ рекомендательного характера (см. письмо Федеральной службы по экологическому,\
    \ технологическому и автономному надзору от 18 февраля 2021г. “09-00-6/1117 ”О\
    \ разработке ППР”)."
