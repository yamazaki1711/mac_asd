  text: '📑В статью 52 Градостроительного кодекса готовят изменения


    На публичное обсуждение вынесли законопроект о внесении изменений в статью 52
    ГрК.


    ✔️Проектом предлагается закрепить возможность выполнения подготовительных работ
    на опасных производственных объектах IV класса опасности до получения разрешения
    на строительство. Такие работы допускаются при условии, что они не оказывают существенного
    воздействия на окружающую среду, и могут выполняться:

    — со дня направления проектной документации на экспертизу;

    — либо со дня согласования отдельных разделов проектной документации (в случаях,
    предусмотренных ч. 15.5 ст. 48 ГрК РФ).

    При этом норма не применяется к опасным производственным объектам I–III классов
    опасности и объектам использования атомной энергии.


    ✔️Кроме того, законопроектом предлагается исключить из состава документов, прилагаемых
    к извещению о начале строительства, копию документа о вынесении на местность линий
    отступа от красных линий (п. 3 ч. 5 ст. 52 ГрК РФ).


    Это связано с тем, что:

    — соответствие проектной документации красным линиям уже проверяется при выдаче
    разрешения на строительство (п. 2 ч. 11 ст. 51 ГрК РФ);

    — разрешение на строительство в любом случае прикладывается к извещению о начале
    строительства (п. 1 ч. 5 ст. 52 ГрК РФ);

    — требования документации по планировке территории (включая красные линии и отступы)
    являются обязательными и подлежат соблюдению при проектировании и строительстве.


    Таким образом, требование о представлении отдельного документа признаётся избыточным.


