  text: "❓ Какой должен быть состав проектной документации в случае выделения этапа\
    \ строительства\n\n➡️ В соответствии с  Постановлением Правительства РФ от 16\
    \ февраля 2008г. № 87 (далее Положение) под этапом строительства понимается строительство\
    \ или реконструкция объекта капитального строительства из числа объектов капитального\
    \ строительства, планируемых к строительству, реконструкции на одном земельном\
    \ участке, если такой объект может быть введен в эксплуатацию и эксплуатироваться\
    \ автономно (то есть независимо от строительства или реконструкции иных объектов\
    \ капитального строительства на этом земельном участке), строительство или реконструкция\
    \ части объекта капитального строительства, которая может быть введена в эксплуатацию\
    \ и эксплуатироваться автономно (то есть независимо от строительства или реконструкции\
    \ иных частей этого объекта капитального строительства), а также комплекс работ\
    \ по подготовке территории строительства, включающий в себя оформление прав владения\
    \ и пользования земельными участками, необходимыми для размещения объекта капитального\
    \ строительства (части объекта капитального строительства), снос зданий, строений\
    \ и сооружений, переустройство (перенос) инженерных коммуникаций, строительство\
    \ временных зданий и сооружений, вырубку леса и другие работы.\nВАЖНО!  Необходимость\
    \ разработки проектной документации на объект капитального строительства применительно\
    \ к отдельным этапам строительства устанавливается заказчиком и указывается ТОЛЬКО\
    \ в задании на проектирование‼️ ПИСЬМА И ПРОЧИЕ ЗАВЕРЕНИЯ ЗАКАЗЧИКА/ГИПа не валяются\
    \ основанием для выделения этапа строительства. \n\U0001F44D Форма задания застройщика\
    \ или технического заказчика на проектирование объекта капитального строительства,\
    \ строительство, реконструкция, капитальный ремонт которого осуществляются с привлечением\
    \ средств бюджетной системы российской федерации утверждена Приказом Министерства\
    \ строительства и жилищно-коммунального хозяйства РФ от 21 апреля 2022 г. №307/пр.\
    \ Требования к выделению этапов строительства объекта приводятся в п. 8.\nФормулировки\
    \ «технологический этап», «пусковой комплекс», «этап проектирования» не имеют\
    \ ничего общего с формулировкой «этап строительства», определение которой приведено\
    \ выше. \n\U0001F50E В соответствии с п.п. 1 гл. I Общие положения Постановления\
    \ Правительства РФ от 16 февраля 2008г. № 87 в Положении в том числе к составу\
    \ проектной документации на отдельные этапы строительства.\n⭐️ В соответствии\
    \ с гл. 12.1 Ст.48 ГрК РФ подготовка проектной документации по инициативе застройщика\
    \ или технического заказчика может осуществляться применительно к отдельным этапам\
    \ строительства, реконструкции объектов капитального строительства."
