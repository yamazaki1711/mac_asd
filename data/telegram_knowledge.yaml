  text: "Про выгорание\n\nИногда бывают такие моменты, что работать вообще не хочется.\
    \ Раньше я думал, что это просто лень, но недавно узнал, что есть модная штука\
    \ — выгорание. И, конечно, в такую версию верится легче: проще думать о выгорании,\
    \ чем признаться себе, что ты лентяй \U0001F642\n\nРешил углубиться в эту проблематику\
    \ и разобраться, что такое выгорание и как с ним бороться.\n\nЕсли кратко, то\
    \ выгорание — это психологическая штука, связанная с истощением от эмоционального\
    \ напряжения при работе с людьми.\n\nПока всё сходится. Работа с людьми есть?\
    \ Есть. Эмоциональное напряжение случается? Случается. Добро пожаловать, выгорание.\n\
    \nКак пишут в интернете, диагностировать проблему — первый шаг на пути к её решению.\n\
    \nСтал изучать информацию дальше. Говорят, от выгорания помогают три способа:\
    \ медитация, йога и поездка на Мальдивы.\n\nМедитацию сразу отмёл — слишком сложная\
    \ для меня материя. Попробовал йогу. Вместо асаны воина получилась поза пьяного\
    \ фламинго на льду: нога дрожит, руки разведены как у тюленя, а во взгляде читается\
    \ ужас. Отмел и этот способ.\n\nА вот Мальдивы... Вариант кажется рабочим.\n\n\
    Загуглил, сколько стоит путёвка, и понял, что всё-таки у меня не выгорание, а\
    \ лень. Публикую пост и возвращаюсь к работе.\n\nС уважением,  \nАдвокат Евгений\
    \ Шупиков\n\nP.S. А если без шуток, то выгорание это серьезная проблема.ВОЗ включила\
    \ выгорание в Международную классификацию болезней (МКБ-11). Симптомы выгорания\
    \ включают усталость, раздражительность, снижение продуктивности, чувство подавленности,\
    \ трудности с концентрацией внимания, физическое истощение, бессонницу, частые\
    \ болезни, негативное отношение к себе и окружающим, утрату мотивации и целей,\
    \ а также эмоциональное отстранение.\n\nP.P.S. Кстати, а как вы справляетесь с\
    \ симптомами выгорания или ленью? Есть какие-то лайфхаки? Поделитесь!"
