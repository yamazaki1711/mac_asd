  text: "‼ Момент сальдо, или как не пропустить срок взыскания неустойки \U0001F447\
    \n\n⌚ Обращение в суд сначала с требованием о взыскании основного долга, а потом\
    \ неустойки всегда сопряжено с путаницей в исковой давности. С какого момента\
    \ отсчитывать срок исковой давности при досрочном расторжении договора с сальдированием?\
    \ С даты судебного решения или даты расторжения договора?\n\n⛲ Подрядчик обязался\
    \ перед комитетом построить школьный бассейн. Комитет увидел нарушения в работах\
    \ и расторг договор в одностороннем порядке раньше срока, а подрядчику не заплатил.\
    \ Тот обратился в суд.\n\n\U0001F4CC Формулировка иска\n\n✏  О взыскании штрафа\
    \ по контракту и неустойки за просрочку исполнения обязательства по оплате.\n\n\
    \U0001F4CC Позиции судов \n\n\U0001F534 Первая инстанция в иске отказала.\n\U0001F535\
    \ Апелляция и кассация встали на сторону истца.\n⚖ СКЭС ВС РФ отправила дело на\
    \ новое рассмотрение. \n\n\U0001F4C5 При сальдировании объем итоговых обязательств\
    \ определяется на дату прекращения договора, когда встречные предоставления должны\
    \ были быть соотнесены, независимо от даты, когда сальдирование было подтверждено\
    \ в судебном порядке.\n\n✍ Это можно изменить только соглашением сторон.\n\n⏳\
    \ Заявление стороны о выплате неустойки, предъявленное в пределах срока исковой\
    \ давности, но до того, как стороны достигли соглашения о сальдировании по договору\
    \ или решение о ней принято в судебном споре, не изменяет даты, с которой обязательства\
    \ являются сальдированными.\n\n\U0001F4BC Комментарий юристов \"Реаналитики\"\
    :\n\n\U0001F9E9 Стоит обратить внимание еще на один момент. В случае предъявления\
    \ иска о взыскании лишь суммы основного долга срок исковой давности по требованию\
    \ о взыскании неустойки продолжает течение (п. 26 ПП ВС РФ от 29.09.2015 г. №\
    \ 43).\n\n\U0001F50D Определение ВС РФ от 02.12.2025 г. по делу № А56-26274/2024\n\
    https://m.kad.arbitr.ru/Card/8d4e898a-afdb-445a-b8fb-27ff200ca74e\n\n⁉ Как часто\
    \ на практике Вы встречаетесь с сальдированием?\n\n\U0001F44D – Часто.\n\U0001F914\
    \ – Редко.\n\nPS: Выводы являются обобщёнными. Для конкретных рекомендаций и решений\
    \ обратитесь в “Реаналитику”\nreanalitika.ru.\n\n#арбитражныйпроцесс, #сальдирование,\
    \ #подряд, #неустойка\n@arbitrium_processus\nhttps://t.me/arbitrium_processus"
