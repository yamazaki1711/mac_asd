  text: 'Как Москва ужесточает правила для застройщиков и перекраивает градостроительные
    ведомства


    Заммэра Москвы по градостроительной политике Владимир Ефимов дал большое получасовое
    интервью РИА Новости, в котором обозначил ключевые правовые акценты для строительной
    отрасли столицы. Послушали его за вас — теперь пересказываем.


    🏗 Москва отказалась от апартаментов и установила минимальную площадь жилья. Дополнительного
    регулирования Ефимов не планирует — задача в том, чтобы строго соблюдать действующие
    нормы по озеленению, придомовой территории и машино-местам.


    ⚖️ Власти поддержали отмену моратория на штрафы застройщикам за срыв сроков сдачи
    жилья. По словам Ефимова, это «дисциплинирует девелоперов», а реальных финансовых
    проблем у большинства компаний нет.


    📋 Обвинения в искусственном торможении выдачи разрешений на строительство Ефимов
    отверг. Но признал: теперь девелоперов просят показать развитие всей площадки
    целиком, а не отдельного дома. За прошлый год выдали РнС на 17 млн кв. м — из
    них 10 млн на жилье.


    «Мы ни в коем случае не притормаживаем выдачу разрешений на строительство ни в
    отношении жилых объектов, ни тем более нежилых».



    🏙 В Новой Москве власти намерены сместить баланс от жилья к нежилой инфраструктуре
    и сформировать самодостаточную территорию с деловыми, культурными и спортивными
    кластерами.


    Подробнее в новости


