  text: "ГОСТ Р 72359-2025 «Стандарты на процессы выполнения работ в строительстве.\
    \ Общие требования к содержанию, построению, изложению и оформлению»\n\nВышел\
    \ новый ГОСТ Р – стандарт на стандарты. Он устанавливает общие требования к содержанию\
    \ и оформлению процессов выполнения работ в строительстве. \n\nИ в терминах и\
    \ определениях стандарт раскрывает что за процессы – технологические или организационные\
    \ процессы в строительстве, а также последовательность, правила и способы выполнения\
    \ отдельных технических и технологических операций, контроль их выполнения и требования\
    \ к результатам выполненных работ. \n\nНо большинство из этих вещей у нас уже\
    \ стандартизировано в старом и пока не актуализированном МДС 12-29.2006 «Методические\
    \ рекомендации по разработке и оформлению технологической карты», а также в проекте\
    \ свода правил «Проект организации строительства, проект организации работ по\
    \ сносу (демонтажу), проект производства работ. Правила разработки и оформления»,\
    \ про который мы писали тут.\n\nИ как бы все есть, просто бери и делай. Но самое\
    \ интересное – это то, что за всеми этими общими фразами в ГОСТе на стандарты\
    \ проглядываются просто невообразимые перспективы. \n\nПотому что с одной стороны\
    \ мы имеем ситуацию с упавшим средним уровнем участников строительства, а с другой\
    \ стороны – имеем желание как-то помочь им с организационно-технологической документацией\
    \ как с xml-схемами форм документов.\n\nНо на паре десятков стандартов, по которым\
    \ подрядчики делают ППР и техкарты не заработать, а вот на сотне организационных\
