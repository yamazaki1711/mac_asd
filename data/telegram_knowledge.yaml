  text: '⚖️ Кассация: при явной вине заказчика в ничтожности контракта не применяется
    односторонняя реституция


    Заказчик заключил контракт на проведение аварийного ремонта с единственным поставщиком
    в порядке экстренной закупки. Работы оплатили на сумму более 2,7 млн руб. и расторгли
    сделку соглашением.


    Прокуратура не увидела оснований для проведения экстренной закупки (аварии или
    иной чрезвычайной ситуации) и потребовала признать контракт недействительным с
    применением реституции.

    Кассация признала контракт недействительным, но не стала взыскивать оплату:


    ● ничтожность контракта не обязывает подрядчика вернуть полученное по сделке,
    если заказчик при обычной внимательности и осмотрительности мог установить, что
    торги или контракт не соответствуют закону, а подрядчик не делал ничего, чтобы
    скрыть это;

    ● факт исполнения контракта не оспаривался. Стороны получили соразмерные встречные
    предоставления;

    ● инициатором заключения контракта был заказчик. За необоснованное проведение
    неконкурентной закупки его привлекли к ответственности. При явной вине заказчика
    в ничтожности контракта для односторонней реституции нет оснований.


    Документ: Постановление АС Северо-Западного округа от 07.04.2026 по делу N А56-23203/2025


    © КонсультантПлюс'
