  text: '❓ Как правильно определить границы стройплощадки на стройгенплане в разделе
    📋📋📋                                  📌В соответствии с Постановлением Правительства
    РФ от 16 февраля 2008г. № 87 (далее Положение) в разделе 7 п. «д» приводится,
    в том числе, обоснование необходимости использования для строительства, реконструкции
    иных земельных участков вне земельного участка, предназначенного для строительства,
    реконструкции.

    ➡️В соответствии с СП 48.13330.2019 п. 7.7 в строительную площадку кроме земельного
    участка, находящегося во владении застройщика, при необходимости, могут быть включены
    территории других (в том числе соседних) земельных участков. В таких случаях застройщик
    до получения разрешения на строительство должен получить согласие владельцев этих
    территорий на их использование или должны быть установлены необходимые сервитуты.

    Указания по установлению сервитута приведены в ГК РФ Статья 274. Право ограниченного
    пользования чужим земельным участком (сервитут).

    ‼️‼️‼️‼️ Если предусматривается экспертиза проектной документации, согласие владельцев
    территорий на их использование или установление сервитута должны быть представлены
    в составе проектной документации, т.к. затраты на оплату за пользование чужим
    участком (см. п. 5 Ст. 274 ГК РФ) включаются в сводный сметный расчет.'
