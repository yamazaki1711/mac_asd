  text: "Про лимит на переводы в 100 тысяч рублей для тех, кто оказался в черном списке\
    \ ЦБ по 161-ФЗ\n\nС сегодняшнего дня вступают в силу изменения в 161-ФЗ, на основании\
    \ которых банки устанавливают лимит в 100 тысяч рублей. \n\nРазгорелись жаркие\
    \ дискуссии, поэтому даю краткий ликбез, как теперь все это должно работать по\
    \ закону.\n\nИнициатором блокировки по 161-ФЗ могут быть:\n— банк \n— МВД\n— и\
    \ банк и МВД\n\nЕсли в инициаторах блокировки есть МВД, лимит в 100 тысяч рублей\
    \ не устанавливается, просто все блокируется к херам.\n\nЕсли МВД в инициаторах\
    \ нет, то у каждого банка есть выбор: заблокировать клиента или нет.\n\nЕсли банк\
    \ заблокировал клиента, то лимит в 100 тысяч рублей для него неприменим.\n\nТаким\
    \ образом, лимит в 100 тысяч рублей может быть установлен только при совпадении\
    \ сразу трех условий:\n\n✔️ человек есть в черном списке по 161-ФЗ\n✔️ инициатором\
    \ блокировки выступил не МВД \n✔️ банк блокировку не вводил\n\nКазалось бы, все\
    \ очень просто. Но написано, как всегда, с заковыркой.\n\nНадеюсь, теперь понятнее☀️\n\
    \nС уважением, \nАдвокат Евгений Шупиков"
