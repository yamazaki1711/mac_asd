  text: 'Принимать работы по содержанию МКД будут по новым правилам


    Опубликован Проект Приказа Минстроя России «Об утверждении порядка и сроков оформления
    актов приемки оказанных услуг и (или) выполненных работ по содержанию и текущему
    ремонту общего имущества в многоквартирном доме». 


    В чем суть


    Устанавливается порядок подписания актов выполненных работ по содержанию и текущему
    ремонту в МКД. 


    🔵Акт должен составлять исполнитель, УК (или уполномоченный орган при непосредственном
    управлении) в 2-х экземплярах — для себя и председателя совета дома.


    🔵Срок составления акта — 30 дней с момента окончания работ. Если в этот срок акт
    не подпишут, то он будет автоматически считаться подписанным.


    🔵Если проведен текущий ремонт, то акт следует составлять в течение 10 дней после
    окончания конкретной работы.


    🔵В случае отказа от подписи или возражений стороны в течение 10 дней должны провести
    совместный осмотр. А потом исполнитель работ должен составить новый акт с учетом
    замечаний — в течение 5 дней.


    ➡️Изменения вступят в силу с 1 сентября 2026 года.  


    🥲«Законы стройки» в MAX'
