  text: "‼ Теперь уже точно: дилеры в ответе за блокировку ПО \U0001F447\n\n\U0001F310\
    \ Это уже второй кейс, сформировавший пласт судебной практики по спорам о техподдержке\
    \ заблокированного ПО. ВС РФ разрешил возвращать уплаченные за сертификаты техподдержки\
    \ суммы сразу с дистрибьюторов, минуя зарубежных производителей ПО.\n\n\U0001F4F2\
    \ Из-за того, что зарубежный производитель ПО прекратил оказывать техподдержку,\
    \ дистрибьютор не смог оказывать техническое сопровождение. Дилер, который приобрел\
    \ сертификаты техподдержки, обратился с иском к дистрибьютору.\n\n\U0001F4CC Формулировка\
    \ иска\n\n✏ О взыскании задолженности по дилерскому договору \n\n\U0001F4CC Позиции\
    \ судов\n\n\U0001F534 Все три инстанции истцу отказывали.\n⚖ СКЭС ВС РФ отправила\
    \ дело на новое рассмотрение.\n\n\U0001F4DC В договоре содержалось условие, что\
    \ дистрибьютор не несет ответственности за качество, полноту и своевременность\
    \ сервисов и услуг по технической поддержке в соответствии с сертификатами на\
    \ техническую поддержку. \n\n✍ Толкование договора применительно к правоотношениям\
    \ сторон таким образом, что поставщик освобождается от ответственности за прекращение\
    \ техподдержки, позволяет поставщику получать предусмотренную договором оплату\
    \ за оказание техподдержки и в отсутствие правовых оснований фактически такую\
    \ поддержку не оказывать.\n\n\U0001F310 Именно ответчик, непосредственно с которым\
    \ заключен договор поставки, несет последствия, предусмотренные п. 1 ст. 475 ГК\
    \ РФ, за невозможность использования истцом переданных им сертификатов.\n\n❗ В\
    \ случае, когда исполнение было возложено должником на третье лицо, за неисполнение\
    \ или ненадлежащее исполнение обязательства этим третьим лицом перед кредитором\
    \ отвечает должник, если иное не установлено законом.\n\n\U0001F4BC Комментарий\
    \ юристов \"Реаналитики\": \n\n\U0001F9E9 Ранее ВС РФ высказывал аналогичную точку\
    \ зрения. Можно считать, что суды в дальнейшем будут защищать права пользователей\
    \ в спорах с распространителями ПО.\n\n\U0001F50D Определение ВС РФ от 19.12.2025\
    \ г. по делу № А56-4294/2024\nhttps://m.kad.arbitr.ru/Card/a505c40b-f1dc-4d08-87f0-81701b0b3090\n\
    \n⁉ Как Вы думаете, такой подход справедлив?\n\n\U0001F44D – Вполне.\n\U0001F914\
    \ – Не думаю.\n\nPS: Выводы являются обобщёнными. Для конкретных рекомендаций\
    \ и решений обратитесь в “Реаналитику”\nreanalitika.ru.\n\n#арбитражныйпроцесс,\
    \ #дистрибьютор, #дилер, #по, #программноеобеспечение\n@arbitrium_processus\n\
    https://t.me/arbitrium_processus"
