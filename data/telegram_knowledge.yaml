  text: "‼ Прокуроры придумали новый механизм обхода исковой давности \U0001F447\n\
    \n\U0001F381Это уже не ее полное исключение, а переквалификация сделки из оспоримой\
    \ в ничтожную. ВС РФ признал, что любое ущемление прав публичного собственника\
    \ нарушает публичный правопорядок, а, значит, в зоне риска ничтожны все торги\
    \ с нарушением процедур.\n\n\U0001F570 Администрация заключила концессионное соглашение\
    \ с компанией, неправомерно отклонив заявки других участников. Спустя почти 3\
    \ года прокурор решил признать сделку недействительной, т.к. прибыль от использования\
    \ компанией муниципального имущества составляла около 400 000 000 ₽, а плата –\
    \ всего 6 900 000 ₽.\n\n\U0001F4CC Формулировка иска\n\n✏ О признании ничтожным\
    \ концессионного соглашения\n\n\U0001F4CC Позиции судов\n\n\U0001F534 Все три\
    \ инстанции в иске отказали.\n⚖ СКЭС ВС РФ отправила дело на новое рассмотрение.\n\
    \n\U0001F4DA Несоблюдение императивных требований Законов № 135-ФЗ и 115-ФЗ относительно\
    \ правил проведения торгов на право заключения договора аренды либо концессионного\
    \ соглашения в отношении муниципального имущества приводит к ограничению доступа\
    \ к участию в торгах иных претендентов.\n\n\U0001F449 Это нарушает принципы конкурентности\
    \ торгов и права публичного собственника имущества на его максимально эффективное\
    \ использование.\n\n\U0001F3AF Сделка, нарушающая требования правового акта и\
    \ при этом посягающая на публичные интересы либо права и охраняемые законом интересы\
    \ третьих лиц, ничтожна, если из закона не следует, что такая сделка оспорима\
    \ или должны применяться другие последствия нарушения, не связанные с недействительностью\
    \ сделки (п. 2 ст. 168 ГК РФ).\n\n\U0001F4BC Комментарий юристов \"Реаналитики\"\
    : \n\n\U0001F9E9 Можно наблюдать появление нового способа обхода института исковой\
    \ давности в публичных спорах.\n\n\U0001F50D Определение ВС РФ от 26.01.2026 г.\
    \ по делу № А07-38043/2022\nhttps://m.kad.arbitr.ru/Card/a4ebda2b-0458-40d8-a977-e2132ae0b315\n\
    \n⁉ Как Вы думаете, если бы к моменту подачи иска истёк 3-летний срок исковой\
    \ давности, сделку бы все равно признали недействительной?\n\n\U0001F44D – Да.\n\
    \U0001F914 – Нет.\n\nPS: Выводы являются обобщёнными. Для конкретных рекомендаций\
    \ и решений обратитесь в “Реаналитику”\nreanalitika.ru.\n\n#арбитражныйпроцесс,\
    \ #прокурор, #исковаядавность\n@arbitrium_processus\nhttps://t.me/arbitrium_processus"
