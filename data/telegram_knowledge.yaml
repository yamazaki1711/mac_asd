  text: "‼ Банк всегда прав, когда блокирует интернет-банкинг \U0001F447\n\n⚡ Как\
    \ гром среди ясного неба прозвучали выводы ВС РФ, полностью оправдавшего банк,\
    \ ограничивший клиенту доступ к интернет-банкингу, а также освободившего банк\
    \ от возмещения убытков. Все потому, что вместо интернет-банкинга есть офисы для\
    \ обслуживания...\n\n\U0001F4BB Банк ограничил клиенту дистанционное банковское\
    \ обслуживание (ДБО) из-за подозрений в легализации в рамках 115-ФЗ. По этой причине\
    \ клиент не смог рассчитаться с контрагентом и ему пришлось заключать договор\
    \ займа. Клиент решил взыскать с банка убытки.\n\n\U0001F4CC Формулировка иска\n\
    \n✏ О взыскании убытков\n\n\U0001F4CC Позиции судов\n\n\U0001F535 Все три инстанции\
    \ защитили клиента.\n⚖ СКЭС ВС РФ встала на сторону банка.\n\n\U0001F4DC В случае\
    \ выявления сомнительных операций клиентов рекомендуется принимать от таких клиентов\
    \ только надлежащим образом оформленные расчетные документы на бумажном носителе\
    \ (письмо ЦБ РФ от 27.04.2007 г. № 60-Т).\n\n\U0001F4B8 Отказ в ДБО всего лишь\
    \ меняет формат взаимодействия кредитной организации с клиентом и не лишает клиента\
    \ права свободно распоряжаться денежными средствами.\n\n\U0001F3E6 Ответственность\
    \ за фактические сложности, которые могут возникнуть у \nклиента в связи с ограничением\
    \ ДБО, не должна при этом автоматически возлагаться на кредитную организацию.\
    \ \n\n\U0001F4EC Специфика внутренней организационной (предпринимательской) деятельности\
    \ клиента наличие представителей, уполномоченных для подачи в кредитную организацию\
    \ финансово-распорядительных документов от имени клиента, банк не волнуют определяются\
    \ им самостоятельно.\n\n\U0001F352 Но есть и маленький положительный момент\n\n\
    \U0001F4CA В случае, если тариф за обслуживание в офисе выше, чем в онлайн-банке,\
    \ клиент не лишен права оспорить эти тарифы.\n\n\U0001F4BC Комментарий юристов\
    \ \"Реаналитики\": \n\n\U0001F9E9 Можно предположить, что фактически происходит\
    \ нивелирование значения интернет-банкинга. \n\n\U0001F50D Определение ВС РФ от\
    \ 16.02.2026 г. по делу № А32-29429/2024\nhttps://m.kad.arbitr.ru/Card/b64203a8-f45c-4ac4-be00-fce601a78d8b\n\
    \n⁉ Как Вы думаете, справедливо ли отказывать во взыскании с банка убытков из-за\
    \ блокировки?\n\n\U0001F44D – Да.\n\U0001F914 – Конечно нет.\n\nPS: Выводы являются\
    \ обобщёнными. Для конкретных рекомендаций и решений обратитесь в “Реаналитику”\n\
    reanalitika.ru.\n\n#арбитражныйпроцесс, #115фз, #дбо, #убытки, #банк\n@arbitrium_processus\n\
    https://t.me/arbitrium_processus"
