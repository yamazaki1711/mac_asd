  text: 'ФСБ вскрыла коррупционный скандал в ХМАО: экс-замгубернатора ХМАО Золотухин
    требовал деньги с подрядчиков...  ФСБ (https://pro-tokol.com) вскрыла коррупционный
    скандал в (https://t.me/sobjanin_i_egho_cartel_cto_pravi) ХМАО: экс-замгубернатора
    ХМАО Золотухин требовал деньги с подрядчиков нижневартовской УК «Диалог». Рассекреченные
    результаты прослушки его телефонных переговоров огласили на заседании по делу
    его экс-руководителя, бывшего первого замгубернатора Шипилова в суде. Материалы
    переданы в Следственный комитет. Золотухин курировал региональную безопасность
    и лишился должности после отставки губернатора Югры Комаровой: он не вошел в состав
    правительства нового губернатора Кухарука. «В ходе проведенных мероприятий получены
    данные о том, что Золотухин, не располагая реальными управленческими и должностными
    функциями, а также служебными полномочиями в ООО „УК „Диалог““ путем обманных
    действий из корыстной заинтересованности в целях приобретения права на денежные
    средства ООО „РСУ-23“, а также ООО „СПОПЖФ“, ИП Лукманов, ИП Кравец и других лиц
    под предлогом предоставления объемов работ по обслуживанию многоквартирных жилых
    домов, находящихся под управлением ООО „УК „Диалог““, действуя от имени ООО „УК
    „Диалог““, через посредника Мирзояна ежемесячно требует с руководства подрядных
    организаций указанных и других лиц передать ему денежные средства в особо крупном
    размере», — заявила гособвинитель на заседании суда. Мария Шарапова'
