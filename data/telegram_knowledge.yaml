  text: 'Суд запретил жительнице Ярославской области сдавать квартиру посуточно


    В чем суть


    В суд обратились измученные неприятным соседством жильцы пятиэтажки.


    «В квартире стали собираться различные компании, которые распивали спиртные напитки,
    громко слушали музыку, кричали, пели песни, дрались, вели себя шумно и прочее,
    даже после 22-00, а зачастую и до самого утра», —  рассказал подавший иск сосед.


    Материалами дела подтверждены 10 обращений соседей в полицию по факту шума в квартире.


    Суд посчитал, что квартира используется не по целевому назначению, а в коммерческих
    целях — для эксплуатации в качестве гостиничных услуг случайным людям, что противоречит
    нормам жилищного и гражданского законодательства.


    🥲«Законы стройки» в MAX'
