  text: "161-ФЗ: полная инструкция по снятию блокировки\n\nЗакон 161-ФЗ существует\
    \ не первый год — он регулирует банковские платежи в России. Раньше в нём был\
    \ важный пункт, который защищал клиентов: если с карты списывали деньги без согласия\
    \ владельца, банк обязан был вернуть украденное.\n\nОтличная идея, правда? Если\
    \ в безопасности банка дыра, из-за которой пострадал клиент, убытки покрывает\
    \ сам банк. \n\nНо чем чаще люди узнавали об этой возможности, тем активнее кредитные\
    \ организации искали способы избежать ответственности. Вкладываться в безопасность\
    \ им не хотелось, а возвращать клиентские деньги — тем более. Банки давно мечтали\
    \ переложить убытки от мошенников на самих жертв — и в итоге нашли «элегантное»\
    \ решение (если так можно сказать о сомнительных методах).\n\nЧто изменилось в\
    \ июле 2024?  \nВ закон внесли небольшую, но значимую поправку: банки по-прежнему\
    \ обязаны вернуть украденные деньги, но только если реквизиты мошенников уже есть\
    \ в специальной базе ЦБ. При этом сами банки получили право блокировать карты\
    \ клиентов, оказавшихся в «чёрном списке».  \n\nСкладываем два плюс два:  \nТеперь\
    \ банки не возвращают средства клиентам. Как только реквизиты мошенника попадают\
    \ в базу, карту блокируют — повторный перевод на неё невозможен. А раз операция\
    \ технически не повторяется, банк избегает возмещения ущерба.  \n\nСтало ли меньше\
    \ мошенничества?  \nПодождем официальную статистику, но по ощущениям — нет. Мошенники\
    \ быстро адаптировались. Например, популярной стала схема «треугольник»:\n1. Мошенник\
    \ обманывает жертву (например, пенсионерку).  \n2. Жертва переводит деньги на\
    \ карту добросовестного продавца крипты (тот думает, что проводит обычную сделку).\
    \  \n3. Продавец отправляет крипту мошеннику — цепочка замыкается.  \n\nИтог:\
    \  \nБанки теперь вообще не возмещают украденные средства клиентам, мошенники\
    \ продолжают «зарабатывать», а обычные люди остаются с заблокированными картами.\
    \ \n\nПроблема усугубляется тем, что оказаться в блокировке по 161-ФЗ может практически\
    \ любой. Если человек сделал вам перевод, а потом пожаловался на него в банк —\
    \ поздравляю, вы в черном списке ЦБ.\n\nЧто делать? Решение есть — написал большую\
    \ статью, рассказал, как действовать, если вы попали под блокировку по 161-ФЗ,\
    \ разместил на сайте - https://shupikov.com/fz-161/chernii-spisok-po-161-fz\n\n\
    С уважением,\nАдвокат Евгений Шупиков"
