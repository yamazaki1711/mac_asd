  text: '⚖️Заказчик требует 184 млн с СРО из-за проблемного подрядчика


    Краевое управление автодорог «Камчатуправтодор» подало иск к Союзу строителей
    Камчатки о взыскании 184,3 млн рублей. Основание — неисполнение обязательств подрядчиком
    при реконструкции мостов.


    ➡️Суть дела:

    в 2023 году были заключены контракты на реконструкцию мостов, подрядчику выплачен
    аванс свыше 278 млн рублей. Позже суд признал аукционы и сами контракты недействительными,
    поскольку подрядчик представил недостоверные сведения об опыте работ.


    Часть аванса с компании взыскать удалось, но остаток долга составил 184,3 млн
    рублей. При этом в ноябре 2024 года подрядчик начал процедуру банкротства.


    🔴На дату заключения контрактов подрядчик состоял в СРО. Именно поэтому заказчик
    пытается взыскать оставшуюся сумму с саморегулируемой организации (через механизм
    компенсационного фонда).


    Но удастся ли? 🤔


