  text: "Как нам удалось снизить субсидиарку в 600 раз\n\nДавно собирался рассказать\
    \ об этом кейсе — считаю, он заслуживает внимания.\n\nМногие знают, что я долгое\
    \ время работал на стороне Агентства по страхованию вкладов (АСВ). За это время\
    \ успел поучаствовать не только в делах по оспариванию сделок, но и по привлечению\
    \ руководителей банков к субсидиарной ответственности и убыткам.\n\nПозднее опыт\
    \ пригодился уже для работы на стороне ответчиков по таким спорам. В одно из дел\
    \ вступил на стадии установления размера субсидиарной ответственности лиц, которые\
    \ входили в состав руководства банка.\n\n‼️Вина уже была установлена. При этом\
    \ суды привлекли и тех, кто реально организовал хищение денежных средств, и тех,\
    \ кто просто входил в органы управления.\n\nУвы, чаще всего подход именно такой:\
    \ одобрил выдачу кредита, который использовался в интересах высшего руководства\
    \ — значит виноват. Под удар попадают и те, кто никакого отношения к выводу активов\
    \ банка не имел и никак не обогащался за этот счёт.\n\n\U0001F4C2Что было в деле\n\
    \nЯ представлял одного из таких лиц. Задача — снизить максимально размер субсидиарной\
    \ ответственности.\n\nПогрузившись в дело, обнаружил странную деталь: АСВ не приобщило\
    \ ни одного кредитного досье «фирм-однодневок». Обычно это делается — не передать,\
    \ сколько времени в период представления интересов АСВ уходило на копирование\
    \ этих досье.\n\nЭто привело к тому, что я провёл глубокий анализ взаимосвязей\
    \ всех этих фирм, их связанность с кредиторами банка. По обрывкам банковских выписок\
    \ даже попытался установить, куда уходили деньги.\n\nКазалось бы — это надо делать\
    \ на стадии рассмотрения самой субсидиарной ответственности, но и на стадии размера\
    \ надо защищаться чем только можно.\n\nВыстроил позицию о том, что ряд необходимых\
    \ действий со стороны управляющего выполнены не были. Да и в целом подчеркнул\
    \ весьма необычные моменты дела.\n\nКроме того, совместно с другими ответчиками\
    \ была занята позиция: надо оценивать степень участия каждого из привлекаемых\
    \ лиц. В этом деле каждый из представителей ответчиков внёс в копилку аргументов\
    \ что-то своё.\n\n\U0001F4CCРезультат\n\nВ первой инстанции установили размер\
    \ субсидиарной ответственности, исчисляемой миллиардами. Подали апелляционные\
    \ жалобы и… выиграли. \n\n❗️Размер ответственности снизили более чем в 600 раз!!\n\
    \nБуквально недавно я рассказывал о том, что может быть ошибочной тактика защищаться\
    \ от субсидиарной ответственности, пытаясь свалить всё на других. В этом деле\
    \ никто друг на друга вину не перекладывал, наоборот — каждый из ответчиков привнёс\
    \ свои аргументы, которые позволили донести до судей: «что-то в этом деле было\
    \ сделано не так».\n\n\U0001F4ACВыводы\n\nНе сдаваться, даже когда вина в субсидиарной\
    \ ответственности уже установлена. Копать и искать новые аргументы. Не вступать\
    \ в противостояние с другими ответчиками — совместная защита может быть эффективнее.\n\
    \n\U0001F4FDРанее по теме\n▫️Споры с АСВ. Субсидиарная ответственность банкиров:\
    \ часть 1\n▫️Споры с АСВ. Субсидиарная ответственность банкиров: часть 2\n\n\U0001F3F7\
    Прочёл в законе"
