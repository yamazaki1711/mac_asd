  text: '🔎 НОК, НРС и аттестация специалистов ПОС — уточнение к статье


    Дополнение к статье

    НОК — это независимая оценка квалификации.

    НОПРИЗ — это организация (национальное объединение изыскателей и проектировщиков),
    которая ведёт НРС — Национальный реестр специалистов для проектировщиков.

    Организация при этом состоит в СРО, а для членства в СРО у неё в штате должны
    быть специалисты, включённые в НРС.

    А специалисты, включённые в НРС, как раз проходят НОК (подтверждают квалификацию).

    Если упростить, получается такая связка:

    СРО → специалисты в НРС → подтверждение квалификации.


    🔎 Нужна ли аттестация специалисту ПОС

    Тема аттестации специалистов ПОС остаётся довольно спорной.

    В целом требования законодательства сформулированы так, что для членства в СРО
    организация должна иметь специалистов, включённых в НРС и подтвердивших квалификацию.

    Но важно понимать ключевой момент:

    прямого требования, что именно разработчик ПОС обязан быть аттестован, законодательством
    не установлено

    Требования относятся:

    • к организации в целом;

    • к специалистам, которые организуют выполнение работ (например, ГИП).

    Разработчик отдельного раздела, в том числе ПОС, выступает как исполнитель, а
    не как организатор.


    🔎 Практика

    Иногда из соображений перестраховки:

    • руководство аттестует всех специалистов подряд;

    • либо изначально выставляет такие требования к кандидатам.

    С формальной точки зрения это не запрещено, но и не является обязательным требованием
    законодательства


    При этом такой подход может быть оправдан в крупных организациях:

    • с большими проектными отделами;

    • при работе с технически сложными объектами;

    • при наличии отдельного отдела организации строительства.

    В таких случаях, например, для руководителя отдела или специалиста, выполняющего
    функции организации работ, аттестация может быть обоснованной


    📝 Вывод

    В большинстве случаев требование аттестации для всех разработчиков ПОС не является
    обязательным требованием законодательства и определяется внутренней политикой
    организации, условиями договора или требованиями заказчика.


    Если есть, чем дополнить из практики - пишите в комментариях, разберём вместе.'
