  text: '‌ПРОГОСЗАКАЗ.РФ (VK)


    ⚖️ Суд допустил замену товара из РРПП в ходе исполнения контракта


    Общество обратилось в суд с требованием признать недействительными торги и заключенный
    по результатам торгов государственный контракт на поставку 11 легковых автомобилей
    LADA VESTA, а также дополнительное соглашение к нему. По мнению заявителя, торги
    были проведены с нарушением требований Закона № 44-ФЗ, которые повлекли ограничение
    конкуренции, создающее возможность участия только одного поставщика. С этим иском
    общество обратилось в арбитражный суд.


    🔻Правовая оценка суда:


    При осуществлении закупки заказчиком был установлен запрет, предусмотренный п.
    1 Постановления № 1875, так как закупаемый товар соответствовал позиции 92 приложения
    № 1 к Постановлению № 1875. Победитель торгов подтвердил страну происхождения
    товара, и в каталоге продукции ГИСП содержится информация о транспортном средстве
    LADA VESTA, тип GF, модификация AGF-LAA-ACBAAA с типом коробки передач «Гидромеханическая»,
    что соответствует характеристике «тип коробки передач – автомат» по КТРУ 29.10.20.000-00000012.


    Поставщик в рамках исполнения контракта направил заказчику письмо с предложением
    заключить дополнительное соглашение к государственному контракту на поставку товара
    с улучшенными характеристиками, а именно автомобиля LADA VESTA с автоматической
    трансмиссией «вариатор». Улучшенные характеристики поставщик обосновал письмом
    производителя – АО «АВТОВАЗ», в соответствии с которым вариатор имеет следующие
    преимущества:


    - высокая динамика;

    - плавность хода;

    - низкий расход топлива.


    Законом № 44-ФЗ не регламентированы конкретные параметры качества, технических
    и функциональных характеристик (потребительских свойств), являющихся улучшенными
    по сравнению с качеством и соответствующими техническими и функциональными характеристиками,
    указанными в контракте. При этом товары, работы, услуги, обладающие улучшенными
    параметрами, качествами, техническими и функциональными характеристиками (потребительскими
    свойствами), должны быть не хуже установленных в документации о закупке, контракте
    характеристик.


    Закон № 44-ФЗ допускает возможность без изменения цены, установленной в контракте,
    при условии согласия заказчика изменить условия контракта в части поставки товара,
    выполнения работы или оказания услуги, качество, а также технические и функциональные
    характеристики которых улучшены по сравнению с указанными в контракте. Указанная
    позиция отражена в письме Министерства финансов Российской Федерации от 17.02.2020
    № 24-03-08/10935.


    Нарушений в ходе проведения торгов, в ходе исполнения контракта, а также при заключении
    дополнительного соглашения судом выявлено не было.


    📄 Решение АС Оренбургской области от 07.04.2026 по делу № А47-17690/2025'
