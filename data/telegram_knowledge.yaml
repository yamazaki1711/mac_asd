  text: "Самозанятый потерял 2,4 млн из-за банкротства «работодателя»\n\nОформлять\
    \ ли отчётные документы самозанятым?\n\nКак известно, самозанятому не обязательно\
    \ даже оформлять договор в письменном виде. То же самое касается и актов сдачи\
    \ оказанных услуг.\n\nЗачастую многие просто выдают чек, который формируется через\
    \ приложение «Мой налог» для подтверждения факта оплаты и его налогового учёта.\n\
    \nВ целом удобно, когда идёт речь о небольших суммах и заказчику не нужен договор\
    \ или акт.\n\n‼️Однако, как всегда, всё может поменяться в случае банкротства.\n\
    \nСделки с самозанятыми тоже оспаривают.\n\nИ может быть недостаточно приложить\
    \ только чеки из приложения «Мой налог», чтобы доказать факт выполнения услуг\
    \ или работ. Что и говорить, может быть так, что недостаточно будет и приложить\
    \ акты оказанных услуг.\n\n\U0001F4C2Сотрудник или самозанятый? Суд решил по-своему\
    \ (дело № А56-53753/2023)\n\nТам оспаривалась сделка по оказанию консультационных\
    \ услуг с самозанятым ответчиком. Ответчик утверждал, что в реальности имели место\
    \ трудовые отношения, а все этапы работ обсуждались в переписке.\n\nАкты были\
    \ приложены, но суд их оценил следующим образом:\nТаким образом, акты носят формально-декларативный\
    \ характер, и из них не представляется возможным установить, какие именно услуги\
    \ оказывал ответчик и оказывал ли эти услуги в действительности.\n\n‼️Важная деталь\
    \ из дела: Суд отметил, что ответчик сам говорил о задержках платежей из-за нестабильного\
    \ финансового положения должника — это доказало его осведомлённость о неплатежеспособности\n\
    \nСуд пришёл к выводу, что сделки мнимые, и взыскал 2 394 000 рублей!\n\n\U0001F517\
    Постановление Тринадцатого арбитражного апелляционного суда от 18 декабря 2025\
    \ г. № 13АП-26375/25 по делу № А56-53753/2023\n\nUPD: В комментариях обратили\
    \ внимание на странную деталь: платежи в пользу самозанятого были совершены в\
    \ короткий срок и строго под верхнюю планку лимита. \n\n\U0001F4ACВыводы и рекомендации\n\
    \n1️⃣Во-первых, не состоять в трудовых отношениях в качестве самозанятого. Доказывать\
    \ потом правомерность выплат сложнее, чем доказывать их правомерность, если выплаты\
    \ оспариваются как сотруднику. \n\nСложность в том, что сначала необходимо ещё\
    \ доказать факт трудовых отношений. Если бы доказал факт трудовых отношений, то\
    \ сумел бы отбить аргумент о неплатежеспособности. \n\n2️⃣Во-вторых, оформлять\
    \ надлежащим образом отношения с заказчиком. По крайней мере, если речь о крупных\
    \ суммах. Во избежание риска дальнейшего оспаривания самозанятому лучше всего\
    \ «закрывать актами» с подробным описанием выполненных услуг/работ.\n\n\U0001F4FD\
    Ранее по теме: \n▫️Оспаривание выплат сотрудникам банкрота: на что обращают внимание\
    \ суды\n\n\U0001F3F7Прочёл в законе"
