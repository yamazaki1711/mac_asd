  text: '❓ Какими нормативными документами можно пользоваться при определении продолжительности
    строительства в разделе 📋📋📋


    Основными документами для определения продолжительности строительства являются:

    ➡️ СНиП 1.04.03-85* часть 1 и 2 «Нормы продолжительности строительства и задела
    в строительстве предприятий, зданий и сооружений»;

    СНиП 1.04.03-85* часть 1 содержит нормативные показатели для объектов промышленного
    строительства, для остальных объектов показатели приведены в часть 2.

    Также можно применять региональные и методические документы:

    ➡️ МДС 12-43.2008 «Нормирование продолжительности строительства зданий и сооружений»;

    ➡️ «Региональные нормы продолжительности строительства зданий и сооружений в городе
    Москве»;

    ➡️ МР-3.2.81-12 «Рекомендации по определению норм продолжительности строительства
    зданий и сооружений, строительство которых осуществляется с привлечением средств
    бюджета города Москвы».


    📌 См. также чек-лист по ПОС от ГГЭ https://t.me/posovik_chat/11/3058.'
