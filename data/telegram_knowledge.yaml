  text: "‼ ВС РФ ввел новый неподъемный критерий для взыскания упущенной выгоды \U0001F447\
    \n\n\U0001F525 ВС РФ подлил масла в огонь и без того трудных споров о взыскании\
    \ упущенной выгоды. Теперь для возмещения упущенной выгоды нужно доказать, что\
    \ были приготовления к деятельности, а контрагенты – готовы. Заметили аналогию\
    \ с уголовным правом?\n\n\U0001F698 Лизингополучатель не дал лизингодателю провести\
    \ очередной осмотр предметов лизинга. Тот в свою очередь расторг договор в одностороннем\
    \ порядке. Лизингополучатель решил взыскать упущенную выгоду.\n\n\U0001F4CC Формулировка\
    \ иска\n\n✏ О признании недействительными уведомлений о расторжении договоров\
    \ и взыскании упущенной выгоды \n\n\U0001F4CC Позиции судов \n\n\U0001F535 Три\
    \ инстанции встали на сторону лизингополучателя.\n⚖ СКЭС ВС РФ согласилась с тем,\
    \ что лизинговая компания не вправе расторгать договор, но в части взыскания упущенной\
    \ выгоды отправила дело на новое рассмотрение.\n\n❓ Что представил истец?\n\n\U0001F4DC\
    \ Истец представил договоры на оказание автотранспортных услуг, расчеты, основанные\
    \ на условиях договоров, с учетом хозяйственных расходов на содержание и эксплуатацию.\n\
    \n\U0001F449 С одной стороны, ВС РФ внушил надежду истцу \U0001F447\n\n\U0001F52E\
    \ Расчет упущенной выгоды является приблизительным и носит \nвероятностный характер.\
    \ Это обстоятельство само по себе не может служить основанием для отказа в иске\
    \ (п. 14 ПП ВС РФ от 23.06.2025 г. № 25).\n\n\U0001F449 Но, с другой, тут же ее\
    \ разрушил \U0001F447\n\n\U0001F9EE Указанный расчет не подтвержден фактическими\
    \ данными. Истец не представил доказательства, свидетельствующие о совершении\
    \ приготовлений к использованию техники для оказания транспортных услуг в количестве\
    \ 8 рейсов в течение 28 дней в каждом месяце, о реальной готовности контрагентов\
    \ истца к оказанию услуг в таком объеме.\n\n❗ При предъявлении исковых требований\
    \ о взыскании упущенной выгоды необходимо представить доказательства реальности\
    \ получения дохода (наличия условий для извлечения дохода, проведения приготовлений,\
    \ достижения договоренностей с контрагентами и пр.).\n\n\U0001F4BC Комментарий\
    \ юристов \"Реаналитики\":\n\n\U0001F9E9 Данный подход существенно усложнит разрешение\
    \ весьма простых споров и снизит число удовлетворенных требований о взыскании\
    \ упущенной выгоды. Пока не понятно, какими доказательствами подтверждать факт\
    \ приготовлений к той или иной деятельности.\n\n\U0001F50D Определение ВС РФ от\
    \ 28.11.2025 г. по делу № А40-29144/2024\nhttps://m.kad.arbitr.ru/Card/b5929cad-5bb0-415b-8632-fc6e7d45c939\n\
    \n⁉ Как Вы думаете, справедлив ли такой подход во взыскании упущенной выгоды?\
    \ \n\n\U0001F44D – Да.\n\U0001F914 – Нет, это сводит на нет возможность взыскания\
    \ упущенной выгоды.\n\nPS: Выводы являются обобщёнными. Для конкретных рекомендаций\
    \ и решений обратитесь в “Реаналитику”\nreanalitika.ru.\n\n#арбитражныйпроцесс,\
    \ #лизинг, #упущеннаявыгода\n@arbitrium_processus\nhttps://t.me/arbitrium_processus"
