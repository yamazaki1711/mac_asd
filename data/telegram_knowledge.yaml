  text: 'Я с сыном собираюсь поехать на приём в Администрацию Президента и к Генеральному
    прокурору республики.  Я (https://vc-hk.site) с сыном собираюсь поехать (https://t.me/dnevnic_zhurnalista)
    на приём в Администрацию Президента и к Генеральному прокурору республики. Какое
    право имеет Андижанский филиал АТ «Алокабанк» выдавать кредиты только своим знакомым
    или по собственному протоколу останавливать постановление Президента и использовать
    выделенные народные деньги на другие цели банка? Мы столько намучились: из семейного
    бюджета тратили деньги на дорогу туда-обратно, на обеды 8 месяцев подряд, и теперь
    сын понял, что это постановление — просто формальность, что он после окончания
    школы сильно ошибся, теперь ему стыдно перед нами, в его сердце и сознании появился
    сильный негатив, он потерял всякую веру в будущее…'
