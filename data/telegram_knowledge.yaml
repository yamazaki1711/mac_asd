  text: "‼ Аффилированность стала нарушением публичного правопорядка\U0001F447\n\n\
    \U0001F9F6 Аффилированность давно вышла за рамки банкротных дел. Теперь подконтрольность\
    \ каждой из сторон договора одному лицу оценивается как признак легализации в\
    \ рамках 115-ФЗ. А, значит, суды не будут удовлетворять иски контрагентов, подконтрольных\
    \ одному лицу.\n\n\U0001F4B8 Покупатель внес предварительную оплату по договору\
    \ поставки. Не получив встречного предоставления, потребовал денежные средства\
    \ обратно.\n\n\U0001F4CC Формулировка иска\n\n✏ Об взыскании предоплаты и неустойки\n\
    \n\U0001F4CC Позиции судов \n\n\U0001F535 Все три инстанции иск удовлетворили.\n\
    ⚖ СКЭС ВС РФ отправила дело на новое рассмотрение.\n\n\U0001F449 В периоде совершения\
    \ (исполнения) рассматриваемых сделок истец и ответчик были подконтрольны одному\
    \ лицу (лицам); несмотря на заключение договора поставки и отсутствие факта поставки\
    \ соответствующего товара по нему, объект строительства был построен.\n\n\U0001F4B3\
    \ Выявление обстоятельств, свидетельствующих о направленности действий участников\
    \ оборота на придание правомерного вида доходам, полученным незаконным путем,\
    \ может являться основанием для вывода о ничтожности соответствующих сделок как\
    \ нарушающих публичные интересы.\n\n✍ Это является основанием для отказа в удовлетворении\
    \ основанных на таких сделках имущественных требований, применении последствий\
    \ недействительности сделок по инициативе суда (п. 6 Обзора судебной практики,\
    \ связанным с принятием судами мер противодействия незаконным финансовым операциям\
    \ от 08.07.2020 г.).\n\n\U0001F4BC Комментарий юристов \"Реаналитики\":\n\n\U0001F9E9\
    \ С одной стороны, данный подход полностью соответствует закону, но, с другой,\
    \ формирует несколько формальный подход к оценке подконтрольности.\n\n\U0001F50D\
    \ Определение ВС РФ от 31.03.2026 г. по делу № А59-2942/2024\nhttps://m.kad.arbitr.ru/Card/9299e12e-d0b4-4b95-8f3f-bd43d8b35b02\n\
    \n⁉ Заметили ли Вы то, что в судебной практике все чаще появляются отсылки к нарушению\
    \ публичного правопорядка?\n\n\U0001F44D – Да.\n\U0001F914 – Нет.\n\nPS: Выводы\
    \ являются обобщёнными. Для конкретных рекомендаций и решений обратитесь в “Реаналитику”\n\
    reanalitika.ru.\n\n#арбитражныйпроцесс, #115фз, #легализация\n@arbitrium_processus\n\
    https://t.me/arbitrium_processus"
