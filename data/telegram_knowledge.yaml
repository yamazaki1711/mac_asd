  text: '2 трлн рублей инвестиций за прошлый год. Индустрия гостеприимства - новая
    точка роста инвестиционного строительства


    В программе Саммита впервые появится тема, которую невозможно игнорировать в новой
    экономике территорий, - туристическая и гостиничная инфраструктура.


    Как отметил Председатель Правительства России Михаил Мишустин,

    Индустрия гостеприимства очень важна для страны, потому что именно вложения в
    туризм имеют самый большой мультипликатор на смежные отрасли. Соответственно,
    развивают наши регионы.


    Цифры подтверждают этот тренд. Только за прошлый год объем инвестиций в отрасль
    составил около 2 трлн рублей, а до 2030 года из федерального бюджета планируется
    направить еще 400 млрд рублей. Цель - увеличить вклад туризма в экономику страны
    до 5% ВВП.


    Но за этими цифрами стоит простая реальность: каждый туристический проект - это
    сложный инвестиционно-строительный проект.


    Курорты, гостиницы, апарт-отели, горные и рекреационные кластеры требуют продуманной
    архитектуры - от земельных режимов и градостроительных решений до моделей взаимодействия
    с инвесторами, механизмов ГЧП и распределения рисков между государством, девелопером
    и оператором.


    Именно об этом форсайт-сессия форума:


    «Инвестиции в туристическую и гостиничную инфраструктуру: правовые модели и риски
    реализации».


    Соорганизаторами сессии выступают Корпорация ТУРИЗМ.РФ и finoarte design bureau


    🔜 Подробнее:

    https://summit.constructionconf.ru/'
