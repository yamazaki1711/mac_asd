  text: "Разъяснение Минстроя России о ведении 3 раздела ОЖР субчиком \n\nВ прошлом\
    \ году Минстрой дал разъяснение (Письмо Минстроя России от 27.10.2025 N 29875-ОГ/08)\
    \ в котором указал, что субчик не вправе заполнять 3 раздел ОЖР. \n\nОно как бы\
    \ и правильно, но запись, выполненная мастером или прорабом субчика много достовернее\
    \ чем ее сделает тот же ПТОшник генподрядчика. \n\nДругое дело, если вся исполнительная\
    \ документация, а не только ОЖР давно потеряла свою достоверность с ее ведением\
    \ ПТОшниками, то любые достоверные записи сделанные кем-либо по глупости, недосмотру\
    \ или злому умыслу приведут к формальному наложению работ друг на друга, там,\
    \ где они должны были выполняться последовательно. А это - не есть хорошо.\n\n\
    С этим на многих объектах генподрядчики или субчики пытаются протолкнуть идею\
    \ о необходимости ведения субчиками отдельных общих журналов чуть ли не на каждый\
    \ вид работ, что еще хуже.\n\nА так, конечно, пока форма ОЖР будет представлять\
    \ из себя амбарную книгу, пусть даже цифровую, с хотелками сделать из нее КС-6а,\
    \ мы будем иметь все те же оформительские проблемы.\n\n#формы"
  text_preview: "Разъяснение Минстроя России о ведении 3 раздела ОЖР субчиком \n\n\
    В прошлом году Минстрой дал разъяснение (Письмо Минстроя России от 27.10.2025\
    \ N 29875-ОГ/08) в котором указал, что субчик не вправе запол"
