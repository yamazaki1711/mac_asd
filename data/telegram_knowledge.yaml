  text: "‼ Настал конец эпохи \"бумажных\" цессий \U0001F447\n\n\U0001F4B0 ВС РФ упростил\
    \ взыскание убытков, причиненных фантомными цессиями. Если цедент успел лишиться\
    \ права требования по тем или иным причинам и скрыл это от цессионария, он должен\
    \ возместить убытки.\n\n\U0001F4DC Из-за нарушения условий контракта поставщик\
    \ потерял право требовать оплаты по нему. Тем не менее это не помешало ему совершить\
    \ цессию в пользу ИП. Узнав о том, что право уже не существовало на момент его\
    \ уступки, ИП обратился с иском к поставщику (цеденту).\n\n\U0001F4CC Формулировка\
    \ иска\n\n✏ О взыскании убытков\n\n\U0001F4CC Позиции судов\n\n\U0001F534 Все\
    \ три инстанции истцу отказывали.\n⚖ СКЭС ВС РФ отправила дело на новое рассмотрение.\n\
    \n\U0001F3AF Совершая распорядительную сделку, цедент несет перед цессионарием\
    \ ответственность за то, что этот распорядительный эффект не срабатывает в силу\
    \ отсутствия уступаемого права.\n\n\U0001F3B2 Об отсутствии у цедента права требовать\
    \ оплаты за поставку цессионарий узнал лишь после завершения рассмотрения дела.\n\
    \n\U0001F4DAВ данном случае основанием возникновения права является поставка,\
    \ поэтому к ней применимы нормы о купле-продаже.\n\n♟Это значит, что продавец,\
    \ умышленно скрывший от покупателя названные обстоятельства, не может в обоснование\
    \ освобождения себя от ответственности ссылаться на то, что покупатель являлся\
    \ неосмотрительным и сам их не выявил (п. 4 ст. 1 ГК РФ).\n\n❓ Есть ли лазейка\
    \ из этого правила?\n\n✍️ Да, и она содержится в соглашении.\nДоговор может предусматривать,\
    \ что цедент не несет ответственность, если добросовестно раскрыл цессионарию\
    \ все известные ему обстоятельства, в силу которых право может оказаться недействительным,\
    \ или не знал о недействительности вовсе.\n\n\U0001F4BC Комментарий юристов \"\
    Реаналитики\": \n\n\U0001F9E9 В данном случае в договоре цессии этого условия\
    \ не было, поэтому у цедента почти не осталось шансов. Данный кейс должен оказать\
    \ существенное влияние на судебную практику.\n\n\U0001F50D Определение ВС РФ от\
    \ 26.12.2025 г. по делу № А40-143338/2024\nhttps://m.kad.arbitr.ru/card/3ec170a0-ada1-48d8-9b0e-7dca8b843cac\n\
    \n⁉ Как Вы думаете, станет ли легче взыскивать убытки с нечестных цедентов?\n\n\
    \U0001F44D – Думаю да.\n\U0001F914 – Вряд ли.\n\nPS: Выводы являются обобщёнными.\
    \ Для конкретных рекомендаций и решений обратитесь в “Реаналитику”\nreanalitika.ru.\n\
    \n#арбитражныйпроцесс, #цессия, #уступкатребования, #поставка\n@arbitrium_processus\n\
    https://t.me/arbitrium_processus"
