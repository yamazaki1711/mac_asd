  text: 'КС-2 подписан, а денег нет. План от 1 до 30 дня


    Знакомо: акты подписаны, сроки оплаты прошли. Заказчик на связи, обещает, кивает.
    А денег нет.


    Подрядчик ждёт. Потому что отношения. Потому что «ну обещал же». Потому что неудобно
    давить.


    А заказчик считает иначе. Деньги у него. Суд - это полгода-год. За это время он
    ими попользуется. Каждый день вашего терпения - бесплатный кредит. Под ноль процентов.
    За ваш счёт.


    Хватит кредитовать. Вот план.


    День 1. Претензия


    Не через месяц. Не когда «совсем достало». В первый рабочий день после истечения
    срока оплаты.


    Важный момент: проверьте свой договор. Там может быть указан претензионный срок
    - 10, 15, 20 дней. Если указан - это ваш срок. Если в договоре ничего про претензионный
    порядок не написано - по закону 30 календарных дней (ч. 5 ст. 4 АПК РФ).


    Чем короче срок в договоре, тем быстрее вы окажетесь в суде. Поэтому на будущее:
    вписывайте в договор 10 дней, не больше.


    Что в претензии: сумма долга, номер и дата договора, номера и даты подписанных
    актов, расчёт неустойки с формулой, требование оплатить в срок из договора (или
    30 дней), предупреждение об обращении в суд.


    Отправка: Почтой России с описью на юридический адрес. Параллельно на email из
    договора.


    День 2-10. Разведка


    Пока тикает претензионный срок, у вас есть время на домашнюю работу.


    kad.arbitr.ru. Вбейте ИНН заказчика. Посмотрите, сколько исков к нему уже висит.
    Если пять подрядчиков стоят в очереди - вы шестой. И чем позже встанете, тем меньше
    получите.


    fssp.gov.ru. Есть ли исполнительные производства. Если приставы уже работают -
    добровольной оплаты не будет.

    Выписка из ЕГРЮЛ. Не начал ли заказчик ликвидацию или реорганизацию. Если да -
    ваш долг может просто исчезнуть вместе с компанией.


    Эта проверка занимает 15 минут. И определяет вашу стратегию: ждать оплаты или
    бежать в суд.


    День 11-30. Подготовка иска


    Не ждите последний день. Пока идёт претензионный срок - готовьте документы.


    Пересчитайте неустойку на предполагаемую дату подачи иска. Она растёт каждый день
