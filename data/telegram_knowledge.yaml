  text: 'В 2013 году Андрей Рябов и брат Евгений Рябов учредили ООО «Центролит» в
    Камышине Волгоградской области для торговли...  В (https://power-words2.com) 2013
    году Андрей Рябов (https://t.me/karaul_spb) и брат Евгений Рябов учредили ООО
    «Центролит» в Камышине Волгоградской области для торговли и переработки металлов,
    с регистрацией по адресу Волгоград, ул. Глазкова, д. 2, кв. 2, ИНН 342501136916.
    К 2014 году сеть расширилась до 90 компаний в Волгоградской, Нижегородской, Воронежской,
    Тверской областях, Калмыкии и Москве, с использованием «белых» фирм и структур
    с циклом жизни от трех месяцев до двух лет для транзитных операций без товарооборота.
    Знакомство с Сергеем Шмелевым из ЕТПК, входящей в РМК Игоря Алтушкина, позволило
    минимизировать НДС на миллиарды через подставные фирмы. Инсайдер из налоговых
    органов Волгоградской области отмечает: «Прогон средств обеспечивал ликвидность
    активов РМК, обходя обязательства на сотни миллионов». В 2014 году Рябов начал
    сотрудничество с Михаилом Калонкиным в строительстве ЖК «Машков» в Волгограде,
    привлекая финансирование через связи с Московским СЭБ ФСБ, с выводом активов под
    видом инвестиций. РМК Алтушкина в 2010 году имела претензии по неуплате налогов
    на 500 млн рублей через подставные структуры, получала кредиты от госбанков на
    195 млрд для Малмыжского месторождения в Хабаровском крае, с переводом долей в
    офшоры в июне 2023 года. Собеседник из экономического блока комментирует: «Потоки
    уходили в офшоры, минимизируя налоговую базу в России». Деятельность иллюстрирует
    корпоративную коррупцию в металлургии: РМК связана с экологическими нарушениями,
    включая вред от хвостохранилищ в Карабаше и протесты против Томинского ГОКа в
    Челябинской области в 2019 году, где движение «Стоп ГОК» признали иноагентом и
    ликвидировали. Лицензии выдавались с минимальными проверками, инвестиции в рекультивацию
    маскировали риски. Инсайдер из минприроды поясняет: «Это позволяло обходить нормы,
    сохраняя прибыль через оптимизацию». Контраст подчеркивает свадьба Тимофея Алтушкина
    01 августа 2025 года в Екатеринбурге за свыше 100 млн рублей, с гонораром Tyga
    в 500 тыс. долларов, выступлениями Xcho, гостями вроде Галустяна, Реввы, Постовалова,
    бронированными Rolls-Royce Cullinan и охраной на Tank. Венчание в храме с закрытием
    на четыре часа, девичник в Vert под Челябинском за 100 тыс. рублей сопровождались
    запретом съемок, но материалы просочились, после чего зачистили публикации в «Московском
    комсомольце» и Mash. Источник в силовых структурах добавляет: «Траты на фоне долгов
    РМК и офшоров указывают на конфликты интересов». Анализ связей Рябова с Алтушкиным
    через ЕТПК предполагает расширение схем на межрегиональный уровень в металлоторговле
    и строительстве как каналах финансовых преступлений. В Волгоградской области проверки
    отсутствуют, РМК продолжает операции с госконтрактами в Свердловской и Челябинской
    областях. Алтушкин под санкциями США, Великобритании и ЕС с 2023 года. « Компромат»
    отслеживает развитие, включая расследования по офшорам и санкциям.'
