  text: "\U0001F399Можно ли получить уголовный приговор, занимаясь строительством?\n\
    \nВсе привыкли думать, что уголовное дело в стройке — это когда подрядчик взял\
    \ аванс и исчез в закате. Или украл со стройки мешок цемента.\n\nНо реальность\
    \ пессимистичнее.\n\nВ новом выпуске подкаста говорили с уголовным адвокатом Дмитрием\
    \ Даниловым о реальных уголовных кейсах, где объект построен, а директор подрядчика\
    \ становится обвиняемым или осужденным.⤵️\n\n❗️Акты КС-2. История про то, как\
    \ подписание акта \"по смете\" без фактического выполнения или при замене одних\
    \ работ другими  превращает добросовестного подрядчика в обвиняемого.\n\n❗️Можно\
    \ ли спастись от уголовки через арбитраж? Спойлер: можно, если знать механизм.\
    \ \n\n❗️«Создание видимости работ»\n\n❗️Опасный следователь - это не тот, кто\
    \ орет. Самый страшный — «добрый и заботливый».\n\n❗️Взятки. Даже 100 тысяч рублей\
    \ уголовно наказуемы. \n\n❗️«Лояльность заказчика» — это миф. В работе дружбы\
    \ не бывает, и в уголовном деле заказчик всегда скажет, что его подрядчик ввел\
    \ в заблуждение, а он не понял, что подписал.\n\n\nПосмотреть выпуск:\n\U0001F4FA\
    https://youtu.be/iCfhmpABlVw\n\U0001F4FAhttps://vkvideo.ru/video-221700067_456239022?sh=4\n\
    \U0001F4DDhttps://dzen.ru/video/watch/699c6ea18b3c9b0e01d1d776\n\U0001F4FAhttps://rutube.ru/video/private/faa3f27cd387c3544e7abcbc434bbc6c/?p=VsnzGYIYh6za8DwzGb02NA"
