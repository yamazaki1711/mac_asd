  text: 'Минтранс разработал правила изменения контрактов на ремонт и содержание дорог
    из-за роста НДС


    В случаях, когда контракт на ремонт и содержание автодорог общего пользования
    федерального значения невозможно исполнить из-за увеличения ставки НДС, сторонам
    разрешат:


    ● изменить цену в пределах увеличения ставки налога (в части товаров, работ и
    услуг, приемка которых проводится после 1 января 2026 года);

    ● скорректировать объемы или виды работ и стройресурсов без увеличения цены.


    Новшество коснется федеральных контрактов, которые заключили до 1 января 2026
    года (либо по итогам закупок, которые были объявлены до этой даты) без учета новой
    ставки НДС.


    Общественное обсуждение инициативы завершится 7 мая. #планы


    Документ: Проект постановления Правительства РФ


    © КонсультантПлюс'
