  text: '❓ Как правильно разместить бытовые помещения на стройгенплане в разделе 📋📋📋


    ✍ Размещение бытовых помещения необходимо предусматривать за пределами опасных
    зон (см. п. 7.35 СП 48.13330.2019 и п. 43 Правил по охране труда при строительстве,
    реконструкции и ремонте, утвержденных  Приказом Минтруда России от 11.12.2020
    N 883н).

    ➡️ В соответствии с СП 48.13330.2019 п. 7.31 временные здания и сооружения для
    нужд строительства возводятся (устанавливаются) на строительной площадке или в
    полосе отвода линейных объектов лицом, осуществляющим строительство, специально
    для обеспечения строительства и после его окончания подлежат ликвидации. Временные
    здания и сооружения в основном должны быть мобильными (инвентарными).

    📌 В соответствии с СП 48.13330.2019 п.7.32 используемые для нужд строительства
    здания, сооружения или помещения, входящие в состав объекта строительства, к временным
    не относятся.

    ✏️ В соответствии с СП 48.13330.2019 п. 7.35 бытовые городки строителей, проходы
    и места отдыха работающих должны располагаться за пределами опасных зон с соблюдением
    соответствующих санитарных норм и правил.

    📑 В соответствии с СП 12-136-2002 п. 5.4 производственные и санитарно - бытовые
    помещения необходимо размещать на стройгенплане за пределами опасных зон.'
