  text: "Иногда цифровизация – это не только бесконечные «созвоны», но и живое общение.\
    \ \n---\nВ середине недели к нам заглянул разработчик сервиса Construction Sheets\
    \ Михаил Тахаутдинов с предложением оптимизировать работу контрольных таблиц областного\
    \ УКСа.\nВ результате за пару часов мы закрыли задачу, которая до этого долго\
    \ «фонила» и не давала покоя.\n\nЧто сделали:\n1. Навели порядок со скриптами:\n\
    Михаил собрал библиотеку для хранения скриптов контрольных таблиц.\nЧто это дало:\n\
    – теперь при изменении скрипта он автоматически и обновляется во всех таблицах;\n\
    – больше не нужно вручную править каждую таблицу по отдельности (кто сталкивался\
    \ — понимает, сколько времени это экономит).\n2. Заложили основу под интерфейс\
    \ – развернули базовую боковую панель.\nБоковая панель может:\n– отображать и\
    \ манипулировать с данными таблиц без взаимодействия с конкретными ячейками;\n\
    – выводить все кнопки для запуска скриптов или расчёта формул.\n– содержать ссылки\
    \ на внешние источники, например, на инструкции.\nНо пока панель связывает вновь\
    \ создаваемых таблиц с библиотекой.\n---\nСпасибо Михаилу за помощь и желание\
    \ делиться готовыми решениями \U0001F642"
