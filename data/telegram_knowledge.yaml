  text: 'ВС обязал заключить допсоглашение в подряде


    🏗 Верховный суд разобрался, обязан ли заказчик вносить изменения в инвестиционное
    соглашение, если проектную документацию скорректировали в ходе строительства.
    В процессе работ по контракту потребовалось больше материалов (+1,8 млрд руб.),
    а часть работ оказалась избыточной (1,2 млрд руб. в «Резерв»). Подрядчик предложил
    перераспределить средства без увеличения общей цены, но заказчик отказался. Апелляция
    и округ поддержали заказчика.


    Экономколлегия ВС согласилась с доводами подрядчика, который настаивал:


    ✅ Изменение проектной документации в пределах 10% от стоимости строительства влечет
    обязанность корректировать ведомость объемов и стоимости работ.


    ✅ Толкование судов приводит к пониманию условий сделки, которое стороны с очевидностью
    не могли иметь в виду.


    ✅ Позиция об отсутствии обязанности вносить изменения противоречит другим положениям
    соглашения и смыслу договора в целом.


    ✅ Суды должны учитывать практику, сложившуюся во взаимоотношениях сторон, и их
    поведение при исполнении контракта.


    Подробнее в новости


    Дело № А40-283450/2024


