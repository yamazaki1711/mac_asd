  text: "‼ Как статус владельца паблика ВК помешал выиграть спор \U0001F447\n\n\U0001F525\
    \ Один из немногих споров в сфере SEO и SMM дошел до ВС РФ. Теперь суды стали\
    \ различать администраторов и владельцев групп в социальных сетях...\n\n\U0001F4BB\
    \ Исполнитель оказывал заказчику консультационные услуги по SMM-продвижению, оформлению\
    \ лендингов и т.д. Заказчик настаивал на том, что не имеет доступа к клиентской\
    \ базе, несмотря на наличие статуса владельца группы \"ВКонтакте\", а все данные\
    \ о пользователях-клиентах хранятся у исполнителя как админа группы. А админ их\
    \ не предоставляет, заказчик обратился в суд.\n\n\U0001F4CC Формулировка иска\n\
    \n✏ Об обязании передать сведения о клиентах и взыскании упущенной выгоды\n\n\U0001F4CC\
    \ Позиции судов\n\n\U0001F535 Первая инстанция встала на сторону истца.\n⚖ Апелляция\
    \ и кассация, включая СКЭС ВС РФ, защитили ответчика.\n\n\U0001F5A5 Предметом\
    \ договора являлось оказание консультационных услуг; Договором не предусмотрено\
    \ создание какого-либо конечного материального результата, не согласовано техническое\
    \ задание на создание определенного идентифицированного сторонами продукта, не\
    \ установлены его характеристики и требования к нему.\n\n\U0001F4DC В соответствии\
    \ с условиями договора в процессе оказания услуг исполнитель только получает доступ\
    \ к персональным данным клиентов заказчика. Обязанности по ведению клиентской\
    \ базы на исполнителя не возлагались. \n\n\U0001F310Истец как владелец групп ВКонтакте\
    \ был вправе в любой момент прекратить статус ответчика. Лишение статуса администратора\
    \ приводит к блокировке доступа к данным.\n\n\U0001F4BC Комментарий юристов \"\
    Реаналитики\":\n\n\U0001F9E9 Это один из редких, но чрезвычайно полезных кейсов,\
    \ которые могут предопределить дальнейшее развитие судебной практики в области\
    \ цифрового маркетинга.\n\n\U0001F50D Определение ВС РФ от 28.10.2025 г. по делу\
    \ № А56-25261/2024\nhttps://m.kad.arbitr.ru/Card/84c2ab19-ac1d-469f-b697-ea87d0112125\n\
    \n⁉ Как Вы думаете, окажет ли этот кейс влияние на судебную практику?\n\n\U0001F44D\
    \ – Да.\n\U0001F914 – Нет.\n\nPS: Выводы являются обобщёнными. Для конкретных\
    \ рекомендаций и решений обратитесь в “Реаналитику”\nreanalitika.ru.\n\n#арбитражныйпроцесс,\
    \ #вконтакте, #маркетинг, #seo\n@arbitrium_processus\nhttps://t.me/arbitrium_processus"
