  text: 'ВС оценил дробление участков под застройку


    📍 Администрация Ейского городского поселения оспорила в суде результаты кадастровых
    работ: участок площадью 601 кв. м сначала разделили на два надела, затем один
    из них — еще на два по 150 кв. м каждый. На образованных участках построили дома
    и продали их в ипотеку.


    💼 Муниципалитет указал, что в зоне индивидуальной жилой застройки минимальный
    размер образуемого участка — 400 кв. м. Суды трех инстанций в иске отказали: границы
    территориальной зоны не внесены в ЕГРН, администрация сама присвоила участкам
    адреса и долго бездействовала, а отмена регистрации затронет права добросовестных
    покупателей.


    👨‍⚖️ Верховный суд с таким подходом не согласился и велел пересмотреть дело. Коллегия
    по гражданским делам указала: постановка участков на учет состоялась с нарушением
    правил землепользования и застройки.


    🏗️ ВС подчеркнул: дробление земли в зоне ИЖС ведет к уплотнению застройки, повышает
    пожароопасность, увеличивает нагрузку на коммунальные сети и создает риски нарушения
    санитарных норм.


    Подробнее в новости


    #верховныйсуд #земельноеправо #недвижимость #градостроительство'
