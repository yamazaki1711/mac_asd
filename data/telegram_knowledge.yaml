  text: '📄Перечень ИД на замену лифтов в МКД при капитальном ремонте


    ГОСТ Р 72115-2025, который устанавливает требования к техническому заданию для
    договоров на замену лифтов в МКД при капитальном ремонте, включает требования
    к перечню исполнительной документации. То есть это именно те требования, которые
    стандарт предписывает включать в техническое задание и, соответственно, в договор.


    📌Минимальный комплект исполнительной документации должен включать:

    — техническое заключение по результатам инженерно-технического обследования;

    — сметную документацию;

    — товарную накладную (ТОРГ-12) (при необходимости);

    — сертификаты соответствия и пакет разрешительных документов на материалы и лифтовое
    оборудование (включая заполненные в необходимых полях паспорт лифта, руководство
    по эксплуатации, правила пользования лифтами и т. д.);

    — декларацию о соответствии;

    — счет на оплату;

    — счет-фактуру (за исключением лиц, применяющих специальные налоговые режимы и
    не являющихся плательщиками НДС) и (или) передаточный документ (акт);

    — приказ о назначении ответственных лиц от подрядной организации;

    — общий журнал производства работ;

    — акт передачи демонтированного оборудования или утилизации;

    — акты освидетельствования следующих скрытых работ (при их выполнении):

      • демонтаж стяжки машинного помещения и приямка шахты лифта;

      • демонтаж тумб буферных устройств;

      • демонтаж подлебедочной рамы;

      • огрунтовка стен и потолка;

      • ремонт штукатурки стен и потолка;

      • устройство стяжки машинного помещения и приямка шахты лифта;

      • и другие скрытые работы, предусмотренные проектной документацией;

    — исполнительные схемы (в случае изменения проектных решений).


    ✏️Комплектация исполнительной документации допускается в виде заверенных копий
    документов.


    💡Обращаем внимание, что значительная часть указанных документов не относится к
    составу исполнительной документации, установленному Приказом Минстроя № 344/пр
    от 16.05.2023г. При этом согласно этому приказу конкретный перечень ИД определяет
    и утверждает заказчик.


    #пто #экспертноемнение


