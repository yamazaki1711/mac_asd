  text: "‼ Двойное гражданство – бомба замедленного действия\U0001F447\n\n⏳ Спустя\
    \ 10 лет прокурор смог добиться аннулирования сделок с компанией, имеющей стратегическое\
    \ значение, из-за того, что в группу компаний-контрагентов входил иностранный\
    \ гражданин...\n\n✍ Иностранный инвестор из группы компаний, обслуживающих стратегическое\
    \ общество, заключил несколько сделок без согласования и уведомления Правительственной\
    \ комиссии. Прокурор обратился в суд.\n\n\U0001F4CC Формулировка иска\n\n✏ О применении\
    \ последствий ничтожных сделок\n\n\U0001F4CC Позиции судов\n\n⚖ Все три инстанции,\
    \ включая СКЭС ВС РФ, иск удовлетворили. \n\n\U0001F510 В целях обеспечения обороны\
    \ страны и безопасности государства Законом № 57-ФЗ от 29.04.2008 г. иностранным\
    \ инвесторам и группе лиц, в которую входит иностранный инвестор, запрещено получение\
    \ возможности определять условия осуществления предпринимательской деятельности\
    \ обществ, имеющих стратегическое значение для обеспечения обороны страны и безопасности\
    \ государства, без предварительного согласования.\n\n\U0001F1EE\U0001F1F9 На момент\
    \ совершения оспариваемых сделок ответчиком в одну группу с подконтрольными ему\
    \ российскими обществами входили иностранные компании, зарегистрированные на Виргинских\
    \ островах, в Италии и на Кипре.\n\n\U0001F1F1\U0001F1F9 При этом ответчик обладает\
    \ статусом иностранного инвестора не только по признаку гражданства как гражданин\
    \ Литовской Республики с 1991 года, но и по признаку вхождения его в группу лиц\
    \ с иностранными компаниями. \n\n\U0001F4BC Комментарий юристов \"Реаналитики\"\
    :\n\n\U0001F9E9 При совершении сделок в сфере обеспечения безопасности и обороны\
    \ следует обращать внимание на гражданство контрагентов и наличие в группе компаний\
    \ иностранных юрлиц.\n\n\U0001F50D Определение ВС РФ от 12.03.2026 г. по делу\
    \ № А07-1729/2025\nhttps://m.kad.arbitr.ru/Card/364f00dc-ef7d-4c47-b1fa-bb690fce3a7d\n\
    \n⁉ Как Вы думаете, двойное гражданство – серьезная помеха для бизнеса?\n\n\U0001F44D\
    \ – Да.\n\U0001F914 – Нет, это заметно только в стратегических сферах.\n\nPS:\
    \ Выводы являются обобщёнными. Для конкретных рекомендаций и решений обратитесь\
