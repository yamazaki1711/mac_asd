  text: "‼ Выставление счета-фактуры – теперь безусловная обязанность\U0001F447\n\n\
    \U0001F4BB Выставление счета-фактуры – часть исполнения обязательства. \nВсе контрагенты\
    \ обязаны предоставлять счета-фактуры. Никаких отговорок быть не может. В противном\
    \ случае это считается неисполнением обязательства и нарушением права на получение\
    \ налогового вычета, а также препятствием в реализации обязанности ведения бухучета.\n\
    \n⛑ Подрядчик не выполнил работы в срок и не направил генподрядчику счета-фактуры.\
    \ Генподрядчик расторг договор и потребовал выставить счета-фактуры.\n\n\U0001F4CC\
    \ Формулировка иска\n\n✏ Об обязании выставить счета-фактуры и взыскании неосновательного\
    \ обогащения и задолженности\n\n\U0001F4CC Позиции судов \n\n\U0001F534 Все три\
    \ инстанции в иске частично отказали.\n⚖ СКЭС ВС РФ отправила дело на новое рассмотрение.\n\
    \n❗ При уклонении от передачи счета-фактуры договорное обязательство не может\
    \ считаться исполненным добросовестно, а заказчику (генподрядчику) должна быть\
    \ предоставлена возможность защищать свои интересы посредством возложения на другую\
    \ сторону обязанности совершить действия по выставлению (передаче) счета-фактуры.\n\
    \n\U0001F449 Освобождение ответчика от исполнения обязанности по оформлению и\
    \ выставлению счетов-фактур лишает истца возможности пользоваться правами, в т.ч.,\
    \ уменьшить общую сумму налога на установленные налоговые вычеты, а также исполнить\
    \ обязанность по ведению бухучета.\n\n\U0001F4DC Обязанность по формированию счетов-фактур\
    \ распространяется на всех плательщиков НДС в качестве безусловного требования.\n\
    \n\U0001F4BC Комментарий юристов \"Реаналитики\":\n\n\U0001F9E9 ВС РФ предельно\
    \ четко обозначил обязанность по передаче счетов-фактур, которую контрагенты довольно\
    \ часто не исполняли, несмотря на наличие прямо прописанного в договоре условия.\n\
    \n\U0001F50D Определение ВС РФ от 03.04.2026 г. по делу № А40-217702/2024\nhttps://m.kad.arbitr.ru/Card/2b887b23-5994-49f6-8175-27a3c928b41b\n\
