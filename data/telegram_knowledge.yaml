  text: 'НДС и длящиеся договоры: кабмин одобрил поправки к НК РФ


    Правительство поддержало налоговые изменения, которые подготовили по поручению
    премьер-министра для реализации постановления КС РФ.


    Уточнят порядок определения сумм НДС по действующим договорам в связи с поправками
    в законе. Это касается случаев, когда по договору НДС выставляют покупателю, который
    не может принять его к вычету.


    Так, если после заключения договора изменился закон и стороны не урегулировали
    такую ситуацию в договоре либо не изменили цену договора, а покупатель не может
    принять НДС к вычету, то поставщик исчисляет сумму НДС расчетным методом. Делает
    это он исходя из стоимости товаров (работ, услуг, имущественных прав) по договору.
    Таким образом, налог рассчитают в пределах цены по договору.


    Предполагается, что закон вступит в силу через месяц после опубликования, но не
    ранее очередного налогового периода по НДС.


    ❗️Напомним, в ноябре 2025 года КС РФ признал неконституционными нормы ГК РФ и
    НК РФ, которые допускают взыскание с покупателя дополнительной суммы как компенсации
    последствий изменения закона. Суд установил порядок действий в такой ситуации
    до внесения поправок. #НДС


    Документ: Информация Минфина России от 09.04.2026


    © КонсультантПлюс'
