  text: "Заказчик три месяца кормил завтраками. На четвёртый подал иск\n\nРаботы выполнены.\
    \ Акты составлены. Подрядчик звонит заказчику: подпишите. Заказчик: на следующей\
    \ неделе. Через неделю: потерял комплект, пришлите ещё. Через две: давайте после\
    \ совещания. Через месяц: мы изучаем.\n\nПодрядчик ждёт. Потому что заказчик на\
    \ связи, не отказывает, не скандалит. Общение нормальное. Зачем портить отношения.\n\
    \nА заказчик в это время делает три вещи.\n\nПервая. Ищет к чему придраться. Нанимает\
    \ специалиста, который находит недостатки. Реальные или надуманные - неважно.\
    \ Главное, чтобы к моменту суда был готов список претензий.\n\nВторая. Собирает\
    \ основания для иска. Пересчитывает сроки, считает неустойку, формулирует убытки.\
    \ Три месяца - достаточно, чтобы подготовить серьёзную позицию.\n\nТретья. Тратит\
    \ ваши деньги. Результат получен, работы приняты по факту, но не по документам.\
    \ Деньги работают на него. А вы ждёте.\n\nНа четвёртый месяц приходит иск: возврат\
    \ аванса, неустойка, убытки. Работы «не приняты», потому что акты «не подписаны».\n\
    \nИ вот тут подрядчик понимает: три месяца вежливых обещаний были подготовкой\
    \ к атаке. Но доказать это невозможно. А доказать, что работы выполнены, без подписанных\
    \ актов - сложно.\n\nКак не попасть в эту ситуацию. Правило пяти дней.\n\nПередали\
    \ акты заказчику. Ждёте пять рабочих дней. Не подписал, не направил мотивированный\
    \ отказ - отправляете акты повторно. Почтой России с описью вложения на юридический\
    \ адрес. Можно по ЭДО.\n\nОпись вложения и чек с трек номером - это доказательство.\
    \ Штамп на вашем экземпляре при передаче нарочным - тоже. \n\nМотивированный отказ\
    \ - это не «мы не согласны». Это перечень конкретных недостатков с указанием их\
    \ локализации, которые делают результат непригодным для использования. \n\nЦарапина\
    \ на стене - не основание для отказа от приёмки всего объекта. \n\nЕсли заказчик\
    \ прислал немотивированный отказ или не прислал ничего - работы считаются принятыми.\n\
    \nЧто делать, если вы уже в ситуации «три месяца ждём»?\n\nСегодня. Направьте\
    \ акты почтой с описью на юридический адрес заказчика. Да, повторно. Да, даже\
    \ если передавали раньше. Главное - чтобы теперь было подтверждение.\n\nИзучите,\
    \ что вы должны направить заказчику кроме актов: КС-3, счет-фактуру, исполнительную\
    \ документацию.\n\nСоберите все доказательства выполнения: фотографии, переписку,\
    \ журнал работ, пропуска на объект. Всё, что подтверждает: вы на объекте были\
    \ и работы делали.\n\nДальше. Ждите срок из договора на рассмотрение актов. \n\
    \nИстёк - претензия. \n\nИстёк срок претензии - иск.\n\nНе ждите, пока заказчик\
    \ ударит первым. Тот, кто подаёт иск, контролирует повестку. Тот, кто ждёт, -\
    \ реагирует.\n\nСтолкнулись с затягиванием приёмки - пишите @grikevich\nMAX -\
    \ резервный канал"
