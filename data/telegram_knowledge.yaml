  text: 'ТЕАТР ОДНОГО БАЛАБОЛА


    Ранее один широко известный в узких кругах псевдоюрист-театрал, специализирующийся
    на съёмках постановочного псевдоюридического треш-контента, любил заходить ко
    мне в офис и устраивать там театр одного актёра: судорожно тряс какими-то бумажками,
    рассказывал про якобы обманутую пенсионерку и грозился пойти в суд, чтобы чего-то
    там «разоблачить». Говорил, как обычно, много. Получился, как обычно, пшик.


    Сегодня Санкт-Петербургский городской суд вынес весьма интересное и, считаю, очень
    справедливое решение по этой истории. Если коротко, то суд установил, что никакого
    некачественного оказания услуг с моей стороны не было и никакую пенсионерку я
    не обманывал, что полностью соответствует действительности.


    В итоге вся эта театральная постановка, как и следовало ожидать, закончилась ровно
    тем, чем обычно заканчиваются выступления циркового квазиюриста - пустыми разговорами.


    Подробности решения и саму суть этой прекрасной судебной истории расскажу чуть
    позже, в полном ролике во ВКонтакте и на YouTube. Потому что между двумя абзацами
    такие вещи нормально не помещаются. Но уже сейчас можно сказать одно: когда человек
    слишком долго работает ртом, а не головой, финал обычно получается именно таким.😃'
