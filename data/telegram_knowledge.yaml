  text: 'Сам виноват в своих убытках


    Арбитражный суд Восточно-Сибирского округа разъяснил, когда арендатор может требовать
    убытки после признания договора аренды лесного участка недействительным. В одном
    из многолетних споров разбирают ситуацию, в которой ИП получил участок для рекреации
    и купил на нем сооружения за 5 млн руб. Позднее договор признали ничтожным — участок
    находился в заказнике «Магданский».


    🔹 Суд первой инстанции отказал во взыскании убытков: на момент расходов предприниматель
    должен был знать об ограничениях.


    🔹 Апелляция заняла противоположную позицию и взыскала 5 млн руб.: при заключении
    договора сведений о заказнике в ЕГРН не было.


    🔹 Кассация отменила постановление апелляции: арендатор может требовать убытки,
    только если не знал и не должен был знать о запрете не только при заключении договора,
