  text: 'ПРОГОСЗАКАЗ.РФ (VK)


    ⚖️ Суд пояснил, какие условия должны соблюдаться для корректного установления
    нацрежима при закупке медицинских изделий


    ООО «Беркана-Мед» обратилось в суд с требованием признать недействительными результаты
    торгов и заключенного по их итогам контракта. По мнению истца, закупаемый товар
    (набор расходных материалов для сбора плазмы методом центрифугирования) подпадает
    под позицию 420 приложения № 2 к Постановлению № 1875, в связи с чем заказчику
    надлежало применить ограничение, а не преимущество.


    Также заявитель указал, что заказчик неправомерно применил снижение цены на 15%
    к заявке третьего лица – ООО «Медпроспект», предложившего товар российского происхождения,
    и признал его победителем, тогда как победителем должен был быть признан сам истец.


    Заказчик не согласился с доводами заявителя, указав, что в приложениях № 1 и №
    2 к Постановлению № 1875 отсутствует закупаемый товар, соответствующий совокупности
    наименования, кода по ОКПД2 32.50.50.190 и НКМИ 350020, поэтому заказчик применил
    преимущество.


    🔻Правовая оценка суда:


    Спор между сторонами возник в связи с различным определением применимого национального
    режима: истец настаивает на применении ограничения (позиция 420 приложения № 2
    к Постановлению № 1875), тогда как ответчик указывает на правомерность применения
    преимущества (п. 3 ч. 4 ст. 14 Закона № 44-ФЗ, п. 1 Постановления № 1875).


    В силу подпункта «д» пункта 4 Постановления № 1875 запрет или ограничение в отношении
    медицинских изделий применяются при соблюдении совокупности условий:

    ➡️ соответствие коду ОКПД2;

    ➡️ соответствие наименованию;

    ➡️ соответствие НКМИ.


    Отсутствие хотя бы одного из указанных условий исключает применение ограничения
    либо запрета.


    Судом установлено, что НКМИ 350020 отсутствует в позиции 420 приложения № 2 Постановления
    № 1875, в которой указаны иные коды (262850, 262870). Следовательно, совокупность
    условий, необходимых для применения ограничения допуска иностранных товаров, отсутствует.


    Довод истца о том, что закупаемый товар по своей природе относится к соответствующей
    позиции, отклоняется судом как основанный на расширительном толковании нормативного
    акта.


    📄 Решение АС Вологодской области от 30.03.2026 г. по делу № А13-7229/2025'
