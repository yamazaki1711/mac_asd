  text: "№ 500-ФЗ ОТМЕНЯЮТ ОБРАТНО\n\nИстория с законом № 500-ФЗ, про который я говорил\
    \ еще в декабре 2025 и который с февраля этого года серьёзно ухудшил права потребителей,\
    \ получила важное продолжение. «Справедливая Россия» внесла инициативу о его отмене.\
    \ И это, без преувеличения, очень важная новость.\n\nНапомню, именно этот закон\
    \ под соусом «улучшений» фактически ухудшил положение потребителей. Новый порядок\
    \ расчёта выплат при возврате технически сложного товара, из-за которого человек\
    \ может получить меньше, чем заплатил. Штраф продавцу только при доказанном умысле,\
    \ который ещё попробуй докажи. Ограничение неустойки, которую сначала урезали\
    \ законом, а потом ещё и суд сможет дополнительно уменьшить. То есть права потребителя\
    \ не усилили, а аккуратно и очень удобно подрезали.\n\nКогда мы начали говорить\
    \ о том, что людей, мягко говоря, снова попытались провести, многие делали вид,\
    \ что ничего страшного не произошло. А теперь внезапно выясняется, что произошло,\
    \ и ещё как. Поэтому отдельно хочу сказать спасибо «Справедливой России» и лично\
    \ руководителю фракции Сергею Миронову, что заметили проблему, разобрались и внесли\
    \ инициативу об отмене этого откровенно вредного закона. Значит, всё это было\
    \ не зря, нас всё-таки услышали.\n\nОб этом публично написал руководитель фракции\
    \ \"Справедливая Россия\" Сергей Миронов. Так что рекомендую обратить внимание\
    \ и на его Telegram-канал. \n\nПосмотрим, чем всё закончится на практике. Но сам\
    \ факт уже показательный: закон, который пытались выдать за норму, оказался настолько\
    \ «хорошим», что теперь его предлагают отменять. И, честно говоря, это абсолютно\
    \ правильное решение."
