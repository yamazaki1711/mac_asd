  text: "\U0001F608 Макконахи против ИИ. \n\nПишут, что актер зарегистрировал свой\
    \ голос и фразы как товарные знаки. Он хочет таким образом защитить себя от дипфейков\
    \ и использования его образа без разрешения.\n\nВсего Мэттью зарегистрировал восемь\
    \ товарных знаков. Среди них его знаменитое «Alright alright alright».\n\nИ это\
    \ не все. Он защитил свои вокальные интонации (!) и даже конкретные образы.\n\n\
    Например, как он выглядит под рождественской елкой или на крыльце. \U0001F61C\n\
    \nВ общем решил создать юридический отпечаток своей личности) \n\nМногие думают\
    \ что право на публичность уже защищает звезд. Но в США это право сильно отличается\
    \ в разных штатах. А товарный знак это федеральная защита. И она намного сильнее.\n\
    \nВ целом актер прямо сказал, что хочет создать четкий периметр вокруг своего\
    \ образа. И хочет чтобы согласие и указание автора были нормой в мире ИИ \U0001F44F\
    \n\nКонечно использование товарного знака дает его юристам мощный инструмент и\
    \ идея в целом не нова. Если ИИ-клон Мэттью будет что-то рекламировать без его\
    \ согласия - это будет уже нарушением федерального закона и это намного проще\
    \ доказать в суде, чем \"вред репутации\" (Это та ещё задачка - а при наличии\
    \ товарного знака остаётся доказать только факт его использования без согласия\
    \ правообладателя) \n\nКстати, Макконахи сам вкладывается в ИИ-компании и не против\
    \ технологий. Он просто хочет контролировать как его используют и получать за\
    \ это деньги \U0001F937‍♂\n\nВозможно, это создаст новый прецедент и другие звезды\
    \ тоже начнут так делать. Вообще вариант с ТЗ может стать отличным способом защитить\
    \ себя в цифровую эпоху \U0001F609"
