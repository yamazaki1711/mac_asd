  text: 'Господдержка на 50 млрд — признак банкротства или нет?


    ГК «Самолет» обратился якобы за государственной поддержкой на 50 млрд рублей.
    В этой новости мне стало интересно, а что значит такое обращение (если оно, конечно,
    было)?


    В новостях фигурирует фраза «стабилизационный инструмент». Означает ли это, что
    у компании возникли признаки неплатежеспособности?


    ‼️Если да, то статья 30 Закона о банкротстве устанавливает обязанность сделать
    соответствующую публикацию в ЕФРСБ.


    Я проверил — такой публикации нет. Зато посмотрел старые публикации. Из них можно
    узнать, что, похоже, как минимум срок исполнения обязательств по одному из кредитов
    наступит похоже 31.03.2026. Под кредит предоставлен залог имущественных прав —
    вероятно, будущий дом.


    Возможно, что именно с наступлением срока указанного обязательства запрос на государственную
    поддержку и подан.


    💬Тем не менее, в очередной раз повторюсь — требования статьи 30 Закона о банкротстве
    обусловлены тем, чтобы предупредить будущих кредиторов о рисках банкротства, а
    также обязать руководство принять меры по его предупреждению.


    В итоге мы вроде и имеем некое публичное сообщение через СМИ, но записи в ЕФРСБ
    не видим.


    📌Почему это важно?


    Представим, что господдержку получить не удастся и начнётся банкротство компании.
    Если бы руководители сделали соответствующее сообщение в ЕФРСБ, то это давало
    бы им лишний козырь для защиты от субсидиарной ответственности.


    В отсутствие сообщения такого козыря нет.


    История с ГК «Самолет» — это просто для демонстрации примера о том, что если финансовые
    трудности наступили, то может быть разумнее о них заявить напрямую, как велит
    закон. А не полунамёками.


    ➡️Вот тут подробный пост об этом.


    📽Ранее по теме:

    ▫️Обязанности руководителя при финансовых трудностях


    🏷Прочёл в законе'
