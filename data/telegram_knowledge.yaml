  text: "10 ошибок при банкротстве: когда долги не спишут\n\nУ меня вышло новое видео!\
    \ В этот раз решил рассказать о десяти типичных и нетипичных ошибках граждан-банкротов,\
    \ которые могут привести к отказу в списании долгов.\n\n\U0001F5E3О чём рассказал\
    \ в видео?\n\nВот коротко об этих десяти ошибках:\n\n❌Ошибка номер 0: Обратиться\
    \ к тем, кто «гарантирует списание долгов». \n\nКак обычно, не мог обойти тему\
    \  «раздолжителей» мимо;\n\n❌Ошибка номер 1: Самая классическая - сокрытие имущества.\
    \ \n\nТе самые примеры с выводом активов и просто сокрытием имущества. Даже если\
    \ «спрятать» деньги в криптовалюту, это могут разоблачить;\n\n❌Ошибка номер 2:\
    \ Указать ложные сведения при получении кредита. \n\nОшибка, которая граничит\
    \ с уголовным делом;\n\n❌Ошибка номер 3: Публикации в соцсетях о дорогих покупках\
    \ и путешествиях. \n\nЕсли вы банкрот, но публикуете фотографии из путешествий\
    \ или о дорогих покупках – это чревато тем, что долги не спишут.\n\n❌Ошибка номер\
    \ 4: Намеренное наращивание долгов перед банкротством. \n\nМассовый набор кредитов\
    \ могут признать недобросовестным поведением.\n\n❌Ошибка номер 5: Неофициальная\
    \ работа. \n\nЕсли банкрот официально не работает, но при этом имеет постоянный\
    \ доход со своих услуг, то долги могут не списать.\n\n❌Ошибка номер 6: Нежелание\
    \ работать. \n\nОбратный пример. Редко, но и такое могут признать недобросовестным.\n\
    \n❌Ошибка номер 7: Отказ от наследства. \n\nОдин из удивительных примеров. Да,\
    \ если отказаться от наследства, то могут не списать долги, а ещё оспорить такой\
    \ отказ как сделку.\n\n❌Ошибка номер 8: Потратить кредит на развлечения. \n\n\
    Некоторые должники тратят деньги на букмекерские конторы. Чем это закончится?\
    \ Узнаете из видео.\n\n❌Ошибка номер 9: Смена адреса регистрации. \n\nЕсли переезжаете\
    \ в период банкротства, то лучше всего уведомить об этом финансового управляющего.\n\
    \n❌Ошибка номер 10: Игнорирование финансового управляющего. \n\nЕсли он запросил\
    \ информацию – предоставьте. Игнорирование приведет к очень негативным последствиям.\n\
    \nВ видео рассказал всё подробнее и с реальными примерами из практики.\n\nКак\
    \ обычно, видео доступно на всех площадках.\n\n\U0001F4FCYouTube: https://youtu.be/esUScZlPvtU\n\
    \n\U0001F46E‍♂️ВК Видео: https://vkvideo.ru/video-221241344_456239040\n\n\U0001F31F\
    Дзен: https://dzen.ru/video/watch/6977a258fcdee528448fa379 \n\n\U0001F39EРутуб:\
    \  https://rutube.ru/video/789b41a9b53f8903fb7c4359afe12f21/\n\nВсем приятного\
    \ просмотра!"
