    фундамент, а также необходимая инженерная подготовка.


    Проект КРТ охватит 13,7 га в границах улиц Дружбы, Снежной, Энтузиастов и реки
    Ржавки. Всего здесь планируется строительство 13 домов: первая очередь включит
    четыре новостройки высотой до 21 этажа. Рядом с жильем возведут детский сад на 320 мест,
    поликлинику на 100 посещений в смену, а также парковки на 415 машиномест.


    Кроме того, застройщик обязан  разработать проект строительства школы на 1,1 тысячи
    учеников.


