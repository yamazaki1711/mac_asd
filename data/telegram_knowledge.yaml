  text: 'Оспорить запрет Минобороны


    🏗 Собственники участков в подмосковном Щелково подали иск в Верховный суд — оспаривают
    приказ Минобороны, который включил их земли в запретную зону аэродрома Чкаловский
    и заблокировал строительство.


    ⚖️ Юрист Land Law Firm Дарья Плотникова прокомментировала ситуацию для «Коммерсантъ»:
    шансы оспорить приказ Минобороны, как правило, невысокие — многие ключевые документы
    засекречены, и ведомство отказывается предоставлять их в суд.


    📂 Но положительная практика есть. Например, в Иркутской области и на Урале заявителям
    удавалось успешно оспорить запретные зоны. Еще один рабочий инструмент — взыскание
    убытков за ограничения, на которое Минобороны может отреагировать корректировкой
    границ зоны.


    «При установлении запретной зоны земельный участок становится менее ценным, поскольку
    зона предполагает множество ограничений, в том числе запрет строительства. Однако
    есть действенные способы защиты прав на участки, поэтому оспаривать такие действия
    Минобороны во всяком случае стоит», — отметила Плотникова.



