  text: 'УФАС поддержало госзакупку оригинальных картриджей для российского офисного
    принтера


    Участник закупки тонер-картриджей пожаловался на ограничение конкуренции. Дело
    в том, что заказчик приобретал оригинальные изделия с конкретным товарным знаком
    без возможности поставки эквивалента.


    Заказчик пояснил: принтер находился на бесплатном гарантийном обслуживании. Одно
    из условий гарантии – применение оригинальных расходников и запчастей. Кроме того,
    в закупке не действовала защитная мера в виде ограничения по правилу Постановления N 1875.


    УФАС не увидело нарушения. Покупка оригинального товара была обоснована потребностями
    заказчика. Использование оригинальных расходников позволяло достичь целей закупки
    – обеспечить надежную и безопасную эксплуатацию техники без утраты гарантии.


    ❗️В практике есть пример, когда суды одобрили закупку оригинальных картриджей
