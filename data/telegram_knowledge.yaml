  text: 'Публичные слушания при застройке хотят вернуть


    Группа депутатов от «Новых людей» внесла в Госдуму законопроект, меняющий правила
    утверждения градостроительной документации. Документ предлагает вернуть обязательные
    общественные обсуждения новых строительных проектов.


    Сейчас законодательство позволяет обходить процедуру публичных слушаний — такая
    норма вводилась в 2022 году как временная антикризисная мера. В итоге, как отмечают
    авторы, это привело к росту социальной напряженности, точечной застройке и дефициту
    социальной инфраструктуры, из-за чего прокуратуре уже приходится ограничивать
    стройки в десятках городов.


    Что предлагают изменить:


    🗣 Лишить правительство РФ и региональные власти права утверждать генпланы и правила
    землепользования и застройки (ПЗЗ) без проведения публичных слушаний.


    🛑 Запретить утверждение проектов планировки и межевания территорий в обход процедуры
    общественных обсуждений с жителями.


    Подробнее в новости


    Законопроект № 1212357-8


