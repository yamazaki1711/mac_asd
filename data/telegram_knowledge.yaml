  text: "Можно ли судиться за разбитое сердце?\n\nСегодня подходящий повод для небольшого\
    \ тематического поста.\n\nВ начале XX века в США и Великобритании существовали\
    \ так называемые «heart balm» иски. Обещание жениться рассматривалось как юридически\
    \ значимое обязательство. Фактически — договор.\n\nЗа нарушение можно было подать\
    \ в суд и требовать компенсацию как реальных убытков, так и морального вреда.\n\
    \nС 1935 года штаты начали массово отменять право на такие иски. В первую очередь\
    \ из-за опасений, что они превращаются в инструмент шантажа. Но кое-где эти нормы\
    \ действуют до сих пор. Вот даже целый сайт об этом есть.\n\n❤️О самом празднике\n\
    \nПо одной из версий, День святого Валентина зародился из правового конфликта.\n\
    \nРимский император Клавдий II запретил молодым мужчинам вступать в брак, так\
    \ как считал, что холостые солдаты воюют лучше женатых. Священник Валентин тайно\
    \ венчал пары, нарушая императорский указ.\n\nКогда его деятельность раскрылась,\
    \ он был арестован и казнён 14 февраля 269 года н.э. (есть разные версия относительно\
    \ года) По легенде, именно в тюрьме он написал первую «валентинку» — письмо дочери\
    \ тюремщика, подписанное «от твоего Валентина».\n\n↪️Напрашивается забавный факт:\
    \ по сути, весь праздник — это чествование человека, осуждённого за системное\
    \ нарушение закона) \n\n\U0001F4FDРанее по теме:\n▫️Небывалые законы. Пятиминутный\
    \ поцелуй\n\n\U0001F3F7Прочёл в законе"
