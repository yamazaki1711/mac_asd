  text: 'Минфин разъяснил нюансы формирования СГОЗ


    В ответе на запрос регулятор указал, что СГОЗ - это утверждённый на соответствующий
    финансовый год общий объём финансового обеспечения закупок, включая оплату контрактов,
    заключённых до начала указанного финансового года, но подлежащих оплате в нём
    (п. 16 ч. 1 ст. 3 Закона № 44-ФЗ).


    Это означает, что СГОЗ составляет сумма средств по:


    контрактам предыдущих лет - в части оплаты в текущем году;


    контрактам текущего финансового года, исполняемым и оплачиваемым в текущем году;


    контрактам текущего финансового года, исполняемым в текущем и последующих годах,
    - в части оплаты в текущем году.


    Таким образом, СГОЗ представляет собой общий объём средств, подлежащих оплате
    в отчётном финансовом году. #минфин


    Документ: Письмо Минфина России от 15.04.2026 № 24-06-09/31313


    Источник: ЭТП «Фабрикант»'
