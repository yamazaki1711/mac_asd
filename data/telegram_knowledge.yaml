  text: "Претензия, которая работает, и претензия, которая лежит в столе\n\nПодрядчик\
    \ пишет претензию. Отправляет. Ждёт. Тишина. Через месяц звонит: ну что там? Заказчик:\
    \ рассматриваем. Ещё через месяц: мы не согласны. Или просто молчит.\n\nИ подрядчик\
    \ думает: ну ладно, пойдём в суд.\n\nА заказчик в этот момент думает совсем другое.\
    \ Он думает: отлично. Пусть идёт в суд. Это 6-9 месяцев минимум. Первая инстанция,\
    \ апелляция - ещё полгода. Исполнительное производство - ещё. Итого полтора-два\
    \ года. А деньги у меня. Я ими попользуюсь. Может, за это время он устанет и согласится\
    \ на 30%. Может, закроется. Может, забудет.\n\nВот что на самом деле происходит,\
    \ когда заказчик получает слабую претензию. Он не пугается. Он радуется. Потому\
    \ что слабая претензия - это сигнал: этот подрядчик не опасен.\n\nА теперь разберём,\
    \ почему 90% претензий именно такие.\nПервое.\n Нет конкретной суммы. Написано:\
    \ «просим оплатить задолженность за выполненные работы». Какую задолженность?\
    \ За какие работы? Сколько? Заказчик читает и не понимает, о чём речь. Или делает\
    \ вид, что не понимает.\n\nПретензия должна содержать точную сумму. Основной долг\
    \ - столько-то. Неустойка на дату претензии - столько-то. Проценты по 395 ГК -\
    \ столько-то. Убытки - столько-то. Итого - конкретная цифра. Когда заказчик видит,\
    \ что кто-то уже посчитал всё до рубля, он понимает: этот человек готов к суду.\n\
    \nВторое. Нет расчёта неустойки. Просто «требуем уплатить неустойку». А заказчик\
    \ думает: ну потребуйте, может суд и не взыщет. Если в претензии есть расчёт -\
    \ дата начала просрочки, ставка, база, количество дней, итоговая сумма - заказчик\
    \ видит, что цифра растёт каждый день. И чем дольше он тянет, тем больше заплатит.\n\
    \nТретье. Нет срока. «Просим оплатить в разумный срок». Разумный - это сколько?\
    \ Неделя? Год? Никогда? Претензия без срока - это просьба. А просьбу можно проигнорировать.\
    \ Должно быть: «в течение 10 рабочих дней с момента получения настоящей претензии».\
    \ Конкретно. Жёстко. С датой.\n\nЧетвёртое. Нет последствий. Подрядчик написал,\
    \ что хочет денег. А что будет, если не заплатят? Ничего? Тогда зачем платить?\
    \ В претензии должно быть: в случае неудовлетворения требований в указанный срок\
    \ мы обратимся в арбитражный суд с требованием о взыскании основного долга, неустойки,\
    \ процентов за пользование чужими денежными средствами, расходов на экспертизу\
    \ и юридические услуги. Заказчик должен понимать: его расходы при проигрыше будут\
    \ значительно больше, чем сумма претензии.\n\nПятое. Нет ссылок на договор. Претензия\
    \ в стиле «вы нам должны, потому что мы работали». А на каком основании? Какой\
    \ пункт договора нарушен? Какой срок оплаты пропущен? Какая процедура приёмки\
    \ не соблюдена? Без привязки к договору претензия выглядит как эмоция, а не как\
    \ юридический документ.\n\nШестое. Нет доказательств. Претензия без приложений\
    \ - это голые слова. Приложите: копию акта выполненных работ, подтверждение его\
    \ вручения или отправки, расчёт задолженности, расчёт неустойки. Заказчик должен\
    \ открыть конверт и увидеть толстую пачку документов. Это психологически давит\
    \ сильнее, чем одна страница текста.\n\nСедьмое. Отправлена не на тот адрес. Или\
    \ не тем способом. Претензия, отправленная на электронную почту, формально может\
    \ не считаться надлежащим уведомлением, если в договоре не указан такой способ.\
    \ Отправляйте Почтой России с описью вложения на юридический адрес. Параллельно\
    \ можно продублировать по электронной почте и курьером с отметкой о вручении.\n\
    \nА теперь главное. Даже идеальная претензия не заставит заплатить того, кто не\
    \ хочет. Но она делает три вещи.\n\n1️⃣Она показывает заказчику, что вы готовы\
    \ к суду. Что за вами стоит юрист, который уже всё посчитал. Что каждый день промедления\
    \ увеличивает его расходы.\n\n2️⃣Она закрывает обязательный досудебный порядок.\
    \ Без претензии суд вернёт иск. А если претензия составлена криво, заказчик в\
