    Руководителя автономной некоммерческой организации отправили под стражу до 17
    апреля. Его обвиняют в мошенничестве. Предварительно, поводом для проверки стали
    заявления от двух сотрудников института — проектного менеджера и начальника отдела
    информационного обеспечения. Они обратились в СК, прокуратуру и администрацию
    президента, указав на возможные коррупционные нарушения. Журавлев занял должность
    в августе 2024-го. Под его управлением организация должна была информировать нижегородцев
    о мерах поддержки семей и формировать имидж современной семьи на базе традиционных
    ценностей. UPD: Евгения Журавлева обвиняют в незаконном начислении себе зарплаты
    По данным СК, он приказал подчиненному вписать в ведомость якобы отработанные
    рабочие часы, хотя по факту не появлялся на рабочем месте и обязанности свои не
    выполнял. Таким образом Журавлев своровал не меньше 350 тысяч рублей. Мария Шарапова'
