  text: 'Сижу, пью кофе, жду человека. За соседним столиком двое: директор ООО и сотрудник
    банка. Судя по всему, финальная стадия открытия счета — менеджер привез документы.


    Вполуха слушаю. Вроде все по делу. И тут, напоследок, сотрудник банка выдает:


    — А вот еще мы специально для вас выпустили бизнес-карту. Она привязана к расчетному
    счету. Платите картой — деньги списываются со счета.


    Новоиспеченный директор оживляется:


    — А где можно платить?


    — Да везде: в магазинах, на заправках, в кафе. И наличные снимать в банкоматах,
    и обратно вносить.


    Классика жанра. Сотрудник банка, сам того не ведая, сейчас вручит человеку мину
    замедленного действия. Директор начнет оплачивать картой покупки или снимать наличку,
    а через пару месяцев прилетит блокировка по 115-ФЗ.


    Думаю: предупредить человека или дать визитку и подождать, когда его заблокируют,
    и он придет за разблокировкой?


    Предупредил. Ну и вас предупрежу. Оплачивать личные расходы бизнес-картой может
    только ИП на УСН Д или на ПСН. Остальные ИП — и тем более ООО — оплачивать личные
    расходы картой не могут. А по бизнес-расходам через бизнес-карту всё равно нужна
    отчетность: чеки, договоры, акты и т.д. По-хорошему, бизнес-карта — это аналог
    чековой книжки и денег под отчет. И если расплачиваться направо и налево бизнес-картой,
    привязанной к счету ОООшки, блокировка не заставит себя долго ждать. И потом ваши
    аргументы банку — мол, вы же сами мне эту карту выдали — работать не будут.


    С уважением,

    Адвокат Евгений Шупиков


    Канал в Макс - https://max.ru/jurist'
