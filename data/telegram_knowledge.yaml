  text: "В Госдуме предложили изменить порядок взыскания долгов с граждан\n\n➡️ За\
    \ должником предлагается оставлять сумму не ниже прожиточного минимума, даже если\
    \ он не подал специальное заявление в банк. \n\nРечь идет как о заработной плате,\
    \ так и о других регулярных доходах. Это следует из законопроекта, внесенного\
    \ в Госдуму. Поправки вносятся в Закон об исполнительном производстве.\n\n✨ Исключение\
    \ — исполнение требований по алиментам, возмещению вреда жизни и здоровью, а также\
    \ по обязательствам, связанным с коррупционными правонарушениями.\n\nСейчас гражданин\
    \ должен обратиться в банк, чтобы сохранить деньги в размере прожиточного минимума.\
    \ Без заявления деньги могут списать в счет долга. \n\nНа практике это приводит\
    \ к ситуациям, когда человек по объективным причинам не успевает или не может\
    \ подать заявление и остается без средств к существованию.\n\n\U0001F4C4 Источник:\
    \ законопроект № 1190006-8\n\n⚪ Арбитражная практика в Телеграм | Сообщество ВК\
