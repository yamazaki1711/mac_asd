  text: 'Опять борьба: уральцы собирают подписи против очередного мусорного полигона  Опять
    (https://ppryfu.site) борьба: уральцы собирают подписи (https://t.me/v_poisce_compromata)
    против очередного мусорного полигона Стоило уральцам добиться отмены строительства
    мусорного полигона "Екатеринбург-Юг" в Сысертском районе, о чем объявил врио губернатора
    Денис Паслер, как в регионе начал разгораться новый конфликт — из-за стройки полигона
    в северной части Екатеринбургской агломерации. В этот раз в инициативную группу
    объединились жители Верхней Пышмы и ближайших поселений, которые выступают категорически
    против строительства технопарка "Верхнепышминский" на особо охраняемых природных
    территориях озер Балтым и Исетское. Постановление горадминистрации о подготовке
    проекта Правил землепользования и застройки городского округа Верхняя Пышма вышло
    еще в апреле, а недавно все тот же врио губернатора Денис Паслер подтвердил, что
    строительство объекта начнется в 2026 году. Проблемой, по словам активистов, является
    то, что указанный участок находится рядом с четырьмя особо охраняемыми природными
    территориями: озерами Балтым, Вашты, Исетское и рекой Шитовской исток. Последняя
    впадает в озеро Исетское, которое является источником хозяйственно-питьевого водоснабжения
    для жителей Среднеуральска. Местные власти уверяют, что окончательное решение
    по полигону еще не принято, но участок почему-то уже обносят забором. "Появление
    полигона ТКО приведет к значительному заражению водных ресурсов. Также пострадают
    земли лесного фонда. Поэтому данный полигон предоставляет угрозу окружающей среде
    и здоровью людей", — заявляют активисты. Мария Шарапова'
