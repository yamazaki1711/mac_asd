  text: "Качество стройматериалов будет контролироваться на федеральном уровне \n\n\
    В окончательном чтении принят Законопроект № 1156624-8 «О внесении изменений в\
    \ отдельные законодательные акты Российской Федерации и признании утратившим силу\
    \ пункта 15 статьи 46 Федерального закона «О техническом регулировании» (об установлении\
    \ государственного контроля (надзора) за отдельными видами промышленной продукции)».  \n\
    \nВ чем суть\n\nВводится федеральный государственный надзор за соблюдением обязательных\
    \ требований к отдельным видам промышленной продукции, имеющей стратегическое\
    \ значение.\n\nНадзор будет осуществлять уполномоченный федеральный орган исполнительной\
    \ власти. Проводиться будет в т. ч. и в форме профилактических мероприятий.\n\n\
    Что будут проверять\n\nСоблюдение производителями и продавцами требований технических\
    \ регламентов, принятых в соответствии с законодательством РФ и актами ЕАЭС.\n\
    \nКонкретный перечень материалов будет установлен постановлением Правительства\
    \ РФ.  \n\n\U0001F972«Законы стройки» в MAX"
