  text: 'Обзор практики Верховного суда за октябрь


    Подготовили октябрьский выпуск нашего регулярного обзора практики ВС по недвижимости,
    земле и строительству. Вот какие в него попали позиции:


    🔹Отсутствие возражений арендатора на акт о недостатках не освобождает суд от проверки
    — действительно ли все указанные дефекты относятся к текущему ремонту, который
    обязан выполнять арендатор.


    🔹Местные власти не могут произвольно отменять свои постановления, которые послужили
    основанием для возникновения прав граждан. Нахождение участка на землях лесного
    фонда не препятствует переоформлению права постоянного пользования в собственность.


    🔹Несоответствие границ участка под гаражом утвержденному проекту межевания — законное
    основание для отказа в предоставлении земли в собственность.


    🔹Плату за изменение вида разрешенного использования необходимо внести до изменения,
    чтобы собственник мог принять решение — соглашаться или отказаться.


