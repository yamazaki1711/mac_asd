  text: "ЛОВКОСТЬ РУК И \"НИКАКОЕ\" МОШЕННИЧЕСТВО\n\nВ один прекрасный момент на счёт\
    \ моего ИП прилетает относительно небольшая сумма — 50 000 рублей. На фоне обычных\
    \ оборотов она просто теряется и остаётся незамеченной. А потом ко мне в офис\
    \ приходит целая театральная труппа с видеокамерами, зачитывает стишок про обманутую\
    \ пенсионерку и вручает претензию с приложением договора на оказание юридических\
    \ услуг (якобы со мной), но подписанного только со стороны пенсионерки. Уже это\
    \ выглядело странно. Но дальше стало ещё интереснее: подписи в претензии и в договоре\
    \ вообще не совпадали, почерковедческая экспертиза это подтвердила.\n\nДальше\
    \ на меня подают иск и требуют уже не просто вернуть 50 000 рублей, а взыскать\
    \ более 200 000 рублей: штраф, неустойку, моральный вред и даже оплату услуг стороннего\
    \ адвоката. При этом к иску прикладывают тот самый договор, который с моей стороны\
    \ вообще не подписан. Параллельно в дело подтягивают материалы другого гражданского\
    \ процесса, из которых выясняется, что интересы пенсионерки в нём представляли\
    \ сторонние адвокаты, но после первой инстанции пенсионерка от их услуг отказалась.\
    \ Однако претензию предъявила не им, а мне, потому что, по её версии, услуги были\
    \ оказаны некачественно именно мной. Хотя я эту пенсионерку в глаза никогда не\
    \ видел, никаких договоров с ней не заключал, её подписи на документах по мнению\
    \ эксперта-почерковеда были подделаны.\n\nВ суде первой инстанции я сразу предложил\
    \ вернуть ей эти 50 000 рублей как неосновательное обогащение. Но это, конечно\
    \ же, не устроило её юристов. Хотелось получить не свои 50 тысяч обратно, а превратить\
    \ их в сумму гораздо больше. В этом и был смысл сего мероприятия.\n\nВ финальном\
    \ заседании первой инстанции в деле вообще появляется иная копия договора, уже\
    \ якобы с подписью моего представителя. По моему мнению, документ имел очевидные\
    \ признаки подделки. Я просил назначить экспертизу, но суд во всех ходатайствах\
    \ отказал и в итоге взыскал с меня не только 50 000 рублей, штраф, неустойку и\
    \ моральный вред, но ещё и расходы на какого-то стороннего адвоката, который якобы\
    \ получал деньги наличкой, притом, что документов об этом в деле вообще не было!\n\
    \nОбщая сумма взыскания составила более 200 000 рублей. Естественно, такое решение\
    \ я обжаловал в Санкт-Петербургский городской суд. В апелляции сначала началась\
    \ примерно та же история: деньги на счёт получил? Получил! Значит, какие-то услуги\
    \ оказывал! Но было видно, что коллегия сомневается и понимает, что история очень\
    \ мутная. Поэтому рассмотрение дела отложили. \n\nПеред следующим заседанием я\
    \ сделал то, что, видимо, надо было сделать с самого начала: вернул пенсионерке\
    \ эти 50 000 рублей как неосновательное обогащение. В заседании прямо сказал:\
    \ никаких договорных отношений не было, никаких услуг я не оказывал, зачем мне\
    \ когда-то закинули эти деньги на счёт — не знаю, но на всякий случай я их уже\
    \ вернул.\n\nКоллегия долго думала и в итоге приняла соломоново решение. Суд указал,\
    \ что никакого некачественного оказания услуг с моей стороны не было, но услуги\
    \ мной всё же оказывались. Поскольку от части этих услуг пенсионерка отказалась\
    \ добровольно, то я должен был вернуть ей часть не отработанного аванса. А раз\
    \ до суда я этого не сделал, то значит, с меня ещё и штраф. Сумму неотработанного\
    \ аванса вместе со штрафом коллегия аккуратно снизила ровно до тех самых 50 000\
    \ рублей, которые я уже вернул. Отдельно коллегия указала, что это их решение\
    \ исполнению не подлежит.\n\nВ сухом остатке схема выглядела так: мне на счёт\
    \ закинули 50 000, год таскали по судам и в итоге получили обратно те же 50 000.\n\
    \nС точки зрения справедливости решение интересное, потому что по итогу все разошлись\
    \ по нулям. Но с точки зрения закона оно для меня всё равно спорное. Ведь если\
    \ я вернул деньги добровольно, но при этом с требованием о добровольном возврате\
    \ ко мне никто никогда не обращался, то на каком основании с меня взыскали штраф?\
    \ Не очень понятно.\n\nПишите в комментариях, нужно ли мне идти в кассацию? И\
    \ отдельный совет всем: если вам на счёт прилетает непонятная сумма денег, лучше\
    \ не пытайтесь долго разбираться, что это было, а быстро верните её обратно."
