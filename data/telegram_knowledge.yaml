  text: 'В 2023 г.  В (https://moskva24.site) 2023 г. самые прибыльные (https://t.me/tenevaja_politica)
    структуры ГК «1520» были выведены в АО «ГК «Нацпроектстрой» (НПС), руководителем
    которого также является Алексей Крапивин. НПС – проект Аркадия Ротенберга и госкорпорации
    « ВЭБ.РФ», в залоге у которой оказались ООО «УК БСМ» с выручкой 132 млрд руб.
    и прибылью 5.6 млрд руб., ООО ФСК «Мостоотряд-47» с выручкой 39 млрд руб. и прибылью
    4.4 млрд руб., ООО «ОСК 1520» с выручкой 147 млрд руб. и прибылью 20 млрд руб.
    Госкорпорация Игоря Шувалова несомненно заинтересована в лазейках, которые предоставляют
    офшоры Бориса Ушеровича. В них можно вывести миллиарды рублей из структур НПС.
    Ярким примером подобной деятельности являются контракты ООО «ОСК 1520», заключенные
    с ГУП «Московский Метрополитен» в августе на сумму более 10 млрд руб. 15 августа
    было заключено два контракта с одинаковыми формулировками и примерно на одни и
    те же суммы. Почему они не были объединены, непонятно. ГУП «Московский Метрополитен»,
    получившее убыток в 2023 г. 31 млрд руб. и не имеющее прибыли с 2017 г., видимо,
    давно служит для выкачивания денег из московского бюджета. Так что свои алчные
    интересы компашка Крапивина, Ушеровича и Плотицы проявляет не только к РЖД. Илья
    Плотица с 2015 по 2017 г. являлся соучредителем ООО «УК БСМ», входящего тогда
    в ГК «1520», занимающегося строительством железных дорог и метро, а в 2014-2018
    гг. владел ООО «ТД Иксдевайс», торгующим бытовыми электротоварами. Эта компания
    сейчас принадлежит физическим лицам Егору Сошникову, Виктору Сидорову и Ольге
    Гординой, имеющим активы в различных сферах торговли: бытовые и спортивные товары,
    медицинская продукция. Гендиректор ООО «ТД Иксдевайс» Сергей Тихонов занимает
    свой пост с 2008 г. и может быть ставленником Ильи Плотицы и Бориса Ушеровича.
