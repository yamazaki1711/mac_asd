    квартире имели доли несовершеннолетние дети. (По данным суда, квартира была куплена
    на средства маткапитала).


    До полного расчёта квартира находилась в обременении. После получения остатка
    средств продавец сняла обременение через Росреестр.


    Позже, при передаче последней суммы (1,3 млн рублей), продавец заявила, что продала
    квартиру дёшево. Покупатель предложил ей в качестве доплаты земельный участок,
    который был оформлен отдельным договором купли-продажи от 20 июня 2022 года за
    100 тыс. рублей.


    Однако в ноябре 2023 года продавец явилась в квартиру к родителям Еврияна с уведомлением
    об освобождении жилья на основании решения суда.


    Интересно, что до сделки с Еврияном продавец заключила предварительный договор
    купли-продажи этой же квартиры с Демидовым, который внёс задаток 200 тыс. рублей.
    Сделка не состоялась, деньги Демидову не вернули. В 2025 году Демидов обратился
    в прокуратуру и выиграл суд.'
