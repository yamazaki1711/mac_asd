  text: 'В Госдуме предложили резко увеличить сроки гарантии на новостройки


    Депутаты от КПРФ внесли в Госдуму проект изменений в закон «Об участии в долевом
    строительстве», которым предлагается увеличить сроки гарантии на новостройки:


    ▪️на сами новостройки — в 6,66 раза: с трех лет до 20 лет;

    ▪️на инженерное оборудование — в 3,33 раза: с трех лет до десяти лет;

    ▪️на отделку — в пять раз: с одного года до пяти лет.


    В пояснительной записке говорится, что действующие гарантийные сроки слишком короткие
    и не позволяют выявить недостатки, допущенные при строительстве.


    #новостройка #законы


    Фото: Андрей Любимов / РБК


