  text: 'Дисциплина — это не ограничение. Это несущая конструкция.


    Три раза в неделю. Кроссфит. Без переговоров.


    Не потому, что надо. Не потому, что слежу за здоровьем. А потому что это каркас.
    И потому что я это обожаю: по-настоящему, без самопринуждения. Когда тренировка
    отменяется: командировка, болезнь, форс-мажор, я теряю ориентацию во времени.
    Начинаю путаться, какой день недели. Что-то сдвигается.


    Я долго не понимала, почему. Потом поняла: дело не в нагрузке. Дело в том, что
    регулярность создаёт структуру. А структура создаёт спокойствие. Не расслабленность,
    а именно спокойствие: ощущение, что ты управляешь своим временем, а не оно тобой.


    То же самое работает в юридической защите бизнеса.


    Компании, которые приходят ко мне с горящим контрактом или уже полученным иском,
    часто говорят одно и то же: «мы думали, что разберёмся сами». Разобрались бы.
    Если бы занимались этим регулярно, а не по ситуации.


    Абонентское обслуживание работает ровно по тому же принципу, что тренировки. Не
    когда случился кризис. Постоянно, по расписанию, без пропусков. Договоры проверяются
    до подписания. Претензии фиксируются сразу. Документы ведутся правильно с первого
    дня.


    Когда это делается регулярно, иска не возникает. Или он не страшен, потому что
    всё готово.


    Структура защищает.'
