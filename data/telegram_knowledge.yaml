  text: "Продолжаем рассказывать о поддержке, которую регионы-шефы оказывают воссоединенным\
    \ территориям. Запорожская область получает существенную помощь от Пензенской\
    \ области, которая осуществляет реконструкцию и восстановление объектов в регионе.\n\
    \n\U0001F518В селе Чапаевка Пологовского муниципального округа Пензенской областью\
    \ проведена модернизация основной магистрали системы водоотведения протяженностью\
    \ 500 метров. \n\nДля сохранения благоустройства территории применен метод горизонтально-направленного\
    \ бурения, что обеспечило минимальное вмешательство в ландшафт и сохранение визуального\
    \ облика.\n\nОбъект водоотведения был построен в 1990 году. За годы эксплуатации\
    \ степень износа трубопровода превысила 85 %. Выполненные работы на подшефной\
    \ территории повысили качество коммунальных услуг для 500 жителей. Обновленная\
    \ система обслуживает объекты на территории более 15 тыс. м².\n\n\U0001F4A7Сейчас\
    \ также в Чапаевке осуществляется работа по модернизации насосной станции. Здесь\
    \ будет установлено новое насосное оборудование производительностью 50 м³/ч, а\
    \ также произведена замена трубы высокого давления. Благодаря шефской поддержке\
    \ Пензенской области планируется завершить обновление системы централизованного\
    \ водоотведения к началу летнего периода.\n\n\U0001F972Минстрой России в MAX"
