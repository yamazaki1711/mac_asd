  text: 'Деньги заплатили, а документы — не дождались


    📍 Генподрядчик перечислил подрядчику более 302 млн руб. авансов по трем договорам
    на строительные работы. Подрядчик сроки сорвал, работы в полном объеме не выполнил,
    а на уведомления о расторжении договоров просто не ответил. Счета-фактуры на принятые
    работы так и не выставил.


    💸 Генподрядчик пошел в суд — и неотработанный аванс взыскал, а вот обязать подрядчика
    выставить счета-фактуры не смог. Три инстанции решили, что это ненадлежащий способ
    защиты права.


    👉 Верховный суд с этим не согласился: выставление счета-фактуры — безусловная
    обязанность плательщика НДС. Без этого документа генподрядчик не может получить
    налоговый вычет, а подрядчик, получивший оплату с НДС и уклоняющийся от оформления
    документов, извлекает выгоду из собственного незаконного поведения. Спор вернули
    в АСГМ.


