  text: "Как суды называют номинальных держателей имущества?\n\nЯ не раз писал о «соломенных\
    \ человечках» (Strawman) — тех, на кого оформляют имущество, чтобы спрятать его\
    \ от кредиторов. У меня есть посты и целое видео на эту тему.\n\nИ вот мне стало\
    \ любопытно: как же сами суды определяют термин «номинальный держатель»?\n\n⚖️Классические\
    \ определения судов:\n\nСуды видят номинального держателя как инструмент для вывода\
    \ активов. Номинальный держатель по версии судов – это:\n▪️Инструмент для сокрытия,\
    \ принадлежащего должнику имущества от обращения на него взыскания по требованиям\
    \ кредиторов (Постановление АС Центрального округа от 24 октября 2024 г. по делу\
    \ N А23-8/2022);\n▪️Лицо, обеспечивающее контроль имущества со стороны определённой\
    \ группы лиц, с целью извлечения полезных свойств и недопущения обращения на него\
    \ взыскания (Постановление АС Западно-Сибирского округа от 31 июля 2024 г. по\
    \ делу N А45-34150/2019).\n\nЕсть куда более интересная терминология:\nБезопасный\
    \ номинальный держатель  имущества-  лицо, не испытывающего финансовые затруднения\
    \ и (либо) не имеющее кредиторов\n\U0001F517Решение АС г.Санкт-Петербурга и Ленинградской\
    \ области от 15 марта 2023 г. по делу N А56-105463/2022. \n\n‼️Сомнительная логика.\
    \ Суд решил: если имущество переводят на того, у кого тоже есть долги — значит,\
    \ это не вывод активов. Не согласен с такой позицией:\n1️⃣Активы можно перевести\
    \ на лицо с долгами перед дружественными кредиторами;\n2️⃣Возможна легализация\
    \ имущества через процедуру банкротства такого лица с последующими торгами;\n\
    3️⃣Финансовое состояние вообще не должно быть критерием квалификации номинала.\n\
    \n\U0001F4ACВывод:\n\nУдивительно, но на уровне судебного толкования очень редко\
    \ встречается трактовка данного термина. Чаще всего она окрашена в негативную\
    \ окраску, по сути приравнивая номинального держателя к недобросовестному лицу\
    \ (встречается позиция судов о том, что такое лицо – недобросовестный приобретатель\
    \ имущества).\n\nПри этом, лично я считаю, что форма номинального держателя имущества\
    \ может быть вполне законной. Более того, законодательство считает также – это\
    \ законодательство о ценных бумагах, положения ГК РФ о доверительном управлении\
    \ и т. д.\n\nВ некоторых случаях перевод недвижимости на номинального собственника\
    \ может быть обусловлен нахождением лица за границей и отсутствием у него российского\
    \ гражданства.\n\n\U0001F4FDРанее по теме\n▫️«Оформлю имущество на жену, подругу,\
    \ маму, брата — и никто никогда его не заберёт за долги»\n▫️«Бывшие» под прицелом:\
    \ как оспаривают сделки после фиктивного развода\n\n\U0001F3F7Прочёл в законе"
