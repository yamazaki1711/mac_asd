  text: 'Ведомость объёмов работ — инструмент управления в строительстве!


    Ведомость объёмов работ (ВОР) — один из ключевых документов строительного проекта.

    Это не просто таблица с перечнем операций. Это полноценный инструмент управления,
    который влияет на смету, сроки, качество и прозрачность взаимодействия с подрядчиками.


    Важно помнить: инструмент работает только тогда, когда он качественный.

    Плохо составленная ВОР приводит к ошибкам в сметах, неверной оценке сроков и конфликтам
    с подрядчиком.


    ❗️ Почему ВОР «иногда» отсутствует в составе проектной документации?


    Формально ВОР действительно не включена в состав ПД согласно Постановлению Правительства
    РФ №87.

    Почему так — отдельная история.

    Однако существует ГОСТ 21.111-84, который можно применять при разработке ВОР —
    это подтверждено письмом Минстроя от 18.07.2017 №31983-ОГ/03.


    ⚙️ Главная причина проблем с качеством ВОР


    Основная ошибка — нарушение последовательности подготовки проектных данных:


    Чертёж → Спецификация → ВОР → Смета


    ВОР — документ, на основании которого составляется смета.

    Формировать её «задним ходом» — из сметы — категорически нельзя.

    Иначе при производстве работ возникают коллизии, расхождения и споры.


    📌 Памятка руководителю проекта


    Чтобы обеспечить качество ВОР, необходимо:


    📍Включить разработку ВОР в задание на проектирование

    По каждому разделу и каждому комплекту ПД/РД — в разрезе объектов.


    📍Требовать три формы ВОР:

    • объёмы работ

    • объёмы материалов

    • объёмы оборудования


    📍Определить формат предоставления:

    • бумажный экземпляр

    • электронный файл в формате XLSM


    📍Назначить ответственных:

    • специалист для входного контроля ВОР

    • функция администрирования и хранения (с учетом версионности)


    📑 Чек-лист для разработчика ВОР


    📍Основания и структура

    • Указывать номер ревизии чертежа, на основании которого составляется ВОР.

    • В графе «Шифр ПД/РД» — марка комплекта и номер листа с учётом изменений (Изм.).


    📍Объёмы работ

    • Объёмы работ — строго по ПД/РД, без учёта коэффициентов расхода материалов.

    • Объёмы материалов — с учётом коэффициентов, если проектом не предусмотрено иное.

    • Единицы измерения должны соответствовать СН 528-80.


    📍Материалы и условия

    • Грунт — только из согласованного с Заказчиком карьера.

    • Указывать особенности условий производства работ:

    — стеснённые условия,

    — высота,

    — под напряжением и т. д.

    • В таких случаях объёмы делят: в обычных / в специальных условиях.


    📍Оборудование и металлоконструкции

    • Указывать, какое оборудование монтируется (модель, назначение).

    • Металлоконструкции:

    — «Изготовление на площадке строительства и монтаж…» — если изготавливаются на
    площадке.

    — «Монтаж м/к заводского изготовления…» — если используются готовые элементы.


    📍Формулы и расчёты

    В графе «Формула расчёта…» обязательно приводить:

    • пояснения,

    • формулы,

    • расчётные основания, которые подтверждают заявленные объёмы работ и материалов.


    🎯 Для общего понимания


    Ведомость объёмов работ — критически важный инструмент управления строительным
    проектом.

    Если формировать её формально или «задним ходом», проект неизбежно столкнётся
    с ошибками.

    Качественная ВОР:

    • делает смету точнее,

    • упорядочивает расчёт сроков,

    • повышает прозрачность взаимодействия,

    • снижает риск невыбранных объёмов работ по договору.'
