  text: "Ледниковый период, ядерный взрыв или всемирный потоп: морской тихоход-медвежонок\
    \ переживёт всё \n\nНе перестаю поражаться эволюционным шедеврам природы. Тардиграда,\
    \ более известный как Водяной медведь точно мог бы стать персонажем фантастического\
    \ фильма, но он обитает в реальных океанах. \n\nНа первый взгляд это микроскопическое\
    \ (0,1–1,5 мм) существо с неуклюжими лапками и улыбчивой мордочкой выглядит милым,\
    \ но за этой внешностью скрывается абсолютный чемпион по выживанию.\n\nВот несколько\
    \ фактов о нём:\n\n▪️ Тардиграды — единственные существа на Земле, которые могут\
    \ выжить в открытом космосе. В 2007 году их отправили на орбиту в рамках эксперимента\
    \ FOTON-M3. Они провели 10 дней в вакууме, под смертельным космическим излучением,\
    \ и вернулись на Землю... живыми и здоровыми.\n\n▪️Когда условия становятся невыносимыми\
    \ (нет воды, холодно или жарко), водяной медведь впадает в анабиоз. Он втягивает\
    \ лапки, высушивается до состояния бочонка (теряя до 97% воды!) и практически\
    \ умирает. Его метаболизм замедляется до 0,01% от нормы. В таком виде он может\
    \ находиться десятилетиями. Стоит капнуть водой — и он \"воскресает\" и идёт дальше\
    \ по своим делам.\n\n▪️Учёные ставили над ними эксперименты, которые уничтожили\
    \ бы любое другое животное. Тардиграды выдерживают:\n\n✔️ Температуру: от -272\
    \ °C до +150 °C.\n✔️ Давление: в 6 раз выше, чем на дне Марианской впадины.\n\
    ✔️ Радиацию: дозы, в 1000 раз превышающие смертельную для человека.\n✔️ Голод:\
    \ без еды десятилетиями (в состоянии криптобиоза).\n\n◾️Учёные, расшифровав геном\
    \ тардиград, обнаружили удивительную вещь: около 17,5% их ДНК — заимствовано у\
    \ других организмов (в основном у бактерий, грибов и растений). Это называется\
    \ горизонтальным переносом генов. Они буквально воруют чужие гены, чтобы становиться\
    \ еще выносливее.\n\nНа лапках у медвежат есть крошечные коготки. Питаются они,\
    \ прокалывая клетки водорослей или мха и высасывая их содержимое.\n\nТеперь вы\
    \ знаете, кто будет бродить по свету, если случится какая-нибудь катастрофа \U0001F609"
