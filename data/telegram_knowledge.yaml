  text: "Мошеннический кредит: почему аргумент банка про отпечаток пальца не работает\n\
    \nНа канале есть пост, который посвящён правовым позициям по оспариванию кредитов,\
    \ которые оформлены мошенниками.\n\n\U0001F3DBВерховный Суд РФ последовательно\
    \ занимает позицию о том, что оформление онлайн-кредита через СМС или пуш от приложения\
    \ (простая электронная подпись) — это недостаточный способ проверки клиента.\n\
    \nВ феврале этого года на совещании совета судей была озвучена такая позиция высшей\
    \ инстанции.\nПозиция судебной коллегии такова: кредитные договоры, оформленные\
    \ мошенниками через украденные доступы или СМС-коды, являются ничтожными, так\
    \ как у гражданина отсутствовала воля на заключение сделки, кредит считается непредоставленным.\n\
    \n\U0001F517Источник\n\nЕсли всё упростить, то ВС РФ и ЦБ РФ рекомендуют банкам\
    \ использовать биометрию для оформления онлайн-кредитов. Именно поэтому, видимо,\
    \ некоторые банки так активно пытаются её от нас получить.\n\nНесмотря на такие\
    \ рекомендации, кредиты продолжают оформлять посредством обычной СМС-ки. И знаете,\
    \ как банки пытаются доказать, что пользователя идентифицировали надлежащим образом?\n\
    \n❗️Они заявляют о том, что заёмщик вошёл в банковское приложение с помощью отпечатка\
    \ пальца. И якобы это и есть та самая биометрия.\n\nА теперь смотрите, как легко\
    \ этот аргумент опровергнуть.\n\nНа примере двух систем.\n\n\U0001F34FApple и,\
    \ следовательно, устройства на iOS\nДля обеспечения максимальной безопасности\
    \ приложение никогда не получает доступа к базовым данным аутентификации. Приложение\
    \ не может получить доступ к изображениям отпечатков пальцев.\n\n\U0001F517Вот\
    \ официальная информация об этом.\n\n\U0001F4F1Android устройства\nОтпечаток пальца\
    \ на Android-устройствах хранится в специальной защищённой области процессора\
    \ — Trusted Execution Environment (TEE). Данные зашифрованы, изолированы от основной\
    \ ОС и не могут быть экспортированы или прочитаны каким-либо приложением.\n\n\U0001F517\
    Вот официальная информация об этом.\n\n\U0001F51CТо есть данные отпечатка пальца\
    \ не передаются самому банку. Они служат только ключом для приложения. Не говоря\
    \ о том, что в устройство может быть внесено несколько отпечатков пальцев и даже\
    \ отпечатки разных людей, но банк никак не сможет это установить.\n\nОднако банки\
    \ в судах, в попытке доказать, что установили личность, ссылаются на вход в приложение\
    \ по отпечатку пальца.\n\nC Face Id к слову ситуация аналогичная.\n\nПоэтому,\
    \ если столкнулись с таким спором, доносите до суда, что отпечаток пальца для\
    \ входа в приложение — это не биометрия, и банк никак не идентифицирует человека\
    \ по такому входу. \n\nЧасто стороны в процессе рассчитывают на то, что суд не\
    \ будет разбираться в технических деталях. Задача юриста — эти детали объяснить\
    \ просто и понятно. \n\nИногда всё опровергается не сложной экспертизой. Иногда\
    \ лучший аргумент в суде — это просто прочитать то, что написано на сайте производителя.\n\
    \n\U0001F4FDРанее по теме:\n▫️А что с кредитами, оформленными мошенниками?\n\n\
    \U0001F3F7Прочёл в законе\n\nРезервный канал в MAX |ВК"
