  text: "«САМОЛЕТ СЕРВИС» УЛЕТЕЛ\n\nПошутили и хватит, теперь о серьёзном. Знаете,\
    \ как выглядит уклонение от ответственности в одном предложении? «Залитие произошло\
    \ с вышерасположенной квартиры». Всё. Именно это наш клиент увидел в акте от «Самолет\
    \ Сервис» после того, как его квартиру затопило сверху. Вместо причины и конкретики\
    \ одна отписка. Управляющая компания просто сделала вид, что выяснять источник\
    \ не её задача.\n\nМы подали иск в суд к собственнику вышерасположенной квартиры\
    \ и к управляющей компании. В процессе выяснилось, что ответственность управляющей\
    \ компании застрахована, поэтому в дело привлекли и страховую.\n\nПозиция управляющей\
    \ компании смешная: «Мы не виноваты, а истец сам должен обойти все квартиры сверху\
    \ и найти виновного». Но «Самолет Сервис» явно забыл про пункт 4 статьи 13 Закона\
    \ о защите прав потребителей: доказывать, что услуги оказаны нормально и обязательства\
    \ исполнены, должна именно управляющая компания.\n\n«Самолет Сервис» сам запросил\
    \ экспертизу, видимо рассчитывая, что спустя 1,5 года ничего не установят. Но\
    \ экспертиза установила: причина залития – конденсат в вентиляционном коробе,\
    \ который стекал в квартиру. А конденсат появился из за проблем с вентиляцией.\
    \ Это общедомовое имущество и зона ответственности управляющей компании.\n\nСуд\
    \ удовлетворил иск и взыскал с ООО «Самолет Сервис» деньги в пользу нашего клиента.\n\
    \nВывод простой – не берите на себя чужую работу, знайте свои права, а если нужна\
    \ помощь, лучше сразу подключать грамотных юристов.\n\nЮридическая компания \"\
