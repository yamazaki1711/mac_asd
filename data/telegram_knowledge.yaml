  text: "Увидели разбор истории с «Самолетом» в новой статье «Лeнта.pу» о том, как\
    \ информационные атаки рушили капитализацию российских компаний\n\nТам также упоминаются\
    \ такие компании, как «Магнит», VK, «Полюс», «Северсталь» и НЛМК.\n\nЖурналисты\
    \ разобрали негатив о застройщике, который активно вбрасывают на протяжении последних\
    \ двух лет, искажая цифры и факты о бизнесе компании. В результате с ноября 2024\
    \ года по ноябрь 2025-го акции «Самолета» упали на 66% — сильнее, чем у всех конкурентов\
    \ по отрасли. Это при том, что 24-й год для компании был весьма успешным - первое\
    \ место по объемам строительства, выход в новые регионы, запуск крупных загородных\
    \ проектов. На этом фоне и началась первая волна негатива в адрес застройщика.\n\
    \n«Апогей случился в начале февраля 2026 года, когда одномоментно в самых охватных\
    \ СМИ всплыла информация о письме \"Самолета\"в правительство с просьбой о поддержке.\
    \ При этом, как утверждали в компании, письмо было написано еще в январе»,— пишут\
    \ в статье.\n\nВ итоге компания столкнулась с информационной атакой, в которой\
    \ были использованы одни из самых охватных тг-каналов и СМИ. Хотя, как мы писали\
    \ и до, и после случая с «Самолетом» компании из различных отраслей обращались\
    \ за господдержкой. При этом уже в конце февраля Минфин признал положение застройщика\
    \ устойчивым и не выявил критических проблем. \n\nВ целом, и сами не раз замечали\
    \ в инфополе странные новости о компании, не имеющие отношения к реальному положению\
    \ дел. Надо ли говорить, что такие вбросы вредят вообще-то всей отрасли.\U0001F914"
