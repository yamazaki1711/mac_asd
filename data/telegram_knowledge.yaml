  text: "Конец 2025 ознаменовал для меня расширение собственных границ. \nЯ регулярно\
    \ выбираю идти туда, куда идти моей психике дискомфортно. Психологи часто говорят,\
    \ что там скрывается рост, и мой опыт показывает, что не врут.\n\nВыбор в сторону\
    \ развития личного бренда, творческой активности, съёмок и проявленности дополнил\
    \ мою реальность, сотканную в основном из интеллектуального труда, новыми красками.\
    \ Я ощутил некоторый личностный рост, поэтому конец 2025 и начало 2026 запомнится\
    \ расширением внутренних границ, преодолением незримых барьеров;)\n\nЯ знаю, что\
    \ моя аудитория — это люди, связанные с девелопментом, люди больших масштабов,\
    \ идейные по своей сути. В общем, настраиваясь на 2026, я хочу пожелать нам не\
    \ бояться пробовать новое. Если мы чувствуем, что какая-то деятельность вызывает\
    \ интерес, притягивает наше внимание — не игнорировать это, проявляться. В этом\
    \ познании жизни через новый опыт, навыки и углы зрения скрывается множество радостных\
    \ открытий.\n\nА это съёмки с моего второго подкаста, всё приходит с опытом, чувствовал\
    \ себя уже намного свободнее. Возможно, успею показать вам его перед НГ. Кстати,\
    \ много говорили о том, что в Российском медиа мало лидеров мнений от девелопмента,\
    \ для многих до сих пор это слово означает какого-то невиданного зверя, будем\
    \ исправлять! Поздравляю всех с наступающим! ❤️‍\U0001F525\U0001F384"
