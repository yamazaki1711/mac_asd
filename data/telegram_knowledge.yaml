  text: '⚖️ Когда предписание органа финансового контроля будет признано необоснованным
    вмешательством в хозяйственную деятельность заказчика?


    В рамках осуществления финансового контроля в сфере бюджетных правоотношений Министерство
    провело проверку закупочной деятельности заказчика и вынесло предписание. Ведомство
    потребовало от заказчика устранить недостатки, связанные с претензионной работой,
    заключением дополнительных соглашений к контрактам. Заказчик с предписанием не
    согласился и обжаловал его в суде.


    Суд признал отдельные пункты предписания недействительными.


    🔻Какие действия заказчика не образуют нарушения?


    1. Пени следует рассчитывать до момента фактической сдачи результата работ, а
    не до размещения приёмки в ЕИС


    Акт приёмки по факту готовности объекта подписан ранее, чем оформлена справка
    о стоимости выполненных работ и размещены сведения о приёмке в ЕИС. Заказчик не
    обязан включать в период просрочки временной отрезок между датами этих документов.
    Подобное требование контролёров неправомерно.


    Справка и приёмка формируются и размещаются в ЕИС позднее даты фактической сдачи
    – приёмки результата работ, что не образует дополнительной просрочки со стороны
    подрядчика.


    2. Техническая ошибка в документах, оформленных подрядчиком, является основанием
    для начисления неустойки. Но при наличии условий для списания заказчик не обязан
    взыскивать её в судебном порядке


    Предписание в части, обязывающей заказчика предъявить неустойку ко взысканию с
    подрядчика через суд, в этом случае будет незаконным, тем более, если контролёрам
    сообщили об устранении технической ошибки до вынесения указанного акта и имеются
    основания для списания штрафных санкций.


    В данном случае подрядчик в гарантийных паспортах на товары указал срок гарантии
    меньше положенного по ГОСТ, но устранил ошибку до выдачи предписания. Размер начисленной
    неустойки по факту данного нарушения не превысил 5 % от стоимости контракта.


    3. Корректировка графика производства работ сама по себе не означает, что стороны
    поменяли существенные условия контракта


    Дополнительным соглашением к контракту стороны уточнили детализированный график
    производства работ.


    При этом срок окончания работ фактически не изменился, а скорректирован только
    план подрядчика, по которому он намеревается производить работы. Это не указывает
    на изменение существенных условий контракта. Значит, и не образует нарушений со
    стороны заказчика.


    Суды отметили, что при данных обстоятельствах подобные претензии контролёров –
    результат необоснованного вмешательства в хозяйственные отношения заказчика с
    его контрагентами.


    В части этих пунктов предписание признаётся недействительным. #контроль


    Документ: Постановление АС Уральского округа от 01.04.2026 по Делу № А07-12894/2024


    Источник: ЭТП «Фабрикант»'
