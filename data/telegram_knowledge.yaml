  text: 'Цифра, план и 428 рублей


    Замглавы Администрации Президента Максим Орешкин тут на примере московского такси
    неожиданно сформулировал то, о чём многие в стройке давно догадывались. Мол, без
    цифровых платформ поездки стоили бы в три раза дороже, а так алгоритм всё посчитал
    и назначил цену:

    Происходит возврат и реинкарнация плановой экономики «в лучшем ее виде»… Система
    говорит, что вы поедете за 428 рублей — значит вы поедете за 428 рублей.

    Строители наверняка горько улыбнулись. Потому что в отрасли это уже давно называется
    государственным ценообразованием. Только вместо платформы такси — цены строительных
    ресурсов определяются централизованно во ФГИС ЦС,  регулярно и достоверно. Плановая
    экономика говорит: бетон стоит 100, арматура — 200, экспертиза — 428. Ой, нет,
    тут подороже. Предложение то ведь одно. И ты не выбираешь, а подчиняешься системе.
    Алгоритму на основе «данных». И выбирать будут не цену. А как объяснить, почему
    она опять не совпала с реальностью методиками и приказами.


    Кстати, про цифру и план. Ещё в декабре глава Игорь Манылов на площадке Совета
    Федерации довольно откровенно описал, к чему всё идёт — анализ проектно-сметной
    документации, статистика по ресурсам, прогноз структуры строительства. И добавил
    ключевую фразу:

    Это фактически Госплан Советского Союза.

    Только теперь на базе XML:

    1️⃣ отрасль генерирует машиночитаемые данные

    2️⃣ данные собираются в системе

    3️⃣ система анализирует ресурсы и цены

    4️⃣ система говорит: «этот объект должен стоить столько»


    То есть нам уже прямо говорят: никакого рынка нет. Есть тысяча ПСД, есть некие
    данные о ресурсах, и теперь цифровой Госплан решает: сколько вам строить, из чего
    и почём. Плановая экономика, только с API сервисами ГГЭ.


    И вот тут вспоминается ещё один эпизод с тем же Максимом Орешкиным. На Восточном
    экономическом форуме в 2024 году он рассказывал о полезной практике: как специально
    ездил по Владивостоку на такси эконом-класса, чтобы поговорить с водителем. И
    узнал много интересного: про губернатора, про город, про то, что не построено.


    В связи с этим, хочется пожелать тем, кто управляет стройкой из «цифрового Госплана»,
    чаще садится в такси эконом-класса: чтобы послушать, что говорят заказчики, проектировщики,
