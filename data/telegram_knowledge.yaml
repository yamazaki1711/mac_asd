  text: '❓ Какие частые ошибки бывают в разделе  📋📋📋 , из-за которых могут отказать
    в приемке документов на экспертизу


    ➡️ Название объекта не  соответствует названию, приведенному в задании на проектирование.
    Данную ошибку очень часто допускают по банальной невнимательности. Запятые, окончания,
    заглавные буквы и т.д. должны быть один в один такие же, как указаны в задании
    - никакие изменения не допускаются.

    ➡️ Шифр, номер и том раздела ПОС не  соответствуют составу проектной документации.
    Также одна из распространенных ошибок, допускаемых по невнимательности.

    ➡️ В графической части отсутствует календарный план. Для бюджетных объектов, календарный
    план должен разрабатываться на основании сметной документации. Смета обычно выполняется,
    когда уже полностью готовы все разделы и очень распространенная ситуация, когда
    при сдаче проектной документации на экспертизу, смет нет, либо они совсем «сырые».
    В этом случае календарный план можно разработать в упрощенной форме, без распределения
    капитальных вложений по периодам, а уже в процессе прохождения экспертизы откорректировать.

    ➡️ Графическая часть проекта выполнена не в полном объеме. В случае необходимости
    сноса существующих на земельном участке зданий, строений и сооружений в графической
    части приводятся: план земельного участка и прилегающих территорий с указанием
    места размещения сносимого объекта, сетей инженерно-технического обеспечения,
    зон развала и опасных зон в период сноса объекта с указанием мест складирования
    разбираемых материалов, конструкций, изделий и оборудования; чертежи защитных
    устройств инженерной инфраструктуры и подземных коммуникаций; технологические
    карты-схемы последовательности сноса строительных конструкций и оборудования.

    ➡️ Указаны ошибочные ТЭП. Как правило, при расчете продолжительности строительства,
    указывается расчетный показатель (строительный объем, площадь, мощность и т.д.),
    который должен соответствовать данным, приведенным в смежных разделах и задании
    на проектирования.'
