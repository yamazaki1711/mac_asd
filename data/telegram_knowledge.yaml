  text: '⚖️ Заказчик установил срок заключения договора по результатам аукциона, отличный
    от предусмотренного законом. Суды разбирались в правомерности таких действий (Закон
    № 223-ФЗ)


    Заказчик по Закону № 223-ФЗ проводил аукцион в электронной форме. В документации
    он предусмотрел пятидневный срок подписания договора победителем. Аналогичное
    условие было закреплено в положении о закупке заказчика.


    Победитель в течение 5 дней не подписал договор и был признан уклонившимся от
    его заключения. УФАС отказалось включать компанию в РНП, не усмотрев признаков
    недобросовестности. Заказчик решил оспорить позицию антимонопольного органа в
    суде.


    Суды согласились с УФАС и указали:


    ● договор по результатам конкурентной закупки заключается не ранее чем через 10
    дней и не позднее чем через 20 дней с даты размещения в ЕИС итогового протокола
    (ч. 15 ст. 3.2 Закона № 223-ФЗ);

    ● несмотря на специальный порядок заключения договора, установленный положением
    о закупке, заказчик не вправе принимать решение о признании победителя уклонившимся
    от подписания договора до истечения 10-дневного срока, предусмотренного законом;

    ● положение о закупке - локальный нормативный акт, позволяющий детализировать
    порядок проведения закупок в организации. Но оно не может противоречить федеральному
    законодательству.


    Протокол о признании победителя уклонившимся размещён до истечения 10 дней. Тем
    самым компанию лишили возможности подписать договор в срок, установленный законом.
    О недобросовестности участника в этой ситуации говорить нельзя.


    Таким образом, заказчик сам допустил нарушение Закона № 223-ФЗ. #223фз


    Документ: Постановление АС Московского округа от 03.04.2026 по Делу № А40-109553/2025


    Источник: ЭТП «Фабрикант»'
