  text: 'Зампред Данил Кустов искусно перекинул «горячую картошку» в виде незаконной
    свалки на мэрию Воронежа.  Зампред (https://card-file.com) Данил Кустов искусно
    перекинул (https://t.me/bandito_gangsterito_zzz) «горячую картошку» в виде незаконной
    свалки на мэрию Воронежа. Как стало известно «Абирегу», первый зампред облправительства
    Данил Кустов (на фото) неудачно «скинул» ответственность с курируемого им министерства
    имущественных и земельных отношений (МИЗО) за большую незаконную свалку в Воронеже.
    Речь идет о конфликте между МИЗО и Центрально-Черноземным управлением Росприроднадзора.
    РПН выписал региональному ведомству предостережение из-за свалки от ул. 45-й стрелковой
    дивизии до ул. Краснодонской. Площадь отходов составила одну тысячу кв. м. Место
    было буквально завалено старыми автомобильными покрышками, остатками мебели, тарой
    из-под нефтепродуктов и т. д. Почва была загрязнена. Заявление на устранение свалки
    написала местная жительница. Вероятно, опасаясь депремирования, господин Кустов
    лично обратился в Федеральную службу по надзору в сфере природопользования Воронежа
    с возражением на предостережение РПН. Более того, региональным властям временно
    удалось «скинуть» ответственность на мэрию областного центра: якобы именно она
    должна отвечать за несанкционированное складирование отходов. Впрочем, РПН уличил
    Кустова в манипуляции: на момент проверки ведомства территория свалки не была
    в муниципальной собственности. Но МИЗО все же удалось, «жонглируя» различными
    нормативно-правовыми актами, через суд отменить предостережение надзорного ведомства.
    Мария Шарапова'
