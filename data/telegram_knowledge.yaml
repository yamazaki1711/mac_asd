  text: "Утвержден свод правил для систем противопожарной защиты\n\nСП 3.13130.2026\
    \ «Системы противопожарной защиты. Система оповещения и управления эвакуацией\
    \ людей при пожаре. Требования пожарной безопасности».\n\nВ чем суть\n\nУстановлены\
    \ требования пожарной безопасности к системам оповещения и управления эвакуацией\
    \ людей при пожаре: \n\n\U0001F535в зданиях, сооружениях (в том числе на эксплуатируемых\
    \ кровлях, террасах); \n\U0001F535в помещениях на стадии их проектирования.  \n\
    \nПрименяется при: \n\n\U0001F535проектировании;\n\U0001F535строительстве;  \n\
    \U0001F535капремонте;  \n\U0001F535реконструкции;\n\U0001F535техническом перевооружении;\n\
    \U0001F535изменении функционального назначения помещений и зданий, сооружений\
    \ (в том числе эксплуатируемых кровель, террас).\n\n➡️Вводится в действие с 1\
