  text: '«Первое слово дороже второго»: может ли суд так писать?


    Арбитражный суд Московского округа в деле № А40-146414/2023, объясняя применение
    правила «эстоппель», использовал выражение:

    Суд округа полагает, что в данном случае действует правило: первое слово дороже
    второго


    Использование пословиц в российских судебных актах — редкость, поэтому среди юристов
    судебный акт стал обсуждаемым.


    💬Коллеги разделились на два лагеря:


    ✅Те, кто считает, что это нормально и делает судебный акт разнообразнее и понятнее.
    Некоторые вспоминают, что подобные выражения используются в судебных актах США
    и Англии


    ❌Те, кто считает, что суд не может так писать. Подобное просторечное выражение
    неприменимо


    💬Выражу своё мнение: подходит ли пословица к делу?


    Эстоппель в российском праве — это запрет противоречивого поведения. Лицо утрачивает
    право ссылаться на обстоятельства, которые существенно противоречат его предшествующему
    поведению.


    Следовательно, поговорка содержательно точна. В данном случае — это метафора,
    которая схватывает суть правового принципа.


    🌍Что в других странах?


    В США и Англии действительно часто используют крылатые выражения, цитаты из книг,
    кино и разные отсылки.


    Зачастую это, действительно, довольно сложный и продуманный «юридический креатив».
    Чего стоит только то, как написан судебный акт по делу Stambovsky v. Ackley —
    решение написано с литературным изяществом и рядом отсылок.

    ​

    Однако встречаются вполне простые выражения, которые сложно назвать значимым «юридическим
    креативом».


    📂Вот некоторые из них.


    Дело Kimble v. Marvel Entertainment (2015). Суд использует культовую фразу дяди
    Бена:

    С большой силой приходит большая ответственность


    Дело против компании AT&T. Один из судей в «Особом мнении» использовал фразу:

    Когда у тебя ничего нет, тебе нечего терять


    ↪️Это строчка из песни Боба Дилана 1965 года — Like a Rolling Stone


    Допустим, что такие выражения можно назвать высокоинтеллектуальными, но давайте
    посмотрим на другие.


    📄Вот несколько широко популярных выражений в судебных актах английских судов:


    Что хорошо для гуся, то хорошо и для гусака.


    ↪️Эта английская идиома стала целым судебным клише. О ней и о других можно прочитать
    тут. Там ещё встречаются такие выражения, как: «cut her coat accordingly», которое
    по смыслу означает «жить надо по средствам».


    Сам заварил кашу – сам и расхлёбывай


    ↪️Считается, что это весьма популярное выражение в судебных актах. Вот пример
    дела с ним.


    Что и говорить, на канале я однажды писал о том, как суд цитировал сказку.


    ❓Хорошо ли это или плохо?


    Допустимо ли употребление такого выражения, как «Первое слово дороже второго»?
    Смотрите сами:


    🔵Данное выражение выполняет функцию объяснения правового принципа через знакомое
    выражение.

    🔵Выражение как метафора содержательно точно применяемому принципу.

    🔵Выражение дополняет правовую аргументацию.


    Возможно, что пока это не так изящно, как умеют делать коллеги из других стран,
    но я не считаю это закатом российского права.


    Если мы хотим, чтобы наше юридическое письмо становилось изящнее и понятнее, то
    такие попытки надо поощрять, а не критиковать.


    Критика и насмешки лишь приведут к тому, что судьи продолжат следовать скупому
    и скучному канцеляриту, а не будут давать себе волю на творчество.


    📽Ранее по теме

    ▫️Как суд сказку цитировал


    🏷Прочёл в законе'
