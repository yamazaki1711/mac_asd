  text: '‼ Фраза "зажравшихся бизнесменов" не порочит деловую репутацию 👇


    🔥 Потому что это всего лишь субъективное мнение, а не утверждение о фактах...
    А еще речь идет о выражениях "прибрали к рукам" и т.д. Более того, в мотивировочной
    части суды сослались на позицию ЕСПЧ.


    🎞 Гражданин опубликовал в соцсети видеоролики, посвященные критике местной энергетической
    компании и ее владельцев. Соцсеть и автор отказались удалять спорные видеоролики,
    и компания обратилась в суд.


    📌 Формулировка иска


    ✏ О признании сведений не соответствующими действительности и порочащими деловую
    репутацию


    📌 Позиции судов


    🔵 Первая инстанция иск удовлетворила.

    ⚖ Апелляция и кассация, включая СКЭС ВС РФ, в иске отказали.


    ✍ Следует различать имеющие место утверждения о фактах, соответствие действительности
    которых можно проверить, и оценочные суждения, мнения, убеждения, которые не являются
    предметом судебной защиты в порядке ст. 152 ГК РФ (ст. 29 Конституции, ст. 10
    Конвенции о защите прав человека и основных свобод).


    🍿 Являясь выражением субъективного мнения и взглядов ответчика, фразы не могут
    быть проверены на предмет соответствия их действительности (абз. 3 п. 3 ПП ВС
    РФ от 24.02.2005 г.  № 3).


    📹 Проанализировав содержание оспариваемых видеозаписей, их словесно-смысловую
    конструкцию и содержательно-смысловую направленность, характер и способ изложения
    материала, суд пришел к выводу о том, что спорные фразы являются выражением личного
    мнения и оценочными суждениями, не содержат информацию, порочащую деловую репутацию
    непосредственно компании.


    💼 Комментарий юристов "Реаналитики":


    🧩 Данный кейс можно считать показательным, но все же споры о защите деловой репутации
    весьма индивидуальны – и важную роль может сыграть вся совокупность факторов,
    а не какие-то отдельные фразы.


    🧩 Полное текстовое содержание спорных частей видеоролика можно прочитать по ссылке
    на судебное постановление.


    🔍 Определение ВС РФ от 11.09.2024 г. по делу № А56-116511/2021

    https://m.kad.arbitr.ru/Card/867c7821-45e7-4de3-81a5-7908531ca9b0


    ⁉ Как Вы думаете, справедлив ли такой подход?


    👍 – Конечно.

    🤔 – Нет.


