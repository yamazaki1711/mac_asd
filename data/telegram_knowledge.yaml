  text: "П, Р, ППР и бесконечные «поясните как делать»: где заканчивается РД и начинается\
    \ ППР \U0001F477‍♂️\n\nЭто боль многих коллег-проектировщиков \U0001F629\n\nЗаказчик\
    \ просит, чтобы П была как Р,\nР — «поподробнее»,\nа в РД — «пояснить, как крепить,\
    \ чем крепить, на какое усилие затягивать и в какой последовательности выполнять\
    \ работы».\n\nГде в таком случае заканчивается рабочая документация и начинается\
    \ ППР❓\n\nПопробуем разобрать⬇️\n\n1️⃣ Стадия П: даже если детализирована — это\
    \ не Р\nДа, особенно в проектах со сметами и в госконтрактах, некоторые решения\
    \ приходится прорабатывать на уровне рабочей документации:\n• подробные узлы,\n\
    • детализированный состав элементов,\n• принципиальные сопряжения,\n• точность\
    \ объёмов для смет.\n\nЭто объективная необходимость для:\n• обоснования стоимости,\n\
    • прохождения экспертизы,\n• подтверждения реализуемости решений.\n\nНо принципиально\
    \ важно:\nВысокая степень детализации стадии П\nне придаёт ей статуса рабочей\
    \ документации\nи не даёт права использовать её для производства работ\n\nП может\
    \ выглядеть как Р.\nНо юридически ею не становится.\n\n2️⃣ Рабочая документация:\
    \ «что строить», а не «как держать молоток»\nРабочая документация должна позволять\
    \ построить объект квалифицированному подрядчику.\nОна раскрывает:\n• проектные\
    \ решения,\n• узлы,\n• схемы,\n• спецификации.\n\nНо РД не обязана:\n• описывать\
    \ технологию выполнения работ,\n• расписывать последовательность действий,\n•\
    \ определять усилие затяжки хомутов,\n• заменять технологические карты,\n• компенсировать\
    \ низкую квалификацию строителей.\n\nЕсли в каждом замечании звучит «указать,\
    \ пояснить, разъяснить, как делать» —\nэто уже территория ППР.\n\n3️⃣ ППР — это\
    \ не «дополнение к рабочке», а отдельный документ\nПроект производства работ разрабатывается\
    \ подрядчиком (или по его заказу) и ППР определяет:\n• технологию,\n• последовательность,\n\
    • организацию,\n• временные схемы,\n• методы крепления и монтажа,\n• меры безопасности.\n\
    \nИ перекладывать эти функции на проектировщика — юридически неправильно.\n\n\
    4️⃣ Но и прикрываться ППР нельзя\nВажно честно обозначить и обратное.\nЕсли в\
    \ РД:\n• не раскрыты принципиальные узлы,\n• отсутствует логика сопряжений,\n\
    • проектное решение сформулировано «в общем виде» —\nотправлять заказчика «разрабатывайте\
    \ ППР» — тоже некорректно.\n\nГраница следующая:\n• что строить — П и Р\n• как\
    \ строить — ППР\n\n5️⃣ Почему конфликт повторяется снова и снова\nЧаще всего причина\
    \ не в нормах, а в управлении:\n• подрядчик слабый,\n• стройка идёт параллельно\
    \ проектированию,\n• сроки горят,\n• ответственность размыта.\n\nПроще расширить\
    \ зону ответственности проектировщика,\nчем менять подрядчика или выстраивать\
    \ дисциплину ППР.\nИ если границы не закреплены договором и ТЗ —\nих будут расширять\
    \ бесконечно\n\nМоя позиция\n• Я за качественную рабочую документацию.\n• Я за\
    \ достаточную проработку узлов.\nИ да, в проектах со сметами П иногда вынужденно\
    \ выглядит как Р.\n❗️Но:\n• РД — не ППР;\n• детализация П не делает её рабочей;\n\
    • проектировщик не обязан компенсировать низкую квалификацию рабочих на строительной\
    \ площадке.\nПроблема не в количестве узлов и их деталировки. \n\nПроблема — в\
    \ том, что все хотят снять риски, но не все готовы признать свою зону ответственности\n\
    Если тема откликается — ставьте реакции ❤️\U0001F44D\U0001F525\n\nЕсли у вас получилось\
    \ выстроить границу между П, Р и ППР без конфликтов — делитесь опытом в комментариях\
    \ \U0001F4AC"
