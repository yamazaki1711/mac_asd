    позиции, ранее выраженной ведомством в письме от 21.03.2025 № 28/26176/25 о том, объект
    закупки должен быть сформирован под нескольких производителей так, чтобы товар
    отвечал требованиям извещения.


    В то же время ФАС России обращает внимание, что действующим законодательством
    РФ в сфере закупок не предусмотрена обязанность заказчика формировать описание
    объекта закупки таким образом, чтобы по совокупности характеристик под него подходило
    как минимум два производителя, сведения о продукции которых содержатся в реестре
    промышленной продукции. #ФАС #ТЗ


    Документ: Письмо ФАС России от 20.04.2026 № 28/37252/26


