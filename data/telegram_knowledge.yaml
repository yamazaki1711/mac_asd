  text: 'Дайджест изменений в законодательстве. Май 2026 года


    Собрали подборку изменений, которые вступают в силу в мае.


    🏷 Изменили правила судебной кассации


    Кассационные жалобы и представления на решения мировых судов будут рассматривать
    не КСОЮ, а вышестоящие судебные инстанции по отношению к районным судам и мировым
    судьям в регионе. Это может быть верховный суд республики, краевой, областной
    суд, суд города федерального значения, суд автономной области, суд автономного
    округа.


    Если стороны решат обжаловать судебные акты, дело будут рассматривать в таком
    порядке:


    🔵мировой суд – первая инстанция;

    🔵районный суд – апелляция;

    🔵президиум регионального суда – выборочная кассация;

    🔵Верховный суд – вторая выборочная кассация.


    Такой порядок следует из положений Федерального конституционного закона от 09.04.2026
    № 1-ФКЗ.


    Сейчас для обжалования дела в кассационной инстанции гражданам нужно обращаться
    в один из девяти КСОЮ в стране. Новый подход сделает правосудие более доступным:
    подать кассационную жалобу можно будет в пределах своего региона.


    Кассация рассмотрит не всякую жалобу: теперь они будут проходить предварительный
    фильтр. Порядок рассмотрения утвердят в новой главе ГПК. Судья регионального суда
    изучит жалобу или представление, прежде чем передать ее для рассмотрения президиуму
    или отказать в передаче, если отсутствуют основания для пересмотра судебного постановления
    в кассационном порядке.


    Новые правила касаются гражданских, административных и уголовных дел, а также
    дел об административных правонарушениях.


    Требования к форме и содержанию, а также срокам на подачу остаются прежними. Изменения
    вступают в силу 10 мая.


    Основание: Федеральный конституционный закон от 09.04.2026 № 1-ФКЗ, федеральные
    законы от 09.04.2026 № 78-ФЗ, № 79-ФЗ и № 80-ФЗ.


    🏷 Установили правила назначения пособий для многодетных семей, если их доход превысил
    прожиточный минимум


    Если при переоформлении выплаты среднедушевой доход семьи с детьми младше 17 лет
    превысит прожиточный минимум не более чем на 10 процентов, то право на пособие
    сохранят. При этом его размер составит 50 процентов прожиточного минимума для
    детей. Такую возможность предоставят однократно за весь период, в течение которого
    семья получает выплаты. Доход рассчитают за последний месяц периода, на который
    назначили пособие, либо за три месяца, которые следуют за месяцем окончания выплат.


    Действующий закон такое исключение не предусматривает. Размер пособия определяют
    в зависимости от степени нуждаемости по стандартной шкале.


    Поправки внесли в Федеральный закон от 19.05.1995 № 81-ФЗ. Изменения вступают
    в силу 22 мая.


    Основание: Федеральный закон от 20.02.2026 № 29-ФЗ.


