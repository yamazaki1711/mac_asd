  text: "‼ Обычная ошибка в правовой природе требования чревата пропуском исковой\
    \ давности \U0001F447\n\n3️⃣ Нельзя путать регрессное требование о возмещении\
    \ вреда с обычным нарушением договорных обязательств. Разграничение этих оснований\
    \ влияет на отсчет исковой давности.\n\n\U0001F4E6 Покупатель просрочил вывоз\
    \ товара в рамках договора поставки, заключённого с компанией, которая в свою\
    \ очередь приобретала товар у Министерства. Компании пришлось выплатить Министерству\
    \ неустойку, а затем она решила взыскать ее с покупателя.\n\n\U0001F4CC Формулировка\
    \ иска\n\n✏ О взыскании убытков\n\n\U0001F4CC Позиции судов\n\n\U0001F534 Первая\
    \ инстанция в иске отказала, т.к. пропущен срок исковой давности.\n\U0001F535\
    \ Апелляция и кассация иск удовлетворили.\n⚖ СКЭС ВС РФ засилила решение суда\
    \ первой инстанции.\n\n⏳ По регрессным обязательствам течение срока исковой давности\
    \ начинается со дня исполнения основного обязательства (п. 3 ст. 200 ГК РФ).\n\
    \n\U0001F4DA Фактические обстоятельства не позволяли судам применить как ст. 1081\
    \ ГК РФ (о возмещении вреда), так и п. 3 ст. 200 ГК РФ (о регрессном требовании)\
    \ при исчислении срока исковой давности к рассматриваемой ситуации.\n\n\U0001F4DC\
    \ Ввиду того, что стороны связаны между собой договорными обязательствами, истец,\
    \ действуя разумно и осмотрительно, должен был узнать о нарушении ответчиком своих\
    \ обязательств по вывозу товара, согласно условиям договора поставки, непосредственно\
    \ по истечении срока их исполнения, указанного в спецификациях.\n\n⌚ Точкой отсчета\
    \ исковой давности будет следующий день после даты, указанной в спецификации.\n\
    \n\U0001F4BC Комментарий юристов \"Реаналитики\": \n\n\U0001F9E9 Суды спутали\
    \ совершенно разные институты гражданского права. Данный кейс предотвратит появление\
    \ подобного рода ошибок.\n\n\U0001F50D Определение ВС РФ от 18.02.2026 г. по делу\
    \ № А40-179769/2024\nhttps://m.kad.arbitr.ru/Card/17405174-f981-4f59-99de-9b0c9c18db28\n\
    \n⁉  Вы думаете, часто ли суды путают момент отсчета срока исковой давности? \n\
    \n\U0001F44D – Часто.\n\U0001F914 – Редко.\n\nPS: Выводы являются обобщёнными.\
    \ Для конкретных рекомендаций и решений обратитесь в “Реаналитику”\nreanalitika.ru.\n\
    \n#арбитражныйпроцесс, #исковаядавность, #регрессныетребования\n@arbitrium_processus\n\
    https://t.me/arbitrium_processus"
