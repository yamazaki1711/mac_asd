  text: "Сегодня открыли второй Московский трамвайный диаметр Т2 от метро \"Чертановская\"\
    \ до станции Новогиреево МЦД-4\n\n\U0001F4CD Он стал самым протяжённым городским\
    \ диаметральным трамвайным маршрутом в мире — 33 км. Т2 связал 13 районов столицы\
    \ и улучшил транспортное обслуживание более чем двух миллионов жителей. \n\nНовый\
    \ маршрут проходит у множества социальных, образовательных, офисных учреждений.\
    \ Среди них — МГТУ им. Н.Э. Баумана, Московский энергетический институт, Даниловская\
    \ мануфактура.\n\nНа Т2 расположено 79 остановок. Трамваи ходят каждые 6 минут.\
    \ Московские трамвайные диаметры работают по стандартам наземного уличного метро.\
    \ \n\nПассажиры могут сделать пересадки на 4 железнодорожных вокзала (Ярославский,\
    \ Ленинградский, Казанский и Павелецкий) и 31 станцию метро, МЦК, МЦД и железной\
    \ дороги.\n\n\U0001F68A На маршруте работают современные трамваи с автономным\
    \ ходом: односекционные \"Львёнок-Москва\" и модернизированные трёхсекционные\
    \ вагоны \"Витязь-Москва\", которые впервые оборудовали системой автономного хода.\
    \ По проспекту Академика Сахарова они проезжают 2 км без подключения к контактной\
    \ сети — накопление энергии происходит на других участках. \n\nПервый диаметр,\
    \ открытый в ноябре прошлого года, имел огромный успех. Пассажиропоток на линии\
    \ между метро \"Университет\" и Метрогородком вырос в 2 раза. Нет сомнений, что\
    \ и Т2 будет востребован жителями.\n\nПодписаться на МАХ"
