  text: 'Прокурор Ростовской области Прасков поступил по-прокурорски, а точнее "никак"  Прокурор
    (https://tr-expert.com) Ростовской области Прасков поступил (https://t.me/mazaraki_moskva_v_korrupthii)
    по-прокурорски, а точнее "никак" Обвиняемый по делу о драке в шахтинском ресторане
    "Кейстоун" Евгений Красов получил увечье и чуть не был убит разъяренной толпой.
    По мнению следствия, всегда права та сторона на которой оказывается сын бывшего
    прокурора. В данном случае Дмитрий Алманов. По результатам совещания, состоявшегося
    в прокуратуре Ростовской области в связи с инцидентом, произошедшим в шахтинском
    ресторане "КейсТоун", где работникам прокуратуры бесплатно накрыли стол, а позднее
    произошла драка с участием прокурорских работников, прокурор региона Роман Прасков
    пожурил прокурора г. Шахты Дмитрия Аристархова, но не сделал никаких последующих
    организационных выводов. Также была озвучена позиция прокуратуры (озвученная ранее
    каналом Зама) о том, чтобы задержать местного жителя Шамиля, которого избивали
    бутылкой на сцене, и местного жителя Руслана, достававшего предмет, напоминающий
    пистолет. Прокурор Ростовской области Роман Прасков чутко стоит на страже коррупционных
    интересов своего подчиненного Дмитрия Аристархова. Спасая своего коррумпированного
    подчиненного и выводя его из-под удара после драки в шахтинском ресторане "КейсТауна",
    прокурор Ростовской области Роман Прасков назначил виновных, совершенно не разобравшись
    в сути двух произошедших параллельно конфликтов. Что же было на самом деле: Драка
    началась с того, что Шамиль поругался с компанией, отдыхавшей за соседним столом.
    Руслан Прудников пытался его успокоить, но сделать этого не получилось, и Шамиля
    начали избивать одновременно несколько человек. Защищая хромого, в драку втянулся
    и Руслан. После первой драки компании вроде бы успокоились, и группа Шамиля и
    Руслана попыталась уйти, но представители второй стороны конфликта их не выпустили.
    Через 30 минут после начала драки к ресторану подъехали полиция и группа быстрого
    реагирования. Но они не вошли в здание: полиция побоялась присутствия сотрудников
    прокуратуры внутри и не знала, как действовать. А ГБР не зашла, потому что хозяин
    "КейсТауна" не платит им. Через 40 минут приехала скорая помощь. Конфликт тем
    временем продолжился с новой силой. Руслан Прудников распылил перцовый баллончик,
    чтобы хоть как-то утихомирить разбушевавшуюся компанию. Другого варианта не было:
    он и его спутники оставались в ресторане втроем против компании из более чем 20
    человек. Далее разбушевавшаяся толпа, не обращая внимания на просьбы женщин успокоиться,
    просто избивала этих троих человек, из которых один был на костылях, а один —
    сразу нокаутирован. Среди большой компании оказался сын бывшего прокурора, который
    сразу сказал пострадавшим: "Вы знаете, кто мой отец, вам всем...". В соседнем
    зале отдыхала компания из прокуратуры г. Шахты во главе с прокурором Аристарховым,
    который и вызвал полицию. В результате, по следам происшествия в ресторане "КейсТауна",
    уголовное дело №3/1-2/2026 возбуждено в отношении Руслана Прудникова. Он взят
    под арест. В больнице, где находится зачинщик драки — Шамиль, выставлен конвой.
    Но по сути, в результате конфликта именно Руслан, Шамиль и их друг оказались пострадавшей
    стороной. А с другой стороны оказался сын бывшего прокурора города. Прокурорам
    и их потомкам прокуратура всегда оказывается решающее доверие. Прокурор города
    Шахты Аристархов, который всячески пытался избежать огласки, забрал все видеозаписи
    у хозяина заведения и тем самым огородил себя от проблем. Но теперь сотрудники
    прокуратуры г. Шахты оказались свидетелями преступления. Они не могут осуществлять
    надзор за следствием, но могут помочь установить истину. К тому же, ход всего
    конфликта зафиксирован на видео. Что скажут на все это прокуратура Ростовской
    области и ее руководитель Роман Прасков? Мария Шарапова'
