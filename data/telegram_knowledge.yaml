  text: 'КС разрешил складывать сроки владения имуществом при его продаже


    ➡️ Компания купила здание, но право собственности не зарегистрировала. Через 16
    лет она продала его своему генеральному директору. Тот через несколько лет обратился
    в суд с требованием о признании за собой права собственности на здание в порядке
    приобретательной давности. По закону для этого необходимо добросовестно распоряжаться
    недвижимостью не менее 15 лет.


    Суды директору отказали. Они посчитали, что простая сделка купли-продажи не позволяет
    суммировать годы владения предыдущего и нынешнего владельцев. В таких случаях
    срок должен начинать течь заново с момента покупки, так как между сторонами отсутствует
    законное правопреемство.


    🔨 Конституционный суд признал такой подход неконституционным и установил временный
    порядок: сроки давностного владения при передаче имущества по договору подлежат
    сложению, если каждый из владельцев — и продавец, и покупатель — владел имуществом
    добросовестно, открыто и непрерывно. Бремя доказывания этих фактов лежит на текущем
    владельце, который обращается в суд.


    КС пояснил, что главная цель закона — возвращать неиспользуемое имущество в экономику.
    Если фактический владелец, который еще не стал юридическим собственником, решает
    продать здание, он действует разумно. Это позволяет передать объект тому, кто
    готов его содержать и восстанавливать, не дожидаясь формального истечения 15-летнего
    срока.


    📄 Источник: постановление Конституционного суда от 25.03.2026 № 18-П


    ⚪ Арбитражная практика в Телеграм | Сообщество ВК | Канал в MAX'
