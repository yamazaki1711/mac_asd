  text: '⚖️ В составе заявки представлены сведения о происхождении нескольких разных
    товаров, в т.ч. не относящихся к объекту закупки. Признавать ли их недостоверными?


    Заказчик проводил электронный аукцион на поставку медицинских масок, установив
    запрет на допуск товаров иностранного происхождения.


    Один из участников в составе заявки представил две реестровые записи на маски
    из реестра российской промышленной продукции, а в структурированной части заявки
    сослался на выписку из реестра на бахилы медицинские. Также им была приложена
    выписка из реестра на маски.


    Заявку отклонили, сославшись на недостоверность информации, поскольку указанные
    участником сведения и документы (в части бахил) не соответствуют описанию объекта
    закупки.


    Участник оспорил действия комиссии заказчика.


    🔻Что решили антимонопольный орган и суды?


    Они поддержали участника, признав отклонение неправомерным и отметив при этом,
    что выписка из реестра российской промышленной продукции на маски подтверждает
    страну происхождения предлагаемого товара, поэтому у комиссии заказчика отсутствовали
    правовые основания для признания информации недостоверной.


    Недостоверными являются сведения, не соответствующие действительности. Это утверждения
    о фактах или событиях, которые не имели места в реальности в период времени, к
    которому относится указанная информация.


    В данном случае в заявке были все необходимые документы, касающиеся объекта закупки,
    страна происхождения подтверждена. Доказательства недостоверности у комиссии отсутствуют.
    #заявки


    Документ: Постановление АС Московского округа от 13.04.2026 по Делу № А40-124540/2025


    Источник: ЭТП «Фабрикант»'
