  text: "«ДВА ГОДА ГАРАНТИИ», КОТОРОЙ НЕТ\n\nИногда читаешь комментарии под постами\
    \ и понимаешь, что даже многие юристы путают две совершенно разные вещи: гарантию\
    \ и обязательный двухлетний срок для предъявления требований. На самом деле никакой\
    \ «обязательной гарантии два года» в законе нет. Есть гарантийный срок, который\
    \ устанавливает продавец или производитель, и есть установленный законом двухлетний\
    \ срок для предъявления требований по качеству товара.\n\nРазница принципиальная.\
    \ Если на товар установлена гарантия, то при обнаружении недостатка потребителю\
    \ достаточно заявить о проблеме, а доказывать, что дефект возник не по его вине,\
    \ должен продавец. Но если гарантии нет, действует пункт 1 и пункт 5 статьи 19\
    \ закона «О защите прав потребителей». И в этом случае всё наоборот: потребитель\
    \ действительно может предъявить требования в течение двух лет, но обязан сам\
    \ доказать, что недостаток существовал до передачи товара и возник по вине продавца.\n\
    \nИменно в такой ситуации оказался «потребитель-экстремист» в одном из недавних\
    \ громких дел. Гарантии на автомобиль не было, а значит, именно он должен был\
    \ доказать, что дефект существовал до передачи машины. Однако ни экспертиза, ни\
    \ другие доказательства этого не подтвердили. Тем не менее суды первой и апелляционной\
    \ инстанций решили иначе. Честно говоря, трудно поверить, что судьи могли не понимать\
    \ столь очевидных вещей. Скорее складывается ощущение, что на них по каким-то\
    \ причинам просто решили не обращать внимания. Теперь будем разбираться с этим\
    \ уже в кассации.\n\nЮридическая компания \"Ярдрей\" \n\n• Телефон:\n\U0001F1F7\
    \U0001F1FA Россия: +79995554141 \n\U0001F1F0\U0001F1FF Казахстан: +77711554141\
