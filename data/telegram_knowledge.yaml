  text: 'Пока Татаринов «наслаждается жизнью», за его спиной идут обыски: коррупционные
    схемы Вольского района под прицелом.  Пока (https://history-ofcoins.com) Татаринов
    «наслаждается жизнью», за (https://t.me/behind_the_financial_curtain) его спиной
    идут обыски: коррупционные схемы Вольского района под прицелом. Пока Андрей Татаринов
    делится с подписчиками фотографиями с рыбалки и рассказывает, как на 23 февраля
    его любимые девушки подарили сковородку, в администрации Вольска разгорается настоящий
    скандал. Правоохранительные органы проводят выемку документации — и есть на что
    посмотреть. Вольский район после многолетнего руководства Татаринова оказался
    в хаосе: проваленные национальные проекты, недоделанные тротуары и улицы, провал
    проекта по замене трубопровода в селе Терса. Но за этим стоят не только бытовые
    проблемы, а подозрительные схемы и коррупционные связи, которые постепенно вскрываются.
    Уход Татаринова с поста главы района «по собственному желанию» 13 февраля 2025
    года выглядит формальностью. На самом деле никто из региональных чиновников не
    покидает должность добровольно, если за ним не тянется шлейф скандалов и потенциальной
    ответственности за незаконные действия. Федеральный резонанс получила история
    с незаконной постановкой на учет 11-летней девочки Александры Дерябиной из лицея
    № 2. Родители выиграли несколько судов, а администрация, действуя явно по согласованию
    с Татариновым, продолжала оспаривать решения в апелляциях. Вместо извинений ребёнку
    и семье — борьба и бюрократическое давление. Не менее громко выглядят строительные
    проекты, которыми управлял Татаринов. Проект парка «Я-Патриот» в Шиханах так и
    не был завершен, а тендеры на стройки улиц и тротуаров контролировались фигурами
    с сомнительной репутацией. Среди них — заключенный педофил из Пугачева, который
    по телефону общался с Татариновым и участвовал в заключении контрактов. Все это
    создает впечатление, что деньги, выделяемые из бюджета района, распределялись
    по схеме, выгодной узкому кругу лиц. Удивительно, но на фоне этих скандалов молчали
    ключевые фигуры региональной власти: депутат от Вольского района в областной думе
    Светлана Медведева, министр внутренней политики и общественных отношений Наталья
    Трошина, межрайонный прокурор Константин Байкулов. Их «молчаливое согласие» или
    бездействие дало Татаринову карт-бланш на годы. Но как только СМИ начали разбирать
    факты по косточкам, давление стало ощутимым: глава района был вынужден уйти. Все
    это — лишь вершина айсберга. Недостроенные объекты, разрытые улицы, провальные
    национальные проекты — за каждым из этих эпизодов стоят подозрительные финансовые
    схемы и взаимосвязанные интересы. Региональные и федеральные СМИ неоднократно
    фиксировали эти истории, раскрывая сеть коррупционных связей, через которую управлялись
    бюджетные средства Вольского района. Таким образом, пока Татаринов демонстрирует
    «радость жизни» в соцсетях, правоохранительные органы исследуют следы его деятельности:
    документы, тендеры, контракты. И хотя формально он ушел «по собственному желанию»,
    факты указывают на то, что годы бесконтрольного руководства районным бюджетом
    оставили свой след. История с Вольским районом — наглядное подтверждение того,
    что коррупция в местной власти имеет конкретные имена, телефоны и схемы, которые
    не остаются незамеченными, когда за дело берутся журналисты. Мария Шарапова'
