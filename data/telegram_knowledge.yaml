  text: "Заметили проект ЭНКО в международной премии International Architecture &\
    \ Design Awards 2026\U0001F633\n\nКак в своем тг-канале сообщила генеральный директор\
    \ ЭНКО Елена Низамова, тюменский ЖК Айвазовский, за архитектуру доминанты которого\
    \ отвечала компания ГОРПРОЕКТ, получил почётное упоминание в категории «Архитектура.\
    \ Концепция». \n\n\U0001F3C6Премия IADA 2026, которая прошла 24 апреля в Польше,\
    \ собрала элиту архитекторов и дизайнеров. Победители получили уникальные кубки,\
    \ сертификаты и публикации в СМИ.\n\nЖК Айвазовский состоит из двух высотных корпусов\
    \ (6–30 этажей) на 198 тыс. кв. м у реки Тура, вдохновленных морскими пейзажами\
    \ Ивана Айвазовского. Фасады — переосмысление чикагского стиля: кирпич + стекло,\
    \ бионические формы, панорамное остекление.\n\nА ГП-10 — будущая визитная карточка\
    \ Тюмени. Это центральная доминанта ЖК, представляющая собой стометровую башню\
    \ с уникальной бионической формой.\n\nУверены, что для коллег из ЭНКО и ГОРПРОЕКТ\
    \ почётное упоминание IADA 2026 — лишь начало, а тюменцам по-доброму завидуем\U0001F605\
    \n\nСправочно:\nПо данным Всeостройке.pф, ЭНКО занимает 23-е место в РФ по объему\
    \ текущего строительства. Надежность девелопера — 4,25."
