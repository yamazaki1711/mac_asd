  text: "Что означает значок А+ рядом с названием канала?\n\nВ Telegram введена новая\
    \ система маркировки каналов, зарегистрированных в Роскомнадзоре. Чтобы получить\
    \ отметку А+, достаточно использовать бота @Trustchannelbot — инструкция проста,\
    \ и весь процесс займет всего пару минут. После успешной регистрации символ А+\
    \ появится слева от названия вашего канала.\n\nЯ подал заявку вчера, а уже сегодня\
    \ канал А+ \n\nЭта функция помогает пользователям легко определять, какой контент\
    \ заслуживает доверия и подходит для репоста, а рекламодателям — выбирать надежные\
    \ площадки для размещения рекламы. В будущем такая отметка также будет свидетельствовать\
    \ о высоком уровне ответственности авторов перед своими подписчиками.\n\nUPD.\
    \  \n\nУдивлён, что пост про А+ вызвал столько негатива. Когда закон о регистрации\
    \ каналов принимали — все молчали. А теперь, когда добавили значок «автор не аноним»,\
    \ начались крики про «свободу». Странно, правда?  \n\nЗначок же не цензуру вводит,\
    \ а показывает: за каналом стоит реальный человек, который готов отвечать за контент.\
    \ Если не ошибаюсь, время «анонимных» телеграм-каналов, которые вели школьники\
    \ с целью рано или поздно заскамить аудиторию, прошло еще году в 2019.\n\nДа,\
    \ система маркировки неидеальна. И да, РКН — не благотворительный фонд. Но если\
    \ уж закон приняли, то значок А+ хотя бы делает правила игры прозрачными.  \n\n\
    P.S. Про «покусанную морковку» — смешно, конечно. Но если серьёзно: вы лично видели\
    \ хоть один канал с какой-то иной верификацией? Увидите - скиньте ссылку."
