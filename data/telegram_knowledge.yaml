  text: 'Даны разъяснения об особенностях применения реестровой записи из реестра
    российской промышленной продукции при осуществлении закупок


    В ответе на запрос Минпромторг России указал:


    ● реестровая запись подтверждает исключительно страну происхождения товара;


    ● факт несоответствия характеристик товара в реестровой записи параметрам, указанным
    заказчиком в описании объекта закупки, на этапе подачи заявок не выявляется. Если
    несоответствие обнаружено в ходе исполнения, то заказчик руководствуется условиями
    контракта (договора). Например, может провести экспертизу, мотивированно отказаться
    от подписания документа о приёмке;


    ● реестровые записи должны быть действующими как на этапе подачи заявки, так и
    на этапах заключения и исполнения контракта (договора). Номер реестровой записи
    включают в реестр контрактов и реестр договоров. Подмена и подлог реестровых записей
    являются поводами для отказа в приёмке товара.


    В письме содержатся и некоторые иные пояснения. #минпромторг


    Документ: Письмо Минпромторга России от 09.04.2026 № 37479/12


    Источник: ЭТП «Фабрикант»'
