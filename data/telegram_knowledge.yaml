  text: '❓ Нужно или нет приводить ситуационный план в графической частив разделе   📋📋📋


    ✍ Состав графической и текстовой части ПОС определен Постановление Правительства
    РФ от 16 февраля 2008г. № 87 (далее Положение).

    📌 В соответствии с п. 23. Раздел 7 "Проект организации строительства" в графической
    части проекта приводится строительный генеральный план подготовительного периода
    строительства, реконструкции, капитального ремонта (при необходимости) и основного
    периода строительства, реконструкции, капитального ремонта с определением мест
    расположения постоянных и временных зданий и сооружений, мест размещения площадок
    и складов временного складирования конструкций, изделий, материалов и оборудования,
    мест установки стационарных кранов и путей перемещения кранов большой грузоподъемности,
    инженерных сетей и источников обеспечения строительной площадки водой, электроэнергией,
    связью, а также трасс сетей с указанием точек их подключения и мест расположения
    знаков закрепления разбивочных осей.

    ➡️ В соответствии с МДС 12-46.2008 п.5.1 ситуационный план размещения объекта
    капитального строительства с указанием (при наличии) расположения пунктов утилизации
    отходов и полигонов для их захоронения относится к исходным данным для разработки
    раздела ПОС.

    ➡️ В соответствии с СП 48.13330.2019 п.7.6 Границы строительной площадки, расположение
    существующих и строящихся зданий, сооружений и временной строительной инфраструктуры
    указываются на строительном генеральном плане и ситуационном плане.'
