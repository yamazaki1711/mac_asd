  text: "Когда попытался обмануть банк, но не прокатило… И что делать дальше?  \n\n\
    Ситуация клиента:  \n«Банк заблокировал карту по 115-ФЗ и запросил пояснения по\
    \ операциям. Я отправил договоры займа, сказав, что это возврат долга. В ответ\
    \ получил отказ в разблокировке. Что теперь — суд или есть другие варианты?» \
    \ \n\nЭто второй по популярности запрос в моих личных сообщениях. Разберём, почему\
    \ попытка обмануть банк провалилась и как действовать.  \n\nПочему договоры займа\
    \ не сработали?  \nБанки проверяют не только документы, которые предоставляете\
    \ вы, но и логику операций, ваших контрагентов и их историю. Банк, вообще, намного\
    \ «умнее», чем кажется рядовому клиенту.  \n\nПример 1.  \nКлиент направил в банк\
    \ договоры займа по энному количеству операций. Операций этих у него за месяц\
    \ проходят десятки — и так постоянно (очень любят таким грешить организаторы совместных\
    \ покупок и игроки онлайн-казино).  \nПо ту сторону, в банке, сидит реальный человек,\
    \ обладающий интеллектом и дорожащий своей работой. Как вы думаете, правдоподобна\
    \ ли версия, что наш клиент направо и налево раздаёт долги на небольшие суммы\
    \ людям из разных регионов, при этом он просто физлицо, а не организация «микрозайм»?\
    \ Очевидно, что такое объяснение сотрудника банка лишь разозлит и будет трактоваться\
    \ как обман и недобросовестность — со всеми вытекающими.  \n\nПример 2.  \nУ вас\
    \ не множественные поступления, а один конкретный платеж, который не понравился\
    \ банку. Казалось бы, состряпать договор займа — хорошая идея: откуда банку знать,\
    \ что Иван И., который купил у вас крипту, не ваш хороший товарищ? Но и тут ждёт\
    \ провал.  \nВсё дело в том, что, с большой долей вероятности, про Ивана И. банку\
    \ известно многое. Если он играется с криптой, то такие платежи он осуществляет\
    \ регулярно. А если, плюс к этому, живёт он в Новом Уренгое, а вы — в Москве,\
    \ и, вдобавок, сам частенько принимает от таких же Иванов Ивановичей платеж за\
    \ платежом, то даже рядовому сотруднику банка становится понятно, что вы пытаетесь\
    \ сделать из него дурака. Последствия те же, что и в примере выше.  \n\nПример\
    \ 3 (который не пример вовсе, а просто данность).  \nНезависимо от того, какая\
    \ операция не понравилась банку — была она одна или это сотни переводов, деньги\
    \ поступали от клиента этого банка (о котором банку априори многое известно) или\
    \ от человека, на которого у банка нет данных, — в любом случае формулировка «возврат\
    \ долга» вызывает у банков острую реакцию. Именно потому, что это первое, что\
    \ приходит в голову всем, кто пытается их обмануть. Поверьте моему опыту: возврат\
    \ долга — путь тупиковый. Случаи, когда такой вариант «прокатил», единичны.  \n\
    \nОдин специалист банка как-то в приватной беседе пожаловался, что у него уже\
    \ глаз дёргается при виде очередного договора займа, состряпанного на коленке.\
    \  \n\nПочему суд здесь — бесполезная трата времени?  \nБанк соберет все вышеописанные\
    \ аргументы, подкрепит их данными и предоставит в суд как доказательства вашей\
    \ недобросовестности. Результат — потеря времени, денег и гарантированное решение\
    \ в пользу банка.  \n\nКак исправить ситуацию, если договоры «займа» уже направлены\
    \ в банк и получен отказ?  \nНеобходимо изменить показания. На что? Как ни странно\
    \ — на правду. Но правду дозированную и аккуратно преподнесённую. Ни в коем случае\
    \ не стоит писать прямо, что первоначальный вариант был обманом. Это тот случай,\
    \ когда решают формулировки.  \n\nМораль сей басни такова: когда мы держим оппонентов\
    \ за дураков, чаще всего в дураках оказываемся сами.  \nПри подготовке ответа\
    \ в банк важно учитывать, что по ту сторону — реальный человек, который может\
    \ сложить 2+2.  \n\nЕсли же «займ» уже нарисован и направлен в банк, показания\
    \ можно и нужно менять. При адекватных пояснениях и правильных формулировках банки\
    \ такие решения пересматривают!  \n\nЕсли сомневаетесь в своих силах — обращайтесь\
    \ за консультацией. За последний месяц мы трижды победили «липовые» договоры и\
    \ принятые на их основании отказы: собрали данные, склеили из них складную версию\
    \ (не идущую вразрез с реальностью и не вызывающую у сотрудника банка оскомину)\
    \ и добились положительного решения.  \n\nС уважением,\nАдвокат Евгений Шупиков"
