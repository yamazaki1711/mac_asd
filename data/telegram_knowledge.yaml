  text: 'Суд признал двойной возврат платежа договорной неустойкой за уклонение от
    заключения договора


    ➡️ В июле 2020 года истец заключил предварительный договор аренды помещения, перечислил
    обеспечительный платеж. Основной договор стороны договорились подписать не позднее
    согласованной даты. А в случае уклонения ответчика от заключения основного договора,
    он обязался вернуть платеж в двойном размере.


    Основной договор в срок не подписали, деньги ответчик вернул только в одинарном
    размере. Истец потребовал доплату, однако две инстанции отказали. Суды решили,
    что оснований для двойного взыскания нет: у ответчика на тот момент не было права
    собственности на помещение, а обеспечительный платеж сам по себе не является задатком.


    ⚖️ Кассация не согласилась. Отсутствие зарегистрированного права собственности
    не препятствует заключению основного договора, не влияет на его действительность
    и не освобождает сторону от ответственности.


    При этом условие о двойном возврате надо оценивать не по формальному названию
    платежа, а по его правовой функции и природе. В данном случае договор предусматривал
    внесение такого платежа в обеспечение обязательств арендатора по основному договору.
    Поэтому условие о двойной выплате — это договорная неустойка за уклонение от исполнения
    обязательств.


    Кроме того, именно бездействие самого ответчика привело к невозможности заключения
    основного договора в срок. Он вовремя не ввел объект в эксплуатацию, не принял
    меры для регистрации права собственности и др. Значит он должен уплатить спорную
    сумму.


    📄 Источник: постановление АС Московского округа от 11.02.2026 по делу № А40-186800/2022


    ⚪ Арбитражная практика для юристов | 🇷🇺 Читать нас в MAX'
