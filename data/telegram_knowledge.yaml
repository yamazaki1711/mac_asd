  text: "Аргументы за мистификацию, которые мне нравятся:\n \n1)  У США не было двигателя\
    \ для полетов астронавтов на Луну. \n\n2) У США на всех фото и видеосъемках Луна\
    \ серого цвета, а она на самом деле коричневая. \n\nПросто в НАСА не знали, что\
    \ Луна коричневая, так как со снимков лунной поверхности с близкого расстояния,\
    \ полученных американцами с помощью автоматических станций \"Сервейер\" в 1966-67\
    \ гг., был сделан неправильный вывод о цвете поверхности Луны. \n\n3) Привезенный\
    \ лунный грунт навсегда спрятан и засекречен (частное владение им, является в\
    \ США уголовным преступлением). Американцы после свой первой экспедиции в 1969\
    \ году на Луну раздали некоторым странам образцы \"лунного\" грунта. Так как считали,\
    \ что доставка грунта с Луны в ближайшие годы на Землю невозможна. Но СССР уже\
    \ осенью 1970 года с помощью автоматической межпланетной станции Луна - 16 доставили\
    \ настоящий лунный грунт, 101 грамм. После этого раздача \"лунного\" грунта Штатами\
    \ прекратилась.\n \n4) Скафандры. Астронавты ходили по луне в резиновых ботинках,\
    \ но интересно узнать каким образом у них это получилось, если температура на\
    \ Луне колеблется от +130 до -150 градусов по Цельсию. \n\nНа фотках прилунения\
    \ следы ребристые, а в музее ботинки абсолютно гладкие.\n\n5) Американцы, что\
    \ на Луне, что на Земле сразу после полета очень бодрые, а наши космонавты после\
    \ нескольких дней в космосе из спускаемого аппарата сами выйти не могут.\n\n6)\
    \ После «полетов на Луну» исследование Луны практически полностью прекратилось\
    \ и в США, и в СССР, как по команде.\n\n7) НАСА ведет активную работу по устранению\
    \ фальшивых фрагментов в фото и видео материалах. \n\nКогда спрашиваешь ИИ об\
    \ аргументах против того, что американы не были на луне все версии отвечают сухо\
    \ с комментарием, что это недостоверная конспирология. \n\n8) На кинокадрах «с\
    \ Луны» флаг колышется на ветру.\n\n9) С 1972 г. американцы перестали летать на\
    \ Луну «из-за отсутствия новой научной ценности и огромных расходов» и утратили\
    \ технологии. \n\nЧто скажете?"
