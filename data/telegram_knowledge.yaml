  text: 'Постройка на участке не для строительства


    🏗 Участок сельхозназначения арендовали для организации ярмарки — без торгов и
    без права на строительство. Права аренды несколько раз переуступали, а новый арендатор
    получил разрешение, возвел двухэтажное здание площадью 1340 кв. м и зарегистрировал
    на него собственность. Затем выкупил участок как собственник расположенного на
    нем объекта, а вскоре попробовал вывести его из состава сельхозземель.


    ⚖️ Комитет по управлению госимуществом оспорил разрешения на строительство и на
    ввод объекта в эксплуатацию. Три инстанции отказали: первая не нашла нарушений,
    апелляция и кассация сочли способ защиты ненадлежащим.


    ❗Верховный суд направил дело на новое рассмотрение. Участок предоставляли для
    организации ярмарки как временного объекта торговли, а не для капитального строительства.
    Администрация выдала разрешение без документа, подтверждающего право застройщика
    на строительство. А обход процедуры предоставления земли под строительство нарушает
    публичные интересы и права потенциальных участников торгов.


    📌 Верховный суд также подтвердил право комитета на подачу иска. Комитет уполномочен
    принимать решения о переводе земель из одной категории в другую — а арендатор
    как раз инициировал такую процедуру. На основании спорных разрешений он зарегистрировал
    собственность на здание и участок, и именно оценка законности этих актов определяет
    дальнейшую судьбу объекта и земли.


    Подробнее в новости


    Определение № 306-ЭС25-10127 от 11 марта 2026 года по делу № А12-9275/2024


