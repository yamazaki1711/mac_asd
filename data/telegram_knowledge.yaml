  text: "Пришёл на чужой объект - отвечаешь за чужие дефекты\n\nВас позвали доделать\
    \ за другим подрядчиком. Предыдущий бросил, исчез, сделал плохо. Заказчик нервничает,\
    \ сроки горят, нужен кто-то надёжный. Вы - надёжный. Вы пришли спасать проект.\n\
    \nЗашли и начали работать. Без акта осмотра. Без фотографий. Без фиксации того,\
    \ что было на объекте до вас.\n\nЧерез полгода заказчик находит трещины в стенах.\
    \ Или протечку кровли. Или кривую стяжку. Чьи? Предыдущего подрядчика. \n\nВы\
    \ это знаете. Заказчик, возможно, тоже. Но доказать - невозможно.\n\nПотому что\
    \ на момент вашего входа на объект не существует ни одного документа, фиксирующего,\
    \ что именно там было. А значит, для суда всё, что есть на объекте - ваше. Вы\
    \ последний, кто работал. Вы и отвечаете.\n\nЭто не теория. Это регулярная практика.\n\
    \nПодрядчик заходит на объект, где до него работала другая компания. Стены возведены,\
    \ штукатурка нанесена. Новый подрядчик делает чистовую отделку. Через три месяца\
    \ пошли трещины. Заказчик предъявляет претензию новому подрядчику: ваша работа,\
    \ ваши трещины.\n\nА трещины - из-за того, что предыдущий подрядчик нарушил технологию\
    \ кладки. \n\nНо кто это докажет? \n\nЭкспертиза видит готовый объект. Отделка\
    \ - ваша. Трещины - под вашей отделкой. Причинно-следственная связь - на вас.\n\
    \nДругой пример. Субподрядчик заходит на этап после монолитных работ. Делает фасад.\
    \ Через год фасад «поехал». Причина - дефект монолитной конструкции, допущенный\
    \ предыдущим подрядчиком. Но фасадчик не зафиксировал состояние основания перед\
    \ началом работ. И теперь он ответчик.\n\nЧто делать, чтобы не оказаться в этой\
    \ ситуации?\n\nПеред входом на объект составьте протокол (акт) осмотра. Это можно\
    \ сделать за один день. В акте: дата, состав комиссии (ваши сотрудники, желательно\
    \ представитель заказчика), адрес объекта, перечень помещений и участков, описание\
    \ состояния - что сделано, что не сделано, какие видимые дефекты.\nПодпись заказчика\
    \ на акте - идеально. Заказчик отказывается подписывать? Направьте акт ему почтой\
    \ с описью. Зафиксируйте, что вы его уведомили о состоянии объекта на момент входа.\n\
    \nФотографии и видео. С геолокацией и датой. Каждое помещение, каждый участок.\
    \ Общие планы и крупные планы дефектов. Это бесплатно и занимает час. Час, который\
    \ может стоить миллионов.\n\nЕсли есть возможность - закажите техническое обследование\
    \ или досудебную экспертизу до начала работ. Это стоит денег, но при крупном контракте\
    \ окупается с запасом.\n\nИ впишите в договор условие: подрядчик приступает к\
    \ работам после подписания сторонами акта осмотра объекта. Нет подписанного акта\
    \ - нет начала работ. Это защищает вас от ситуации «зашёл, начал, а потом оказалось».\n\
    \nВы пришли как герой. Не уезжайте как ответчик.\n\nСтолкнулись с такой ситуацией\
    \ - пишите @grikevich\nMAX - резервный канал"
