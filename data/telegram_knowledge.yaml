  text: "Стройконтроль подрядчика взять и отменить\n\nчасть 2 из 3\n\nМы давно указывали\
    \ на проблему несоответствия, писали как все ломается и не работает, как РТН неправомерно\
    \ в своем РД-11-02-2006 создали эту новую единицу, вслед за чем все крупные организации\
    \ понасоздавали отделы по контролю качества и только через 10 лет ГрК поправили,\
    \ включив наконец эту единицу, которая на поверку оказалась никаким не стройконтролем,\
    \ а тем же специалистом по организации строительства. \n\nДальше с изменениями\
    \ ГрК (447-ФЗ) из функций специалиста по организации строительства убрали оперативное\
    \ планирование, координацию, организацию и проведение строительного контроля в\
    \ процессе строительства. \n\nНу и в 2025 году наконец выпустили профстандарт\
    \ на специалиста по строительному контролю, про который мы писали тут. Теперь\
    \ отдельный специалист по идее должен будет расписываться везде за контроль, где\
    \ до этого был специалист по организации строительства. \n\nУ крупных подрядчиков\
    \ с отдельными службами контроля качества приемлемую независимость специалиста\
    \ еще как-то можно обеспечить, но на мелких стройках, где ИТР всего 4-5 человек,\
    \ включить в штат лишний рот будет накладно и никакой независимости от линии нет\
    \ и не будет в помине.\n\nПоэтому проблема неэффективности стройконтроля подрядчика\
    \ в большинстве – не в отсутствии его независимости, а в последствиях трех давно\
    \ неверно выбранных решений, трех проблем, которые участники не в состоянии решить\
    \ на местах. \n\nГоворя про стройконтроль – подразумеваем исполнительную документацию.\
    \ Говоря про исполнительную документацию – подразумеваем стройконтроль. \n\nПосле\
    \ того, как некоторые нормотворцы создали формы документов такими, что производители\
    \ работ более не смогли их вести ни у кого и мысли не возникло какими проблемами\
    \ это обернется для всей отрасли.\n\nИ не было раньше даже намека на обсуждение\
    \ проектов приказов. Там скорее всего и изысканий никаких не проводилось, кроме\
    \ ГрК. Спустили сверху – все и проглотили. Поэтому строители нашли единственно\
    \ возможный на своем уровне выход – посадили на это дело отдельных писарей.\n\n\
    А теперь это безумное по своему регулирующему воздействию даже не решение, а неосознанная\
    \ диверсия тянет за собой цепочку других проблем, где каждый последующий шаг в\
    \ этом цунг цванге делает всем только хуже. \n\nТакую антиэффективную систему\
    \ исполнительной документации нормальная система качества отторгает и создает\
    \ параллельные инструменты. Только ресурсы подрядчика на поддержание и формальной\
    \ и работающей систем не безграничны, а на мелких объектах вообще невозможны.\
    \ \n\nПоэтому любое управление, любое управление качеством не может нормально\
    \ осуществляться пока мы имеем такую исполнительную с такими отставаниями в документальном\
    \ подтверждении процедур.\n\nВторая проблема – проектирование. Не работают старые\
    \ плановые инструменты в рынке. Не за что корректировать и некому корректировать.\
    \ Не за что оплачивать допы из-за ненормально низких резервов непредвиденных.\
    \ И нигде не учитываются риски. Вернее, их все перекладывают на подрядчика, который\
    \ соглашается на сметную цену, где никаких запасов на риски не заложено.\n\nПодрядчик\
    \ же пытается выбрать по максимуму, что заложено сметой. А в смете, бывает, заложено\
    \ и много воздуха и факт где-то меньше, поэтому заказчик, в свою очередь пытается\
    \ этот жирочек подрезать в том числе чтобы втиснуться предстоящими допами в резервы\
    \ непредвиденных. И лучшего инструмента для этого, чем раздуть исполнительную\
    \ документацию объемами работ с подписями всех на всем, просто нет. \n\nИ пока\
    \ эта проблема существует – вся нагрузка будет идти на контроль через закручивание\
    \ гаек с исполнительной. Больше бумаг, данных, больше перечерчиваний рабочки в\
    \ схемы, больше подсчетов объемов работ. На что тратится просто гигантское количество\
    \ и без того дефицитного ресурса ИТР, причем со всех сторон баррикад. \n\nПродолжение\
    \ читать здесь\n\n#бюрократия #нормирование #цифра\n\nМы в мах"
