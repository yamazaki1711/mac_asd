  text: "‼ Печать как чаша Грааля, или почему подписать акт сверки может любой, к\
    \ кому она попала \U0001F447\n\n\U0001F9FE Доступ к печати означает, что полномочия\
    \ лица следуют из обстановки. Чисто теоретически это указывает на то, что подписать\
    \ акт сверки расчетов может почти кто угодно, в чьи руки попала печать...\n\n\U0001F4B8\
    \ Главбух субподрядчика подписал и заверил печатью организации акт сверки взаиморасчетов\
    \ с генподрядчиком. На стороне генподрядчика образовалась переплата. Субподрядчика\
    \ это не устроило, т.к., по его мнению, подпись поставлена неуполномоченным лицом.\
    \ А генподрядчик обратился в суд.\n\n\U0001F4CC Формулировка иска\n\n✏ О взыскании\
    \ процентов \n\n\U0001F4CC Позиции судов \n\n⚖ Все три инстанции, включая СКЭС\
    \ ВС РФ, встали на сторону истца.\n\n\U0001F4CA Проверка расчётов с контрагентом\
    \ входит в обязанности главного бухгалтера в силу должностных полномочий.\n\n\U0001F9EE\
    \ В связи с этим, подписание актов сверки взаимных расчётов между сторонами главным\
    \ бухгалтером Субподрядчика свидетельствует о принятии спорных документов в качестве\
    \ бухгалтерской отчётности, подтверждении обязательств перед контрагентом, и,\
    \ соответственно, подтверждении задолженности перед Генподрядчиком.\n\n✍ Подпись\
    \ главного бухгалтера \nСубподрядчика в актах сверки заверена печатью Субподрядчика,\
    \ а наличие у лица, подписавшего акт сверки, доступа к печати представляемого\
    \ лица также свидетельствует о том, что его полномочия явствовали из обстановки.\n\
    \n\U0001F4BC Комментарий юристов \"Реаналитики\":\n\n\U0001F9E9 Конечно, первую\
    \ роль здесь сыграла должностная инструкция, а уже затем – печать. Но интересна\
    \ в данном кейсе аргументация судов, открывающая безграничные возможности для\
    \ лазеек.\n\n\U0001F50D Определение ВС РФ от 20.03.2026 г. по делу № А55-17207/2024\n\
    https://m.kad.arbitr.ru/Card/d0339c88-d2c7-4336-8905-4de07fe5bca3\n\n⁉ Согласны\
    \ ли Вы с тем, что подписать акт сверки вправе любой, у кого есть печать?\n\n\U0001F44D\
    \ – Да.\n\U0001F914 – Нет.\n\nPS: Выводы являются обобщёнными. Для конкретных\
    \ рекомендаций и решений обратитесь в “Реаналитику”\nreanalitika.ru.\n\n#арбитражныйпроцесс,\
    \ #подряд, #печать\n@arbitrium_processus\nhttps://t.me/arbitrium_processus"
