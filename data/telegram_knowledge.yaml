  text: "⚖️ Суд отменил штраф за картель: где ФАС не доказала нарушение\n\nСуды продолжают\
    \ формировать важную практику по делам о картелях на торгах, и одно из недавних\
    \ решений показывает ключевую проблему антимонопольных дел: формального набора\
    \ признаков недостаточно для привлечения к ответственности. \n\nВ деле № А79-7871/2023\
    \ Арбитражный суд Чувашской Республики рассмотрел спор о законности Решения УФАС\
    \ о привлечении компании к ответственности по части 2 статьи 14.32 КоАП РФ за\
    \ участие в картеле. Основанием для штрафа послужило решение антимонопольного\
    \ органа, которым действия нескольких компаний при участии в закупках были квалифицированы\
    \ как антиконкурентное соглашение, запрещенное пунктом 2 части 1 статьи 11 Закона\
    \ о защите конкуренции. \n\nФАС традиционно опиралась на совокупность косвенных\
    \ признаков: низкое снижение цены на торгах, совпадения в действиях участников,\
    \ а также технические особенности подачи заявок. В частности, указывалось, что\
    \ снижение начальной максимальной цены контракта составило около 1%, что, по мнению\
    \ антимонопольного органа, свидетельствовало об отсутствии конкурентной борьбы.\
    \ \n\nОднако, суд последовательно разобрал эти доводы и пришел к противоположному\
    \ выводу: \n\n1️⃣ Суд указал на недопустимость использования обстоятельств, которые\
    \ не были отражены в решении антимонопольного органа. Часть доводов, на которые\
    \ ссылалась ФАС уже в рамках судебного разбирательства (например, совпадение контактных\
    \ данных при получении электронной подписи), не содержалась в исходном решении\
    \ комиссии. В силу части 1.2 статьи 28.1 КоАП РФ такие обстоятельства не могут\
    \ служить основанием для привлечения к административной ответственности и подлежат\
    \ исключению из оценки. \n\n2️⃣ Суд критически оценил так называемые «технические\
    \ совпадения». \n\nАнтимонопольный орган ссылался на совпадение имени пользователя\
    \ «user» и иных параметров. Суд установил, что такие значения могут присваиваться\
    \ автоматически при создании учетной записи и не свидетельствуют об использовании\
    \ единой инфраструктуры или координации действий участников. \n\n3️⃣ Ключевым\
    \ элементом стало отсутствие доказанного экономического эффекта. \n\nСуд отметил,\
    \ что сам по себе низкий уровень снижения цены не является доказательством картеля.\
    \ Более того, представленное в деле экспертное заключение показало отсутствие\
    \ завышения цен и наличие экономии бюджетных средств, которая по ряду закупок\
    \ составила значительные суммы. Антимонопольный орган не представил доказательств\
    \ того, что контракты могли быть заключены на более выгодных условиях.\n\nСуд\
    \ отдельно подчеркнул позицию Верховного Суда Российской Федерации: при рассмотрении\
    \ дел о картелях необходимо оценивать совокупность доказательств и устанавливать\
    \ причинно-следственную связь между действиями участников и результатом торгов,\
    \ в том числе влиянием на цену. Сам по себе набор косвенных признаков без подтверждения\
    \ такого влияния не свидетельствует о наличии соглашения. \n\nТаким образом, суд\
    \ пришел к выводу об отсутствии надлежащих доказательств состава правонарушения\
    \ и признал решение антимонопольного органа незаконным, отменив назначенный штраф.\
    \ \n\nПрактическое значение этого дела заключается в следующем:\n\n● Антимонопольный\
    \ орган ограничен рамками собственного решения и не вправе достраивать доказательственную\
    \ базу уже в суде. \n● Технические совпадения и формальные признаки требуют критической\
    \ оценки и не могут рассматриваться изолированно.\n● Ключевое значение имеет экономический\
    \ анализ и доказанность влияния на результаты торгов. \n\nДля тех, кто участвует\
    \ в торгах это означает, что даже при наличии внешне подозрительных обстоятельств\
    \ защита возможна, если отсутствует доказанный сговор и экономический эффект ограничения\
    \ конкуренции. В то же время данное дело подтверждает: позиция ФАС по картелям\
    \ по-прежнему во многом строится на косвенных признаках и именно поэтому грамотная\
    \ защита на стадии рассмотрения дела и в суде имеет принципиальное значение. #картель\n\
    \nИсточник: ppt.ru"
