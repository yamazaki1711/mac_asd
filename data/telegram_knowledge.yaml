  text: "И вот что важно понимать про «попользуюсь деньгами». Заказчик, который решил\
    \ потянуть время, считает так: пока суд идёт, деньги работают на меня. Но он не\
    \ учитывает, что грамотная претензия запускает начисление процентов по 395 ГК,\
    \ что неустойка по договору капает каждый день, что расходы на юриста и экспертизу\
    \ лягут на него, что судебные расходы взыскиваются с проигравшей стороны. И когда\
    \ через год он получает решение суда, сумма выросла на 30-50% от первоначальной.\
    \ «Попользовался» деньгами - и заплатил за это дороже любого кредита.\n\nНо только\
    \ если ваш юрист это посчитал. И если претензия была составлена так, что из неё\
    \ суд видит: подрядчик с первого дня действовал профессионально.\n\nНа абонентском\
    \ сопровождении мы составляем претензии, которые давят. С расчётами, сроками,\
    \ последствиями и доказательствами. И заказчики платят до суда - потому что понимают:\
    \ дальше будет дороже.\n\nСкачивайте бесплатно в боте @advokatgrikevich_bot полезные\
    \ документы для подрядчика: \n\n✔️Алгоритм: как получить оплату за выполненные\
    \ работы\n✔️Как не выполнить допработы бесплатно\n✔️Куда смотреть в договоре подряда\n\
    ✔️7 документов, которые избавят подрядчика от потерь\n✔️Шпаргалка для прораба\n\
    ✔️ Как не получить уголовную статью, занимаясь стройкой \n\nTelegram: @grikevich\
    \ \n\U0001F4DE +7 985 227-74-98 \n\U0001F4F2 WhatsApp - написать по ссылке ✉️\
    \ \nE-mail: oxanagrikevich@yandex.ru \nMAX - резервный канал"
