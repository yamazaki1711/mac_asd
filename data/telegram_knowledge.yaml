  text: "‼ Торопись медленно, или почему не надо спешить с цессией \U0001F447\n\n\U0001F570\
    \ Если бы компания не торопила события совершила цессию на месяц позже, то успех\
    \ в суде был бы ей гарантирован... Всего 1 месяц отделял истца от победы.\n\n\U0001F4B8\
    \ Исполнитель уступил право требования задолженности по договору возмездного оказания\
    \ консалтинговых услуг за месяц до направления заказчиком уведомления об отказе\
    \ от договора. Цессионарий обратился в суд.\n\n\U0001F4CC Формулировка иска\n\n\
    ✏ О взыскании долга по договору консалтинговых услуг \n\n\U0001F4CC Позиции судов\n\
    \n⚖ Все три инстанции, включая СКЭС ВС РФ, истцу отказали.\n\n⏳ По договору цессии\
    \ было передано несуществующее денежное требование, поскольку у цессионария денежные\
    \ обязательства, а у первоначального кредитора (исполнителя) – право требования\
    \ задолженности не возникли.\n\n\U0001F4ED Обязательства по договору возмездного\
    \ оказания консалтинговых услуг прекратились в момент получения цедентом уведомления\
    \ заказчика об отказе от договора.\n\n\U0001F4BC Комментарий юристов \"Реаналитики\"\
    :\n\n\U0001F9E9 Важно учитывать, когда наступает момент прекращения обязательств\
    \ сторон и признаки несуществующих цессий.\n\n\U0001F50D Определение ВС РФ от\
    \ 06.10.2025 г. по делу № А40-62665/2024\nhttps://m.kad.arbitr.ru/Card/c9809ce0-b4b8-4a10-b066-fd05385c6b92\n\
    \n⁉ Как Вы думаете, справедлив ли такой подход?\n\n\U0001F44D – Да.\n\U0001F914\
    \ – Нет, подход выглядит формальным.\n\nPS: Выводы являются обобщёнными. Для конкретных\
