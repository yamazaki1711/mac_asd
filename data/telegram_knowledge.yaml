  text: "#ПозицияНАИК\n\nБанковские гарантии: замкнутый круг или повод разобраться?\n\
    \nВ СМИ сегодня обсуждают сложности, возникающие у бизнеса с получением банковских\
    \ гарантий (БГ) из-за ужесточения условий со стороны кредитных организаций.\n\n\
    НАИК неоднократно делал акцент на данной проблеме. На текущий момент у подавляющего\
    \ числа подрядных организаций, действительно, имеются сложности с получением и\
    \ с продлением срока банковских гарантий на исполнение обязательств по государственным\
    \ (муниципальным) контрактам. Связано это как с высокими комиссиями (доходят до\
    \ 8%), так и с отказами банков в выдаче (продлении) банковских гарантий. \n\n\U0001F4C9\
    Банки объясняют свои отказы увеличением количества случаев принятия заказчиками\
    \ решений об одностороннем отказе от исполнения государственных контрактов и направления\
    \ требований банкам о выплате сумм по банковским гарантиям.\n\nРиски невыдачи\
    \ БГ огромны, последствия крайне негативны:\n\U0001F4CCНевыдача подрядчику БГ\
    \ может являться самостоятельным основанием для принятия заказчиком решения об\
    \ одностороннем отказе от исполнения контракта (данное условие указывается в контрактах)\
    \ и повлечь внесение подрядной организации в реестр недобросовестных поставщиков.\n\
    \n\U0001F4CCПоявляется риск срыва сроков строительства объектов для государственных\
    \ и муниципальных нужд.\n\n\U0001F4CCНеизбежно ухудшение финансового состояния\
    \ подрядных организаций в сфере транспортного строительства, риск банкротств (финансовое\
    \ состояние компаний в 2025 году по сравнению с 2022 годом уже значительно ухудшилось).\n\
    \nЧто делать? \n\nВ 2022 году в 44-ФЗ была внесена поправка, при которой до 31\
    \ декабря 2022 года заказчик вправе не устанавливать требование обеспечения исполнения\
    \ контракта, обеспечения гарантийных обязательств с оговоркой, что эта норма не\
    \ применяется, если контрактом предусмотрена выплата аванса и при этом расчеты\
    \ в части аванса не подлежат казначейскому сопровождению. Действие нормы продлевалось\
    \ на 2023 и 2024 годы. \n\n\U0001F53DС учетом сложившейся ситуации НАИК считает\
    \ необходимым в рамках антикризисных мер внести изменение в часть 64.1 статьи\
    \ 112 ФЗ № 44-ФЗ, предусмотрев возможность действия данной нормы в 2026 году.\n\
    \n❗️Также в этой связи НАИК предлагает использовать эффективный механизм скоринга,\
    \ который не раз доказал свою эффективность в строительстве.  \n\nТак, в Москве\
    \ реализована система рейтингования, которая применяется в работе Фонда реноваций.\
    \ Строительные компании, который хотят принять участие в проекте по реновации\
    \ жилищного фонда Москвы, должны пройти независимую оценку на конкурентоспособность\
    \ и качество предоставляемых услуг и периодически подтверждать этот рейтинг. По\
    \ достижении определенного уровня рейтинга застройщикам даются преференции и послабления\
    \ на муниципальном уровне. Есть и успешный международный опыт применения скоринга.\
    \ В планах нашей Ассоциации – инициировать применение практики рейтингования для\
    \ строительства дорожных инфраструктур.\n\n✍️В настоящий момент наша Ассоциация\
    \ готовит системные предложения по урегулированию возникшей проблемы с тем, чтобы\
    \ направить их для рассмотрения в соответствующие федеральные органы исполнительной\
    \ власти.\n__________________________________________________________________\n\
    НАИК - ваш голос в сфере инфраструктурного строительства⚠️\nhttps://nainfracom.ru/"
