  text: "▶️ Вышел выпуск подкаста, где мы поговорили о том, как “Взрывной PR” работает\
    \ в скучной нише\n\nЯ, как и многие из сферы юриспруденции, привыкла считать пиар\
    \ чем-то лишним. Неэтичным. Не для серьёзных специалистов. \nЗачем, выделяться\
    \ надо делами, а не рассказами о себе?\n\nНо пока одни разбирают дело одно за\
    \ другим — менее опытные коллеги идут в медиа, соцсети и телевидение. И клиенты\
    \ идут к ним. Не потому что они лучше. А потому что о них просто слышали.\n\n\
    Поэтому я позвала в гости человека, который знает о пиаре всё.\nРоман Масленников\
    \ — основатель PR-агентства «Взрывной PR», автор более 130 книг о продвижении,\
    \ автор Telegram-канала «Торговец Славой». \nВ ролике говорим честно и без воды:\
    \ \n\n✨Нужен ли пиар юристу или это всё-таки лишнее?\n✨Нужно ли показывать личное\
