  text: 'ВЦИОМ выделяет нарождающиеся тренды как ранние сигналы будущих изменений
    в обществе, которые будут влиять на спрос на жильё, типы домов, инфраструктуру
    и городскую среду


    🟠Демография — реставрация отцовства; рост популярности многодетности; жизнь в
    одиночку; климатическая иммиграция; изменение этнонационального и религиозного
    баланса; политическая эмиграция/иммиграция.


    🟠Ценности — рост одиночества как ценности; падение престижа науки и рост конспирологии;
    поиск новой глобальной идеологии; размывание локальной/региональной идентичности.


    🟠Психология — когнитивная разгрузка (ослабление способностей из-за ИИ); усталость
    от цифровизации и поиск «цифрового детокса»; нарастающая потребность в человеческом
    контакте.


    🟠Институты — новые профессии быстро исчезают; прекарная (временная) работа; непрерывное
    образование через альтернативы; технопереворот в вузах; ИИ вытесняет средний класс;
    эрозия науки.


    Интересно для застройщиков:

    🟠Рост одиночества стимулирует спрос на компактные квартиры-студии для 1–2 человек,
    с акцентом на коливинг и небольшие кварталы для компенсации дефицита общения.


    🟠Многодетность и реставрация отцовства требуют семейного жилья с большими квартирами
    (3+ комнаты), детскими площадками, садами и инфраструктурой для семей (школы,
    поликлиники поблизости).


