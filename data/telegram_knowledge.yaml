  text: "\U0001F3DBПравительство разрешило менять существенные условия госконтрактов\
    \ из-за роста НДС\n\nПостановлением Правительства от 15.04.2026 № 416 установили\
    \ специальный механизм изменения контрактов в связи с увеличением ставки НДС с\
    \ 1 января 2026 года. \nПри этом постановление распространяется только на контракты\
    \ для обеспечения федеральных нужд. Для регионов и муниципалитетов рекомендовали\
    \ принять аналогичные акты, чтобы обеспечить возможность изменения контрактов\
    \ на своем уровне.\n\n\U0001F4CCИзменения допускаются, если:\n— контракт заключили\
    \ до 01.01.2026 (или закупка объявлена до этой даты);\n— в нем не был учтен новый\
    \ размер НДС;\n— возникли обстоятельства, которые не зависят от сторон и мешают\
    \ исполнению.\n\n\U0001F4CCЧто разрешили менять:\n— цену контракта, но строго\
    \ в пределах увеличения ставки НДС и только в отношении тех работ и услуг, которые\
    \ принимают после 01.01.2026;\n— объемы и виды работ, а также строительные ресурсы\
    \ — без увеличения цены.\n\nИзменения можно внести только по соглашению сторон\
    \ и только до 1 октября 2026 года, и при этом обязательно должно быть доказано,\
    \ что исполнение контракта на прежних условиях стало невозможным именно из-за\
    \ роста НДС. То есть сам по себе факт увеличения ставки НДС не является безусловным\
    \ основанием для пересмотра контракта. Нужно будет обосновывать причинно-следственную\
    \ связь — почему именно это изменение делает исполнение невозможным.\n\n\U0001F4CC\
    Постановление охватывает широкий круг контрактов, в том числе на:\n— инженерные\
    \ изыскания и проектирование;\n— строительство, реконструкцию, капремонт, снос;\n\
    — работы по сохранению объектов культурного наследия;\n— строительный контроль\
    \ и авторский надзор;\n— благоустройство и текущий ремонт.\n\n\U0001F609 Подписаться\
    \ на Актион Строительство | \U0001F972Актион Строительство в MAX"
