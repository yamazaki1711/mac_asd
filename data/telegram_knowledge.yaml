  text: '⚡️ Правительство уточняет требования к реестрам членов СРО


    На публичное обсуждение вынесли проект постановления Правительства о внесении
    изменений в постановление от 25.11.2025 № 1880, которое регулирует состав сведений
    в реестрах членов саморегулируемых организаций.


    Проект синхронизирует действующие требования с нормами Федерального закона от
    28.12.2025 № 507-ФЗ, которым внесли изменения в Градостроительный кодекс.


    📌Что предлагают изменить:

    — Расширяется состав сведений в реестрах СРО.

    В реестры будут включаться не только ключевые специалисты (НРС), но и так называемые
    «иные специалисты» — сотрудники, занятые в строительстве и занимающие должности
    из установленного перечня. Это связано с изменениями в ст. 55.5-1 ГрК РФ.


    — Приводятся в соответствие требования к кадровому составу.

    Учитываются положения постановления Правительства РФ от 20.03.2024 № 338, где
    закреплено, что у членов СРО помимо руководителей должны быть специалисты технических
    служб (в том числе работающие по совместительству).


    — Расширяется информация об опыте.

    Предлагается закрепить возможность включения в Единый реестр сведений обо всех
    исполненных договорах подряда, независимо от даты их заключения.


    🔴Единый реестр должен стать полноценным инструментом проверки подрядчиков:

    — видна фактическая правоспособность компании;

    — подтверждается наличие специалистов;

    — отображается реальный опыт выполнения работ.

    В итоге заказчики (включая государственные и муниципальные) смогут принимать решения
    на основе актуальных и полных данных — в режиме «одного окна».


