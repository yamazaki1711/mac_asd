  text: "Об оппонентах, которые «ничего не понимают»\n\nПериодически слышу от коллег\
    \ жалобы на судебных оппонентов: те и закон не знают, и в суде «несут ерунду».\n\
    \n❌Что не нужно делать в судебном процессе?\n\nВ некоторых случаях это приводит\
    \ к тому, что коллеги начинают вести персональную битву против такого оппонента.\n\
    \nЭто ошибка — возможно, оппонент только этого и добивался. Напомню: в суд мы\
    \ приходим для суда, а не для того, чтобы смотреть на юриста другой стороны и\
    \ ожесточённо вступать с ним в спор.\n\nНо сегодня не совсем об этом. Зачастую\
    \ коллега, который «несёт ерунду», может оказаться очень опасным противником.\
    \ Не нужно его недооценивать и думать, что он слабее вас как юрист — или слабее\
    \ вашего юриста.\n\n‼️Взгляд со стороны судьи\n\nОчень часто такой оппонент прекрасно\
    \ понимает, что он делает. Он знает, что пришёл доносить позицию судье, а не вам.\
    \ В этот момент, слушая выступление такого юриста, не нужно внутренне эмоционировать\
    \ и думать «да что ты такое несёшь» — нужно анализировать и одновременно смотреть\
    \ на его речь глазами судьи.\n\nСудьи повидали многое, но они прежде всего правоведы.\
    \ Судья может не знать особенности функционирования той или иной организации или\
    \ того, как передаётся информация по конкретному защищённому каналу связи.\n\n\
    \U0001F4A1Умелый оппонент будет красиво и грамотно «стелить» — создавать перед\
    \ судьёй определённую картину. Рассказывать, почему то или иное доказательство\
    \ не нужно, почему некий факт не имеет значения и «работает вот так» — хотя на\
    \ самом деле не так.\n\nХорошо, когда вы или ваш юрист это знаете. В такой момент\
    \ очень хочется сказать, что оппонент «несёт чушь». Но, скорее всего, он делает\
    \ это намеренно — и намеренно воздействует на судью.\n\nЧестно признаюсь: я люблю\
    \ сильных коллег с другой стороны. Понимаю, когда они специально подают нереальную\
    \ картину для судьи, знаю, что это ерунда, — но понимаю зачем. Мысленно отдаю\
    \ дань уважения красивой подаче даже такой выдумке.\n\nПосле подобного выступления\
    \ и стоит задача — быстро привести судью в чувство и подсветить: почему оппонент\
    \ только что сказал всё не так, как есть на самом деле. При этом объяснение должно\
    \ быть простым.\n\n\U0001F5E3Говорите прямо: \nУважаемый суд, вот это работает\
    \ так и так. Поэтому, чтобы понять, сработало ли в данном случае — нам необходимо\
    \ узнать то-то. А чтобы это узнать, нам нужно увидеть это.\n\nИ не нужно в этот\
    \ момент смотреть на коллегу с другой стороны и объяснять ему, что он не прав.\
    \ В таком случае вы оставите ему больше шансов.\n\n➡️В комментариях рассказали\
    \ прекрасную историю о том, как можно перегнуть с количеством «ерунды»\n\n\U0001F3F7\
    Прочёл в законе\n\nРезервный канал в MAX"
