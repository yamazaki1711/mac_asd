  text: "Самый дорогой документ стройки - это письмо\n\nПодрядчику кажется: главное\
    \ - делать работы, а письма это уже бюрократия. \n\nНо именно письма потом определяют,\
    \ кто в споре оказался виноватым, а кто смог доказать, что объект шел с препятствиями,\
    \ изменениями и рисками не по его вине.\n\nСтройка почти никогда не сыпется красиво\
    \ и по одному основанию. Обычно все начинается с мелких сбоев. \n\nЗаказчик вовремя\
    \ не передал проект. Потом не дал фронт работ. Потом начали менять решения по\
    \ ходу. Потом что-то зависло на согласовании. Потом подрядчик продолжил работать\
    \ \"по ситуации\", не фиксируя это письменно. А в конце приходит претензия по\
    \ срокам. И подрядчик искренне возмущается: как так, ведь все же всё понимали.\n\
    \nВот только суд не работает по модели \"все всё понимали\". \n\nСуд работает\
    \ по модели \"что подтверждено документально\". И если письма не направлялись,\
    \ если препятствия не фиксировались, если дефекты исходных данных обсуждались\
    \ только на словах, если срок поплыл, а подрядчик продолжал молчать, то в споре\
    \ будет казаться, что объект просто просрочен по его вине.\n\nПоэтому я много\
    \ раз повторяю одну и ту же вещь: письмо на стройке - это не формальность, а инструмент\
    \ перераспределения ответственности. \n\nОдно грамотное письмо о препятствиях\
    \ может потом стоить больше, чем длинная эмоциональная позиция в суде. Одно письмо\
    \ о дефектах проектной документации может спасти от неустойки. Одно письмо о готовности\
    \ к сдаче может перевернуть спор о приемке.\n\nЕсли на объекте что-то идет не\
    \ так, молчать нельзя. Если заказчик тормозит, нужно писать. \n\nЕсли документация\
    \ дефектная, нужно писать. \n\nЕсли работы невозможно продолжать без решения заказчика,\
    \ нужно писать. \n\nЕсли вы готовы сдавать, а приемка затягивается, нужно писать.\
    \ \n\nНе в чат \"ну что там\". \n\nНе на словах. \n\nНормально, по процедуре,\
    \ с фиксацией.\n\nИменно такие письма входят в абонентское обслуживание и  защищают\
    \ в случае спора.\n\n\U0001F4E9 Telegram: @grikevich\n\U0001F4DE +7 985 227-74-98\n\
    \U0001F4F2 WhatsApp - написать по ссылке\n✉️ E-mail: oxanagrikevich@yandex.ru\n\
    MAX - резервный канал"
