  text: "Покупка велосипеда как кейс: предприниматель — потребитель\n\nО том, что\
    \ на днях у меня появился новый велосипед подписчики канала Юрист в кроссовках\
    \ уже знают (тут: характеристики велосипеда и место покупки)\n\n\U0001F6B2Но на\
    \ этом канале хочу рассказать о покупке как о кейсе предприниматель — потребитель.\
    \ Потому что получилось неожиданно показательно.\n\nЕсли честно, я представлял\
    \ себе покупку так: заказал — согласовали дату доставки - привезли - оплатил -\
    \ забрал. Стандартная история.\n\nВ моём случае всё оказалось совсем иначе.\n\n\
    1️⃣Во-первых: размер.\n\nВелосипед выбирается под рост. Причём на одну и ту же\
    \ модель у разных магазинов может быть указан разный подходящий рост, а у производителя\
    \ — вовсе свои рекомендации. Это обычная история, в моём случае у магазина собственная\
    \ табличка подходящего размера на основе обратной связи покупателей.\n\nНесмотря\
    \ на то что я уже сделал заказ, со мной отдельно обсудили ростовку. Общаясь по\
    \ телефону, параллельно я замерял длину рук и ног — и мы делали окончательный\
    \ выбор. И это была не моя инициатива.\n\n2️⃣Во-вторых: сборка.\n\nВ крупном сетевом\
    \ магазине велосипед собирает сотрудник торгового зала. Ничего не имею против\
    \ таких сотрудников, они тоже профессионалы, но это не веломастер. В моём случае\
    \ велосипед отдали на сборку в мастерскую, с которой сотрудничает магазин.\n\n\
    3️⃣В-третьих: передача товара.\n\nКак думаете, сколько по времени осуществлялась\
    \ передача мне велосипеда?\n\n‼️Час. И это очень полезный час!\n\nНа протяжении\
    \ этого времени мы совместно проверили работу переключения передач и тормозов,\
    \ обсудили нюансы и возможные проблемы, мне рассказали как правильно обслуживать\
    \ и на что обращать внимание. Дали рекомендации по велообуви. Ну и за спорт просто\
    \ пообщались.\n\n\U0001F4CEА теперь про Закон о защите прав потребителей\n\nСтатья\
    \ 10 Закона о защите прав потребителей обязывает продавца предоставить покупателю\
    \ полную и достоверную информацию о товаре — в том числе о правилах эксплуатации\
    \ и безопасного использования. \n\nСтатья 7 закрепляет право потребителя на безопасность\
    \ товара при его использовании.\n\nНа практике это часто сводится к листочку в\
    \ коробке с инструкцией на семи языках, которую никто не читает.\n\nЗдесь же закон\
    \ был исполнен в полной мере — и даже сверх того. Час живого инструктажа, проверка\
    \ всего, персональные рекомендации. Именно так и должна выглядеть передача сложного\
    \ товара, если продавец относится к своему бизнесу добросовестно.\n\nЯ никогда\
    \ не видел такого подхода к покупателю. Тот случай, когда надпись на сайте \"\
    персональный подход к клиенту\" — это не просто слова.\n\nА у вас бывало, что\
    \ продавец реально соблюдал закон — и даже удивил этим?\n\nP.S. Ожидание весны\
    \ теперь усилилось! \n\n\U0001F3F7Прочёл в законе"
