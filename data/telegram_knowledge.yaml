  text: "О стандарте для «умных» батарей\n\nГОСТ Р 72534-2026 «Системы отопления поквартирные\
    \ с комплектными блоками автоматического управления. Общие технические требования»\n\
    \nВ чем суть  \n\nГОСТ предназначен для проектировщиков, застройщиков, управляющих\
    \ компаний и производителей климатического оборудования.\n\nУстанавливает технические\
    \ требования к квартирным блокам заводского изготовления, которые используются\
    \ для подключения к системам центрального отопления с горизонтальной поэтажной\
    \ разводкой.\n\nСистемы автоматического управления позволяют централизованно контролировать\
    \ инженерные системы в жилых зданиях. \n\nОни позволяют: \n\n\U0001F535дистанционно\
    \ регулировать температуру;  \n\U0001F535задавать режимы отопления;\n\U0001F535\
    учитывать потребление тепла в каждой квартире.\n\nЦели стандарта: \n\n\U0001F535\
    снизить теплопотребление;\n\U0001F535внедрить автоматизацию и диспетчеризацию\
    \ систем отопления в пределах отдельных квартир. \n\n\U0001F972«Законы стройки»\
    \ в MAX"
