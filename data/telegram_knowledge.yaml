  text: 'Конструктивный разговор


    Недавно мы писали про избыточный контроль и там вскользь упомянули про так называемое
    конструктивное изменение (Constructive Change).


    Термин Constructive происходит от слов construe (рассмотрение).


    Так вот, концепция этого самого конструктивного изменения - про необоснованные
    вмешательства заказчика в процесс строительства, в результате чего могут либо
    затянуться сроки, либо придется выполнять дополнительные работы, объемы, или применять
    более дорогие материалы.


    Причем таким изменением может считаться даже устное указание заказчика.


    И, что самое дикое – это все прописано в аналоге нашего 44-ФЗ - FAR (п. 52.243-4).
    Видимо, совсем у буржуев крыша поехала, раз они готовы так легко взять и вручить
    в руки подрядчиков (а как известно, все они - жулики) вот такой инструмент в спорах.


    Все же знают, что подрядчик должен работать в нужде и исполнять любые прихоти
    заказчика бесплатно. Поэтому даже мало-мальское изменение – только через мутные
    согласования, бесплатную корректировку, изменение сметы и повторную ГЭ, за которую
    подрядчик также сам заплатит, если хочет свои деньги. Ну и допсоглашение, конечно
    же. Только так, через много месяцев, а там, глядишь, и простится все.


    Ну а если по какой-то причине одной из этих бумажек не будет - то на нет и суда
    нет.


    #ценообразование #бюрократия'
