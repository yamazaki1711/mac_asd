  text: "‼ Не двое из ларца, или почему приемка работ и участие в ней – не одно и\
    \ то же \U0001F447\n\n\U0001F48E Суды провели тонкую грань между подписанием актов\
    \ приемки от имени заказчика и обычного участия в приемке работ. Все акты, подписанные\
    \ без доверенности, даже в рамках соглашения о контроле строительства и т.д.,\
    \ не имеют юридической силы.\n\n\U0001F4B0 Заказчик перечислил подрядчику аванс,\
    \ который превысил сумму выполненных работ. А вскоре заказчик направил претензию\
    \ и расторг договор в одностороннем порядке. Подрядчик настаивал, что заказчик\
    \ должен заплатить больше и предъявил в обоснование своей позиции сопроводительные\
    \ письма, которые подписаны своим же гендиректором (подрядчика) в рамках исполнения\
    \ соглашения о контроле за ремонтом, заключенного между гендиректором подрядчика\
    \ и заказчиком. Подрядчик обратился в суд.\n\n\U0001F4CC Формулировка иска\n\n\
    ✏ О взыскании задолженности \n\n\U0001F4CC Позиции судов \n\n⚖ Суды всех трех\
    \ инстанций, включая СКЭС ВС РФ, встали на сторону заказчика.\n\n\U0001F4DC Исходя\
    \ из содержания договора контроля, у гендиректора подрядчика (ИП) имелись полномочия\
    \ на участие в приемке работ.\n\nОбязанность участвовать в приеме работ и полномочия\
    \ принимать работы от имени заказчика, не являются тождественными.\n✍ Истцом не\
    \ предоставлена доверенность или иной документ, в котором бы содержались полномочия\
    \ ИП от имени заказчика принимать работы, подписывать акты и справки форм КС-2,\
    \ КС-3. Такую доверенность заказчик ИП не выдавал.\n\n\U0001F91D Более того, судами\
    \ установлено, что единственным участником и гендиректором подрядчика является\
    \ ИП. Таким образом, предоставленные в дело сопроводительные письма подписаны,\
    \ фактически, указанным лицом и переданы самому себе.\n\n\U0001F9EE А, значит,\
    \ отсутствуют надлежащие доказательства выполнения истцом работ на сумму перечисленного\
    \ аванса или сверх нее.\n\n\U0001F4BC Комментарий юристов \"Реаналитики\":\n\n\
    \U0001F9E9 Сейчас суды будут обращать внимание на многие аналогичные соглашения\
    \ о контроле за строительством, и заключение договоров на оказание услуг по участию\
    \ в приемке (и других подобных) без выдачи доверенности может потерять свое значение.\n\
    \n\U0001F50D Определение ВС РФ от 20.03.2026 г. по делу № А40-142586/2024\nhttps://m.kad.arbitr.ru/Card/512363b1-64e4-4842-804f-b5854f41e295\n\
    \n⁉ Согласны ли Вы с тем, что для подписания актов нужна доверенность?\n\n\U0001F44D\
    \ – Да.\n\U0001F914 – Нет.\n\nPS: Выводы являются обобщёнными. Для конкретных\
    \ рекомендаций и решений обратитесь в “Реаналитику”\nreanalitika.ru.\n\n#арбитражныйпроцесс,\
