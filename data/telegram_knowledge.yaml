  text: 'Как кассация не дала собственнику здания уйти от платы за землю


    🏛 Департамент городского имущества Москвы потребовал с компании около 599 000
    руб. за использование земельного участка на ул. Люблинская. Компания владеет зданием
    на этом участке с 2007 года, но договор аренды земли оформлен на другое лицо.
    Департамент посчитал, что компания пользуется землей без правового основания.


    ⚖️ Суды первой и апелляционной инстанций отказали Департаменту. Они решили, что
    компания в силу закона стала арендатором участка вместе с покупкой здания — а
    значит, Департамент просто выбрал неверный способ защиты. Однако Арбитражный суд
    Московского округа отменил эти решения. И вот почему:


    🔹Принцип платности землепользования никто не отменял — собственник здания обязан
    платить за землю.


    🔹Суд не связан квалификацией, которую предлагают стороны, и должен рассмотреть
    спор по существу.


    🔹Нижестоящие инстанции фактически освободили компанию от любых платежей за землю,
    вместо того чтобы определить применимые нормы.


    Дело направлено на новое рассмотрение. Суду предстоит предложить истцу уточнить
    требования и проверить расчет заявленной суммы.


    Подробнее в новости


    Постановление № Ф05-2049/2026 от 10 апреля по делу № А40-63194/2025


