  text: "Контролирующее лицо должника — это кто?\n\nВ комментариях просили подробнее\
    \ рассказать, кого суд в банкротном деле признает контролирующим лицом, что может\
    \ привести к субсидиарной ответственности. Разбираемся.\n\nЗачем вообще нужен\
    \ этот термин?\n\nЯ придерживаюсь позиции, что «контролирующее лицо» в Законе\
    \ о банкротстве — это скорее подсказка для судей кого точно стоит проверить на\
    \ предмет реального влияния на компанию.  Это не исчерпывающий список фигур и\
    \ признаков. \n\nЭту позицию можно встретить в работах Суворова Е.Д. Радик Лотфуллин,\
    \ о его книге я рассказывал ранее, как мне показалось, тоже склоняется к этому\
    \ мнению, называя сам термин «неудачным».\n\nКого закон считает контролирующим\
    \ лицом?\n\nЕсли очень упростить, то можно выделить три группы: \n\n1️⃣Контролирующие\
    \ по умолчанию. Руководитель, владелец более 50% долей/акций, а также тот, кто\
    \ получал выгоду от сомнительных сделок компании. Их статус предполагается автоматически\
    \ — пока не доказано обратное.\n\n2️⃣Предположительно контролирующие. Те, у кого\
    \ есть признаки контроля, но автоматически статус не присваивается. Классический\
    \ пример — главный бухгалтер. Если суд установит реальное влияние на деятельность\
    \ компании, то субсидиарная ответственность возможна.\n\n3️⃣Скрытые контролирующие.\
    \ Те кто не афиширует свой статус, но имеет возможность влияния на деятельность\
    \ компании. Это могут быть как родственники, так и кто угодно. И это особо интересно.\n\
    \nКак на самом деле определяют контролирующее лицо?\n\nКак отмечено выше, сам\
    \ термин — некий ориентир для судей: кого следует проверить на причастность к\
    \ деятельности компании. По факту проверить могут кого угодно.\n\nОпределяющий\
    \ же признак — это возможность влиять на деятельность компании. Неважно, какую\
    \ должность человек занимает и занимает ли её вообще. Если он мог влиять на решения,\
    \ то его могут признать контролирующим лицом.\n\nВ зарубежном подходе (в США)\
    \ контроль обосновывается не только через возможность влияния, но и через возможность\
    \ быть бенефициаром этого влияния, то есть получать доход за счёт реализации своих\
    \ возможностей. Логично, на мой взгляд.\n\n\U0001F4CEНа тему контролирующих лиц\
    \ и субсидиарной ответственности вышла вторая часть моего интервью на Клерк.ру\
    \ —читайте здесь.\n\n\U0001F3B8Ну и отдельно — вот здесь есть отличная песня в\
    \ исполнении ИИ про контролирующее лицо. Это хит. Рекомендую.\n\nВ следующем посте\
    \ будет история про бизнес-подкасты, куда многие хотят попасть, но не все знают\
    \ о том, как это может аукнуться в будущем, с точки зрения субсидиарной ответственности.\n\
    \n\U0001F3F7Прочёл в законе\n\nРезервный канал в MAX |ВК"
