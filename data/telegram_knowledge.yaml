  text: "Когда вера творит чудеса\n\nПорой отъявленные атеисты, скептики, люди науки\
    \ вынуждены признать: чуду всегда есть место. Именно оно произошло 11 лет назад\
    \ с американским подростком. \n\nЯнварь 2015 года, озеро Сент-Луис, Миссури.\n\
    \n14-летний Джон Смит гулял с друзьями по замерзшему озеру. В какой-то момент\
    \ лёд под ним провалился, и мальчик ушёл под воду. Друзей спасли быстро, а Джона\
    \ искали целых 15 минут. Когда его вытащили, он не дышал, у него не было пульса.\n\
    \nВ больнице врачи боролись за его жизнь еще 43 минуты. Восемь уколов адреналина,\
    \ дефибриллятор, ручная реанимация, — всё бесполезно. Сердце молчало почти час.\n\
    \nНо прежде чем сделать в карте запись о времени смерти, они решили дать матери\
    \ попрощаться.\n\nВрачи вспоминают, что мать мальчика, Джойс Смит вошла в палату,\
    \ склонилась над неподвижным сыном и стала читать молитву. Вдруг на глазах у шокированных\
    \ медиков на мониторе появился пульс.\n\nВрачи, видавшие всякое, признались: такого\
    \ они не видели никогда. Один из реаниматологов, доктор Саттерер, той же ночью\
    \ записал в заметках, что стал свидетелем чего-то, что не может объяснить с медицинской\
    \ точки зрения .\n\nДжон выжил, но врачи готовили семью к худшему: он наверняка\
    \ останется инвалидом. Мозг без кислорода почти час — это гарантированные тяжелые\
    \ поражения. Мальчик будет овощем. \n\nДжойс слушала их, кивала, но не продолжала\
    \ верить в полное выздоровление. \n\nНа вторые сутки мальчик пришёл в сознание.\
    \ А\nчерез 17 дней Джон Смит ушёл из больницы своими ногами. Без инвалидности.\
    \ Без повреждений мозга. Полностью здоровый подросток.\n\nДжон не просто вернулся\
    \ к обычной жизни. Он стал спортсменом, — серьезно увлекался баскетболом и даже\
    \ тренировал молодежную команду. Сегодня он путешествует по стране и рассказывает\
    \ свою историю тысячам людей.\nЯ не помню того дня, — говорит Джон. — Но я знаю\
    \ одно: Бог дал мне второй шанс, и я не потрачу его впустую\nВрачи до сих пор\
    \ выдвигают гипотезы, говоря, что с одной стороны гипотермия замедлила метаболизм\
    \ и защитила мозг. С другой, они признают, что с учетом всех медицинских факторов,\
    \ полное восстановление без единого последствия — это необъяснимо.\n\nДоктор Гаррет,\
    \ работающий в детской реанимации 30 лет, сказал:\nЕсли бы я не был частью этой\
    \ истории, я бы сам в нее не поверил\nВрачи сделали всё возможное. Но тот самый\
    \ последний шаг от смерти к жизни сделала молитва матери, которая отказалась принимать\
    \ прогнозы как истину и продолжала молиться и верить.\n\nИстория чудесного выздоровления\
    \ Джона Смита легла в основу фильма \"Прорыв\". \n\nКаждый из нас может оказаться\
    \ или уже был в ситуациях, где остаётся только верить и надеяться. Со светлой\
    \ Пасхой!"
