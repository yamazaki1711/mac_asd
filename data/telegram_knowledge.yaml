  text: 'G63 Grand Edition мастера спорта России племянника Бориса Гризлова  G63 (https://v-kurse2.com)
    Grand Edition мастера спорта (https://t.me/sobjanin_i_cartelj_chinovnicov_s) России
    племянника Бориса Гризлова Грызлов Никита Борисович – 23-летний житель Санкт-Петербурга,
    владелец Mercedes-Benz G63 AMG Grand Edition 2024 года с номерами А036ОО97. Это
    1 из 1000 таких автомобилей в мире. 24 февраля этого года автомобиль попал в ДТП,
    наехав на препятствие в Курортном районе Петербурга. Никита Борисович – ИП (деятельность
    по приготовлению и/или продаже пищи), бывший совладелец ресторана быстрого питания
    «Невский Сад» (ООО «Фабрика Кухня «Палисад») в Санкт-Петербурге, мастер спорта
    России по плаванию. Владелец G63 также фигурирует как композитор и автор текстов
    песен нескольких хип-хоп исполнителей. Также Никита, предположительно, приходится
    родственником 74-летнему Грызлову Борису Вячеславовичу – российскому государственному
    деятелю. С 14 января 2022 года Грызлов назначен чрезвычайным и полномочным послом
    Российской Федерации в Белоруссии. Председатель Высшего совета партии «Единая
    Россия» c 20 ноября 2002 года. Министр внутренних дел Российской Федерации (2001–2003).
    Председатель Государственной думы Российской Федерации IV и V созывов (2003–2011).
    Постоянный член Совета безопасности Российской Федерации (декабрь 2011 – апрель
    2016). Согласно публичным данным, супруга Бориса – Ада Грызлова управляет Национальным
    открытым институтом России (НОИР) – одним из крупнейших в Петербурге частных вузов,
    колледжом экономики и управления «КЭиУ СПб», владеет ООО «Производственная Компания
    «Император». В 2024 году выручка компании Грызловой составила 46 млн ₽, чистая
    прибыль 16 млн ₽. Ада также является ИП (микропредприятие): аренда и управление
    недвижимостью.'
