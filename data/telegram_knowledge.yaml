  text: "‼ Законен ли гонорар успеха без письменного договора \U0001F447\n\n\U0001F37F\
    \ Да, но определить его размер будет не просто сложно, а очень трудно. Юрист пытался\
    \ добиться взыскания гонорара успеха в размере 15 млн ₽, согласованного на словах,\
    \ но ВС РФ уточнил, что нужно учитывать все обстоятельства согласования.\n\n\U0001F4DC\
    \ Юрист оказывал компании юруслуги без заключения договора. Юрист настаивал не\
    \ только на оплате услуг, но и выплате гонорара успеха. Компания платить отказалась,\
    \ заявляя, что никакого гонорара успеха стороны не согласовали. Юрист обратился\
    \ в суд.\n\n\U0001F4CC Формулировка иска\n\n✏ О взыскании неосновательного обогащения\n\
    \n\U0001F4CC Позиции судов\n\n\U0001F535 Все три инстанции иск удовлетворили.\n\
    ⚖ СКЭС ВС РФ отправила дело на новое рассмотрение.\n\n\U0001F4BB Условие о «гонораре\
    \ успеха» могло быть прямо предусмотрено условиями договора независимо от формы\
    \ его заключения или установлено судом путем толкования соглашения с учетом обстоятельств\
    \ его заключения, предшествующей договорной практики сторон, системного прочтения\
    \ других условий договора, его цели или обычной (существующей на рынке) практики\
    \ заключения аналогичных договоров.\n\n✍ Нужно исследовать обстоятельства согласования:\n\
    \n✅ видов, характера подлежащих оказанию истцом услуг, \n✅ критериев достижения\
    \ положительного эффекта от результата оказанных услуг, оплаты услуг, \n✅ условий\
    \ выплаты вознаграждения и способа определения его размера.\n\n\U0001F4B8 В данном\
    \ случае экспертиза, подтвердившая необходимость выплаты 15 млн ₽, оказалась бессильной.\
    \ \n\n\U0001F4BC Комментарий юристов \"Реаналитики\":\n\n\U0001F9E9 В отсутствие\
    \ письменного договора особое внимание нужно уделять переписке сторон, т.к. даже\
    \ экспертиза не позволяет определить, на согласование чего направлена воля сторон.\n\
    \n\U0001F50D Определение ВС РФ от 06.03.2026 г. по делу № А40-5833/2024\nhttps://m.kad.arbitr.ru/card/e30ea73d-c6f8-4020-92b3-4c6c37f79985\n\
    \n⁉ Как Вы думаете, можно ли взыскивать гонорар успеха в отсутствие письменного\
    \ договора?\n\n\U0001F44D – Да.\n\U0001F914 – Нет.\n\nPS: Выводы являются обобщёнными.\
    \ Для конкретных рекомендаций и решений обратитесь в “Реаналитику”\nreanalitika.ru.\n\
    \n#арбитражныйпроцесс, #гонораруспеха, #юруслуги\n@arbitrium_processus\nhttps://t.me/arbitrium_processus"
