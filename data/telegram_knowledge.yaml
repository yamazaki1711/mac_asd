  text: 'Разделить нельзя платить


    Юрист Land Law Firm Кристина Мершон разобрала для «ЭЖ-Юрист» свежее постановление
    КС о правилах выплаты компенсаций при изъятии имущества.


    ⚖️ Суд ограничил случаи, когда требования об изъятии недвижимости и об установлении
    размера компенсации можно рассматривать раздельно. Одновременно он обязал выплачивать
    окончательное возмещение незамедлительно после вступления решения в силу.


    🗣 По словам Мершон, КС фактически выступил в роли «позитивного законодателя» —
    закрепил часть гарантий собственников на уровне положений, обязательных для правоприменительной
    практики.


    💡 Ранее публичный интерес в делах об изъятии приводил к массовому выделению споров
    о сумме компенсации в отдельное производство. При этом итоговая сумма, установленная
    судом, оказывалась кратно выше изначально предложенной — иногда в 3–5 раз, говорит
    юрист.


    📌 Но теперь у собственников появится весомый аргумент против разделения требований.
    Однако риск сохраняется: жесткое ограничение судейской дискреции может сделать
    выделение невозможным и там, где оно действительно целесообразно, отмечает эксперт.


    Подробнее в новости


