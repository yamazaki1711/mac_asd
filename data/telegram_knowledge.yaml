  text: "‼ Перевозчик не в ответе за ошибки в документах \U0001F447\n\n\U0001F4E6\
    \ Если груз не удается отправить из-за неправильного оформления документов для\
    \ прохождения таможенных процедур, то ответственность несет тот, на кого договором\
    \ возложена эта обязанность. Спойлер: в 98% случаев это отправитель.\n\n\U0001F1F0\
    \U0001F1FF Испанские рыбные корма должны были доставляться в Казахстан через Латвию\
    \ и Россию. Для этого казахский отправитель заключил агентский договор с российской\
    \ компанией, которая нашла перевозчика и подписала с ним соглашение о перевозке.\
    \ Но все пошло не по плану: груз не смог пройти ветконтроль, а компания вовремя\
    \ не заплатила перевозчику. Перевозчик решил взыскать положенную ему оплату.\n\
    \n\U0001F4CC Формулировка иска\n\n✏ О взыскании долга по договору перевозки\n\n\
    \U0001F4CC Позиции судов\n\n⚖ Все три инстанции, включая СКЭС ВС РФ, встали на\
    \ сторону истца.\n\n\U0001F4DC Согласно условиям договора-заявки, обязанность\
    \ по оформлению документов для прохождения таможенных процедур возложена на компанию-агента.\n\
    \n❓А если перевозчик привлекал к исполнению третьих лиц?\n\n\U0001F449 Это ни\
    \ на что не влияет. Привлечение перевозчиком третьих лиц к исполнению обязательств\
    \ по договору-заявке не может менять объем обязательств истца перед ответчиком,\
    \ как и не может предусматривать дополнительных обязательств, противоречащих законодательству,\
    \ в связи с чем не влияет на существо отношений между истцом и ответчиком.\n\n\
    \U0001F4BC Комментарий юристов \"Реаналитики\": \n\n\U0001F9E9 Поэтому приведённый\
    \ компанией-агентом довод о том, что ответственность должна быть на экспедиторе,\
    \ привлеченном перевозчиком, не состоятелен.\n\n\U0001F50D Определение ВС РФ от\
    \ 22.01.2026 г. по делу № А52-1536/2024\nhttps://m.kad.arbitr.ru/Card/543f0b19-9c6e-4b96-ba20-d09140e5f4da\n\
    \n⁉ Как Вы думаете, кто чаще нарушает договор перевозки – перевозчик или отправитель?\n\
    \n\U0001F44D – Отправитель.\n\U0001F914 – Перевозчик.\n\nPS: Выводы являются обобщёнными.\
    \ Для конкретных рекомендаций и решений обратитесь в “Реаналитику”\nreanalitika.ru.\n\
    \n#арбитражныйпроцесс, #перевозка, #санкции\n@arbitrium_processus\nhttps://t.me/arbitrium_processus"
