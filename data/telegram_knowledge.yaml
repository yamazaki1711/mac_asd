  text: 'Забавная новость. Арбитражный суд Московского округа в одном из постановлений
    выдал фразу: «Суд округа полагает, что в данном случае действует правило: первое
    слово дороже второго». Понятно, что так суд на детсадовском, но доходчивом языке
    объяснил нижестоящим инстанциям необходимость эстоппеля — пресечения противоречивого
    поведения сторон. Мол, не надо сперва признавать факты, а потом их оспаривать.
    Но вышло всё же немного комично.


    Думаю, эту традицию надо развивать и постепенно заменять сложные юридические канделябры
    простым человеческим языком.


    Например, право не свидетельствовать против себя и близких (ст. 51 Конституции)
    отлично ложится на народное «Слово — серебро, а молчание — золото». Презумпцию
    невиновности легко упаковать в «Не пойман — не вор». Про исковую давность напомнит
    поговорка «Обещанного три года ждут». А запрет на новые доказательства в апелляции
