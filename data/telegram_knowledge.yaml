  text: 'Минфин рассказал об особенностях порядка заключения контракта с единственным
    контрагентом с использованием ЕИС


    Специалисты министерства, разъяснили, заключение контракта с единственным контрагентом
    в случаях, предусмотренных ч. 14 ст. 93 Закона № 44-ФЗ, осуществляется в порядке,
    предусмотренном ст. 51 Закона № 44-ФЗ. При этом необходимость применения предусмотренных
    ч. 6 ст. 50 Закона № 44-ФЗ особенностей заключения контракта в указанном случае
    отсутствует, поскольку такие особенности применяются исключительно в случае проведения
    электронного запроса котировок.


    Напомним, что в силу ч. 14 ст. 93 Закона N 44-ФЗ в случаях, предусмотренных ч.
    1 ст. 93 Закона N 44-ФЗ, допускается заключение контракта с использованием ЕИС
    в порядке, установленном п. 3 ч. 5 ст. 93 Закона N 44-ФЗ. При этом в случаях,
    установленных п. 2 (за исключением случая, если в предусмотренных этим пунктом
    указе или распоряжении Президента РФ, постановлении или распоряжении Правительства
    РФ установлено условие о заключении контракта без использования ЕИС), п. 6, п.
    6.1, п. 11, п. 12, п. 54 и п. 55 ч. 1 ст. 93 Закона N 44-ФЗ, заключение контракта
    осуществляется только в порядке, установленном п. 3 ч. 5 ст. 93 Закона N 44-ФЗ.


    При заключении в соответствии с ч. 14 ст. 93 Закона N 44-ФЗ контракта в случаях,
    предусмотренных пп. 1, 8, 22 и 29 ч. 1 ст. 93 Закона N 44-ФЗ, заказчик вправе
    осуществлять предусмотренное п. 1 ч. 2 ст. 51 Закона N 44-ФЗ формирование содержащихся
    в проекте контракта информации и документов без использования ЕИС, за исключением
    формирования цены контракта и ИКЗ. При включении в реестр контрактов информации
    и документов о контракте, заключенном в порядке, установленном п. 3 ч. 5 ст. 93
    Закона N 44-ФЗ, и при исполнении такого контракта применяются положения Закона
    N 44-ФЗ, касающиеся контракта, заключенного по результатам проведения электронной
    процедуры. #ЕП #минфин


    Документ: Письмо Минфина России от 26 марта 2026 г. № 24-06-06/24862


