  text: 'ПРОГОСЗАКАЗ.РФ (VK)


    ⚖️ При закупке игл для автоинъектора надлежит устанавливать ограничение


    Заказчик осуществлял закупку игл для автоинъектора и установил преимущество в
    отношении товаров российского происхождения в соответствии с требованиями Постановления
    № 1875. Положения извещения были обжалованы. По мнению заявителя, заказчик обязан
    был установить ограничение. Контрольный орган признал жалобу обоснованной.


    🔻Правовая оценка суда:


    Установлено, что заказчиком закупается «Игла для автоинъектора», ОКПД2 32.50.13.110
    (КТРУ 32.50.13.110-00005719). Указанный товар соответствует позиции 385 приложения
    № 2 Постановления № 1875 «Иглы хирургические; инструменты колющие; шприцы».


    Из письма Федеральной службы по надзору в сфере здравоохранения № 10-11610/25
    от 04.03.2025 следует, что согласно описанию вида НКМИ 137610 игла для автоинъектора
    предназначена для парентерального введения лекарственного средства и используется
    вместе с автоинъектором, то есть является инъекционной иглой.


    Согласно ГОСТ 25725-89 инъекционные иглы относятся к колющим инструментам. Следовательно,
    иглы для автоинъектора являются колющим инструментом.


    Кроме того, наименования товаров, работ, услуг в приложениях № 1 – № 3 к Постановлению
    № 1875 указаны для цели отнесения закупаемых заказчиком товаров, работ, услуг
    к товарам, работам, услугам, в отношении которых применяются соответствующие «защитные»
    меры. В связи с этим при применении Постановления № 1875 не предусматривается
    обеспечение дословного соответствия наименований, указанных в описании объекта
    закупки (предмета закупки), наименованиям, указанным в приложениях № 1 – № 3.


    Соответствующая «защитная мера» распространяется на всю указанную в позиции приложения
    к Постановлению № 1875 группу товаров, работ, услуг по ОКПД2, то есть на все товары,
    работы, услуги, включенные в указанную в соответствующей позиции группировку по
    ОКПД2. С учетом изложенного, оснований для признания оспариваемого решения антимонопольного
    органа недействительным у суда не имеется.


    📄 Решение АС Свердловской области от 14.04.2026 по делу № А60-5693/2026'
