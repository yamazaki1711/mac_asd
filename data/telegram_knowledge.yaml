  text: "Страшилки про адвокатскую монополию\n\nОбсуждения грядущей адвокатской монополии\
    \ не утихают. Есть сильные аргументы «за» и «против». Но есть и аргументы, которые\
    \ не выдерживают критики. Разберем парочку самых популярных.\n\n❗️Аргумент 1:\
    \ монополия – это прямой путь к «37-му году». Мол, сажать станут кого попало,\
    \ ведь в суд простых юристов не пустят, а адвокаты-то все подконтрольные! \n\n\
    Те, кто приводят аргумент как-будто не знают, что по уголовным делам (где кого-то\
    \ можно посадить) защитником и сейчас может быть только адвокат. Это правило действует\
    \ уже лет как 100 и к монополии отношения не имеет.\n\n❗️Аргумент 2: цены адвокатов\
    \ кусаются, юристов в суд не пустят, и придется либо платить огромные деньги,\
    \ либо автоматически проигрывать дело – ведь без адвоката вход в суд будет воспрещен!\n\
    \nА если заглянуть в текст законопроекта? Там черным по белому прописано: право\
    \ граждан лично защищать свои интересы в суде сохраняется. То есть любой человек,\
    \ как и раньше, сможет сам представлять себя. Никто этого права не отменял.\n\n\
    Юристы-блогеры ради хайпа приводят эти абсурдные аргументы, а люди переживают.\
    \ В связи с этим я обновил на сайте подробную инструкцию: \n\n✔️ Как подать в\
    \ суд самостоятельно, без привлечения юриста или адвоката (https://shupikov.com/tpost/kak-podat-v-sud-samostoyatelno)\n\
    \n\nС уважением,\nАдвокат Евгений Шупиков"
