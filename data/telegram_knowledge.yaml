  text: 'Глава ЛДПР Леонид Слуцкий: бывшие иностранцы должны иметь право на жилищные
    сертификаты не ранее чем через 10 лет после получения гражданства РФ


    По его словам, Россия должна сделать выбор в пользу своего народа, а не распылять
    блага на тех, кто приехал сюда ради легкой наживы.


    ЛДПР также предлагает увеличить срок проживания в России для получения гражданства
    до 10 лет и ввести ежегодные медицинские осмотры для претендентов, чтобы исключить
    возможность распространения в обществе опасных заболеваний и исключить ситуации,
    когда российский паспорт может достаться человеку с наркотической зависимостью.


    Важно


    В апреле правительство России закрепило норму, согласно которой иностранцы смогут
    получать единое пособие на детей только спустя пять лет после вступления в гражданство.
    Изменение вступит в силу с 1 апреля 2027 года.


