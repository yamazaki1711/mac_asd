  text: "Что происходит с трубами при перепадах температуры?\n\nЛюбой трубопровод\
    \ имеет коэффициент линейного удлинения.\nПроще говоря: при нагреве труба расширяется\
    \ и удлиняется. На каждый метр — это доли миллиметра, но на всей протяжённости\
    \ системы суммарное удлинение может быть значительным.\n\n\U0001F449\U0001F3FB\
    \ Поэтому при монтаже важно заранее предусматривать компенсацию температурных\
    \ деформаций. На практике это реализуется несколькими способами:\n\U0001F60Aустройством\
    \ компенсационных петель;\n\U0001F60Aустановкой компенсаторов (в том числе типа\
    \ Козлова);\n\U0001F60Aприменением толстой вспененной изоляции, которая формирует\
    \ канал, внутри которого труба может свободно перемещаться при нагреве и остывании.\
    \ \n\nА что происходит с полимерными трубами в холод?\nПочему полипропилен становится\
    \ более ломким, а PE-Xa остаётся рабочим даже зимой?\nРазобрали ключевые отличия\
    \ и ошибки монтажа — полный материал уже на Дзене\n\nПрисоединяйся к РОСТерм в\
    \ MAX"
