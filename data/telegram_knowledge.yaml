  text: '📄Минстрой готовит единые правила приемки работ по содержанию и ремонту МКД


    На публичное обсуждение вынесли проект приказа Минстроя об утверждении порядка
    и сроков оформления актов приемки оказанных услуг или выполненных работ по содержанию
    и текущему ремонту общего имущества в многоквартирных домах.


    ✏️Документ подготовили во исполнение Федерального закона № 529-ФЗ от 29.12.2025
    и положений ч. 8 ст. 161.1 Жилищного кодекса. После поправок в ЖК РФ закрепили
    новую роль председателя совета МКД. Он получает право контролировать исполнение
    договоров по содержанию и ремонту и подписывать акты приемки работ — по доверенности
    от собственников либо без нее, если такие полномочия предоставлены решением общего
    собрания.


    Минстрой предлагает установить единый порядок и сроки оформления актов, чтобы
    унифицировать процедуру приемки работ по содержанию и текущему ремонту общего
    имущества в МКД.


    📌Проект порядка устанавливает:

    ➡️Акты оформляет исполнитель (управляющая организация или подрядчик) в двух экземплярах
    — для себя и председателя совета МКД.

    ➡️По срокам:

    — по содержанию — в сроки договора, но не позднее 30 дней после оказания услуг,

    — по текущему ремонту — в течение 10 дней после выполнения работ.

    ➡️Дальше запускается процедура согласования:

    исполнитель направляет акт в течение 5 дней, председатель совета МКД должен либо
    подписать его, либо дать мотивированный отказ в течение 10 дней.

    ➡️Если ответа нет — через 30 дней акт считается подписанным.

    ➡️Если есть отказ — стороны обязаны провести совместный осмотр и оформить новый
    акт с учетом замечаний.


    В случае принятия порядок вступит в силу 1 сентября 2026 года.


    😉 Подписаться на Актион Строительство в ТГ | Сообщество ВК | Канал в MAX'
