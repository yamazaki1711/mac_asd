  text: "Дайджест изменений в законодательстве. Май 2026 года\n\nПодготовили для вас\
    \ дайджест изменений, которые вступают в силу в мае.\n\n\U0001F3F7 Изменили правила\
    \ судебной кассации\n\nКассационные жалобы и представления на решения мировых\
    \ судов будут рассматривать не КСОЮ, а вышестоящие судебные инстанции по отношению\
    \ к районным судам и мировым судьям в регионе. Это может быть верховный суд республики,\
    \ краевой, областной суд, суд города федерального значения, суд автономной области,\
    \ суд автономного округа.\n\nЕсли стороны решат обжаловать судебные акты, дело\
    \ будут рассматривать в таком порядке:\n\n\U0001F535 мировой суд – первая инстанция;\n\
    \U0001F535 районный суд – апелляция;\n\U0001F535 президиум регионального суда\
    \ – выборочная кассация;\n\U0001F535 Верховный суд – вторая выборочная кассация.\n\
    \nТакой порядок следует из положений Федерального конституционного закона от 09.04.2026\
    \ № 1-ФКЗ.\n\nСейчас для обжалования дела в кассационной инстанции гражданам нужно\
    \ обращаться в один из девяти КСОЮ в стране. Новый подход сделает правосудие более\
    \ доступным: подать кассационную жалобу можно будет в пределах своего региона.\n\
    \nКассация рассмотрит не всякую жалобу: теперь они будут проходить предварительный\
    \ фильтр. Порядок рассмотрения утвердят в новой главе ГПК. Судья регионального\
    \ суда изучит жалобу или представление, прежде чем передать ее для рассмотрения\
    \ президиуму или отказать в передаче, если отсутствуют основания для пересмотра\
    \ судебного постановления в кассационном порядке.\n\nНовые правила касаются гражданских,\
    \ административных и уголовных дел, а также дел об административных правонарушениях.\
    \ Требования к форме и содержанию, а также срокам на подачу остаются прежними.\
    \ Изменения вступают в силу 12 мая.\n\nОснование: Федеральный конституционный\
    \ закон от 09.04.2026 № 1-ФКЗ, федеральные законы от 09.04.2026 № 78-ФЗ, № 79-ФЗ\
    \ и № 80-ФЗ.\n\n\U0001F3F7 Установили правила назначения пособий для многодетных\
    \ семей, если их доход превысил прожиточный минимум\n\nЕсли при переоформлении\
    \ выплаты среднедушевой доход семьи с детьми младше 17 лет превысит прожиточный\
    \ минимум не более чем на 10 процентов, то право на пособие сохранят. При этом\
    \ его размер составит 50 процентов прожиточного минимума для детей. \n\nТакую\
    \ возможность предоставят однократно за весь период, в течение которого семья\
    \ получает выплаты. Доход рассчитают за последний месяц периода, на который назначили\
    \ пособие, либо за три месяца, которые следуют за месяцем окончания выплат.\n\n\
    Действующий закон такое исключение не предусматривает. Размер пособия определяют\
    \ в зависимости от степени нуждаемости по стандартной шкале.\n\nПоправки внесли\
    \ в Федеральный закон от 19.05.1995 № 81-ФЗ. Изменения вступают в силу 22 мая.\n\
    \nОснование: Федеральный закон от 20.02.2026 № 29-ФЗ.\n\nВсе изменения мая смотрите\
    \ в дайджесте Системы Юрист. Подписчикам канала открыли гостевой доступ к материалу\
    \ на три дня.\n\nДайджест изменений апреля — по этой ссылке ➡️\n\n#изменения \
    \ #дайджестСистемыЮрист\n\n⚪️ Система Юрист в Телеграм | Сообщество ВК | Канал\
    \ в MAX"
