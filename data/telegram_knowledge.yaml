  text: "‼ Кто крайний в параде подрядчиков\U0001F447\n\n\U0001FA86 ВС РФ разобрался\
    \ в \"матрешке\" договоров подряда и напомнил, что в большинстве случаев субподрядчик\
    \ не может судиться с заказчиком, минуя генподрядчика. Исключение – договорные\
    \ условия.\n\n\U0001F3D7 Компания наняла для выполнения работ генподрядчиков,\
    \ те в свою очередь субподрядчиков, а те тоже — субсубподрядчика. Качество работ\
    \ не устроило компанию, и она удержала с генподрядчика штраф, а генподрядчик —\
    \ с субподрядчика. Виноват оказался субсубподрядчик, что было установлено в судебном\
    \ порядке. Субподрядчик не согласился с тем, что оказался крайним и обратился\
    \ с иском к компании.\n\n\U0001F4CC Формулировка иска\n\n✏ О взыскании необоснованно\
    \ удержанного штрафа за ненадлежащее качество работ\n\n\U0001F4CC Позиции судов\n\
    \n\U0001F535 Суды всех трех инстанций встали на сторону истца.\n⚖ СКЭС ВС РФ отправила\
    \ дело на новое рассмотрение.\n\n\U0001F4DC Суды не исследовали надлежащим образом\
    \ условия каждого из договоров, касающиеся прав и обязанностей сторон, объемов\
    \ выполняемых исполнителями и соисполнителями работ, порядка расчетов за выполненные\
    \ работы и распределения денежных средств, привлечения к ответственности за ненадлежащее\
    \ выполнение договорных обязательств.\n\n✍ Суды не дали содержательной оценки\
    \ условиям соглашений, а также актам сдачи-приемки выполненных работ, в которых\
    \ отражено распределение удержанных штрафных санкций.\n\n❗ Поэтому нельзя преждевременно\
    \ удовлетворять требования соисполнителя (по договору 2 уровня), предъявленные\
    \ непосредственно к заказчику (по договору 1 уровня).\n\n\U0001F4BC Комментарий\
    \ юристов \"Реаналитики\": \n\n\U0001F9E9 ВС РФ сослался на незыблемое правило\
    \ п. 3 ст. 308 ГК РФ, гласящей, что стороны обязательства не могут выдвигать в\
    \ отношении третьих лиц возражения, основанные на обязательстве между собой, равно\
    \ как и третьи лица не могут выдвигать возражения, вытекающие из обязательства,\
    \ в котором они не участвуют.\n\n\U0001F50D Определение ВС РФ от 16.12.2025 г.\
    \ по делу № А40-61456/2024\nhttps://m.kad.arbitr.ru/Card/ca238cd1-e305-46dc-8872-2134888b7157\n\
    \n⁉ Как Вы думаете, справедливо ли то, что субподрядчик не может подать иск к\
    \ заказчику?\n\n\U0001F44D – Вполне.\n\U0001F914 – Не думаю.\n\nPS: Выводы являются\
    \ обобщёнными. Для конкретных рекомендаций и решений обратитесь в “Реаналитику”\n\
    reanalitika.ru.\n\n#арбитражныйпроцесс, #подряд, \n@arbitrium_processus\nhttps://t.me/arbitrium_processus"
