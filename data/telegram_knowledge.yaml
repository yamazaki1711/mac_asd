  text: "Ильнар Мирсияпов, Руководитель аппарата Счетной палаты РФ @auditgov:\n\n\
    с 2021 по 2024 год на реализацию объектов в рамках реестра объектов капитального\
    \ строительства было направлено 4,5 трлн рублей, при этом Счетная палата регулярно\
    \ выявляет в этой сфере многочисленные нарушения и недостатки. Только по итогам\
    \ 2025 года их объем составил более 24 млрд рублей.\n\nПолучается, что каждый\
    \ двухсотый рубль уходит в нарушения, завышения, некачественные работы или откровенные\
    \ «серые» схемы. И это только то, что выявлено Счетной палатой. \nСоздание специализированных\
    \ департаментов — это ответ на запрос на повышение качества аудита с целью обеспечения\
    \ целевого, экономного и результативного использования государственных ресурсов.\
    \ Концентрируя компетенции, мы получаем возможность оценивать не только факт освоения\
    \ средств в рискоемких областях управления государственными ресурсами, но и обоснованность\
    \ смет в строительстве, эффективность госзакупок и инвестиций в «цифру». Такой\
    \ подход закладывает основу для предиктивной модели государственного аудита: экспертиза\
    \ помогает выявлять риски нарушений и предотвращать их еще на этапе планирования,\
    \ а не только фиксировать постфактум.\nНу все, ждем движухи от Департамента капитального\
    \ строительства Сергея Викторовича Головина."
