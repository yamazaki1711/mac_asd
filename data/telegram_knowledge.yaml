  text: '⚖️Обход конкурентных процедур обернулся убытками для заказчика


    Заказчик заключил контракт на «аварийный» ремонт с единственным поставщиком без
    проведения торгов, фактически обойдя требования 44-ФЗ. Работы были выполнены и
    оплачены (более 2,7 млн руб.), после чего контракт расторгли по соглашению сторон.


    Позже прокуратура указала: никаких оснований для экстренной закупки не было. Контракт
    потребовали признать недействительным и взыскать деньги.


    Суд согласился с тем, что контракт ничтожен. Но во взыскании отказал.


    ➡️Заказчик сам инициировал неконкурентную закупку и мог понимать незаконность
    своих действий.

    ➡️Подрядчик при этом ничего не скрывал, а работы были реально выполнены и приняты.


    🔴В итоге суд занял позицию: если именно заказчик «обошел систему», он и несет
    последствия. Перекладывать их на подрядчика нельзя.


