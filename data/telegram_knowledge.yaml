  text: "ИСК КО ВСЕМ ПОДРЯД\n\nК нам обратился индивидуальный предприниматель, который\
    \ поставил ремкомплект двигателя для автомобиля. Сам ремонт при этом выполнял\
    \ другой предприниматель. Но когда у заказчика двигатель вышел из строя и антифриз\
    \ попал в систему смазки, в суд он почему-то решил идти сразу ко всем подряд.\
    \ В иске указали двух ответчиков: того, кто ремонтировал машину, и нашего клиента,\
    \ который просто поставил детали. Логика у истца была незамысловатая: кто именно\
    \ виноват, я не знаю, поэтому пусть платят оба.\n\nСуд первой инстанции, к счастью,\
    \ в этом разобрался без таких вольных фантазий. С исполнителя ремонта убытки взыскали,\
    \ а вот к нашему клиенту претензии не прошли. Потому что в суде нужно доказать,\
    \ что именно поставленная деталь была некачественной, что именно из-за неё возникла\
    \ поломка и что между действиями поставщика и ущербом вообще есть прямая связь.\
    \ Этого как раз никто и не доказал. В итоге суд отказал в иске к нашему клиенту,\
    \ а апелляция и кассация этот вывод поддержали.\n\nКак раз самый показательный\
    \ момент: один ответчик вовремя обратился к нам за юридической помощью, поэтому\
    \ удалось его защитить. А вот второй ответчик слишком долго делал вид, что «не\
    \ очень понимает, что происходит», вместо того чтобы сразу нормально защищаться.\
    \ Хотя даже по материалам дела было видно, что там напрашивалась судебная экспертиза.\
    \ Но ни в первой инстанции, ни в апелляции об этом никто вовремя не заявил. А\
    \ когда на стадии кассации наконец появился профессиональный юрист, было уже поздно.\n\
    \nПоэтому не надо сидеть и надеяться, что всё как-нибудь решится само по себе.\
    \ В суде такая тактика обычно заканчивается плохо. Обращайтесь к грамотным юристам\
    \ сразу. Контакты будут ниже \U0001F447\n\nЮридическая компания \"Ярдрей\" \n\n\
