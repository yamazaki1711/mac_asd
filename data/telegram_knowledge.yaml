  text: '25 ноября президент утвердил новую Стратегию государственной национальной
    политики до 2036 года: что это значит для регионального развития и строительства


    Россия обновила базовый стратегический документ в сфере национальной политики
    до 2036 года. Среди приоритетов - укрепление гражданской идентичности, поддержка
    межнационального согласия и развитие регионов с учетом этнокультурных особенностей.
    Для строительной отрасли документ задает новые рамки комплексного развития территорий,
    работы с миграцией и инфраструктурной политики на ближайшие 10 лет.


    Ключевое для строительной отрасли


    1. Единая гражданская идентичность


    Гос­проекты будут оцениваться по социальному эффекту: устойчивость территорий,
    интеграция групп населения, снижение конфликтов через среду.


    2. Социнфраструктура как инструмент политики


    Приоритет для строительства школ, культурных центров, молодежных пространств -
    это становится частью нацполитики, а значит, и госзаказа.


    3. Градостроительство и КРТ с учетом культурного кода


    Проекты должны учитывать этнокультурные особенности территорий. Общественные пространства,
    мастер-планы и КРТ - в логике укрепления согласия и интеграции.


    Итог: для девелоперов и городов это сигнал - среда, идентичность и социальная
    инфраструктура становятся такими же важными, как экономика проекта.


    👨‍🏫 Константин Лушников'
