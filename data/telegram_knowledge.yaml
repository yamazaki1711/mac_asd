    ➡ Судьи ВС напомнили, что земли в составе береговой полосы и акватории водного
    объекта — собственность Российской Федерации и не могут передаваться в частную
    собственность независимо от того, кто их продал и когда.


    ➡ А раз участки находятся во владении ответчика незаконно, а срок исковой давности
    следует исчислять с момента выявления нарушения.


