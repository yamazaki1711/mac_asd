  text: 'Приходит ПТОшник к начальнику и говорит:


    - Вот Вы, Абрам Исаакович, такой умный мужик, скажите мне что такое логика?

    - Смотри, Сереженька, вот есть два человека, производитель работ и ПТОшник. Кто
    из них должен вести исполнительную документацию?


    - ПТОшник?

    - Нет, Сереженька. За документацию, как результат процедуры строительного контроля
    должен отвечать прораб! Так как своевременное и правильное составление исполнительной
    документации является отражением фактического состояния дел и дисциплинирует работников,
    заостряя их внимание на требованиях технических условий, предупреждает возможность
    несчастных случаев, способствует повышению качества работ. Понятно?

    - Да.

    - Вот это и есть логика.


    - Хорошо, а скажите тогда, что такое диалектика?

    - Смотри, Сереженька, вот есть два человека, производитель работ и ПТОшник. Кто
    из них должен вести исполнительную документацию?

    - Ясное дело прораб!

    - Нет Сереженька! Одна половина наших прорабов на компутере не умеет работать,
    а другая – еле по-русски разговаривает. Поэтому за документацию, как результат
    процедуры строительного контроля отвечает ПТОшник, его именно для того и посадили,
    и профстандарт разработали, чтобы бумажки перекладывал. Понял?

    - Да.

    - Вот это и есть диалектика.


    - Хорошо, а что такое философия?

    - Смотри, Сереженька, вот есть два человека, производитель работ и ПТОшник. Кто
    из них отвечает за исполнительную документацию?

    - А x%й его знает!

    - А вот это, Сереженька, и есть философия. Причем всей нашей строительной отрасли...


    Ведение ИД ПТО - ошибка?


    Другие философские беседы Штейнберга и Сереженьки


    #мем #изразговоров'
