  text: "ТРУБЫ ИЗ СШИТОГО ПОЛИЭТИЛЕНА PE-Xb EVOH РОСТерм – технология, с которой началось\
    \ развитие PEX труб.\n\nТруба РOСТерм РЕ-Хb EVOH предназначена для использования\
    \ в системах тёплого пола, охлаждения, снеготаяния, а также в трубопроводах, транспортирующих\
    \ жидкости, которые не агрессивны к материалам труб и фитингов.\n\nPE-Xb стал\
    \ первой технологией сшитого полиэтилена, на базе которой позже появились более\
    \ совершенные решения, включая PE-Xa, с улучшенной эластичностью и восстановлением\
    \ формы.\n\nНо до сих пор многие монтажники продолжают использовать трубу PE-Xb\
    \ с своих проектах. Почему же?\n\n\U0001F60A Проверена временем\nPE-Xb применяется\
    \ десятилетиями — материал хорошо изучен, его поведение в системе предсказуемо.\n\
    \U0001F60A Стабильность характеристик\nТруба сохраняет форму и свойства при длительной\
    \ эксплуатации в отоплении и водоснабжении\n\U0001F60A Понятное решение без экспериментов\
