    \ сметы тоже может составлять машина. Специалист должен правильно поставить задачу\
    \ и оценить, правильно она была исполнена, доработать при необходимости.\n\nМои\
    \ коллеги, которые остались работать в ГГЭ думаю смогут решить эту задачу в обозримом\
    \ будущем.\n\nЗадача, чтобы сметчик / эксперт могли работать комфортно, безопасно\
    \ и с использованием современных инструментов."
