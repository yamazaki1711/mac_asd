  text: "Codenames — игра на подумать\n\nПродолжаю знакомить вас с играми, которые\
    \ пришлись мне по душе. Я уже рассказывал про \U0001F402 и \U0001F404, про \U0001F3AD\
    \ тоже успел упомянуть, теперь очередь дошла до Codenames.\n\nГеймплей\n\nУчастники\
    \ делятся на две команды: синих и красных. Каждая команда выбирает капитана.\n\
    \nНа столе раскладываются карточки с различными словами. Допустим, это будут:\
    \ космос, поле, бочка, карандаш, сенокос, рубашка, звонок, стол, доска.\n\nОбычные\
    \ игроки видят лишь сами слова, а вот капитаны знают, какому цвету принадлежит\
    \ каждое из них.\n\nСлова бывают четырех типов: красные, синие, нейтральные (белые),\
    \ и одно черное.\n\nЗадача красной команды — отгадать все красные слова, синей\
    \ — синие. Если кто-то случайно назовет белое слово, ход передается соперникам.\
    \ А если команда угадывает черное слово — партия заканчивается поражением.\n\n\
    Поскольку только капитан видит цвета слов, именно он должен давать подсказки своей\
    \ команде. Как это происходит?\n\nНапример, капитан красных говорит: «Школа-3».\
    \ Это означает, что среди всех слов есть три красных, связанных со словом «школа».\
    \ Игрокам предстоит догадаться, какие это слова. В данном случае это будут карандаш,\
    \ звонок и доска.\n\nПосле этого ход передается синим. Победит та команда, которая\
    \ раньше найдет все свои слова.\n\nИдеально, когда играет шесть человек (по трое\
    \ в каждой команде, включая одного капитана). Однако количество участников можно\
    \ варьировать. Мы успешно играли даже втроём. Вероятно, получится сыграть и вдвоём,\
    \ хотя лично я такой вариант еще не тестировал.\n\nДля игры используются либо\
    \ обычные карты, либо онлайн-платформы вроде codenames.me. \n\nИгра подходит как\
    \ для взрослых, так и для детей. Недавно сыграли с младшим сыном (ему десять лет),\
    \ и он сумел связать слова «тележка» и «перевод», предложив шифр «cart-2». Кстати,\
    \ для взрослой компании можно подобрать соответствующий набор слов, чтобы игра\
    \ стала ещё веселее!\n\nЕсли игра кажется легкой, то это обманчивое впечатление.\
    \ В действительности она сложна и увлекательна. Слова на игровом поле могут расположиться\
    \ так, что капитанам придется задуматься, какое слово сможет объединить «Марс»\
    \ и «Ракета», но при этом избежать черного слова «Юпитер» и слова «Двигатель»\
    \ противоположной команды. К тому же шифры на два слова никто не раздает — капитаны\
    \ стремятся объединить максимальное количество карточек, чтобы их команда открыла\
    \ все свои карты раньше соперника.\n\nКстати, а как бы вы решили эту задачу: объединить\
    \ «Марс» и «Ракета», но исключить «Юпитер» и «Двигатель»?"
