  text: "Котики и право: День кошки\n\n1 марта в России отмечается неофициальный,\
    \ но милый праздник — День кошки. \n\nПраздник придумали в 2004 году по совместной\
    \ инициативе Московского музея кошки и редакции журнала «Кот и пёс» — и с тех\
    \ пор он прочно вошёл в календарь.\n\nДля канала  этот день давно стал традицией\
    \ — поводом напомнить о любимой рубрике «Котики и право».\n\n↪️Напомню: в ней\
    \ публикуются настоящие судебные и юридические истории, герои которых — коты и\
    \ кошки. И поверьте, там бывает драматичнее, чем в иных банкротных делах\n\n\U0001F4CC\
    Вся подборка рубрики\n\n▪️Право кота быть поглаженным и накормленным\n▪️Кошки\
    \ VS человек. На чьей стороне суд? \n▪️Котики и право. Можно ли вернуть кота продавцу?\
    \ \n▪️Как кот устроил потоп, и ни ему ни хозяину за это ничего не было\n▪️Как\
    \ кот устроил потоп, и его хозяин был за это наказан\n▪️Судья пишет жалобу в пользу\
    \ кота\n▪️Право животных на опеку и на алименты\n▪️Можно ли переселить кошачью\
    \ колонию?\n▪️Владельцы собак VS владельцы кошек. Одинакова ли их имущественная\
    \ ответственность?\n▪️Котики и право: Разлука и домашние животные\n▪️Влияние экспертизы\
    \ в делах о разделе животных\n▪️Кошачий бунт: враг округа Кинг\n▪️Права потребителей\
    \ и права кошек\n▪️Котики и право. Кошка в пабе — символ уюта или нарушение закона?\
    \ \n▪️Кошачье право: реальные и выдуманные законы о кошках\n▪️Как осуждённых отправляют…\
    \ к котикам\n\nНа фото — мой кот. \n\n\U0001F447А в комментариях вновь делитесь\
    \ фотографиями своих котиков. \n\n\U0001F3F7Прочёл в законе"
