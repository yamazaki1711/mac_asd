  text: "Как кавычки проиграли суд\n\nОбещал рассказать о делах, которые вёл со стороны\
    \ АСВ.\n\nСамое эпичное — о мифическом пересчёте двух миллиардов рублей требует\
    \ времени, чтобы нормально уложить в формат поста. Поэтому сегодня история попроще,\
    \ но полезная: она о том, как важно смотреть на детали.\n\n\U0001F9FEДело уже\
    \ было выиграно, но появился ордер\n\nВ какой-то момент среди коллег я заработал\
    \ репутацию человека, который может спасти ситуацию — выиграть то, что уже проиграно\
    \ или стоит на грани поражения.\n\nОднажды обратились с такой ситуацией: у рухнувшего\
    \ банка есть должник. По банковским выпискам долг не погашен. В кассу АСВ деньги\
    \ он не приносил.\n\nВ первой инстанции дело выиграли — с должника взыскали несколько\
    \ миллионов рублей. Ответчик в суд не являлся.\n\nЗатем он подал апелляционную\
    \ жалобу: указал, что не был уведомлён, и приложил кассовый ордер — якобы деньги\
    \ вносил. Коллега, который вёл дело, в шоке звонит мне: что делать?\n\nВзял копию\
    \ ордера из материалов дела, покрутил в руках. Ордер как ордер. Запросил банковские\
    \ выписки по кассе за день якобы внесения денег — такой операции нет.\n\n\U0001F4CE\
    Одна деталь, которую не заметили\n\nТогда я запросил дела по этому же банку, где\
    \ тоже фигурировали ордера о погашении кредитов, и начал сравнивать. На первый\
    \ взгляд — одинаковые. Но тут я заметил, что печать банка разная. На настоящем\
    \ ордере в названии банка стоят типографские кавычки-ёлочки («»). На том, что\
    \ принёс должник, — английские кавычки (\"\").\n\nМоё внимание напряглось, и я\
    \ начал изучать ещё внимательнее. \n\nПри детальном сравнении выяснилось, что\
    \ отличия есть даже в расположении элементов формы. Графы для текста стоят на\
    \ разных высотах. И всё в таком духе.\n\n\U0001F50EРасследование\n\nТут всё стало\
    \ понятно. Дело полностью перешло ко мне. В апелляции тем временем фактически\
    \ перешли к рассмотрению по правилам первой инстанции, то есть начали всё заново.\n\
    \nЯ указал суду, что такой печати в банке не существует, и привёл графическое\
    \ сравнение настоящего ордера с поддельным. А потом провёл целое расследование:\n\
    \n✔️Получил реестр печатей банка. Печати с английскими кавычками в нём не было;\n\
    \n✔️Поднял историю платежей ответчика. Ранее он вносил небольшие суммы в счёт\
    \ погашения и все настоящие ордера были с ёлочками;\n\n✔️Получил кассовую книгу\
    \ банка. Ордера за тот день шли по той же форме, что и подлинные. Плюс по нумерации\
    \ поддельному ордеру просто не было места в этой последовательности;\n\n✔️Проверил\
    \ подписи кассиров и бухгалтера, которые работали в день якобы внесения денег.\
    \ Ни у кого не было подписи, как в поддельном ордере. \n\nВ суд я принёс личные\
    \ дела работников и перечень сотрудников, вышедших в тот день. И даже вызвал свидетелем\
    \ кассира, которая в тот день работала в банке (представьте, что человек согласился\
    \ прийти — это меня очень удивило).\n\n↪️Но главное — знаете, какую роковую ошибку\
    \ совершил фальсификатор?\n\nОн ошибся в номере ссудного счёта, на который якобы\
    \ зачислялись деньги. Этот счёт не просто не принадлежал ответчику. Такого счёта\
    \ в банке вообще не существовало.\n\nЧто было дальше? \n\nАпелляция начала намекать\
    \ представителю ответчика: может, откажетесь от этого доказательства? Пока не\
    \ поздно. Честно говоря, не помню, отказался он в итоге или нет — но решение о\
    \ взыскании осталось в силе. Даже экспертиза не понадобилась.\n\n\U0001F4A1Вывод,\
    \ который я сделал тогда\nЖулики всегда ошибаются.\n\nИ ещё один — смотрите на\
    \ детали. Даже на кавычки.\n\n\U0001F3F7Прочёл в законе\n\nРезервный канал в MAX"
