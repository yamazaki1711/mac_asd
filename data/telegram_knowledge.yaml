  text: "‼ Подтвержденный аккаунт не имеет юрсилы\U0001F447\n\n\U0001F4BB Суды запретили\
    \ опираться лишь на данные аккаунтов из различных систем. Они не могут подтверждать\
    \ полномочия контрагентов, а, значит, вся ответственность за ошибки ложится на\
    \ того, кто не проверил волеизъявление контрагента иным способом.\n\n\U0001F310\
    \ Агент заключил договор перевозки, но перевозчик заявил, что соглашение не подписывал\
    \ и стал жертвой мошеннической схемы. Получилось, что агент перечислил оплату,\
    \ полученную от принципала, не тому перевозчику, опираясь лишь на данные аккаунта\
    \ из системы \"Автотрансинфо\".\n\n\U0001F4CC Формулировка иска\n\n✏ О взыскании\
    \ задолженности и процентов\n\n\U0001F4CC Позиции судов \n\n\U0001F534 Первая\
    \ инстанция в иске отказала.\n⚖ Апелляция и кассация, включая СКЭС ВС РФ, иск\
    \ удовлетворили.\n\n\U0001F5C3 Агент являлся лицом, ответственным за оплату доставки\
    \ груза. Агент не исполнил обязанность по проверке возможных контрагентов, проявив\
    \ неосмотрительность и лишив фактического перевозчика оплаты. \n\n\U0001F50F Проверка\
    \ аккаунта в электронной системе не гарантирует надежности и юридической силы\
    \ совершаемых сделок, наличие подтвержденного аккаунта не освобождает лицо от\
    \ обязанности удостоверяться в полномочиях своего контрагента. \n\n✍ То обстоятельство,\
    \ что после выявления признаков мошенничества ответчик незамедлительно обратился\
    \ в правоохранительные органы, не устраняет изначальной небрежности при проверке\
    \ лица, с которым заключалась сделка.\n\n\U0001F4BC Комментарий юристов \"Реаналитики\"\
