  text: "❓ Кто разрабатывает конструкции крепления котлована, разработчик раздела\
    \ ПОС или КР\n\n\n➡️ В соответствии с СП 22.13330.2016 п. 9.2 проектирование оснований\
    \ подземных частей сооружений включает помимо требований 5.1.3 обоснованный выбор:\n\
    - глубины заложения подземных конструкций;\n- способа устройства подземных конструкций\
    \ (в открытом котловане, полузакрытый \"сверхувниз\", опускной колодец, в насыпи\
    \ и др.);\n- заложения откосов неподкрепленных котлованов;\n- типа, конструкции,\
    \ материала ограждений котлованов и их креплений;\n- мероприятий, применяемых\
    \ для снижения влияния строительства на деформации оснований, фундаментов и надземных\
    \ конструкций сооружений и инженерных коммуникаций окружающей застройки;\n- мероприятий,\
    \ применяемых для минимизации изменений гидрогеологических условий или предотвращения\
    \ вызванных этим возможных негативных последствий, в т.ч. для окружающей застройки\
    \ и экологической среды.\n➡️ В соответствии с СП 22.13330.2016 п. 9.12 расчеты\
    \ и проверки оснований подземных частей сооружений по первой и второй группам\
    \ предельных состояний должны выполняться в соответствии с требованиями раздела\
    \ 5 и включать определения:\n- устойчивости склонов, примыкающих к сооружению,\
    \ откосов и ограждающих конструкций котлованов;\n- нагрузок, передающихся на ограждающие\
    \ конструкции котлованов и наружные стены подземных частей сооружений;\n- усилий\
    \ в конструкциях ограждения котлованов от температурно-климатических воздействий;\
    \ \n- деформаций оснований окружающей застройки."
