  text: "‼ Уничтожение исковой давности стало системой \U0001F447\n\n⏳ Можно заметить,\
    \ что институт исковой давности уже точно сломан. Это второе определение ВС РФ,\
    \ ломающее все представления об исковой давности.\n\n\U0001F3DE В 2008 г. региональному\
    \ министерству удалось в судебном порядке получить право собственности на самарские\
    \ леса. В 2024 г. прокурор, действуя в интересах РФ, решил обжаловать постановление\
    \ апелляции, благодаря которому леса перешли в собственность регионального министерства.\n\
    \n\U0001F4CC Позиции судов\n\n\U0001F534 Сначала кассация и судья СКЭС ВС РФ отказали\
    \ в передаче на рассмотрение в с/з.\n⚖ Но в итоге СКЭС ВС РФ отправила дело на\
    \ новое рассмотрение.\n\n⌚ Сам по себе момент нарушения права публично-правового\
    \ образования не может считаться моментом начала исчисления срока давности.\n\n\
    \U0001F1F7\U0001F1FA При вынесении судебных актов допущены фундаментальные нарушения,\
    \ приведшие к необоснованному отказу \nгосударству в доступе к судебной защите\
    \ публичных интересов.\n\n\U0001F4B8 Формальное применение норм о давности поощряет\
    \ противоправную \nдеятельность должностных лиц и стимулирует их к развитию более\
    \ \nизощренных и надежных способов конспирации нелегального капитала, с тем чтобы\
    \ предпринятых мер было достаточно для истечения срока давности (Постановление\
    \ КС РФ от 31.12.2024 г. № 49-П).\n\n❌ Исправление судебной ошибки, которая повлекла\
    \ существенные нарушения интересов государства и общества, права на справедливое\
    \ судебное разбирательство, не должно быть исключено по причине истечения процессуального\
    \ срока. В противном случае допущенные нарушения остаются неустранимыми, а истинная\
    \ цель правосудия по защите публичных прав и интересов не достигнутой.\n\n\U0001F4BC\
    \ Комментарий юристов \"Реаналитики\":\n\n\U0001F9E9 Ранее ВС РФ не стал применять\
    \ исковую давность в споре по поводу акций Ивановского завода тяжёлого станкостроения.\
    \ Можно достаточно уверенно утверждать, что формируется новый пласт подобной судебной\
    \ практики с участием прокуроров.\n\n\U0001F50D Определение ВС РФ от 04.12.2025\
    \ г. по делу № А55-15555/2008\nhttps://m.kad.arbitr.ru/Card/2e92e785-1d33-485b-9f5f-fa3ce0ced00a\n\
    \n⁉ Как Вы думаете, будут еще аналогичные судебные постановления, сводящие исковую\
    \ давность на нет?\n\n\U0001F44D – Да.\n\U0001F914 – Нет.\n\nPS: Выводы являются\
    \ обобщёнными. Для конкретных рекомендаций и решений обратитесь в “Реаналитику”\n\
    reanalitika.ru.\n\n#арбитражныйпроцесс, #иск, #исковаядавность, #прокуратура,\
    \ #лес\n@arbitrium_processus\nhttps://t.me/arbitrium_processus"
