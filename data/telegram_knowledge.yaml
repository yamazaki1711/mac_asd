  text: 'Конечно, я очень скучаю по той «серьезной» и «счетной» городской мафии, в
    которую мы играли в проф-клубе по городу.


    Все дело в правилах. Как я уже упоминал, правила классики унифицированы, а в городском
    варианте каждый клуб играет по-своему. Пока что единственные правила, которые
    почти идеально сбалансированы, — это правила проф-клуба.


    Попытаюсь объяснить.


    Как достигается баланс и счетность в классике? Дело в том, что классика, благодаря
    отсутствию «лишних» ролевых карт, уже давно полностью просчитана. Так же, как
    в холдеме давным-давно посчитали префлоп, в классике математика игры возведена
    в абсолют. Если мирные допустили ошибку и хотя бы на одном дневном голосовании
    убрали не мафию, а мирного жителя, второго шанса на ошибку уже не будет. Следовательно,
    если прошло два голосования и игра продолжается, то как минимум один из игроков,
    удаленных на голосовании, был мафией (за некоторыми исключениями, которые тоже
    давно просчитаны). Из-за этого анализ голосования в классической мафии даёт огромный
    объём полезной информации.


    В городской мафии такого баланса в голосовании нет, потому что в городе присутствует
    третья сила — маньяк, который ночью может убить как мирного жителя, так и мафию.


    Это делает анализ голосования в городской мафии менее выкристаллизованным, чем
    в классике. Поэтому, чтобы игра по городским правилам оставалась логичной и счетной,
    необходимы другие, более устойчивые опорные точки. Нужны элементы, способные сделать
    игру «счётной».


    В «Драйве» некоторая счётность обеспечивалась информацией о лечении доктора. То
    есть, если ведущий сообщает, что ночью произошло одно убийство, но доктор никого
    не лечил, возникают две возможные основные версии:

    1. Мафия и маньяк стреляли в одного и того же игрока.

    2. Маньяк ранее покинул стол (например, был убит ночью или исключен днем на голосовании).


    В правилах «Драйва» есть еще несколько моментов, которые при определенных условиях
    позволяют посчитать игру, но утверждать, что эти правила делают игру абсолютно
    «счётной», конечно, нельзя.


    Согласно правилам проф-клуба, «счётность» игры обеспечивается действиями путаны
    и объявлением маньяка, когда он покидает стол.


    Путана по правилам проф-клуба блокирует активные действия ролевых карт. Например,
    если ночью путана была у игрока номер 4, а на утро ведущий объявил 2 убийства,
    то игрок номер 4 точно мирный житель, ведь если бы он был мафией или маньяком,
    то его выстрел был бы заблокирован, и убийство было бы одно.


    Если вы играли в другую мафию, это правило (блок путаны) на первый взгляд может
    показаться вам слишком упрощающим геймплей.


    Поверьте на слово, это не так.


    Дело в том, что мафия (если она состоит из опытных игроков) не даст путане и «проверенному»
    ею мирному жителю спокойно рулить столом.


    Команда мафии предпримет контрвскрытие. Кто-то из членов команды мафии назовет
    себя шерифом, кто-то доктором, а кто-то даже объявит себя путаной и назовет нескольких
    игроков, у которых он был ночью.


    В результате появится две контркоманды: настоящие шериф, доктор и путана и команда
    мафиози, вскрывшихся (представившихся) шерифом, доктором и путаной.


    Всего за столом 16 игроков, и с учётом того, что кого-то проголосуют, кого-то
    убьют, в итоге решать судьбу игры придётся нескольким мирным жителям, которые
    должны поверить одной из контркоманд.


    А еще не забывайте, что в городе орудует маньяк, который будет методично убирать
    игроков из каждой версии.


    При этом самая интересная игра в такой ситуации будет именно у простого мирного
    жителя. Он должен собрать всю информацию по каждой команде, проанализировать её,
    найти нестыковки и в итоге правильно определиться в том, какая команда — мафия,
    а какая нет.'
