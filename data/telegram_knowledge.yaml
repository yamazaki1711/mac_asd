  text: 'Арендатор ушел, но платить заставили


    🏛 Верховный суд разобрался в споре между арендодателем и предпринимателем из Пензенской
    области. Арендатор освободила помещение, неоднократно просила подписать акт возврата,
    но арендодатель уклонялся от приемки, а потом взыскал через суд более 460 000
    рублей долга по аренде и коммуналке за два с половиной года.


    Три инстанции встали на сторону арендодателя, но экономколлегия ВС отменила все
    решения и напомнила ключевые правила:


    ✅ Арендодатель не вправе требовать плату за период после прекращения договора,
    если сам уклонялся от приемки помещения.


    ✅ Отсутствие подписанного акта возврата не лишает арендатора права доказывать
    фактическое освобождение помещения другими способами.


    ✅ Ненадлежащее состояние помещения — основание для возмещения убытков, а не для
    продолжения начисления аренды.


    Подробнее в новости


