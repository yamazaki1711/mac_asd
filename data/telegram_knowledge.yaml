  text: "Туристический бизнес по-японски: тысячелетняя история гостеприимства\n\n\
    Нисияма Онсен Кэйункан – официальный рекордсмен Книги Рекордов Гиннеса, как старейший\
    \ отель планеты. Это настоящая машина времени, работающая без остановки более\
    \ 1300 лет.\n\nОтелем управляли представители одной семьи на протяжении 52! поколений.\
    \ Только в 2017 году, когда наследников не нашлось, пост президента занял бывший\
    \ менеджер Кэндзиро Кавано, проработавший там 33 года.\n\nОснованный Фудзиварой\
    \ Махито (сыном советника императора), отель помнит таких постояльцев, как сегун\
    \ Токугава Иэясу и император Японии Нарухито.\n\nОтель стоит на источнике Хякухо,\
    \ который дает более 1600 литров термальной воды в минуту. Гости могут выбирать\
    \ из 6 купален (4 под открытым небом и 2 крытых). Говорят, что вода здесь лечит\
    \ не только тело, но и душу.\n\nЗдание перестраивали и переносили трижды из-за\
    \ пожаров и тайфунов, но бизнес ни разу не закрывался. Отель настолько стар, что\
    \ первое время плату брали не деньгами, а... рисом и наконечниками для стрел!\
    \ \n\nСегодня это не просто историческая достопримечательность, а работающий роскошный\
    \ рёкан. Здесь подают традиционный многокомпонентный ужин кайсэки, а мрамор для\
    \ обжига блюд берут с вулканических пород Фудзиямы.\n\nЗабронировать номер стоит\
    \ от 500 до 1000 долларов за ночь (с двухразовым питанием), но места в этом живом\
    \ музее разлетаются моментально.\n\nА вы бы хотели оказаться в месте, где время\
    \ словно остановилось?"
