  text: '❓ Перечень требований, которые должны быть учтены в рабочей документации,
    разрабатываемой на основании раздела 📋📋📋


    ➡️ В соответствии с Постановлением Правительства РФ от 16 февраля 2008г. № 87
    (далее Положение) в разделе 7 в текстовой части в п. «п» приводится перечень требований,
    которые должны быть учтены в рабочей документации, разрабатываемой на основании
    проектной документации, в связи с принятыми методами возведения строительных конструкций
    и монтажа оборудования.

    ✏️ При разработке раздела ПОС обязательным является соблюдение требований по охране
    труда и промышленной безопасности, приведенных в СП 12-136-2002.

    В соответствии с требованиями п. 4.6 для строительства особо сложных зданий и
    сооружений в составе ПОС разрабатываются с учетом требований безопасности труда
    рабочие чертежи на специальное оборудование, приспособления и оснастку, в том
    числе:

    ✔️ специальная опалубка (несъемная, скользящая);

    ✔️ крепления стенок котлованов и траншей;

    ✔️ оснастка для строительства подземных сооружений способом "стена в грунте",
    прокладке подземных трубопроводов;

    ✔️ защитные устройства при строительстве, реконструкции и эксплуатации опасных
    производственных объектов вблизи существующих зданий.'
