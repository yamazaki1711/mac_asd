agent:
  name: "procurement"
  role: "procurement_specialist"
  display_name: "Закупщик"

model:
  engine: "mlx"
  model_id: "mlx-community/Qwen3-32B-Instruct-4bit"
  precision: 4bit
  max_tokens: 4096
  temperature: 0.2
  top_p: 0.85
  context_tokens: 16384

mcp:
  server: "asd_core"
  tools:
    - "smeta_query"
    - "market_price_lookup"
    - "graph_query"
    - "graph_write"
    - "artifact_write"
    - "notify"

procurement:
  min_quotes: 3
  evaluation_weights:
    price: 0.40
    delivery_time: 0.25
    reputation: 0.15
    payment_terms: 0.10
    extras: 0.10
  lot_consolidation: true

output:
  format: "json"
  export_formats: ["json", "xlsx"]
