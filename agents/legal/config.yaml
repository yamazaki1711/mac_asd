agent:
  name: "legal"
  role: "legal_counsel"
  display_name: "Юрист"

model:
  engine: "mlx"
  model_id: "mlx-community/Qwen3-32B-Instruct-4bit"
  precision: 4bit
  max_tokens: 8192
  temperature: 0.15
  top_p: 0.85
  context_tokens: 32768

mcp:
  server: "asd_core"
  tools:
    - "legal_search"
    - "fz_lookup"
    - "graph_query"
    - "graph_write"
    - "rag_query"
    - "artifact_write"

legal_kb:
  sources:
    - "fz44"
    - "fz223"
    - "gk_rf"
    - "gradostroit_kodeks"
    - "prikaz_344pr"
    - "prikaz_1026pr"
    - "sp543_2024"
  rag_index: "legal_rag"

specialization:
  work_types:
    - "общестроительные"
    - "бетонные"
    - "земляные"
    - "сварочные"
    - "монтажные"
    - "шпунтовые"
  excluded:
    - "кабельные"
    - "слаботочные"
    - "вентиляция"
    - "водоснабжение"
    - "инженерные_системы"

output:
  format: "json"
  verdict_required: true
