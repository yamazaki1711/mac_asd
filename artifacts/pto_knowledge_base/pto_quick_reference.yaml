quick_reference:
  Разрешительная документация:
  - 1 - Разрешение на строительство
  - 2 - Выписка из реестра членов СРО
  - 3 - Лицензия МЧС на осуществление деятельности по монтажу, техническому обслуживанию
    и ремонту средств обеспечения пожарной безопасности зданий и сооружений
  - 4 - Акт-допуск для производства работ на территории организации
  - 5 - Письменное разрешение на право производства земляных работ от организаций,
    ответственных за эксплуатацию подземных коммуникаций, объектов транспортной инфраструктуры,
    находящихся в пределах охранных зон
  - 6 - Перечень организаций и ответственных лиц, участвующих в строительстве
  - 7 - Приказ о назначении ответственного представителя застройщика (технического
    заказчика) по вопросам строительного контроля
  - 8 - Приказ о назначении ответственного представителя авторского надзора
  - 9 - Приказ о назначении специалиста по организации строительства
  - 10 - Приказ о назначении представителя лица, осуществляющего строительство, по
    вопросам строительного контроля
  - 11 - Приказ о назначении ответственного производителя работ
  - 12 - Приказ о назначении ответственного лица по вопросам охраны труда и техники
    безопасности (в том числе ответственного лица за соблюдение требований электробезопасности)
    на объекте
  - 13 - Приказ о назначении ответственного за пожарную безопасность
  - 14 - Приказ о назначении ответственного за производство работ грузоподъемными
    механизмами
  - 15 - Приказ о назначении ответственного за геодезические работы
  - 16 - Приказ о назначении ответственного лица за выдачу наряд-допусков на объекте
  - 17 - Приказы о назначении ответственных лиц за обращение с отходами и лиц, ответственных
    за охрану окружающей среды
  - 18 - Свидетельства о готовности организации к выполнению сварочных работ
  - 19 - Свидетельства об аттестации сварочных материалов
  - 20 - Свидетельства об аттестации сварочного оборудования
  - 21 - Протоколы аттестации и удостоверения специалистов сварочного производства
    II-IV уровней
  - 22 - Протоколы аттестации и удостоверения специалистов сварочного производства
    I уровня
  - '23 - Допускные листы сварщиков с приложением документов по выполненным стыкам:
    акты ВИК, заключения по НК и результатам механических испытаний'
  - 24 - Свидетельство об аттестации лаборатории неразрушающего контроля
  - 25 - Квалификационные удостоверения дефектоскопистов
  - 26 - Свидетельство об аттестации (сертификат соответствия) строительной лаборатории
  Геодезические работы:
