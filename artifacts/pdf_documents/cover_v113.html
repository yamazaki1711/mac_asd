<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
@page { size: 794px 1123px; margin: 0; }
html, body {
    margin: 0; padding: 0;
    width: 794px; height: 1123px;
    background: #ffffff;
    font-family: 'Calibri', sans-serif;
    overflow: hidden;
}
.cover {
    width: 794px; height: 1123px;
    position: relative;
    background: #ffffff;
}
/* Layer 1: decorative accent lines */
.accent-line-top {
    position: absolute;
    top: 80px; left: 60px;
    width: 680px; height: 3px;
    background: #5835c1;
}
.accent-line-bottom {
    position: absolute;
    bottom: 180px; left: 60px;
    width: 300px; height: 2px;
    background: #5835c1;
    opacity: 0.4;
}
.accent-rect {
    position: absolute;
    top: 0; right: 0;
    width: 180px; height: 1123px;
    background: #5835c1;
    opacity: 0.06;
}
/* Layer 3: text content */
.kicker {
    position: absolute;
    top: 110px; left: 60px;
    width: 540px;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #7e858a;
    line-height: 1.4;
}
.hero {
    position: absolute;
    top: 180px; left: 60px;
    width: 560px;
    font-size: 38px;
    font-weight: 700;
    color: #1a1b1c;
    line-height: 1.25;
}
.subtitle {
    position: absolute;
    top: 370px; left: 60px;
    width: 560px;
    font-size: 16px;
    font-weight: 400;
    color: #7e858a;
    line-height: 1.6;
}
.meta {
    position: absolute;
    bottom: 120px; left: 60px;
    width: 500px;
    font-size: 16px;
    font-weight: 400;
    color: #1a1b1c;
    line-height: 1.6;
}
.version {
    position: absolute;
    bottom: 80px; left: 60px;
    font-size: 12px;
    color: #7e858a;
    letter-spacing: 1px;
}
</style>
</head>
<body>
<div class="cover">
    <div class="accent-rect"></div>
    <div class="accent-line-top"></div>
    <div class="accent-line-bottom"></div>
    <div class="kicker">ARCHITECTURAL REVIEW RESPONSE</div>
    <div class="hero">MAC ASD v11.3<br/>Архитектурный ответ<br/>и реализация P0</div>
    <div class="subtitle">Гибридная модель принятия решений Hermes, AgentState v2,<br/>JSON-схемы, тестовые фикстуры</div>
    <div class="meta">20 апреля 2026</div>
    <div class="version">VERSION 11.3 &nbsp; | &nbsp; P0 IMPLEMENTATION</div>
</div>
</body>
</html>
