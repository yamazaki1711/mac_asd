# =============================================================================
# MAC_ASD v11.3 — БЛС (Библиотека Ловушек Сторон) — 58 ловушек
# =============================================================================
# 10 категорий, 58 типовых ловушек в договорах строительного подряда.
# Каждая ловушка — паттерн опасного условия с рекомендацией по нейтрализации
# и ссылкой на конкретную статью закона.
#
# Категории:
#   payment          — Ловушки оплаты (8)
#   penalty          — Необоснованные штрафы и пени (7)
#   acceptance       — Ловушки приёмки работ (7)
#   scope            — Изменение объёмов работ (7)
#   warranty         — Гарантийные удержания и обязательства (6)
#   subcontractor    — Ограничения на субподряд (5)
#   liability        — Безлимитная ответственность (6)
#   corporate_policy — Корпоративные политики заказчика (5)
#   termination      — Расторжение договора (4)  ★ NEW
#   insurance        — Страхование (3)           ★ NEW
#
# Загрузчик: python -m src.scripts.load_traps
# =============================================================================

traps:

  # ===========================================================================
  # PAYMENT — Ловушки оплаты (8)
  # ===========================================================================

  - id: payment_01
    title: "Задержка оплаты без ответственности заказчика"
    category: payment
    severity: high
    pattern: >
      Оплата выполненных работ производится Заказчиком в течение N дней
      с момента подписания актов, при этом неустойка за просрочку оплаты
      не начисляется или установлена символическая ставка.
    description: >
      Заказчик устанавливает длительный срок оплаты (30-90 дней после подписания КС-2/КС-3),
      но при этом исключает свою ответственность за просрочку платежа или устанавливает
      символическую неустойку (например, 0,1% вместо ставки рефинансирования).
      Это создаёт для подрядчика кассовый разрыв и лишает рычагов давления на заказчика.
      Пункт 3.9 типового договора: «неустойка за просрочку оплаты аванса не начисляется» —
      прямое нарушение принципа равенства сторон.
    law_reference: "ст. 711 ГК РФ, ст. 395 ГК РФ, ст. 328 ГК РФ (встречное обязательство)"
    recommendation: >
      Внести условие о неустойке за просрочку оплаты по ставке не ниже ключевой ставки ЦБ РФ
      за каждый день просрочки. Установить право подрядчика приостановить работы при задержке
      оплаты более чем на N дней (ст. 719 ГК РФ). Исключить пункт о неначислении неустойки
      за просрочку аванса — это ничтожное условие.
    court_cases:
      - "Определение ВС РФ от 15.06.2021 № 305-ЭС21-7348"
      - "Постановление АС МО от 12.03.2020 № Ф05-2189/2020"

  - id: payment_02
    title: "Необоснованные удержания из оплаты"
    category: payment
    severity: high
    pattern: >
      Заказчик вправе удерживать из оплаты выполненных работ суммы
      штрафов, неустоек, убытков без отдельного соглашения или решения суда.
    description: >
      Договор содержит условие о праве заказчика в одностороннем порядке удерживать
      из платежей подрядчика любые суммы (штрафы, пени, возмещение убытков) без
      судебного решения и даже без признания подрядчиком соответствующих нарушений.
      Это лишает подрядчика права на судебную защиту и возможность оспорить
      размер удержания до его фактического применения.
    law_reference: "ст. 421 ГК РФ, ст. 393 ГК РФ, ст. 424 ГК РФ"
    recommendation: >
      Установить, что удержания из оплаты возможны только на основании вступившего
      в силу решения суда или подписанного обеими сторонами соглашения.
      При этом подрядчик имеет право оспорить размер удержания до фактического
      списания денежных средств.
    court_cases:
      - "Постановление АС УО от 26.01.2022 № Ф09-9564/21"
      - "Определение ВС РФ от 28.06.2022 № 305-ЭС22-10153"

  - id: payment_03
    title: "Оплата только после получения финансирования заказчиком"
    category: payment
    severity: critical
    pattern: >
      Оплата выполненных работ производится Заказчиком после получения
      финансирования от третьих лиц / инвестора / государственного органа.
    description: >
      Заказчик переносит риск неполучения финансирования на подрядчика.
      Если финансирование не поступает, подрядчик остаётся без оплаты
      за фактически выполненные работы. Это существенное нарушение принципа
      возмездности договора подряда (ст. 702 ГК РФ) и недопустимое
      переложение предпринимательского риска.
    law_reference: "ст. 702 ГК РФ, ст. 711 ГК РФ, ст. 393 ГК РФ"
    recommendation: >
      Исключить условие о зависимости оплаты от получения финансирования.
      Установить жёсткий срок оплаты независимо от источников финансирования
      заказчика. В крайнем случае — ограничить период ожидания 30 днями
      с правом подрядчика расторгнуть договор и потребовать оплаты.
    court_cases:
      - "Постановление АС МО от 18.05.2021 № Ф05-7537/2021"
      - "Определение ВС РФ от 22.12.2020 № 305-ЭС20-21837"

  - id: payment_04
    title: "Отказ от оплаты при отсутствии исполнительной документации"
    category: payment
    severity: medium
    pattern: >
      Заказчик вправе отказать в оплате выполненных работ при непредоставлении
      исполнительной документации или предоставлении её не в полном объёме.
      Уменьшение стоимости работ на N% за отсутствие ИД.
    description: >
      Заказчик связывает оплату строительных работ с предоставлением полной
      исполнительной документации, уменьшая стоимость работ на процент
      при непредоставлении ИД. Хотя обязанность по предоставлению ИД реальна,
      лишение оплаты за фактически выполненные работы — несоразмерная санкция.
      Пункты 3.6-3.6.3 типовых договоров содержат шкалу уменьшения
      стоимости работ за отсутствие ИД, что по сути является скрытым штрафом.
    law_reference: "ст. 711 ГК РФ, ст. 746 ГК РФ, ст. 740 ГК РФ"
    recommendation: >
      Разделить обязательства: оплата за выполненные работы и предоставление
      ИД — самостоятельные обязательства. Отсутствие ИД не может быть основанием
      для отказа в оплате фактически выполненных работ. Установить отдельный
      разумный срок для предоставления ИД и разумную неустойку за просрочку.
    court_cases:
      - "Постановление АС СЗО от 14.09.2021 № Ф07-12456/21"
      - "Определение ВС РФ от 27.04.2021 № 305-ЭС21-5970"

  - id: payment_05
    title: "Оплата только после сдачи объекта целиком"
    category: payment
    severity: high
    pattern: >
      Оплата выполненных работ производится только после полного завершения
      строительства и ввода объекта в эксплуатацию. Промежуточные платежи
      за выполненные этапы не предусмотрены.
    description: >
      Заказчик привязывает оплату к финальной сдаче объекта, лишая подрядчика
      промежуточных платежей за выполненные этапы. При длительном строительстве
      (12-24 месяца) подрядчик вынужден финансировать все работы из собственных
      или заёмных средств, что ведёт к кассовому разрыву и переплате по кредитам.
      Это также создаёт риск полной потери инвестиций при расторжении договора
      на промежуточном этапе — заказчик уже получил результат части работ,
      но платить не обязан до сдачи всего объекта.
    law_reference: "ст. 711 ГК РФ, ст. 746 ГК РФ (оплата выполненных работ)"
    recommendation: >
      Установить промежуточные платежи по этапам работ или по факту выполнения
      определённого объёма (ежемесячно по КС-2/КС-3). Включить минимальный
      авансовый платёж. Установить, что при расторжении договора подрядчик
      имеет право на оплату фактически выполненных работ независимо от
      завершения объекта в целом.
    court_cases:
      - "Постановление АС МО от 09.02.2022 № Ф05-3223/2022"
      - "Определение ВС РФ от 18.05.2021 № 305-ЭС21-8956"

  - id: payment_06
    title: "Право заказчика на зачёт встречных требований без согласия"
    category: payment
    severity: high
    pattern: >
      Заказчик вправе в одностороннем порядке зачесть любые встречные
      требования к Подрядчику (штрафы, пени, убытки) против платежей
      по договору без согласия подрядчика.
    description: >
      Договор наделяет заказчика правом безакцептного зачёта любых встречных
      требований, включая спорные и не признанные подрядчиком. Это позволяет
      заказчику уменьшать платежи на суммы штрафов, которые подрядчик не
      признаёт, лишая его возможности оспорить удержание до его применения.
      Фактически заказчик выступает одновременно кредитором и арбитром —
      он сам определяет размер своего требования и сам его удовлетворяет
      за счёт платежей подрядчику.
    law_reference: "ст. 410 ГК РФ (зачёт), ст. 411 ГК РФ (недопустимость зачёта)"
    recommendation: >
      Ограничить зачёт только признанными подрядчиком требованиями или
      вступившими в силу решениями суда. Установить, что спорные суммы
      не подлежат зачёту до разрешения спора. Включить обязательный
      претензионный порядок до применения зачёта. При зачёте — уведомление
      подрядчика не менее чем за 10 рабочих дней с указанием основания и суммы.
    court_cases:
      - "Постановление АС УО от 15.03.2022 № Ф09-897/22"
      - "Определение ВС РФ от 10.08.2021 № 305-ЭС21-13678"

  - id: payment_07
    title: "Отсутствие авансового платежа"
    category: payment
    severity: medium
    pattern: >
      Договор не содержит условия об авансировании. Все работы выполняются
      за счёт средств подрядчика с оплатой по факту подписания актов.
    description: >
      Отсутствие аванса означает, что подрядчик должен финансировать
      закупку материалов, аренду техники, выплату зарплаты из собственных
      или заёмных средств. При стоимости договора в десятки миллионов
      это означает отвлечение значительных оборотных средств на 30-60 дней.
      В сочетании с длительным сроком оплаты по актам (payment_01) кассовый
      разрыв может достигать 90-120 дней, что критично для малого и среднего бизнеса.
    law_reference: "ст. 711 ГК РФ, ст. 746 ГК РФ"
    recommendation: >
      Включить условие об авансе не менее 10-30% от цены договора.
      Установить сроки выплаты аванса — не позднее 5-10 рабочих дней
      после подписания договора. Предусмотреть право подрядчика не приступать
      к работам до получения аванса (ст. 719 ГК РФ). Связать возврат аванса
      с конкретными этапами работ.
    court_cases:
      - "Постановление АС СЗО от 20.10.2021 № Ф07-13496/21"

  - id: payment_08
    title: "Оплата только после ввода объекта в эксплуатацию"
    category: payment
    severity: critical
    pattern: >
      Окончательный расчёт за выполненные работы производится после ввода
      объекта в эксплуатацию и получения Заключения о соответствии (ЗОС).
    description: >
      Заказчик привязывает окончательную оплату к вводу объекта в эксплуатацию,
      что зависит не только от качества работ подрядчика, но и от действий
      третьих лиц (органов стройнадзора, других подрядчиков, самого заказчика).
      Процесс ввода в эксплуатацию может затянуться на месяцы и годы по причинам,
      не зависящим от подрядчика: задержки других подрядчиков, изменения
      в проектной документации, волокита в надзорных органах.
      Подрядчик фактически кредитует заказчика на неопределённый срок.
    law_reference: "ст. 711 ГК РФ, ст. 746 ГК РФ, ст. 753 ГК РФ"
    recommendation: >
      Установить, что оплата выполненных работ не зависит от ввода объекта
      в эксплуатацию. Оплата — по факту подписания КС-2/КС-3 в установленный
      срок. Ввод объекта в эксплуатацию — отдельное событие, не влияющее
      на обязанность оплатить фактически выполненные работы. При задержке
      ввода — право на оплату с начислением процентов за пользование
      чужими денежными средствами.
    court_cases:
      - "Определение ВС РФ от 14.09.2021 № 305-ЭС21-16385"
      - "Постановление АС МО от 25.01.2022 № Ф05-29891/2021"


  # ===========================================================================
  # PENALTY — Необоснованные штрафы и пени (7)
  # ===========================================================================

  - id: penalty_01
    title: "Завышенные штрафы за нарушение сроков"
    category: penalty
    severity: high
    pattern: >
      Штраф за нарушение сроков выполнения работ составляет 0,5-1% за каждый
      день просрочки, без ограничения максимальной суммы, при этом неустойка
      заказчика за просрочку оплаты — 0,1% или отсутствует.
    description: >
      Дисбаланс неустоек: штрафы для подрядчика в 5-10 раз выше, чем для
      заказчика. Отсутствие потолка неустойки означает, что при длительной
      просрочки сумма штрафа может превысить стоимость договора. Типичный
      пример: пени подрядчика 0,5%/день (182,5% годовых), пени заказчика —
      0,1%/день (36,5% годовых) или отсутствуют вовсе.
    law_reference: "ст. 333 ГК РФ (соразмерность неустойки), ст. 395 ГК РФ"
    recommendation: >
      Установить симметричные ставки неустойки для обеих сторон.
      Ограничить максимальный размер неустойки (например, 10% от стоимости
      договора или стоимости этапа). Применить ставку не выше ключевой ставки
      ЦБ РФ для обеих сторон (ст. 395 ГК РФ как ориентир).
    court_cases:
      - "Определение ВС РФ от 24.02.2022 № 305-ЭС21-25302"
      - "Постановление АС МО от 14.12.2021 № Ф05-32126/2021"

  - id: penalty_02
    title: "Штраф за отсутствие документов (скрытые пени)"
    category: penalty
    severity: medium
    pattern: >
      Штраф в фиксированном размере (30 000 — 100 000 руб.) за отсутствие
      или неполноту отчётных документов, исполнительной документации,
      приказов, журналов и т.д.
    description: >
      Договор содержит многочисленные штрафы за формальные нарушения:
      отсутствие отчёта — 30 000 руб., отсутствие приказа — штраф,
      непредоставление документа — штраф. Совокупный размер таких штрафов
      может достигать сотен тысяч рублей ежемесячно, при этом перечень
      документов размыт и трактуется заказчиком расширительно.
      Пункт 6.1.18 типового договора: штраф 30 000 руб. за отсутствие отчёта.
    law_reference: "ст. 330 ГК РФ (неустойка), ст. 333 ГК РФ (соразмерность)"
    recommendation: >
      Ограничить перечень документов конкретным списком в приложении.
      Установить разумные размеры штрафов (не более 5 000-10 000 руб.).
      Ввести право подрядчика на устранение нарушения в течение N дней
      до применения штрафа (претензионный порядок).
    court_cases:
      - "Постановление АС УО от 17.05.2022 № Ф09-3110/22"

  - id: penalty_03
    title: "Безлимитная пеня без потолка"
    category: penalty
    severity: high
    pattern: >
      Пени начисляются за каждый день просрочки без ограничения
      максимальной суммы или процента от стоимости договора.
    description: >
      Отсутствие ограничения максимального размера пеней означает, что при
      длительной просрочки (например, из-за задержки проектной документации
      заказчиком) совокупный размер пеней может значительно превысить
      стоимость договора. Суды применяют ст. 333 ГК РФ, но это требует
      отдельного судебного разбирательства, что затягивает процесс на месяцы.
    law_reference: "ст. 333 ГК РФ, ст. 395 ГК РФ, Информационное письмо Президиума ВАС РФ № 146"
    recommendation: >
      Установить максимальный размер пеней (cap): не более 10% от стоимости
      договора или стоимости этапа. Включить условие о зачёте пеней при
      урегулировании спора. При наличии вины заказчика — снижение пеней
      пропорционально его вкладу в просрочку.
    court_cases:
      - "Постановление АС МО от 22.06.2022 № Ф05-14284/2022"
      - "Определение ВС РФ от 12.07.2022 № 305-ЭС22-12651"

  - id: penalty_04
    title: "Штраф за односторонний отказ от договора"
    category: penalty
    severity: high
    pattern: >
      При досрочном расторжении договора по инициативе Подрядчика
      уплачивается штраф в размере N% от стоимости невыполненных работ
      или фиксированная сумма, при этом аналогичный штраф для Заказчика
      отсутствует.
    description: >
      Договор устанавливает штрафную санкцию за односторонний отказ
      подрядчика от договора, но не предусматривает аналогичного штрафа
      для заказчика. Это создаёт асимметрию: заказчик может отказаться
      от договора без финансовых последствий, а подрядчик — нет.
      При этом ст. 717 ГК РФ уже устанавливает последствия отказа
      подрядчика (компенсация в пределах разницы между ценой и ценой
      за выполненные работы), и договорный штраф по сути удваивает
      предусмотренную законом ответственность.
    law_reference: "ст. 717 ГК РФ, ст. 310 ГК РФ, ст. 333 ГК РФ"
    recommendation: >
      Исключить штраф за отказ от договора, если ст. 717 ГК РФ уже
      регулирует последствия. Как минимум — установить симметричный штраф
      для заказчика при его отказе. Ограничить размер штрафа разумной
      суммой (не более 5-10% от стоимости невыполненных работ).
    court_cases:
      - "Определение ВС РФ от 23.03.2021 № 305-ЭС21-3789"
      - "Постановление АС МО от 07.09.2021 № Ф05-11987/2021"

  - id: penalty_05
    title: "Кумулятивные штрафы: штраф + пени одновременно"
    category: penalty
    severity: high
    pattern: >
      За одно и то же нарушение (например, просрочку выполнения работ)
      договор предусматривает и фиксированный штраф, и пени за каждый
      день просрочки. Совокупная ответственность не ограничена.
    description: >
      Двойная ответственность за одно нарушение: фиксированный штраф
      (например, 100 000 руб.) плюс ежедневные пени (0,5% за день
      просрочки). Суды неоднозначно относятся к кумулятивным санкциям:
      некоторые снижают по ст. 333 ГК РФ, другие признают допустимыми
      как agreed damages. Для подрядчика это означает, что даже
      кратковременная просрочка может повлечь огромные суммы.
      Типичный пример: просрочка 30 дней при стоимости этапа 10 млн —
      штраф 100 000 + пени 1 500 000 = 1 600 000 руб.
    law_reference: "ст. 330 ГК РФ, ст. 333 ГК РФ, ст. 394 ГК РФ (зачётная неустойка)"
    recommendation: >
      Установить альтернативный порядок: штраф ИЛИ пени, но не оба
      одновременно. При кумулятивном порядке — ограничить совокупный
      размер разумным пределом (не более 10% от стоимости этапа).
      Применить зачётный характер неустойки (убытки взыскиваются
      в части, не покрытой неустойкой).
    court_cases:
      - "Постановление АС УО от 22.02.2022 № Ф09-146/22"
      - "Определение ВС РФ от 27.04.2022 № 305-ЭС22-6191"

  - id: penalty_06
    title: "Штраф за нарушение внутренних регламентов заказчика"
    category: penalty
    severity: medium
    pattern: >
      Штраф за нарушение Правил внутреннего трудового распорядка,
      Положения о пропускном режиме, Правил производства работ на объекте
      Заказчика и иных внутренних регламентов.
    description: >
      Заказчик включает в договор отсылку к своим внутренним регламентам,
      нарушение которых влечёт штрафы. Проблема в том, что подрядчик
      зачастую не знаком с содержанием этих регламентов на момент
      заключения договора, а они могут быть изменены в одностороннем
      порядке. Типичные нарушения: несоблюдение пропускного режима,
      нарушение правил складирования, несоблюдение формы одежды —
      всё это формальные поводы для штрафов, не влияющие на качество работ.
    law_reference: "ст. 421 ГК РФ (свобода договора), ст. 424 ГК РФ"
    recommendation: >
      Включить полный перечень применимых регламентов в приложение
      к договору на дату подписания. Установить, что новые и изменённые
      регламенты применяются только с согласия подрядчика. Заменить
      штрафы за нарушение регламентов на претензионный порядок с правом
      устранения нарушения. Ограничить размер штрафа за формальные
      нарушения разумной суммой.
    court_cases:
      - "Постановление АС СЗО от 15.02.2022 № Ф07-1664/22"

  - id: penalty_07
    title: "Конфискация обеспечения исполнения при малейшем нарушении"
    category: penalty
    severity: critical
    pattern: >
      Обеспечение исполнения договора (банковская гарантия, залог)
      удерживается полностью при любом нарушении договора подрядчиком,
      независимо от тяжести нарушения и размера причинённых убытков.
    description: >
      Договор содержит условие о праве заказчика потребовать выплату
      всей суммы обеспечения исполнения при любом нарушении подрядчиком
      своих обязательств, включая незначительные. Это означает, что
      при формальном нарушении (например, просрочка предоставления
      отчёта на 1 день) заказчик может удержать банковскую гарантию
      на 10-30% от стоимости договора. Фактически это скрытый штраф,
      несоразмерный нарушению, который лишает подрядчика обеспечения
      на оставшийся срок действия договора.
    law_reference: "ст. 329 ГК РФ, ст. 374 ГК РФ (основания прекращения залога), ст. 333 ГК РФ"
    recommendation: >
      Установить пропорциональный порядок удержания обеспечения:
      сумма удержания не должна превышать размер причинённых убытков.
      Исключить право на удержание всего обеспечения при незначительных
      нарушениях. Ввести обязательный претензионный порядок до обращения
      к обеспечению. Предусмотреть восстановление обеспечения после
      устранения нарушения.
    court_cases:
      - "Определение ВС РФ от 01.06.2021 № 305-ЭС21-8324"
      - "Постановление АС МО от 16.11.2021 № Ф05-26208/2021"


  # ===========================================================================
  # ACCEPTANCE — Ловушки приёмки работ (7)
  # ===========================================================================

  - id: acceptance_01
    title: "Усложнённая процедура приёмки работ"
    category: acceptance
    severity: high
    pattern: >
      Приёмка работ требует предоставления большого количества документов,
      часть которых не связана с выполнением работ. Отсутствие любого
      документа — основание для возврата КС-2/КС-3.
    description: >
      Заказчик устанавливает избыточный перечень документов для приёмки:
      исполнительная документация, сертификаты, паспорта качества, журналы
      работ, приказы, акты скрытых работ и т.д. Отсутствие любого документа
      из списка — основание для возврата КС-2/КС-3 без рассмотрения.
      Это позволяет заказчику неоправданно затягивать оплату.
      Пункт 3.5 типового договора: ненадлежащее оформление — безусловное
      основание для возврата.
    law_reference: "ст. 711 ГК РФ, ст. 746 ГК РФ, ст. 720 ГК РФ"
    recommendation: >
      Разделить обязательства по предоставлению документов и оплате работ.
      Установить исчерпывающий перечень документов для приёмки в приложении.
      Предусмотреть право подрядчика на доработку документов в течение N дней
      без возврата КС-2/КС-3. Ограничить срок рассмотрения актов 10 рабочими днями.
    court_cases:
      - "Постановление АС МО от 05.08.2021 № Ф05-18730/2021"
      - "Определение ВС РФ от 19.01.2022 № 305-ЭС21-26016"

  - id: acceptance_02
    title: "Право заказчика не подписывать акты без мотивировки"
    category: acceptance
    severity: critical
    pattern: >
      Заказчик вправе отказаться от подписания актов КС-2/КС-3
      без указания конкретных замечаний или в одностороннем порядке.
    description: >
      Договор предоставляет заказчику право не подписывать акты выполненных
      работ без обязанности указать конкретные замечания и сроки устранения.
      Это позволяет заказчику неопределённо долго блокировать оплату.
      Типичная формулировка: «Заказчик вправе отклонить представленные акты»
      без указания оснований и процедуры.
    law_reference: "ст. 720 ГК РФ, ст. 753 ГК РФ, Информационное письмо Президиума ВАС РФ № 51"
    recommendation: >
      Установить обязанность заказчика при отказе от подписания актов
      указать конкретные замечания и сроки устранения (не более 5-10 рабочих дней).
      Предусмотреть, что молчание заказчика в течение N дней = признание
      объёмов (презумпция согласия). Право на односторонний акт КС-2/КС-3
      при немотивированном отказе.
    court_cases:
      - "Постановление АС СЗО от 24.03.2022 № Ф07-1895/2022"
      - "Определение ВС РФ от 22.06.2021 № 305-ЭС21-11296"

  - id: acceptance_03
    title: "Приёмка без освобождения от гарантийных обязательств"
    category: acceptance
    severity: medium
    pattern: >
      Приёмка результата работ не лишает Заказчика права предъявлять
      требования об исправлении как явных, так и скрытых недостатков,
      выявленных в течение гарантийного срока, без ограничений.
    description: >
      Договор содержит условие, что подписание актов приёмки не освобождает
      подрядчика от ответственности за любые недостатки, включая явные,
      которые были или должны были быть обнаружены при приёмке.
      Это лишает акт приёмки правового значения и создаёт перманентный риск
      претензий. Пункты 5.8, 5.4.8 типового договора.
    law_reference: "ст. 720 ГК РФ, ст. 756 ГК РФ, ст. 755 ГК РФ"
    recommendation: >
      Установить, что приёмка работ подписанием КС-11 подтверждает
      отсутствие явных недостатков. Скрытые недостатки — в пределах
      гарантийного срока, но с ограничением по видам и объёму.
      Исключить право на бесконечные претензии по явным недостаткам
      после подписания акта приёмки.
    court_cases:
      - "Постановление АС МО от 15.09.2021 № Ф05-14509/2021"

  - id: acceptance_04
    title: "Урезание объёмов при приёмке без экспертизы"
    category: acceptance
    severity: high
    pattern: >
      Заказчик вправе уменьшить объёмы выполненных работ, указанные
      в КС-2, в одностороннем порядке без проведения экспертизы
      и без согласования с подрядчиком.
    description: >
      Заказчик включает право корректировать объёмы в актах КС-2
      по своему усмотрению, без проведения независимой экспертизы
      и без согласования с подрядчиком. Фактически это позволяет
      заказчику произвольно уменьшать стоимость выполненных работ,
      даже если работы фактически выполнены в полном объёме.
      Типичная ситуация: заказчик вычёркивает позиции из КС-2,
      ссылаясь на «собственный контроль обмеров», без предоставления
      доказательств невыполнения.
    law_reference: "ст. 720 ГК РФ (проверка качества), ст. 753 ГК РФ"
    recommendation: >
      Установить, что урезание объёмов возможно только на основании
      независимой экспертизы с участием обеих сторон. Предусмотреть
      право подрядчика на проведение встречной экспертизы. При разногласиях
      — обязательный претензионный порядок до корректировки актов.
      Сохранилось право на подписание актов с разногласиями.
    court_cases:
      - "Постановление АС УО от 11.05.2022 № Ф09-2771/22"
      - "Определение ВС РФ от 09.08.2021 № 305-ЭС21-14090"

  - id: acceptance_05
    title: "Право заказчика на одностороннюю корректировку КС-2/КС-3"
    category: acceptance
    severity: critical
    pattern: >
      Заказчик вправе в одностороннем порядке вносить изменения в акты
      КС-2 и КС-3, представленные Подрядчиком, без его согласия.
    description: >
      Ещё более агрессивная форма урезания объёмов: заказчик не просто
      отклоняет акты, а самостоятельно их редактирует — удаляет позиции,
      уменьшает расценки, меняет коэффициенты. Подрядчик вынужден
      либо принять скорректированные акты (и недополучить оплату),
      либо отказываться от подписания (и не получать ничего).
      Это нарушает принцип согласованности встречных обязательств
      и лишает акт его основной функции — фиксации соглашения сторон.
    law_reference: "ст. 720 ГК РФ, ст. 753 ГК РФ, ст. 421 ГК РФ"
    recommendation: >
      Категорически исключить право на одностороннюю корректировку актов.
      Любые изменения в КС-2/КС-3 возможны только по обоюдному согласию.
      При разногласиях — подписание актов с протоколом разногласий
      и последующим разрешением спора. Заказчик обязан мотивировать
      любой отказ от объёмов, указанных подрядчиком.
    court_cases:
      - "Постановление АС МО от 14.04.2022 № Ф05-5512/2022"

  - id: acceptance_06
    title: "Отказ от приёмки скрытых работ без актирования"
    category: acceptance
    severity: high
    pattern: >
      Заказчик не участвует в приёмке скрытых работ, но вправе
      впоследствии потребовать вскрытия конструкций за счёт подрядчика.
    description: >
      Заказчик не направляет представителя для приёмки скрытых работ
      (арматура, гидроизоляция, закладные детали), но оставляет за собой
      право потребовать вскрытия этих конструкций на любом этапе
      строительства. Если подрядчик не известил заказчика о скрытых
      работах — вскрытие за его счёт. Но если подрядчик известил,
      а заказчик не явился — договор может не содержать последствий
      неявки. В результате подрядчик несёт риск вскрытия даже при
      надлежащем извещении.
    law_reference: "ст. 741 ГК РФ, ст. 748 ГК РФ, СНиП 12-01-2004"
    recommendation: >
      Установить презумпцию: неявка представителя заказчика в течение
      установленного срока после извещения = согласие с объёмами
      и качеством скрытых работ. Право заказчика на вскрытие —
      только при наличии объективных сомнений в качестве, подтверждённых
      экспертизой. Стоимость вскрытия и восстановления — за счёт
      заказчика, если качество работ соответствует договору.
    court_cases:
      - "Постановление АС СЗО от 27.04.2022 № Ф07-4950/22"

  - id: acceptance_07
    title: "Неограниченный срок рассмотрения актов"
    category: acceptance
    severity: high
    pattern: >
      Договор не устанавливает срок рассмотрения актов выполненных
      работ или устанавливает чрезмерно длительный срок (60-90 дней).
    description: >
      Отсутствие чёткого и разумного срока рассмотрения актов позволяет
      заказчику неопределённо долго затягивать процесс приёмки и,
      соответственно, оплату. Типичные сроки в типовых договорах
      заказчика: 30-45 рабочих дней, что с учётом пересылки документов
      может составить 2-3 месяца. За это время подрядчик не получает
      оплату за фактически выполненные и предъявленные работы.
      При отсутствии срока в договоре заказчик может тянуть месяцами.
    law_reference: "ст. 314 ГК РФ (разумный срок), ст. 720 ГК РФ, ст. 753 ГК РФ"
    recommendation: >
      Установить срок рассмотрения актов не более 10 рабочих дней
      с момента получения. При непредставлении мотивированного отказа
      в этот срок — акты считаются подписанными (презумпция согласия).
      Предусмотреть поэтапную приёмку с привязкой к конкретным срокам
      для каждого этапа работ.
    court_cases:
      - "Постановление АС МО от 02.03.2022 № Ф05-4362/2022"
      - "Определение ВС РФ от 15.02.2022 № 305-ЭС21-26518"


  # ===========================================================================
  # SCOPE — Изменение объёмов работ (7)
  # ===========================================================================

  - id: scope_01
    title: "Одностороннее изменение объёмов работ заказчиком"
    category: scope
    severity: critical
    pattern: >
      Заказчик вправе в одностороннем порядке изменить объём работ,
      исключить отдельные виды работ или добавить новые без согласования
      цены и сроков с подрядчиком.
    description: >
      Заказчик оставляет за собой право менять объём и состав работ
      в одностороннем порядке. При исключении работ подрядчик лишается
      части маржи, при добавлении — несёт дополнительные расходы без
      согласования цены. Это нарушает принцип эквивалентности
      встречных обязательств и лишает подрядчика возможности планировать
      свою деятельность.
    law_reference: "ст. 702 ГК РФ, ст. 709 ГК РФ, ст. 744 ГК РФ (для строительства)"
    recommendation: >
      Установить, что любое изменение объёма работ оформляется
      дополнительным соглашением с указанием изменённой цены и сроков.
      При исключении работ — право подрядчика на компенсацию
      фактически понесённых затрат. При добавлении — согласование
      цены до начала выполнения дополнительных работ.
    court_cases:
      - "Постановление АС УО от 14.04.2022 № Ф09-872/22"
      - "Определение ВС РФ от 28.09.2021 № 305-ЭС21-19223"

  - id: scope_02
    title: "Дополнительные работы без оплаты"
    category: scope
    severity: high
    pattern: >
      Генподрядчик обязан выполнить все работы, необходимые для достижения
      результата, даже если они не указаны в техническом задании
      и договоре. Стоимость бросовых работ включена в цену договора.
    description: >
      Договор содержит условие, что подрядчик обязан выполнить любые работы,
      необходимые для получения результата (РС, ЗОС, РВ), даже если они
      не предусмотрены ТЗ. Стоимость «бросовых работ» и повторного
      выполнения включена в фиксированную цену. Это перекладывает на
      подрядчика риск неполноты проектной документации и изменения
      требований заказчика. Пункты 1.1, 3.4 типового договора.
    law_reference: "ст. 709 ГК РФ, ст. 743 ГК РФ, ст. 744 ГК РФ"
    recommendation: >
      Установить, что работы, не предусмотренные ТЗ и сметой, выполняются
      за отдельную плату на основании дополнительного соглашения.
      Исключить пункт о включении стоимости бросовых работ в фиксированную
      цену. Ввести порядок согласования стоимости дополнительных работ
      до их выполнения.
    court_cases:
      - "Постановление АС СЗО от 08.02.2022 № Ф07-16558/21"
      - "Определение ВС РФ от 15.03.2022 № 305-ЭС22-3885"

  - id: scope_03
    title: "Твёрдая цена при риске изменения объёмов"
    category: scope
    severity: high
    pattern: >
      Цена работ является твёрдой и не подлежит изменению, при этом
      заказчик оставляет за собой право изменять проектную документацию
      и объёмы работ.
    description: >
      Установление твёрдой цены при праве заказчика менять объёмы и
      проектную документацию — это перекладывание всех рисков на подрядчика.
      Любое изменение документации ведёт к дополнительным работам, но цена
      фиксирована. Подрядчик не может компенсировать возросшие затраты.
      Пункт 3.3: «Цена работ является твердой» + пункт об изменении ПД.
    law_reference: "ст. 709 ГК РФ (п. 6), ст. 744 ГК РФ, ст. 746 ГК РФ"
    recommendation: >
      При твёрдой цене — исключить право заказчика на одностороннее
      изменение объёмов. При праве изменения — перевести цену в
      приблизительную (ст. 709 ГК РФ). Включить механизм пересчёта
      цены при изменении объёмов более чем на N%.
    court_cases:
      - "Постановление АС МО от 23.11.2021 № Ф05-29856/2021"
      - "Определение ВС РФ от 08.02.2022 № 305-ЭС21-26037"

  - id: scope_04
    title: "Работы за счёт подрядчика при ошибках в проектной документации"
    category: scope
    severity: critical
    pattern: >
      Подрядчик обязан за свой счёт устранять недостатки и ошибки
      в проектной документации, предоставленной Заказчиком, в том числе
      выполнять демонтаж и переделку работ, выполненных по ошибочной ПД.
    description: >
      Заказчик передаёт проектную документацию, содержащую ошибки и
      противоречия, но возлагает на подрядчика обязанность по их устранению
      за собственный счёт. Подрядчик, выполнив работы в точном соответствии
      с ПД, обнаруживает, что результат не соответствует требованиям
      техрегламентов или ожиданиям заказчика — и вынужден переделывать
      за свой счёт. Типичная формулировка: «Подрядчик несёт ответственность
      за соответствие выполняемых работ требованиям техрегламентов
      независимо от качества предоставленной ПД».
    law_reference: "ст. 743 ГК РФ (обязанности подрядчика по ПД), ст. 744 ГК РФ, ст. 716 ГК РФ (предупреждение о недостатках ПД)"
    recommendation: >
      Чётко разграничить ответственность: подрядчик обязан предупредить
      о недостатках ПД (ст. 716 ГК РФ), но не несёт ответственности
      за последствия выполнения ошибочной ПД. Работы по исправлению
      ошибок ПД — за счёт заказчика как дополнительный объём.
      Включить условие о проверке ПД до начала работ с составлением
      протокола разногласий.
    court_cases:
      - "Определение ВС РФ от 26.01.2022 № 305-ЭС21-24229"
      - "Постановление АС СЗО от 19.01.2022 № Ф07-14798/21"

  - id: scope_05
    title: "Обязанность устранять недостатки ПД за свой счёт"
    category: scope
    severity: high
    pattern: >
      Подрядчик обязан за свой счёт вносить изменения в рабочую
      документацию, если выявленные в ходе строительства обстоятельства
      требуют корректировки проектных решений.
    description: >
      Договор возлагает на подрядчика обязанность по корректировке
      рабочей документации при выявлении несоответствий, при этом
      стоимость такой корректировки включена в фиксированную цену
      договора. Фактически подрядчик оплачивает работу проектировщика
      за свой счёт. Это особенно опасно в генподрядных договорах,
      где объём корректировок ПД может быть значительным и непредсказуемым.
      Типичный пример: изменение конструктивных решений из-за выявленных
      грунтовых условий, не учтённых в проекте.
    law_reference: "ст. 716 ГК РФ, ст. 743 ГК РФ, ст. 744 ГК РФ, ГрК РФ ст. 52"
    recommendation: >
      Разделить ответственность: подрядчик обязан информировать о
      выявленных несоответствиях (ст. 716 ГК РФ), но корректировка ПД —
      за счёт заказчика. Работы, связанные с изменением ПД, —
      дополнительный объём с отдельной оплатой. Включить порядок
      согласования стоимости корректировки ПД до начала работ.
    court_cases:
      - "Постановление АС УО от 23.06.2021 № Ф09-2988/21"

  - id: scope_06
    title: "Расширенное толкование «бросовых работ»"
    category: scope
    severity: high
    pattern: >
      Стоимость бросовых работ (демонтаж, переделка, работы, не вошедшие
      в итоговый результат) включена в фиксированную цену договора
      и не подлежит дополнительной оплате.
    description: >
      «Бросовые работы» — работы, выполненные подрядчиком, но не вошедшие
      в итоговый результат строительства по причинам, не зависящим от
      подрядчика (изменение проектных решений, выявленные скрытые условия,
      ошибки в изысканиях). Включение их стоимости в фиксированную цену
      означает, что подрядчик несёт риск изменения проектных решений
      заказчика. При этом объём бросовых работ может составить 10-30%
      от стоимости договора, что делает проект убыточным.
    law_reference: "ст. 709 ГК РФ, ст. 743 ГК РФ, ст. 744 ГК РФ"
    recommendation: >
      Установить, что бросовые работы, возникшие по причинам, не зависящим
      от подрядчика, оплачиваются дополнительно. Включить определение
      «бросовых работ» и порядок их оформления. Установить порядок
      согласования стоимости бросовых работ до их выполнения.
      Ограничить максимальный объём бросовых работ, включаемых
      в фиксированную цену (например, не более 3%).
    court_cases:
      - "Постановление АС МО от 07.12.2021 № Ф05-30626/2021"
      - "Определение ВС РФ от 21.09.2021 № 305-ЭС21-17173"

  - id: scope_07
    title: "Демонтаж и переделка за счёт подрядчика при изменении ПД"
    category: scope
    severity: critical
    pattern: >
      При изменении проектной документации Заказчиком, подрядчик обязан
      за свой счёт выполнить демонтаж ранее выполненных работ и
      переделку в соответствии с новой ПД.
    description: >
      Наиболее агрессивная форма перекладывания рисков: подрядчик
      выполняет работы в точном соответствии с ПД, затем заказчик
      меняет проектные решения, и подрядчик должен за свой счёт
      демонтировать уже выполненное и переделать по новой ПД.
      Стоимость демонтажа и переделки включена в фиксированную цену.
      При нескольких итерациях изменения ПД подрядчик может выполнить
      2-3 объёма работ по цене одного. Это одна из наиболее частых
      причин убыточности строительных контрактов.
    law_reference: "ст. 716 ГК РФ, ст. 744 ГК РФ, ст. 709 ГК РФ, ст. 746 ГК РФ"
    recommendation: >
      Установить, что демонтаж и переделка при изменении ПД заказчиком
      оплачиваются как дополнительные работы. Исключить включение
      стоимости переделки в фиксированную цену. Включить порядок
      оформления дополнительных работ при изменении ПД: подписания
      дополнительного соглашения с указанием стоимости и сроков
      до начала демонтажных работ.
    court_cases:
      - "Определение ВС РФ от 08.02.2022 № 305-ЭС21-26037"
      - "Постановление АС УО от 14.04.2022 № Ф09-872/22"


  # ===========================================================================
  # WARRANTY — Гарантийные удержания и обязательства (6)
  # ===========================================================================

  - id: warranty_01
    title: "Необоснованное гарантийное удержание"
    category: warranty
    severity: medium
    pattern: >
      Заказчик удерживает N% (5-10%) от стоимости выполненных работ
      на весь гарантийный срок в качестве обеспечения гарантийных
      обязательств подрядчика.
    description: >
      Гарантийное удержание — распространённая практика, однако размер
      и срок должны быть разумными. Удержание 10% на 5 лет — это
      изъятие оборотных средств подрядчика без компенсации. Заказчик
      фактически получает беспроцентный кредит за счёт подрядчика.
      Необходимо сопоставление с банковской гарантией.
    law_reference: "ст. 329 ГК РФ (способы обеспечения), ст. 379 ГК РФ"
    recommendation: >
      Ограничить гарантийное удержание 3-5% от стоимости работ.
      Установить срок возврата — не позднее 6 месяцев после подписания
      КС-11 (а не на весь гарантийный срок). Предусмотреть замену
      удержания на банковскую гарантию по выбору подрядчика.
    court_cases:
      - "Постановление АС УО от 30.06.2021 № Ф09-3487/21"
      - "Определение ВС РФ от 20.07.2021 № 305-ЭС21-12628"

  - id: warranty_02
    title: "Продление гарантийного срока без ограничения"
    category: warranty
    severity: medium
    pattern: >
      Гарантийный срок продлевается на период устранения недостатков,
      при этом время рассмотрения претензии и принятия решения
      заказчиком включается в период просрочки подрядчика.
    description: >
      Договор содержит условие о продлении гарантийного срока на всё
      время устранения недостатков, включая время рассмотрения претензии
      заказчиком. Это может привести к бессрочному продлению гарантии,
      если заказчик намеренно затягивает рассмотрение.
    law_reference: "ст. 755 ГК РФ, ст. 756 ГК РФ"
    recommendation: >
      Установить, что гарантийный срок продлевается только на время
      фактического устранения недостатков (не включая время рассмотрения
      претензии). Ограничить общее продление гарантийного срока
      разумным периодом (например, не более 6 месяцев).
    court_cases:
      - "Постановление АС СЗО от 12.10.2021 № Ф07-12248/21"

  - id: warranty_03
    title: "Гарантийный срок более 5 лет без обоснования"
    category: warranty
    severity: high
    pattern: >
      Гарантийный срок на результат выполненных работ составляет
      5-10 лет, что значительно превышает установленный законодательством
      предельный срок (обычно 2-5 лет в зависимости от вида работ).
    description: >
      Заказчик устанавливает чрезмерно длительный гарантийный срок,
      превышающий не только стандартный срок по ст. 756 ГК РФ (2 года),
      но и предельный срок для строительных работ (5 лет по ст. 756
      с учётом ст. 741). Удлинённый гарантийный срок означает
      длительную блокировку гарантийного удержания, риск предъявления
      претензий через много лет после завершения работ, и невозможность
      для подрядчика застраховать такие риски по разумной цене.
      Формально срок гарантии можно установить любой, но его
      соразмерность важна для баланса интересов.
    law_reference: "ст. 755 ГК РФ, ст. 756 ГК РФ (предельные сроки), ст. 741 ГК РФ"
    recommendation: >
      Установить гарантийный срок в соответствии с требованиями
      законодательства: 2 года по общему правилу (ст. 756 ГК РФ),
      5 лет для строительных работ (ст. 756 с учётом ст. 741).
      При требовании заказчика о более длительном сроке — дополнительная
      оплата за расширенную гарантию или страхование. Ограничить
      ответственность за недостатки, выявленные после истечения
      нормативного срока.
    court_cases:
      - "Определение ВС РФ от 12.07.2022 № 305-ЭС22-12651"

  - id: warranty_04
    title: "Ответственность за недостатки после передачи объекта"
    category: warranty
    severity: high
    pattern: >
      Подрядчик несёт ответственность за все недостатки, выявленные
      в период гарантийной эксплуатации объекта, включая недостатки,
      возникшие по вине заказчика при эксплуатации.
    description: >
      Договор устанавливает безусловную ответственность подрядчика за
      все недостатки, выявленные в гарантийный период, без разграничения
      причин их возникновения. После передачи объекта заказчику подрядчик
      не контролирует эксплуатацию, но несёт ответственность за её
      последствия: перегрузки конструкций, нарушение режимов эксплуатации,
      неквалифицированное обслуживание. Типичный пример: трещины в стяжке
      из-за залива водой при эксплуатации — подрядчик должен переделывать.
    law_reference: "ст. 755 ГК РФ, ст. 756 ГК РФ, ст. 393 ГК РФ (причинно-следственная связь)"
    recommendation: >
      Установить, что подрядчик отвечает только за недостатки, возникшие
      по его вине. Включить перечень оснований для освобождения от
      гарантийной ответственности: нарушение правил эксплуатации,
      естественный износ, действия третьих лиц, форс-мажор.
      Предусмотреть совместную экспертизу причин недостатков.
    court_cases:
      - "Постановление АС МО от 19.10.2021 № Ф05-19957/2021"
      - "Определение ВС РФ от 24.05.2022 № 305-ЭС22-9143"

  - id: warranty_05
    title: "Обязанность выезда для осмотра гарантийных претензий за свой счёт"
    category: warranty
    severity: medium
    pattern: >
      При поступлении гарантийной претензии подрядчик обязан за свой счёт
      направить представителя для осмотра в установленный срок, независимо
      от места нахождения объекта и обоснованности претензии.
    description: >
      Договор обязывает подрядчика выезжать для осмотра любой гарантийной
      претензии за свой счёт, независимо от её обоснованности и удалённости
      объекта. При большом количестве объектов это создаёт значительные
      расходы на командировки. Кроме того, срок выезда может быть
      нереалистично коротким (24-48 часов), что позволяет заказчику
      фиксировать «неявку» подрядчика и начислять штрафы. Если претензия
      оказалась необоснованной — подрядчик не может компенсировать расходы.
    law_reference: "ст. 755 ГК РФ, ст. 756 ГК РФ"
    recommendation: >
      Установить разумный срок выезда (5-10 рабочих дней). Предусмотреть
      удалённый осмотр (фото/видеофиксация) как альтернативу выезду
      при незначительных претензиях. Компенсация расходов на выезд
      при необоснованности претензии. Ограничить количество гарантийных
      выездов в год или установить предельный бюджет на командировки.
    court_cases:
      - "Постановление АС СЗО от 09.02.2022 № Ф07-1756/22"

  - id: warranty_06
    title: "Замена гарантийного удержания на банковскую гарантию по выбору заказчика"
    category: warranty
    severity: medium
    pattern: >
      Заказчик вправе потребовать замены гарантийного удержания
      на банковскую гарантию. Размер банковской гарантии превышает
      размер гарантийного удержания на N%.
    description: >
      Формально право замены удержания на банковскую гарантию выглядит
      как опция, но заказчик может навязать банковскую гарантию
      с завышенным размером (например, 10% вместо удержания 5%).
      Стоимость банковской гарантии (1-3% годовых) ложится на подрядчика,
      удорожая проект. Кроме того, требования к банку-гаранту
      (рейтинг не ниже определённого уровня) могут сузить круг
      доступных банков и повысить стоимость гарантии. В результате
      подрядчик платит дважды: и гарантийное удержание, и банковскую
      гарантию в период их одновременного действия.
    law_reference: "ст. 329 ГК РФ, ст. 368 ГК РФ (банковская гарантия)"
    recommendation: >
      Установить право выбора формы обеспечения за подрядчиком:
      гарантийное удержание ИЛИ банковская гарантия, но не обе
      одновременно. Размер банковской гарантии не должен превышать
      размер гарантийного удержания. Требования к банку-гаранту —
      разумные и не ограничивающие конкуренцию. Компенсация стоимости
      банковской гарантии заказчиком при навязывании этого вида обеспечения.
    court_cases:
      - "Постановление АС МО от 22.03.2022 № Ф05-4329/2022"


  # ===========================================================================
  # SUBCONTRACTOR — Ограничения на субподряд (5)
  # ===========================================================================

  - id: subcontractor_01
    title: "Запрет привлечения субподрядчиков"
    category: subcontractor
    severity: high
    pattern: >
      Генподрядчик не вправе привлекать субподрядчиков без письменного
      согласия Заказчика. Полный запрет на субподряд для отдельных
      видов работ.
    description: >
      Ограничение права на привлечение субподрядчиков лишает генподрядчика
      гибкости в распределении работ и невозможности привлечь узких
      специалистов. Согласовательный порядок позволяет заказчику
      блокировать привлечение конкретных субподрядчиков без объяснения
      причин. В генподрядном договоре это особенно критично — генподрядчик
      по определению координирует субподрядчиков.
    law_reference: "ст. 706 ГК РФ"
    recommendation: >
      Установить уведомительный (не разрешительный) порядок привлечения
      субподрядчиков. Если согласование необходимо — срок молчания
      заказчика = согласие (5-10 рабочих дней). Перечень работ,
      требующих согласования — ограниченный, в приложении.
    court_cases:
      - "Постановление АС МО от 09.08.2021 № Ф05-19631/2021"
      - "Определение ВС РФ от 14.12.2021 № 305-ЭС21-23198"

  - id: subcontractor_02
    title: "Ответственность за действия субподрядчиков"
    category: subcontractor
    severity: medium
    pattern: >
      Генподрядчик несёт полную ответственность за действия и бездействие
      субподрядчиков как за свои собственные. Субподрядчики несут
      солидарную ответственность.
    description: >
      Условие о полной ответственности генподрядчика за субподрядчиков —
      это норма ст. 706 ГК РФ, однако расширенная трактовка может включать
      ответственность за задержки, вызванные действиями заказчика в отношении
      субподрядчиков (например, отказ в допуске на объект).
    law_reference: "ст. 706 ГК РФ, ст. 322 ГК РФ (солидарная ответственность)"
    recommendation: >
      Уточнить, что генподрядчик отвечает за субподрядчиков только в рамках
      своих обязательств по договору. Исключить ответственность за задержки,
      вызванные действиями заказчика в отношении субподрядчиков.
    court_cases:
      - "Постановление АС УО от 24.08.2021 № Ф09-4907/21"

  - id: subcontractor_03
    title: "Право заказчика диктовать субподрядчиков"
    category: subcontractor
    severity: high
    pattern: >
      Генподрядчик обязан привлекать для выполнения отдельных видов работ
      субподрядчиков из перечня, утверждённого Заказчиком. Замена
      субподрядчика допускается только с согласия Заказчика.
    description: >
      Заказчик навязывает конкретных субподрядчиков, которые могут
      иметь завышенные расценки или неудовлетворительное качество работ.
      Генподрядчик несёт ответственность за результат работ субподрядчиков,
      но не может выбрать оптимального исполнителя. Это особенно опасно,
      когда «рекомендованные» субподрядчики аффилированы с заказчиком
      или имеют с ним неформальные отношения. Генподрядчик становится
      лишь номинальным координатором без реального контроля.
    law_reference: "ст. 706 ГК РФ, ст. 421 ГК РФ (свобода договора)"
    recommendation: >
      Установить право генподрядчика на выбор субподрядчиков. Если
      заказчик настаивает на конкретных исполнителях — ответственность
      за их действия несёт заказчик солидарно с генподрядчиком.
      Предоставить право замены субподрядчика в уведомительном порядке
      при наличии объективных причин (срыв сроков, брак, банкротство).
    court_cases:
      - "Постановление АС УО от 19.01.2022 № Ф09-8521/21"

  - id: subcontractor_04
    title: "Запрет на замену субподрядчиков"
    category: subcontractor
    severity: medium
    pattern: >
      Замена привлечённых субподрядчиков не допускается без письменного
      согласия Заказчика, даже при систематическом нарушении субподрядчиком
      своих обязательств.
    description: >
      Договор запрещает замену субподрядчиков без согласия заказчика,
      даже если субподрядчик систематически нарушает сроки, допускает брак
      или находится в предбанкротном состоянии. Это ставит генподрядчика
      в безвыходное положение: он несёт ответственность за результат
      субподрядчика, но не может его заменить. Типичная ситуация:
      субподрядчик сорвал сроки, заказчик отказывает в согласовании
      замены, генподрядчик платит пени за просрочку из-за субподрядчика,
      которого не может заменить.
    law_reference: "ст. 706 ГК РФ, ст. 393 ГК РФ, ст. 716 ГК РФ"
    recommendation: >
      Установить право генподрядчика на замену субподрядчика в
      уведомительном порядке при наличии оснований: нарушение сроков
      более чем на N дней, брак более N%, банкротство, ликвидация.
      Согласование замены — в течение 5 рабочих дней, молчание = согласие.
      При необоснованном отказе — право на приостановление соответствующих
      работ без начисления пеней.
    court_cases:
      - "Постановление АС МО от 23.08.2021 № Ф05-21423/2021"

  - id: subcontractor_05
    title: "Ответственность генподрядчика за оплату субподрядчиков"
    category: subcontractor
    severity: high
    pattern: >
      Генподрядчик несёт полную ответственность за своевременную оплату
      работ субподрядчиков, при этом заказчик вправе проверять расчёты
      и удерживать из платежей генподрядчику суммы, причитающиеся
      субподрядчикам.
    description: >
      Заказчик контролирует расчёты генподрядчика с субподрядчиками
      и может удерживать из его платежей суммы для прямых расчётов
      с субподрядчиками. Формально это защита прав субподрядчиков,
      фактически — инструмент давления на генподрядчика. Заказчик может
      использовать угрозу прямых платежей субподрядчикам для принуждения
      генподрядчика к выполнению спорных требований. Кроме того, двойной
      контроль расчётов создаёт административную нагрузку и задержки
      в платёжном цикле.
    law_reference: "ст. 706 ГК РФ, ст. 721 ГК РФ, ст. 313 ГК РФ (исполнение третьим лицом)"
    recommendation: >
      Ограничить право заказчика на вмешательство в расчёты
      с субподрядчиками только случаями просрочки генподрядчика
      более чем на 30 дней. Установить, что прямые платежи субподрядчикам
      возможны только при наличии вступившего в силу решения суда
      или признанного генподрядчиком долга. Исключить право заказчика
      на проверку внутренних расчётов генподрядчика.
    court_cases:
      - "Постановление АС УО от 14.09.2021 № Ф09-5123/21"


  # ===========================================================================
  # LIABILITY — Безлимитная ответственность (6)
  # ===========================================================================

  - id: liability_01
    title: "Безлимитная компенсация убытков заказчика"
    category: liability
    severity: critical
    pattern: >
      Подрядчик возмещает Заказчику все убытки, причинённые нарушением
      договора, включая упущенную выгоду, косвенные убытки, штрафы
      перед третьими лицами, без ограничения суммы.
    description: >
      Договор содержит условие о полном возмещении всех видов убытков
      без ограничения суммы. Это создаёт неконтролируемый финансовый риск —
      заказчик может потребовать компенсацию любых «убытков», включая
      упущенную выгоду, косвенные убытки, штрафы перед третьими лицами.
      Практика показывает, что такие требования могут многократно
      превышать стоимость договора.
    law_reference: "ст. 15 ГК РФ, ст. 393 ГК РФ"
    recommendation: >
      Ограничить ответственность фиксированной суммой или процентом
      от стоимости договора (например, не более 10-20% от цены договора).
      Исключить компенсацию косвенных убытков и упущенной выгоды.
      Установить, что совокупная ответственность подрядчика не превышает
      стоимость выполненных работ по договору.
    court_cases:
      - "Определение ВС РФ от 22.06.2021 № 305-ЭС21-12789"
      - "Постановление АС МО от 18.01.2022 № Ф05-30137/2021"

  - id: liability_02
    title: "Ответственность за вред третьим лицам без лимита"
    category: liability
    severity: high
    pattern: >
      Подрядчик обязан за свой счёт возмещать вред, причинённый жизни,
      здоровью или имуществу третьих лиц в связи с выполнением работ,
      включая вред в период гарантийной эксплуатации.
    description: >
      Условие о безлимитной ответственности за вред третьим лицам
      в сочетании с обязательством страхования на условиях заказчика
      создаёт двойной риск: страховые премии по условиям заказчика +
      не покрытые страхованием убытки. Пункт 6.1.42 типового договора
      содержит детальные требования к страхованию, определяемые заказчиком.
    law_reference: "ст. 1079 ГК РФ (источник повышенной опасности), ст. 935 ГК РФ"
    recommendation: >
      Установить лимит ответственности за вред третьим лицам в размере
      страхового покрытия. Страхование — на условиях, согласованных
      обеими сторонами. Исключить ответственность за вред, причинённый
      по вине заказчика или третьих лиц, не находящихся в подчинении
      подрядчика.
    court_cases:
      - "Постановление АС СЗО от 15.07.2021 № Ф07-7439/21"

  - id: liability_03
    title: "Страхование на условиях заказчика"
    category: liability
    severity: high
    pattern: >
      Подрядчик обязан застраховать свою ответственность на условиях
      и в страховой компании, определяемых Заказчиком. Размер
      страхового покрытия и перечень страховых рисков устанавливаются
      Заказчиком.
    description: >
      Заказчик определяет все параметры страхования: компанию, покрытие,
      перечень рисков, дополнительные условия. Это позволяет навязать
      страховую компанию с завышенными тарифами или аффилированную
      с заказчиком. Стоимость страховки может составить 2-5% от стоимости
      договора, что значительно превышает рыночный уровень. При этом
      страховые покрытия могут быть избыточными (например, требование
      покрытия 1 млрд руб. при стоимости договора 50 млн). Подрядчик
      платит за страхование, которое ему не нужно, но не может отказаться.
    law_reference: "ст. 935 ГК РФ, ст. 929 ГК РФ (договор имущественного страхования)"
    recommendation: >
      Установить, что условия страхования согласовываются обеими
      сторонами. Подрядчик имеет право выбрать страховую компанию
      с рейтингом не ниже согласованного уровня. Размер покрытия —
      обоснован и соразмерен стоимости договора и характеру рисков.
      Стоимость страхования, превышающая рыночный уровень, —
      компенсируется заказчиком.
    court_cases:
      - "Постановление АС МО от 08.02.2022 № Ф05-389/2022"

  - id: liability_04
    title: "Ответственность за действия других подрядчиков на объекте"
    category: liability
    severity: high
    pattern: >
      Подрядчик несёт ответственность за повреждения работ, выполненных
      другими подрядчиками на объекте, а также за координацию работ
      всех подрядчиков на строительной площадке.
    description: >
      На объекте одновременно работают несколько подрядчиков, и договор
      возлагает на данного подрядчика ответственность за координацию
      их деятельности и сохранность их работ. При этом подрядчик не
      имеет полномочий контролировать других подрядчиков, давать им
      указания или приостанавливать их работы. Типичная ситуация:
      электромонтажник повредил трубопровод, но ответственность
      несёт генподрядчик, который не мог контролировать электромонтажника,
      так как тот заключил договор напрямую с заказчиком.
    law_reference: "ст. 706 ГК РФ, ст. 393 ГК РФ, ст. 403 ГК РФ (ответственность за действия третьих лиц)"
    recommendation: >
      Чётко разграничить зоны ответственности каждого подрядчика.
      Исключить ответственность за повреждения, причинённые
      другими подрядчиками. Координация работ — обязанность заказчика
      или назначенного им технического заказщика. При возложении
      координации на генподрядчика — предоставить соответствующие
      полномочия и компенсацию.
    court_cases:
      - "Постановление АС СЗО от 18.05.2022 № Ф07-6835/22"
      - "Определение ВС РФ от 30.06.2021 № 305-ЭС21-11796"

  - id: liability_05
    title: "Ограничение права на приостановление работ"
    category: liability
    severity: critical
    pattern: >
      Подрядчик не вправе приостанавливать выполнение работ ни при каких
      обстоятельствах, включая непредоставление проектной документации,
      материалов, строительной площадки, а также неплатежи.
    description: >
      Договор полностью лишает подрядчика права на приостановление работ,
      даже при наличии законных оснований (ст. 719 ГК РФ). Это ставит
      подрядчика в положение, при котором он обязан продолжать работы
      независимо от нарушений заказчика: без оплаты, без материалов,
      без проектной документации. Приостановка работ квалифицируется
      как нарушение договора со всеми штрафными санкциями, хотя ст. 719
      ГК РФ прямо предусматривает право подрядчика не приступать к работе
      или приостановить её при нарушении заказчиком встречных обязательств.
    law_reference: "ст. 719 ГК РФ, ст. 328 ГК РФ (встречное исполнение), ст. 716 ГК РФ"
    recommendation: >
      Сохранить право на приостановление работ при нарушении заказчиком
      встречных обязательств (ст. 719 ГК РФ). Установить конкретные
      основания для приостановки: задержка оплаты более N дней,
      непредоставление ПД, материалов, площадки. Предусмотреть
      уведомительный порядок приостановки (за N дней). Исключить
      начисление пеней за период обоснованной приостановки.
    court_cases:
      - "Определение ВС РФ от 22.06.2021 № 305-ЭС21-11244"
      - "Постановление АС МО от 14.09.2021 № Ф05-15970/2021"

  - id: liability_06
    title: "Убытки от простоя техники и персонала по вине заказчика"
    category: liability
    severity: high
    pattern: >
      Подрядчик не вправе требовать возмещения убытков, вызванных простоем
      техники и персонала, в том числе по вине Заказчика (задержка
      финансирования, непредоставление фронта работ, задержка ПД).
    description: >
      Договор прямо исключает право подрядчика на возмещение убытков
      от простоя, даже если простой вызван нарушениями заказчика.
      Это особенно болезненно для подрядчиков с тяжёлой техникой
      (краны, экскаваторы), стоимость простоя которой может составлять
      50 000-200 000 руб./день. При длительной задержке (30-60 дней)
      убытки от простоя могут превысить маржу по договору. Типичный
      пример: заказчик не передал фронт работ на 45 дней, подрядчик
      оплачивает простой техники и персонала из собственного кармана.
    law_reference: "ст. 15 ГК РФ, ст. 393 ГК РФ, ст. 719 ГК РФ"
    recommendation: >
      Включить условие о возмещении убытков от простоя по вине заказчика.
      Установить фиксированные ставки возмещения за простой техники
      и персонала (по рыночным расценкам). Предусмотреть автоматическое
      продление сроков выполнения работ на период простоя по вине
      заказчика без начисления пеней.
    court_cases:
      - "Постановление АС УО от 23.03.2022 № Ф09-1202/22"
      - "Определение ВС РФ от 21.12.2021 № 305-ЭС21-24823"


  # ===========================================================================
  # CORPORATE_POLICY — Корпоративные политики заказчика (5)
  # ===========================================================================

  - id: corporate_policy_01
    title: "Обязательство соблюдать корпоративные политики заказчика"
    category: corporate_policy
    severity: critical
    pattern: >
      Генподрядчик обязан соблюдать внутренние регламенты, политики
      и процедуры Заказчика, в том числе вводимые в дальнейшем.
    description: >
      Заказчик включает условие о соблюдении своих корпоративных политик,
      которые могут быть изменены в одностороннем порядке. Это позволяет
      заказчику в любой момент добавлять новые обязательства, увеличивать
      стоимость выполнения работ без компенсации. Формулировка
      «в том числе вводимые в дальнейшем» — наиболее опасная, так как
      создаёт неопределённость объёма обязательств подрядчика.
      Пункт 6.1.29 типового договора отсылает к «требованиям действующего
      законодательства» в расширительном толковании.
    law_reference: "ст. 421 ГК РФ, ст. 424 ГК РФ"
    recommendation: >
      Ограничить перечень применимых политик конкретным списком на дату
      подписания договора. Добавить условие: новые политики применяются
      только с согласия подрядчика. При изменении политик — компенсация
      дополнительных расходов подрядчика или право на пересмотр цены.
    court_cases:
      - "Постановление АС МО от 09.11.2021 № Ф05-25627/2021"

  - id: corporate_policy_02
    title: "Исполнение предписаний представителей заказчика"
    category: corporate_policy
    severity: medium
    pattern: >
      Генподрядчик обязуется исполнять вынесенные ему предписания
      от представителей Заказчика, строительного контроля, лиц,
      осуществляющих авторский и технический надзор.
    description: >
      Обязанность исполнять предписания без права оспаривания лишает
      подрядчика возможности возразить против необоснованных требований.
      Предписания могут касаться увеличения объёмов работ, изменения
      технологии, дополнительных мероприятий — всё за счёт подрядчика.
      Пункт 6.1.24 типового договора.
    law_reference: "ст. 748 ГК РФ (контроль заказчика), ст. 749 ГК РФ (надзор)"
    recommendation: >
      Установить право подрядчика оспорить предписание в течение N дней.
      Предписания, влекущие дополнительные расходы — только с согласования
      стоимости. Разграничить обязательные предписания (безопасность)
      и рекомендательные (технология, методы работы).
    court_cases:
      - "Постановление АС УО от 07.09.2021 № Ф09-5325/21"

  - id: corporate_policy_03
    title: "Право заказчика на односторонний аудит и проверку"
    category: corporate_policy
    severity: medium
    pattern: >
      Заказчик вправе в любое время проводить аудит деятельности
      Подрядчика, проверять документы, проводить инвентаризацию
      материалов и оборудования на объекте без ограничения частоты
      и объёма проверок.
    description: >
      Неограниченное право на аудит позволяет заказчику инициировать
      проверки в любое время, отвлекая персонал подрядчика от работы.
      Частые проверки создают помехи в выполнении работ и могут
      использоваться как инструмент давления. Требования предоставить
      «все документы по запросу» без ограничений — это административная
      нагрузка, стоимость которой несёт подрядчик. Типичный пример:
      еженедельные проверки с затребованием отчётов, которые не
      предусмотрены договором.
    law_reference: "ст. 748 ГК РФ (контроль и консультации), ст. 749 ГК РФ"
    recommendation: >
      Установить конкретный порядок аудита: не чаще 1 раза в квартал,
      с уведомлением за 10 рабочих дней. Перечень запрашиваемых
      документов — ограниченный и согласованный. Расходы на проведение
      аудита — за счёт заказчика. Результаты аудита предоставляются
      подрядчику для замечаний.
    court_cases:
      - "Постановление АС СЗО от 22.06.2022 № Ф07-8956/22"

  - id: corporate_policy_04
    title: "Обязанность предоставлять информацию по первому требованию"
    category: corporate_policy
    severity: medium
    pattern: >
      Подрядчик обязан по запросу Заказчика предоставлять любую
      информацию, связанную с выполнением договора, в том числе
      коммерческую тайну, данные о субподрядчиках, расчёты себестоимости.
    description: >
      Расширительное толкование информационных обязательств позволяет
      заказчику запрашивать данные, составляющие коммерческую тайну
      подрядчика: расценки, наценки, условия договоров с субподрядчиками
      и поставщиками. Эта информация может быть использована для давления
      на подрядчика при переговорах о цене дополнительных работ или для
      передачи конкурентам. При этом подрядчик обязан предоставить
      информацию в сжатые сроки (3-5 дней) под угрозой штрафа.
    law_reference: "ст. 139 ГК РФ (коммерческая тайна), Федеральный закон № 98-ФЗ"
    recommendation: >
      Ограничить перечень запрашиваемой информации данными,
      непосредственно связанными с выполнением договора. Исключить
      обязанность предоставлять информацию о себестоимости, наценках,
      условиях договоров с третьими лицами. Установить режим
      коммерческой тайны для конфиденциальной информации заказчика.
      Срок предоставления информации — не менее 10 рабочих дней.
    court_cases:
      - "Постановление АС МО от 15.02.2022 № Ф05-5569/2022"

  - id: corporate_policy_05
    title: "Условие о конфиденциальности без ограничений по сроку"
    category: corporate_policy
    severity: medium
    pattern: >
      Подрядчик обязуется сохранять конфиденциальность информации
      Заказчика в течение неограниченного срока, включая после
      расторжения или истечения срока действия договора. Определение
      конфиденциальной информации — предельно широкое.
    description: >
      Расширенное условие о конфиденциальности без срока действия
      создаёт перманентную ответственность за разглашение информации,
      которая может быть общедоступной или утратившей коммерческую
      ценность. Широкое определение конфиденциальной информации
      («любая информация, связанная с договором») позволяет заказчику
      вменить разглашение практически любого факта. При этом заказчик
      не несёт аналогичных обязательств по конфиденциальности информации
      подрядчика. Штрафы за разглашение могут быть значительными
      и не ограничены суммой.
    law_reference: "Федеральный закон № 98-ФЗ, ст. 139 ГК РФ"
    recommendation: >
      Ограничить срок конфиденциальности разумным периодом (3-5 лет
      после окончания договора). Чётко определить перечень
      конфиденциальной информации в приложении. Установить симметричные
      обязательства по конфиденциальности для обеих сторон. Исключить
      из определения конфиденциальной информации общедоступные сведения
      и информацию, ставшую известной из иных источников.
    court_cases:
      - "Постановление АС СЗО от 14.04.2022 № Ф07-4911/22"


  # ===========================================================================
  # TERMINATION — Расторжение договора (4) ★ NEW
  # ===========================================================================

  - id: termination_01
    title: "Право заказчика на односторонний отказ без компенсации"
    category: termination
    severity: critical
    pattern: >
      Заказчик вправе в любое время отказаться от исполнения договора
      с уплатой подрядчику только за фактически выполненные работы,
      без компенсации упущенной выгоды, расходов на демобилизацию
      и убытков от досрочного расторжения.
    description: >
      Статья 717 ГК РФ даёт заказчику право на отказ от договора,
      однако ограничивает последствия: оплата выполненных работ
      и возмещение убытков в пределах разницы между договорной ценой
      и ценой за выполненные работы. Договор может сужать эти
      последствия до оплаты только фактически выполненных работ,
      лишая подрядчика права на компенсацию убытков. При этом
      подрядчик уже закупил материалы, привлёк субподрядчиков,
      арендовал технику — все эти расходы остаются невозмещёнными.
      Демобилизация техники и персонала также оплачивается за счёт
      подрядчика.
    law_reference: "ст. 717 ГК РФ, ст. 310 ГК РФ, ст. 15 ГК РФ, ст. 393 ГК РФ"
    recommendation: >
      Включить полную компенсацию при отказе заказчика: оплата
      выполненных работ + компенсация фактически понесённых затрат
      + компенсация расходов на демобилизацию + возмещение упущенной
      выгоды в пределах ст. 717 ГК РФ. Установить срок предупреждения
      об отказе — не менее 30 дней. Предусмотреть компенсацию
      за материалы, закупленные и не использованные на момент отказа.
    court_cases:
      - "Определение ВС РФ от 23.03.2021 № 305-ЭС21-3789"
      - "Постановление АС МО от 07.09.2021 № Ф05-11987/2021"

  - id: termination_02
    title: "Отсутствие компенсации при досрочном расторжении"
    category: termination
    severity: high
    pattern: >
      При расторжении договора по обстоятельствам, не зависящим
      от сторон, подрядчик не вправе требовать компенсации убытков
      или упущенной выгоды. Заказчик оплачивает только фактически
      выполненные работы.
    description: >
      Договор исключает компенсацию убытков при расторжении
      по обстоятельствам, не зависящим от сторон, но при этом
      формулировка «не зависящие от сторон» может трактоваться
      расширительно, включая обстоятельства, которые фактически
      зависят от заказчика (изменение инвестиционных планов,
      реорганизация, смена собственника). Подрядчик теряет
      не только ожидаемую прибыль, но и часть вложенных средств
      (аренда техники, закупка материалов, расходы на персонал).
    law_reference: "ст. 717 ГК РФ, ст. 451 ГК РФ (существенное изменение обстоятельств)"
    recommendation: >
      Включить обязательную компенсацию при расторжении по любым
      основаниям, инициированным заказчиком: выполненные работы +
      понесённые затраты + расходы на демобилизацию + упущенная выгода
      в пределах ст. 717 ГК РФ. Установить, что расторжение по
      обстоятельствам, зависящим от заказчика, влечёт полную
      компенсацию убытков.
    court_cases:
      - "Постановление АС УО от 08.02.2022 № Ф09-9123/21"
      - "Определение ВС РФ от 14.12.2021 № 305-ЭС21-25118"

  - id: termination_03
    title: "Штраф за досрочное расторжение по инициативе подрядчика"
    category: termination
    severity: high
    pattern: >
      При расторжении договора по инициативе Подрядчика он уплачивает
      Заказчику штраф в размере N% от стоимости невыполненных работ
      или фиксированную сумму. Аналогичный штраф для Заказчика
      отсутствует.
    description: >
      Асимметричная ответственность при расторжении: подрядчик платит
      штраф за отказ от договора, а заказчик — нет. При этом ст. 717
      ГК РФ уже регулирует последствия отказа заказчика, а ст. 719
      ГК РФ — основания для приостановки и отказа подрядчика.
      Договорный штраф за отказ подрядчика фактически лишает его
      права воспользоваться ст. 719 ГК РФ (приостановка при нарушении
      заказчиком встречных обязательств), так как стоимость отказа
      может быть выше стоимости продолжения работ в невыгодных условиях.
    law_reference: "ст. 717 ГК РФ, ст. 719 ГК РФ, ст. 310 ГК РФ"
    recommendation: >
      Исключить штраф за отказ от договора, если он предусмотрен
      только для одной стороны. При наличии штрафа — установить
      симметричный размер для обеих сторон. Ограничить размер штрафа
      разумной суммой. Предусмотреть, что отказ подрядчика по основаниям
      ст. 719 ГК РФ не влечёт штрафных санкций.
    court_cases:
      - "Постановление АС МО от 14.12.2021 № Ф05-32205/2021"

  - id: termination_04
    title: "Удержание имущества подрядчика при расторжении"
    category: termination
    severity: critical
    pattern: >
      При расторжении договора Заказчик вправе удерживать имущество
      Подрядчика (технику, материалы, оборудование), находящееся
      на строительной площадке, до разрешения всех споров.
    description: >
      Заказчик удерживает имущество подрядчика при расторжении договора
      как обеспечение своих требований, включая спорные. Это особенно
      опасно для подрядчиков с дорогостоящей техникой (краны, башенные
      машины, экскаваторы), стоимость простоя которых может достигать
      сотен тысяч рублей в день. Удержание техники на несколько месяцев
      в ожидании разрешения спора может привести к банкротству
      подрядчика. Формально удержание регулируется ст. 359 ГК РФ,
      но договор может расширять основания и срок удержания.
    law_reference: "ст. 359 ГК РФ (удержание), ст. 717 ГК РФ"
    recommendation: >
      Ограничить право удержания конкретным перечнем имущества
      и оснований. Установить максимальный срок удержания — не более
      30 дней, после чего имущество подлежит возврату. Спорные вопросы
      разрешаются в судебном порядке без удержания имущества.
      Предусмотреть альтернативное обеспечение требований заказчика
      (банковская гарантия, залог) вместо удержания имущества.
    court_cases:
      - "Определение ВС РФ от 10.08.2021 № 305-ЭС21-13678"
      - "Постановление АС МО от 16.11.2021 № Ф05-26208/2021"


  # ===========================================================================
  # INSURANCE — Страхование (3) ★ NEW
  # ===========================================================================

  - id: insurance_01
    title: "Обязанность страхования на условиях заказчика"
    category: insurance
    severity: high
    pattern: >
      Подрядчик обязан застраховать строительно-монтажные работы,
      свою ответственность и имущество в страховой компании,
      определённой Заказчиком, на условиях Заказчика.
    description: >
      Заказчик определяет все параметры страхования: страховую компанию,
      размер покрытия, перечень рисков, франшизу, дополнительные
      условия. Навязывание конкретной страховой компании может
      приводить к завышенным тарифам (на 30-100% выше рыночных),
      особенно если компания аффилирована с заказчиком. Дополнительные
      условия (расширенный перечень рисков, заниженная франшиза)
      увеличивают стоимость страховки. При этом требования к страховому
      покрытию могут быть избыточными: покрытие в 5-10 раз превышает
      стоимость договора. Все расходы на страхование несёт подрядчик,
      что увеличивает себестоимость проекта без возможности компенсации.
    law_reference: "ст. 929 ГК РФ, ст. 935 ГК РФ, ст. 942 ГК РФ (существенные условия)"
    recommendation: >
      Установить право подрядчика на выбор страховой компании
      с рейтингом не ниже согласованного уровня. Размер покрытия —
      обоснован и соразмерен стоимости договора. Условия страхования
      согласовываются обеими сторонами. Стоимость страхования,
      превышающая рыночный уровень из-за требований заказчика, —
      компенсируется заказчиком. Предусмотреть зачёт страховых премий
      в счёт оплаты по договору.
    court_cases:
      - "Постановление АС МО от 08.02.2022 № Ф05-389/2022"
      - "Постановление АС УО от 12.04.2022 № Ф09-1873/22"

  - id: insurance_02
    title: "Страхование ответственности за вред без лимита"
    category: insurance
    severity: high
    pattern: >
      Подрядчик обязан застраховать свою ответственность за причинение
      вреда жизни, здоровью и имуществу третьих лиц при выполнении
      строительно-монтажных работ. Размер страхового покрытия
      не ограничен или значительно превышает стоимость договора.
    description: >
      Требование страховать ответственность без лимита покрытия
      или с покрытием, многократно превышающим стоимость договора,
      создаёт несоразмерную финансовую нагрузку. Страховая премия
      по таким полисам может составить значительную долю маржи
      подрядчика. При этом вероятность наступления страхового случая,
      требующего максимального покрытия, минимальна. Типичный пример:
      стоимость договора 30 млн руб., требуемое покрытие 500 млн руб.
      Страховая премия 1-2% = 5-10 млн руб. = 17-33% от стоимости
      договора. Для сравнения: рыночный уровень покрытия — 50-100 млн.
    law_reference: "ст. 935 ГК РФ, ст. 1079 ГК РФ, ст. 929 ГК РФ"
    recommendation: >
      Установить лимит страхового покрытия, соразмерный стоимости
      договора и характеру рисков. Рекомендуемый размер покрытия —
      не более 200-300% от стоимости договора. Предусмотреть франшизу
      для снижения стоимости страховки. При требовании заказчика
      о повышенном покрытии — компенсация разницы в страховой премии.
    court_cases:
      - "Постановление АС СЗО от 18.01.2022 № Ф07-14569/21"

  - id: insurance_03
    title: "Требование ОПО-страховки при отсутствии ОПО"
    category: insurance
    severity: medium
    pattern: >
      Подрядчик обязан застраховать ответственность за причинение вреда
      при эксплуатации опасного производственного объекта (ОПО),
      при этом объект подрядчика может не являться ОПО.
    description: >
      Заказчик включает требование об ОПО-страховании в стандартный
      договор для всех подрядчиков, независимо от того, являются ли
      их работы опасным производственным объектом. Страхование ОПО
      обязательно по ФЗ № 116, но только при наличии статуса ОПО.
      Если подрядчик не эксплуатирует ОПО, требование ОПО-страховки
      избыточно и увеличивает расходы. Кроме того, получить полис ОПО
      без регистрации объекта как ОПО может быть невозможно или крайне
      дорого. Типичная ситуация: отделочный подрядчик без тяжёлой
      техники обязан предоставить ОПО-страховку, как и генподрядчик
      с кранами и котельной.
    law_reference: "ФЗ № 116-ФЗ «О промышленной безопасности», ФЗ № 225-ФЗ, ст. 935 ГК РФ"
    recommendation: >
      Установить, что требование ОПО-страхования применяется только
      при наличии у подрядчика статуса ОПО. Для подрядчиков без ОПО —
      стандартное страхование ответственности при СМР. Включить
      перечень работ/оборудования, требующих ОПО-страхования,
      в приложение к договору. Предусмотреть альтернативные виды
      страхования для подрядчиков без ОПО.
    court_cases:
      - "Постановление АС УО от 17.05.2022 № Ф09-3110/22"

  - id: BA-202
    title: "Нарушение порядка согласования субподрядчиков"
    category: subcontractor
    severity: high
    pattern: >
      Привлечение субподрядчика без соблюдения процедуры ст. 706 ГК РФ
      или условий договора о предварительном письменном согласии.
    description: >
      Отсутствие формального одобрения субподрядчика Заказчиком может стать
      основанием для отказа в приемке работ, выполненных этим лицом, или
      неустойки за нарушение условий договора.
    law_reference: "ст. 706 ГК РФ"
    recommendation: >
      Всегда получать письменное согласование до начала работ субподрядчика.
      При отсутствии ответа в течение 5 дней — повторный запрос или
      приостановка работ.
    court_cases:
      - "Постановление АС МО от 10.02.2023 № Ф05-1234/23"

  - id: BA-203
    title: "Отсутствие уведомления о скрытых работах"
    category: acceptance
    severity: high
    pattern: >
      Субподрядчик закрывает работы без вызова представителя Генподрядчика
      и Заказчика для оформления АОСР.
    description: >
      Риск необходимости вскрытия конструкций за счет подрядчика по
      требованию заказчика, даже если работы выполнены качественно.
    law_reference: "ст. 748 ГК РФ"
    recommendation: >
      Уведомление минимум за 48 часов в письменном виде.
    court_cases:
      - "Постановление АС СЗО от 15.03.2023"

  - id: BA-204
